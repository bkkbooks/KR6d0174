body:
  text: 高麗沙門諦觀錄南天竺沙門蒙潤集註清比丘性權彚補輔宏記清三寶弟子錢六菴較訂天台嫡裔比丘諦閑編科參梓二色界次色界十八天分為四禪初禪三天梵眾梵輔大梵二禪三天少光無量光光音三禪三天少淨無量淨徧淨四禪九天無雲福生廣果已上三天凡夫住處修上品十善坐禪者得生其中無想天外道所居無煩無熱善見善現色究竟已上五天第三果居處上之一十八天離欲麤散未出色籠故名色界坐得禪定故得禪名此段小註略顯四禪九天內外凡聖差降不同并結界禪二名所以也註妙玄云正報之身是清淨色非如欲界垢染色也十八天此準上座部立記此指部釋十八天總名也言上座者五分律云上更無人名上座毗尼母云從無夏至九夏名下座自十夏至十九夏名中座二十夏至四十夏名上座註若薩婆多宗唯立十六天以梵輔大梵合為一無別處故無想廣果合為一身壽同故若經部宗佛滅後四百年初從一切有部復出一部名為經部立義準經不依律論立十七天梵輔大梵身量別故記此示餘部所立天數不同梵語薩婆多此云一切有於佛滅後四百餘年上座部中因諍論事立異部名薩婆多彼云即梵輔天處有高臺閣名大梵天如世尊處座四眾圍繞故曰無別處也故俱舍云梵王梵輔同一天故輔行云依有宗但十六處初禪中高勝處名梵王不別立也無想廣果合一者準瑜伽論亦不言無想意以廣果中收由身壽同也經部者從說一切有部出而立十七天者合無想廣果為一開大梵梵輔為二以梵輔身量一踰繕那大梵身量一踰繕那半故順正理論第十七天頌曰此上十七處名色界于中三靜慮各三第四靜慮八共十七天也註上座部中須明十八者以廣果無想身壽雖同因果有異廣果以無尋伺為因果無想以無心為因果記此申明上座部立十八天所以也意謂廣果滅尋伺為因五百劫尋伺不起為果無想因中修無想定滅不恒行心心所果報生無想天中四百九十九劫想心不行既因果有異故須開之成十八天也註四禪梵語禪那此翻為定攝心專注不流散故世出世間此禪為根本各有支林功德如法界次第記此釋通名四禪也四處總名禪者準法界次第云禪是西土之音此翻棄惡能棄欲界五蓋等諸惡故或翻功德支林或云思惟修今翻為定者對散而言也謂攝歛紛飛之心專注一緣使不馳流于六塵散誕于五欲習之既久自然成定也世出世之根本者法界云以四無量八背捨八勝處一切處神通變化及無漏觀慧等種種諸三昧悉從四禪中出故又妙玄云定聖行者略為三一世間禪二出世禪三上上禪世禪復二一根本味禪隱沒有垢無記二根本淨禪不隱沒無垢有記根本者以凡聖外道通修故世出世法之根本也大品云諸佛成道轉法輪入涅槃悉在禪中若能深觀根本出生勝妙上定故稱根本也隱沒者闇證無觀慧有垢者地地生愛味無記者境界不分明此有三品謂禪也等也空也即十二門禪根本淨者不隱沒無垢有記與上不同此又三品謂六妙門十六特勝九通明等也二出世間禪者有四謂觀練熏修觀者九想八背捨八勝處十一切處練者九次第定熏者師子奮迅三昧修者超越三昧三出世間上上禪者即九種大禪一自性禪二一切禪三難禪四一切門禪五善人禪六一切行禪七除惱禪八此世他世樂禪九清淨淨禪如地持釋法界亦記今不具記是則世出世間上上禪由四禪而起故稱根本也支林功德見下備十二門等三藏法數禪波羅密均載有師標曰大論說不亂不味名波羅蜜此但名禪不名波羅密者亂有麤細愛有慢見為細三毒為麤一心愛樂為味也辨訛曰此翻為定句恐誤應云靜慮以欲界有慮無靜無色有靜無慮惟色界雙備故禪那別在色界定通無色記然此圖中但各標名相而已今具記之如法界二云初禪五者一覺支初心在緣名為覺行者依未到地發初禪清淨色界法觸欲界身根心大驚悟爾時即生身識覺此色界觸未曾有功德利益也二觀支細心分別名為觀既證初禪功德即以細心分別此禪定中色法諸妙功德境界分明無諸蓋覆如是功德欲界所未有故也三喜支欣慶之心名為喜發時即有喜生但分別未了故喜未成若觀心分別所捨欲界樂甚少今得初禪利益甚多懽喜無量也四樂支怡悅之心名為樂發時即有樂但分別喜動踊心息則恬然靜慮受於觸樂怡悅安快也五一心支心與定法一故名一心行者初證禪時乃即著定而心猶依覺觀喜樂之法故有微細之散若喜樂心息自然與定一也二禪四者一內淨支心無覺觀溷濁名內淨行者欲離初禪時種種訶責覺觀覺觀既滅則心內淨心與淨色法相應豁爾明淨也二喜支欣喜之心名喜行者初得內淨時即與喜俱發而喜心未成次心自慶得免覺觀之患獲得勝定內淨歡喜無量也三樂支怡悅之心名樂行者喜踊之情既息則恬然靜慮受于內淨喜中之悅樂也四一心支心與定法一名一心行者受樂心息則心與定一澄渟不動也三禪五者一捨支離喜不悔名捨行者欲離二禪時種種因緣訶責於喜喜既滅謝三禪即發若證三禪之樂則捨二禪之喜不生於悔也亦云三禪樂初生時是樂三界第一能生心著心著則禪壞故須行捨也二念支愛念名念行者既發此三禪之樂樂從內起須愛念護惜則樂得增長乃至徧身也三慧支解知之心名慧行者既發三禪之樂此樂微妙難得若非善巧解慧則不能方便長養此樂得徧身也四樂支怡悅之心名樂行者發此三禪樂已若能善用捨念慧將護此樂樂既無過則增長遍身怡悅受樂安快此為最樂若離三禪餘地更無此徧身樂也五一心支心與定法一名一心受樂心息則心與定一不動也四禪四者一不苦不樂支中庸之心名不苦不樂行者欲離三禪種種因緣訶責於樂樂既謝滅則不動之定與捨俱發故內心湛然不苦不樂也二捨支離樂不悔名捨既得四禪不動真定則捨難捨之樂不生悔心也亦云證四禪不動定時不應取定起念若行捨則無動念之乖也三念清淨支念者愛念既得四禪真定當念下地之過念自功德方便長養令不退失進入勝品名念亦云是四禪中有不動照了正念分明也四一心支心與定一名一心既得四禪捨俱之定捨念將息念無所依泯然凝寂一意在定如明鏡不動湛然而照萬像皆現何故四禪獨名不動以初禪覺觀動二禪喜所動三禪樂所動故四禪名真定也若善巧照了分明則因此定發真無漏有漏外道無慧方便入此定時不壞身色直滅其心入無想定為謂涅槃是為邪倒支者派也瑜伽言諸靜慮中雖有餘法然此勝故於修定者為思量故徧立為支註輔行九上九引婆沙中問初三何故五二四何故四答自古相承云欲界五欲為外亂二禪喜為內亂初禪治外亂之始三禪治內亂之始故各有五二禪外亂息四禪內亂息是故二四但立四支記婆沙言隨順義是支若法隨順彼地者立支五支隨順初三四支隨順二四復次欲界是難斷難除難過之界必須牢強對治故彼對治初禪立五支第二禪喜亦難斷難除難過故彼對治三禪亦五支也初禪不難斷難除難過故彼對治二禪立四支復次為對欲界五種境界愛初禪立五支為對二禪五種喜第三立五支初禪無五種境界愛三禪無五種喜愛故二與四不立五支註初禪三天梵者淨也無欲染故十八天皆淨無欲此當其首徧得淨名梵眾是民梵輔是臣大梵即王也劫初先生劫盡後滅主領大千然通論有萬億梵王唯此是大千之中王名尸棄得為大千之王降此不得橫論又初禪有語言號令能統上冠下故也如法華云娑婆世界主梵天王尸棄大梵若摩醯首羅居色界頂報勝為主無統王義以二禪已上無言語法是故諸禪亦各以報勝為主非統御也豎辨具如法華文句淨名疏明若涅槃疏云娑婆世界主正是首羅又云梵王只領小千而已乃古師之說非今家正意記佛地論曰離欲寂靜名梵具云梵摩此翻清潔寂靜謂創離欲染名清潔得根本定為寂靜法華疏稱高淨大論云斷婬欲天皆名為梵初禪當首偏名淨也次明三天分君臣民以二禪上無言語法故不立王臣則知初禪有言語號令統領故分王臣也然通論下此約一佛所化之境三千大千世界約橫論有萬億初禪天萬億梵王然皆居四方惟此尸棄是大千中主領大千也尸棄翻頂髻王頂上有肉髻似螺形亦名螺髻或曰火頂以火灾至此故貌如童子身白銀色衣黃金色以禪悅為食也又下約豎辨王大千謂初禪有尋伺故有語言號令統上冠下也問法華序品列外護眾謂摩醯首羅是娑婆世界主何耶答摩醯首羅居色界頂但二禪已上既無尋伺無言語法故報勝為主非統御言主也又尸棄者此王本修火光定破欲界惑從德立名然經標梵王復舉尸棄似如兩人依釋論正以尸棄為主法華舉位顯名恐一人耳又單修禪為梵民加四無量心為王也涅槃疏云大自在天即摩醯首羅居色界頂主大千界十地菩薩迹現其中也若法華中列世界主梵天王者此意云何若言娑婆世界主者正是首羅若言尸棄大梵等者更舉二禪等收三四禪梵王耳又稱梵天王為世界主私謂此是大千之中得為大千之主降此不得故知所言梵王只領小千乃古師說非今註意也補初禪名離生喜樂地謂離欲界雜惡趣生得清淨樂律中喻以巧浴潤漬也註二禪三天少光光明少故無量光光明轉增無限量故光音以光當語音故新譯云極光記大論云二禪通名光音彼天語時口出淨光有云彼內無尋伺外無言語用光當語故名光音瑜伽論稱極光淨謂淨光遍照自他處故補二禪覺觀俱離憂懸不逼麤漏已伏稱定生喜樂地謂有定水潤澤其心律中喻以山頂之泉也少光等者大論云心清淨優劣故光有上中下諸天心清淨布施持戒故身有光明復有人於暗處然燈亦供養尊像塔寺復常修慈又修念佛三昧念諸佛光明神德復修火一切入又以智慧光明教化愚癡邪見眾生以是因緣得心中智慧明身亦有光是以曇毗云諸天報相身放光明無別晝夜報得五通形無障礙是知三天論光義徧前後三禪論淨其義亦然大要隨位高下立行淺深耳註三禪三天少淨意識嗜樂離喜而純樂受故無量淨淨勝於前不可量故徧淨樂受最勝淨周普故記少淨離喜而純樂者唯識論言五識相應適悅受恒名為樂但悅身故意識相應適悅受若在欲界初二靜慮近分名喜但悅心故若在初二靜慮根本名樂名喜悅身心故若在第三靜慮若近分若根本皆稱樂也近分者謂未至地及未至根本也無量勝前者謂前僅心淨而此更身淨也徧淨周普者謂前二雖身心清淨未能周普此天更加物我無二反於世間故論曰三界中徧淨為樂又曰福德徧淨也補吳興云地持論目第三禪為樂俱禪此定功德與徧身樂俱發故前二雖有樂支為善所障今滅喜純樂得名名離喜妙樂地律中喻以蓮華出地而未出水根葉花莖無不潤漬也問三禪何故言淨答大論云緣淨故淨八色是淨法未被練不得淨今三四禪法起來觸此八色為作淨緣三四禪等此是色界極淨之色用此為緣觸八色更淨故言緣淨故淨是樂徧身受故知是三禪中淨也少淨者此樂非境出於淨性恬淡寂靜亦名寂滅樂非無為之寂滅樂也無量淨如楞嚴經云身心輕安成寂滅樂徧淨如楞嚴經云世界身心一切圓淨也註四禪九天無雲者下雖空居依雲而住此無雲首特號無雲業疏曰第四禪上雲居輕薄如星散住不同下天如雲密合文福生者修勝福力方生此天從因彰名廣果者凡夫之果無勝過故無想者一期中間心想不行故無煩雜無熱惱善相見善現相究竟無極此五天三果所居名五不還天若俱舍舊圖次第而上若準楞嚴第九皆橫在四禪中彼四禪天獨有欽聞不能知見如今世間曠野深山聖道場地皆羅漢所住持故世間麤人所不能見文又色究竟中有摩醯首羅此翻大自在天記開蒙曰三禪皆依雲住四禪方在空居此天初得獨名無雲問何故欲界除下二天皆名空居答前言空居不履地故此則雲氣亦無取意不同也業疏下引證福生謂具勝福因方得生也廣果謂異生善得果報此天最勝所有功德勝下諸天也無想唯識論云因中修彼無想定時厭患麤想力故生彼天中違礙不恒行之心及心所但以想滅為首壽命五百劫除初生彼半劫想心尚在及後退沒半劫想心又起中間四百九十九劫想心不行也無煩雜下釋後五那含天輔行言無煩之始得無煩名伏熱惱故名無熱果易彰故名善現見清徹故名善見色中無上名色究竟又言無煩無見思煩惱雜也無熱意樂調柔離下界見思熱惱也善見者定障漸微見極明徹也善現者形色轉勝善能變現也色究竟者色法最極之處是究竟處也不遷者不還人間受生也俱舍圖失考唐譯俱舍頌言由雜修五品生有五淨居論言由雜熏修第四靜慮有五品故淨居唯五謂下中上上勝上極五品差別故此中初三品心現前便得成滿謂初無漏次起有漏復起無漏第二品六三品九四品十二五品十五如是五品雜修次第感五淨居應知此中無漏勢力熏修有漏令感淨居有言由信等五次第增上感五淨居然皆竪論也楞嚴橫論者彼四禪天指福生福愛廣果無想也所以獨聞而不見者蓋下天修有漏凡定此五修無漏聖業凡聖業異故也又色究竟下別明色頂有菩薩住處如經言過五淨居有十住菩薩住處亦名淨居號大自在天王又三乘中立此為淨土是報身所居約實但是十地菩薩攝報之果多作彼王耳大論言此天有八臂三目乘白牛執白拂一念之間能知大千世界雨滴數也補三天是凡夫一無想是外道五淨居是三果居處此名捨念清淨地律中喻以沐浴披新淨衣又如密室中燈三災不到由其離內患也業疏南山宣律師釋羯磨此言業註俱舍頌云色天踰繕那初四增半半謂梵眾半踰繕那梵輔一大梵一半少光二也記頌明色界九天身壽劫量註此上倍倍增無量光四光音八乃至徧淨六十四記解釋與論同論言無量光天倍增二至四乃至色究竟增滿萬六千是也註唯無雲減三下徧淨天既六十四無雲倍應百二十八身壽但有一百二十五者謂從變易受入不變易受難故各減三變易不變易約三災壞不壞說記無雲減三之故本論釋不出若華嚴鈔明無雲欲成上都數故減於三唯一百二十五也備辨訛曰既無雲入不變易身壽應增當如清涼所言成上都數故減又諸天身壽皆舉大概故不妨減存考註少光上下天大全半為劫少光已上大全為劫謂少光二大劫乃至色究竟萬六千大劫少光已下大半為劫以由身量與壽量等大梵身既一由旬半故壽當一劫半故以四十小劫為一大劫則六十小劫成劫半也梵輔壽一劫身一由旬四十小劫也梵眾身半由旬故壽半劫二十小劫也記註釋較論為詳論言少光已上大全為劫自下諸天大半為劫由此說大梵過梵輔天壽一劫半謂成住壞各二十中劫六十中劫為一劫半故以大半四十中劫為下三天身壽劫量也補壽之劫數既爾身之由旬亦然應少光已上身量以八十里為一由旬少光已下身量以四十里為一由旬此約身壽對論如此若約三災對論大全半為劫亦允合蓋世界成自上而下壞自下而上故成住壞空各二十小劫除却空劫梵王生成劫初滅壞劫後正當六十小劫壽也自少光二大劫至光音八大劫却值七番火災又一番水灾方壞二禪正當八大劫壽也如此對來全半之義毫無乖失此以八十小劫為大全劫四十小劫為大半劫三無色界三無色界四天空處識處無所有處非非想已上四天只有四陰而無色蘊故得名也註若厭色籠修四空定生四空天名無色界備有師標曰此無色非畢竟無色婆娑謂或經二萬劫色斷乃至八萬劫色斷命終還與色相續故斷有二種有須臾畢竟須臾斷相續畢竟斷不相續註輔行六上四云從第四禪欲入空處必作方便滅三種色一可見可對色色塵二不可見可對色五根四塵三不可見無對色法入少分無表色也此之三色並在色界欲入無色故滅此三文記滅色入空方便者先想此身如甑如籠如網乃至漸空大論言如鳥在缾缾破得出婆娑曰先應思惟坼上墻上舍上諸空之相取此相已假想勝解觀察照了無邊空相以先思惟無邊空相而修加行展轉引起初無色生又順正理曰空法雖與色俱而其自體不依屬色諸有於色求離者必應最初思惟彼法謂虗空體雖與色俱而待色無方得顯了外法所攝其相無邊思惟彼時而能離也此明入空方便滅三種色者阿毗曇言一可見謂色是二有對有十謂五根五塵若不可見有對但五根四塵三不可見無對謂法處少分問香味二想初禪已離色聲觸想二禪已除云何言空定滅耶答達法師言香味雖盡初禪今言滅者治有四種一壞對治謂方便道觀下有漏無常等故二斷對治謂無礙道正斷下過三持對治謂解脫道為首及後一切無間解脫持彼無為不令散失四遠分對治謂解脫為首及後一切無礙解脫遠令前障畢竟不退今此空定據第四治也色聲觸三言二禪滅者二禪已上乃至四禪當地雖無得借故也補方便滅色者禪波羅密言應深思色法過罪以有身色則內有飢渴外受寒暑等苦復次一切色法繫縛於心不得自在讚嘆虗空無色則無此過一心緣空念空不捨當度於色難也五根四塵根指五勝義根唯天眼能見凡夫不能見落在浮塵根如蒲桃朵等故言不可見然猶有對眼根可對色等四塵指聲香味觸若法入少分者以四分中之一故言少分一心數法屬心二不相應法非色非心三無為法非三聚攝四無表色屬色此色不可見亦無對無所表彰名無表即五塵落謝影子也註無色界色小乘空有二宗各計不同大眾部云但無麤色非無細色妙玄四六引毗曇云無色有道共戒戒是無作色以無漏緣通故此戒色隨無漏緣至無色也文釋籤四三十一云言無漏緣通者通九地也既通九地豈隔無色文妙樂六九云無色雖無四大造色定果所為皆是墻壁欲色二界業果所為三界皆以意識維持若約諸宗無色非全無四大色雅合其宜文有合門計有色經墻壁譬此是有宗計有色也記細色即定果色妙玄引毗曇下證成有色婆沙問何故世尊弟子生無色及無色界羅漢成就道俱生戒不成就定俱生戒答有說世俗戒是縛是繫法是以不成就無漏戒不縛不是繫法故成就有說世俗戒墮在界中墮在定中無漏戒雖在地中不墮界中是故成就則無色界有道共戒無作色故引妙玄釋籤證成既有無作豈得全無色耶妙樂下更引證成蓋文句言堂譬欲界閣譬色無色界墻壁譬四大妙樂言墻壁譬四大者應通三界無色雖無四大造色然有定果所為之色皆是墻壁欲色業果所為者黑業白業欲界報不動業色界報雖有垢淨不同俱業果也三界意識維持者定業二界皆意識所執持也若約下妙樂判明有色合宜補此有宗引無作色以顯無色界有色蓋有宗謂道共戒是色聚攝道共者見諦道中所發無作與心上勝道俱故曰道共以無作為體無作者不假造作任運而發體屬於色故名無作色無漏緣通者無漏即見道八忍八智此十六心能斷三界見惑而不漏落三途故此無漏為能緣三界苦集滅道諦理為所緣既遍緣上下八諦故曰緣通也備法數引婆娑云一道共戒於見道修道位中不作意持自然不犯戒與道俱發名道共此戒是初二三果所得即無漏戒也二定共戒謂發得初禪二三四禪定時不作意持自然不犯戒與定俱發此戒斷惑未盡未出生死即有漏戒也備辨訛曰此中明無色界須疏明無色著落不必引空有二宗雜解妙樂墻壁譬亦不必引彼釋大乘經此明三藏大小須分也私謂上說修得無色所由此因便詳明無色有定果色既有二解必須兼引大乘證明均屬要義無色著落下有四段分解非略也註妙玄引成論云色是無教法此是空宗牒有宗計不至無色此是空宗難有宗也難云應不至無色耶如讀教記戒體中辨此是空宗計無色者也記讀教記未詳若準戒疏言無教法者謂戒是色住無作是假色亦言無教非對眼色發隱言亦言無教者亦名無教也非對眼色者即非色非心之色法也補澤山咸戒疏曰小乘立三聚謂色心非色非心薩婆多有宗作無作並色為體註言初依身口而起故作戒以色為體所發善業天眼能見故無作戒亦色為體成實空宗作戒以色心為體無作以非色非心為體註言業由心起心是正因身口為緣兼緣顯正故作戒色心為體無作體者由作初起必假色心無作後發異於前緣故強目之非色非心耳若大乘者但論色心無第三聚故作無作戒體通色通心有師曰無教法即無作色亦名無表色不可教示故有宗謂無作業雖屬於色無有相狀不可分別教示故名無教空宗牒彼所計故言色是無教法無色一句是難謂汝既言道共戒有色是無教法既言是色則道共戒應不至無色耶何者以道共是非色非心故能通至無色汝既是色豈能至無色耶如此難者蓋空宗亦許道共戒通至無色但不許道共戒是色以無色界無色故是以空宗立戒體是非色非心聚故能隨無漏緣通至無色也註然小乘計有是不了義說無色者乃名了義大乘反此記小乘以所證空謂極處故推空宗計無色為了義也備辨訛曰然小乘計有是不了義上引妙樂許有宗合宜復引籤文破其不了若破其不了則荊溪許他有過又引楞嚴及孤山釋判與小乘有宗義合此但見荊溪許有宗合宜不知荊溪釋文後不過旁引有宗許其雅合集註不當將大乘經反合小乘也私謂小乘著空計有不了遂覺空宗勝於有宗是小乘意許有定果是大乘意亦是今注引以證成意上引籤文並非破其不了下引楞嚴孤山釋乃就大小乘說有是同邊論存俟後定註楞嚴經言是四空天身心滅盡定性現前無業果色孤山釋云謂無業果色者顯有定果色也此與小乘有宗義合若大經云無色界色是佛境界非諸聲聞緣覺所知者此是大乘說有色義也記大經迦葉言聲聞緣覺若非色者云何得住世尊言如非想非非想天亦色非色我亦說為非色若人難言非想非非想天若非色者云何得有去來進止如是之義諸佛境界非諸聲聞緣覺所知補四空身心滅盡等者正脈言初二天全無身境故曰身滅後二天七八現行俱伏不行故曰心滅盡定性現前者明有定果色無業果色者依正皆空聖眼觀之三尺識神似中有也是佛境界非聲緣所知者以聲聞經說所證空遂謂極處悉皆無色大乘實說界外尚受法性之色豈此四天惟空空然故斥二乘非所知也又中陰經言無色界天禮拜世尊楞嚴亦曰無色稽首仁王經言無色界天雨諸香華阿含說舍利弗入涅槃無色界天空中淚下如春細雨皆明有色也又定果色顯揚論名定自在所生色謂勝定力故於一切色皆得自在即以定變起五塵境故論言變身萬億共立毫端空量地界也以上辨有色竟註空處禪門六九云此定最初離三種色心緣虗空既與無色相應故名虗空定也文記三種即可見有對有三種註識處禪門六十一云捨空緣識以識為處正從所緣處受名故名識處文記所緣識處必帶於相識相無邊名識無邊處註無所有處行者厭於識處無邊於是捨之入無所有處亦名不用處禪門六十二云修此定時不用一切內外境界外境名空內境名識捨此二境故言不用處文記止觀言識處謝已緣無所有法相應名不用處即佛三年就阿藍迦藍所習定也註非非想止觀六四引阿毗曇婆娑云非無想天之無想非三空之有想故言非想非無想也人師云無想是色天異界不應仍此得名就同界識名前無所有定已除想今復除無想想無想兩捨故言非有想非無想文輔行六上五人師尚不許引色無想天況總引四禪既是論文取亦無失人師釋義亦未全非今家俱存故無破斥文止觀九八云此定不緣識處故非想不緣不用處故非非想文記人師意謂無想是色天與無色異界故不應依以立名當依同界之無所有已除乎想今復除無所有之無想立為非想非無想也輔行下明止觀雙存兩釋之意論文乃大士本經而造取亦無失此存論家釋人師非想依同界不無其義此存人師釋止觀下此止觀正釋備集註問答總引四禪句輔行引立世論曰非如四色及以三空故言非想非無想天及無心定故非非想註只打四陰輔行五上二十四云蘊之與陰新舊異譯文記唐元奘師新譯曰蘊舊譯曰陰大論問既有四陰云何言非有想非無想答是中有想微細難覺故謂非有想有想故非無想凡夫謂得諸法實相是為涅槃佛法中雖知有想因其本名稱非有想非無想也註積聚名蘊蓋覆名陰積聚有為蓋覆真性記有為即色受想行識生滅法真性即真如法性只由無始不覺遂有諸法積聚蓋覆也註然諸文或云四禪八定或云四定者輔行九上初云若色無色二界相對則色界名禪無色界名定若總以上界望於下欲則上二界俱名定地下界為散文記色界思維修故無色深定勝故故分禪定二名三結二初結判生死上來所釋從地獄至非非想天雖然苦樂不同未免生而復死死而還生故名生死註一往言之三途唯苦諸天純樂人中苦樂相間通而言之天亦有苦妙玄六二十九云六欲天者地天別有修羅鬪戰之難通有五衰死相苦等地獄色天雖無下界諸苦而為色所籠若命盡時不樂入禪風觸吹身唯除眼識餘皆有苦四空諸天雖無欲色界等苦如瘡空處如癰識處如病無所有處如箭入體非非想成就細煩惱文及非想有八苦等記四王忉利二天別有修羅難者瑜伽論言若修羅鬪戰時諸天失手復生若斬首截腰亦死六天通有五衰者涅槃經言大五衰者頭上花萎腋下汗出衣裳垢染身體臭穢不樂本座小五衰者衣服絕香身光忽滅浴滴沾身本性囂馳兩目眴動小五相現遇勝善緣猶可轉故大五相現必定當死禪經言於彼恒樂處衰死二五相是相及命終爾時最大苦方欲恣所樂五衰忽然至若見是相時愁怖不自安天眼卒便瞬浴已水著身一切妙境界其心不喜樂千種樂自然迦陵頻伽音今則寂無聲當知七日死玉女悉捨去餘天共從事見已生熱惱命終入地獄又禪經云腋下流汗出衣服卒垢膩見已大恐怖是則淨業盡花冠昔鮮麗而今忽萎熱身體本光澤一朝頓枯瘁常所愛樂座今惡不復樂是五種相現當知時死至是也苦等地獄禪經言諸天共器食隨福有差別見此異色時心則生憂惱如是極愁慘猶如地獄苦是也色天命盡時風觸吹身唯除眼識者籤文無解從來無確釋有約義通曰勝禪定者目力最勝故命盡風觸吹身五根受苦而眼識猶不受又有言上地眼識眼起方有風非眼境故不受苦俟再考定如瘡等者禪門云離四空定說八種觀如瘡癰病刺無常苦空無我是也前四對治事觀後四即是理觀此八有總別總則用此八法總觀空處定四陰和合故有此定可患無實別觀者前四對治觀四陰事謂病治受癰治想瘡治行刺治識無常等四即對觀四陰理相謂無常觀識苦觀受空觀想無我觀行陰又有云觀五陰能生諸惱故如病有聞病為輕微故言如癰疽有人以癰猶或可差故言如箭鏑入體此為上根說四若中根說八下根說十加痛惱衰壞憂畏不安今玄文為上根以前四對治方法別觀四空也成就細煩惱者以四空有三十六品思也非想八苦者謂心生異念名生若念念不停名老苦行心擾擾妨定名病苦退定是死苦求定不得名求不得苦求定不得必有於障即怨憎會苦失定時苦名愛別離苦四陰心即熾盛苦故三界皆苦也補十種細煩惱輔行言受乃至慧受謂識所受想謂識所想行謂法行觸謂意觸思謂法思欲謂欲入定解謂法勝解念謂念三昧定謂心如法住慧謂慧根慧力此之十法乃無色之愛無明掉慢心不相應諸行苦集因緣和合得生於彼欲入滅定先滅此等是也備止觀言識處如癰無所有處如瘡輔行補言空處如病非非想如刺今儀文空處如瘡無所有如病然禪波羅密引摩訶衍言觀識處如瘡如箭觀無想處如癡存考集註問答問風觸吹身何故唯除眼識答據俱舍言眼識通二地謂欲界及初定又生二三四定地若眼識現起從彼退於下界生故云二結歸苦諦此是藏教實有苦諦註文句六云三藏教詮生滅故云實有也二集諦三初總標名體二初牒名示體二集諦者即見思惑註集者招集為義惑與業俱能招生死而今但云惑者前苦諦中已明善惡業故即見思惑示集諦之體也見者若云見理時能斷此惑即從解得名若云見只是假謂因成相續相待三假也假者不實為義即當體受稱記止觀云見則見理見實非惑見理時能斷此惑從解得名又曰見惑非但從解得名亦當體受稱稱之為假假者虗妄顛倒也記外道諸見者止觀言一單四見二複四見三具足四見四無言見單四者執有執無亦有亦無非有非無於一有見復起利鈍十使歷三界合有八十八使餘三亦各具八十八使若歷六十二見見見各具八十八使乃至歷六十二見八十八使各各百八又複四見具足四見又單複具足外各各一絕言見亦皆起八十八使六十二見百八等如前說約佛法藏四門生四見通四門生四見別四門生四見圓四門生四見又四門外各一絕言見如是一一見中各各起八十八使六十二見百八等惑如前說以上諸見見理則斷也備辨訛言既是從解得名不當列外道佛法諸見當知見則是惑而非解矣私謂見理則從解見惑則從名今從得名邊也辨訛曰百八見准校計經言百八癡大論言百八受即止觀輔行引文未甞言百八見也記約外道例前亦應言單複具足各假并一絕言假依佛法復十六假一一如前說又於一一假中復有三假謂因成相續相待也法塵對意根者因成約內外相續但約內根相待竪待滅無之無橫待三無為之無心也輔行解言約心因內因外和合方成故所生法名因成念不實故故前念滅滅已復生生者必滅計能相續名相續己待於他假立於己相待不實名相待若竪待者意亦如是約色四大色身體全不實是三假故前念滅時假後念續故名為假待中亦應具有橫竪待往滅身名為不身竪待也他非我身名為不身橫待也約依報可解此是三藏隨事三假滅色空也記出止觀會本五卷五記輔行引大論言謂色如去等四句四陰亦然合二十句此計過去也又計色常等四句四陰亦然合二十句此計現在也又計色有邊等四句四陰亦然合二十句即計未來也一一句下皆言神及世間三世六十并有無二論釋言凡夫取著計有神我計常者修福滅罪計無常者為今世名利故有所作亦常亦無常者只是雙計初二兩句故於神我以計麤細為第三句計神麤者身死無常計神細者身死不滅計雙非者見計第三二俱有過何者常則不滅猶如虗空風雨不動若無常者則有變動如雨在皮則有壞爛離此二過以我心故復說有神神但非常非無常耳佛言四皆邪見此即計神也世間即是國土是故神於世間亦有四見言計常者問言土若本無計應有錯世間是有何故邪見答破世間者破常等想不破世間如無目人以蛇莊嚴有目語言蛇非瓔珞破倒亦爾現見無常不得言常三四兩句準說可知有邊等者外人求土不得其始即謂無終無始中終則名無邊計有此三即名有邊如得禪者計八萬劫三四二句凖此可知亦有人言第三句者八方有邊上下無邊有言上至有頂下至地獄上下有邊八方無邊計神我如芥子等是亦有計土及以神我互計有無成三四兩句準此可知如去等者如人彼來去至後世謂如去謂先世無來滅亦無去名不如去若謂身死為去而神不去名第三句見俱有過名第四句大論甚廣須往彼尋備五陰大小即離解見下於五陰中一陰四見成二十約三世成六十以斷常二見為根本成六十二出涅槃經輔行亦引身邊攝者我即身見大小即離皆邊見輔行乃節取大論稍有不同取其明顯句下皆言神及世間者如論言是見依色神及世間常是事實餘妄語於受想等四陰常無常邊無邊等各四句例此可知計常者修福受後報故計無常者但為今世不信後報故亦常亦無常者謂神有麤細二種一微細常住二現有所作身死時無常細神是常四皆邪見者但於五眾謬計為神耳世間指國土世間於世間相中亦有四種邪見大論問神從本已來無故應錯世間是有云何同神邪見答曰但破於世間起常無常相不破世間佛破世間常顛倒不破世間何以故現見無常故亦不得言無常罪福不失故求土不得其始者求世間根本不得其始也計八萬劫者過是已往不復能知但憶想分別有法名世性是常故神如芥子等者論言如芥子如棗或言一寸說神是色法有分故言神有邊無邊者有人說神徧滿虗空得身處能覺苦樂是名神無邊土及神我互計有無者有人言神世間無邊國土世間有邊或神世間有邊國土世間無邊等名為有邊無邊有人見世間有邊無邊俱有過著非有邊非無邊以為世間實是邊見如去者如人來此間生去至後世亦如是有人言先世無所從來滅亦無所去有人言身神和合為人死後神去身不去是名如去不如去見去不去有失是人不能捨神而著非去非不去也輔行土若本無計應有錯者單就國土問也身去神不去者身死變滅為去神不變滅為不去大論神去身不去者身死消滅為不去神至後世為去其義皆通又神王疏言六十二見釋者不同且依大論於色陰說過去神及世間常是事實無常等三句亦然餘陰亦如是成二十現在有邊無邊等歷五陰亦有二十死後如去不如去等亦有二十成六十是神與身一神與身異成六十二也記輔行引婆娑言六十五見即於五陰各計四為我所謂色是我受是僮僕瓔珞窟宅想等三陰亦然合我及我所十三句五陰合為六十五句故一一陰初一是我四是我所補瓔珞如人有財僕屬我使窟宅如油在麻中等記輔行言五十校計經法相稍異諸經止觀引經云若眼見好色惡色平色中皆有陰有集乃至意緣法亦然一根有三種塵三種有六個陰集則六根具三十六三世合有一百八也輔行言彼經但立六根各六雖無三世語而結言百八故知約剎那為三世也既以心意識三為意地三故通三世如言集起名心籌量名意了別名識也又輔行言若準大論六根各三受三受對三塵三世為百八此則約果報對三世論補剎那約心果報約境境是果報法也陰集者好惡平境名陰陰上起見名集有言陰以陰覆為義集以積聚為義好惡平色若對於眼眼為所轉即覆於眼名陰陰復聚集好惡平色種子於內名集眼根既爾餘根亦然此說存考註思惑入修道位重慮緣真輔行云慮謂思慮見道觀真已發無漏今復重觀故云重慮此惑即除名思惟惑此從解得名若云思假及愛惑者此當體受稱記止觀言稱思惟者從解得名初見真淺猶有事障後重慮真此惑即除名思惟惑也備思惑具因成相續相待三假故言思假愛惑者法數言貪愛曰思謂於外五塵貪愛染著法界初門謂之愛煩惱此當體受稱也註然見惑從法塵起能障真理思惑從五塵起能牽三界此皆約欲界多分說細論不拘記此明見思為障不同故教中稱見惑為理障思惑為事障然約欲界多分說也補見惑非但障理亦能牽生如言由三復還下是也思惑非惟牽生亦能障理如言由貪愛故不見真理是也辨訛曰細論不拘句因集註立上百八見圖故有此言以上明百八見不出六根六塵而起既有見從五塵起何故言見從法塵思從五塵耶私謂不拘者和會障理牽生而說二名異體同又云見修又云四住又云染污無知又云取相惑又云枝末無明又云通惑又云界內惑雖名不同但見思耳註見修見惑見道所斷思惑修道所斷約能斷位名所斷惑也記初果見道八忍八智所斷名見惑二三果思惟修道九無礙九解脫所斷名思惑註四住見為一住思惑分三因此二惑故住著三界記見一切住地欲色無色愛三住地註染污無知妙樂一二十四云然小乘中立二無知染污無知無明為體不染污無知劣慧為體謂味勢熟德時數量耳文諸法滋味損益等勢成熟德用近遠等時一一等數大小等量備法數言染污無知即見思無明為體謂染污真性無所明了也不染污無知即塵沙劣慧為體指他人分上見思惑種數多故如塵若沙但不能染我真性二乘智慧狹劣不能令他斷見思名不染污無知補不障真理名不染污於俗諦不了名無知劣慧即人空智雖能證空於諸佛恒沙法門眾生無量根性皆不能達也諸法滋味等者謂於恒沙法門無量眾生約法有諸法滋味約機有損益等勢成熟德用約相有遠近等時一一等數大小等量皆非二乘所知隨相論言輕重冷熱濕滑軟堅等名勢力熟者如食果入腹變熟不同德者草木等威德或根能出光或能却鬼或能除毒等輔行言他解不染污即習氣今家意者小乘習氣即別惑是註取相惑三惑皆名取相觀音玄記上七云見思取生死相塵沙取涅槃相無明取二邊相今見思取六道生死之相也備計生死為實見思之取相也照真不了俗塵沙之取相也偏於真俗而不契中無明之取相也辨訛言觀師以取相名見思應作通別兩解別解如文句釋大迦葉觀心云即空抖擻取相止觀歸大處言取相障般若均別指見思註枝末無明對根本得名見思以無明為根本故云枝末於一切法無所明了故曰無明記無明為諸雜染所依故見思以之為根本註通惑對別惑得名見思通三乘人斷故曰通惑塵沙無明別在菩薩所斷故名別惑記聲聞前後各斷見思支佛頓斷見思習猶未盡菩薩以三十四心頓斷見思習氣故名通惑註界內惑對界外得名見思潤有漏業招三界生故云界內塵沙潤無漏業無明潤非漏非無漏業招變易生故云界外塵沙則通界內外也補見思惑為能潤有漏業為所潤惑業為能招三界生為所招以見思所潤所招不出六道名界內惑唯識有言諸有漏善不善業由煩惱障助緣勢力所感三界麤異熟果即分段生死也塵沙潤無漏者此無漏業即二乘人之所修空無相無作是也但塵沙潤業未考出何經論非漏非無漏業者即菩薩出假所修之行以不同六道生死業故非漏亦不同二乘耽空業故非無漏招變易生者惑業為能招變易生為所招由悲願力改轉身命無定齊限名變易如改麤為細質易短作長年也問改麤易短何名生死答覺知勢盡名為死入定還資謂之生以此惑業只感界外生死名界外惑唯識有言諸無漏有分別業由所知障助緣勢力所感殊勝細異熟果即變易生死也塵沙通界內外者此惑在化導邊說如二乘自斷見思不能斷他人見思故望他人見思多如塵沙此界內以見思為體也菩薩若自破無明未能破一切人無明及知界外修證果位故望他人無明多如塵沙此界外以無明為體也備異熟者所造惑業異時異世而成熟感果也所知障者知即覺觀因此覺觀不泯障於法性不得證入名所知障備辨訛曰無明潤非漏句當先補潤亦漏亦無漏業句存俟後定二別釋見思二初見惑三初標名列使二初通標名數初釋見惑有八十八使註法界次第上七云使以驅役為義能驅役行者心神流轉三界故通受使名記小乘不言第八識故曰心神二別列十使所謂一身見二邊見三見取四戒取五邪見以上利使六貪七嗔八癡九慢十疑已上鈍使註身見於陰入界中妄計為身強立主宰恒起我見諸文或云身見或云我見止觀十十六變列二名云求我叵得故則身見破身見破故則我見破文輔行五下九云外人計我如麻豆及母指等或計徧身神身四句及一異等文記宗鏡言我有主宰二義謂主有自在力宰有割斷力義同我故主是我體宰是我用又主乃俱生我無分別故屬第七識我宰是分別我有割斷義屬第六識我故主等立而我見起也輔行下示執我之見大論云有言神在心中微細如芥子名淨色身有言如麥如豆半寸一寸初受身時最在前受譬如像骨及其成身如像已壯有言大小隨人身死壞時此亦前出又唯識言勝論作者我數論受者我體常周遍量同虗空隨處造業隨受苦樂又無慙外道尼犍子等執我體常而量不定隨身大小即有舒卷又獸主遍出二宗計我體常至細潛轉身中作諸事業然九十五種外道宗計雖多不出一異等四句神身即神我也一異及四句解前又一是即陰異是離陰註邊見於身見上計我斷常執常非斷執斷非常隨執一邊也記此邊見貼我見說顯揚論曰執邊見者謂於五取蘊執計斷常染污慧為體上釋見中廣解註見取謂因此見通至非想信此非餘執劣為勝記釋論言此於諸見及所依蘊執為最勝能得涅槃清淨法名見取由互相執勝而起鬪諍也又輔行曰於非真勝法中謬見涅槃生心取著皆名見取若行道時雖入種種觀門而真明未發無明不了便謬計所得為真為勝生心取著皆名見取也今所言因此見者謂或常或斷等計因此修持能通非想非毀餘法執劣為勝也如外人亦修六妙觀修苦行稍有輕安以為到家消息註戒取執邪為道名非因計因及雞狗等戒名戒取補玄籤曰外道亦有天眼能見雞狗生天便受此戒作生天計不知雞等於彼業謝往勝因牽生天耳見牛羊喫草生天他亦食草不知牛羊報盡生天耳釋籤云外道計苦行有六謂自餓投淵赴火自墜寂默持牛狗等戒是謂非因計因名戒取也有師標曰昔有外道持牛狗戒阿難引見佛白言願佛為彼說其果報佛言恐生怖畏不可說之彼人再四求佛言汝若持牛戒如其牛法毫不犯者後得牛中若小犯者便入地獄註邪見由計斷常不計因果復計此我以為自然冥初世性世性即是二十五諦一冥初二從覺等如圖示及六諦等或計從於父母微塵梵天等生皆名邪見記不了四諦因果邪心推度謂無此理固執斷常邪見因此斷滅出世間善根乃至世間善根作闡提行是為邪見又有不知業理眾生依世間定力見人一生好行施者反生下賤貧餧彼即思惟世間定無施與愛養祠祀此即謗因復見善者墮三途惡者生人天善道隨即思惟世間定無善感好報惡感醜果即謗果也二十五諦集註無圖百論文言從冥初生覺從覺生我心從我心生五塵從五塵生五大從五大生十一根以神我為主諦覺相處中不壞不敗攝受諸法備一冥初生覺二覺生我心三我心生五唯謂四色五聲六香七味八觸次五唯生五大謂九地十水十一火十二風十三空次五大生十一根謂十四眼十五耳十六鼻十七舌十八身十九手二十足二十一口二十二大遺根二十三小遺根二十四心平等根至二十五合為神我主諦此二十五諦數論師所立名迦毗羅西天第一外道知八萬劫事以上則不知立冥諦亦名自性覺即智大我心即我慢我思受用自性時冥性則變成大等為境所縛不得解脫我若不思冥性不變即得解脫名為涅槃略錄唯識論釋六諦即六句勝論師立名衛世此亦是我所受用未解脫時受用六句離此六句計為涅槃記冥諦金七十論釋之總略為三處中為四廣為二十五言略為三者一自性二我知三變異自性是第一諦古稱冥性亦名勝性未生大等住自分名自性若生大等名勝性用尊勝故智論言外道通力至八萬劫外冥然不知謂為冥諦從此覺知初立名冥諦二我知者即第二十五諦神我也三變異者即中間二十三諦自性所作名為變異故有三位也處中為四者本性無變異一也大等亦變異二也五大五知五業及心平等共十六但變異三也知者非本變四也釋云性能生大等故名本不從他生故非變異二大我慢五唯此七亦本亦變異大從本性生故變異生我慢故為本慢生五唯即五唯塵五唯生五大五根故亦變亦本三五大五知五業及心平等一根但從他生故唯變異不能生他故不名本四知者即我知為體不從他生亦不生他故非本非變異若準百論五大生十一根則五大亦本亦變唯變異中但十一根也六諦者教乘言一陀𮪕翻主諦五大及時方神意此主為萬物所依故二求那翻依諦謂色等五塵依故三羯磨翻作諦俯仰屈伸出入去來等故名作四三摩若翻總相諦謂總相萬法如一有故五毗尸沙翻別相諦如森羅萬像各各不同故六摩波夜諦謂五塵成就不相妨礙故或計從於父母微塵者如路伽論師執地水火風極微實常能生麤色謂能生極微為父母微所生麤色為子微也或計梵天等生者如圍陀論師計從那羅延天臍中生大蓮華華上有梵天祖翁為萬物主出生一切有命無命物從梵天口生婆羅門兩臂生剎利兩脚生首陀兩䏶生毗舍也等者等諸時散外道計時生方論師計方生安茶論師計本際生即過去時之初際口力論師計虗空為因無因論師計自然生塗灰外道計自在天生宿作論師計宿世本業所作為一切因法數詳載備見取貼執劣為勝說戒取貼非因計因說身見貼我我所妄執為我說邊見貼身見上計斷常說邪見貼撥無因果說邪見最廣此依翻譯名義解備補遺曰八天子是眾生父母梵王是八天子父母韋紐是梵王父母韋紐即那羅延天註貪是己法者愛即指五見為己法也記法界言以迷心對一切順情境引取無厭是貪歷三界五行中十五貪皆貪使今的指愛五見為己法也註嗔非己法故嗔記法界言以迷心對一切違情境便起忿怒名嗔歷欲界五行中五恚即恚使今的指於非己法邊也註癡不識見中苦集記法界言迷惑不了之心名為無明若迷心緣境隨有所起念念永失不知慙愧者皆名癡也歷三界五行中十五癡即是無明今的指不識前五見苦集名癡也註慢我解他不解記法界言自恃輕他之心曰慢乃至歷三界五行中十五慢皆是慢使今的指前五見我解他不解名慢也註疑猶豫不決記法界言迷心乖理猶豫不決曰疑歷三界四行十二種疑並是疑使今以所見猶豫不決釋疑也備法苑言四諦修道名為五行以見惑中苦集滅道為四行思惑為一行邪見與疑非思故三界四行為十二貪癡慢三界見思具故三界五行為十五上界不行嗔故欲界見思為五行五恚然今的當貼見說註利鈍利則造次恒有鈍則推利方生五鈍亦名見中思亦名推利思亦名背上使利使若去鈍使亦亡故屬見攝記觸著即發造次恒有者為利少待而起推利方生者為鈍五鈍下明鈍中思亦屬見攝輔行言三種見惑一俱生見五鈍中有利如蟲獸凡夫亦能起我我所即是利從鈍背上起故屬鈍二推理見未發禪來雖世智推理辨聰見想猶弱故十使同屬於鈍三發得見從因定發見心猛盛則十使從強受名皆屬利也三種思惑一俱生與形俱生如男女托胎妄與父母生愛惡心此是邪思還歸見惑二依見思如外道依見而起嗔此利中鈍名背上使見諦斷時正利去背亦去三界繫思即三界九品思此名鈍使亦名事障號正三毒然輔行意乃明見思利鈍互相攝屬今文但明鈍中之思仍屬見攝若欲會之輔行俱生思即此見中思輔行依見思即此推利思背上使也補毗曇言利雖有鈍此鈍屬利從利使背上起利使如刀口鈍使如刀背鈍使從利使後起名背上使備蟲獸凡夫起我我所者止觀言如諸蝡動實不搉理而舉螯張鬐怒目自大底下凡夫何嘗執見行住坐臥恒起我心故五鈍非無利也餘解翻譯名義詳引二約界釋成二初通示此十使歷三界四諦下增減不同成八十八註四諦下惑增減不同前云集諦雖在惑業今歷四諦者集是能迷苦是所迷又道滅雖是出世間因果由迷苦集道滅亦迷如不識病亦迷於藥補道滅是惑之正主對既迷苦集必然道滅亦迷故亦有惑也二別明二初欲界謂欲界苦十使具足集滅各七使除身見邊見戒取道諦八使除身見邊見四諦下合為三十二二上界上二界四諦下餘皆如欲界只於每諦下除嗔使故一界各有二十八註此四諦惑俱舍頌云苦下具一切集滅各除三道除於二見上界不行嗔輔行下五九問四諦下惑依何理教增減不同耶答依阿毗曇上界不行嗔無相害故有善欲故性寂靜故心滋潤故然止而不行非能斷也故法華中蜈蚣喻嗔通三界妙樂六三十二云小乘中云上界無恚非盡理也記此料揀四諦各使有無今先引毗曇證說上界無嗔行慈無相害苦下無嗔有十善欲集下無嗔有禪定則性寂靜滅下無嗔有定而兼到佛僧邊聞法則心滋潤道下無嗔以上界均定水寂靜滋潤故然止而不行下依大乘斷嗔通三界者法華云蜈蚣蚰蜒毒蛇之類為火所燒爭走出穴文句云厭色界定出向無色如毒蛇類火燒出穴若爾嗔通三界也句記釋云色界如穴厭下如燒欣上如出穴前欲界以蜈蚣譬嗔此中例之不別分出既曰蜈蚣復是無色故譬彼嗔色界中曰毒蟲即兼蜈蚣是則上界但不起嗔之現行非無嗔之種子也備法華火燒出穴四句科中判明無色界故譬無色同欲有嗔也註問何故身邊唯在苦耶答此見依身故名身見依於身見而起邊見餘三非身故無此見又見苦斷故故在昔下四空無色有身見者雖無麤色而有細色所執未亡即是身見非想八苦其義可知記毗曇云身見邊見唯迷苦諦以凡夫皆執苦為我故身見從苦諦生依身苦報計斷計常故邊見亦迷苦生雜心論問何故身邊見苦斷耶答苦處轉故果處轉故見彼則斷不遠隨至根此見不隨根故初見諦則斷補身為眾苦之本邊見依身而起故苦處轉果處轉見彼苦諦則斷不遠隨至根本無明非想八苦見前備辨訛曰四空無色有身見等句似謂無色界無色恐無身見不知餘四蘊亦有身見不獨色蘊也私謂玉師非不知四蘊有身見而四空獨指其色者點人之所易忽也註問戒取何故唯在苦道答唯彼所起問戒取計因苦諦是果何故在苦答計多苦行望為實因故在苦下非出世道妄謂出道是故復於道處能起集滅異此故無身見無身見故亦無邊見集滅非道不生戒取又復戒取在於苦道二諦下者本是內道見苦能斷本外道者見道能斷故唯在二補戒取見苦見道斷者本是內道但知苦時不生戒取故見苦斷本外道者已生戒取必斷惑見道方斷戒取故見道斷備辨訛曰又復戒取等文此中明四諦下十使增減不同四諦乃佛所宣之法不當反引外道也私謂戒取之名多對外道而立此段本玉師餘意當以上解為正判也註此有親疎之義孤山作六十四句解云云記解見下三結成大數二界合為五十六并前三十二合為八十八使也註八十八使且據見惑婆娑中云九十八使者兼十思故也輔行五下十云以十纏為九十八記十思法界言欲界四謂貪嗔癡慢色無色各三除嗔使為十輔行引論言纏八無慚愧嫉慳并悔眠及掉舉昏沉或十加忿覆法數言悔謂所作過不能自安而成悔蓋覆謂隱藏所作過惟恐人知餘可解註論文所出不同或名三結止觀云初果所破如竭四十里水功夫甚大恐聞者生疑略斷三結文謂身見戒取疑如下圖示記論指大論或時為鈍但說斷三是也止觀準大經迦葉問如來說須陀洹斷煩惱如竭四十里水云何言斷三結一我見二非因計因三疑網佛言此三重故亦攝須陀洹人一切所斷結故輔行引論言三結生惑增上身見生六十二戒取生一切苦行疑於過去一切處生猶豫也又世尊說斷八十八使及無量苦名須陀洹則受化者生憂何能拔除八十八大樹度八十八大河等若佛說斷三結者受化者歡喜也斷結之相準十地經言非初非中後論言是斷結相此智盡漏力為初智斷為中為後答非初智斷亦非中後如燈燄非唯初中後前中後取故謂取一時則不能斷三時總取方能說斷假三時斷則無定性何者初若能斷不假中後後若能斷不假初中既假三時故知無性一一推徵三皆不斷是故經言非初非中後由三時無斷方能斷結故論云前中後取故論主總取三時方顯三時無斷經論言反意乃相成經則約性論則約相性相無礙方能斷結然經論雖明大乘斷結相亦可意會小乘也記節引雜心論曰凡計罪福是我所作不將善惡業因為我故身見不依集知集非我不名迷集邊見依身亦不依集亦不將滅道為我計斷計常亦同故身邊唯苦若戒取迷苦及道謂愚人聞說精勤苦行即謂事中苦身是道不知勤觀苦空方斷生死身苦非道故戒取迷苦諦生或不將身苦為道直執戒等福行為道此將集因轉將為道如此戒取名迷道諦理實凡愚不識集因妄執為道應是迷集但彼迷心不計福行以為集因方轉為道故不名迷集不同計苦以為道者將苦為道故名迷苦是故戒取迷苦迷道不迷於集滅是聖果眾生所求不取惑滅為道因行故戒取不名迷滅若邪見見取及疑此三通迷四諦邪見謗無因果該凡及聖故通迷見取於自身報取為第一即迷苦於事善業計為第一名迷集若取梵無想等天為涅槃名迷滅於彼戒取所言之道取為第一名迷道故通迷疑心於諸凡聖因果不知有無生疑不決故亦疑四上來所明五見及疑惟迷諦理不名迷事以迷理故還見理斷唯識心要云迷諦有總別總謂十種皆迷四諦苦集是彼六道因依處故滅道是彼怖畏處故別謂身邊唯迷苦八通迷四身邊唯果處起別修空觀及非我觀對治身邊屬苦諦故疑與身邊邪三見親迷苦理戒見二取執彼三見戒禁及所依蘊為勝能淨於自他見及彼眷屬如次隨應起貪恚慢相應無明與九同迷不共無明親迷苦理疑及邪見親迷集等二取貪等准苦應知然嗔亦能親迷滅道由怖畏故生憎嫉故迷諦親疎麤相如是與此大同小異對會可識補孤山六十四句閒居編言苦諦十使皆具足身見唯緣苦境生集諦癡業有漏因滅諦無為無漏果皆非身見所緣境邊身并及戒禁取此二隨身亦不生是故集滅除三見道諦本為無漏因是故身邊亦不起邪見既撥無聖道戒取還從邪見生執取非道為真道是故則有戒禁取四諦具足有親疎苦下疎三親有七執我我所為身見邊見從身計斷常邪見撥無因果法見取執劣以為勝禁取於非因計因疑則猶豫而不決無明迷暗不了故此等皆依苦等起是故七惑號親迷貪嗔與慢三種惑不從苦諦境上起但緣前七背上生是故三得疎迷號集七四親三種疎邪見撥無疑猶豫見取執劣癡迷暗三疎名目亦如前貪等只依四法起滅則三親四是疎疎則前三添見取苦諦是劣執為勝是故見取得為親今滅諦是勝妙法不可更言劣為勝但從邪見背上起執劣為勝名見取是故滅諦疎有四親疎行相悉如前道八三親五種疎親則癡疑與邪見疎法望前加禁取苦諦戒禁則為因有漏果非無漏道妄執為因為果故則有戒禁親緣起道諦真因真道故不可親緣非因道但緣邪見起非道故以戒取屬疎法道滅俱是無漏法非是執劣以為勝見取從前亦屬疎但從邪見起其執總依俱舍如上釋此中少四句想抄錄者刪其非要又閒居編頌言從諦生使名為親從使生使名為疎四諦俱疎貪嗔慢四諦俱親邪癡疑身邊唯局苦親使戒見苦親而道疎見取集親滅下疎迷諦親疎義如此末二句應改言集有四親滅四疎總於前三加見取更簡明又苦七親三疎者以苦諦五陰法計為身依身而起斷常等見將苦行以為實因計非想以為涅槃將世間果撥之為無而皆迷癡不了猶豫不決故七日親貪嗔慢由於身邊而起又隔一層故三曰疎集以見取非因計因邪則將世間之因撥之為無癡疑可知故四曰親三疎其義同前滅以邪見將出世果撥之為無癡迷不了狐疑不決故三曰親道以邪見則將出世因撥之為無癡疑可知故三曰親五疎由迷真道方執戒取見取為道故連貪嗔慢成五疎也二思惑三初標名示數二明思惑者有八十一品註此界繫思亦名迷事思亦名正三毒異俱生思及推利思也記界繫者由此思惑便繫三界也迷事即事障對五塵境憎愛等生迷在事也正三毒者輔行言思有四慢入癡攝為三以非背使非習氣名正俱生思還歸於見推利思是利上之鈍見諦斷時正利既去推利之鈍思亦去故此檢之俱生推利解見前推利即依見思補斷見得人空智雖有事中獨頭相應了法從緣不計性實而於三毒無邪故曰正二約界示體二初通示九地謂三界分為九地欲界合為一地四禪四定為八共為九地註九地所依處得名欲界同一散地故合為一二列地分品二初欲界欲界一地中有九品貪嗔癡慢言九品者上上上中上下中上中中中下下上下中下下二上界上八地各有九品除嗔使三結成大數故成八十一也註於九地中各有九品貪嗔癡慢但上八地無嗔耳記輔行云以智斷惑智分分明惑漸漸盡何啻有九立教判果且略為九註不言疑者見道已斷理合無疑記事障雖在正信必具註斷此惑時或直緣一真諦或於四諦中隨緣一諦記釋籤云或四諦中隨思一諦或唯思滅諦斷三界諸品不同得後三果也註故止觀中云見惑如四十里水思惑如十里水大經云初果所斷如四十里水其餘在者如毛一渧記思雖八十一品對境方生不同見緣法塵橫起故三結收集諦上來見思不同總是藏教實有集諦註此惑有為有漏之因故云實有上明見惑八十八使思惑八十一品乃見思俱開若云九十八使乃開見合思若云四住開思合見但云見思俱合義也或云三漏欲有無明或云四流見欲有無明或云上下五分妙樂七十八云上五分中色染無色染一向唯上掉舉等三掉舉慢無明雖復通下不能牽下欲界受生故云上分言下分者貪雖通上不是唯上嗔一唯下不通於上餘三遍攝一切見惑雖復通上而能牽下故名為下故俱舍云由二貪嗔不超欲由三身邊戒取復還下縱斷貪等名伏為斷至無所有貪亦斷得非非想由身見等還來欲界文記此明見思開合及見思別名漏落三界曰漏四流輔行言見流三界見也欲流欲界諸惑除見及癡有流上二界諸惑除見及癡無明流三界癡也漂流不息曰流染貪也頌曰身攝邊見戒攝取邪見元從疑惑生四鈍皆由利使生是故三結攝見盡癡起貪嗔二生慢舉二攝二成欲思無明即癡染即貪掉舉遍三俱定愛註頌曰身攝邊見戒攝取補邊從身起故非因計因為戒取於中必見有所取即見取註邪見元從疑惑生記始而猶豫不決繼即撥無因果註四鈍皆由利使生是故三結攝見盡補三結身戒疑也此頌下五分見註癡起貪嗔二生慢舉二攝二成欲思記此頌下五分欲思舉二指貪嗔攝二指癡慢註無明即癡染即貪掉舉遍三俱定愛記此頌上界五分思惑成論問掉於上界名結何故欲界不說答彼無麤煩惱故掉戲明了又壞定身有力故為結斷此上分則得解脫
