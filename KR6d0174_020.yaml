body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二明妙法方便正修二初總敘法被四機然依上四教修行時各有方便正修謂二十五方便十乘觀法若教教各明其文稍煩義意雖異名數不別故總明可以意知注然前明四教釋經方軌正為開解若依解立行必須各明方便正修故所列方便則通四教但十乘且就圓論蓋立行以圓為正也記此總敘解後自當立行也蓋謂有解無行如有目而無足有行無解如有足而無目此二者俱不能到清涼池也是以前文明教開解此下依解立行欲使解行相資猶目足之兼導也然而四教之行各有方便正修今所列之方便則四教俱通唯十乘獨就圓談蓋由所立之行當須以圓為正故也注不明四種三昧常坐常行半行半坐非行非坐及十境者陰煩病業魔禪見慢乘薩蓋録大本綱要非止觀意故不委也記此對止觀述不明四行十境所以也初一行點示四行十境名目蓋録下正述不明所以謂止觀第二則詳明之今但略其綱要而已故不委明也今略云一常坐出文殊問般若經名一行三昧乃至云身開常坐遮行住臥或可處衆獨居彌善居一靜室安一繩牀九十日為一期或七日不定結跏趺坐專念一佛云云二常行出般舟三昧經謂唯專行繞九十日為一期亦名佛立三昧三昧成時見十方佛在空中立三半行半坐出方等法華等經方等經云旋百二十匝却坐思惟不限時日法華經云其人若行若立讀誦是經是人若坐思惟是經我時乘六牙白象現其人前以三七日為一期四非坐非行實通行坐方法出請觀音等諸大乘經若行若坐乃至作務公司匆遽亦可修也南嶽呼為隨自意三昧十境不出三障四魔陰入境病患境即報障煩惱境諸見境上慢境即煩惱障業相境魔事境禪定境二乘境菩薩境即業障陰業禪乘薩即陰魔煩見慢即煩惱魔病即死魔魔即天魔也補儀注云陰者謂初心修觀必先內心故於三科揀去界入復於五陰又除前四的取識陰為所觀境如去丈就尺去尺就寸是為總無明心如伐樹得根灸病得穴千枝萬病自然消殞若不入者然後歷餘一心例餘陰入乃至九境待發方觀不發不觀煩惱者謂無始以來積集重惑今因用觀此惑過常不可控制病患者由觀陰惑激動四大識其元由或用觀用術用醫治之然後復用觀行熏修業相者有漏之業將來應報今因觀發發相雖多不出蔽度各有六相或因止生或因觀生魔事者由觀諸境惑雖未破天魔恐其出界民主皆來撓動行人并人間𢟋惕夜叉時媚等鬼管屬天魔防遏行者不許出界故大品云菩薩不説魔者名菩薩旃陀羅禪者謂根本四禪等功夫得力必有宿習現相相最難知如楞嚴止觀廣明見者由觀發見乃至百四十見等慢者既伏見已謂是深詣濫叨上聖是故須識二乘者昔發小志由慈習生菩薩者三藏通別三菩薩心由習而現如上諸境並須觀力而調伏之然此十境出止觀大意注妙玄明入體之門四教四門門門十乘若止觀十境境境十乘唯明圓行義例云若無十境乘則無體若無十法名壞驢車文以陰等十為所觀境以不思議境等為能觀觀故備此引妙玄以明十乘用廣也言入體之門者體理也謂藏教生滅為體乃至圓教無作為體等四教四門者藏通別圓各具空有雙亦雙非四門修此四門均須駕以十乘方到清涼地若止觀下明立行須圓義例下明境乘俱必須十所以也二略述行立二種二初明方便助行開二十五三初分科言二十五方便者束為五科一具五緣二訶五欲三棄五蓋四調五事五行五法注止觀四初方便名善巧善巧修行以微少善根能令無量行成解發入菩薩位文記此釋方便名也止觀云方便者衆緣和合也以能和合成因亦能和合取果輔行云以善能和合故名方便今二十五法和合調停方能成圓初住因克妙覺果方便名善巧者以方便小行能善巧回向可使小行轉成妙因故名善巧不善巧者權實不二以不二解調停事儀能使一行一切行成三軌真解一發一切發入圓教初住也大論云小善能作大果者如求佛果或是讚一偈稱一名燒一香獻一華如是小行必得作佛故知善巧名方便者由回向故以智導之力也行成解發者論初心解先行後論入位行若不成真解不發注止觀四初云圓教以假名五品觀行等位去真猶遠名遠方便六根清淨相似鄰真名近方便約內外凡位今就五品之前假名位中復論遠近二十五法為遠方便十種境界為近方便橫豎該羅十觀具足成觀行位能發真似名近方便文輔行四上初具釋記此示方便之義有遠近不同言假名者前名字中雖從知識或從經卷聞説三諦實相之理通達了知一切諸法猶未修觀雖云名字乃假名也五品位中雖圓修三觀圓伏五住亦未斷惑尚隔十信故云去真遙遠也六根鄰真者即十信也以初信斷見二至七斷思八十斷內外塵沙諸粗垢先落而云清淨以圓伏無明相似見中道理望于初住只間一心故云鄰真也輔行云今文二十五法於圓教遠近方便之前更論方便者以為五品作方便耳於六即中是名字即故云假名是知今意並在四教內外凡前通為四教遠方便也十種者即十境也若觀若發入品非遙名之為近二十五法去真遠故是名為遠問陰是正修餘九待發云何以此而名方便答今論十境咸方便者俱是所觀故也若能觀之方屬正修是故前八但在凡夫後之二名方為聖人方便故知十境並是圓行近方便也若前三教差降不同別於菩薩境但觀二教通但觀一三藏全無但觀九境通二乘觀八境半藏二乘觀八境全通論雖爾今意在圓橫豎下明觀境功能十境橫豎該羅等者如止觀第五初十雙互發今具記之止觀云互發有十謂次第不次第雜不雜具不具作意不作意成不成益不益久不久難不難更不更三障四魔九雙七隻輔行云前九相對故云九雙後一不對故云七隻也又橫具橫不具豎具豎不具例如發四禪至非想是豎具至不用處是豎不具發通明背捨等是橫具止發七背捨是橫不具又初禪九品是豎具八品來是豎不具又一品五支足是橫具四支已來是橫不具其餘例此可知輔行云由境發故觀發縱橫復名橫豎又此十法有通有別別者不思議境窮實相底名豎包十法界名橫發心上求名豎下化衆生名橫又上求下化名竪依境發誓名橫安心徹理名豎六十四番名橫破遍惑窮名豎諸門相望名橫通至寶所名豎檢校塞著名橫道品至後名豎品品相望名橫正助至後名豎法法相望名橫次位至極名豎位位遍攝名橫安忍進後名豎違順相望名橫無著入住為豎離似三法為橫此且單約圓乘為解若望偏乘名橫名豎顯非橫豎若不思議非橫非豎能作橫豎而云橫豎又總論者在一一位十自相望為橫一一至極當法漸深為豎亦可前之七法名橫識位次去為豎也注又二十五法為通方便通四三昧故方等夢王法華六時五悔為別方便四三昧中別於一種三昧所用故記此明通別方便也初二句明通方便以四三昧通於二十五法為方便故次行半判別方便以四三昧中半行半坐一種別用方等夢王法華五悔為方便故也所言夢王者輔行云方等至尊不可聊爾若欲修習神明為證先求夢王若得見一是許懺悔等法華別約六時五悔解見前九注束為五科者止觀四初云夫道不孤運宏之在人人宏勝法假緣進道所以須具五緣緣力既具當割諸嗜欲嗜欲外屏當內淨其心其心若寂當調試五事五事調已行於五法必至所在乃至三科出大論一種出禪經具五緣一是諸禪師立文調五事記此引止觀發明五科生起之文初四行正明生起首二句明道在人宏所謂人能宏道非道宏人也次二句明雖賴人宏必假緣助所以下點示五科聯絡乃至下顯有所祖也言必至所在者輔行以初住為所在從初住去非今文意故下文云入住功德今所不論三科出大論者論云云何方便得禪度謂却五事除五法行五行文廣不記一種出禪經即下頁四緣雖具足云云者是一是諸禪師立者未詳輔行云雖是人立行之最要故今用之注止觀云譬如陶師若欲得器先擇良處具緣息餘際務訶欲治身內疾棄蓋調於泥輪調五事作而不廢行五法得此譬意五如指掌若欲造修當尋止觀云云記此引止觀別列五科舉譬發明也初七句正引文舉譬輔行云陶者今濮州南陶丘城堯曾居之故云堯城是故言堯為陶唐氏陶即瓦宇也以之命名故謂陶師若從所造為名應作陶瓦器也次二句明得譬知法論語云其如視諸斯乎指其掌指掌言甚明也末二句指廣文今具記之止觀云譬如陶師若欲得器先擇良處無砂無鹹草水豐便可立作所次息緣務務際不靜安得成功際接也言交接世務也雖息外緣身內有疾云何執作身雖康壯泥輪不調不成器物上緣雖整不專於業廢不相續永無辦理止觀五緣亦復如是有待之身必假資藉如彼好處訶厭塵欲棄絶五蓋如治內疾調適五事如調泥輪行於五法如作不廢世間淺事非緣不合何況出世大事若無弄引何易可階故歷二十五法約事為觀調粗入細檢散令靜故為遠方便也二牒釋五初具五緣二初正牒初明五緣者注禪經云四緣雖具足開導由良師故用五法為入道梯一缺則妨事文記止觀一種出禪經者正指此文注輔行四上二云大小兩乘以戒為本是故先明內禁雖嚴必資衣食進修定慧須藉空間處雖空間假絶緣務四緣雖具開導由師文記此轉明禪經五緣次第也大論云持戒清淨斷結使得阿羅漢道大心持戒憐念衆生是為菩薩故大小皆以持戒為本當先明也餘可解注止觀大意四云一衣食具足離希望緣故二持戒清淨離惡道因故三間居靜處離憒閙事故四息諸緣務棄猥雜業故五須善知識有咨疑地故文記此明行道以五緣為要務必不可少也意謂衣食乃助道資糧資益色身故須具足所謂法輪未轉食輪先運也淨戒乃趨極果之正因結道場之妙業故當先持之清淨以離惡道也靜處乃用功入道之地所謂探珠宜浪靜急水取應難也息緣乃攝心要法所謂制之一處無事不辦也善知識乃得道全因緣所謂嬰孩須傍母弱羽必纏枝也二別釋五初持戒清淨一持戒清淨如經中説依因此戒得生諸禪定及滅苦智慧是故比丘應持淨戒有在家出家大小乘不同注法界次第上十二云戒以防止為義文戒疏上初云梵語尸羅大論云秦言性善亦云清涼以其能止破戒熱惱從能得名亦名波羅提木叉譯言保解脫又名淨命亦言成就威儀文記防非止惡曰防止大論乃什師所譯故曰秦言性善者性本自善無所染污戒體然也清涼者破戒人欲火炎燒戒能防止也保解脫者謂能保持三業離諸繫縛也淨命者清淨自活永離邪命也成就威儀者威嚴可畏儀軌可則也注如經中説者遺教經也輔行四上五云引證道定復以律儀而為根本文記遺教經云汝等比丘於我滅後應當尊重珍敬波羅提木叉如暗遇明如貧得寶當知此則是汝大師若我住世無以異也乃至云戒是正順解脫之本依因此戒得生諸禪定及滅苦智慧是故比丘當持淨戒弗令毀缺輔行下釋證意注在家戒者五戒八戒於五更加不坐高廣牀不著華鬘衣不往觀聽歌舞故名八戒記五戒者殺盜淫妄酒也四分律明有四種不同一但受三歸名無分優婆塞二受一戒名少分三受二三四名多分四具受名滿分優婆塞如五戒全缺則人間路絶以此五戒是大小乘尸羅根本故經云五戒者天下大禁忌若犯五戒在天違五星在地違五嶽在方違五帝在人違五常在身違五臟故佛成道未轉法輪先為提胃長者授五戒法名為人乘居五乘之首由茲五戒運出三途也又五戒者四性一遮俱舍云遮中唯離酒為護餘律儀若論制已有犯性上加一制罪八戒者六齋日受也論問何以六齋日受八戒修福德答是日惡鬼逐人欲奪人命疾病凶衰令人不吉是故劫初聖人教人持齋修善作福以避凶衰有言昔時所行齋法不受八戒直以一日不食為齋至佛出世告言汝當一日一夜如諸佛持八戒過中不食以是功德能至涅槃如四天王經中佛説月六齋日使者太子及四天王自下觀察衆生若布施持戒孝順父母少者上啓天帝帝釋諸天悉皆不悅歎言諸天衆減少阿修羅熾盛多者心皆歡喜讚言增益諸天衆減損阿修羅復次此六齋日所在丘聚有持齋受戒者惡鬼遠去住處安隱是故以此六日持齋受戒福德增多不坐高廣大牀者準四分迦留陀夷預知佛來即於道中敷高好牀座佛知內懷弊惡告諸比丘此癡人但自為己乃訶責結戒若作繩牀木牀足應高如來八指過此則犯阿含云下足長尺六非高闊四尺非廣長八尺非大越此量者名高廣大牀則違佛制矣不著華鬘衣者著布帛服宜矣注出家戒者比丘比丘尼沙彌沙彌尼式叉摩那此云學戒女記比丘戒相有二百五十比丘尼通稱女為尼大論云尼得無量律儀故應次比丘佛以儀法不便故在沙門後尼衆篇云佛初不度女人出家為滅正法五百年後為説八敬聽出家依教行故還得千年今時不行隨處法滅會正記云佛成道後十四年姨母求出家佛不許度阿難為陳三請佛令阿難傳八敬向説若能行者聽汝出家彼云頂戴受持八敬者頌云禮不罵謗不舉過從僧受戒行摩那半月僧中求教授安居近僧請自恣尼之戒相略有五百條也沙彌此云息慈謂息世染之情以慈濟衆生也意言初入佛法多存俗情故須息惡行慈也唐譯寶利摩那路迦此翻勤䇿有男女之別自七歲至年十三皆名驅烏沙彌十四至十九名應法沙彌二十已上方稱名字沙彌也其所戒相有十尼衆亦然式叉摩那此云學法女四分謂十八童女應二歲學戒又云少年曾嫁年十歲者與六法十誦云六法練心也能持六法方與受具二年者練身也可知有胎無胎事鈔云式叉尼具學三法一學根本謂四重是也二學六法即羯磨所謂染心相觸盜人四錢斷畜生命小妄語非時食飲酒是也三學行法謂一切大尼戒行並須學之若學法中犯者更與二年羯磨僧祇云在大尼下沙彌尼上坐六法頌云染心相觸盜四錢斷畜生命小妄語戒非時食及飲酒是名式叉學六法大論問沙彌十戒便受具戒比丘尼法中何以有式叉摩那然後得受具戒答佛世有長者婦不覺妊出家受具戒其後身大轉現諸長者譏嫌比丘白佛因此制有二年學戒受六法然後受具足戒問若為譏嫌式叉摩那豈得不嫌答式叉摩那未受具足戒譬如小兒亦如給使雖有罪穢人不嫌也而有二種一十八童女受六法二大家十歲得受六法若受具戒應二部僧中用五衣鉢盂比丘尼為和尚及教師比丘為戒師餘如受戒法略説五百戒廣説八萬戒第三羯磨訖即得無量律儀成就比丘衆或略説三百四十八戒如今時流通是也注小乘沙彌十戒比丘二百五十戒頌云四重十三二不定三十九十四提尼一百衆學七滅諍總論二百五十戒夷殘提尼吉補佛制出家者五夏已前專精戒律五夏已後方乃聽教參禪是故沙彌剃落先受十戒次則登壇受具此十戒佛敕舍利弗為羅睺羅説也注若論五篇者夷四波羅夷淫殺盜妄殘十三僧殘提三十尼薩耆九十波逸提共百二十尼四提舍尼吉突吉羅即一百衆學若論六聚更加偷蘭遮記五篇出僧祇六聚出四分梵語波羅夷此翻棄小乘云不可懺大乘云他勝處僧伽婆尸沙翻衆殘如斷人頭氣喉在故波逸提翻墮因畜財犯捨墮未懺故波羅提提舍尼翻可呵突吉羅翻惡作又云惡説然此五篇之罪或配五刑五行謂夷配死配土殘配流配水提配徒配金尼配杖配火吉配笞配木也名義云一波羅夷義當極惡以三意釋之一者退沒由犯此戒道果無分故二者不共住非但失道亦不得説戒羯磨二種僧中共住故三者墮落捨此身已墮阿鼻地獄故若犯此罪如他化自在天壽十六千歲墮泥犁中二僧殘善見云僧初者謂僧前與覆藏羯磨也殘者謂末後與出罪羯磨也若犯此罪僧作法除故從境為名又僧殘者如為他所斫殘咽喉故理須早救其罪如化樂天壽八千歲墮獄中三偷蘭遮此云大障善見云大障善道後墮惡道體是鄙穢從不善體以立名由能成前兩篇之罪也明了論翻為粗過粗有二種一是重罪方便二是能斷善根其罪如兜率天壽四千歲墮獄中四波逸提義翻為墮十誦云其罪如夜摩天壽二千歲墮獄中尼薩耆翻捨墮此罪因財事生犯貪慢心強制捨入僧名尼薩耆也五波羅提提舍尼義翻向彼悔從對治境立名此罪應發露也其罪如忉利天壽一千歲墮獄中六突吉羅翻惡作四分云式叉迦羅尼義翻應當學此罪微細持之極難故以隨學隨守立名也餘戒易持罪重此戒難持易犯常須念學其罪如四天王壽五百歲墮獄中注若云七聚開吉羅為惡作惡説結罪齊五報劫齊六因果雜攝齊七蘭有三品不入正篇不定七滅諍篇聚不攝亦屬吉羅報劫齊六者以六聚受報劫數與等活等上六獄劫數相齊因果雜攝齊七者以惡作惡説是吉聚之因并前五聚之果故為七聚如翻譯名義記名義云開吉羅一部而為二聚者以身名惡作口名惡説故也小注判釋三種篇聚初三句正判齊蘭有三下釋判齊五謂偷蘭遮上中下三品者謂盜四錢破轉法輪主為上盜三錢破伴為中盜一錢裸形石鉢著外衣為下然但是成上初二篇罪之法是故不入正篇也二不定者初三法不定次二法不定律云若比丘共女人獨在屏覆處障處可作淫處坐説非法語有住信優婆夷於三法中一一法説若波羅夷若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於三法中應一一治如住信優婆夷所説應如法治是比丘是名三法不定若比丘共女人在露現處不可作淫處坐説粗惡語有住信優婆夷於二法中一一法説若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於二法中應一一治如住信優婆夷所説應如是治是比丘是名二不定法也七滅諍者律云若比丘有諍事起即應除滅應與現前毗尼當與現前毗尼應與憶念毗尼當與憶念毗尼應與不癡毗尼當與不癡毗尼應與自言治當與自言治應與多人覔罪相當與多人覔罪相應與如草覆地當與如草覆地是七能滅諍事故得此名也蓋諍不出四種一言諍比丘共比丘言諍引十八諍事謂法非法乃至説不説若以如是相共諍言語遂彼此共鬬二覔諍比丘與比丘舉罪以三舉事謂破戒破見破威儀見問疑作如是相覔罪三犯諍謂犯七種罪一波羅夷二僧殘三墮四悔過五偷蘭遮六突吉羅七惡説四事諍前三中事作是中言諍以二毗尼滅謂現前多人語或但一毗尼滅謂現前覔諍共四毗尼滅謂現前憶念或現前不癡或現前罪處所犯諍共三毗尼滅謂現前自言治或現前覆草地事諍以一切毗尼滅隨所犯是則篇聚所不攝者以偷蘭遮滅諍不定皆在篇聚之外故於篇聚所不攝也然亦屬於吉羅故云結罪齊五劫罪齊六雜釋齊七見上注大乘即梵網十重四十八輕凡有心者皆得受之更有大論十戒大經十戒及五支戒通大小乘具如妙玄三末釋籤四二十四止觀四三輔行四上六記梵網十重四十八輕數如彼經犯重者得波羅夷罪犯輕者得輕垢罪總名五十八篇大戒也凡有心者皆得受之者謂與人受戒時不得揀擇一切王王子大臣百官四衆乃至淫男女梵天欲天無根二根黃門奴婢一切鬼神盡得受也大論十戒者文云從初發意已來應念聖戒無缺戒乃至隨定戒大經十戒者清淨乃至具足成就波羅密戒五支戒者文云菩薩捨欲持性重戒息世譏嫌等無差別不為愛見羅剎毀戒浮囊因此受持具足根本業清淨戒前後眷屬餘清淨戒非諸惡覺覺清淨戒護持正念念清淨戒回向具足無上道戒此即五支戒也又云根本戒者十善性戒衆戒根本為無漏心持故言清淨前後眷屬者偷蘭等是前眷屬僧殘等是後眷屬此二支屬律儀作法受得之戒也後三支非作法是得法時乃發斯戒也非諸惡覺覺清淨戒者即定共也尸羅不清淨三昧不現前以戒淨故事障除發得未來性障除發得根本滅惡覺觀名定共戒欲戒定中身首牀座為事障欲界煩惱為性障乃至初禪覺為二禪事障二禪喜為三禪事障也護持正念即四念處觀理正念雖未發真由四加行相似之正念能發初果無漏真道成道共戒名正念也復次定共戒依定心發屬止善義道共戒依分別心發屬行善義動不動俱是毗尼何者戒論防止得定共心不得起惡得道共發真永無過罪故俱是成也回向具足者即菩薩於諸戒中具四宏六度發願要心回向菩提故名大乘戒也六度者厭患在家逼迫欣樂出家捨於所愛是檀纖毫不犯拒逆羅剎是尸檢節身心安忍打罵是生忍耐八風寒熱違順貪恚等名法忍愛見不能損是羼提守護於戒犯心不起是精進決定持戒不為狐疑所誑專心不動名禪明識因果知戒是正順解脫之本出生一切三乘聖果非六十二見雞狗等戒名般若也略釋初緣竟二衣食具足二初合標二衣食具足注止觀四十五云衣以蔽形遮醜陋食以支命填飢瘡身安則道隆道隆則本立形命及道賴此衣食此雖小緣能辦大事裸餒不安道法焉在故須衣食具足也記輔行云為道支蔽必先形命形命若立道本即存故云及也乃至然此衣食本為色身報命之緣故曰小緣託此復能修行辦道故云大事也二分釋二初釋衣衣有三一者如雪山大士隨所得衣蔽形即足不遊人間堪忍力成故二者如迦葉等集糞掃衣及但三衣不畜餘長三者多寒國土如來亦許三衣之外畜百一衆具注雪山大士絶形深澗不涉人間結草為席被鹿皮衣無受持説淨等事堪忍力成不須溫厚不遊人間無煩支助此上人也十二頭陀但畜三衣不多不少出聚入山被服齊整故立三衣此中士也多寒國土聽百一助身要當説淨趣足供事無得多求多求辛苦守護又苦妨亂自行復擾檀越少有所得即便知足下士也文補此釋衣有三類之殊言無受持説諍等事者輔行云大經言釋迦先世居雪山唯食諸果如是乃可忘于説淨受持等事此佛自敘本生事因堪忍力成時世無佛法故無受持説淨等事然説淨之法先請施主辭云大德一心念我比丘某甲今請大德為衣藥鉢展轉淨施主願大德為我作衣藥鉢展轉淨施主慈愍故三説已後所得衣物皆指此人名而向餘人説淨又説淨者詞云大德一心念此是我某甲長衣未作淨今為淨故施與大德為展轉淨故彼受者言長老一心念汝有長衣未作淨為淨故施與我我今受之受已言汝施與誰彼當言施與某甲受淨者言長老一心念汝有是長衣未作淨為淨故與我我已受之汝與某甲是衣某甲已有汝為某甲故善護持著用隨因緣施與某甲即指所請施主之名不論在界內界外皆得指名而説又心念説淨法為獨住比丘開內含二法先明説淨法次明捨受法五分云應偏袒右肩胡跪手捉衣心生口言我某甲比丘此長衣淨施與某甲於五衆中隨意施與隨彼取用得至十一日復如前威儀言我某甲此長衣從某甲取還得至十日復如前言我某甲此長衣淨施與某甲隨彼取用如是捨故取新十日一易注輔行四上十九云十二頭陀等者此云抖擻一蘭若二常乞食三糞掃衣四一坐食五節量食六中後不飲漿七冢間八樹下坐九露坐十常坐十一次第乞十二三衣今文以十二頭陀中糞掃三衣合為中士言三衣者但三衣也出聚落則著僧伽黎加二衣上入大衆則著鬱多羅僧加五條上入山林則唯著安陀會為慚愧故為多寒故許其重著皆威儀整肅長物善根故云被服齊整記頭陀新譯杜多此翻抖擻亦翻修治又云淘汰垂裕記云抖擻煩惱故也善住意天子經云頭陀者抖擻貪欲嗔恚愚癡三界內外六入若不取不捨不修不著我説彼人名為杜多今訛稱為頭陀也然律論不同律有隨坐不作餘食及一摶食大論稱節量中後不飲及次第乞又律云納衣論云糞掃律但云乞食論云常乞食此二名異意同餘十俱同諸部阿含及十住論亦有不同之相大體無殊今依大論略出相狀一蘭若翻寂靜處在家多惱故捨眷屬而師徒同學還有結著復相惱亂故住蘭若令身遠離最近三里能遠彌善身遠離已亦當心離五欲五蓋二常乞食者乞食自活多所成就詳下分衛節明乞食有十利故三糞掃衣者若四方馳求或著邪命若受他施於好於惡而生憂喜或憂賊盜等故糞掃衣無此慮故四一坐食者謂比丘修道應作是念我求一食尚有所妨況早食中食後食廢半日之功不得一心行道五節量食者飽噉腹脹氣塞妨道故應節食如舍利弗食五六口足之以水六中後不飲漿者謂比丘修道於種種漿日若過中悉不得飲若心生樂著求種種漿不能一心修習善法猶養馬著勒其意則息七冢間者易悟無常易得道果故以無常苦空之觀是佛法之初門能令厭離三界故也八樹下坐者以得道事辦捨至樹下謂比丘于冢間不得道者當至樹下如佛轉法輪入涅槃皆在樹下臭爛狼藉火燒鳥則無常不淨之觀易得成就九露坐者或謂樹下猶如半舍蔭覆涼樂尚生著故又樹下坐有二過一慮天雨冷溼二有鳥糞毒蟲於是思惟露地而坐隨意快樂月光遍照令心明利易入空定故云露坐也十常坐者著衣脫衣隨意快樂四儀之中坐為第一食易消化氣息調和求道大事大辦功力若懈怠睡眠諸賊常伺人便不宜安臥若行若立心亦難攝故宜常坐脅不著席十一次第乞者不著於味不輕衆生等心憐憫不擇貧富十二三衣者謂比丘少欲知足衣取蔽形不多不少白衣之人以多求故是故多畜外道苦行是故裸形不多不少故畜三衣南山律鈔位分為四衣有二一納衣二但三衣食有四一乞食二不作餘食法三一坐四一揣揣雜也一種而雜者不以種種盛貯名一揣食處有五一蘭若二冢間三樹下四露坐五隨坐威儀一常坐此無次第乞食處加隨坐通源記引南山云季世佛法崇尚官榮僥幸之夫妄生朋翼庶因此語自省厥躬至若謂利養如毛繩視朱門為蓬戶尚思曳尾猶彼興嘲況乎以咳啞為恩睞成飾潛通惠好強事趣馳縱假龐于一時終受嗤于羣口榮不補辱夫何誤哉是知末世頭陀不缺能使佛法常住不滅也今文下明今止觀合糞掃三衣為中士也注下根者此土多寒根性又薄大聖一許三品通開故三衣外聽畜百一及許畜長但三衣為上畜百一為中畜長為下故云通開此依律説與今少異今取雪山為上品故記此釋三衣外畜百一衆具為下大注明依國土根性俱有不同是故通開三品小注明依律而釋三品所以末二句明經三品如下自明注若畜百一記憶而已有云加法薩婆多云百一之物各得畜一百一之外皆是長物言記憶者於百一物心中但自記憶一種謂是我物有云加法者加法受持如六物圖記記謂記識憶謂憶念言此是尼師壇此是覆瘡衣此是雨浴衣等言百一記憶而又曰加法者如輔行云以加法説淨之二品合論而名百一也原注初一行明畜百一薩婆多毗尼中云若説淨之錢寶貿一切衣財作三衣鉢器入百一物數不須説淨又云凡百物中三衣具鉢必應受持自外若受則可不受無過六物圖詳下注若畜長説淨則加法受持百一之外若畜長物定須説淨詞云大德一心念此是某甲長衣未作淨為淨故施為大德記薩婆多毗尼云自百一物外一切説淨又云凡受衣法若長應説淨若不説淨入長財中又云如畜寶戒中説應僧中作波逸提悔過若錢及似寶除百一物數一切亦應捨可見畜長定須説淨也次云説淨詞輔行云説淨之法附近大乘故地持中菩薩所畜即於十方諸佛菩薩而為淨施乃以聲聞淨施而為譬云譬如比丘以己衣物於和尚阿闍黎捨作淨施若達一實即此淨施成菩薩法有人云凡諸所有非己物想有益使用説淨何為今問等非己財何不任於四海有益便用何不直付兩田而閉之深房封於藏篋實懷他想用必招愆忽謂己財仍為説淨説淨而施於理何妨順己執心後生倣效故説淨法不可無也毗婆沙四初結長衣戒因緣中問此淨施者是實施是假施答一切淨施九十六種無淨施法佛大慈悲方便力故教令淨施是方便施非真施也令諸弟子得畜長財而不犯戒又問佛何不直令弟子得畜長財而強與結戒設此方便答佛法以少欲為本是故結戒不畜長財而衆生根性不同或有衆生多畜積而後行道得證聖果是故如來先為結戒而後方便於佛法無礙衆生得益也注糞掃衣者南山云世人所棄無復堪用義同糞掃體是賤物離自貪著不為王賊所貪常得資身長道文記四分云糞掃者非死人衣也薩婆多律明出處有五別一途中二河邊三空處四糞聚處五破碎此之衣體由事差別及出處不同總有七種一毛衣二芻摩衣三奢迦衣四揭播死迦衣五獨孤洛迦衣六高詀薄迦衣七阿鉢蘭得迦衣復有五一牛嚼二鼠齧三蟻穿四火燒五乳母棄物當知衣此糞掃者內離己貪外息他貪常得資持幻身長養聖道也注三衣者一僧伽黎此云雜碎衣條相多故從用則名入王宮聚落衣二鬱多羅僧名中價衣從用名入衆衣三安陀會名下衣從用名院內行道雜作衣若云袈娑此云不正色染亦名壞色即戒本中三種染壞皆如法也一者青色二者黑色三者木蘭色如六物圖記僧伽黎此翻合又云重謂割截合成也義淨云僧迦胝翻重復衣靈感傳云每轉法輪披僧伽黎南山云此三衣名諸部無正翻今此注者乃依義所翻而引用謂大衣名雜碎以條數多故若從用為名則云入王宮聚落時衣乞食説法時著薩婆多論大衣分三品謂九條十一條十三條二長一短名下三品十五十七十九條三長一短名中三品二十一二十三二十五條四長一短名上三品雖分九品不以條多為貴但約衣財大小以分條隔少多多羅僧此譯上著衣即七條也南山謂中價衣者以界於二衣之間其價亦處中也從用則曰入衆衣者凡禮懺誦經坐禪赴齋聽講時著安陀會此云中宿衣謂近身住也南山謂下衣者謂三衣之中條數此為最下也從用名雜作衣者凡寺中執勞服役一切時中俱可披著也袈娑具云迦羅沙曳翻不正色染亦云壞色乃從色得名會正云袈娑是草名可染衣故今指衣名袈娑者目此為號也真諦雜記云袈娑是外國三衣之名名含多義或名離塵服由斷六塵故或名消瘦服由割煩惱故或名蓮華服服者離染著故或名間色服以三如法色所成故業疏以刀截成沙門衣不為怨賊所剝故章服儀云條堤之相事等田疇之畦貯水而養嘉苗譬服此衣生功德也佛令像此義不徒然青黑木蘭三種色者青謂銅青黑謂雜泥木蘭即樺樹皮律云苾芻得新衣當作三種染壞色若青若泥若木隨一而造若不作三壞色而受用者犯波逸底迦可見染壞色而成衣者方名如法也六物圖者一僧伽黎二多羅僧三安陀會四濾水囊五鉢多羅翻應器六尼師壇翻坐具出三藏法數注若據律文以糞掃衣及但三衣為上百一為中餘長為下今文以雪山大士被鹿皮衣為上故以糞掃衣但三衣為中畜百一及畜餘長為下記此明律文與今文不同然均無礙也注上云不畜餘長應更云不畜百一下畜百一衆具亦應更云畜餘長也記此補中下二衣之文義可知二釋食食亦有三一者上根大士深山絶世菜根草果隨得資身二常乞食三檀越送食僧中淨食注止觀四十六云一深山絶迹去遠人民但資甘果美水一菜一果而已或餌松柏以續精氣如雪山甘香藕等如是食者上士也二阿蘭若處頭陀抖擻分衛自資七佛皆明乞食法方等般舟法華皆云乞食也路徑若遠分衛勞妨若近人物相喧不遠不近乞食便易是中士也三既不能絶穀餌果又不能頭陀乞食外護檀越送食供養亦可得受又僧中如法潔淨食亦可得受下士也文記水果松柏食已坐禪更無餘事上士也阿蘭若乃寂靜處絶放牧聲是修道處故須居之以行頭陀肇師云忿競生乎衆聚無諍出乎空間故佛讚之輔行云十二頭陀中五種食法今且舉其一也若墾植耕種舂礱碓磑磑磨也畜八不淨事涉四邪污染檀越非蘭若行近代所置彌隔聖言男女往來兼招譏醜倘依佛教利益不輕也般舟經云常行乞食不受請法華云入里乞食然蘭若不宜太遠大近遠則勞妨譬喻經云昔波羅奈去城五十里有山有五比丘居平旦入城乞食中後還山日暮乃至疲極不堪安禪歷年如此勞而無獲佛化道人往安慰之是比丘云四大之身常受飢餒若欲乞食去城道遠有何樂耶止念畢命而已化沙門言願諸道人明日莫往吾當送供一日之糧明佛送食五人食已俱得羅漢是則住處亦為道緣也若近則語閙聲喧亦難入禪必使遠近適中乞食便易乃中士也若受檀越送供聽鉗鎚受食者下士也補潔淨食潔應結羯磨中引佛言聽在伽藍內邊房靜處結淨厨備衣食既為道緣飢寒逼膚奈何答真心行道必感三寶天龍加被護持但慚愧精勤懺悔宿報而已道人一鉢依於十方遇有緣處但不違礙大乘戒者方便依行以速成道果若宿業所遭了知心具實相現前守觀待命可也或一心淨土報盡往生亦可也注輔行四下初云分衛者此云乞食十住婆沙云乞食有十利云云僧中淨食仍為下根豈可安坐房中私營別味文記分衛云乞食者僧祇云乞食分施僧尼衛護令修道業故云分衛云云者未盡之貌云之謂言也謂象雲氣在天回轉之形言之在口如雲潤物十利者一自用活命自屬不屬他二施我者令住三寶然後當食三常生悲心四隨順佛教五易滿易養六破憍慢法七無見頂善根八見我乞食餘皆效我九不與男女大小有諸事故十次第乞生平等心是為十利末一行取下士食義以誡背衆而食也三間居靜處三間居靜處不作衆事名間無憒閙處名靜處有三例衣食可知注止觀四十七云若深山遠谷途路艱險永絶人蹤誰相惱亂恣意禪觀是處最勝二頭陀抖擻極近三里交往亦疏覺䇿煩惱是處為次三蘭若伽藍間靜之寺獨處一房不干事物正諦思惟是處為下文記安身入道必須選擇慎勿率爾若得好處不須數移當知此之蘭若與前十二頭陀中蘭若有別以前蘭若是中處乃空逈地也此之蘭若是下處空逈住處也十住毗婆沙明蘭若有十利一自在去來二無我所三隨喜無障四心樂蘭若處五少欲少事六不惜身命具足功德七離衆閙語八雖行功德不求恩報九易得一心十易生無障礙想然蘭若伽藍簡異白衣齋邑間靜寺院簡異陋巷閙市獨處一房簡異同學伴侶不干事物簡異散涉世法正諦思惟簡異邪慮妄想也四息諸緣務四息諸緣務息生活息人事息工巧技術等注止觀四十八云緣務妨禪由來甚矣蘭若比丘去喧親靜云何營造緣務壞蘭若行非所應也緣務有四一生活二人事三技能四學問一生活緣務者經紀生方觸途紛紏得一失一喪道亂心二人事者慶弔俯仰低昂造聘此往彼來來往不絶三技能者醫方卜筮泥木彩畫棋書呪術等是也四學問者讀誦經論問答勝負等是也領持記憶心勞志倦言論往復水濁珠昏何暇更得修止觀耶此事尚捨況前三務文今云等者等於學問也記前三種務理宜止息而學問亦當息者何所以耶答熏修止觀本於一心讀誦妨靜心何能一故亦當息也難處搜根為險問釋處擊節為巧答義立為勝言墮為負若論博學審問明辨雖能相資見識其實難免勝負之咎以勝負故因法致愆纍世怨讎常相中害故勝負是非一向須廢也領持等者若習學問必須領持文字記憶旨趣未免心勞志倦又復問答必當建言立論豈免水濁珠昏應知心性如水真理如珠緣務如攪慮心如濁迷理如昏既慮動理昏何暇精修止觀耶由是亦息者宜矣又此外學小乘教中十二時許一時習學以伏外道若大乘初心菩薩一向不許且令進行至六根淨位學應不難是則學正經正論領持記憶而于助道有益時尚棄捨況前三耶五近善知識五近善知識有三一外護善知識二同行善知識三教授善知識注止觀四十九云夫外護者不揀黑白但能營理所須如母養兒如虎銜子調和得所舊行道人乃能為耳是名外護二同行者更相䇿發不眠不散日有其新切磋琢磨同心齊志如乘一船互相敬重如視世尊是名同行三教授者內外方便通塞妨障皆能決了善巧説法示教利喜轉破人心於諸方便自能決了可得獨行妨難未諳不宜捨也文記此釋三種善知識初二行半釋外護輔行云外護者自己身心為內望他身心為外為外所護故名外護道俗咸可為得故云不揀黑白如母如虎者母雖慈養子必策虎雖猛銜子必寬將護行人當勿舉勿惱可也舊行道人等者若未親行暗於可否一向混俗不了開遮又何但專命外護護己亦應善須將護如阿含云佛在祇園告諸比丘應當恭敬檀越施主如敬順父母養之待之施之能成戒定智慧多所饒益能施四事故諸比丘慈心於檀越小恩尚不忘何況於大者應三業精勤使福不唐捐如迷者指示乏者與糧所謂將護外護也同行者智與智共方有日新之功如膏則切象則磋玉則琢石則磨皆治器之法今謂互相切磋使成法器同心等者謂能同志相敬則道法互增大論言菩薩共住相視當如世尊何以故是我真伴如共乘船彼學我學故也教授者輔行云夫為導者必具目足若解行不均安能利他乃至行解具足德在於彼謂益我者但在於解內外方便者謂道前方便復有內外十境為內方便二十五法為外方便又二十五中而分內外具緣一向在外呵欲棄蓋義兼內外調五事亦內亦外眠食在外餘三屬內行五法一向在內通塞等者方便得所為通方便背行為塞説法轉心此取解也又云十境互發十乘增減一一法中皆為通塞若能善此通塞妨障復善説法導達人心方可名為教授知識示教利喜者指授為示教詔為教令彼得益為利見他得利故喜轉破人心者法輪既轉則能破彼無始妄想之心也而行者得是解行具足教授已當自揣摩若能自己方便可得獨行或妨難未諳義當親近不宜捨也注教授者輔行四下六云宣傳聖言名之為教訓誨於我名之為授文通名善知識者法華疏云聞名為知見形為識是人益我菩提之道名善知識文記付法藏云習近聖法得至涅槃由善知識阿難白佛善知識者是得道半因緣佛言不也善知識者是得道全因緣阿難當知此閻浮提除大迦葉舍利弗其餘衆生若不遇我無解脫期是故我言善知識者能大利益增一云莫與惡知識與愚共從事當與善知識智者而交通若人本無惡親近於惡人後必成惡人惡名遍天下善知識反此是故須親近大論有二因緣得無上道一者內自思惟二者得善知識大經阿闍世王來至佛所佛告大衆菩提近因莫過善友闍王不遇耆婆當墮地獄是故須近真善知識也略明具五緣竟
