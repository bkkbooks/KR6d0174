body:
  text: 高麗沙門諦觀錄南天竺沙門𫎇潤集註清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦閑編科參梓三菩薩二初標人次明菩薩位者註菩薩具云菩提薩埵摩訶薩埵舊翻大道心眾生亦大道成眾生新譯云覺有情以上求佛道下化眾生故此菩薩於當教內亦稱大乘記此釋菩薩華梵名義也初示具足梵語次兩句出舊譯華言舊翻大道心眾生者如四教義云菩提名道薩埵名心摩訶言大是為大道心也此似約自行翻名也大道成眾生者如智論云菩提翻佛道薩埵翻成眾生摩訶翻大謂此人用諸佛之大道以成就眾生也此似約化他翻名也舊譯者指秦晉而言諸經多言菩薩摩訶薩者什師以天竺語繁兩句八字標名故略三存五合兩為一云菩薩摩訶薩也次二句釋新譯然唐譯有三釋一者覺即是菩提之道有情即緣慮之情謂自能覺悟菩提之道猶有緣慮之情為對迷眾生故稱覺有情也二者覺即是菩提之行有情乃博地眾生謂此人不但自行諸佛菩提之道又能開覺一切有情所謂吾將以斯道覺斯民故名覺有情也三者覺即所求佛果菩提有情即所度大地眾生謂此人上求佛覺下化有情自利利人故云覺有情是則約上求下化一義而釋也又起信疏亦有三釋一約境有所求所度覺即所求佛果菩提有情即所度大地眾生謂此人以智上求佛覺以悲下化有情自利利人故云覺有情二約心有覺悟之智餘情慮之識謂此人自能覺悟菩提之道猶有緣慮之情對全迷眾生故稱覺有情三約能所有能求所求覺即所求菩提之道有情即能求佛果之人故稱覺有情今則註云上求等者乃約初義釋也末句結成言於當教內亦稱大乘者謂此菩薩伏惑行因望於後三雖不名大乘若對當教中下二乘亦可稱為大乘也註然此菩薩全不斷惑三祇百劫伏惑行因四教義三六云三藏正化二乘傍化菩薩若說菩薩斷惑受生二乘即疑若結盡而得受生者諸聲聞人得羅漢果將不更受生耶是故不說菩薩斷結受生也文又妙玄五十二云令生事善故作是說欲求佛者改惡從善文又四教義三二云雖修性念處而不斷結為生三界度眾生故文由教不詮中道應本故留結惑受生利物故三藏菩薩不斷惑明矣此乃立權則有記此明菩薩伏惑行因所以也初略指藏教菩薩不斷所以次四教義下引證文有四節初為斷二乘疑如四教義問云佛於三藏初開三乘大乘最勝何不以大乘為正小乘為傍答鹿苑初轉四諦法輪拘隣五人見諦成道八萬諸天得法眼淨但有得道之小乘未有得道之大乘故以小乘為正大乘為傍也二為逗機生善如妙玄云今明漸道之初求佛當三阿僧祇劫修六度行百劫種相好因乃可得佛欲令生事善故作是說事善者即有相之善如行六度而不能達三輪體空故名事善也故作是說者謂即藏教求佛果人當須三祇修福百劫種相乃可得佛之說也欲求佛者改六蔽惡從六度善則知為人生善故不說菩薩斷惑也三重引四教義為受生利物文云修性念處為壞屬愛魔業破屬見一切智六師修共念處欲壞愛結破神通六師修緣念處為一切愛見眾生說法屬愛壞故一切天魔眷屬壞見壞故十八種六師及一切外道眷屬壞也故用三種念處行六波羅密意欲降伏天魔外道也又菩薩用三種念處行六度時雖修性念處而不斷結為生三界度眾生故則知為受生利物故不說菩薩斷結也四約教及受生意明不斷惑蓋中道法身之理乃起應之本彼三藏教既不詮顯故於菩薩不論斷惑又菩薩大悲憐憫欲度一切受生死苦教化眾生眾生根熟即便成道說三乘教共三乘人同入涅槃若因中斷結即不受生豈能利物故忍受生死不斷結也以是明之則知不說菩薩斷結者良有以也原註約權指明則有耳註若大論云聲聞人言菩薩不斷使乃至坐道場然後斷者是為大錯又云豈有菩薩具足三毒能集佛法文此蓋龍樹申通摩訶衍義以大破小故作此說當彼鹿苑稟教之時雖謂實歷三祇百劫伏惑不斷若方等般若轉入衍中來至法華會歸一實定無始終三祗伏惑故得大論約實斥權此乃斥權則無記此言大論明菩薩無不斷惑之義引論發明也初句指聲聞言訛次句指摩訶衍言錯又云下責詞然是略引若具記之如文云何以故汝法中說菩薩已滿三阿僧祇劫後更有百劫中常得宿命智自憶迦葉佛時作比丘名多羅修行佛法云何今六年苦行修邪道法日食一麻一麥後身菩薩一日尚不應謬何況六年瞋習亦然從久遠世時作毒蛇獵者生剝其皮猶尚不瞋云何最後身而瞋五人以是知聲聞人受佛義亦錯佛以方便欲破外道故現六年苦行汝言瞋五人者是為方便亦似瞋非瞋習也又摩訶衍人言得無生忍菩薩一切煩惱及習都盡亦是錯若都盡與佛無異亦不應受法性生身以是故知菩薩得無生法忍捨生身得法性身若言至坐道場一切煩惱及習俱斷是語亦非何以故若菩薩具三毒者云何能集無量佛法譬如毒瓶雖著甘露皆不中食菩薩集諸純淨功德乃得作佛若雜三毒云何能具足清淨佛法是也此蓋下明論主破斥之意如四教義問云智論何意從始至終一一彈破答龍樹為欲申通摩訶衍明菩薩所行之道以大破小皆可破也當彼下轉明論意以實斥權蓋阿含會上但止保證真空乃二乘所慕而菩薩三祗修六度百劫種相好雖然歷劫伏惑修因若至方等受大聖之彈訶般若領二乘之轉教則已轉入摩訶衍中後來更至法華會上聞三周說法則三乘總是一乘九界同歸佛界豈有三祗百劫伏惑之事是故論主得可以實斥權以大破小也末句原註指明約實斥權則無耳註若釋迦果後權示利生不妨自歷三祗百劫故有尸棄然燈等事今之所辨且順立權義邊故約鹿苑三藏明不斷惑如法華文句六二十七引阿含五佛子釋更與作字名之為兒四果支佛名真佛子菩薩不斷惑子義未成文記此以菩薩權示明所辨也謂我釋迦如來因成久遠之實修果成久遠之實證而有三祇百劫伏惑行因又有尸棄然燈二佛授記等事是皆如來果後權示利生之事是故今文順權立義以明三藏菩薩伏惑行因也如法華下引文句證菩薩不斷惑義謂一往言之凡夫為外子二乘為庶子菩薩為真子玄文云昔教五人得真無漏名佛子菩薩不發真名外人釋籤云小乘以菩薩為似子以聲聞為真子是知子義未成由不斷惑也註妙樂七十七云阿含至子義未成者疊疏引經既阿含中亦明不斷惑菩薩而大論斥權非謂全無此會經論明破立意謂非但婆沙明不斷惑菩薩而阿含亦明此對婆沙而云亦也以阿含會同婆沙而判大論則知大論斥權云無非謂全無乃立權則有記此以經論判明含有菩薩少分不斷惑也原註正出其意文有四段初斷文意二釋亦字三正會判四推論文含有也言立權則有者別行玄記云為逗衍機須破三藏非是廢彼教而作是說也註論云迦旃延造者從所造論及所計者說記此出大論斥權之意言所造論者即迦旃延所作發智經八乾度初品是世間第一法後諸弟子為後人不能盡解八乾度故作婆沙也此由上文阿含婆沙明不斷惑菩薩則經論相符而大論斥之者蓋斥其執權之人耳故曰論云迦旃延造者從所造論及所計者說即出其斥權之意蓋從其所造論及所計故大論謂是迦旃延造是則大論斥其計論執權之非也記此段原註釋妙樂出論斥權之意初明論斥執權之人蓋下釋明大論斥權之意是則下結明論斥計執之非也註豈以會二還歸阿含法華準舊十二年前一何可笑備此因判藏菩薩之便辯明菩薩當分大小也補此斥古師如妙樂十車之難古師所立菩薩之位全同阿含十二年前又法華會三歸一古師不知但言會二講時但辨清會二二字大意自明此由他師不分大小菩薩之殊及昧水牛白牛之異謂法華會二乘歸菩薩故此破云豈可會二乘斷惑之人還歸阿含不斷惑菩薩若以會二乘還歸阿含法華四十餘年之後開顯之教還復準舊十二年前阿含之教故云一何可笑記此釋妙樂破古師謬說也蓋以菩薩有大有小若三藏中則小而方等以後皆大也故以水牛喻權小菩薩白牛喻實大菩薩而彼不知謬謂法華會二乘歸菩薩也註止觀三十六云煩惱脂消者名伏為消也故別行下三云但伏惑不斷如無脂肥羊取世智為般若即此意也記此會止觀煩惱脂消之意先指文正釋次引別行疏證成如觀音記言無脂肥羊者大論言此菩薩雖有上妙五欲不生貪著以有無常等觀故譬如有王有一大臣自覆其罪王欲罰罪語臣言若得無脂肥羊少赦汝罪大臣有智以索繫羊養以水草日日三時以狼怖之羊雖得養肥而無脂以獻於王王見問言云何得爾答以上事菩薩亦爾見無常空狼令結使脂消功德身肥也是乃取世智為般若即此以伏為消之意也補取世智者以未斷惑真智不得現前雖修六度乃取有漏世智為般若即此伏而不斷之意也註又俱舍婆沙意云下八地惑初修禪時先已斷竟此有漏斷亦是伏義如輔行三下會釋云云記此會釋俱舍婆沙斷下八地惑也蓋有漏智弱雖然說斷其實名伏如輔行云三十四心者今取論意與諸經論明斷少別大論云下地諸惑因時未斷至樹下時乃以九地九品思惑通名一九故言三藏菩薩位同凡夫以九無礙九解脫合為十八見道中八忍八智合為十六并前共成三十四心俱舍婆沙意云下八地惑修初禪時先已斷竟唯非非想地九品見思全在用九無礙九解脫以根勝故不復更修下八地定不同聲聞亦異緣覺乃至云此與俱舍不同什公翻譯及龍樹意俱舍應悞不同意者今且以一意消通今二論理齊俱舍取修禪時已斷惑竟不復更斷智論依餘部雖有漏斷未名為斷至菩提樹下但斷非想八地俱名無漏但是從部得名不同故使二論用義不等註然不斷見思還斷塵沙否答須知三祇百劫亦但伏而不斷故至樹王下斷見思時於塵沙法上證四真諦方斷塵沙也記此料簡菩薩斷伏塵沙問中承不斷見思而問斷塵沙者蓋見思阻乎空寂塵沙障乎化導是則菩薩不斷見思則可不斷塵沙則不可故此問之答中明修因時伏而不斷至成道時與見思同斷別行玄云三十四心正習俱盡者頓證羅漢及以支佛亦三十四心無間而得但不以此頓盡正習一言於習有見思習塵沙習菩薩修學塵沙法門治其劣慧於一一門用四諦觀伏其正使於一一門行六度行熏見思習故樹王下三十四心於塵沙法上證四真諦故令正使及二習氣俱時而盡故能二諦皆究竟也方異二乘弟子偏障佛眼佛智也註若止觀三十六云得法眼照俗諦文得相似法眼有漏智照耳記此釋止觀明菩薩法眼照俗也先引文次正釋謂菩薩修因之時所得法眼雖非名字觀行亦非分證究竟但是相似法眼於俗諦境上只可依稀而見彷彿而知但是有漏智照是故塵沙但言伏而非斷也二明法二初標從初發心緣四諦境發四弘願修六度行註生滅四諦為所依境弘者大也要制其心志求滿足名為誓願記此釋所緣四諦境也如前註云苦則三相遷移集則四心流動滅則滅有還無道則對治易奪是名生滅四諦此三藏菩薩依之而發弘願也要求也世出世之願無過此四故謂之弘願而加之以誓所以堅其成也註度者越生死流到彼岸也誓若無境名為狂願不行六度其願則虗又此化他四門徧學異乎二乘一門自行記此明三乘廣狹修行有異謂菩薩乘人心既廣大故於有等四門一一遍學不為自利唯樂利人而二乘之流心既狹劣行亦孤陋但依空法取證道果唯求自度不欲度人自其所以有異乎此也註又二乘雖無破戒乃至愚癡行非利生不名六度蓋奪而言之記此明二乘行非六度也謂一往觀之二乘競競守戒似修戒度乃至無愚痴行似般若度稱實言之既是自私自利而非利生行業但名自行不名六度六度者度他六蔽也是則與之則是奪之則非也註別對諦緣三祇百劫名四階成道記此對諦緣結名四階謂聲聞人修四諦行緣覺人修十二因緣行菩薩人修四階行然此四階成道名出楞伽謂初僧祇二僧祇三僧祇百劫種相好也二釋二初發願修行二初發願一未度者令度即眾生無邊誓願度此緣苦諦境二未解者令解即煩惱無數誓願斷此緣集諦境三未安者令安即法門無量誓願學此緣道諦境四未得涅槃者令得涅槃即佛道無上誓願成此緣滅諦境註四教義三初云一未度者令度即是度天魔外道愛見二種六道眾生未度三界火宅之苦諦令得度也二未解者令解即是愛見二種眾生未解愛見二十五有業令得解也三未安者令安即是愛見二種眾生未安三十七品一切諸道令安道諦也四未得涅槃者令得涅槃即是愛見二種眾生未滅二十五有生死因果皆令得滅諦涅槃也記以上如文可知二修行二初結前生後既已發心須行行填願註觀音玄記上七云若非行山莫填願海文記此釋以行填願蓋由觀音玄義云欲滿此願必須修行修行不出福慧慧即般若福即五度互於資導以行順願事理圓足故記云若非行山莫填願海行即福慧義當六度五資於慧慧導於五其猶目足不可互缺五除事障慧除理障此二功圓悟理得事矣二正明修行二初總標於三阿僧祗劫修六度行百劫種相好補修六度行者行施乃盡命傾財持戒則防遮護性忍辱則就刀割水精進則如救頭然禪那乃四儀湛寂智慧則一念圓明大願之心普被有作之道徧施度生死流登涅槃岸故曰六度第一名施度梵語檀那秦言徧施若內有信心外有福田有財物三事和合心生捨法能破慳貪是為檀那布施有二一財施謂飲食衣服田宅六畜奴婢珍寶一切己之所有資生之具以及妻子乃至身命悉屬他有為他財物故云猶屬財施有所須者能施與之皆名財施也二法施若從諸佛菩薩經論及善知識聞說世出世法以清淨心為人演說皆名法施也第二名戒度梵語尸羅此云戒戒以防非止惡為義謂能防惡律儀無作之非止三業所起之惡也大論云云何為戒若惡止更不作若心生若口言若從他受息身口惡是為戒又戒訓警也謂警䇿三業遠離過非也又戒名為制能制一切不善法故第三名忍辱梵語羼提此云忍辱謂內心能安忍外所辱之境故名忍辱忍辱有二一生忍二法忍生忍復二一於恭敬供養中能忍不着則不生憍逸也二於罵詈打害中能忍則不生瞋恨怨惱也二法忍亦二一者非心法謂寒熱風雨飢渴老病死等二者心法謂瞋恚憂愁淫欲憍慢諸邪見等菩薩於此二法皆能忍而不動是名生法忍也第四名精進梵名毗梨耶此云精進欲樂勤行善法不自放逸謂之精進精進有二一身精進若身勤修善法行道禮拜講說勸助開化等名身精進二心精進勤修忍辱禪定智慧等是名心精進大集經佛言精進有二種一始發精進二終成精進菩薩以始發精進習成一切善法以終成精進分別一切法不得自性也第五名禪度梵名禪那此言靜慮禪亦有二種一世間禪謂根本四禪四無量心四無色定等是名凡夫所行禪二出世間禪復二一出世間禪者謂六妙門十六特勝觀練熏修等二出世間上上禪謂自性等九種大禪今是事禪非出世間上上禪也第六名智度梵語般若此云智慧三藏菩薩所有智慧惟照生滅偏空之理也註輔行三下初云阿僧祗此翻無數劫翻時記此釋阿僧祗華梵名目也梵語僧祗秦言數阿者秦言無問幾時名阿僧祗答大論云天人中能知算數者極數不能知名一阿僧祗如十千名萬十萬名億千萬億名那由他千萬那由他名頻婆千萬頻婆名迦他過迦他名阿僧祗或翻阿僧企耶此云無央數央盡也劫翻時者大論言劫波秦言分別時節西域記云時極短者謂剎那百二十剎那為一呾剎那六十呾剎那為一臘縛三十臘縛為一牟呼栗多五十牟呼栗多為一時二六時合成一日一夜云云俱舍言時之極少名剎那時之極長名為刧註俱舍云八十中大劫謂一增一減為一小劫二十增減為一中劫今此一增一減亦名中劫如劫章其小劫名自有十種當詳大劫三無數謂六十數中第五十二數名阿僧祇謂積此大劫成無數時故云三阿僧祗文記此釋三阿僧祇數乃至名三阿僧祇也若此方數法秪有十等如黃帝算經云億兆京姊姟壤溝㵎正載風俗通云千生萬萬生億乃至正生載載地不能載也億分四等一以十萬為億二以百萬為億三以千萬為億四以萬萬為億縱至于載猶可數而知唯佛法中第五十二數非心力能及方名無數也然六十數中阿僧祇是五十二數于六十忘失餘八故但出五十二名耳大中小劫解見前三卷中今以一增一減名中劫者乃依劫章中義也十種小劫名詳法數云一時二年三月四半月五日六夜七剎那八怛剎那九臘縛十目呼剌多是也大劫三無數者論釋云劫性是何謂唯五蘊經說三劫阿僧祇耶精進修行方得成佛於前所說四種劫中積何劫成三劫無數累前大劫為十百千乃至積成三劫無數也今註謂六十數中第五十二名阿僧祇者翻譯名義中詳載註俱舍問云既積無數何復言三答非無數言顯不可數文記論云解脫經言六十數中阿僧祇耶是其一數云何六十如彼經言有一而無餘數始為一十一為十十十為百十百為千十千為萬十萬為洛叉乃至大跋羅欃為阿僧祇耶于此六十數忘失餘八若數大劫至此數中阿僧祇耶名劫無數此劫無數復積至三經中說為三劫無數非諸算計所能數知故得說為三劫無數也註諸經更有拂石劫芥子劫具如輔行一上六紙記輔行引金光明經言梵天三銖天衣三年一拂拂盡畟方四十里石以為小劫八十里盡以為中劫百二十里盡以為大劫不於如此劫修學不名菩薩又云有一里劫二里劫乃至萬里劫又云有大方城周四十里滿中芥子百年取一芥芥盡名為劫經劫無數名阿僧祇畟音出利也註若大乘亦有一百零三數如華嚴記唐譯華嚴阿僧祇品心王菩薩問佛云何阿僧祗乃至不可說不可說佛言一百洛叉為一俱胝俱胝俱胝為一阿庾多乃至言不可說轉不可說轉為一不可說不可說此又不可說不可說為一不可說不可說轉共有一百二十三數是也若刊定記破經文此又二字為長而清涼師則開此又二字贊一不可說不可說共有四不可說而據刊定記唯一百二十三數據清涼疏則有一百二十四數也二釋相三初三祇行因列數二初總標言三阿無僧祇數劫時者此句儀文標徵可知二示相三初初祇行行且約釋迦修菩薩道時論分限者從古釋迦至尸棄佛值七萬五千佛名初阿僧祇從此常離女身及四惡趣常修六度然自不知當作佛若望聲聞位即五停心總別念處外凡註輔行六上十三云彼婆沙中釋菩薩義明因則指釋迦三祇百劫明果則指彌勒當成何故爾耶釋迦果已成是故指因行為令慕果而行因故彌勒因已滿是故指當果皆使觀因以知果故故諸聖教並明釋迦之因如說菩薩昔苦行等並明彌勒之果如說彌勒下生經等文從古釋迦等者發軫鈔云釋迦翻能仁牟尼翻寂默能仁是姓寂默是字姓從慈悲利物字取智慧冥理以利物故不住涅槃以冥理故不住生死文記此釋今佛修因古佛姓字發軫鈔乃吳興所撰以釋金剛疏之書也鈔云釋迦翻能仁準本起經牟尼翻寂默準本行經能仁是姓者長阿含云昔有輪王姓甘蔗氏聽次妃讚擯四太子至雪山北自立城居以德歸人鬱為強國父王悔召太子辭過不還父王三歎我子釋迦因此命氏也寂默是字者本行經云又諸釋種性憍多言及見太子悉皆默然王言宜字牟尼也從古釋迦者婆沙云過去久遠人壽百歲有佛出世名釋迦牟尼剎帝利姓釋種眾生母名摩耶父名淨飯子名羅睺羅侍者弟子出五濁時皆如今佛時彼世尊化導有情恒涉道路為風所傷肩背有疾令阿難陀往陶師家求胡麻油及以煖水為吾塗洗時彼侍者至陶師家廣贊佛德求索油水彼陶師者名曰廣識辦胡麻油及以香水為佛灌洗風疾除愈佛為說法彼聞歡喜即發願言願我未來作佛名號弟子眷屬時處如今世尊等無有異彼陶師者即今釋迦從古釋迦而發心也註尸棄此云寶髻非七佛中第二尸棄也緣載四教義三初并大論第三文記翻譯名義云罽那尸棄名出俱舍大論名剌那尸棄此翻寶髻亦云寶頂吾佛世尊初僧祇滿時值此佛與七佛中第二尸棄隔二僧祇先達謂同故今辨異也所言七佛者賢劫之前九十一劫初有佛名毗婆尸第三十一劫有二佛一名尸棄此云大二名恕婆附是賢劫中有四佛一名鳩飱陀二名迦那伽牟尼三名迦葉四名釋迦牟尼註從此常離女身者妙玄四二十七釋籤三十五四教義三二云第三僧祇始離五障一惡道二貧賤三女身四形殘五喜忘方乃不墮如戒疏上三云初僧祇得五種功德一生人天二生富貴三男身四根具五知宿命舊云初僧祇有遇緣不遇緣異不遇違緣即離五障如戒疏若遇違緣至第三祇方離如釋籤又初僧祇離障且約功能三祇方離乃據定位記妙玄云此菩薩從初發菩提心起慈悲誓願觀察四諦以道諦為初門行六波羅密從初釋迦至罽那尸棄佛時名第一阿僧祇常離女身釋籤科但曰於中分凡聖位四教義云從過去釋迦至尸棄佛名一阿僧祇劫從此常離女身爾時不知當作佛不作佛此初阿僧祇劫即是得五停心別總相念之位用性念處共念處緣念處行六度乃至云是初僧祇劫修行六度用四弘誓安撫生死眾生心無怯弱故壞女人之業常受丈夫之身爾時未發煖解位在外凡戒疏云初僧祇得五種功德一不生惡道二不生邊地三諸根完具四不受女身五常識宿命也已上所記皆據方冊明文而註出四教義等說第三僧祇始離五障者或依舊本亦未可知又指釋戒疏五種功德與今所記前後辭異然意是同也舊云下出舊會釋又下今註文會釋補問上引戒疏云初僧祇得五種功德何故此又言離障答以離障即得功德故如大論云若離五法得五法是名菩薩何謂五法離三惡道常生天上人間離貧窮下賤常得尊貴離非男法常得男子之身離諸形殘醜陋常得諸根具足離喜捨忘常憶宿命得是宿命智慧常離一切惡法遠捨惡人常求道法攝取弟子如是名為菩薩是也離喜捨忘謂離妄想分別有了記心而能知宿命也備節義云從此常離女身下應言妙玄四教義勾斷釋籤三應移在下蓋釋五障文原在釋籤三故註又文句二十二云不生三惡道位不退不生邊地諸根完具不受女身即行不退常識宿命不起妄想分別攀緣諸境即念不退文妙樂二二十一云第三祇時橫得三不退故文記此以五種功德配三不退乃至通是三不退也文句云約位行念論不退應四句分別不生三惡道位不退不生邊地諸根完具不受女身即行不退常識宿命即念不退具此名不退地三藏義也妙樂云第三祇橫得三不退故離五障時三義俱得即是第三僧祇通至百劫通是三不退也至此名為上忍故今但取藏教初祇五功德配三不退註成論以念處為位不退煖頂為行不退忍為念不退數論以下中上忍為三不退淨名疏以煖頂忍為三不退各隨義對也記此明諸文賢位對三不退可知註然自不知作佛四教義三二云爾時未發煖解位在外凡故不自知己身當作佛不作佛記妙玄亦言準望二乘位在五停心別總相念處位中故不自知當作佛也二二祇行行次從尸棄至然燈佛值七萬六千佛名第二阿僧祇此時用七莖蓮華供養布髮掩泥得授記莂號釋迦文爾時自知作佛口未能說若望聲聞位即煖位註梵語提洹竭此云然燈大論云太子生時一切身邊光如燈故故云然燈以至成佛亦名然燈文瑞應翻為錠光記大論如文瑞應下示別翻有足曰錠無足曰燈故瑞應經翻為錠光摭華言錠音定燈屬也古來翻譯回文不同語異義同故須從金註七莖華等者初儒童為五百道士講論得銀錢五百後問王家女名瞿夷買得五華并女寄二華供養於佛故云七莖諸文但云摩納五華奉散也如集解瑞應經補因果經言過去無數阿僧祗劫有仙名善惠時燈照王太子普光啟父出家成菩薩道善惠初為五百外道講論道義各以銀錢上之當往普光佛所欲施供養見王家青衣持七莖青蓮華過問言此華賣否答言當送宮內願以上佛善惠請以五百銀錢雇五莖華供佛青衣從命并寄二華以獻於佛願我後來常為君妻時王及臣禮佛散華悉墮於地善惠五華皆住空中化成金臺後散二華住佛二邊佛讚言善惠汝過阿僧祇劫當得成佛號釋迦牟尼善惠見地濁濕心自念言云何令千輻輪足𮛫此而過即脫鹿皮衣以用布施不足掩泥又解髮以覆之如來踐已因記之曰汝後得佛當於五濁惡世度諸天人時善惠求佛出家佛言善來比丘鬚髮自落袈裟著身即成沙門善惠命終之後上生為四天王下生為轉輪王乃至上生第七為梵王各三十六返或為外道六師婆羅門小王各盡其壽不可稱數時善惠者即我身是青衣女者即耶輸陀羅是也註布髮掩泥稽首佛足見地濯濕即解皮衣欲以覆之不足掩泥乃解髮布地令佛𮛫而過文得受記莂等瑞應經云佛因記言汝自是後九十一劫劫號為賢汝當作佛號釋迦文菩薩已得訣言疑解望止㸌然無想寂而入定便逮清淨不起法忍文記禪書云世尊因地布髮掩泥獻華于然燈佛佛見布髮處遂約退眾乃指地云此一方地當建一梵剎竟時諸天散華相贊是則布髮掩泥一行最為希有供養也瑞應經云菩薩散五華止空中當佛上散瞿夷所寄二華挾佛肩上佛知至意贊言汝無數劫所學清淨心棄命捨欲守空不起不滅無猗之慈積德行願今得之矣因記云云然劫號賢者大悲經言佛問阿難何故名為賢劫阿難此三千大千世界劫欲成時盡為一水淨居天子見此世界唯一大水見有千枝諸妙蓮華一一蓮華各有千葉甚可愛樂天子見華心生歡喜踴躍無量而皆贊言奇哉希有奇哉希有如此劫中當有千佛出世以是因緣遂名為賢是則然燈預記劫號良可驗也佛號釋迦文者淨名疏云天竺語釋迦為能文為儒義名能儒註妙玄七十一既云斷惑故知通佛行因之相也釋籤八三云然燈授記得無生忍故知是通佛行因也文記此釋明不起法忍決非藏教佛果行因之相明矣妙玄明四教佛果行因之相云迹因多種或言昔為陶師值先釋迦佛三事供養藉草然燈石蜜漿發口得記父母名字弟子侍人皆如先佛是初僧祇發心既不明斷惑知是三藏行因之相也或言昔為摩納值然燈佛五華奉散布髮掩泥躍身虗空得無生忍佛與授記號釋迦文大品亦言華嚴城內得託義與此同並言斷惑故知通佛行因之相也或言昔為寶海梵志刪提嵐國寶藏佛所行大精進於十方佛送華供養既為寶藏佛父又是彌陀之師稱其功德不可思議具在悲華經中知是別圓行因之相也今但明得忍乃知是通佛行因之相無疑問瑞應經明摩納獻華然燈諸文引此證二僧祇何故妙玄證通佛行因耶答經中既言得不起法忍三藏由伏惑故無此法忍故證通佛而諸文證二僧祇者以瑞應是三藏經故淨名疏以初祇為伏二三祇為順百劫為無生三十四心為寂滅故諸文中證二僧祇也註發軫鈔據此瑞應經屬方等攝若明降生之相蓋約三藏境本而言記此節與上節皆帶辨藏通教相發軫問言若通別圓妙玄何故判為通教答非但通二亦通三藏隨教所說淺深不同一往瑞應多屬通義以得忍故異前三藏不說行因不思議相異後別圓況復若判屬通必兼後二又言餘經說遇然燈是八地正是通教支佛地也明降生之相者瑞應言自夫人懷妊天為獻飲食自然日至夫人得而享之不知所從來不復王厨以為苦而且辛到四月八日夜明星出時化從右脅生墮地即行七步舉右手柱而言曰天上天下唯吾獨尊三界皆苦無可樂者則知就三藏境本而言也註此時自知等者戒疏上三云爾時雖自知作佛而口不說準位在煖法性地既有證法之信必知作佛修行六度心未分明口不向他說也文記四教義云爾時菩薩雖能自知我必作佛口不稱說謂此是用煖法智慧修六度也何者因總相四念處初所得善有漏五陰即是性地順忍初心之位既有證法之信故必知作佛而用煖解法修行六度心未分明不向他說也備集註問答云藏加行與通性地齊煖在加行首故約藏通對言耳三三祇行行次從然燈佛至毗婆尸佛七萬七千佛名第三阿僧祇滿此時自知亦向人說必當作佛自他不疑若望聲聞位即頂位註毗婆尸翻勝觀亦云徧見記華嚴疏云此翻有四淨觀勝觀勝見徧見如月圓智滿是徧見也魄盡惑亡是淨觀也既圓且淨是勝觀勝見也名義云毗婆尸亦名維衛此云勝觀此由釋尊於毗婆尸佛初種相好故為七佛之首以贊弗沙精進力故超九大劫故至於今過九十一大劫也補七佛首之毗婆尸居莊嚴劫末只隔一劫何有九十一劫以義推之應非七佛中也準尸棄佛可知註優婆塞戒經云於迦葉佛滿三僧祗者隨機異說耳記此明戒經中三祇行滿不同戒經第一修三十二相業品佛為善生言善男子我於往昔寶頂佛所滿第一阿僧祇然燈佛所滿第二阿僧祇迦葉佛所滿第三阿僧祇當知此文隨機說耳補統紀云按戒經佛言我於釋迦最初發心於迦葉佛滿三僧祇竊詳三祇滿時正在毗婆尸今言迦葉者兼百劫種相好言耳註此三祇等義並出大論俱舍婆沙記大論言從過去釋迦文佛到罽那尸棄佛為初阿僧祇至然燈佛為二阿僧祗至毗婆尸佛為三阿僧祇是中菩薩種三十二相業因緣也俱舍云第一僧祇滿值寶髻佛第二滿值然燈佛第三滿值勝觀佛是知大論名罽那尸棄毗婆尸者或彼此音異也註此時自知等者戒疏上三云是時內心了了自知作佛口自發言準望位在頂法位中修行六度四諦解明如登山頂了見四方故口向他說文記四教義云是時菩薩內心了了自知作佛口自發言無所畏難我於來世當得作佛今謂此是頂法之位行六度四諦觀解分明如登山頂四顧分明了了自知作佛亦向他人說也註觀音玄記下四云聲聞但於一境一門修念處等故易成就菩薩徧於一切境界一一四門復加六度久遠熏修使一一行攝諸眾生令種熟脫故三祇內凡化幾人超凡入聖自身此岸度人彼岸故經長劫證位猶下文記此釋望聲聞頂位也然此所引記文乃是答辭以前有問言聲聞根鈍尚能速入七賢四聖菩薩智利何故三祇猶居頂法故今引聲聞但於一境一門等之答辭以明菩薩望聲聞位頂法位也二百劫種相好因二初結前生後經如許時修六度竟更住百劫種相好因修百福成一相註輔行三下三云過三祇已百福種相種即修也於欲界人中南洲男身佛出世時能種相業也前後不拘文記四教義問菩薩幾時種三十二相答極疾九十一劫極遲百劫也而言於欲界人中等者乃就迦旃延小乘而論也大論述其問云三十二相業向何處可種答欲界中種非色無色界於欲界五道中在人道於四洲中在南洲於人道中在男身於時中在佛出世時種何以故緣佛身得種故又問於三業中何業種答意業種何以故意業利故意業有六識何識種答意識種何以故五識不得分別故前後不拘者大論言何相初種答有言足下安立相先種何以故先安立前後能種餘相故有言紺青眼相初種得此眼相以大悲觀察眾生故今謂雖有此語不必爾也若相因緣和合時便是初種也補色界耽樂無色住定故不能種欲界苦多樂少能發大心修行六度餘三洲福報最勝唯南洲福壽俱微善心易發聖人化導必生南洲女人多障無智故須男身若非佛世則無所緣故佛出世時能種相業也註百福成一相者四教義三二云修行六度成百福德用百福德成一相以為三十二相之業因也文記此釋百福成相乃相好之因緣也大論云復次有人布施是三十二相之因緣所以者何施時與心堅固得足下安立相施時五事圍繞受者是眷屬業因緣故得足下輪相大勇猛力施故得足跟廣平相施攝人故得足下縵網相美味飲食施故得手足柔軟七處滿相施以益命故得長指身不曲大直相施時言我當相與施心轉增故得足趺高毛上向相施時受者求之一心好聽殷勤約敕令必疾得故得伊泥延膞相不瞋不輕求者故得臂長過膝相如求者意施不待言故得陰藏相好衣服臥具金銀珍寶施故得金色身相薄皮相布施時適可前人意起自在業因緣故得一一孔一毛生眉間白毫相乞者求之即言當與以是業故得上身如師子肩圓相病者施藥飢渴者與飲食起少病業因緣故得兩腋下滿相最上味相施時勸人行施而安慰之開布施道故得肉髻相身圓如泥拘盧相有乞求者意欲與時柔軟實語必與不虗故得廣長舌相梵音聲相如迦陵頻伽鳥聲相施時如實語利益語故得師子頰相施時供養受者心清淨故得牙白齒齊相施時實語和合語故得齒密相四十齒相施時不瞋不著等心視彼故得青眼相眼𥇒如牛王相是為種三十二相因緣也然大論唯言布施約意通六以檀度能攝五度故所謂檀義攝於六資生無畏法此中一二三是名修行住是也問何謂修六度成百福答瑜伽論云一少分離殺乃至邪見為一福二多分離殺等三全分離殺等四少時離五多時離六盡壽離七自離八教人離九以無量稱揚讚歎述離十見離殺等深心慶悅大生歡喜十門各十總說為百福行華嚴鈔言少分者經部許有分受或多或全由彼根生有劣中上差別及時有多時少時等少時從一日至十日多時謂一年乃至命終然其十種分為四類初三十據事以分次三十依時有別次二十約自他明後二十約贊說立正約行時名為百行約所生福名為百福依百福成一相也二別示福相福義多途難可定判有云大千盲人治差為一福等註福義多途等者輔行三下三云問幾許為一福乃至菩薩修十善各有五心謂下中上上上上中上初發五心乃至具足五心如是百心名為百福成於一相如是至三十二名身清淨文記此釋福義然據文是指廣示別而註釋意又似通明福量今且福義多途者大論問幾許名一福德答有言業報轉輪聖王於四天下受樂自在名一福德如是百福成一相有言作釋提桓因於二天中得自在名一福德有言作他化自在天王於欲界中得自在名為一福有言除補處菩薩餘一切眾生所得福報是名一福有言天地劫盡一切眾生共福德故三千大千世界報立是名一福有言是福不可量不可以譬喻知如三千大千世界一切眾生皆盲無目有人能治令差是為一福一切人皆被毒藥一人能治令差一切人應死一人能救令脫一切人破戒破正見一人能教令得淨戒正見如是等俱為一福復有人言是福不可量不可以譬喻是菩薩入第三阿僧祇中心思大行種是三十二相因緣故知是福無能量唯佛能知也是為福義多途難可定判也今儀文但舉一種而已而註云乃至修十善名有五心等通以百心釋百福義乃準大經高貴德王品云菩薩修清淨身者菩薩修不殺戒有五種心謂下中上上上上中上乃至正見亦如是是五十心名初發心具足決定成五十心是名滿足如是百心名百福德具是百福成於一相如是展轉具足成就三十二相名清淨身也又此百心即是百思謂菩薩先以五十思治身謂修十善各五思成五十思後心復起五十思令圓成百福五思者婆沙云離殺思勸導思讚善思隨喜思迴向思也註觀音玄下二云凡用三千二百福修成三十二大人相現時方稱菩薩摩訶薩記三千二百福即累上百福而成因性三十二相即所成果相大論第四問轉輪聖王有三十二相菩薩亦有三十二相有何差別答菩薩相者有七事勝轉輪聖王一淨好二分明三不失處四具足五深入六隨智慧行不隨世間七隨遠離輪王相不爾又問菩薩何以三十二相不多不少答有言佛以三十二相莊嚴身者端正不亂故若少身不端正若多佛身相亂是三十二相端正不亂不可益不可減猶如佛法不可增減身相亦如是又問菩薩何故以身相嚴身答有人見佛身相得清淨信是故以相嚴身復次諸佛以一切事勝故身色威力種相家屬智慧禪定解脫眾事皆勝若佛不莊嚴身相是事便少有言阿耨菩提住是身中若身相不端嚴阿耨菩提不住此身中是故菩薩修三十二相自莊嚴身為得阿耨菩提也問佛智慧無量身相亦應無量何以止同轉輪聖王三十二相耶答不多不少義如前說復有人言佛菩薩相不定如說隨眾生所好可以引導其心者故為現相若眾生不貴金而貴餘色琉璃玻瓈金剛等如此土世人者佛則不現金色觀其所好則為現色若眾生不貴纖長指及網縵以長指利爪為羅剎相以網縵為水鳥相造事不便如著手衣何用是為如罽賓國彌帝力利菩薩手有網縵父惡以為怪以刀割之言我子何緣如鳥有不好肩圓以為似腫有以腹不現無腹如餓鬼有以青眼為不好但好黑白分明是故佛隨眾生所好而為現相如是等無有常定有言此三十二相實定以神通力變化身隨眾所好而為現相有言佛有時神通變化有時隨世界處生當生處不得言神通變化又於三千大千世界中隨可度眾生處生則為現相如密迹經說或現金色或現銀色或現日月星宿色或長或短隨可引導眾生則為現相如人相中說五處長為好謂眼鼻舌臂指髀手足相若輪若蓮華若貝若日月是故佛手足有千輻輪纖長指鼻高好舌廣長而薄如是等皆勝於先所貴者令起恭敬心有國土佛為現千萬相或無量阿僧祇相或五六三四隨天竺所好故現三十二相八十種好也三特示六度滿相二初總牒修行六度各有滿時註六度滿文在種相後者蓋種相時亦修六度也二示相如尸毗王代鴿檀滿普明王捨國尸滿羼提仙人為歌利王割截無恨忍滿大施太子抒海并七日翹足讚弗沙佛進滿尚闍黎鵲巢頂上禪滿劬嬪大臣分閻浮提七分息諍智滿望初聲聞位是下忍位註觀音玄記下三云割截身肉就鷹貿鴿至盡一身不惱不沒自誓真實感身平復是檀滿相尸毗翻與檀翻施記釋迦因地作王名尸毗得歸命救護陀羅尼視諸眾生如母愛子是時天帝知命將終求佛問疑徧求不得却還天宮愁憂苦惱時天巧師名毗首羯磨問天主言何以悲惱答言我求一切智人而不能得毗首言有大菩薩滿足六度不久成佛天主以偈答曰菩薩發大心魚子菴羅華三事因中多及其結果少汝作鴿我作鷹汝便詐怖入王腋下當往試之是菩薩否毗首言是大菩薩云何以是事惱之帝釋言我無惡心如金須試即如所說變入王腋舉身戰懼動目作聲眾人言是王大仁慈一切宜救護如是鴿小鳥歸之如入舍菩薩相如是作佛必不久鷹在近樹而語王言還我鴿來王言我前受此鴿非是汝前受我先發願度一切眾生鷹言欲度一切眾生我非一切眾生耶何以奪我食王言汝須何食答我須新肉熱血王言無不由殺得之我先作誓若有眾生來歸我者必救護之云何殺一與一思惟心定而說偈言是我此肉身恒受老病死不久當臭爛彼須我當與持刀自割股肉而授與之鷹言須逐道理弗見欺也令輕重等王言持秤稱之鴿身轉重王身轉輕乃至王身割盡諸臣眷屬却諸看人王今如此無可看也王言任看若有成佛道當忍此大事王以血塗手攀秤欲上盡對于鴿鷹言何用如此以鴿還我王言過去劫來喪身無量今是求易佛道之時肉盡筋斷欲上而墮乃自責言汝須堅固勿得迷悶眾生墮憂海應救護之何為懈怠尚不及地獄之苦十六分一我特精進猶患此苦況地獄中無智慧者諸天贊言為小鳥能爾況其大者時大地六動海水揚波枯木生華天雨香水諸佛來贊必成佛也鷹與鴿言是真菩薩毗首言天主汝有神力令彼平復帝釋言不須我也王自作誓感發一切即語王言心不惱耶王言我心歡喜不惱不沒帝釋言誰當信汝王作誓言若心不惱以求佛道者使平復如故語已平復人天見之皆大歡喜嘆不曾有必當作佛我當供養註如須陀摩王以身就死持不妄戒是尸滿相尸羅翻好善即戒善也記須陀摩王有大精進常依實語欲入園遊戲始出城門有一婆羅門來從王乞云王是福德人憫我貧窮王言須待我還適至園中有兩翅鳥王名曰鹿足向與山神共誓取一千王已得九百九十九王唯少須陀摩王從空飛來捉將王去諸女哀哭號動一園鹿足捉王至所住處置諸王中須陀摩王涕霖如雨鹿足言大剎利如何啼泣如小兒狀人生有死合會有離須陀答言我不畏死自恨生來未曾妄語而今失信是故懊惱欲與婆羅門行施辜負宿心自招欺罪耳鹿足言放汝還去七日行施竟便來就死汝若不來我有力取王還恣心布施立太子為王大會人民王乃謝言我智不周少不如法便當瞋怒我今身非己有當去人民留之願王留意垂蔭此國勿以鹿足鬼王為慮也當設鐵舍奇兵衛護鹿足雖神亦不畏之王說偈言實語第一戒實語升天梯實語小人大妄語入地獄我今守實語寗失身壽命於是發去至鹿足所見來歡喜汝實語人不失信要人皆惜命王何脫竟還來汝是大人時須陀王廣讚實語訶責妄語鹿足聞之信心清淨語須陀言汝能說此今相放捨各還本國如是語已爾時諸王各承不殺之恩不忍相捨共住於此同立一城即今王舍城也是為尸滿相備辨訛曰好善應云性善性者習以成性以秉受戒法任運行持故云性善註如忍辱仙人被歌利王翻惡世無道割截身體慈忍不動作誓即感血化為乳是羼提滿相羼提翻忍辱記如昔忍辱仙人在于林間修行忍辱時歌利王將諸婇女入園游戲飲食訖已王少睡息諸女採華于其林間見此仙人恭敬禮拜在一面立爾時仙人為諸婇女讚歎慈忍其言美妙聽者忘厭久而忘去王眠覺已不見婇女拔劍逐蹤見女在於仙人前立嫉妒隆盛恚目奮劍擬仙人言汝作何事答言我修慈忍王言我今試汝當以利劍截其手足及以耳鼻若不瞋者乃知修忍仙言任意王即拔劍試之如上問言汝心動否答心不動也王言汝一身在此無有勢力雖言不動誰當信者仙作誓言若我實修慈忍者血當為乳誓已即變為乳王大驚走將諸婇女而去時林中龍神為此仙人雨雷電霹𮦷致王毒害遂不還宮是為忍滿相羼音產註如大施太子求如意珠雨寶濟貧得珠墮海抒海取之抒音汝酌取也筋骨斷壞終不懈廢諸天問之云吾生生不休故助抒海海水減半龍恐海乾送珠與之是毗離耶滿相記如好施太子求如意珠輔行云得珠墜海者海神惜珠因睡以盜其珠太子覺已而抒大海正使筋骨枯盡終不懈廢誓得如意以給眾生濟其身苦諸天問之答言生生不休諸天見此精進助抒海水減半龍恐海竭送珠與之是為精進滿相註尚闍黎螺髻仙人名也得第四禪出入息斷鳥謂為木於髻生卵定起欲行恐鳥母不來即更入禪鳥飛方起是禪滿相記如螺髻仙人名尚闍黎有人畫像作僧形者非得第四禪出入息斷坐一樹下寂然不動鳥見不動謂之為木即於仙人髻中生卵仙人起定覺頂上有卵即自思惟我若起行鳥母永不復來鳥卵必壞即重入禪至飛去時爾乃起行是為禪滿相註劬嬪大臣分閻浮提七分城邑山川均故息諍是般若滿相記如劬嬪大臣分閻浮提地以為七分城邑聚落皆使均等大城小城及以人民盡作七分七國無諍是為般若滿相備節義云長阿含五云釋迦夙為慈悲王有大臣之子名大典尊次補父相時王有六剎利王典尊分閻浮提水土等作七分封六剎利及大王為七大國有師言此取世智為滿相故大論破云初地菩薩尚不知其邊涯十地乃能知之云何言分大地作七分為般若滿相註所言滿者度本治蔽行期滿願今蔽已離與拔遂心即知六度其功尅滿文七日翹足等者觀音玄記下四云婆沙云爾時有佛號曰底沙有二弟子一名釋迦樂修利他行二名慈氏樂修自利行所化機在後熟彼佛念曰多人就一人難一人就多人則易欲令釋迦先成道故於是捨二弟子入至山中時釋迦菩薩隨後入山尋求本師不見蹤蹟正行之次忽見彼佛在寶龕中入火界定威光赫弈特異於常行次忘下一足經於七日說於一偈歎彼世尊云天地此界多聞室逝宮天處十方無丈夫牛王大沙門尋地山林遍無等因此精進超於九劫在彌勒前成佛文補大論言弗沙佛欲觀釋迦菩薩心純淑未即觀見之知其心未純淑而諸弟子心皆純淑又彌勒菩薩心已純淑而弟子未純淑時弗沙佛如是思惟一人之心易可速化眾人之心難可疾治思惟已竟欲使釋迦疾得成佛上雪山上于寶窟中入火光定也又言釋迦菩薩作外道仙人上山採藥是弗沙佛坐寶窟中入火光定放大光明見已心喜信敬翹一足立叉手向佛一心而觀目未暫眴七日七夜一偈讚佛天上天下無如佛十方世界亦無比世間所有我盡見一切無有如佛者於是超越九劫故九十一劫得阿耨菩提也註是下忍位者戒疏上三云若過三阿僧祇種三十二相業準望此是下忍位文記三十二相當檢法數自知此三十二通云相者於有所表覧而可別名之為相如來應化之體現此三十二相以表法身眾德圓極使見者愛敬知有勝德可崇人天中尊眾聖中王故現三十二相也種相之業如上準位是下忍位者如四教義四云此皆下忍智慧能調伏諸根滿足六度也所以者何下忍智慧力強煩惱力弱用此智慧修行六度能忍六蔽不惜身命成六度也四波羅密滿是性念處力至下忍也禪度滿多是共念處力至下忍也智度滿是緣念處力至下忍也問羅漢尚不能不惜身命修行六度下忍智慧之力何能成六度耶答若無慈悲誓願并積劫修行之力羅漢智慧尚不能爾何況下忍今外緣慈悲誓願久植熏修內有法忍智慧助破六蔽之力故菩薩望彼聲聞是下忍位也註大論云三阿僧祇時六波羅密者此乃事禪事智滿耳俱舍云道樹已前四波羅密滿至佛果位二波羅密滿此約緣理禪理智始滿補輔行禪下無理字記此釋通二論六度滿義輔行云此中明三祇百劫與俱舍小異俱舍則道樹前四波羅密滿至佛位二波羅密滿頌云但由悲普施被折身無忿讚歎底沙佛次無上菩提六波羅密多於如是四位一二又一二如次修圓滿初一謂布施次二謂戒忍次一謂精進次二謂禪智如次對四句由讚歎底迦其超九劫故從毗婆尸佛九十一劫禪智二波羅密滿若準大論三阿僧祇六波羅密滿亦不相違大論三阿僧祇但事禪智滿耳若至樹王下亦是緣理禪智始滿註觀音玄下三云問依三藏說釋迦彌勒同時發心一超九劫何意二佛俱成賢劫中佛耶答釋迦值弗沙促百劫彌勒值諸佛何必不促九十一劫耶文記下四云彌勒值佛必有超劫恐梵文未至文記此引料簡二佛同成於賢劫也且據釋尊超劫而疑彌勒不超何得同成一劫之所以也答中舉釋尊因中值弗沙得促百劫以例慈氏值諸佛亦當促九十一劫耳記下明彌勒必有超劫所以得同成於賢劫中也二果滿願遂四初成道經時次入補處生兜率託胎出胎出家降魔安坐不動為中忍位次一剎那入上忍位次一剎那入世第一位註補處者前佛既滅而此菩薩即補其處故云補處文此下具八相一從兜率天下二託胎三出生四出家五降魔六成道七轉法輪八入涅槃然此八相通大小乘舊謂大無降魔了魔即法界故小無住胎不談常住故且華嚴中列降魔相豈小乘耶故先達云成道必降魔託胎必住胎若開住胎即合降魔在成道內若開降魔即合住胎在託胎中但存沒不同耳記菩薩補處居兜率者其猶儲君當紹九五之位必先暫住東宮也華嚴經云菩提樹下結跏趺坐魔王軍眾其數無邊種種殊形甚可怖畏眾生見者無不驚懾悉發狂亂或時致死如是魔眾徧滿虗空如來見之心無恐懼容色不變一毛不豎不動不亂無所分別寂然清淨住佛所住具慈悲力諸根調伏心無所畏非諸魔眾所能傾動而能摧伏一切魔軍皆使迴心稽首歸依然後復以三輪教化令發道意永不退轉當知是文列降魔相又離世間品亦有降魔文若言大無降魔小乘則有而華嚴所列之文豈是小乘教耶所以古明大小八相之異乃開合之殊耳註若大小義約真中分以華嚴中所列八相是大乘故但小乘八相皆劣大乘八相難思若爾別相亦難思耶以同詮中故證道同圓故今是小乘八相也記此明大小八相義別謂大乘八相依中道妙理而示小乘八相依偏真而示故有勝劣之殊釋籤云若權教中三藏佛但云八相相相皆劣大乘八相一一於中皆具八相也問若言大乘八相難思則別教佛八相亦難思耶答別教所詮但中圓教詮不但中但不但雖殊所詮之中不異又別教登地與圓既同佛示八相亦難思也末句結今小乘八相然此小乘八相中前四相如初卷已見後四相在下文釋若欲具知當閱四教義補大乘一相具八相者如華嚴云菩薩於母胎中示現住兜率初生為童子出家苦行成道轉法輪般涅槃等是也註降魔者四教義三五云即於菩提樹下破萬八千億魔兵魔眾魔王敗績魔兵退散文記此釋第五降魔相如止觀云三藏初伏四魔坐道場得菩提道破煩惱魔得法性身破陰入魔此二共破死魔道樹下得不動三昧變三玉女破八萬億兵冠劍皆墮者是天子魔輔行引大集云天主初令諸軍次遣太子次遣三妃皆不能壞後自領軍為佛所降大軍退散王顛倒墮冠蓋劍三各在一處今更準瑞應經云魔王見三玉女不能嬈亂菩薩且化老母不能自復益加忿怒更召諸鬼神得一億八千萬眾皆使變為獅子熊罷虎兕象龍牛馬犬豕猿猴之形不可稱言蟲頭人軀蚖蛇之身黿之首而六目或一頸而多頭齒牙爪距擔山吐火雷電四遶護持戈矛菩薩慈心不驚不怖一毛不動光顏益好鬼兵退散不能得近是也註安坐不動等四教義三五云魔眾散已攝心端坐於第四禪住中忍修觀成中忍一剎那上忍一剎那世第一法一剎那文記此釋安坐不動成世第一法新婆沙云魔王見菩薩坐菩提樹下端身不動誓取菩提速自出宮至菩薩所謂曰剎利子可起此座今五濁惡世眾生剛強定不能證無上菩提且應現受轉輪王位我以七寶當相奉獻菩薩曰汝今所言如誘童子日月星辰可令墮落山林大地可升虗空若令我今不取大覺起此座者定無是處後魔將三十六俱胝魔軍各現種種可畏形狀執持戰具色類無邊徧三十六踰繕那量俱時奔趣道樹下惱亂菩薩皆不能得身心不動喻如蘇迷盧也是則由是不動而造成世第一法也補修觀者徧觀上下八諦之後縮觀減緣減行由此端坐修觀成世第一備辨訛曰成中忍是結文再言一剎那上忍一剎那世第一法準四教義有曰一剎那發真無漏今既發真無漏則最後一剎那三字是剩語刻本似破句讀註言剎那者止觀三十六云經云一念六百生滅成論師云一念六十剎那文俱舍云壯士一彈指六十五剎那文記經言者即大涅槃經語也又仁王云一念中有九十剎那一剎那經九百生滅俱舍云時之極少名剎那二斷結成佛發真無漏三十四心頓斷見思習氣坐木菩提樹下生草為座成劣應丈六身佛註發真無漏等輔行三下四引大論云下八地諸惑因時未斷至樹王下時乃以九地九品思惑通名一九以九無碍九解脫合為十八見道中八忍八智合為十六心總前合成三十四心補止觀明三十四心云只是一念從假入空得慧眼照真諦而得成佛輔行云引經一念六百生滅等只明一念當具多念以證無間三十四心未足為妨註聲聞見思前後各斷支佛雖見思頓斷習猶未盡故皆不得論三十四心三藏菩薩至樹王下正習俱盡方得論也記觀音玄記云頓證羅漢及以支佛亦三十四心無間而得但不以頓盡正習一言於習有見思習塵沙習菩薩修學塵沙法門治其劣慧於一一門用四諦觀伏其正使於一一門六度行熏見思習故樹王下三十四心於塵沙法上證四真諦故令正使及二習氣俱時而盡故能二諦皆究竟也方異二乘弟子獨彰佛眼佛智補八忍八智者以欲界四諦下各有一忍一智謂苦法忍苦法智等上二界四諦下亦各有一忍一智謂苦類忍苦類智等合為八忍八智也言忍者即無漏禪定智即無漏觀慧無間道中三昧斷惑名忍乃即慧之定解脫道中觀慧證理名智乃即定之慧此忍智具足即斷見惑即見真理故云見道中八忍八智也合成三十四心者謂見道八忍八智名十六心修道約三界九地各有一無礙一解脫名十八心見修合論共成三十四心此之定慧並從無始本具無漏種子所發現行由此現行能證真諦我空真如故云發真無漏三十四心也三大阿僧祇所修福智為增上緣無始法爾無漏種子為親因緣故得頓發頓斷頓證然約所斷惑品分三十四心若約能斷能證唯無漏定慧而已所證即是我空真如亦名擇滅無為無為真如不墮諸數以無為而有差別故名三十四心也大論問得何功德名為佛答得盡智無生智故名為佛有言得十力四無所畏十八不共法三達無礙三意止三意止者一受教敬重無喜二不敬重受教無憂三敬重不敬重心無異大慈大悲三十七道品一切諸法總相別相悉知故名為佛三說法度生受梵王請三轉法輪度三根性註受梵王請正法念經云昔有國王有二夫人第一夫人生一千子試當來成佛次第釋迦探籌居第四第二夫人生二子第一子願作梵王請千兄轉法輪主其次願為密蹟金剛護千兄教文梵王通為一代請轉法輪主今別在小記大經云如來既成道已梵王勸請唯願如來當為眾生廣開甘露說無上法佛言梵王一切眾生常為煩惱之所覆障不能受我正法之言梵王復言世尊一切眾生凡有三種所謂利根中根鈍根利根能受唯願為說佛言梵王我今當為一切眾生開甘露門即於波羅柰轉正法論密蹟金剛內秘外現執金剛杵故以立名世傳樓至佛非也經惟一人今於寺門為二像者或以應願無方多亦無咎有師標云密蹟一青翌𩯭二樓至德辨訛曰受梵王請正法念經不明應寶積經註三轉法輪者淨名經云三轉法輪於大千其輪本來常清淨文輪者佛證四諦法有可轉之義故名為輪又能壞煩惱名之為輪三轉者一示轉謂此是苦等二勸轉謂此是苦汝應知等三證轉謂此是苦我已知不復更知等乃至此是道我已修不復更修一一更生眼智明覺三轉則成十二行法輪如文句及記釋化城喻品云云記此釋三轉法輪初一行示即長者子寶積說偈以歡如來清淨法施謂三轉法輪於大千其輪本來常清淨天人得道此為證三寶於是現世間次一行半釋輪義有二初運轉義如文句云以佛心中化他之法度入他心名轉法輪次摧碾義如輔行云以四諦法輪度與他心摧碾結惑也三轉下正明三轉法輪一一下結益成輪如文句下指文正明今具記之文句云轉此法度入他心令彼得悟破六十二見乃名轉法輪也世間諸法不離愛見今此法輪超愛見故名為清淨輔行云輪具二義一運轉義二摧碾義以四諦輪轉度於他摧彼結惑如王輪寶能壞能安法輪亦爾壞煩惱怨安住諦理故于大千轉此法輪此四諦理體無結惑名四本淨又本不可說名為本淨為破他惑不得已而轉也言示者示其相狀勸者勸令修習證者引己證彼十二行者一約教二約行教十二者即示勸證是也行十二者三轉皆生眼智明覺教十二為能轉行十二為所轉十二行是輪十二教非輪若作二輪義眼智明覺者約四十八法開此四心成十六心為苦法忍為眼苦法智為智比忍為明比智為覺餘三諦亦爾成十六心三根人各得十六心成四十八行也十二諦是教法輪十二行是行輪教輪能轉唯一權智所轉則有十二教也行輪能轉之教十二所轉之行亦十二或通三人或約一人今三道中單就見諦道中三人利根聞示轉即生眼智明覺三人合舉故言十二行也記釋云初文中云十二行者四諦各用示等為教一轉各生眼等為行言能所者四皆佛說曰能度入彼心曰所言是輪非輪者輪以摧碾為義唯教無行豈能摧惑若不摧惑亦無輪名佛知機知時亦不無行而徒轉也今言非者教從化主行從受者是故行輪從受者得功歸化主故從佛得以未盡理故重釋之若作二輪教行相循共能摧惑況復教行俱從佛轉是故教行俱得名輪但眼智等無別體故還指忍等故眼等行約於諦教而成十六故三根人聞三轉教各生眼等成四十八寬狹中云教輪等者是化他智但屬一權則能轉惟一所轉十二則能轉名狹體寬所轉名寬體狹行法輪者教是能詮行是所詮故行隨教益有十二雖俱十二寬狹則異教定十二行生眼等若以示等生於眼等數同名異次辨通別中所言或者不定辭也或三人各聞三轉或一人前後聞三初雖別簡今就下正釋初轉法輪得見諦解三乘之人方有十二也補欲界親緣曰眼曰智上界比知曰明曰覺如因眼有明因智有覺註度三根性文句七十七云為聲聞三轉為緣覺再轉為菩薩一轉何故爾由根利鈍此一往說耳通云例皆三轉諸佛語法法至於三為眾生有三根故文記記云為眾生有三根者聲聞乘中自有此三故於鹿苑取悟不同大論婆沙亦云三根上根聞初轉中下例知文句問初為五人云何作三根耶復有八萬諸天何故無三根為生三慧三根三道故記釋云問初為等者既曰聲聞自有三根五人並是聲聞根性既具三根復有諸天何意無三為生下答人天通有三義謂慧根道聞思修不同是三慧悟有前後即三根見修無學即三道色無色般義準亦有但非因法輪得耳四緣盡入滅住世八十年現老比丘相薪盡火滅入無餘涅槃者即三藏佛果也註住世八十年光句上二十一云世壽有三品下方四十中方八十上方百二十下方少夭上方太老中方不老不少表常又中方表中道佛樂中道為此義故方八十年也文記下方猶云下品此釋住世八十年初一行明壽有三品次二行明佛取中品壽統論諸佛示現壽量修短不定如佛名七云梵聲佛壽十億歲月面修壽一日一夜大論明須扇多佛朝現暮寂阿彌陀壽命無量無邊阿僧祇劫而我釋迦如來壽命不滿百年然世尊同人中壽應滿百年而今所以不滿者為留二十年福以庇末法弟子如大集月藏分十云悲愍眾生故捨壽華嚴疏云見其憍恣示迹涅槃留餘福教以濟危苦是則世尊示現八十年非惟表居中道第一義天抑且留福以庇末法弟子也註老比丘妙樂一二十四云老比丘者從後異故文記四教各有身像三藏丈六之身不同後三故言老以別之也阿含云佛臨涅槃如老比丘詣純陀舍補從後異者以通教帶比丘像別教現尊特故言老以甄別之註薪盡火滅者佛身名薪智慧名火身滅智亡名無餘涅槃也大乘則云機薪既盡應火云亡記佛於拘尸那城入火光三昧燒身滅度唯留舍利為人天福田身智俱滅然是小教果佛無餘涅槃相也若大乘者涅槃疏云四緣感佛佛則興世四機若息佛則唱滅三結歸藏教上來所釋三人修行證果雖則不同然同斷見思同出三界同證偏真只行三百由旬入化城耳略明藏教竟註妙玄一五云三因大異三果小同文釋籤一十五云諦緣度殊故因大異俱斷見思三乘微異故果小同文記聲聞見思前後各斷支佛頓斷見思習猶未盡菩薩正習俱盡故證果小同註偏真望大說故三百由旬文句七二十七約三義明一約生死處以三界果報處為三百二約煩惱謂見思三約觀智謂空觀記文句云三界果報處為三百有餘國土為四百實報國土為五百見惑為一百五下分為二百五上分為三百塵沙為四百無明為五百入空觀能過三百人假觀過四百入中觀過五百則知小教望大乘中道五百由旬而言三百也補斷欲界使為一百斷色界使為二百斷無色界使為三百註由旬即踰繕那此云限量如此方之驛大論云由旬三別大者八十里中者六十里小者四十里文記此釋由旬之量初二句會梵名華次句舉況大論下引證發明限量且有大中小之不同也略明藏教竟
