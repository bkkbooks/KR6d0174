body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二依次釋成二初明凡二初外凡三初牒徵初五品位者二釋義五初隨喜品二初標一隨喜品二釋二初正行二初引經經云若聞是經而不毀訾起隨喜心注文句八云隨順事理無二無別喜是慶己慶人文妙樂十三云事理祇是權實異名了此權實即非權實故無二無別即隨順開權顯實之事理也言己人者理有事故故能慶人事有理故故能自慶又不二而二故慶己他二而不二了非己他補此引經文證明隨喜之名也言若聞是經者即圓聞迹門開權顯實本門開迹顯本深奧之法也而不毀訾者離誹謗過起圓信也起隨喜心者即妙悟圓理該羅萬行所謂具縛凡夫能知如來祕密之藏為世間之初依也注中先引文句是正釋次引妙樂是轉釋會義云理者現前一念心之本性即是法界實相之體非本非迹名為理本非權非實名為實理事者如來久遠證此妙理故名為本從本垂迹非生現生非滅現滅等皆名為事如此信解無二無別名隨如來證此現前一念實相本迹權實不可思議我及衆生同此心性亦當得之故於己人深信隨喜故云慶己慶人慶己有智慧慶人有慈悲也節義引法華解云或説己事或説他事佛界為己事九界為他事然事即理其理本具九界之事故喜九界在事之人皆即佛界為慶人我今雖解猶與衆生同在九界之事然九界全是佛界之理故自慶又實有權故能化他為慶人權即實故己即佛身為自慶對句記內慶己有智慧慶人有慈悲句甚清注妙玄五二云若人宿植深厚或值善知識或從經卷圓聞妙理謂一法一切法假一切法一法空非一非一切中不可思議起圓信解一心中具十法界如一微塵有大千經卷欲開此心而修圓行圓行者一行一切行謂十法成乘十心成就其心念念悉與諸波羅密相應是名圓教初隨喜品文記此引妙玄似就學人行邊以釋隨喜也言宿植深厚者乃深厚之善根也顯前四時之善根不名深厚唯聞法華下一乘圓種為深厚如在大通佛時下種已來中間或有所得或無所得等為宿植深厚也宿植是內因知識即僧經卷即法此二為外緣古云若不往昔修福慧於此正法不能聞是人內因既成外緣又具故得圓聞妙理也然則圓聞何等妙理謂即空而假即假而空空假兩非雙遮二邊既其雙遮必也雙照遮不在前照不在後遮照同在一時不可心思言議是為圓妙諦理乃其所聞也聞已深忍樂欲起圓信心信已起圓妙解解得根塵相對一念心中具足十法界如一微塵中具大千經卷如華嚴性品云佛子譬如有一經如大千界時有人見此經卷在一塵內即以方便破塵出經以譬如來智慧具足在於衆生身中為惑所覆不覺不知如來觀已而言云何如來在於身中而不覺知我尚教彼覺悟聖道見如來性是也然要實其所解必須剖塵出經故當開此心而修圓行所謂一行一切行即十法成乘十心成就如玄文云略言為十謂識一念平等具足不可思議傷己昏沉慈及一切又知此心常寂常照用寂照心遍破諸法即空假中又識一心諸心若通若塞能於此心具足道品向菩提路又解此心正助之法又識己心及凡聖心又安心不動不墮不退不散雖識一心無量功德不生染著如是十心成就已念念與諸波羅密相應是為圓行一行一切行也能如是聞信解行是為圓隨喜品位備有師標云諸波羅密相應者即究竟所歸處以觀行中雖未顯發已伏五住任運與彼相應如義例云實心緣實境實緣次第生實實迭相注自然入實理此偈為觀行之髓當精研之二徵釋二初徵詰問隨喜何法二答釋三初總答答妙法二別釋二初約所隨立妙解二初直明心法三初示心體妙法者即是心也注妙法即是心者指要鈔上四云今家釋經題法字約此三法各具三千互具互融方名妙法然雖諸法彼彼各具若為觀體必須的指心法三千起信論云所言法者謂衆生心記經題指法華三法即心佛衆生是也的指心法者妙玄云衆生法太廣佛法太高於初心為難但自觀己心則易也備起信下證法是心然賢首疏以生滅不生滅和合為衆生心今家引以證法的指衆生生滅心以生滅即不生滅也二示體德妙心體具注妙心體具者止觀五十三云一心具十界一法界又具十法界十法界具百法界一界具三十種世間百法界即具三千種世間此三千法在一念心若無心而已介爾有心三千具足亦不言一心在前一切法在後亦不言一切法在前一心在後輔行五中七云言無心而已者顯心不無言介爾者謂剎那心無間相續未曾斷絶才一剎那三千具足若具三千即具三德又介爾者介者弱也謂細念也但異無心三千具足文記此明心體具足衆德也言妙心體具者以根塵相對一念心起於十界中必屬一界即具百界千法假實國土於一念中悉皆備足由理具故方有事造故云體具也三千諸法即五陰世間一千國土世間一千有情世間一千也謂剎那下此剎那心如燈焰焰似水滔滔曾無有間遞相接續自有識來至於今日未曾斷絶也補百界千如等輔行廣明所以論十如十界三世間者以不談三諦顯理不盡不明十界攝事不周若非十如因果不具無三世間依正不備故也備止觀九問一念具十法界為作念具為任運具答法性自爾非所作成如一微塵具十方分妙宗云所言心性具一切法造一切法者實無能具所具能造所造即心是法即法是心能造因緣及所造法皆當處全心是性是故今觀若依若正乃法界心觀法界境生於法界依正色心是為唯依唯正唯色唯心唯觀唯境也問未起一念時三千法門在於何處答此因就法明具故約一念論趣舉一念皆具一切若論三千法體亘古亘今本自如如初未嘗以一念有無而三千法為之增損如即漚示海豈以漚之起滅而謂海之有無也私謂無明未破起信謂以從本來念念相續未曾離念故説無始無明是念未起時正屬無記無明以念細不覺非離念也此無記與念起是對待法宗門下亦稱為光塌塌地弗誤認為清淨真如常住真心也故止觀中四運以推破之識得無記是無明細念三千有無不待言而自明矣問古德言住地無明即是諸佛不動智此又如何答若了得念起念滅殺盜淫業悉是諸佛不動智何説不通若認無記為真如錯誤不少旦了得淫殺等是不動智正須調心徹證以期一生登住所謂行解相應名之曰祖若恃乾慧斷不敵業力也慎之思之三立喻明如如意珠注如如意珠止觀五十七云如如意珠天上勝寶狀如芥粟有大功能淨妙五欲七寶琳琅非內畜非外入不謀前後不擇多少不作粗妙稱意豐儉降雨穰穰不添不盡蓋是色法尚能如此況心神靈妙寧不具一切法耶文記中表法約理解釋須者尋之記此節從喻約義以發明也止觀正約事釋記中又約理釋記即輔行此是略指今具記之輔行云今珠義者第一義天天然理體即勝寶也性無雜染名淨無非佛法名妙在一剎那故言芥粟珠中所雨不增人欲生一切願從希須邊故名為欲又理為四弘所緣之境故名希須能滿自他菩提妙果名大功能七寶者金銀等寶不出七故即譬無作道品寶炬陀羅尼也真寶名琳似寶名琅真似二寶皆生於珠即正助二門不出於理非自性故非內畜非他性故非外入既無自他亦無共離從不謀去有化他用非縱故不謀前後非橫故不擇多少任運施為名不謀稱機設逗名不擇雖五味不同而祕密不定故縱而不縱雖諸教不同而適時增減故非多非少若機若應並非權非實故不作粗妙觸緣斯現故稱豐儉多名為豐少名為儉益物不窮故降雨穰穰穰穰即福也乃至依正珠亦雨之非本無今有故不添非本有今無故不盡若自若他皆不出三諦乃至單銷譬事意則可見故直對理以明體用珠是色法世福所感尚能如是況復心神不思議境乎二生佛會同心佛及衆生是三無差別注心佛衆生三無差別者釋籤二云當知三法即是不思議廣大法界應了此理具足佛法及衆生法雖復具足心性冥妙不一不多又衆生及佛不出于心故無差別名心法妙是故結歸三無差別方名為妙十義書云以我一念心法及一切衆生十方諸佛各各論於事造人人説於理具而皆互具互攝方名三無差別又指要云是則三法各具二造方無差別記此釋三法無差之義釋籤初句直示三法即理應了下勸了理具不一不多謂理具生佛故不一心性冥妙故不多介爾三千故不一三千只是一心故不多具足佛法故不一不離一念故不多言心性冥妙者隨緣不變名性即事之理也不變隨緣曰心即理之事也無諦無形體一互融故曰冥妙以不一故三法歷然以不多故三無差別又衆生下約三無差別以明玄文結妙天台三大部以三法各有所用如玄文多用衆生法妙文句多用佛法妙止觀多用心法妙各有妙義列然以三無差別一句是結歸三妙亦可名佛法妙衆生法妙心法妙無不可也上至諸佛常樂我淨下至衆生惑業苦道總不出我現前介爾一心故但名心法尚未結妙須明三無差別方名為妙十義書下引二造義釋謂心法有理事二造生法佛法亦各有理事二造而心法二造具生佛生佛攝入心法中佛法二造具生心生心攝入佛法中生法二造具心佛心佛攝入生法中而心佛衆生互相攝具方得名為三無差別也指要下引結三法各論具二造衆生約三世變造論事造而諸佛約變化所造論事造三世變造是九界實造聖人變化是佛界權造別行玄記云經文先示心造一切便以此心而例於佛示佛權造同心實造次復以佛而例於生示衆生實造同佛權造權實雖殊因果暫異三皆能造一切世間故得結云方無差別如輔行云心造有二種一約理造即是具二約事造即是變變造不出三世三世又三一過造於現過現造當如無始來及以現在乃至造于盡未來際一切諸業不出十界百界千如三千世間二現造於現即是現在同業所感逐境心變名之為造以心有故一切皆有以心空故一切皆空如世一官所見不同是畏是愛是親是冤三者聖人變化所造亦令衆生變心所現並由理具力有事用約心既有二種經以心例於佛佛例於生故言如心佛亦爾如佛衆生然也補指要鈔詳解問緣生事造其相易知理具三千其相云何答理無所存遍在於事即此諸法是理具之相若爾以何為事造耶答事亦不出此若爾二造奚分答只一十界據心而分事理之殊以由此心有起有具故也備十義書四明所造金光明玄有十種三法大師皆以三觀明之有廣略二本失其略本後之釋者紛紛皆不約觀故四明立十種義以難昭慶講主故名十義書也二約能隨立妙行三初標即境即觀此心即空即假即中注此心即空假中拾遺記下八云三觀之首皆言即者指一念心即三諦故言即空者非即偏空乃觀一念即圓空也此空能破三諦相著故云一空一切空三觀悉彰破相之用也言即假者非即偏假乃觀一念即妙假也此假能立三諦之法故云一假一切假三觀悉彰立法之功也言即中者非即但中蓋指一念即具德中此中能妙三諦之法故云一中一切中三觀悉是絶待之體也記此正釋空假中相即之義也初句總釋即字言即空下別釋此心即空初二句揀兩教偏空以觀此心即圓空所謂無假無中無不空也次此空下三句示能結名即拾遺記云非獨空觀於法破相假中亦能於法破相何者以空破相即真破俗以假破相即俗破真以中破相雙遮二邊此三頓破名畢竟空也末句一空一切空者小注點明是三觀破相之用也言即假下別釋此心即假初揀兩教偏假以觀此心即是妙假所謂無中無空無不假也次三句示能結名即拾遺記云非獨假觀能立於法空中二觀亦能立法何者以空立法即真而俗以假立法即俗而真以中立法雙照二邊此三頓立名為妙假也末句小注點明即假是三觀立法之功也言即中者下別釋此心即中初揀別教但中以觀此心即是不但中所謂無假無空無不中也次三句示能結名即拾遺記云非獨中觀於法絶待空假亦能當處絶待何者以空中故真諦絶待以假中故俗諦絶待以中中故中諦絶待所謂雙遮雙照俱絶俱待此三頓絶名為圓中絶待體也補既此心即空假中則終日破相諸法皆成終日立法纖塵必盡終日絶待二邊熾然是為即立即破即破即立非破非立而立而破説雖次第行在一時也又詳解云若言心空故三千俱空心假故三千俱假心中故三千俱中是名隨德用若言三諦俱彰蕩相故云俱破三諦俱彰立法故云俱立三諦俱顯絶待故俱法界即體一互融舉一即三言三即一是體互融也輔行云三諦無形俱不可見然則假法可寄事辨即此假法即空即中空中二體二無二也心性不動假立中名亡泯三千假立空稱雖亡而存假立假號心印記云以即空故破染礙情一相不立顯此三千同一性故一切即一方能同居一念派之彌合故如衆珠咸趨一珠畢竟清淨非斷無空以即假故互具互攝諸相宛然顯此三千不失自體一即一切雖復同居一念即之彌分故如一珠影入衆珠不可思議以即中故顯此三千非一非一切非分非合雙遮二邊無有二相雙照二諦空假宛然豈同但中不具諸法也一假一切假者假觀觀真諦理時見思破而真諦理顯假觀觀俗諦理時塵沙破而俗諦理顯假觀立中道時無明破而中道理顯也一中一切中者三觀皆中乃以中觀統真諦時不惟中諦能統法稱王即真諦亦復稱王方其見思染情空則遮有真諦理空則遮空真諦理顯則照空三千明淨則照俗以中觀觀俗諦時塵沙染破為遮俗三千理顯為遮空即遮俗時照空即遮空時照俗以中觀觀中諦時雙遮雙照自在稱王自不必言也一空一切空可以例知又空者推此一念不自他生等故空一念既不可得以一空故心所生所具一切法皆空也拾遺記云若在空前即生死假若在空後即建立假此生死假即建立中所治之病按生死假即偏假建立假即妙假也二明境智俱忘常境無相常智無緣注此境智冥一記此句總斷境智雙忘補光明記云境是本覺智是始覺雖分本始而是一覺境智既爾方曰相冥無二之法又真常不生滅之境本來無相所謂靈源無狀千差斯泯也真常不生滅之智本無所緣若有所緣即有能所有能所則凡聖角立乃生死之本今言常智無緣者是忘能所離待對所謂靈光獨露一道清虗也又無相者無生死相無涅槃相無相亦無當體即是實相稱此真常之境發無生滅之智境既無相智亦無緣即境即智緣即無緣斯稱冥一也三顯境智俱立無緣而緣無非三觀無相而相三諦宛然注而言境智也止觀第一常境常智後復云以無緣智緣無相境以無相境相無緣智境智冥一而言境智輔行釋云實相無相無相亦無實智無緣無緣亦絶何者境雖無相常為智緣智雖無緣常為境發智雖緣境稱境無相境雖發智令智無緣無緣而緣照境無間故云以無緣智緣無相境無相而相發智宛然故云以無相境相無緣智記注文初句總斷境智雙立也次引止觀雙證俱亡俱立之意次引輔行雙證釋也謂實相真境無彼生死涅槃一切境相即此無相亦復泯絶乃真無相境也實緣真智無能緣所緣之影即此無緣亦復泯絶乃真無緣智也斯乃泯絶境智何者下八句復明境智互資互泯斯乃明非斷無之境枯瘁之智也無緣下八句轉承上義以結釋止觀即是申明儀文三觀三諦宛然意補智緣境者一切智照真諦境道種智照俗諦境一切種智照中諦境境發智者真諦發一切智俗諦發道種智中諦發一切種智又輔行釋意先有伏疑二番初番釋無相無緣如何修行疑疑曰今行人既開妙解正欲稟圓行進修今言無相亦無則無所緣之境無緣亦絶則無能緣之智境智既其俱寂如何令彼進修而成五品耶故徵云何者境雖下是釋謂境雖無相常為智緣則所緣之境歷然智雖無緣常為境發則能緣之智宛爾次番釋既能緣發何名無相無緣疑疑曰既境為智緣智為境發何云無相無緣故釋云智雖緣境稱境無相謂智本無緣故能稱境無相也境雖發智令智無緣者謂能發之境本無相故令所發之智亦復無緣也是則寂照雙融智無緣而三觀昭著照境無間境無相而三諦分明發智宛然故曰以無緣智緣無相境以無相境相無緣智三結示初心知此慶己慶人故名隨喜注此結成隨喜也五品初心知此妙心體具事理三千境觀之法慶己有智慧慶人有慈悲補慶己得此智慧即同佛慧慶人皆具而在迷須開觀發明故有慈悲也二助行三初兼明正助雙修二初明內正內以三觀觀三諦境注大意云三諦三觀三非三三一一三無所寄諦觀名別體復同是故能所二非二記三諦三觀三非三者如弄珠人其珠不在空中不落地上不在手裏既不在三處又不在一處不在空喻不住空不落地喻不住假不在手喻不住中既不住三亦不住一故成非三非一也三一一三無所寄者以三三乎一一無所寄以一一乎三三亦無寄三一既俱無寄是非一非三也若三觀一心即約縱説一心三觀即約橫説今非縱故非一非橫故非三三一一三俱是具心上義也諦觀名別體同者以性三為諦修三為觀故名別也妙宗云性了是真性緣是俗性正是中不是了因非大真諦俗中亦然此之三諦方與三觀體性不殊是體同也末句觀是能顯諦是所顯其實體性非二是故能所二非二也二明外助外以五悔勤加精進助成理解注止觀七云唯法華別約六時五悔重作方便此約四種三昧相對而説不可以光明彌陀亦論五悔為妨記外以五悔者止觀云若四種三昧修習方便通如上説惟法華別約六時五悔重作方便又言心理微密用觀輕微黑惡覆障卒難開曉重運身口助發意業使疾相應更加五悔小注惟恐以金光明大彌陀懺俱論五悔為難是故申明專對四種説也如輔行云此明方便來意四種三昧通用二十五法為通方便若行法華別加五悔不通餘行故言唯也補圓觀行人破障顯理三觀即足何假五悔助耶答止觀云行人無量劫來善惡諸業或已受報或未受報若平平運心相則不現今修止觀能動諸業善惡相現故修五悔破此業障障去理明觀行功速如運舟加以風帆櫓棹意在此也注修懺要旨云所以悉稱悔者蓋皆能滅罪故也勸請則滅波旬請佛入滅之罪隨喜則滅妒他修善之愆回向則滅倒求三界之心發願則滅修行退志之過文輔行二上八云於法無染曰精念念趣求曰進助成理解一往分之五悔為事行名助諦觀為理解名正記此節釋外助之正義也先引要旨以釋五悔名義初一悔是總後四悔是別次行輔行略明精進助成二句一往者猶言單層而言也若再往分之五悔亦有正助理懺為正事懺為助如下文説二正明助行妙懺二初雙標理事言五悔者有二一理二事注止觀二云事懺懺苦道業道理懺懺煩惱道理事不出三種懺法理謂無生妙懺事謂取相作法記懺三道罪障者瓔珞云犯沙彌戒乃至比丘戒若不還生無有是處是懺業道之文也又云眼耳諸根清淨是懺苦道之文也又云第七日見十方佛聞法得不退轉是懺煩惱道之文也次一句總示事理三種懺法末二句別示可知補止觀云若欲懺悔三道罪障當識順流十心明知過失當運逆流十心以為對治此二十心通為諸懺之本順逆十心即大悲懺等本中內計我人外加惡友等文是也注光明文句三十四云行者應知三種懺法無生是主二為助緣灰汁皂角助於清水若缺妙觀不名大乘便同外道無益苦行須近善師學懺悔處及懺悔法方可行於道場事儀故於諸事皆用妙觀照而導之使作法等皆順實理悉為佛因又云正助二懺修逐根緣自有一向修於正道直登圓住或內外凡自有一向修於助道如南嶽立有相安樂行不入三昧但誦持故亦能得見上妙色像此二隨根修入不同若悟理時必兩捨也自有正助相兼而修或先正後助或先助後正或同時而修今之所立意在同修耳記此示三種懺法正助初行半勸知三法正助以灰汁皂角喻取相作法為助以清水喻無生是正若缺下明無正觀成過也蓋以西域九十五種外道人人勞形苦心箇箇曉夜勤修意欲自成無上道果而反謂無益苦行者以其心遊理外不知妙觀故也若內教行人但用取相作法不修無生正觀欲求滅罪證果其猶但用灰汁皂角不取清水以淨其器豈不同彼外道無益苦行乎此指全不知觀者説也須近下明用正觀成因善師即明眼淨行有道德之師懺悔處即是圓妙三諦懺悔法即無生取相作法三種懺法學已方可行於道場事儀也然諸事皆用妙觀使順理為因者如要旨言妙觀之宗是大乘主滅罪如翻大地草木皆枯顯德如照澄江森羅盡現以此理觀導於事儀使一禮一旋罪消塵劫一燈一水福等虗空是知如是事法得成佛因良由無生理觀為主也已上分示三法正助又云下明隨根修行正助初一句總示隨根次一行別示修正次二行別示修助指如南嶽者乃略舉文中大概今具記之如安樂行義云安樂行有二種一無相行二有相行無相行者即是安樂行一切諸法中心相寂滅畢竟不生故名無相行也常在一切深妙禪定行住坐臥飲食語默一切威儀心常定故此行即正道也有相行者是普賢勸發品中誦法華經散心精進如是等人不修禪定不入三昧若坐若立若行一心專念法華文字精進不臥如救頭然是名文字有相行此行者不顧身命若行成就即見普賢金剛色身乘六牙象王住其人前以金剛杵擬行者眼障道罪滅眼根清淨得見釋迦及見七佛復見十方三世諸佛至心懺悔在諸佛前五體投地起立合掌得三種陀羅尼門一者總持陀羅尼具肉眼天眼菩薩道慧二者百千萬億旋陀羅尼具足菩薩道種慧法眼清淨三者法音方便陀羅尼具足菩薩一切種慧佛眼清淨是時即得具足一切佛法或一生修行即得具足或二生得極遲三生即得若順身命貪四事供養不能勸修經劫不得是名有相行也此二下結示隨根不同悟時兩捨者即所謂過河須用筏到岸不須舟也次一行明正助兼修有三不同如文可知末二句明今是同修也注懺悔名光明文句中初云懺者首也悔者伏也不逆為伏順從為首又懺名白法悔名黑法白法須尚黑法須捨又懺名修來悔名改往又懺名披陳衆失悔名斷相續心又懺者名慚悔者名愧慚則慚天愧則愧人文光明記三七云然懺悔二字乃雙舉二音梵語懺摩華言悔過以由悔過是首伏等五種之義今既梵華二音並列是故大師以首釋懺以伏釋悔乃至慚愧對釋懺悔欲令稟者修首伏行及慚愧等斯是善巧説法之相故不可以華梵詁訓而為責也文記此示懺悔名之正義也先引光明文句釋十番名總五義也初四句約首伏釋但是略引具足應云懺者首也悔者伏也如世人得罪於王伏款順從不敢違逆不逆為伏順從為首行人亦爾伏三寶足下正順道理不敢作非故名懺悔此自陳罪也次四句約黑白釋懺名白法悔名黑法謂黑法須悔而弗作白法須企而尚之此以取捨合論言懺悔也三二句約棄求釋懺名修來悔名改往謂往日所作惡法鄙而惡之故名為悔往日所棄善法從今已去誓願勤修故名為懺此以棄往求來云懺悔也四二句約露斷釋謂懺名披陳衆失發露所作過咎不敢隱諱悔名斷相續造業之心厭悔捨離此能作所作合棄稱懺悔也五四句約慚愧釋謂懺者名慚悔者名愧慚者慚天愧者愧人人見其顯天見其冥冥細而顯粗粗細皆惡故懺悔也此下釋懺悔乃分人天及以四教事理之別也上約人天釋次人是賢人天是聖人不逮聖賢之流故懺悔也此約三藏教中賢聖而釋也次聖賢俱人天是第一義天第一義天是理賢聖是事不逮事理俱懺悔也此約三藏教中事理而釋也次慚三乘之聖天愧三乘之賢人不逮此天人故名慚愧慚愧云懺悔也此約通教中初賢聖而釋但此教中菩薩同二乘斷惑故三乘皆聖也次三乘賢聖尚非菩薩之賢況菩薩之聖今慚愧三十心之賢十地之聖總此賢聖皆是人第一義理名為天約此人天論慚愧以但中為第一義天不逮此人天故慚愧懺悔此約別教賢聖人天而釋也次三十心去自判聖人十信是賢人約此賢聖論慚愧懺悔總此賢聖皆是人第一義理名為天約此人天論慚愧懺悔以具德中為第一義天不逮此人天自生慚愧名懺悔此約圓教聖賢人天而釋也已上重重疊疊皆釋懺悔名也次引記約五義釋名之意初一行示華梵雙舉次二句明悔過五義今既下正示以五義釋名斯是下讚天台巧釋以遮外責蓋由義淨法師譯懺摩是西音乃忍義西國人誤觸身云懺摩意是請恕願弗嗔責此方誤傳久矣難可改張應法師云懺訛略也書無懺字正言叉摩此翻求忍意謂容恕我罪也天台釋光明懺悔品不辨華梵但直云懺者首也悔者伏也故此讚其巧釋以遮其不辨華梵之責也義淨是翻譯名義之集主法師注懺悔處光明文句引普賢觀是名大懺悔約中道為處也名莊嚴懺悔約俗為處也名無相懺悔約空為處也若三種差別者此是歷別論處爾即一而三即三而一此圓妙懺悔也記云若於三諦歷別而解乃次第觀非今妙觀其妙觀者空即三諦假中亦然名即一而三三諦俱空假中亦然名即三而一行者應知三一相即為彰懺悔處絶乎思議若以此語增於言想則永不識懺悔處也然懺悔處誰人不具何法暫非但為本迷滿目不見全心不知是故經云於十力前不識諸佛勸求覔者須親善師須資妙教勤聽勤聞審讀審思若其然者必於能詮識所詮體翛然慮外無以狀名斯乃所求法性道理此理至妙為懺法所依故名為處若依此處而立行門方得名為大乘懺也又懺之所依如器淳朴非砧不成以何為砧謂一實相無別實相即罪相是得此處者罪無不滅德無不顯文記此明懺悔處之所以也先舉光明文句明三諦為處所引普賢觀文云一切業障海皆從妄想生若欲懺悔者端坐念實相衆罪如霜露慧日能消除我心自空罪福無主是名大懺悔是名莊嚴懺悔是名無相懺悔也以大懺悔名中道為處者蓋謂此大懺悔體非中非外橫該一切處無去無來豎窮一切時不動二邊居然中正故也即大師云所觀之罪非復是罪罪即實相所觀之福福非是福福亦實相當體絶待名為中也以莊嚴懺悔名俗諦為處者性具功德莊嚴自性以妙境為所莊嚴以妙智為能莊嚴境智宛然即名為俗則彰恆沙功德故也以無相懺悔名真諦為處者以空無相則泯一切罪相故也次半行對別顯圓懺悔處非縱非橫不可思議也次引記釋上懺悔處文出第六卷初三句揀非次第其妙觀下示圓三觀行者下勸知然隔歷而論使成別教今圓妙懺悔處者謂此妙觀若確是三法確是一法均可心思言議今者即一而三即三而一非三非一而一而三言語道斷心行處滅是名絶思絶議圓妙三諦為處也苟或於三一相即語上加以奇文注釋玄思默契識此法而懺悔者最上最妙懺悔處也然依解起行方得止觀氣分若徒增言想與道遠矣故云永不識也然懺悔處下二行責人全具全迷謂情與無情莫不具有此理故云誰人不具若如是事理二懺何法暫非奈何長劫用理長劫不知故云但為本迷無始已來無明用事而業識茫茫六塵奔駛是故滿目不見全心不知故懺悔品云於十力前不識諸佛文句云諸十力前者正懺悔煩惱障獨頭無明癡倒殊甚不識法身佛也法身遍在一切處癡暗不知故於佛前造作衆罪如牛羊不識天子鳥不識檠像於前造過愚癡不識法身亦復如是勸求覔下勸求處起行善師即有解行之師僧寶也僧能指迷成解故須親之妙教即佛所説經教法寶也法能滅暗發明故須資之勤聽勤聞即所謂進而問道於師乃生聞慧審讀審問即所謂退而修道於己乃生思慧若能如是聞思必當依指見月依筌得魚依能詮之教識所詮之體了知此體翛然逈出思慮之外亦無形狀可得而名焉是乃所求法性道理此理至妙離四句絶百非不可以名名不可以識識既為懺法所依則於無名中強而名之曰懺悔處若我等能依此處而立行門是乃從性起修全修在性所修懺法方得名為大乘懺也又懺之下明依處起行之益初二句約喻顯言淳朴者本以古質為淳朴今以未治為淳朴治之令其成器故云非砧不成砧磓鍊也次四句徵釋法砧謂罪相本無即是實相此陳過罪求哀懺悔故名作法懺也然作法懺通大小乘小乘懺者如毗尼中發露與學二十僧中行摩那埵或半月作法或對首作法或責心但令作法成就不障僧事即清淨也阿含中亦有作法犯欲人作毒蛇口想此觀成時淫罪即滅亦有觀空懺只是真空也大乘懺者或百八日虗空藏墮廁是或九十日般舟三昧是也或四十九日大悲懺是也或二十一日法華或七日方等皆是也灰湯等淨身辛酒禁口慙愧勤心旋繞各有遍數等皆作法攝也取相者謂定心運想取相現起為期於道場中或見佛來摩頂或見光現或見華飛或夢中見諸瑞相或聞空中聲於此諸相隨獲一種罪即消滅是名取相懺如方等求十二夢王菩薩等雖不正明作法兼得事用也無生者謂端坐念實相如日照霜露觀空緣理無相最上謂了我心自空罪福無主者記云心性本來即空假中離三惑染名為自空十界罪福二義叵得誰為主宰如斯體達是無生懺又一切罪業皆從一念不了心生一實相為懺悔砧也末三句結能滅罪顯德意明行人得此處而立行自然德日益而罪日損者矣蓋由此處高出一切諸處如大經云譬如有人入大海浴當知是人已用一切諸河之水大品云譬如負債人依投於王債主反更供養何敢就其覔物書云如墻頭芬非其莖葉獨能高長得所依處高故也行人若依法性為懺悔處既能高出一切諸處是故得之者罪無不滅德無不顯也注懺悔法要旨云一作法懺謂身口所作一切法度二取相懺謂定心運想相起為期三無生懺謂了我心自空罪福無主觀業實相見罪本源法界圓融真如清淨法雖三種行在一時光明記云此三種懺同時而修無生是正二是助緣斯乃正助一合而行如膏益明證理彌速也又須了知大乘三懺後一雖可獨修不進須假前二前二不可暫離無生得此意已方可説行三種懺法記此明懺悔法先舉要旨列釋三種言作法懺者謂身禮拜口稱唱意思惟三業所作一依法度披若了我心本自空寂則罪福無主而一切法皆悉寂滅罪從何生名無生懺也觀業實相見罪本源者蓋見愛業報全體即是性惡法門如富豪人七寶盈家凡夫生盲動轉罣礙為寶所傷二乘熱病見是鬼虎避走遠去圓人之眼不盲不病明見是寶體達修惡即是性惡故云觀業即是實相能見罪之本源也由性修融通隨緣不變全修惡即是性惡故云法界圓融真如清淨也此無生懺雖不正明作事亦必兼上二懺也光明記下證明三種同時而修以膏喻助以明喻正無生正觀得作法取相助成其觀照之智愈朗證妙理於剎那之間也正如膏油以助燈火其明益熾霎時間可以成熟一切也又須下勸了大乘三懺如要旨云法雖三種行在一時寧可缺於前前不可虧於後後無生最要取相尚寬蓋妙觀之宗是大乘之主以理觀導於事儀則一禮一旋罪消塵劫一燈一水福等虗空故曰説六根罪時心存三種懺法也記光明文句中初約遮性罪作法懺成違無作罪雖云滅而性罪依然不滅如犯殺生作法懺成但是違無作罪雖除去而償命猶在記云無作罪者昔受佛戒由作法故發無作體若毀犯者得違逆罪今由作法翻破此罪也取相懺能滅性罪性罪若去違無作罪亦去如伐樹而枝葉萎根本未去續生如故記云性罪者十惡也不論受與不受犯之性自是罪也大論云斬草殺畜二罪同懺二種違制之罪俱除而殺畜償命猶存由以定心想成勝相熏修力強能轉惡業是故能滅性遮二罪也觀無生能滅無明如覆大地枝葉等悉盡無餘記云枝葉喻性遮罪根本喻無明心也二約三學釋文句云作法滅違戒上罪記云作法本為防非故滅戒上罪也取相滅定上罪記云取相不心專意故滅定上罪也無生滅犯慧上罪記云無生觀照故滅慧上罪也以事非是戒家罪故作事防非曰事非散亂是定家罪故惑暗是慧家罪故三除三報釋文句云作法滅三惡道報障記云六道雖俱報障而有苦樂不同三惡唯苦違法而得故作法除之取相滅人道報障記云人道之報半苦半樂散善所招故取相懺乃能滅之無生滅三界有漏報障記云三界天報望人皆定無苦唯樂三漏所感故無生懺乃能滅之也四別煩惱釋者文句云作法滅怖畏憂愁煩惱亦是破煩惱記云二番唯大釋前之四番前通大小乘無生惑滅未簡通別作法或取毗尼之制今之二釋無生的破障中無明通惑不生為今取相驗知此去唯就大釋別煩惱釋者怖畏屬思憂愁屬見今作法懺成位在五品能伏此惑指伏為破故云亦破煩惱也取相能滅四住之煩惱記云取相懺成位在七信故滅四住既見真諦望中名相故名取相也無生懺成滅無明之煩惱記云無生觀成位登初住所除的在根本無明也故知此釋別就大乘明三種懺也記記云次明生善乃約喻顯五石治病之藥石也即白瑛紫瑛石膏鐘乳石脂是也五芝者即五色靈芝也是輕身之仙草薑桂喻小乘作法未生大善若大乘作法生善非少五石五芝通喻大小兩乘生事理善也補光句云又三種懺共除報障取相除業障無生除煩惱障記云三通三障釋言共除報障者此乃現報父母生身得六根轉報實在正助合行若但理觀雖入真似亦有不得六根淨者故言三懺共除報障也取相除業障者約出假説能扶宿世無量業種作度生緣業不能障於業自在名除業障以其未是真出假位故見俗諦名取相也無生除煩惱惑其義可知二雙釋理事二初明理懺理懺者若欲懺悔者端坐念實相衆罪如霜露慧日能消除即此義也注光明記三八云端坐者身儀也禪波羅密具出坐法須者宜檢念實相者懺罪觀也實相無相當云何念必以無念之念念無相之相以無相之相相無念之念若於念外別有實相實相之外別有於念則非此經念實相也衆罪等者滅罪所以也前念實相蓋體修惡即是性惡性惡照明斯為慧日修惡體虗如消霜露文補端坐解見十卷念無相之相者觀慧現前萬法皆如相無念之念者慧日高懸能消諸暗仁王云説智及智處皆名為般若皆名為實相四明云處即實相智是般若能觀之智與所觀之處同是般若智外無如也二皆實相境外無智也境智雙冥其狀如是又了惑即般若故言性惡照明光明記云以無念念念罪實相念與實相能所名別其體不二如是念之罪相既亡實相亦泯此慧如日消罪如霜露也體修惡即性惡者修惡即事造九界煩惱性惡即理具九界法門全性惡起修惡故體修惡即性惡也二明事懺二初正明五初懺悔二初正釋三初法二初滅惡言事懺者晝夜六時三業清淨對於尊像披陳過罪無始已來至於今身凡所造作殺父殺母殺阿羅漢破和合僧出佛身血邪淫偷盜妄言綺語兩舌惡口貪瞋癡等如是五逆十惡及餘一切隨意發露更不覆藏畢故不造新注晝夜六時等四句明首伏法殺父下明五逆罪殺音弒下殺上也妙樂八引俱舍云五並業障攝約處人除北約人除扇𢮎此云黃門敕佳反四身一語業三殺一處誑一殺生加行出佛身血無間一劫熟隨罪增苦增八比丘分二破僧以為所破僧具如補注九五釋記此示五逆並業障攝也唐譯俱舍第十七卷十二明三障何處有中云三障有無間非餘扇𢮎等少恩少羞耻餘障通五趣長行云且無間業唯人三洲非北俱盧餘趣餘界又三洲內唯女及男造無間業非扇𢮎等所以者何即前所説彼無斷善不律儀即是此中無逆之所以也𢮎與差同翻譯名義云扇𢮎或云扇茶此云生言天然而生男根不滿也有言北洲黃門二種於父母念子少於恩愛之心無重恩故縱使殺之非無間受苦也四身一語業等者俱舍云五無間中四身業一語業三是殺生一虗誑語根本業道一是殺生業道加行如行即方便也以如來不可害故破僧無間是虗誑語何緣名破僧因受果名或能破故無間一劫熟等者明破僧果熟時處論云此必無間大地獄中經一中劫受極重苦餘業不必生於無間若多作業罪皆於次生熟如何多業同感一生隨彼罪增苦還增劇謂由多逆感地獄中大柔軟身多猛苦具受二三四五倍重苦也八比丘分二等者俱舍云唯破羯磨僧通三洲八等論云要八苾芻分為二衆以為所破又云唯破羯磨通在三洲極少八人多亦無限通三洲者有聖教故要一界中僧分二部別作羯磨故須八人過此無遮故亦言等五分律云要於界內八比丘以上分作二部別行僧事乃名為破是中作主者一劫墮大地獄不可救有師標云北洲無佛羅漢僧又不識父母無殺逆事以除之扇𢮎縱殺父母思幼時割棄父母無恩故亦除之殺生加行者凡殺盜淫等業於一業中具有三種一加行二根本三後起且以三業論之如未殺前備殺生之具或至捆打出血但未盡命名加行罪若斷命根名根本罪斷命之後或稱量而賣及殺已埋棄等均後起業也八比丘分二者以在一處羯磨同修或至得果今誑言哄至他處致果不得成故約果論因其罪重矣罪增苦增者造一逆當一劫若至五逆則有五劫也翻譯名義云般吒翻黃門扇𢮎翻生與原注有異然此似指黃門説以父母少愛故殺非無間業若造餘三業即黃門亦當同報注光明文句中三云人從父母稟身十月懷抱三年鞠養撫念惟惟始能升頭戴髮教方教數始解作人那忽違恩背義而行弒逆天雖大不覆此人地雖厚不載此人此人命終直入地獄文記此別示為父母而行弒天地之不能容其受生故須入地獄也謂人生天地之間莫不從父母以稟其身然人稟父母有身而母恩尤為重也何者如古云懷耽十月居娘腹乳哺三年費苦心痘瘖固然驚破膽些須小病亦勞神可見母恩最重也撫拍也惟惟憐子專切之意教方教數是禮記篇名則云六年數之數與方名數者一十百云萬億也方者東西南北上下也是則父母為子廢寢忘餐唯欲長大成人榮宗耀祖若為子者不念劬勞之德全違恩義之心乃以父母邊而加之白刃豈天地所覆載乎是故命終直入地獄更何疑焉注十惡中應明殺生釋十惡名如法界次第上九云云口有四惡或云五者加無義語記此明十惡也初二句出文説略殺生一惡次二句指釋十惡之文言十惡中首即殺生儀文脫略故云應明法界云一殺生斷一切衆生物命二偷盜盜他財物三邪淫於非妻妾而行欲四妄言以言誑他五兩舌鬬搆之言間他致令得失分乖六惡口惡言加被令他受惱七綺語綺側語辭言乖道理八貪欲引取順情塵境心無厭足九瞋恚若對違境心生忿怒十邪見撥正因果僻信邪教次應出四重五逆七逆謗方等經用僧鬘物作闡提行乃至十六惡律儀等諸輕重業科目皆從十惡中離合分別其粗細而説者今欲論諸入道要門故此並具明也末三句明口業之惡或四或五諸家開合之不同耳注發露者要旨四云罪根宜露則衆罪皆滅文若不發露犯覆藏罪如律中説記要旨云懺悔者謂發露衆罪也何故爾耶如草木之根露之則枯覆之則茂故善根宜覆衆善皆生惡根宜露衆罪皆滅如戒本云若有罪當懺悔懺悔則安樂次明不露犯罪戒本云不懺悔罪益深莫輕小罪以為無殃水滴雖微漸盈大器末句指治覆藏準光記云對治有四法一治覆藏情過謂梵云波利婆沙此云覆藏或言別住謂別住一房不與衆僧同處設入衆中不談不答行此法者須滿一百日不憶元覆藏日數故乃以百日為限二治覆藏罪謂犯已覆藏得吉羅之罪不覆藏得僧殘若覆藏者先懺吉罪後與別住三治僧殘情過罪謂六夜行摩那埵此云善喜前但自意歡喜此亦使衆僧歡喜由前喜故與其少日即六夜也故云意喜僧衆歎曰此人改悔成清淨故僧衆喜也四治僧殘謂二十僧中白四羯磨出罪然覆藏不經明相直行摩那埵然後入衆出罪或半月作法者謂行別住時每至半月説戒須白衆僧云我犯僧殘對首作法者懺重吉也責心者懺輕吉也摩夷論云故作者對首一説誤作者責心而悔也注畢故不造新者斷相續心也已作之罪願乞消滅未起之惡更不敢造記言畢故者懺其前愆也不造新者悔其後過也二生善若如是則外障漸除內觀增明注若如是等者光明文句中云若純用正懺亦不須助若正道暗昧不明了者修助以助之所謂灰汁澡豆皂莢木槵以助清水爾文記此明正助兼修是故生善獲益也言外障漸除者助道之功也內觀增明者正修之力也前明正助內以三觀為正外以五悔為助今此即懺悔一法而分正助之殊謂無生理懺為正作法等事懺為助也若於五逆十惡等罪過去業根既深今生難以頓拔是故正道暗昧不得速成故須修助以助之所謂下引喻發明助道之能也二喻如順流舟更加櫓棹豈不速疾到於所止注如順流舟等者光明文句記三十二云正解如順水正觀如順風可喻正道能趨妙理篙棹可喻旋禮等善助於風水舟豈不疾文記此節立喻顯明如文可見三合修圓行者亦復如是正觀圓理事行相助豈不速至妙覺彼岸記此節舉法合譬也謂以旋禮之櫓棹助於觀解之風水則正道之舟剎那而至彼岸可謂運力於一時成功於頃刻也二斥非二初總斥莫見此説便謂漸行謂圓頓無如是行謬之甚矣注此斥偏執理性無修證者謂即心是佛若加修習則成漸次非圓頓行輔行七下十八云圓教位次者先明五悔為入位之方他人圓修都無此意將何以為造行之始但云一念即是如來空談法界委檢心行全無毫微文記此釋斥執也初句總明斥執次四句出能執情輔行下明圓融行以斥偏執意謂此偏執理性之人但有言説都無實義所謂聽其言也超乎三賢十聖之前撿其行也落於盲龜跛鱉之後欲誰欺耶是故言過于行者君子耻之二別斥二初明無因有果斥何處天然彌勒自然釋迦輔行七下二十二引彌勒問經云彌勒昔行菩薩道時但晝夜六時勤修五悔而得菩提文記彌勒問經云佛告阿難彌勒往昔不修苦行但修善巧方便安樂之道積習無上正等菩提阿難言云何名為善巧方便佛言彌勒昔行菩薩道時但晝夜六時勤修五悔而得菩提輔行云彼經悔文有三十二行亦無別列五悔辭句但數數請佛數數説悔餘三亦然如言有罪悉懺悔是福皆隨喜我今請諸佛願成無上智是也注彌勒釋迦既是果人由因克故非天然等也記比承經意而言古今諸佛原是從因尅果非天然而有也注謂今天台建立解行了修即性全性起修正助兼行從因至果故清涼國師云撮台衡三觀之玄趣使教合忘言之旨心同諸佛之心不假更看他面記此示台宗建立解行之妙也且如止觀一書要在解行解則解於諸法本真行則立行定境修觀故十章中前六章以生妙解第七方便正修是為所建解行也今言了修即性者解也全性起修者行也如十不二門云性雖本爾藉智起修由修照性由性發修指要鈔云性雖具足全體在迷必藉妙智解了發起圓修故言性雖本爾藉智起修由此智行方能徹照性德而此智行復由性德全體而發若非性發不能照性若非徹照性無由顯故由修照性由性發修是知了修即性全性起修即圓解行而行有正有助或先正後助或先助後正今者正助兼行正觀圓理事行相助如順流舟更加櫓棹豈不從因至果到於妙覺彼岸耶故清涼下指賢宗巧用今家解行妙義以淘南北二宗之禪説也台即天台指智者大師衡即衡嶽指思大師皆宗三觀玄趣而疏文撮以釋經言三觀玄趣者大懺悔以中為趣莊嚴以俗為趣罪福無主以空為趣名為玄妙之趣也使教合忘言旨者言教契于佛心也心同諸佛之心者禪心合于教意也不假更看他面者瑜伽云不觀他面不看他口於此正法毗奈耶中一切他論所不能轉意云既自通達不隨他語亦不看他顏面別覔一句一偈謂是忘機之法門以依法不依人故也二舉謬執能所斥二初舉謬計二初計所執法若才聞生死即涅槃煩惱即菩提即心是佛不動便到不伽修習便成正覺者注舉所執之法須知理雖平等事有迷悟何得便謂即是不加修習凡言即者以顯於離如冰不離水理須融冰義同於離記此節勸知事理有離即之旨古德云衆生即迷中諸佛諸佛是覺悟衆生則迷昧凡夫望覺悟聖人霄壞難以喻其高低何得便謂無修無證儼然古佛耶又復當知見凡即之一字以顯離義假如池中之冰不離池中之水是為即義若欲成水理須融冰是為離義也故曰識冰池原是水賴陽氣以消融悟自心即是佛假觀行以修成烏可妄執耶二計能執情十方世界盡是淨土觸向對面無非覺者注十方世界盡是淨土此是依報論即觸向對面無非覺者此是正報論即謂三土皆即寂光九界無非佛界理實如然非修莫克故即云記此明能執之情計不亡所謂執藥成病也若云當人本有妙性天然離諸名相本來無有世界衆生則何依何正何覺何迷如是説十方世界盡是淨土者早是穢矣觸向對面無非覺者者迷之久也何者因聞相即之語便計即為究竟雖祛於腥則又附於羶矣淨何嘗真淨覺豈是真覺縱謂三土即寂光九界是佛界亦是如理之談又何能以清淨法身而於常寂光中得大受用耶故云非修莫克言其理雖如是當須依理起行依行入證若非造修莫能克證得也故即云者即指下節連屬之文也二約教斥二初判屬理即二初明有體今雖然即佛此是理即注妙安上十三云然理即佛貶之極也以其全乏解行證即但有理性自爾即也文記此正明理即但有其體也引妙宗者以釋理即之所以也衆生即佛從因至果其義有六所謂理即佛乃至究竟即佛也今但言理即者貶斥之極也以其全缺名字之解即觀行相似之行即分證滿證之證即後之五即絶分但有前之理性而稱即也言貶之極者具有二意一者當人妙心體具三千性相百界千如心佛衆生三無差別當體即是如來藏性凡愚不知自生退屈高推聖境不達本具如來藏性為説理即佛者令其不生退屈故也以其乏後五即故云為貶極也二者外道邪見少有薄解自生滿足莾蕩撥無為説理即佛者以其全然具縛乏後五位是故謂之貶極也二明無用亦是素法身無其莊嚴何關修證者也注無緣了功德莊嚴法身體素天龍之所忽劣記此正明但有其體而無其用也蓋佛乃兩足至尊故令天龍恭敬八部圍繞今言理即者但有正因理心全無了因慧心緣因善心無慧心則無智慧莊嚴無善心則無福德莊嚴無智慧不能説法無福德不有相好又無智慧則無報身無福德則無應身既無福慧二嚴又缺報應二身雖云理即是一素法身佛而已由是天龍之所忽劣焉二重斥所計我等愚輩才聞即空便廢修行不知即之所由鼠唧鳥空廣在經論尋之思之注重斥所計鼠唧鳥空者止觀八七云諸位全無謬謂即是猶如鼠唧若言空空如空鳥空文輔行八上十一云一達諦理謬説即名何異怪鼠作唧唧聲即聲無旨濫擬生死即是涅槃亦如怪鳥作空空聲豈得濫同重空三昧文此斥執理廢行之者所謂即之所由意開妙解而立妙行行可廢乎記此正斥執理廢事知文不達義之愚也言我等才聞等者是引己斥人意所謂責人須責己也鼠唧鳥空者喻顯不達義之愚類此注中初句是斷文意次句是標辭引止觀是正釋引輔行是重釋言鼠唧者有一類鼠常作唧唧之聲全無即之妙旨以況計執之徒妄計理即為妙而不了即之所以妙也鳥空者有一類鳥常於空中作空空聲雖謂空空豈得濫同重空三昧之空空耶此斥下玉師發明初句明上二釋文意所謂下明即所由意謂開解立行如有目而有足目足兼資寶所得到而行豈可偏廢乎補重空者以我我所不可得名之曰空并此空體亦不存故曰空空釋懺悔竟二勸請二勸請者勸請十方諸如來留身久住濟含識注輔行七下十九云大為二意一者請住於世二者請轉法輪記此明勸請之意有二也其第一者即所謂諸佛若欲示涅槃我悉至誠而勸請惟願久住剎塵劫利樂一切諸衆生是也其第二者十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪是也補止觀云勸請者名為祈求聲聞自度直讖己罪菩薩愍衆行道故須勸請我今知罪尚不得脫衆生不知歷劫流轉我無力救請十方佛佛憫衆生不簡巨細必冀從願注大論十五問諸佛之法法應説法何須勸請又若諸佛現見在前請佛可爾今乃不見云何可請答佛雖必説而不待請請者得福何得不請復次佛法應須待請為説又衆生雖不面見諸佛諸佛何嘗不見其心聞其所請假令諸佛不聞不見請亦得福何況聞見而無益耶記此引大論料簡問意而有二也初問諸佛法爾説法何必待請二問衆生不見諸佛請之何為答中亦二先答初問復二一為請者得福猶如大王雖多美膳若有請者必得恩福録其心故是故有益故當請二為佛法待請方説故當請次答二問亦復有二一為諸佛能聞其請故當請二為佛縱不見請亦得福故當請也釋勸請竟三隨喜三隨喜者隨喜稱讚諸善根注輔行七下二十云佛轉法輪衆生得三益我助彼喜者喜前勸請也過去下種現在重聞得成熟益未曾下種現在成種未來方益故三世益皆因法輪故我隨喜衆生得益要旨云隨他修善喜他得成文記此釋隨喜他人之益成也初四句標釋三益而喜次六句正釋三益所以言三益者即種熟脫之三益也如過去下種現在成熟未來解脫現在下種未來成熟未來未來解脫蓋大勢威猛三世益物故法輪轉處能令衆生得三益也次四句結釋要旨下證釋也補隨喜者十方一切諸衆生二乘有學及無學一切如來與菩薩所有功德皆隨喜問隨喜有何功德大論云譬如妙香一賣一買傍人在邊亦得香氣於香無損二主無失止觀云能化受化及隨喜者三善均等觀衆生惑甚可悲傷觀衆生善應大恭敬此中隨喜是慶彼止觀云法華隨喜法大品隨喜人人法互舉耳釋隨喜竟四回向四回向者所有稱讚善盡回向菩提注止觀七三十云回衆生向菩提一切賢聖功德廣大我今隨喜福亦廣大衆生無善我以善施施衆生已正向菩提如回聲入角響聞則遠回向為大利文備此釋第四回向義也初六字標釋回向菩提次八句正釋回向菩提後三句以喻顯回向之大利也如云十方一切諸衆生藏通有學及無學聲聞緣覺四教佛一切菩薩諸善根所有功德諸廣大我今隨喜福亦大我雖有善衆無善以我隨喜善施彼願與法界諸衆生回向無上正等覺是也注輔行七下二十一云如回聲入角等者大論三十二云回向者如少物上王如回聲入角問菩薩功德勝於二乘有何奇特答今此不以功德比之但以隨喜回向心比如巧匠指示倍得價直執斧之人倍用功力直不足言聲聞自行如執斧者菩薩教他而行回向猶如大匠文記此明輔行引論以釋回向為大利也如大論云菩薩以隨喜心福德果報回向供養諸佛過聲聞辟支佛布施如人以少物獻上國王得報甚多又如吹貝用氣甚少其音甚大又問云諸佛次之有菩薩菩薩次之有支佛聲聞今菩薩欲求過聲聞支佛人布施等有何奇特答今不以二乘施戒等福德比菩薩功德但以隨喜之心能超勝彼何況菩薩自行功德二乘勤身力作功德疲勞菩薩默然隨喜智慧之力所有福德能過其上譬如大匠但以智心指授而去執斧斤者疲苦終日計工受賞大匠三倍又如征伐鬬者死而主將受功也注要旨六云所謂回事向理回自向他回因向果文記所謂隨喜懺悔諸善根回向衆生及佛道願將以此勝功德回向無上真法界也補回事向理者如六度等行苟不回此以向實理則行成有作事屬緣修成凡夫淺行三藏事度故須回向了達雖彈指散華低頭合掌皆全性起修禮侔法界故凡所修福功不唐捐一禮一懺罪消塵劫一施一戒功等虗空也回自向他者昔迷理遍其所修善莊嚴自身及己眷屬今順本性向於衆生也因回向果者一毫善種三業熏修不趨二乘寧滯三有修既順性則成緣了二因因必顯真同歸究竟三德所謂我今發心不為自求人天福報乃至願與法界衆生同得菩提是也釋回向竟五發願五發願者若無發心萬事不成故須發心以導前四注止觀七三十云願者誓也如許人物若不分券物則不定施衆生善若不要心或恐退悔加之以誓又無誓願如牛無御不知所趣願來持行將至所在如壞得火堪可盛物二乘生盡故不須願菩薩生生化物須總願別願四宏是總願法藏華嚴所説一一善行陀羅尼皆有別願一切諸願四宏攝盡故名為總故知一切菩薩凡見諸佛無不發於總願別願記此釋誓願文中有二初二行正釋誓願願者誓也者此以誓訓釋願義然自制其心為之誓志求滿足乃稱願是則要制其心以固其願故以誓釋願也四宏是總者大士運心廣普依無作四諦起四種宏誓了陰入皆如無苦可捨而云衆生無邊誓願度了塵勞本淨無集可除而云煩惱無數誓願斷了邊邪皆中正無道可修而云法門無盡誓願學了生死即涅槃無滅可證而云佛道無上誓願成是也法藏別願者輔行云法藏是彌陀因名於世自在王如來所聞説二百一十億佛剎發願又大彌陀經為欲攝取諸淨土故發四十八願地為六動為佛所記是也華嚴別願者淨行品有一百四十一願初云菩薩在家當願衆生知家性空免其逼迫等是也釋發願竟二結成是為五悔補若能勤行懺悔助開觀門一心三諦豁爾開明如臨淨鏡遍了諸色於一念中圓解成就不加工力任運分明正信堅固不動此名深信隨喜心初品弟子位也三例後悉宜懺悔下去諸位直至等覺總用五悔更不再出例此可知注光明文句中四云當知懺悔位長其義極廣云何而言止齊凡夫是故五十校計經齊至等覺皆令懺悔即其義也文記校記經云佛言常持五十校記還自慚是謂不失行不自慚者常失佛説已諸菩薩名自慚自悔各自念滅盡非常苦空非身此證義廣位長也注記三十三云從造無間業者上至圓教等覺故云位長位位橫論各有三障煩惱頭數結業流類果報等差故云義廣古人何謂但在凡夫大師本以三昧總持説懺悔位該亘凡聖自然與校記經合實匪尋經作此安布行者知之文記此引釋位長義廣也如光明記云位位不出四土四土論三障者分段三障見思為惑障有漏業為業障界內生死為報障是為同居土之三障也方便土三障者塵沙為惑無漏業為業變易為報實報三障者無明為惑亦有漏亦無漏業為業彼土變易為報寂光三障者約分證説無明為惑非有漏非無漏業為業變易生死為報若究竟寂光無報則不説也古師明懺悔位謂鄙濁凡夫應須懺悔離垢清淨者何用懺悔故此斥之也補總用五悔者光句云十信雖三智圓修但是方便陀羅尼十住已去乃至等覺如十四日月光未頓圓暗未頓盡應須懺悔滅除業障記云十信尚懺況爾前耶但是等者法華説三陀羅尼須通初後以位約之其相最顯一旋陀羅尼旋假入空此齊七信二百千萬億旋陀羅尼旋空出假當八信已上三法音方便陀羅尼以二觀為方便轉入中道法音當十信也輔行先明五悔為入品方便品品皆修五悔五悔雖屬事行皆與理觀相應所謂懺悔見罪性本空勸請知法身常住隨喜了福等真如回向順空無相願發願達能所平等以是而知行行皆能顯理豈道拘拘唯事相而已耶言行者知之者當知此懺悔法門究竟非淺位事不可直作粗鄙而觀於中而有二義一者須知懺悔通至等覺不可謂是只凡夫事此誡增上慢人也二者上至等覺尚須懺悔何況我初心之人若不懺悔障何由除惑何由破此進初心墮志人也釋大科初隨喜品竟
