body:
  text: 高麗沙門諦觀錄南天竺沙門蒙潤集註清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦閑編科參梓二聖三初標科列位次明聖位亦分三一見道初果二修道二三果三無學道四果註四教義云通名聖者聖以正為義捨凡性入正性記四教義云苦忍真明捨凡性得入聖性真智見理斷於同類之因故名聖也註初果見理破惑名見道二三果去重慮緣真名修道四果惑盡名曰無學文句八四云研真斷惑名為學真窮惑盡名曰無學文記此明四果三道之義也初果名見道者謂初果人破八十八使見惑最初見真諦偏空之理故云見道也二三果名修道者謂二三果人重起緣慮緣前所見之真斷諸欲界思惑盡進斷上地之思是乃帶果修因故名修道也四果名無學道者謂四果之人斷除三界惑盡於諸所作更無可學故名無學道也文句下證釋無學謂正在空觀研真以一切智斷惑正云斷妄妄猶惑也真與妄有所未窮名之為學即前三果也若其所研之真已窮所斷之惑已盡於諸學事更無可學故名無學也然此約當教以明學若望後教遠則遠矣註然初果位從世第一後心苦忍真明或云苦忍明發即欲界苦諦下苦法忍也明發即苦法智也謂真智明發也於八諦下發八忍八智總十六心有門以十五心名見道為初果向十六心是修道初果攝㭊玄空門以十六心名見道為初果二果去方屬修道宗計不同不須和會今家雖多用有門高麗師欲令易解且準空門註見道是初果也記此明初果對見之意也初三句明初果所從於諦發十六心而有二說初謂苦忍真明者即欲界苦諦下苦法忍也次謂苦忍明發者即欲界苦諦下苦法智也然忍為因智為果此分忍智因果言之謂世第一後心真智明發也備辨訛曰二果去方屬修道句當知空有二宗只諍在一剎那間而空宗雖以十六心為見道當知過此十六心仍屬修道豈二果去屬修道耶私謂註解本同惟二果去字面稍晦故辨明之也辨訛又曰且准空門句當知觀師一往約果判云初果乃是見道二果已去乃是修道非准空門也私謂此判既與空門同謂之準空亦可註八忍八智者俱舍頌云前十五見道見未曾見故世第一無間即緣欲界苦生無漏法忍忍次生法智次緣餘界苦生類忍類智緣集滅道諦各生二亦然此明十五心見道未曾見也謂見道所見之理名未曾見也以從來不曾見而今始見故也若修道修見之理則可謂見中曾見過也言無間者有二義一者以其剎那頃即入初果也二者唯繫緣于無漏真空之理不令餘念間入故云無間也言忍次生智者此十六心原在一時發起有何次第今言次者以無次第中而論次第也備辨訛曰各生二亦然準論二字應四字以苦諦下有法忍智二類忍智二集滅道三諦下四種亦然私謂二四字面雖異而意則同十五心見道者論釋言苦法智忍為初道類智忍為後其中總十五剎那皆見道所攝見未見諦故至第十六道類智時無一諦理未見今見如習曾見故修道攝此二句頌本在後下世第一無間等句頌本在前無間者論云從世第一善根無間即緣欲界苦聖諦境有無漏攝法智忍生又云此忍無間即緣欲苦有法智生如是復於法智無間緣餘界苦有類智忍生最初證法真理名法智此後境智與前相似故得類名緣餘三諦各四亦然上皆論文世第一後心任運緣於四諦而生忍智與前忍位中作意緣四諦不同蓋十六心雖一時頓發然忍能斷惑智能證理亦必任運緣于四諦也補言忍因智果者謂忍能斷惑智能證理由惑斷而理方顯故忍為因智為果也亦名無礙者即無間道謂初果依八忍能斷八諦下迷理之惑此八忍不被見惑之所間隔名無間道解脫道者謂初果依八智能證八諦下無為之理此八智已離惑縛名解脫道也出㭊玄記備苦法忍者苦謂欲界生死苦法即真如理忍即忍可亦印證義也謂於煖頂忍世第一中因觀欲界生死之苦至世第一後心真如理顯生無漏法忍是名苦法忍苦類忍者色無色苦是欲界流類又觀上二界苦是欲界流類又觀上二界苦亦生無漏法忍名苦類忍苦法智者智是能證真如之智謂欲界生死之苦真智明發證真如之理名苦法智苦類智者又觀上二界諦真智明發是欲界苦法智之流類名苦類智下集等三諦可知出三藏法數苦法忍者以行人迴光返照的向苦上研求落處但見其空無常無我安有苦相可得即將不可得理忍可於心故名苦法忍也苦法智者即以空觀研之既深則真如之理自得現前明了故名苦法智也上界言類忍類智者類者比也謂行人欲觀上界之苦當須以欲界之苦法比類而知也註七聖位對三道四果及向次第超越住果勝進委如妙玄四教義明今圖示之記下詳辨四果位次名義入道功能今欲易明故先以圖示之記此圖但略示其對位名義若欲具知當閱玄文四下及四教義三今略錄四教義文以明之如四教義云七聖位者一隨信行二隨法行三信解四見得五身證六時解脫七不時解脫就此七聖位分為三道所謂見道修道無學道也一見道者即是八正道見理斷見諦惑至十五心如破石方便也二修道者即是七覺分隨觀諦一所斷思惟如斷藕絲方便也三無學道者如前分別真智見理既極三界正使已盡無惑可治不須更學也一明信行位者即鈍根入見道名也言鈍者謂非自智熏憑他生解故也是在方便道先雖有信以未發真不名為行行以進趣為義從得苦忍真明十五剎那進趣見真名隨信行乃至言是信行人見道十五心亦名八人地八忍具足智少一分即是須陀洹向亦名行中須陀洹也二明法行位者即利根入見道名也言利者自以智熏見理斷結故也本在方便道中能自用觀智觀四真諦法但未發真不名為行因世第一法發苦忍真明十五剎那進趣見真故名法行乃至云但鈍根憑他生解智少觀察若利根以自智多觀察為異耳三明信解者即信行入修道轉名信解鈍根憑他起信進發真解故名信解也此信解人證果有三一證須陀洹果者第十六道比智相應即證也若見使斷略說三結盡廣說八十八使盡名須陀洹受生死七返終不至八生二證斯陀含果者有二種一向二果一向者從初果後心更修十六諦觀七覺支菩提行現前即此世無漏斷於煩惱一品無礙斷欲界煩惱一品二品無礙斷煩惱二品乃至五品皆是斯陀含向亦名勝進須陀洹約此說家家也二果者若斷六品盡證欲界第六品解脫即斯陀含果三證阿那含者亦二種一向二果一向者若斷欲界七八品皆名阿那含向亦名勝進斯陀含約此說一種子也二果者以九無礙斷欲界結證第九解脫即阿那含果復次須陀洹有三種一行中須陀洹即是須陀洹向二住果正是須陀洹果三勝進即是勝進須陀洹亦名家家即斯陀含向也斯陀含但二種一住果二勝進勝進斯陀含亦名一種子阿那含亦二種一住果二勝進勝進者進斷上五分結即阿羅漢向也阿羅漢但一住果若據毗曇超越得果者謂凡夫時斷欲界六品乃至八品盡來入見諦道後發苦忍真明十五心中是第二果向十六心即證第二果也若在凡夫時先斷欲界第九品乃至無所有處盡後入見諦十五心名阿那含行第十六心即證三果此是超越人不證前二果也四明見得者法行轉入修道是名見得是人在思惟道中次第證三果超越得二果亦如信解中分別但以利根不藉聞法不假眾具自能見法得理為異也五明身證者還是信解見得二人入思惟道用無漏智斷五下分結故發四禪四無色定即用共念處修八背捨八勝處十一切處入九次第定三空定事性兩障先已斷盡又斷非想事障滅緣理心心數法入滅盡定得此定故名身證阿那含也所以者何以入滅盡定似涅槃法安置身內息三界一切勞務身證受想滅故名身證也若約初果解身證者但以先於凡夫用等智斷結得四禪四無色定後得見諦第十六心證第三果即修共念處還從欲界而修背捨勝處一切處入九次第定成身證也是阿那含乃有二種一住果但是那含二帶果行向即是勝進阿那含也猶名那含行向故即是羅漢向攝故智論言那含有十一種五種正是阿那含六種阿羅漢向攝當知此身證阿那含即是勝進阿那含阿羅漢向攝五種般那含七種般那含皆但有上流般八種般那含但有現般無色般也如是阿毗曇約信解見得分別而數乃至有一萬二千九百六十種廢說本旨豈煩分別六明時解脫羅漢即信行鈍根待時及眾緣具方得解脫名時解脫而有五種不同謂退法思法護法住法必勝進法也彼得二智謂盡智無學智等見也若用金剛三昧於非想第九品惑盡次一剎那證非想第九解脫成盡智次一剎那得無學智等見也彼或時退故不說得無生智此五種羅漢是信種性根鈍因中修道必假衣食牀具處所說法及人隨順善根增進不能一切時所欲進也是五種羅漢各有二種不得滅盡定是慧解脫得滅盡定是俱解脫若不得滅盡定是人因中偏修性念處觀不修共念處觀若得滅盡定者是人因中修性念處觀亦修共念處觀若證果時三明八解一時俱得故名俱解脫也七明不時解脫阿羅漢者即是法行利根名不動法羅漢也言不時解脫者不動法人一向利根因中修道能一切時中隋其所欲進修善業不待眾具故名不時解脫是人不為煩惱所動故名不動是不退義成就三智故謂盡智無生智無學智等見能用重空三昧擊聖善法以定捨定故言能擊也補是不動阿羅漢亦有二種不同一不得滅盡定名慧解脫二得滅盡定即俱解脫若聞佛說三藏教門修緣念處即發四辯名無疑解脫是名波羅蜜聲聞能究竟具足一切阿羅漢功能也問時不時二人利鈍不同云何並得俱解脫耶答此簡鈍利明得有難易之殊何關簡得與不得耶此之七聖名奠沙門沙門有二種一者直言沙門即因也二者沙門那即果也沙門有八十九謂見諦八忍思惟八十一無礙也沙門那亦八十九謂見諦八智思惟八十一解脫也沙門那復有二種一有為果八十九有為果也二無為身八十九無為果也此二者約智斷而論也約智德明八十九有為果約斷德明八十九無為果也二斷惑階梯四初預流果一須陀洹此翻預流此位斷三界八十八使見惑見真諦故名為見道又名聖位註預流者預入聖道法流金剛云入流或翻逆流逆生死流也㭊玄下八名抵債不受三途業債故記此釋預流之義也謂斷三界等者約逆流而言即四流中逆見流也得果證者約入流而言即入八正道流也故有二義一者生死流須陀洹人即逆此流惟眾生順之也二者道流須陀洹人順入此流眾生逆之而未入也㭊玄名抵債者如羅漢先直取道未遑償業故名抵債優婆塞戒經云若負三寶物人正事修道欲求須陀洹乃至阿羅漢者則不須償也不學道應急償也準此則知見道聖人了知業債本空求其償處了不可得故名抵債也註斷三界八十八使者何故婆沙論云二十八使見道斷餘六十使修道斷耶先達云有二種根性若等觀四諦者見道斷八十使若不等觀四諦者見道中唯斷三界苦諦下二十八使餘三諦下見隨修道斷乃是鈍根記此釋斷見惑有二種不同也註中舉婆沙意為問者以婆沙問云何故波羅伽那作如是說八十八是見道十是修道斷彼作是答二十八決定是見道斷十是修道斷六十不定者於見道中而有差別波羅伽那說次第故說八十八使是見道斷十是修道斷是則註中乃舉其答意而為問端也今又舉古明有二種根性為答者即二種根性以鈍根隨修道斷餘三諦下見惑釋論意以利根等觀四諦釋今斷三界八十八使見惑文也備辨訛曰先達言一節據舊婆沙四十末九十八使二十八使見道斷十是修道斷餘者若凡夫修道斷若內教弟子是見道斷又四卷言二十八法定見道斷六十不定不定者於見道中而有差別既以凡夫對佛弟子說則佛弟子於見道中頓斷八十八使修道斷餘六十也舊婆沙指凡夫而說信無疑矣二一來果二斯陀含此云一來此位斷欲界九品思中斷前六品盡後三品猶在故更一來註此果斷欲界九品思惑前之六品於初果之後此果之前須論家家今先明欲惑潤七番生死次通示超次根性後別釋家家之義記此明二果所斷功行名義不等故須論之先定三意也如金剛疏釋此人名為一來者謂從此死後一往天上一來人間得盡眾苦大論言息忌伽彌息忌名一伽彌名來四教義翻言薄前斷已多其未斷少名薄今文釋此名同大論義合四教儀註云此果斷欲界九品思中前之六品也若準空門位次則應於初果斷見惑之後二果斷六品思之前或斷四品須三生二生家家儀文雖略今註補出是以先則通明欲界九品思惑共潤七翻生死次則通示四果及佛有超斷次斷之根性然後別出二生三生家家之義也此先略標下文逐一解釋註惑有麤細故分九品無漏智力故經七生所以須七生者如輔行成引論云於七世中無漏智熟如服酥法七日病消如歌羅邏七日一變如親族法限至七代如七步蛇四大力故行至七步蛇毒力故不至八步惑力至七道力非八婆沙云應云十四何故云七答中有本有數不出七故但云七乃至若總論生應云七人七天十四中有合二十八生且依前說不出七故故但云七記此釋上欲惑潤七番生死也然惑潤多番生死者為細少者為麤故以惑麤細成九品而潤生死成七番也所以下出其須七生之故輔行引成論文者即成論分別賢聖品云極七有者是人於七世中無漏智熟如歌羅邏等此言凝滑狀如凝酥七日變成又如服酥等極至七日堅病則消如七步蛇者心地觀經云或有菩薩以彼五欲而為恐怖譬七步蛇當害人時毒力熾盛行過七步即便命終也婆沙答文中言中有本有者如人現前之身名本有身死後即受中陰之身名中有身於中有身中投托父母或生人間天上鬼畜之中名後有身也補輔行云初果生死極至於七定不至八故名七翻不必一切盡至于七楞伽云下者至七中者三五上者即生而入涅槃四教義云須陀洹受生死七返終不至八生集論云極七返有者謂即預流於人天生往來雜受極至七返得盡苦際補任斷下即止觀引舊婆沙對超論次文詳引在後次斷解下次斷內前任斷經生謂經七番生死而盡損惑今次斷則以一生中斷二必三斷五必六為斷惑損生也備辨訛曰任斷下引止觀對超所論之次句當知是次斷非關任斷也詳論在後補此次斷超斷二圖示上所言次通示超次根性之義也本斷超下六行觀者厭下苦麤障欣上妙勝離也隨其品數多少至無成根緣者謂隨其本在凡地時以世智伏思惑品數或多或少今入十六心超果不同若本斷五品四品今但名初果本斷六品今但二果向本斷七八品今名二果本斷九品今超證三向問斷九品應證三果何以只名三向耶答以彼在凡地用有漏智智弱故須抑退一位故但名三向也雖本地斷上界惑得非想定應超證四果向今但極至三果也既以有漏智斷惑則無成根緣以有漏智不能成無漏根故若無成根緣容或退歸見道等位則不止三生矣故闕此緣不論家家備辨訛曰斷超下無成根緣句文中既說入十六心超果不同可知亦有從十六心後緣四諦修成無漏根云何說無成根緣耶私謂外道本性斷思後斷見故入十六心時即超證果時似不論十六心後也故言無成根緣辨訛又曰小超下乃至無學向果句若超至無學是大超非小超也論解見下節註任斷者此人非全無觀行但不及次斷勤加功行耳記此釋任斷名也意明此任斷有少觀行雖不及次斷加功斷惑亦能依觀任運除妄故名任斷也註次斷者雖異任斷乃對超斷越次得名記此釋次斷名也意謂此人異乎前之任運斷惑者既然次斷之人加功進行斷惑損生是乃對後超斷人斷見惑時即超證二三果乃至四果超其次第故今次斷人得初果已雖云起大加行斷二必三斷五必六未能超越位次故得次斷名也註本斷超者輔行六上十云本得非想定即是已斷下八地思至十六心應名阿羅漢向但名阿那含者以凡地時有漏智弱但名那含若本斷九品今名三向若七八品得名二果斷六品等名二果向斷五四等但名初果文須抑退者意令此人此生必定起無漏聖道故文出俱舍記此釋本斷超名也輔行下引文釋明本斷超之義須抑退者下出其抑退一位所以意明抑之者實進之也文出俱舍者陳本第十七卷頌云利鈍根二人于中信法行若已滅修惑于初果道向乃至滅五品向二滅九前離欲上色界則向第三果補次斷與斷超何異以次斷之人斷見惑得初果已後次第進果次第斷惑三緣具足論家家種子斷超之人在凡夫時見思全伏至十六心滿超果不定備有師標云既得非想定何故但斷下八地思不斷非想地思耶以內弟子得其地定即破其地惑外道先得其定未破其惑故雖得無想止破下地思也又辨訛曰此節文雖出輔行然違俱舍當知論中未起勝進道名住果非向不論超證次斷悉皆十五心名向十六心名果縱斷上地七十一品十六心時但名阿那含果以未起勝進道故是以止觀超次斷辨則次斷名向超斷不名向也問若住果不名為向則輔行若本斷九今名三向斷六品等名二果向云何通答此是荊溪約抑退意立名俱舍婆沙無此名目讀者幸勿以辭害意私謂止觀超次對辨專指小超其判本斷超中有隨以世智斷之多少句則三向二向已含於中故荊溪約意分判耳註小超者止觀六九云若凡夫地未得禪十六心滿超能兼除欲惑諸品或三兩品輔行云應云三四或恐文誤或婆沙不同即是家家一種子等即是小超文及前文云超斷至五品名家家乃至八品名一種子文記此重引止觀超斷以釋少超前文即上所引釋少超之前文補止觀中家家種子在前故曰前文會本六上二十如超次對辨後明小超故下言下文會本六上四十玉師因宋代諸師錯執止觀中小超與次斷對辨之文將謂小超一類只能超至一種子故註家引輔行力辨小超其類非一亦有至無學果也註輔行六上釋云今文中言超斷者只是下文小超之人此定止觀超斷屬小超也記此引輔行釋明重引止觀之文而有三節此一節會超斷是小超今文即今重引止觀之文下文即指上所引止觀正釋小超若凡地未得禪等文以其在下故指為下文所以引輔行釋者即釋超斷至五品名家家乃至八品名一種子之文今文中言超斷者即是下文明四超中小超之人也下文者以止觀中明超斷之文在前小超之文在後故也註本在凡地未得色定或修欲定欲惑未斷此人至十六心超斷五品名為家家此之五品同四品故此文別釋小超中斷五品惑論家家者一種人也不可據此之文通定小超之人皆未得色定如止觀云若凡地未得禪若已得禪豈止三向蓋小超人其類非一記此一節文輔行別釋小超中論家家備五六共潤一生故超斷五品退一位同四品也註隨其本斷品之多少而得名為家家種子及以無學向果等名此文通釋少超超果不定蓋止觀文明小超人至一種子義猶未盡故此點云隨其本斷等也蓋隨其小超本位斷惑品數多少則斷五品名家家多則乃至極果則知小超不可惟局三果向也故止觀云十六心後即有一念超果至那含或超至羅漢記此引輔行通釋小超超果不定意也文中示其超果不定推知不局三向故止觀下證明超果不定也備辨訛曰此引止觀文未恰當知此論小超在十六心中隨斷惑品多少論不在十六心後不可將十六心後答超斷思惑之文來證十六心中也私謂此等超果之人似應攝歸小超否則遺漏存俟後定註問小超若超至四果者止觀何故但云若凡地未得禪超能兼除欲惑諸品補除欲惑諸品不過二三果而已何能至四果耶註答此據小超中未得色定者而言故云若凡地未得禪超能兼除欲惑諸品若之為言乃不定之辭也況諸品之言豈惟八品故下即云一種子等記此料簡小超有四番問答問中舉止觀何故釋小超只言超能兼除欲惑諸品意明兼除欲惑諸品但可名小超為家家或種子及三向而已不得超名無學向果也答中先約未得色定小超以釋止觀之文次以二意釋推其辭以明超得無學向果先以不定之辭釋若字意明若得色無色定者則能超至無學向果次以不一之義釋諸字意明兼除多品者則能超至無學向果也註問或謂小超只至三向乃判輔行隨其本斷品之多少謂雙點超次而得名為家家種子乃別點小超及以無學向果等名乃別點次斷如此可乎答止觀雖超次對辨輔行唯指小超如云今文中言超斷者即是下文小超之人乃至云此之五品同四品故隨其本斷品之多少等乃釋小超一連之文豈可分擘對當耶記此料簡分文對當超次也問中堅執己意乃分輔行對當止觀超次答中有縱有奪縱之則明止觀以超次對辨奪之則顯輔行唯指小超如云下示輔行唯指小超之文豈可下結責不應分文對當備止觀超次對辨者文言今且依修道斷一品欲惑次第至第五品盡皆名斯陀含向若超斷至五品名家家次斷六品盡名斯陀含果超斷至六品盡名一往來次斷第七品至第八品名阿那含向超斷至第八品名一種子次斷第九品盡名阿那含果畢竟不復還來欲界次斷初禪初品至非想第八品凡七十一品悉名阿羅漢向六種那含位在其中第九無礙道斷非想第九惑盡第九解脫道證名阿羅漢果是也三緣具足得論家家者輔行註云今文中言超斷者即是下文小超之人本在凡地未得色定或修欲定欲惑未斷此人至十六心超斷五品名為家家此之五品同四品故隨其本斷品之多少而得名為家家種子及以無學向果等名也辨訛曰此是紀要中語其說本正不應破私謂此是小超之文豈可分擘對當二語集註乃依文定斷全不扭揑可以依從吾儕未具毫末熏修判位之處虗衷仰信而已不敢以諍論見長也註問止觀超次對辨何故小超只至一種子耶答小超一種子已前與次斷異補一種子以前次斷必須得初果已後起加行斷二必斷三斷五必斷六等若小超見思同斷超至五品等故異註若三果後與次斷同故止觀不論也補此料簡止觀超次對辨之意謂斷欲界惑九品盡若次若超同名三果進斷上八地七十一品思若次若超總名四向七十二品斷盡同名無學記答中有同有異前異故所以超次對辨後同故所以不論小超至無學果向也註問或謂十六心後一念超果至那含屬本斷超超至羅漢屬大超者且小超何不預耶答本斷超人豈止那含記本斷超有至四果向者故不止那含補有但名那含向者乃至斷欲三四品但名初果者豈止那含一種而已備辨訛曰既言十六心後不在四超中攝若欲攝者超至那含可攝屬小超若至羅漢或可附於大超然與聞唱善來者不侔當知凡言超者皆在十心論不在十六後私謂後字須活看今言一念時分甚促未必經久方證也且此等超果既不在四超之中此後又不別論則義有遺漏既與凡地聞唱者不同則附入大超亦非全合莫若今註依無學向果一連之說攝歸小超為妥至言超在十六心論者則聞唱即證之流何曾歷過煖頂等耶存俟後定又本斷超係外道斷思不斷見故極至非想應名羅漢向抑他一位屬那含而止記解為順註若大超人凡地聞唱善來即證羅漢何得云十六心後此料簡十六心後超果是小超也因有師謬將止觀文中十六心後一念超果至那含判屬本斷超超至羅漢判屬大超故今問中舉他十六心後超果所屬以問小超不預超果之故然此問意謂既有師如此之判而小超不預十六心後超果之內矣云何前引十六心後超果以證小超耶記答中意明止觀所云十六心後一念超果至阿那含乃小超未得禪者或至阿羅漢即小超已得禪者正屬小超證果不定非屬本斷及太超也註問小超既至羅漢與大超何別答以小超凡地修觀伏於見思至十六心超果不定若大超人凡地一呼善來直超四果與小超自不侔矣記此料簡大小二超遼然不同也問中以小超超至羅漢而問與大超直至羅漢何別答中明小超在於凡夫地位修觀之時已得伏惑至十六心後或能超至羅漢而與大超聞呼善來即證羅漢逈然有別也所言一呼即證者如輔行云佛言善來比丘自然得具足戒當於言下鬚髮自落袈裟在身鉢盂在手猶如五歲知法比丘如陀羅波楞伽者是以上釋通辨超次根性也註次釋家家之義家家者受生處不一也人中三洲張王不同天上六欲宮殿等別故論天家家人家家不等家家平等家家輔行六上六云家家者有二不同謂天及人天謂欲天三二家生而證圓寂此天家家人謂人處或三二家或三二洲而證圓寂此人家家已上皆平等家家也若天三生天三人二若天二生天二人一天不等家家人生三二反此可知人不等家家故天家家先於人中得見道已若超若次進斷三四後於天中三二處生人中反此天家家者於最後生天中餘殘結斷名得圓寂人中家家準此可知補此引輔行釋上人天以論家家也謂三家生而證圓寂者即是已斷欲惑三品則損四生即有三生在故三生而證也二家生而證圓寂者乃欲惑已斷四品則損五生而有二生在故二生而證也或純天上或純人間此所謂平等者也故天家家者先於人中見道起生最後於天上而證圓寂也人家家者先於天上得見道最後於人中而證圓寂也圓寂者即小乘涅槃無為之理圓見思之惑寂也瑜伽論曰天家家者謂於天上從家至家若往若來證苦邊際人家家者謂於人間從家至家若往若來證苦邊際是也又天不平等者天上起生天三人二最後天上而得圓寂是也人中反此然輔行云三二生而證圓寂即四果也此是家家種性不可作尋常斷九品惑得三果釋也記尋常釋斷欲惑九品只得三果今證圓寂指四果也備辨訛曰玉師意謂家家種性故不生上界而得四果若尋常次斷九品惑者還生上二界方證四果故言不可作尋常等不知欲界經生聖者定不復生色無色界以上二界亦有長時之苦同於欲界故也私謂俱舍論言若在聖位經欲界生必不往生色無色界由彼證得不還果已定於現身般涅槃故若於色界經生聖者容有上生無色界義然集註尋常二字乃指斷九品惑只得三果者說以明今證圓寂是四果也註俱舍頌云欲斷三四品三二生家家此二句正頌家家斷三品則損四生後三生在論三生家家若斷四品則損五生後二生在論二生家家記此兩行小註以釋論家家也而本論釋曰然復應說三二生者以有增進於所受生或少或無或過此故何緣此無斷五品者以斷第五必斷第六非一品惑能障得果猶如一間未越界故也註斷五至二向斷至五品名二果向記論云即預流者進斷欲界一品修惑乃至五品應知轉名一來向果註斷六一來果記論云若斷第六成一來果彼在天上一來人間而般涅槃名一來果過此已後更無生故此惑名曰薄貪嗔癡唯餘下品貪嗔癡故註斷七或八品一生名一間斷至七品或八品猶有一生間隔此據命終者記論云即一來者進斷餘惑若三緣具轉名一間一由斷惑斷欲修惑七八品故二由成根得能治彼無漏根故三由受生更受欲有餘一生故頌中但說初後斷惑受生二緣不說成根緣如何一品惑障得不還果由彼若斷便越界故前說三時業極為障應知煩惱亦與業同越彼等流異熟地故間謂間隔彼餘一生為間隔故不得不還果有一間者說名一間華嚴疏言有三緣具名為一間上之二句即是二緣更有第三得無漏根以為能治易故不說同前家家以下三品共潤一生故斷七八餘第九在亦有一生而為間隔故名一間有一品惑不證不還有一生在不證圓寂皆名一間註此則第三向此據不命終者而向三果記本論言即斷修惑七八品者應知亦名不還果向先斷三四七八品惑入見諦者後得果時乃至未修後勝果道仍不名曰家家一間未成治彼無漏根故華嚴疏言即此一間是不還向也備辨訛曰原註分命終不命終準論並無此意若命終名一間不命終名向者如得二果名一往來亦應約命終不命終論否既二果可言現在一間必定局指命終也且頌本是一意不當分屬兩意也註斷九不還果記論釋云若斷第九成不還果必不還來生欲界故此惑名曰五下結斷雖必先斷或二或三然於此時總集斷故依不還位諸契經中以種種門建立差別華嚴疏言九品全斷更不還生欲界故云不還果也註已上論頌正頌加行次斷備乎九種根性記言九種根性者即色界九種般謂於色般合五為三謂有行無行皆生般攝并中般上流般為三即開三為九見下文圖示九般也補九種根性者一三生家家二二生家家三二果向四一來果五斷七品一間六斷八品一間七斷七品第三向八斷八品第三向九不還果然一間之名者集論言謂即一來或於天上惟受一有得盡苦際所以者何即一來果進至不還果向或於天上惟受一有得般涅槃故有一隙容此一生故名一間約斷七品或八品而命終者為兩種一間以同是一生間隔故約斷七品或八品而不命終者則為兩種三向以同是近三果故如四教義云信解人證阿那含亦有二種一向二果一向者若斷欲界七品或八品皆是阿那含向據此皆是之言則斷七或八為兩種一間等無謬矣是為備乎九種根性也備節義曰天平等家家天不平等家家人平等不等共四位并後五二向一來一間三向不還為九種集註問答解亦同宜依節義註輔行問何緣無斷一品二品及斷五品名家家耶答加行次人斷二必三斷五必六必無不斷大品惑盡而命終者輔行云此次斷義與今文同蓋指俱舍加行次斷與止觀所引婆沙小超是同記此料揀無斷一二及五品惑名家家義問中問其不名家家所以答中約加行必斷大品惑盡命終出其緣由斷二必三斷五必六者謂由聖者起大加行必斷大品惑盡而命終者如輔行云大品者謂三品離三成九故三名大若斷二必至于三是斷初大品若斷五必六者是第二大品又無一品能障於果是故斷五必至于六所以無斷一二及五品惑名家家也輔行云下牒釋會文同義俱舍加行次斷即上文所引二頌婆沙小超之文止觀第六所引此下註中有出補與今文同者玉師恐人錯認輔行義謂與止觀超次對辨之次斷是同故此牒而辨之謂與今文超次對辨之超斷同不與次斷同也以玉師意止觀次斷是經生損惑不論家家故若超斷是斷惑損生故論家家種子而與俱舍明加行次斷之論家家種子其意正同但止觀中只云超斷五品名家家一句輔行引俱舍次斷家家以釋之故又會通云此次斷文與今文同此會義同若爾若會釋止觀應云此次斷人欲斷四品名二生家家與今超斷五品名家家是同以超斷五品功齊四品故此止觀言超斷即是小超故註中言小超也註問次斷之人必斷大品惑盡何故斷四不至五六又斷八品何不至九答斷初大品已既有餘力故更進斷第四也不至九者以有得果越界二義故六唯得果無越界義是故斷五必至於六補得果越界有決定諸業為作留難如婆沙四十二然論謂得四果今借言之註二三品中全無二義斷二必三於理無疑記此料揀斷二必三五必至六義也如輔行云斷九二義異三品一者得果二者越界第九一品以有得果及能越界故斷至八有命終者所以斷八不九也註問還有斷一二品論五四生家家否答既斷二必三豈惟一耶記此料揀斷一二品不論家家也問中由明斷欲三四品三二論家家故發此問以初大品之初一品潤二生第二品潤一生若斷此一二兩品但損三生故有此問答中舉無不斷大品惑盡而命終之事以顯斷二既不論家家惟斷一品亦不論家家也備既斷二必三加行人無有不斷至三品而命終者豈有斷一品而命終者乎註問還有斷六品論一生家家否答家家者受生處不一既唯一生則不論也記此料簡斷六品不論家家也問中由斷前六品損六生後三品未斷猶有一生在故有此問也答中舉受生不一得名家家既明一生只一處非家家之義故不論也註問斷五至二向還可於此論功齊四品論家家否答加行次人既斷五必六不同小超也備加行次人雖有二向之名然此生必證二果故與小超異註三緣具足方論家家俱舍云即預流者進斷修惑若三緣具轉名家家一斷惑緣斷欲修惑三四品故此揀異任斷補目初果後任運七生註二成根緣得能治彼三四成無漏根故此揀異本斷超補在凡夫地修四禪用六行觀以有漏智弱不緣四諦而修成無漏根故無成根緣註三受生緣更受欲有三二生故此揀異大超補大超之人在凡夫地聞唱善來即證羅漢故無受生緣註頌中但說初後二緣者斷欲三四品即斷惑緣三二生家家即受生緣論中既云預流果後進斷修惑即是治彼三四成無漏根義準已成故不具說意謂若在預流果前或屬小超或屬本斷超猶未可定今論既云在預流果後自屬加行次斷之人成無漏根三緣具足其義自可準知也故頌中不必具說也註三緣缺一非家家之義若斷七八亦具三緣轉名一間此約次斷若小超人既論家家三緣必具記此料簡次斷之人五品不論功齊四品家家也三緣具足下示次斷之人論家家俱舍下引釋或難俱舍但明前後二緣不說無漏一緣故以論中明指預流果後則明屬加行次人已成無漏根非小超本斷超可得混淆不必更說也若斷七八下帶示一間雖亦具三緣轉名一間無家家義若小超下兼示小超若論家家亦必具足三緣也註輔行六上若超若次進斷三四文得非小超亦至三四品耶彼釋家家三二處生故以五品功齊四品而總言耳非謂小超至四品也記此料簡小超非止斷四品也問中舉輔行明超次進斷三四之文以問小超之人止超三四答中約釋家家三二處義中明輔行之文乃釋超次非連及小超亦止超三四也註又復小超至五品而不至六者由得果義故記此揀小超超五不六名家家恐伏難言次斷根性斷五必六得論斷第二大品惑盡何故小超但至五不至六耶故註中牒而釋之以明第六有得果義若斷之則成二果不名家家也今欲論家家故小超但至五品也註止觀六引婆沙云次斷五品名斯陀含向超斷五品名家家次斷六品名斯陀含果超斷六品名一往來次斷七品八品名阿那含向超斷八品名一種子文記此舉止觀所引意取超斷五品名家家一句證成上義由上超次對明謂超次之人斷五必六小超之人斷五不六故引而證之然雖全舉所引意取超斷五品名家家一句證成上義亦是起下文料簡也補此中次斷一品乃至五品皆名斯陀含向者以此是經生損惑無斷惑緣故斷三四品不得論家家斷七八品不得論一間也是知此次即任斷之根性也又云此即止觀六上超次對辨之文由次斷中不論家家一種子故玉崗師意以此中次斷為任斷也俱舍論以未起勝進道名住果非向不論超證次證悉皆十五心中名向第十六心名果縱斷上地七十一品十六心時皆但名阿那含果未起勝進道故故止觀超次對辨以次斷名向超斷不名為向又所云次斷自屬加行次斷玉崗師似作任斷釋之若任斷者何必更論且任斷之人至第七生中得盡苦際不往上二界受生諸經論中具有明文何得云六種那含位在其中故知但約加行次斷說也問若云住果不得名向則輔行明本斷超中若本斷九品今名三向斷六品等名二果向復云何通答此是荊溪大師據抑退之意約意立名也俱舍婆沙無此名目讀者幸勿以辭害意也備加行次斷斷惑損生勝於任斷似不應反生上界受長時苦當以根性不同有現般上流之異仰信而已至止觀引婆沙判超次文輔行釋中有天家家先於人中得見道已若超若次進斷三四等此似指論家家之次斷非任斷比辨訛亦曰註師以此中次斷為任斷然此中次斷玉崗師亦作加行次斷釋唯前任斷圖中所引對超論次句作任斷釋讀下若任斷人結句玉師業經料簡註問次斷五品名二向超斷五品名家家又斯陀含與一往來阿那含向與一種子其義無別何分超次答由命終不命終經生不經生異也蓋次斷五品名二四者此人既不命終向二果也超斷五品名家家者此既命終雖斷五品功齊四品以論家家下二例說故三緣具足得受一間正取命終一生間隔三緣不具不受一間之名但名阿那含向正取不經生者向三果也記此料揀超斷次斷兩名有異蓋下別釋超次五品異之所以下二例說者謂次斷六品名斯陀含果者此人斷五必六大品惑盡力亦盡住二果也超斷六品一往來者此人雖超六品命終猶須一番往來據此立名也又次斷七八品名阿那含向者此人既不命終向三果也超斷八品名一種子者此既命終雖斷八品猶有一生間隔名一種子也上文引俱舍頌曰斷七或八品一生名一間此則第三向而原註中既以命終不命終分釋故此結示之也補此中次斷皆約功立號超斷似約過立名但在功過邊著眼其義自分問且如斯陀含與一往來但唐梵不同何分功過答名果名向悉是從功立號但言一往來即約生死過邊立名餘亦例爾註然教門方便論家家者為令聖者畏經生故速得證果若任斷人既經生損惑故不說也記此釋論家家之所以或謂佛祖教門施設種種方便論家家義所以者何故此釋云為令超次聖人怖畏生死速取寂滅道果故也任斷既不起加行任運經于七生故不論家家也三不還果三阿那含此云不來此位斷欲殘思盡進斷上八地思註此果斷欲界下三品思盡進斷上八地思取證四果而般涅槃此云滅度記此明儀文不來之義如金剛疏云是人欲界中死生色無色界於彼漏盡不復來生大論名阿那伽彌阿那名不伽彌名來四教義翻為不還又經言阿那含者非數數來又不還來二十五有名阿那含也若更受身名那含不受身者名阿那含有去來者名曰那含無去來者名阿那含今以斷惑釋立名者蓋欲惑乃潤生之因既無其因亦無其果故不還來欲界受生名不來也此三果人已斷盡欲惑更斷上二界惑意在現生取證四果而般涅槃何期不遂本意即於勝進時命終則論般那含也註就此釋般那含此名從略乃是般涅槃之阿那含也舊對家家稱為般般義無所準補般者取也以進斷上惑般取涅槃故言般涅槃但思惑未盡仍屬勝進故名阿那含是知此般涅槃之阿那含乃約功能立名也若約行名勝進阿那含約位名阿羅漢向雖有如此不同只是那含斷惑之位也舊對下斥舊蓋舊師謂二果向既斷三四品仍有三二處受生可稱家家今那含斷上界惑既有六種九種亦可對家家稱般般然家家義乃憑經論今般般義經論無憑故言義無所準註又此且論有餘涅槃俱舍論云般涅槃者謂有餘依有餘師說亦無餘依此不應理彼應捨壽無自在故補若是無餘依者即應自在捨壽入滅今既果縛猶存須待報盡方入涅槃故無自在顯宗論云彼捨壽中無自在故羅漢見思子縛已斷報身猶存為有餘灰身滅智為無餘今仍有非想最後一品故且一往論有餘若再往即有餘亦不許也彼應捨壽俱舍作彼於有餘依即是有漏所依八種依中名最後邊依謂其最後身依有餘涅槃而住也八種依見法數備辨訛曰有餘涅槃的指無學妙句解便有涅槃音謂陳如初得見諦即斷見惑分證滅諦亦是分得有餘涅槃等此是今家順經意非論意註止觀六五云次斷初禪初品至非想第八品凡七十一品悉名阿羅漢向六種那含位在其中記此引止觀明六種那含在四向攝也如釋論云那含有十一種五種正是阿那含六種阿羅漢向攝即今六種也補任斷根性而止觀名次斷者如俱舍云若在聖位經欲界生必不往生色無色界由彼證得不還果已定於現身般涅槃故可見須陀洹人至第七生仍須先證三果方證四果故亦得論次斷也又三果前超次對辨三果後一切合論故得論六種那含若任斷人既是現般不得復論六種此是任斷根性補此中次斷與前所引次斷五品名斯陀含向等是止觀一連之文故知是任斷根性此玉師之意也註輔行六上六引大論七種一中般二生般三有行般四無行般五上流般色界六現般欲界七無色般俱舍七種前五如大論第六却取無色般輔行脫一無字乃云但取色般并五為六第七方立現般記然二論七般名同但六七二般列次先後互異也補輔行脫一無字今考輔行會本六上二十二有無字輔行云無色般那含於彼無色得有餘名為羅漢唯有心智而無色身據此得有餘涅槃者名為羅漢今言般那含者仍舊名耳註荊溪謂俱舍不立現般指七種中第六不立耳非謂論文不明現般據二論六種一立一不立對釋止觀六種那含故有此言記此明輔行荊溪所言不立現般之意即輔行釋止觀文言六種那含位在其中者大論明五那含謂中生行不行上流復有六種五如上加現般復有七種六如上加無色般俱舍不立現般但取無色般并五為六因有俱舍不立現般之言今釋俱舍不立現般之言而引二意釋之一者荊溪尊者乃指七種中第六不立現般故言俱舍不立非謂俱舍不明現般也二者乃據二論六種一大論立一俱舍不立對釋止觀六種那含故有此俱舍不立現般言也補止觀六種蓋準俱舍不立現般而取無色般彼下文云斷非想第九惑業盡名阿羅漢現般即屬四果中收故不另立註但諸文種數多少今準俱舍三界七種圖示然後對揀記此標揀取以定今文也揀者諸文五七八九至萬二千九百六十種既多少不可定準故當揀之取者俱舍三界七種名義周足準定故當取之註頌云此中生有行無行般涅槃上流若雜修能往色究竟超半超徧沒餘能往有頂餘字指不雜修有頂非非想處行無色有四住此般涅槃記言住此者即指欲界也俱舍云此不還者總說有七且行色界差別有五一中般二生般三有行四無行五上流中般者謂往色界住中有位便般涅槃生般者謂生色界已不久便般涅槃以具勤修速進道故此中所說般涅槃者謂有餘依有餘師說亦無餘依此不應理彼於捨壽無自在故有行般者謂往色界生已長時加行不息由多功用方般涅槃此唯有勤修無速進道故無行般者謂往色界生已經久加行懈怠不多功用便般涅槃以缺勤修速進道故有說此二有差別者由緣有為無為聖道如其次第得涅槃故然此說非理大過失故然契經中先說無行後說有行般涅槃者如其次第與理相應有速進道無速進道無行有行而成辦故不由功用得由功用得故生般涅槃得最速進最上品道隨眠最劣故生不久便般涅槃言上流者是上行義以流與行其義一故謂欲界沒往色界生未即於中能證圓寂要轉生上方般涅槃即此上流差別有二由因及果有差別故因差別者此於靜慮由有雜修無雜修故果差別者色究竟天及有頂天為極處故謂若於靜慮樂慧有雜修者能往色究竟方般涅槃即此復有三種差別全超半超遍沒異故全超者謂在欲界於色靜慮已具雜修遇緣退失上三靜慮以初靜慮愛味為緣命終上生梵眾天處由於先世慣習勢方復能雜修第四靜慮從彼處沒生色究竟於梵眾天最初處沒生色究竟最後天中頓越中間是全超義言半超者從彼漸次生五淨居即無煩天等乃至中間能越一處生色究竟超非全故名為半超聖必不生大梵天處僻見處故一導師故言遍沒者從彼漸次於一切處皆遍受生最後方能生色究竟一切處死故名遍沒無不還者於已生處受第二生由彼於生容求勝進非等劣故即由此故不還義滿必不還生曾生處故尚不生本處況有生於下應知此謂二上流中由有雜修靜慮因故往色究竟般涅槃者餘於靜慮無雜修即樂定不兼事而修者能往有頂方般涅槃謂彼先無雜修靜慮由於諸定愛味為緣此沒遍生色界諸處唯不能往五淨居天色界命終於三無色次第生已復生有頂方般涅槃二上流中前是觀行指有雜修後是止行指無雜修樂慧樂定有差別故二上流者於下地中得般涅槃見不違理而言此往色究竟天及有頂天為極處者由此過彼無行處故如預流者極七返生此五名行色界者若行無色界者差別有四謂在欲界離色界貪從此命終生於無色此中差別唯有四種由生般涅槃有差別故此并前五成六不還復有不行色無色界即住於此能般涅槃名現般并前六為七也輔行六上㭊玄具釋論頌七種先色次無色後欲般今圖順三界次第記此段小註指文釋頌如輔行云一中般謂欲界沒於色中陰而般涅槃二生般生色界已而般涅槃三有行生色界已長時修行方般涅槃但有勤修無速進道四無行生色界已不經久修無功用行而般涅槃勤修速進二道俱無五上流於色界中要轉經於四禪天處方般涅槃上流又二一雜修即樂慧是二無雜修即樂定是有雜修者往色究竟無雜修者往於有頂頌中餘字是不雜修又有三種一全超者謂在欲界於四禪中已遍雜修遇緣退失從梵眾沒生色究竟中間盡越名為全超二者半超梵眾沒已中間漸受十四天處或超一二乃至十三後乃方生色究竟天皆名半超非全超故通受半名全不能超名為遍沒無雜修者生無色界唯不能生五淨居天從廣果沒生三無色後生有頂方般涅槃故此那含縱生無色猶屬色攝若欲界沒生無色即無色攝析玄釋者未詳論頌下明從列三界次序今圖稍別記雜修者以其有時修初禪慧或有時修四禪慧交互修故乃樂慧根性也問上流雜修何法答修夾熏禪初以一念無漏一念有漏又一念無漏以前後二念無漏熏此一念有漏共有三念以為根本第二翻以前三念為加行更引起三念則有六念乃至第五色究竟天則有十五心由此有漏無漏間雜而修名為雜修亦名夾熏禪不雜修者不生五淨居也以雜修者修此夾熏禪故故能生于淨居天中不雜修者不修此禪是故不生既無其因云何有果非唯全超半超者不生即遍沒者亦不生也雖往非想無色只是色般根性者輔行云無雜修者生無色界唯不能生五淨居從廣果沒生三無色復生有頂方般涅槃此猶屬色般攝也備辨訛曰雖言遍沒不必遍生以有可生之道令人厭離且作是說但是具歷四禪即可云遍沒也故大經明上流中若受二身名利根受四身名鈍根也註大論七種名同俱舍列次小異如下圖示俱舍論云行無色者差別有四謂在欲界離色界貪從此命終生於無色此并前五成六不還復有不行色無色界即住於此欲界惑盡現般涅槃并前六為七全超者謂在欲界於四禪中已徧雜修即可生於色究竟天蓋由遇緣退失故生梵眾須從梵眾沒已然後生于色究竟天中間盡越故名全超補謂此人以初禪愛味為緣故命終生梵眾又由先世慣習勢力能雜修第四禪所以從梵眾沒生色究竟名全超也備集註問答問退失反得全超何耶答準俱舍意以遇違緣退失則生畏懼起大加行況在欲界先已徧修故得全超不退者不爾故但半超及徧沒也註半超者謂自梵眾沒已中間漸受梵輔小光等不定於此十四天中或超一二乃至十三後乃方生色究竟天皆名半超非全超故通受半名補色界共十八天梵眾乃最初沒處色究竟乃最後生天中間大梵我慢無想外道此二天聖人不生故言十四於此中若超一天者即超梵輔超二天者即梵輔少光乃至十三者即超至善見若至十四即是全超故不論也可見十四天中如有一天不超皆名半超也註徧沒全不能超名為徧沒色界徧沒即十六天大梵是天主我慢無想是外道所居聖者不生此二天也備華嚴大梵天王寄配十地此言聖者不生如何會通須知大乘發明示現當亦寄生小乘實行聲聞不生也註俱舍復有九種即於色般合五為三有行及無行皆生般攝即開三為九頌云行色界有九謂三各分三業惑根有殊致成三九別記此示俱舍九種以有行無行為生般一種并前中般及後上流是為合五為三也論云即行色界五種不還總立為三各分三種故成九種何等為三謂中生上流有差別故云何三種各分為三且中般涅槃分為三種速非速經久得般涅槃由三火星喻所顯故生般涅槃亦分三種生有行等般涅槃故此皆生已得般涅槃是故並應名為生般於上流中亦分三種超半超等有差別故然諸三種一切皆由速非速經久得般涅槃故更互相望無雜亂故如是三種九種不還由業惑根有差別故有速非速經久不同且總成三由造增長順起後生後業差別故如其次第下中上煩惱現行有差別故及上中下根差別故此三一一如其所應亦業根有差別故因各有三故成九種謂初二三由惑根別各成三種非由業異後三亦由順後受業有差別故分成三種故說如是行色不還業惑根殊成三九別記此圖示大論七種名同俱舍列次小異補言六種那含位在其中者意謂止觀六種那含即同二論之七種何者以依大論明六種即是一中二生乃至第六現般七種中缺無色般也若依俱舍明六種即是一中二生乃至第六無色般乃七種具矣故荊溪一立一不立特指第六以對止觀則顯止觀雖曰六種即是七種記此圖示俱舍九種般也釋籤引論言中般為三者謂速非速久住準俱舍論總為九種謂三各分三即中生上流也有行無行生色界已方般涅槃並生般攝言中三者謂速非速經久如迸火星以喻三義思之可知並於中陰論速非速等生有三者一生約速立二有行約非速立三無行約經久立並生色界已論速等也上流三者一全超約速立二半超約非速立三徧沒約經久立從初色至色末始終有此三人不同如是三九由業惑根異言業異者造順現業成中般造順生業成生般造順後業成上流般言惑三者下品惑成中般中品惑成生般上品惑成上流般言根別者上根中般中根生般下根上流般也補中般速者捨身未離欲界非速者離欲界已經久者至色界邊生般速者生色界即般涅槃非速者生四五天不等經久者至色究竟上流速者全超非速者半超經久者遍沒順現者此人厭苦心切三界如牢獄在欲即涅槃順生者其心疎至色界順於後者又疎至色究竟天下品惑輕至色界中品重至三四天上品又重至色究竟天上謂中有中謂色界下至色究竟此依大經釋備辨訛曰中般下順現論是順起所謂食香中有起中有以香為食故曰食香起亦是中有故言順起荊谿恐人未曉改現字耳註諸文或云五種獨指色般或云八種三界七中加不定般補註十四初引婆沙三界般中遍有不定進老示不定相乃約期心欲界便般涅槃或未能克却生上界而取證也或期生上界忽發宿習欲界即證色無色準說可知記此釋不定般也色無色準說者謂期心色界便般涅槃或未能克却生無色取證或期生無色色界即證也又期心無色空處便般涅槃或未能克却生識處已上諸天取證或期生非非想天乃空處即證也補進老人名也宋崇進法師有精英集行世以年道相若故稱進老舜江紀要中頻有進老之稱註雜心論七種妙玄所用於色界五初開中為三速非速經久并後四成七記雜心七般謂速般非速般經久般生般有行般無行般上流般也註毗曇有一萬二千九百六十種般如釋籤第五具示記釋籤引雜阿毗曇云阿那含者或五或七或八五謂中生有行無行上流七謂中般分三如迸火星喻八謂五如上加現無色及不定且從五種說謂色五種從根分十五謂上中下各五故約地成二十四禪各五故約性有三十謂退思護住進不動謂種性各五故處有八十梵眾至尼吒十六處各五故每一種那含有二千五百九十二何者約六處成十六人約種性六成六倍增之合九十六約根有三三倍增之成二百八十八更以九離欲人九倍問之成二千五百九十二人一人既爾五種那含又倍增之成一萬二千九百六十種也九離欲人者謂離欲界九品惑以為九人也註色界中般者初離欲界生色界時厭苦心切即在中有而般涅槃故屬色攝補此簡明色界中有論般涅槃也如大經迦葉問何故欲界有中般涅槃佛言善男子是人觀欲界煩惱因緣有二一內二外色界無內外因緣欲界復有二種愛心一欲二食觀是二愛至心呵責既呵責已得入涅槃是欲界中能得呵責諸麤煩惱謂慳貪嫉妬無慙無愧以是因緣能般涅槃又欲界道其性勇健得向果故故欲界有中涅槃色界中無善男子涅槃有三種上者捨身未離欲界便般涅槃中者始離欲界未至色界便得涅槃下者離欲界已至色界邊乃得涅槃又婆沙問如色界有中般涅槃欲界亦有耶答無欲界是不定界多諸過失留難住本有時尚難得果況住中有微劣身耶然大經言欲界有中般婆沙云欲界無中般者不同何也蓋經據欲界命終即受中陰故云欲界有論據欲染必進趣色界方般涅槃故云色界有言雖有別其義一也故此中言中有屬色攝也註若至色界上生餘天雖有中有不得論般為無宿習厭苦力故如㭊玄下記㭊玄未詳註無色不立中般者指歸鈔十八云經云無色眾生無有中陰者毗曇法中說除四空餘一切處定有中陰以無色界無處所故文記此簡明無色不立中般然鈔中指論釋經無色無中陰者如雜阿毗曇心論言中陰五者中陰五陰性有去來故非雜色有去來故欲色界有中陰非無色界色非分故故知無色無中陰不立中般也補淨覺師作彌陀疏名指歸鈔無色界無處所者顯揚論言欲界居下方色界居上方無色界無方處俱舍明無色界無方處謂於是處得彼定者命終即於是處生故復從彼沒生欲色時即於是處中有起故無色既無方處命終生彼當處即是故無中陰後來退墮欲色界時方有中陰現起又云此釋四空天無中陰之故蓋中陰屬色托胎必假處所四空天無有色陰但依空等為處依報之色既無正報之質安有是故無色界無中陰也註俱舍明隨於何處得無色定於命終時即生無色記此指論明以釋妨難恐有難言若無色界無中陰者當云何知得生無色故此釋之以明隨處得定為因命終即生無色為果註圖中引五差者指五不還天因中有五種差別謂下中上上勝上極輔行六上三㭊玄下十三委釋行相由此五禪生五淨居記此簡明圖引五差初句標示次指釋行相輔行云生五含者然由修熏禪有五階差大品九定通熏九地此中唯熏第四禪地先修得已更以多念無漏相續現起從此引生多念有漏從此復生多念無漏如是後後漸漸減少乃至最後二念無漏次復引生二念有漏無間復生二念無漏名熏加行成相次唯一念無漏次復唯有一念有漏無間復生一念無漏名根本成故俱舍云成由一念雜言五差者謂下中上上勝上極一品有三後品兼前故第五品合成十五如是五品如其次第三六九等生五淨居由此下結釋引意補圖中引五差者指前俱舍三界七種那含圖也差階級也乃指圖中所引雜修樂慧者生五淨居天也以未明雜修五差之相故此釋之謂雜修下品生無煩乃至雜修上極品生色究竟楞嚴文句云初無煩天即雜修下品謂行人先練人四禪定已於此定中先起多念無漏心相續現前次起多念有漏心相續現前又起多念無漏心相續現前如是漸漸減至二念無漏二念有漏復二念無漏時名雜修加行成滿次起一念無漏一念有漏一念無漏至此名為根本成滿由此有漏無漏間雜故名雜修亦名夾熏禪以用無漏夾熏有漏色定轉明果報轉勝由此資其故業故從廣果沒生無煩也次無熱天即雜修中品有六心用前下三品心為加行更引三心一念無漏有漏無漏為根本資其故業從廣果沒能起無煩生無熱也三善見天即雜修上品有九心用前六心為加行更起三心為根本資其故業從廣果沒生善見也四善現天即雜修上勝品有十二心用前九心為加行更引三心為根本資其故業能超三天生善現也五色究竟天即雜修上極品有十五心用前十二心為加行更引三心為根本資乎故業能超四天生色究竟也無漏有漏者如觀一切法無實我無實法直稱理而觀即此可以資熏本有無漏種子發起謂之無漏若是不觀于理起有執雜心謂之有漏蓋雜修亦爾先起多念無漏次起多念有漏後又起多念無漏如是乃至一念亦然此但約定中而論有漏無漏有云在定是無漏出定是有漏者非也所謂定中起有漏念者即於定中貪著此為妙是也註又樂論議者恐就下界修觀時說非生淨居有論議也以二禪上無語言故文記此簡明淨居決無論議也如相宗云眼耳身三二地居則初禪尚不起舌識何況二禪二禪尚不假語言況五淨居故知淨居必無議論有謂那含樂議論者乃就下地修觀時說耳補大經云上流般者復有二種一樂慧二樂定樂慧者入五淨居樂定者入無色界如是二人一樂論議二樂寂靜樂寂靜者入無色樂論議者生淨居
