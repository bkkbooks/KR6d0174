body:
  text: 高麗沙門諦觀錄南天竺沙門蒙潤集註清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦閑編科參梓二明涅槃泯會非四教攝四初示意二初雙標次說大涅槃者有二義註佛出淨土不說涅槃即以法華為後教後味如燈明迦葉等記此明淨土謂燈明佛不說涅槃者如法華經云佛說是法華令眾歡喜已尋即於是日告於天人眾諸法實相義已為汝等說我今於中夜當入於涅槃迦葉佛不說涅槃者如大經云迦葉佛時一切眾生悉知如來終不畢竟入於涅槃常住不變雖有是典不須演說是也故玄文明本壽命涅槃妙中云久遠諸佛如迦葉燈明等皆於法華即入涅槃義推本佛必是淨土淨機故也補諸佛道同為緣事異如多寶佛但施權教不須顯實故不說法華而即涅槃當來彌勒只有龍華三會尚不說小大論明須扇多佛弟子未熟便入涅槃更留化佛住世半劫說法度生古然燈佛放光十二劫竟無識者總不說法是知諸佛出世不定五時今言佛出淨土不說涅槃從多分說又涅槃玄記云若約扶律為涅槃者則唯穢土若約圓常為涅槃者則淨穢皆說乃約事理而分說不說也註今佛熟前番人以法華為醍醐更熟後番人重將般若淘汰方入涅槃復以涅槃為後教後味記此明今佛須說涅槃也前番人指大通佛世曾熏大種者後番人指方等時新熏大種者是故為熟前番人則以法華開會之熟後番人重將空慧而淘汰之後說涅槃而捃拾之即如大經云今世眾生無有智慧多諸疑網信根不立世界不淨一切眾生恒謂如來無常遷變畢竟入滅是故如來演說此經以為後教後味是也補前番人者妙玄曰法華八千聲聞無量損生菩薩即是前熟果實於法華中收後番人者妙玄云若五千退席人天被移皆是後熟涅槃中收也說法華後重將般若淘汰者妙玄曰為此義故經云從摩訶般若出大涅槃即後番次第義也備後番人宜依補中解節義云智論空生問法華一稱佛名皆成佛道般若不退品中又有退不退之說故問菩薩於法華得授記莂為復畢定不畢定以此證法華後更說般若淘汰結集家結歸前分般若部內在第四時耳二雙釋二初捃拾殘機一為未熟者更說四教具談佛性令具真常入大涅槃故名捃拾教註一為未熟者即五千起去人天被移者記此釋二義科也即法華方便品五千增上慢者從座而去寶塔品如來三變淨土容受分身諸佛與欲同開寶塔人天等眾悉皆被移置於他土是皆圓機未熟者也註更說四教法華廢竟今經復用故云更說而具追說追泯兩種四教妙玄二二十一云涅槃聖行品追分別眾經故具說四種四諦施權德王品追泯眾經俱寂四種四諦文開權即四不可說也釋籤三十三云追者退也却更分別前諸味也泯者會也自法華已前諸經皆泯此意則順法華部也至大經中更分別者為被末代故大經中具斯二說文記此釋更說四教聖行品追說者疏略記曰若言若是逼迫相去即有作聖諦若曰解苦無苦而有真諦去即無生聖諦若從苦有無量相去則是無量聖諦此三種四諦悉是菩薩觀境菩薩住於大乘大般涅槃者即無作諦慧能所合論備有四種是知聖行品具說四種四諦乃施權也德王品佛言生生亦不可說不生生不可說生不生不可說不生不生亦不可說今但指此四不可說以明俱寂四種四諦也謂生生不可說寂生滅四諦生不生不可說寂無生四諦不生生不可說寂無量四諦不生不生不可說寂無作四諦此開權也釋籤下引大經具二說意謂涅槃經一為未熟人更說四教等如本節二被末代解見儀文下節備退者復退舉前四時分別四教註具談佛性令具真常涅槃經首廣開常宗令一切眾生皆知常住佛性入秘密藏止觀云涅槃寄滅談常輔行云寄應迹滅度談法身圓常記此指釋也初二句釋具談佛性長壽品云如來長壽於諸常中最上最勝所得常法於諸常中最為第一如諸常中虗空第一如來亦爾於諸常中最為第一諸藥中醍醐第一如來亦爾於眾生中壽命第一是為廣開常宗也令一切下三句釋令具真常謂一切眾生迷昧佛性真常理皆住秘密藏外是故如來演說真常令其皆知佛性入秘密藏中秘密藏者疏云正法微妙不可思議絕名絕相眾生不解名秘密法界包含攝一切法用不可盡名藏故經云不縱不橫不並不別是秘密義三法具足無缺是藏義止觀下證釋如經云如來兩足自知常無常涅槃時一足黑黮一足光淨淨表法身常住黑表應迹無常故云寄應迹滅談法身常也黮音斷黑也應迹在世八十年老比丘身也註捃拾釋籤一十九云法華開權如已破大陣餘機至彼如殘黨不難故法華為大收涅槃為捃拾文記此釋教名捃拾也觀音玄記云漸化已來法華入者望前已鈍復有未入待至涅槃法華猶利然法華破大陣涅槃收殘黨法華為刈穫涅槃是捃拾大化之功在靈鷲餘機未盡故至雙林也捃君上聲二逗留末代二為末代鈍根於佛法中起斷滅見夭傷慧命亡失法身設三種權扶一圓實故名扶律談常教註二為末代鈍根妙玄十二十一云涅槃臨滅更扶三藏誡約將來使末代鈍根不於佛法中起斷滅見廣開常宗破此顛倒令佛法久住文記此釋為末代鈍根也謂如來於涅槃會上臨滅度時垂無緣慈起同體悲更扶三藏誡約將來其意為何蓋使末代鈍根眾生於佛法中不起斷見云云能使之不起謂廣開圓常之宗破此斷滅之倒無常倒惑若破真常佛法得住也註起斷滅見一者破戒撥無因果斷見二者說於無常滅見記此釋起斷滅見也謂一切性遮禁戒乃趨極果之正因結道場之妙業三世諸佛咸說十方菩薩皆學二乘聖人兢兢約束末代凡夫心心放逸不唯破諸禁戒而且撥無因果此起斷見也一切諸佛法身常住亘古亘今不遷不變妄謂生滅無常此起滅見也註夭傷慧命無戒門也亡失法身無乘門也若常途論自報慧命理體法身在眾生不減諸佛不增以迷背故夭傷亡失今此為無乘戒兩門以致慧命法身夭傷亡失意與常途自不侔矣記此釋夭傷亡失也謂常說自受用報身以慧為命如曰一切種智為首乃至定慧為足又說清淨法身以理為體如曰佛真法身猶若虗空彌綸萬有囊括十虗三世悉在十方普周非色非心離性離相無生滅絕去來以真如妙理為體然此法身慧命聖凡平等無有增減諸佛悟之向之所以早登彼岸眾生迷之背之所以沉淪生死所謂迷之之故夭傷慧命背之之故亡失法身常途如此論也今謂以無戒門故傷慧命以無乘門故失法身則非常途意矣註設三種權扶一圓實輔行三下二十一云彼經四教皆知常住本意在圓權用三教以為蘇息實不保權以為究竟文記大經追談四教之機雖未行即而能解即故皆知常住註扶律談常教釋籤云以彼經部前後諸文扶事說常若末代中諸惡比丘破戒戒門說於如來無常乘門及誦讀外典則並無乘戒失常住命賴由此經扶律說常則乘戒具足故號此經為贖常住命之重寶也記此釋教名扶律談常也彼經然後扶事說常者謂扶戒律事說法性常也如經中佛為迦葉菩薩明金剛密迹以金剛杵擬盜聽說戒之沙彌謂是化人為欲驅遣破戒毀法者令出眾故又如來於毀法者作驅遣羯磨訶責羯磨置羯磨舉罪羯磨不可見羯磨滅羯磨未捨惡見羯磨等如是降伏為示諸行惡之人有果報故又云我滅度後有持戒比丘見壞法者即能驅遣懲治訶責得福無量若善比丘見壞法者置不訶責當知是人佛法中怨而能驅遣者是我弟子真聲聞也又云懈怠破戒毀正法者國王大臣四部之眾應當苦治能有如是修習此業者得壽命長乃至常住於世無有變易是等諸文皆明扶律而兼說常也又經云善男子應當修習佛法及僧而作常想若於三法修異想者當知是輩清淨三歸則無依處所有禁戒皆不具足終不能證聲聞緣覺菩提之果若能於是不可思議修常想者則有歸處此等經文皆說常而兼扶律也若未代下明無乘戒謂惡比丘破戒無戒門也說如來無常及讀誦外典無乘門也無乘門故亡淨法身無戒門故失常住命也賴由下明經功能謂由此經扶律故得戒具由此經談常故得乘足由乘足則法身不失由戒具則慧命不殤也故號下讚經功力可知羯磨翻作法註如釋籤三引經應有單複二義所言複者謂乘及戒若言不許畜八不淨此是戒門事門若說如來而不畢竟入於涅槃及遮外典此是乘門理門此扶律談常意也所言單者唯約戒門彼經扶律律是贖常住命之重寶以律助常意也四念處三二云若別圓有法身慧命何須贖命贖命意在藏通灰斷之命令得法身常住也文記此明籤文引經用義複者下總指乘戒釋複義若言不許等者指經燡戒經云若有比丘唱如是言涅槃經中制諸比丘不應畜奴婢牛羊非法之物如來先於異部經中說有比丘畜如是等不淨之物某甲國王如法治之驅令還俗即不許畜之文八不淨者經邪正品廣列而不分數按善生優婆塞經云一畜田宅二種植根栽三貯積穀粟居店求利四畜奴婢人民五畜眷屬羣畜六畜金銀財寶七畜象牙金銀刻鏤諸寶大牀錦被氍氀八畜銅鐵釜鑊等也若說如來而不畢竟涅槃等者指經釋乘如梵行品云為未來世諸惡比丘畜不淨物為四眾說如來畢竟入於涅槃讀誦世典不敬佛經如是等惡現於世時如來為欲滅是諸惡令得遠離邪命利養如來則為演說是經是扶律談常意也言外典者即外道毗陀論毗伽羅論衛師論迦毗羅論等諸書一切呪術醫方技藝日月薄蝕星宿運變圖書讖記等經是也已上釋複義所言單者下唯約戒門釋單義如釋籤問云法華既已顯實涅槃何復施權答涅槃重復施權者正顯是贖命之重寶也四念處下引證贖命然此文先有問云藏通云何得入涅槃中修學耶答涅槃扶律而說故名贖命若別圓有法身慧命何須贖命贖命意在藏通灰斷之命令得法身常住也問三藏生滅慧云何贖成常住慧答今涅槃引藏通中昔日灰斷不明佛性今俱引見佛性不同先日等文是知涅槃已見佛性今但扶律而說不破於戒正是今贖常住慧命也備節義云原註以律助常意句應移令得法身常住也下文義俱足又如來畢竟入於涅槃句據四相品曰我之閻浮提示涅槃亦不畢竟入於涅槃梵行品曰定不畢竟入於涅槃應添一不字即足如義例云乃是雙證以涅槃為壽是證談常非助不前是證助常文極清楚又辨訛曰以律助常應在重寶句下示師則移戒門事門句下依辨訛為順再俟後定氍氀音巨呂補據上文為末代義此四念處引證似抅以贖藏通斷命與末代起見等不同想玉師因贖命義便引耳備想即下節重扶三藏結歸為末代意故引之註既扶律說常則以律助常也如義例云佛化尚以涅槃為壽況末代根鈍非助不前記此明扶律談常意恐謂教名扶律談常為當以律助常以常助律耶故示云以律助常也如義例下證助常意文曰次用涅槃者雖依法華咸歸一實末代根鈍若無扶助則正行傾覆正助相添方能遠運佛化尚以涅槃為壽況末代根鈍非助不前故扶律談常以顯實相也補謂如來在世教化尚以涅槃扶律談常為常住壽命亦律不可少況末代根鈍非戒律助行不能前進而律豈可少耶故須以律助常也註然上云設三種權扶一圓實何故結云扶律談常且三權俱律耶須知上明經中具用四教則以偏助圓後以乘戒兩門重扶三藏之意結歸為末代鈍根故云扶律談常也記此料簡結歸之辭謂前以三教助後圓教故曰設三種權扶一圓實後恐末代鈍根並無戒乘故以乘戒兩門重推三藏故結曰扶律談常是則上下文各有意也二同異三初時味論同然若論時味與法華同註妙玄十二十一云然二經教意起盡是同如法華三周說法斷奠聲聞咸歸一實後開近顯遠明菩薩事涅槃亦爾先勝三修常樂我斥劣三修苦無常無我斷奠聲聞入秘密藏後三十六問明菩薩事文記此三將時味教對辨明與法華同時科也法華前十四品明迹門三周說法斷奠聲聞咸歸一實後十四品明本門初略開近顯遠動執生疑後廣開近顯遠斷疑生信以授法身之記明地湧諸菩薩事涅槃亦爾者如壽命品佛言汝等比丘云何而言有我想者憍慢貢高流轉生死汝等若言我亦修習無常苦想無我想是三種修無有實義我今當說勝三修法苦者計樂樂者計苦是顛倒法無我計我我計無我是顛倒法不淨計淨淨計不淨是顛倒法無常計常常計無常是顛倒法有如是等四顛倒法是人不知正修諸法汝等比丘於苦法中生於樂想乃至於無我中生於我想世間有常樂我淨出世間亦有常樂我淨世間法者有字無義出世法者亦有字有義何以故世間之法有四顛倒故不知義所以者何有想顛倒心倒見倒以三倒故世間之人樂中見苦常見無常我見無我淨見不淨名顛倒法以顛倒故世間知字而不知義何等為義無我者名生死我者名如來無常者聲聞緣覺常者如來法身苦者一切外道樂者即涅槃不淨者有為法淨者諸佛菩薩所有正法是名不顛倒以不倒故知字知義若欲遠離四顛倒者應當知是常樂我淨是為以勝三修斥劣三修斷奠聲聞入秘密藏也又壽命品迦葉菩薩說偈問佛有三十二偈其間開數不同今依河西為三十四問前十九偈正作三十四問後四偈請答而玄文列三十六問乃依開善所開數以河西面對梵文口決曇讖也籤曰法華以本迹二門為初後二分初則開權顯實斷奠聲聞後明本門增道損生重更辨前開權化主久遠成佛涅槃正說開為四段初純陀品去明涅槃施權斷奠三修二長壽品去十四品明涅槃義三現病品去五品明涅槃行四師子吼品去三品明涅槃用故知初已斷奠聲聞後但明涅槃義用是二經起盡同時也又有明二經三義是同一開權同法華開三教權顯一乘實涅槃點淺劣三修即常樂我二談常同法華云是法住法位世間相常住涅槃云墻壁瓦礫皆具佛性三壽量同法華談過去壽命久遠壽量涅槃談未來之壽金剛不壞身是二經時味相同也補遺引發源問何故但修三答空濫果證今明修義故且不言既增減由機故三四皆可二部有小異論其部內純雜小異註妙玄十八云涅槃猶帶三乘得道此經純一無雜涅槃更不發迹此經顯本義彰妙樂七十九約十六意揀云云記此釋部內純雜小異即引妙玄云者蓋涅槃設三權扶一實故帶三乘得道法華明三權顯一實故純一無雜又涅槃會上大眾咸信是以更不發迹法華從地湧出權小生疑是以顯本義彰故其部內純雜小異也況指妙樂十六意揀者台家明義多處說之無煩廣辨欲重論者更述大猷判味同時而有部異約理名別咸歸常住約機彼稱捃拾約法彼存三權論意彼帶律儀語證彼兼小果受益彼無廣記說時長短永殊談常過未不同論譬大陣餘黨現瑞表彰各別破執難易不同領解遠近迹乖述成被根不等用治生死不同付囑有下有此得十六意準此略知事異意同不可失旨失期同異講授殊難是為十六意揀之文也備有下有此有下方有現眾也三引常經證故文云從摩訶般若出大涅槃註故文云等別行義疏記云彼經就般若部後分結撮五味次第也文記此釋所引經也蓋法華具彰執權之機已破大陣然須涅槃收其餘黨故於法華後復談般若調伏其心令於涅槃得醍醐味故曰就般若後分結撮五味次第也補法華已前是般若為前分法華已後是般若為後分以結集為一部判第四時三時合前法華合此經為第五時也註前法華等者今經時味既同法華故此文中更不別立時味但云前法華合此經為第五時也此釋二經同第五時也四料簡二初問問此經具四教與前方等部具說四教為同為異註妙玄十二十三云問涅槃追說四方等正開四別教復有四若為分別記此對方等料揀也別教十住修生無生十行修無量十向修無作十地證無作故別教復有四餘解在下二答答名同義異方等中四圓則初後俱知常別則初不知後方知藏通則初後俱不知涅槃中四初後俱知此復引妙玄問之答辭云註答涅槃當四通入佛性別教次第後見佛性方等保證二不見性文備答中涅槃下明涅槃中四俱知通入佛性也別教下答別教後知佛性即所云初不知後方知然妙玄單就別教說不屬涅槃不屬方等也方等下明方等四中保證之藏通初後俱絕分也按別教問答註引妙玄帶出儀文無此意也下註中今以涅槃追說等文方依儀文與方等揀註今以涅槃追說四與方等中四對揀答名同義異四教名同知常不知常異記此斷今文答辭先總答註圓則初後俱知常初心名字知五品觀行知六根相似知住上分證知妙覺究竟知記此圓貼方等說前後俱知也六即解見圓教註別則初不知後方知初即地前人也輔行三下廿九云別亦知中今言不知者前三不知圓理故也文若妙玄四三十一云別教初心即知常住者但中常住耳後即登地人也若得意者回向薄知記此釋別初不知也別教地前未聞一中一切中圓理故不解圓常下引輔行文證蓋止觀明前三教未被法華會時尚不解圓何況入圓故輔行明別亦解中而止觀言不知者謂前三教皆不解圓理故若妙玄別教初心即知常住者亦指但中常住非圓常也至別教登地證道同圓故能解不但中又別向位智轉行融雖未能透徹亦薄解圓理故云回向薄知註藏通則初後俱不知觀音玄記上十二云凡言別圓初後知常蓋知人法不可灰斷藏通反是故曰不知記此釋藏通初後俱不知也觀音玄云若云惑盡人法永無斯是小乘亦稱權教若言惑盡人法不滅斯是大乘亦稱實教下接凡言別圓初後知常云云又止觀引經難云大經謂阿羅漢不解三寶常住不變者所有禁戒亦不具足不得聲聞之道此意云何釋云羅漢自力不應知見常住譬如天眼未開不見障外不聞他說亦不能知羅漢佛眼未開又不聞佛說那得自知常住故法華云於自所得功德生滅度想若遇餘佛便得決了又云聲聞緣覺不退菩薩亦不能知當知不聞則不知也經稱知者齊知己理真諦無為亦是於常一相無變故華嚴云諸法實性相常住不變異二乘亦皆得而不名為佛以常住語通得作此釋若不作此釋者三藏不說大乘常住聲聞那得具聲聞道具禁戒耶故知藏通初後皆不知圓常也註涅槃中四初後俱知輔行三下二十二云彼經四教皆知常住本意在圓文觀音玄記上二十七云涅槃四教雖俱知常初心用觀不無差別藏通且須順於二諦別初心人未即圓法文釋籤二二十八云涅槃解即而行不即文記此釋涅槃中初後俱知初引輔行證四教俱知次引觀音玄記明涅槃四教用觀有別補藏通須順二諦者謂藏通之機雖知圓理然初心修觀且順實有幻有而修若別教初心雖解圓常修觀之時仍順次第故云未即圓法釋籤下引證由解即故所以四教皆知常住而行不即故所以初心圓觀不無差別也三料揀時味二初問定意趣問將五味對五時教其意如何二答釋所以二初約相生三初標立答有二一者但取相生次第二喻顯所謂牛譬於佛五味譬教乳從牛出酪從乳生二酥醍醐次第不亂註南本涅槃第十三卷聖行品中無垢藏王菩薩對佛稱嘆涅槃教勝佛印可竟佛言譬如從牛出乳從乳出酪從酪出生酥從生酥出熟酥從熟酥出醍醐醍醐最上佛亦如是從佛出十二部經從十二部經出修多羅從修多羅出方等從方等出般若波羅密從般若波羅密出大涅槃猶如醍醐文是則五味對教出自於佛也記聖行品疏云從佛出十二部經者經指華嚴華嚴最初是十二部修多羅者即三藏中一藏物不堪大即為說小方等彈偏折小嘆大褒圓般若三乘同聞專歸一實引小歸大接偏成圓及住方便未證小果許其通學摩訶衍道大般涅槃尊極之教已住小果斥廢三修說勝常樂若爾何不說法華法華破小果滅化城引入寶所與涅槃同又迦葉如來二萬燈明皆說法華以為極唱不說涅槃今釋迦惡世垂迹宜以異名顯於常樂兩教同極不言法華意在於此是則下約味對教結出於佛也三結成故譬五時相生次第註相生釋籤一十九云此五味教相生之文在大經聖行品末文此約教論相生也妙玄十十八云漸機於頓未轉全生如乳三藏中轉革凡成聖喻變乳為酪即是次第相生為第二時教不取濃淡優劣為喻也文此約機論相生也記此引二文以證機教相生之論也釋籤下約教論妙玄下約機論不取濃淡優劣為喻者酪濃乳淡而淡者味劣濃者味優今但五味相生次第不取濃淡優劣為喻者祇是小機於華嚴如乳非酪濃於華嚴也二取濃淡三初下根三初標顯二者取其濃淡註義例六云五味唯喻一代五時濃淡文蓋言經文相生雖顯意取濃淡以譬涅槃教勝即約教論濃淡也記此引釋也義例云經中惟譬五道不同佛性不變五味惟喻五時濃淡濃淡雖殊皆從牛出此喻教也註今文教論相生機論濃淡者令易顯故其實約機約教皆具二義此明今文所約亦一往言之耳若尅實論之皆具二義也二正釋此則取一番下劣根性所謂二乘根性在華嚴座不信不解不變凡情故譬其乳次至鹿苑聞三藏教二乘根性依教修行轉凡成聖故譬轉乳成酪次至方等聞彈斥聲聞慕大恥小得通教益如轉酪成生酥次至般若奉勅轉教心漸通泰得別教益如轉生酥成熟酥次至法華聞三周說法得記作佛如轉熟酥成醍醐註下劣根性天親呼為下劣小乘眾香稱為貧所樂法記天親大乘論釋中明大乘十種勝相勝語以異小乘至寂滅勝相勝語中明六種轉而第五下劣轉謂諸聲聞緣覺等通達人無我故一向背捨生死不能利他故呼小乘下劣也貧所樂法者淨名香積品彼諸菩薩問維摩詰言今世尊釋迦牟尼佛以何說法維摩詰言此土眾生剛強難化故佛為說剛強之語以調伏之謂此是地獄畜生等是諸難處剛強眾生乃可入律彼諸菩薩皆曰未曾有也釋迦牟尼隱其無量自在之力乃以貧所樂法度脫眾生法華曰鄙事涅槃曰偽礫皆下劣義註不信不解非其境界故維摩疏一初引華嚴云此經不入二乘人手垂裕記二十云手以受物表信力故受法二乘不聞從何起信文記垂裕記下轉證手以表信大論說信為手入佛法無漏根力覺道禪定寶山中自在所取無信如無手入寶山中都無所得也補大師著淨名疏廿八卷荊溪略為十卷與前玄疏並行今已亡孤山圓著釋略疏十卷名垂裕者謂垂示其寬裕之義今亦亡註慕大耻小得通教益釋籤三廿三云謂受彈斥令其嘆大自鄙即生酥益相文輔行十廿四云密成通益文記此釋得通益相也釋籤意指淨名不思議品明諸大弟子禮座受斥之後復聞大菩薩難思解脫法門故大迦葉謂舍利弗譬如有人於盲者前現諸色像非彼所見一切聲聞聞是法門不能解了為若此也智者聞是其誰不發無上道心我等何為永斷善根於此大乘已如敗種一切聲聞聞是不可思議解脫法門皆應號泣聲振大千一切菩薩應大欣慶頂受此法若有菩薩信解難思法門者一切魔事無如之何是為嘆大自鄙即是生酥益相也輔行下引證益相註心漸通泰得別教益釋籤三二十三云至般若中不復同前悲泣之時故云通泰又云皆使令知即熟酥益相得此益已義成別人文輔行云密成別益文蓋顯二乘人於法華前不論改觀故云密也記此釋得別益相也前方等時二乘之人聞罵不瞋但言聞大法門應當號泣今至般若奉命轉教已覺通泰故不同前悲泣之時也又如來以共不共般若廣略二門皆使領知其猶長者委知家業是熟酥益相也以前得生酥益即成通人今得熟酥益義成別人也謂般若旁用通教正用別圓既以別理加於二乘故得密成別益也蓋顯下申得密益之意補二乘自利修空今教菩薩改修假觀乃約秘密邊論註三周說法法說周為上根人作三乘一乘說身子得悟譬說周為中根人作三車一車說四大弟子得悟因緣周為下根人作宿世因緣說千二百聲聞得悟皆授初住八相之記記此釋三周說法也謂法說周即方便品開三乘權顯一乘實舍利弗領悟云而今從佛聞所未聞乃至今日乃知真是佛子譬說周以三車一車之淺況三乘一乘之深大迦葉等四人領悟如迦葉云不謂於今忽然得聞希有之法因緣周即化城喻品明佛於大通智勝佛所為十六沙彌於八萬四千劫為四部眾廣說法華經所化無量恒河沙眾生即今諸比丘及佛滅後未來世中聲聞弟子是也說因緣時富樓那等千二百聲聞領悟如五百羅漢云我今乃知實是菩薩得受阿耨多羅三藐三菩提記皆授初住記者欲令與物結淨土緣故也三結成此約最鈍根具經五味註最鈍根妙玄十廿四云自有一人歷五味如小乘根性於頓如乳三藏如酪乃至醍醐方得究竟文即最鈍根性也二中根其次者或經一二三四註其次者妙玄十廿四云自有利根菩薩未入位聲聞或於三藏中見性是歷二味自有方等中見性是歷三味般若中見性是歷四味文據此則一味不得入至於二味乃至三味不得入至於四味皆名次根也補此釋次根不定也未入位者未入四果定性根性大小未定也若入聲聞定性正位是不能發三菩提心何以故以與生死作障隔故謂二乘滅智灰身永斷生死不能復入生死益物也既未入位或於藏等密聞圓常而見性也三上根其上達根性味味得入法界實相何必須待法華開會註上達根性妙玄十廿四云自有一人稟一味如華嚴純一根性即得醍醐不歷五味也大經云雪山有草名曰忍辱牛若食者即得醍醐文即上達根性也前四時中鹿苑密入餘皆顯入故云味味得入於法華中但論增道也記此釋味味得入者謂鹿苑有八萬諸天聞轉生滅法輪密證無生法忍是為密入若華嚴方等般若時皆是顯入來今法華會中不謂顯入密入但論增道損生也註法界實相一體異名上有味味之言故重云耳若輔行云實相是別理法界是圓理據大經十千菩薩得一生實相初地同住是接入別五千菩薩得二生法界圓教二住是接入圓以教判文理還不異記此料揀法界實相名異體同次釋重舉意謂由上文有味味之言為欲對之故重云法界實相二名耳若輔行下一段文乃玉師約義引文而為點示非輔行之全文也補輔行云大經佛說觀因緣智四種不同得菩提異說是語時十千菩薩得一生實相五千菩薩得二生法界章安云三乘同觀第一義諦智解不同一生二生是破無明一品二品實相是別理法界是圓理即利根接入別圓也四智得菩提異者謂只一因緣第一義諦下智觀故得聲聞菩提中智觀故得緣覺菩提上智觀故得菩薩菩提上上智觀故得佛菩提乃是通教之機通前通後同觀一法而得四種之異也一生二生是破無明一二品者通教一真含二中能解即為別圓所接然不能定其是別是圓且據破惑無明多少以分利鈍次第一心而判別圓也又別家明教若初地至二地仍經多劫時長行遠從無超證之義若圓家一生可超十地之階況復一二故一生是別二生是圓也實相是別法界是圓者以四教義判涅槃文謂一生實相是接入別二生法界是接入圓也若尅實論之法界實相只是一體原無有異四總結綱文上來已錄五味五時化儀四教大綱如此註籤云言次第者華嚴初云於菩提道場始成正覺在初明矣諸部小乘雖云初成自是小機見為初耳據信解品脫妙著麤故居其次大集云如來成道始十六年故知方等在鹿苑後仁王云如來成道二十九年已為我說摩訶般若故知在方等後亦知仁王在大品後法華云四十餘年大經云臨滅度時當知次第有所據也文記此示五時次第也華嚴云世尊在摩竭提國法菩提場中始成正覺華嚴第一時也四十二章經云世尊成道作是思惟離欲寂靜是為最勝住大禪定降諸魔道故於鹿野苑中轉四諦法輪度憍陳如等五人而證道果然是小機見初成道耳據信解品脫妙著麤之文鹿苑第二時也大集序品云爾時如來成道始十六年廣知眾中多修梵行悉來大集堪任受持菩薩法藏即為宣說菩薩所行之法先示諸佛大神通力為諸菩薩令知諸佛境界方等第三時也仁王般若云大覺世尊前已為我等二十九年說摩訶般若金剛般若天王般若光讚般若故般若第四時也法華云我得阿耨多羅三藐三菩提從是已來始過四十餘年大經云二月十五日臨涅槃時以佛神力出大音聲其聲遍告乃至有頂眾生世尊將欲涅槃若有所疑今悉可問為最後問故此二經同第五時也是知五時次第有據矣註此乃別論次第通則不然如妙玄十二云若華嚴頓乳別但在初通則至後故無量義云次說般若歷劫修行華嚴海空法華會入佛慧即是通至二經乃至夫日初出先照高山日若垂沒亦應餘輝峻嶺故蓮華藏海通至涅槃之後況前教耶若修多羅半酪之教別論在第二時通論亦至於後何者迦留陀夷於法華中面得受記後入聚落被害作結戒緣起又如身子法華請主後入滅均提持三衣至佛問五分法身滅不答云不滅雖云五分不滅終是小乘中意豈非三藏至後耶若方等教別論在第三時通亦至於後何者陀羅尼云先於王城授聲聞記今於舍衛國復授聲聞記故知方等至法華後般若別論在第四時通論亦至初後何者始從得道夜至泥洹夜常說般若若涅槃別論在第五時通論亦至於初何者釋論云從初發心常觀涅槃行道此則通至於前若法華顯露不見通前秘密邊論理無障礙故身子云我昔從佛聞如是法見諸菩薩受記作佛豈非證昔通記之文文若論方等亦通於前淨名略記下之上初云鹿苑理須密說彈斥又華嚴中四何須更論亦是其例既其一切俱通初後豈可方等不通於初文記此示通五時明佛化周圓也般若華嚴海空者無量義云由鈍根菩薩三處入法界初因般若入法界者華嚴時節長昔小機未入今聞般若入法界即華嚴海空義則知華嚴通後般若也法華佛慧者鈍根菩薩次從法華悟入法界名入佛慧經云始見我身入如來慧今聞是經入於佛慧初後佛慧圓頓義齊則知華嚴通後法華也蓮華藏海通涅槃後者此是玄文申出經意以明鈍根菩薩從後涅槃悟入法界以像法決疑經云今日座中無央數眾或見佛丈六身乃至或見報身蓮華藏海為千百億釋迦佛說心地法門故玄文申云餘輝等也籤云彼經既有住世無量劫之言又見報身蓮華藏海說心地法門知華嚴通涅槃後也若修下明酪教通後佛世僧夜行乞食迦留陀夷而黑有光婦見謂鬼驚墮孕自此佛制不許夜行故籤云雖於法華得記此後猶作結戒緣起按迦留陀夷由非時入聚落俗疑打殺埋馬糞中出便入滅見涅槃又如身子者身子入滅均提持師三衣至佛問汝師五分法身滅否答不滅阿難云彼恒說法教化故憶此耳佛言止過去諸佛可非滅耶而五分不滅何所憂耶然雖曰不滅終是小乘中意故籤云以無作之業至未來世名為不滅非常住不滅也則知三藏通至於後也五分法身者籤云無作戒名戒身無漏淨禪名定身無漏慧名慧身二種解脫名解脫身一者有為解脫謂無漏智相應二者無為解脫謂一切煩惱無餘也又盡智為解脫身無生智為解脫知見法數云知屬智知見屬眼見即無生智眼自在照了也若方等下明方等通後籤云言至法華後者即指王城授記同於法華舍衛國記即指方等通法華後如陀羅尼經文殊白佛言先於王城已授聲聞記今復於舍衛國授聲聞記昔於波羅柰授聲聞記我今請問唯佛聽許舍利弗問文殊世尊授記得菩提各於世界如今世尊世尊不虗所言真實故能第二第三授我等記知方等通後法華也般若下明般若通初後大品謂始從得道通初也終至泥洹通後也若涅槃下明涅槃通初謂從初發心常觀涅槃行道之言出自涅槃經中而釋論舉之以釋大品則知涅槃通至於初也若法華下明法華通初謂法華顯露邊既出前四時之上故不見有文通前也若就久默斯要開麤成妙謂之秘密當知此非八教中秘密乃是無障礙理故得通初如身子言我昔從佛聞如是法見諸菩薩授記作佛籤曰通記者昔日授記佛意不壅小乘情隔自無希取況約秘密以記二乘據斯以論法華通鹿苑矣已上引玄文明通五時也若論下重明方等通前謂略記說鹿苑纔證小果便須密斥未必在十二年後又曰華嚴中四何須更論則方等已在中故曰亦是其例又餘時既互通豈等三方等但通後而不通前耶補淨名略記荊溪作註然只一五時論通論別別則次第通則互通並是如來赴機之相記宜通五時入道則通五時應之宜別五時入道則別五時應之註但於通中有文通義通若文通者如結集經家乃取部類相從之文收通歸別如時長華嚴方等陀羅尼等是也若義通者如蓮華藏海通至涅槃之後與夫日若垂沒餘輝峻嶺等是也此則不可收歸於別也記文通謂文類相從故可收歸於別若義通乃他部明華嚴義不可收歸於別也備辨訛曰時長二字應改後分註然非別五時無以見如來說法次第非通五時無以見教法融通記此結判五時須開通別可解
