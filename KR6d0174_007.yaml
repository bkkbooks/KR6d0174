body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢六菴較訂天台嫡裔比丘諦間編科參梓三餓鬼道三餓鬼道梵語闍黎哆此道亦遍諸趣有福德者作山林冢廟神無福德者居不淨處不得飲食常受鞭打填河塞海受苦無量諂誑心意作下品五逆十惡感此道身注輔行二上二十五云梵語闍黎哆此翻祖父後生云祖父者從初受名又後生亦是後生之祖父也記婆沙言或有衆生最初生彼道中名祖父又言後諸衆生生彼生處彼相續者亦名祖父注爾雅云鬼者歸也尸子曰古者名死人為歸人又云人神曰鬼地神曰祇天神曰靈又云饑餓謂餓鬼也恆被驅使記此引外書釋鬼也夏禹王濟江龍負舟舟人懼禹歎曰吾受命於天竭力以勞萬民生寄也死歸也何憂龍焉自後稱死者為歸人也饑餓等婆沙論言有說多饑渴故彼衆生腹如山咽如針孔百千歲不聞水聲亦未曾見何況得觸又言復有說者被驅使故彼恆為諸天處處驅使故亦名驅使鬼補鬼者畏也謂虗怯多畏又威也能令他畏其威故注此道亦遍諸趣輔行三下云此處在閻浮提下五百由旬有閻王界縱廣量亦等是根本處亦有住閻浮提洲者有德者住華果樹林無德者居不淨處東西二洲亦有鬼北洲唯有威德者諸天亦有隨生處形或居海渚或在人間山林中或似人形或似獸形記有德住華果者即主掌華果樹林使不枯瘁而受奇華茂林之樂無德居不淨者有二一有力主掌其處二無力偷啖糞穢常受鞭笞東西亦分有無威德二種北唯威德者彼地清淨果報故諸天隨生處形者謂四天王天三十三天唯有威德者也居海渚山林者有說閻浮提西有五百渚兩渚間有五百餓鬼城其二百五十有威德者住其二百五十無威德者住故尼彌轉輪聖王告御者摩多羅曰我欲升天汝可從是道去使我見諸衆生受惡善報者爾時聖王從諸城過見有威德者如諸天子天冠天衣食甘飲美各各遊戲而自娛樂無威德者露體無衣以髮自覆手執瓦器行乞自活也似人形獸形者謂有正立者有旁側者或面如豬或首似牛如壁上畫像是也已上俱準婆沙對記補隨生處形者如生南洲像南洲人形生天像天人形又長阿含言一切人民所居舍宅街巷四衢道中屠兒肆市及丘冢間皆有鬼神無有空者依人名人依村名村一切樹木極小如車軸者皆有鬼神依止有師標言隨生處形謂隨何處命終即作彼形語評曰不應作是說若從無色界歿生此處可無形無語耶應言隨所生處形語亦爾注不得飲食重者饑火節𦦨不聞漿水之名中者伺求蕩滌膿血糞穢輕者時簿一飽加以刀杖驅逼塞海填河四解脫經稱為刀途從彼刀杖驅逼為名也記然餓鬼應名血途以見清水為膿血故而經從彼刀杖驅逼名刀途也注下品正作能悔故云下品俱舍頌云鬼日月五百以人間一月為一日壽五百歲更有三類九種內障外障無障如蘭盆疏記三類九種如下圖示內障外障無障者疏曰水到化為膿血是內障咽如針腹如癭為外障飲血啖糞燒然是無障也又有言一外障得遇水時即見有人執刀杖等障礙故二內障口有火炬或咽如針故三無障見河是猛火或食糞穢或自割身肉食啖等也注今水陸施食正為𦦨口鬼神婆羅門仙出生所供為曠野鬼神鬼子母等記佛說焰口經曰阿難習定夜見鬼王口吐火焰饑火交燃問是何名答曰面燃汝三日中當墮我類阿難驚怖歸投大覺慈尊敘說前因啓請救苦之法佛告阿難我念過去作婆羅門時於觀世音菩薩邊受得陀羅尼名曰無量威德自在光明如來陀羅尼法汝若善能作此法者加持七遍能令一食變成種種甘露飲食即能充足百千俱胝那由他恆河沙數一切餓鬼婆羅門仙也出生偈曰大鵬金翅鳥曠野鬼神衆羅剎鬼子母悉皆得飽滿是也補統紀水陸者梁武帝夢神僧告以作水陸大齊拔濟六道四生帝即遣迎大藏創立儀文三年而成乃建道場出生者有二緣一者涅槃經合旋曠野鬼神毗奈耶令施鬼子母等此曹本食肉噉人佛化之受戒囑弟子隨處施食今齊堂各各出生是也此唯出家人行之二者𦦨口經令施餓鬼食今齊堂別俱小斛於食畢衆作法既之或名具小生斛夜間呪施此通俗行之記盂蘭盆疏曰鬼有三一無財以無福德不得食故二少財少得淨妙飲食故三多財多得淨妙飲食故復各有三無財三者一炬口者謂火炬炎熾常從口出正法念經云若人貪嫉枉奪人財破人城郭殺害抄掠得財奉王大臣轉增凶暴墮熾然餓鬼中二針咽者頭大如山咽如針孔由破齊夜食盜竊衆僧食故三臭口者口中腐臭自受惡報以多貪名利自是非他讚歎惡人毀謗賢善故少財中三一針毛者毛利如針行便自刺為貪利故妄行針灸及刺衆生但為求財不愈病故二臭毛者鬼毛利而臭自拔受苦由販賣畜生烹宰燖剝楚痛難堪地獄罪終墮斯鬼趣三大癭者咽垂大癭自抉噉膿由嫉妬於人常懷嗔恨故多財中三一得棄鬼常得祭祀所棄食故由罪多福少少施多慳棄擲之物方惠施故二得失者常得巷陌所遺食故以於現財常生慳著疑欲失者而方捨故三勢力者謂夜叉羅剎毗舍闍鬼等所受福樂類於人天或依樹林山谷靈廟空居形豎而行屬於鬼趣此等變化多端由於因地罪福不精苦樂之因相雜作故然鬼神一道多不信者昔阮修執無鬼曰今有見鬼者言著生時衣人有鬼衣亦有鬼耶論者伏焉此亦不達鬼化為衣似生時所著服也然俗雖說有非悉知有故俗所說但見人畜少分不見餘之四道如孔子曰生與人事此尚未知死與鬼神我焉能測則知佛教法方備明道六之趣歟四阿修羅道四阿修羅道此翻無酒又無端正又無天或在海岸海底宮殿嚴飾常好𨷖戰怕怖無極在因之時懷猜忌心雖行五常次勝他故作下品十善感此道身注文句二二十一云四天下採花醞於大海魚龍業力其味不變嗔妬誓斷故言無酒記修羅嗜酒遍採名花醞海欲成香醪魚龍業力水味不變嗔妬誓斷酒故名無酒注無端正男醜女端舍脂是也記男修羅二十四頭千手其醜可知女修羅端正如舍脂帝釋納為妻五通仙人聞其聲即失五通其美亦可知矣今據男修羅故名無端正新婆沙言素洛名端正彼非端正名阿素洛注無天淨名疏二十四云此神果報最勝鄰次諸天而非天也妙樂二二十九云無天德故文記淨名疏釋者此道有天福報無天德行妙樂準正理論言洛素名天是自在義無天實德名阿素洛注或在海岸海底輔行二上二十五云世界初成住須彌頂亦有宮殿後光音天下如是展轉至第五天修羅嗔便避之無住處下生此文文句二二十一云鬼道攝者居大海邊畜生道攝者居大海底準此則知妙玄明或居半須彌山巖窟應天種攝妙樂引阿含四修羅次第住於海底各於海下二萬由旬以為一宮居止處殊勝必兼多福方得生彼又楞嚴經明胎卵濕化四種之異屬於鬼畜人天四處所攝具如彼文記輔行中明修羅避天從他化逆數而來忉利正是第五天嗔避之故移住海岸海底文句中明鬼畜修羅住海岸海底以正法念經云阿修羅二種一鬼道攝魔身修羅有神通力二畜道攝住大海底須彌山側阿毗曇論言阿修羅諂曲覆故鬼道所攝羅睺阿修羅王師子生故畜道所攝而文句則以鬼道居海邊畜道居海底準知妙玄明居須彌巖窟住者天種攝也言天種者妙樂言並是元祖又大權示現往緣何定故有畜修羅天種攝也妙樂中引阿含四修羅住處即婆稚阿修羅佉羅騫默阿修羅毗摩質多羅阿修羅羅睺阿修羅也各於海下二萬由旬為宮必兼多福方得生彼又於文末檢十地經曰修羅有五類一極弱者住人間山林西方山大窟深有非天之宮二妙高山北大海之下二萬一千由旬有羅睺宮三又二萬一千由旬有勇健之宮四又二萬一千由旬有華鬘之宮華鬘此云綺畫以文其身五又二萬一千由旬有毗摩質多羅宮即次第住海底相也故正法念處經說多好𨷖諍懷勝負故或居衆相山中或居海下然有大力者廣修福故也又楞嚴經言三界中有四種修羅若於鬼道以護法力乘通人空此從卵生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此從胎出人趣所攝有阿修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝注宮殿嚴飾妙樂引長阿含十八云南洲金剛山中有修羅宮所治六十由旬欄楯行樹等然一日一夜三時受苦苦具自來入其宮中屬四趣者良有以也文記起世經說修羅宮殿城郭器用降地居天一等亦有婚姻男女法式略如人間今引長阿含釋復言三時受苦故屬四趣也備辨訛指三時受苦乃閻羅事注常好鬬戰文句二二十二云毗摩質多生舍脂帝釋納為妻後讒其父遂交兵腳波海水手攻善見帝釋以般若呪力不能為害文記觀佛三昧經云光音天生此地地使有欲入海水洗其不淨墮泥變為卵八千歲生一女千頭少一二十四手此女戲於水水精入身八千歲生一男二十四頭千手少一海水波音名毗摩質多索乾達婆女生舍脂帝釋業力令其父居七寶殿納為妻婆沙言帝釋納舍脂者諸天貪美色故不為族姓以舍脂端正無雙故帝釋納之為妻也瑜伽論言修羅與天鬬時或斷支節或破其身或復致死若傷心斷節續還如故若斷其首即便殞沒故諸天勝入修羅宮盡取其女修羅勝便至天宮取其天酪美味補天帝釋發大願持般若波羅密於虗空中刀杖自然而下修羅耳鼻手足一時脫落有師標言又以手搖須彌山動善見城常釋念般若上天助之修羅敗入藕孔注怕怖無極淨名疏二十四云往昔嫉妬惱他故常多怖畏文猜忌輔行二上二十五云又嫉佛說法佛為諸天說四念處彼阿修羅則說五念處佛說三十七品彼則說三十八品常為曲心所覆猜者疑懼也詩傳云以色為妬以行為忌害賢曰嫉故知修羅嫉賢忌行記此釋懷猜忌心也如婆沙言彼修羅作是念佛為我等說四念處必為諸天說五念處佛為我等說三十七必為諸天說三十八助道法以如是諂曲心所覆故不能得正決定是為懷猜忌心也又有說修羅疑佛助天佛為說五衆謂有六衆不為說一衆佛為說四諦謂有五諦不為說一諦也備節義云五念等有二說一論中明魔現作佛為四衆說五念三十八品及修羅聞說四念謂佛前為諸天說五念為我等說四念謂佛有偏曲二修羅好勝增如妄說也注五常輔行一下三云以慈育物為仁以德推遷為義進退合宜為禮權奇超拔為智言可反覆為信內德具備方成人道慢強無德判屬修羅又據善心仍居下品外揚五德本在輕他文記白虎通云仁者好生愛人也義者宜也斷決得中也禮者履也履道成人也智者知也於事見微知著也信者誠也專一不移也可反覆者後可踐其言也慢強無德者雖外行五常意在輕他無內德也備有師標曰論問阿修羅與天不異今何說善下分為修羅果報答人能出家受戒以至於道修羅心多諂曲以近道難故在人下辨訛曰合宜宜字準輔行應是儀字否則犯於義者宜也之解注十善對十惡立謂不殺等又十皆有止行二善如不殺止善放生是行善等記夫十善對十惡立者人能知惡招苦必須息惡行善方可來世致清升樂果故十善對十惡立也止行通稱善者善以順理為義息倒歸真故曰順理止則息於重倒之惡行則漸歸聖道之善也不淨慈悲因緣等觀見藏教五停心中解五人道五人道四洲不同謂東弗婆提壽二百五十歲南閻浮提壽一百歲西瞿耶尼壽五百歲北單越壽一千歲命無中夭聖人不出其中即八難之一皆苦樂相間在因之時行五常五戒五常者仁義禮智信五戒者不殺不盜不邪淫不妄語不飲酒行中品十善感此道身注輔行二上二十六云梵語摩㝹賖此云意人中所作皆先意思易曰惟人為萬物之靈禮云人者天地之心五行之端此亦未知五道故也婆沙云五道多慢莫過於人又云五道中能息意者亦莫過人文法苑云人者忍也於世違順人能安忍記婆沙言昔王名頂生王四天下告諸衆生諸有所作意當善思善籌量善憶念衆生如教思量憶念便能工巧作業以所作先意思故故名人為意人為萬物靈句出尚書泰誓篇易字誤人與天地合德故曰天地之心此以理言之也端履也首也人統五行之全故曰五行之端此以氣言之也儒典單就人論故未知五道也婆婆下引釋典解人文曰五道中慢心多者莫若人故名人趣乃至五道中能止息意莫若人趣以人能得解脫分善根能親近善知識等四法亦能修行親近善知識等四法也法苑曰人者忍也謂於世間極苦甘心安忍注四洲此世界下有三輪下風次水上金輪金輪之上有九山八海須彌居中鐵圍在外中繞須彌有七金山七香水海第七山外鐵圍之內即第八鹹海東西南北有四大洲四洲土輪居金輪之上於四洲邊復有二小洲具如俱舍記俱舍曰安立器世界風輪最居下其量廣無數厚十六洛叉次上水輪深十一億二萬下八洛叉水餘凝結成金此水金輪廣徑十二洛叉三千四百半周圍此三倍又言中洲復有八四洲邊各二又言瞻部邊二洲者一遮末羅二筏羅遮末羅勝身邊二洲者一提訶二毗提訶牛貨邊二洲者一舍𢮎二嗢怛羅漫怛里拏俱盧邊二洲者一矩拉婆二憍拉婆此一切洲皆人所住補十萬為一洛叉即億也俱舍言第一須彌山高廣各八萬由旬須彌外第一香水海橫廣八萬由旬第二雙持山高廣各四萬由旬第二香水海橫廣四萬由旬三持軸山高廣各二萬由旬四擔木山高廣各一萬由旬五善見山高廣各五千由旬六馬耳山高廣各二千五百由旬七障礙山高廣各一千二百五十由旬第七香水海橫廣一千二百五十由旬八持地山高廣各六百二十五由旬第八鹽水海三十二萬二千由旬中有四洲第九小鐵圍山高廣各三百十二由旬諸山入水皆八萬由旬住金輪上諸海皆深八萬由旬準此山海四洲可知矣注弗婆提翻勝身記西域記云東毗提訶洲舊曰弗婆提又曰弗於逮訛也此云勝勝南洲故又翻初日初出處也注閻浮提亦云瞻部無熱池側有贍部林樹影高大其果甘美依樹立名此方無故不翻西域記中翻為穢樹記大論言閻浮樹名此洲上有此樹林林中有河底有金沙名閻浮檀金以樹故名洲此洲有五百小洲圍繞通名閻浮提西域記言南贍部舊日閻浮提又曰剡浮洲訛也藏鈔言贍部此土無相當故不翻唯西域記音中翻為穢樹補非污穢之意高蔭一切名穢注瞿耶尼翻牛貨俱舍鈔云劫初時高樹下有一寶牛為貨易故記翻譯名義云牛貨亦番取與藏疏言以彼多牛以牛為貨也西域記云西瞿陀尼洲舊曰瞿那尼又曰劬伽尼訛也節義引長阿含言西瞿耶尼有大樹名斤提樹上有石牛幢又以牛羊為貨易故注含二意注單越亦云俱盧翻勝處勝三洲故俱舍頌云贍部洲人量三肘半四肘尺八東西北洲人倍倍增如次東洲八肘西洲十六肘北洲三十二肘唯有北洲人壽定一千歲餘三且據極分為言未必全爾記翻譯名義云怛越翻勝處亦言勝生於四洲中有情處貨此最勝故亦言高上出餘三方故西域記云北拘盧洲舊言單越又曰鳩樓訛也俱舍頌下長行釋言贍部人身多長三肘半於中少分有長四肘東洲八西洲十六北洲三十二而一肘長一尺八寸則南洲身量多有六尺三寸少分有七尺二寸東洲身量長有一丈四尺四寸西洲人身量長有二丈八尺八寸北洲人身量長有五丈七尺六寸又頌四洲人壽量言北洲定千歲西東半半減此洲壽不定後十初叵量謂後減至十歲其劫初八萬四千歲又諸處有中夭除北拘盧洲則知北洲勝也注聖人不出其中不生於彼而闡化非不居彼準寶雲經頗羅墮將弟子六百人住單越八難三途以為三人中則有四一盲聾瘖啞二世智辨聰三佛前佛後四北俱盧洲天上一無想或指長壽天受此諸果報不得於聖化記此釋八難也若欲不受八難須習四種輪摧如成論明菩薩習四輪摧八難一生中國輪摧滅三途北洲長壽天難二修正願輪摧世智辨聰難三植善因根輪摧盲聲瘖啞難四近善人輪摧佛前釋後難故無四輪未免八難而北俱盧乃其一也淨名疏明二種八難謂凡夫住事八難二乘住理八難事即界內八難理乃界外八難荊溪言若欲略明則有餘涅槃中三十心人為三惡道住無我法名為北洲地前法愛如長壽天未有初地十種六根名諸根不具地前智淺如世智辨聰不窮中理如佛前佛後若實報土中位位相望節節作之此并障於中道理也然此且說住事八難注苦樂相間輔行四上九云若論果報南洲為下下若得值佛南洲為上上故大論六十二云閻浮提以三事故尚勝諸天北洲不及一能斷淫欲二識念力三能精進勇猛復有書般若是故諸天下來聽法故大經云下下因緣故生北洲乃至上上因緣故生南洲文妙玄六二十九云四天下人雖果報勝劣俱有生老病死同是輕報泥犂文記教說三天下三種勝南洲一長壽二色勝三地勝故南洲為下下佛若出世唯在南洲東西但往不生北洲不生亦不往此指佛說故論值佛南洲為上上也妙樂曰佛者劫初無病劫盡多病長壽時樂短壽時苦東天下富而壽西天下多珠寶牛羊北天下無我無臣屬如此時處不感佛出八萬歲時百年時南天下人未見果而修因故知佛出其地故大論下引證南洲為上又教中明南洲有五種勝三天上及他化天一勇健二正念三佛生處四修業地五梵行然不出大論三事也大經曰人業十善復有四種一者下二者中三者上四者上上下因緣故生單越中因緣故生弗婆提上因緣故生瞿耶尼上上因緣故生閻浮提疏言十善有四報在四洲南洲年命果報最劣乃下業之果而言上上者取修道行善邊勝故補能斷淫欲即梵行也能得解脫達分得正決定故禪中四分有退住進達達者於此定中發見思無漏能到涅槃念力即正念也謂篤信念力不見果而能廣修因故三精進勇猛即勇健也有師標曰念力久遠所作而能憶故勇健不見果而能廣修因故注五常五戒常者不易戒乃防非仁則不殺義則不盜禮則不淫信則不妄語智則不飲酒酒能昏性起過故也記此釋五常五戒也初二句明戒常義次五句明戒常合對如提胃經中長者問佛何故但說於五不說四六佛言五者是天地之根太乙之初神氣之始萬物之祖是故但五又曰五戒者令成當來五體順世五常五德之法愍傷不殺曰仁清察不盜曰義防害不淫曰禮持心禁酒曰智非法不言曰信此五不可造次而虧不可須臾而廢君子奉之以立身用之不暫棄然是以五戒順世五常也今乃以五常通於五戒如天台大師言仁慈矜養不害於他即不殺戒義讓推廉抽己惠彼是不盜戒體制規矩結髮成親即不邪淫戒智鑑明利所為秉直中當道理即不飲酒戒信契實録誠節不欺是不妄語戒也末句明酒起過如梵網經言酒生過失無量若伸手過酒器與人飲酒者五百世無手大論開有三種一穀酒二果酒三藥酒皆不得飲也又問出家禁飲無待論矣漢書言酒者天之美祿所以頤養天下享祀祈求扶衰養疾故有國家者以酒合歡以酒成禮云何世間而得禁飲耶答夏禹以前不聞有酒唐虞之治禮備樂和酒之可戒亦明甚矣又何論焉又問大師戒經疏開不為過患者何也答此正明免於過患者難也誠使百拜而禍不侵無量而亂不及文忠終身不醉思遠醉勝醒人能如是者疏文許開意有在焉如其不能禁絶為上注又五戒四性一遮酒乃遮制餘性是惡大小乘禁戒此為根本止觀四二云性戒者莫問受與不受犯即是罪受與不受持即是善若受戒持生福犯獲罪不受無福不受犯無罪文輔行四上三云所言性者即舊戒也不待佛制性是善惡故名為性又云五戒者四性一遮故俱舍云遮中唯離酒為護餘律儀若論制已性上更加一箇制罪文性戒輪王亦用遮戒如來所制五戒十善開合之異身三可見不妄語則攝口業四種酒防意地則攝意三記此明五戒四性一遮者如報恩經曰優婆塞五戒四是實罪飲酒一戒是遮罪同結為五戒者以飲酒是放逸之本能犯四戒故如迦葉佛時有優婆塞以飲酒故邪淫他婦盜殺他雞人問何故爾答言不作以酒亂故一時能破四戒雖非實罪與實罪同也大小乘戒根本者法界次第言犯五戒者則破五分法身及一切佛法以五戒是大小乘尸羅根本若犯五戒則不得更受大小乘戒若能堅持則是五大施也止觀下明性受二戒持犯罪福有異性戒者下輔行云料簡三學無作有無初戒無作者性戒不受故無無作若受戒下輔行言明受得戒即有無作故性罪之上加違無作出家等戒無作別生受得戒已感發無作是故持則福等虗空破乃隨破一支一境舉持勸受加罪遮違況犯已法除復本清淨是為受得之戒與性戒有異故輔行云如伐草害畜俱有違制之罪作單提悔二遮俱滅然於害畜仍有性愆故引大論解言違無作罪同滅而償命猶在是為性受有異也俱舍下文言諸飲酒者心多縱逸不能守護諸餘律儀故為護餘令離飲酒也制已加一制罪者如大論引經云佛言若出家人犯欲則棄是比丘自誓而犯是一罪知佛所制故而違犯是二罪是也性戒下光明句言開五戒出十善十善是舊法輪王亦用亦名性罪性罪都是一切罪之根本則知性戒通為所用也律明諸餘比丘犯種種罪如來一一遮制如禮樂自天子出故知遮戒局在如來所制也末二行明戒善開合之異如光明文句云五戒對十善殺盜淫是身三妄語攝口四飲酒攝意三俗不能護口略制一妄語釋論言說重者是妄語則已攝三飲酒是邪命自活增益恚癡出世以智慧為首生死以三毒為根若能禁酒是防止意地三毒長養出世智慧也備九山八海形狀及下天道略知而已故不廣録統紀有三千大千圖須者往檢六天道二初總判六天道二十八天不同欲界六天色界十八天無色界四天注輔行二上草六云今釋典中所言天者亦名最勝亦名光明文文句四末云天者天然自然樂勝身勝文記婆沙言諸趣中勝故謂有勝樂勝吉善勝身勝形體勝有如是等勝故名為天又曰有說諸天無晝夜常以光明自照故曰天趣也文句下如正理言天者威德特尊神用自在又別行鈔言天者名無愁惱常受快樂故注二十八天不同舉豎包橫也若統論一佛化境則有三千大千世界記若以橫論則欲界忉利一天即有三十三天今以豎論也三千者小千中千大千也二禪統一小千三禪統一中千四禪統一大千三千是總大千是別總別雙舉以別顯總也記或問金光明經說諸人王手擎香爐供養經時其香遍布於一念頃遍至三千大千世界百億日月乃至百億非非想天則大千直至有頂天今何言四禪統一大千耶今答所以爾者為與長阿含十八雜阿含十六正理三十一及瑜伽智論雜集顯揚同意故也況有云顯揚第一明三千世界三災所壞故此以四禪統大千也注俱舍頌云四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍說名一中千此千倍大千皆同一成壞謂一千四洲一千日月一千須彌一千六欲天一千初禪天總名小千世界一千箇小千世界名中千世界一千箇中千世界名大千世界記此段原注正釋前七句頌而與俱舍長行釋頌同小千為一二禪所覆中千為一三禪所覆大千為一四禪所覆例此應云千箇初禪為小千千箇二禪為中千千箇三禪為大千小千如千錢中千如千貫大千如千箇千貫記此段原注準例舉譬論釋俱舍言此文易了總以喻顯也然以十萬為億則大千有萬億日月而光明經云百億日月乃至百億非非想天等者蓋億有四種一十萬為億中千有十億大千萬億二百萬為億中千有一億大千有千億三千萬為億大千則有百億光明據此數也四萬萬為億大千世界但有十億又復四禪非想唯一亦言百億者光明記五七云以下望上言之耳又恐翻譯之訛也以義淨重翻則無百億非想之言記此段原解釋違光明經云若據俱舍釋違則言大千有萬億日月光明經云大千百億日月者蓋此方黃帝算法數有三等謂上中下也下等數法十十變之中等百百變之上等倍倍變之今此三千若以小數計有萬億若以中數計從千百已上百變之則有百億也故華嚴鈔云若以小數者小數則下等十十變也謂十小千為萬百小千為億千小千為中千已有十億更一千中千為一大千一千中千即為千箇十億故為萬億若約中數者謂從千已上方百百變之謂百小千方為一萬千箇小千為中千方是十萬十箇中千始為百萬方是一億既十中千為一億若千箇中千則有百億故知論約下等小數而言萬億經據中數故言百億日月等補以下望上言者因下初禪有百億須彌等望上四禪非非想亦帶言百億也又瑞應經云三千日月萬二千天地之中央者萬即大千謂萬億二千即中千小千也蓋言佛生迦維衛國是三千世界之中央也記萬即大千下釋明瑞應經文須知成住壞空各二十劫為一大劫一增一減為一小劫於住劫中二十增減每一增減有小三災壞於有情住劫盡時乃有大三災壞於世界經二十劫空劫成劫各二十劫並約住劫數量而論記此釋第八句頌補成住壞空大中小劫大小三災統紀詳載備辨訛云小三災壞有情在住劫論壞劫中云十九劫壞有情乃是空有情也注業道增壽減至十三災現刀疾饑如次七日月年止記此明三小災起而此一頌出論第十二卷十一紙論釋言從諸有情起虗誑語諸惡業道後後轉增故此洲人壽量漸減乃至極於十歲小三災現故諸災患二法為本一耽美食二性懶惰此小三災中劫末起三災者一刀兵二疾疫三饑饉謂中劫末十歲時人為非法貪染污相續不平等愛映蔽其心邪法縈纏嗔毒增上相見便起猛利害心如獵師見禽獸隨手所執皆成利刀各騁凶狂互相殘害故說刀兵又中劫末十歲時人由具如前諸過失故非人吐毒疾疫流行遇轍命終難可救療故說疾疫又中劫末十歲時人亦具如前諸過失故天龍忿責不降甘雨由是世間久遭饑饉多分命終故說由饑饉故便有聚集白骨運籌由二種因名有聚集一人聚集謂彼時人由極饑羸聚集而死二種聚集謂彼時人為益後人輟其所食置於小篋擬為種子故饑饉時名為聚集言有白骨亦有二因一謂彼時人身形枯燥命終未久白骨便現二饑荒所逼聚集白骨煎汁飲之有運籌言亦二因故一由糧少行籌食之謂一家中從長至幼隨籌至日得少粗食二謂以籌挑故場得少榖粒多用水煎分共飲之以濟餘命然教中說若人能一晝夜持不殺戒未來決定不逢刀兵災起若能以一訶梨怛雞即呵梨勒果此言天主持來起殷淨心奉施僧衆當來決定不逢疾疫災起若能以一摶食起殷淨心奉施僧衆當來決定不逢饑饉災起此小三災各經幾時刀兵唯七日夜疾疫七月七日饑饉七年七月七日度此便止人壽漸增東西二洲無根本三災有相似災起謂嗔恚增盛似刀兵身力羸劣似疾疫數加饑渴似饑饉北洲總無前說火災焚燒大千世界餘二災亦爾據瑜伽論人壽減至三十歲饑饉災起七年七月七日止減至二十歲時疾疫災起七月七日止減至十歲時刀兵災起七日七夜止今俱舍云至十三災現者乃據減劫之極為言也故自十歲返次送對則十歲刀兵乃對七日二十歲時疾疫乃對七月三十歲時饑饉乃對七年則與瑜伽初無異也記此會釋二論對次異同垂裕記十十二引什師云婆須密從忉天下生王家作太子化衆人言我等祖父壽命極長以今瞋恚無慧故至此短壽是故汝等當行慈心衆人從命惡心漸薄此後生子壽二十歲如是展轉增至八萬四千歲也文論增則子年倍父年則自十歲增至八萬四千歲論減則百年減一年則自八萬四千歲減至十歲故一增一減為一小劫記此示名小劫然此一增一減亦名一轆轤劫備辨訛云子年倍父句或生人倍於父年取其為信未必人人如此也百年減一之言未詳出處阿含云子年倍父年增既倍倍而增減亦半半而減雖如此言亦非頓增頓減如今人壽較古漸減故據理以漸增漸減為是達者詳之注三災水火風上三定為頂記此頌明大三災起今明三災頂處二禪為火災頂三禪為水災頂四禪為風災頂記更不過上故三皆頂注如次內災等四無不動故初禪內有覺觀能燒惱心等外火災二禪內有喜受與輕安俱潤身如水故遍身粗重等外水災三禪內有動息息亦是風等外風災四禪無內患故亦無外災記此二句頌通明四禪有災無災之所以也此釋與論辭異意同以論釋下三定先有徵云何緣下三定遭水火風災初二三定中內災等彼故又論稱初靜慮等此稱初禪等又論稱尋伺此稱覺觀是辭異意同也又論云何緣不立地亦為災以器世間即是地故但可火等與地相違不可說言地還違地今注中無此徵釋也論釋第四定亦先徵言第四靜慮何緣無外災彼無外災離內災故由是佛說彼名不動內外三災所不及故有說彼地有淨居天故彼不遭諸災所害由彼不可生無色天亦復不應更往餘處是則與今注辭義詳略有異也備辨訛云準俱舍論遍身粗重下有由此皆除一句當注其下方可銷文否則遍身句亦不必引注然彼器非常情俱生滅故彼器即依報雖云不動非是常住不壞之法情即有情正報彼天宮殿情生則生情滅則滅記此二句頌單明第四禪非常住不動也此釋與論意同以論文言若爾彼地器應是常不爾與有情俱生俱滅故謂彼天處無總地形但如衆星居處各別有情於生時死時所住天宮隨起隨滅是故彼器體非常住雖云不動者以論釋有言由此佛說彼名不動內外三災所不及故然非是常住不壞之不動也注要七火一水七火水後風初禪以下七經火災是則七番成住壞空當七大劫第八水災齊於二禪又一番成壞當八大劫如是初禪已下七七四十九火二禪已下七番水災成五十六劫初禪已下又七火災當六十三劫六十四劫風災壞至三禪也又火災興由七日並現劫第未壞時六日隱在雙持山下世界壞時後六日漸出水災起時由雨霖注風災生時由風相擊從下風輪有猛風起又業力盡隨處生風記此釋頌與論互有詳略論言所說三災云何次第要先無間起七火災其次定應一水災起此後無間復七火災度七火災還有一水乃至滿七水災復七火災此第八番即風災起如是總有八七火災一七水災一風災起何緣如是由彼有情修習定因於上漸勝故感身壽漸長初禪壽一大劫二禪第三天八劫三禪第三天六十四劫由是所居亦漸久住是論釋詳而注略也七日並現者如七日喻經言佛告諸比丘一切有為法無常變異皆歸磨滅劫欲盡時大旱積久草木皆焦第二日出諸小流水皆竭第三日出大河亦涸第四日出閻浮提中四大河及阿那婆達多池皆亦空竭第五日出大海乾涸第六日出大地須彌山等皆悉煙出如陶燒器第七日出悉皆熾然無復煙氣地及須彌乃至梵天火皆然滿故俱舍言此大三災逼有情類令捨下地集上天中初火災興由七日現次水災起由雨霖霪後風災生由風相擊此三災力壞器世間乃至微塵亦無餘在又復應知三災既由衆生嗜飲食好懶惰所致則僧伽藍中當以佛法住持方能佛法久住若以衣食而住則令災起法滅吾人安忍法滅悠揚嗜味坐待三災耶備天溪問答中問六日隱雙持何以不壞雙持答當約衆生業力判之六日不壞雙持乃衆生業力未盡也二別顯三初欲界初欲界六天者一四天王天居須彌山腹二忉利天居須彌山頂自有三十三天已上二天單修上品十善得生其中備補遺曰正法念經言第一善法堂天即帝釋二住峯天三山頂四善見城五鉢祕地六住俱吒七雜殿八歡喜園九光明十波利樹十一險岸十二雜險岸十三摩尼藏十四旋行地十五密殿十六鬘影處十七柔軟地十八雜莊嚴十九如意地二十微細行二十一歌音樂二十二威德輪二十三月行二十四婆利二十五速行二十六影照二十七智慧二十八衆分二十九住輪三十上行三十一威德顏三十二威德炎輪三十三清淨天三夜摩天四兜率天五化樂天六他化自在天已上四天空居修上品十善兼坐未到定得生其中注俱舍頌云六受欲交抱執手笑視淫初如五至十色圓滿有衣輔行六上二云地居形交忉利以風為事夜摩抱持兜率執手化樂視笑他化但視文記六天有欲為欲界此釋頌前兩句受欲事也六欲天化生時四天王天如五歲兒乃至他化如十歲兒後則漸長如其身量色界初生身量即成且具天衣如梵衆生初生長半由旬記此釋頌後兩句初生身量總上所釋與論辭語詳略有異以論釋言唯六欲天受妙欲境於中初四天王二忉利天依地居之天彤交成淫與人無別然風氣泄熱惱便除非如人間有餘不淨夜摩天衆才抱成淫覩史多天但由執手樂變化天唯相向笑他化自在相視成淫世施設中說相抱等但為顯彼時量差別以上諸天欲境轉妙貪心轉捷故使之然隨彼諸天男女膝上有童男童女化生即說為彼天所生男女次二句明生天衆身量又釋曰且六欲諸天初生如次如五六七八九十歲人生已身形速得成滿色相天衆於初生時身量周圓具妙衣服一切天衆皆作聖言謂同中印土也備節義言諸天皆從父母膝上生或父母臥處生於女天膝臥處生只一母男天膝臥處生則一父又源洪師曰六欲諸天皆有蓮池凡諸天配夫婦已共遊蓮池見華乳生男女共摸揑此乳令乳得陰陽之氣內孕天形月滿華開形相具足譬如卵生要藉父母暖氣而成不同佛國蓮華化生也注四天王天東方提頭賴吒天王此云持國護持國土故居黃金埵領乾達婆富單那南方毗留勒叉天王此云增長令他善根增長故居琉璃埵領鳩槃茶薜荔多王有九十一子如靈感傳西方毗留博叉天王此云廣目亦云非好報亦云雜語能作種種語故居白銀埵領毗舍闍毒龍等北方毗沙門天王此云多聞福德之名聞四方故居水晶埵領夜叉羅剎諸處建立天王堂事見唐天寶元年如僧史略記翻譯名義言提多羅咤翻治國主乾闥婆及毗舍闍乾闥婆天主幢倒樂神毗舍闍啖精氣鬼亦名顛狂鬼光明疏言上升之元首下界之初天王名提頭賴吒此言持國又翻安民毗流離翻增長主鳩槃茶及薜荔多鳩槃茶舊曰冬瓜陰如冬瓜行置肩上坐便踞之薜荔多言祖父餓鬼劣者也光明疏言王名毗留勒叉翻免離今注言王有九十一子如靈感傳者未詳毗流波叉翻雜語主諸龍及富樓多那即富單羅此言臭餓鬼主熱病光明疏曰王名毗留博叉翻非好報又翻惡眼亦翻廣目沙門翻多聞主夜叉及羅剎夜叉翻勇健又翻輕疾飛空捷疾故羅剎翻暴惡又言可畏乃食人之鬼光明疏曰王名毗沙門索隱言福德之名聞四方故亦翻普聞佛合掌擎古佛舍利塔僧史略曰唐天寶元年西番五國來冠安西二月十一日奏請兵解援發師萬里纍月方到近臣奏且詔不空三藏入內持念玄宗秉香爐不空誦仁王護國陀羅尼方二七遍帝忽見神人五百員帶甲荷戈立在殿前帝問不空對曰此毗沙門天王第二子獨健副殿下心往救安西其年四月奏報二月十一日巳時城東北三十里雲霧冥晦中有神可長丈餘皆披金甲至酉時鼓角大鳴地動山搖經二日番寇奔潰斯須城樓上有光明天王現形怒視蕃師謹繪圖像隨表進呈帝敕諸道州府城樓於西北隅居置天王形像此四天王居須彌腹者是補大論曰護世四王各有九十一子具大威德皆名曰帝能護十方土地城郭一切鬼神皆屬四王備記引持國天王所主毗舍闍與注不同注俱舍頌云妙高層有四相去各十千梵語蘇迷盧亦云須彌此云妙高妙謂四寶所成高謂出衆山表始從水際至山半腹分為四級相去各十千由旬記此釋與論同論言蘇迷盧山有四層級始從水際盡第一層相去十千踰繕那量如是乃至從第三至第四層亦十千量注旁出十六千八四二千量此橫廣也旁即是橫最下一層廣十六千踰繕那第二層八千第三層四千第四層二千也記此釋亦與論同論言此四層級從妙高出旁出圍繞盡其下半最初級出十六千第二第三第四級如其次第八四二千也注堅首及持鬘恆憍大王衆如次居四級堅首等三皆藥叉衆大王即四天王堅首最下級乃至四王居最上級記此明王衆居四級也注釋與論詳略之異以論釋言有藥叉神名為堅首住初層有名持鬘住二級有名恆憍住三級此三皆是四天王所統天衆第四層四大天王及諸眷屬所居止故經依此說四天王衆於妙高山四外層級四天王衆及眷屬俱注亦住餘七山諸藥叉衆亦住餘七金山是四王所部衆故記此段釋頌望論為略以論文言雙持持軸山等七金山上亦有天居是四天王所部封邑是名依地住四天王衆於欲天中此天最廣備辨訛曰注中單指藥叉然應指四王當知四王雖居須彌山腰實住雙持山頂餘山皆屬統攝王既住此山則部屬隨王不可單指矣注又日月宮城五風所持一持二養三受四轉五調齊雙持山頂旋環山腹照四天下雙持山高四萬二千由旬須彌七金及鐵圍山入水皆八萬四千由旬須彌出水亦八萬四千由旬餘之八山半半論減乃至鐵圍山高三百二十八由旬二俱盧半九山廣闊皆等高量俱盧舍此言二里日宮廣五十一由旬月宮廣五十由旬記此明日月宮城高廣數量也如樓炭經言劫初未有三光衆生福力感亂風吹火精黃金精二寶作日日天子所居城郭七重東西二千里南北高下亦然周圍八千里又亂風吹琉璃白銀二寶作月月天子所居宮城七重東西一千九百六十里南北高下亦然周圍七千八百四十里皆大風持猶如浮雲右轉而行五風者持謂有力能護持宮殿養謂能保養宮殿受謂含容宮殿轉謂轉日月調謂調日月寒暑然此注中五風名與長阿含有同有異經言又為五風所持自然運轉一持風二住風三動風四轉風五行風同異可見也齊雙持山頂者如長阿含及樓炭經皆曰日月天子之果報與四王同又楞嚴明四天王勝藏寶殿居日月宮故知日月宮城高齊雙持山也旋環須彌腹照四天下者若據張衡渾天圖則言日如雞子黃天如雞子白日從東出漸漸西沒復從土下入地東出繞天地轉故言日出扶桑日入濛汜如此方所論乃以日月竪行也今是旋繞山腹周圍照四天下也須彌七金及鐵圍山下明九山高廣數量如俱舍頌曰蘇迷盧處中謂蘇即妙也迷盧即高也次踰健達羅翻雙持以山頂有二道脊山能持此故名也伊沙陀羅山翻持軸山峯上聳猶如車軸山頂持故竭地洛迦山俱舍疏曰此即西方樹名大疏但依狀翻不出其名頌疏言此方亦有名擔木山山上寶樹形似彼故蘇達梨舍那翻善見見者稱善故額濕嚩羯拏翻馬耳山形似彼故毗那怛迦山翻象鼻山形似彼故尼民達羅山俱舍疏曰魚名也其魚嘴尖山形似故華嚴音義言此言持邊山也七金外邊圍繞餘六山故於大洲等外有鐵輪圍山前七金所成蘇迷盧四寶入水皆八萬妙高出亦然餘八半半減廣皆等高量是也末二句明日月宮城廣量舊曰日形縱廣五十由旬月形四十九由旬者乃準樓炭經也星最小者一俱盧舍最大者十六踰繕那注俱舍頌云夜半日沒中日出四洲等記此二句頌明日月出沒也輔行引長阿含二十二云單起夜半弗婆提日沒閻浮提日中瞿耶尼日出經文次第四方遍轉而說彼經又云閻浮提為東弗於逮為西乃至單越為西於逮為東以由日月轉故皆謂日出處為東文記此段原注引經釋頌於中更引經明四洲互為四方今記本論釋言日輪下面頗胝迦寶火珠所成能熱能照月輪下面頗胝迦寶水珠所成能冷能照隨有情業增上所生能於根身果華稼穡藥草等物如其所應為益為損唯一日月普於四洲作所作事一日所作事為四洲同時不不爾云何北洲夜半東洲日沒南洲日中西洲日出此四時等餘例應知日行北洲路有差別故令晝夜有增有減注近日自影覆故見月輪缺如新月則西近於日自影覆東故見東缺殘月則東近於日自影覆西故見西缺記此頌明月之盈虧也注與俱舍釋同論言世施設中作如是釋以月宮殿行近日輪月被日輪光所侵照餘邊發影自覆月輪令於爾時見不圓滿也補近日自影覆句依會玄引俱舍則言近日日影覆以日行稍疾月行稍遲行度有異如月盡時漸近日輪日光赫奕發輝照彼映奪不現乃至對照或照須彌不被照時即全體現也長阿含言其城方正一千九百六十里高下亦爾遙看似圓而實方正然教中多說不能具記即近日自影覆亦有多說有言自影者以月原黑假日光而明故月西近日西邊則明而東邊月自影本黑故不明也又言假如月西行近日則月本低日一由旬而彼日光照之故自影則落東邊也如人立日中日若在東則影落西也注忉利此云三十三山頂四角各有八宮中帝釋殿昔世三十三人天帝為主於摩竭陀國修勝業故故同生此補大論曰昔婆羅門姓憍尸迦與三十二人共修福德命終皆生須彌山頂憍尸迦為天主三十二為輔臣記又淨名疏言若此間帝釋是昔迦葉佛滅後有一女人發心修塔復有三十二人發心助修修塔功德報為忉利天主而助修者報作輔臣合為三十三天也注俱舍頌云妙高頂八萬經過八萬踰繕那三十三天居記此下四頌明忉利境論釋言三十三天住迷盧頂其頂四面各八十千與下四邊其量無別有餘師說周八十千者別說四邊各唯二萬也注四角有四峯金剛手所住有藥義神名金剛手執金剛杵止住其中護諸天故記又論言山頂四角各有一峯其高廣量各有五百由旬也注中宮名善見見者稱善故記此頌帝釋宮又論兼釋其量曰於山頂中有宮名善見面二千半也注周萬踰繕那高一半金城善見外墻以金為之高一由旬半城有千門記此頌明宮城高廣形量小注詳於釋論注雜飾地柔軟中有殊勝殿周千踰繕那記此頌明城內地殿周量論釋云其地平坦真金所成俱用百一雜寶嚴飾地觸柔軟如妬羅綿於踐躡時隨足高下是天帝釋所都之大城也於其城中有殊勝殿乃諸天朝會之所如王家之太極殿名為殊勝者以其種種妙寶具足嚴飾蔽餘天宮故名殊勝也面二百五十由旬故云周千也是明城中諸可愛事也注外四苑莊嚴衆車粗雜喜城外四苑一衆車苑隨天福力種種車現二粗惡苑粗澀戰器天欲戰時刀杖等現三雜林苑雜受欲樂故四喜林苑極妙之境觀者無厭名曰喜林也記注釋與論互詳論云城外四面有四苑莊嚴是彼諸天共遊戲處一衆車苑在東門外二粗惡苑在南六外三雜林苑在西門外四喜林苑在北門外四苑周正各一由旬此為外飾莊嚴大城也注妙池居四方相去各二十苑邊有池去苑各二十由旬記此二句頌池也如論云四苑四邊有四妙池中間各去苑二十踰繕那是彼諸天共遊戲處諸天於彼角勝歡娛有說地者恐誤注東北圓生樹城外東北樹名圓生挺葉開華妙香芬馥順風遍滿百踰繕那逆風猶遍五十踰繕那記此注釋頌望論為略以論釋云城外東北有圓生樹是三十三天受欲樂勝所聳幹上升枝條旁布廣高量等百踰繕那挺葉開華妙香芬馥順風熏滿百踰繕那若逆風時猶遍五十有餘師云香無逆熏義依不越樹界故說逆熏理實圓生有如是德所流香氣能逆風熏雖風力所遏然能相續流趣餘方漸劣漸微近處便歇非能遠至如順風吹轉至餘方為但風熏別生香氣此義無定諸師俱許無失若爾何故薄伽梵言華香不能逆風熏根莖等香亦復爾善上功德香芬馥逆風流美遍諸方據人間香故作是說注西南善法堂三十三天時集於彼議論如法不如法事單修上品十善揀夜摩已上兼修定故夜摩此翻善時亦名時分時時唱快樂故記夜摩新云須𦦨摩此翻善時分時時唱樂故大集云此天用蓮華開合以明時分又云赤蓮開為晝白蓮開為夜以日光不及故云善時注兜率此云妙足新云覩史陀此云知足於五欲境知止足故記兜率內院菩薩居外院天人居又佛地論名喜足最後身菩薩於中教化多修喜足也注化樂於境變化自娛樂故記化樂自化五塵而娛樂楞嚴名樂變化變謂轉變轉粗為妙化謂化現無而忽有此天娛樂時自以神力福力變現種種妙欲娛樂也注他化自在欲得境時餘天為化假他所作以成己樂即魔王也淨名云多是不思議解脫菩薩住赤色三昧不取不捨應為魔王文記大論云奪他所化而自娛樂名他化自在亦名化應聲天是欲界頂天假他所化以成自樂即魔王也魔王者大經疏曰魔名殺者波旬名為惡中之惡住欲天頂為欲界主也淨名經云十方無量阿僧祇世界中作魔王者多是住不可思議解脫菩薩以方便力故教化衆生現作魔王赤色三昧者大經明二十五王三昧破二十五有得赤色三昧以破他化自在天有故也備辨訛曰當知他化為欲界天主與佛有違故稱魔王大集經中魔王別有一天住他化上非他化即魔王天也注未到定未入根本禪也止觀九四云住欲界定從是心後泯然一轉虗豁不見欲界定中身首衣服牀鋪猶如虗空冏冏安隱身是事障事障未來障去身空未來得發是名未到定相文然生上四天自是欲界定力令從欲天極處為言云未到定不必四天皆爾補此釋未到定也初句直釋定名謂初禪已上為根本也止觀下證釋定相謂端身正坐調和氣息泯然澄靜身如雲影虗豁清淨乃至猶見有身心之相是欲界定若住欲界定數息為觀以定散亂從是定心後工夫更進凝然湛寂泯然一轉以有相轉成無相忽然虗豁不見欲界定中身首牀服如太虗空冏音迥光明也安隱者以煩惱性障猶在而事障已空故也事障未來者謂能障未來禪定也又事障者欲界身首等為能障未到定禪為所障今障去身空欲界垢染色境俱空未來禪定得發性障猶在未入初禪名未到定相由其未入根本名未到定欲天極處指他化言注俱舍頌云欲天俱盧舍四分一一增四分之一即半里也初四天王長半里上五並半里論增記此頌明欲天身量也論釋言欲界六天最下身量一俱盧舍分為四分之一如是後後一一分增至第六天一俱盧舍半是也注人間五十年下天一晝夜承斯壽五百上五倍倍增四天王壽五百歲以人間五十年為一日忉利千歲以人間百年為一日乃至他化十六千歲以人間千六百年為一日記此明壽量論詳釋曰人間五十歲為六天中最下天一晝夜承斯晝夜三十日為月十二月為歲彼壽五百年上五欲天漸俱增倍謂人百歲為第二天一晝夜承斯晝夜成月及年彼壽千歲夜摩等四如次如人二四八百千六百歲為一晝夜承斯晝夜成月及年如次彼壽二四八千萬六千歲雙持已上日月並無依華開合建立晝夜如拘勿頭鉢特摩等又依諸鳥鳴靜差別或依天衆窹𥧌不同依自身光明成外光明事注法華文句二十九云三光天子是帝釋內臣如卿相四王是外臣如武將文又帝釋為地居天主魔王為六欲天主雖主欲界帝釋四王欲行佛法魔不得制如感通傳記此分欲界有二天主也雖魔王所主界寬帝釋所主界局而帝釋四王欲行佛法魔王終不得制也如感通傳天人費氏言一王有八將軍四王三十二將周四天下往還護助諸出家人四天下中北天一洲少有佛法餘三天下佛法大宏然出家人多犯禁戒少有如法東西天下少有黠慧煩惱難化南洲雖多犯罪化令從善心易調伏佛臨涅槃親受付囑令護不使魔撓若不守護如是破戒誰有行我之法教者故佛垂誠不敢不行雖見毀禁憫而護之見行一善萬過不咎事等忘瑕不存往失韋將軍最存宏護多有魔王子女輕弄比丘道力微者並為惑亂將軍恓惶奔赴應機翦除故有事至四王所時王見皆起謂韋將軍修童貞行護正法教是故魔王不能得制也
