body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓三別教三初標次明別教者注四教義一三云別者不共之名也若名不共但異藏通未異圓教故但名別記此釋立別名之所以也言別者乃不共之名今以別得名而不以不共為名者別則前後各異是故前異藏通後異於圓教中行相無不隔異故以別為名也二釋三初略辨名義二初正釋此教明界外獨菩薩法教理智斷行位因果別前二教別後圓教故名別也注此教明因緣假名無量四聖諦理的化菩薩不涉二乘別義略明有八謂教理智斷等也教則獨被菩薩理則隔歷三諦智則三智次第斷則三惑前後行則五行差別位則位不相收因則一因逈出果則一果不融釋籤一十五云在因說理不在二邊故云逈出復說果理諸位差別故云不融記此明教中行相逈異不同故得別名良有由也所言八義者如四教義云一教別佛說恆沙法獨為菩薩不通二乘二理別藏識有恆沙俗諦之理三智別道種智也四斷別塵沙無知界外見思斷也五行別歷塵沙劫行諸波羅密自行化他六位別三十心伏無明是賢位十地發真斷無明是聖位也七因別無礙金剛之因也八果別解脫涅槃四德異二乘也是知文與此異義則同也小注引釋籤以明因果別義言一因逈出者對他顯異不同通教三乘通修今一道出離逈超二乘亦離二邊以顯中故也言一果不融者謂四德三身各不融會不能一德一切德一身一切身故或問既云別義有八今但名別教者何也答若不知別教何以得知別理乃至別果以是而知但名別教也注獨被菩薩故別前隔歷次第故別後記此明前後隔異故以得別之名也獨菩薩法者不同前之三教三乘鼎立故云別前隔歷次第者不同後之圓教圓融無礙故云別後也二引證涅槃云四諦因緣有無量相非聲聞緣覺所知注涅槃云等乃聖行品明四種四諦中無量四諦即別教義謂苦集滅道各有因緣皆有無量相是菩薩法豈二乘所知乃以涅槃對鹿苑說故云非聲聞等也此證別前藏通記此明涅槃證成別前義而疏中辨云夫無量者非超然出四諦外種別不同故涅槃疏云經謂分別校計有無量種若委論者應從地獄乃至於佛凡聖五陰種別不同於一一陰復更分別無量界入豈聲聞緣覺所知是無量苦諦從獄至佛行業不同一一行業分別校計亦有無量種非聲聞緣覺所知是無量集諦從獄至佛應以何身應說何法令其修學一一身法分別校計有無量法門以為眷屬亦非聲聞緣覺所知是無量道諦從獄至佛因緣不同一一解脫復有無量解脫分別校計有無量種非聲聞緣覺所知是無量滅諦如此四境既異有作無生亦非二乘中智所及也乃以涅槃對鹿苑說者斷經意也謂以涅槃經中之無量四聖行以對鹿苑之生滅四諦而說故云獨菩薩法非聲聞緣覺之所知也二正列位行二初略示諸大乘經廣明菩薩歷劫修行行位次第互不相攝此並別教之相也注諸大乘經等者釋籤四十二指華嚴方等般若行法即是其相然方等中多以別行斥於小行般若中多以別法展轉融通華嚴正當歷別之行文記此總明諸部歷別行相皆別教所收也初三句總列諸部行相次二行別明行相大意言方等別行者別行雖多而不外乎彈偏斥小歎大褒圓二語言之盡矣斥於小行者如淨名舍利弗去華迦葉自鄙等般若以別融通者大品以共不共般若令空生身子轉教菩薩會一切法皆摩訶衍是也華嚴正當歷別之行者如經十地品廣列行布法門法界品明善財於一善知識所各聞一法為行或如幻三昧或投巖赴火算砂相黶發菩提心等種種諸行皆言佛法如海我唯知此一種法門餘非所知乃知一百一十善知識一一法門悉皆如是注如別行玄下四別行記下六既時長行遠次第隔歷此證別後圓教記此引別行玄記證成別後之義即觀音玄云別教雖明中道為鈍根人方便說中次第顯理廣明歷劫修行故大品云有菩薩從初發心修行遊戲神通淨佛國土次第修習恆沙法門助顯中道前却四住次破塵沙後破無明十信通伏諸惑而正伏四住十住通伏諸惑而正斷四住成一切智十行出假斷無知成道種智兼伏界外塵沙十向斷界外塵沙成道種智正修中道伏無明十地斷無明見佛性成一切種智譬如燒金塵垢先去然後鎔金次第斷結亦復如是此菩薩發心秉法慈悲修行自斷無明成就真應大誓慈悲熏於法界衆生機感即拔苦與樂此是從空出假觀道種智別教義也記云教詮中道故異前二顯理次第故異後圓故名為別不共般若不共二乘故別前教圓非不共故未別後不名不共意在於茲又明行相次第中云雖說衆生見聞覺知體是佛性而全起作三種之惑故須用此覺知之性觀空破有觀假破空待二均平方照本性中道之覺故名方便次第顯理既有如此迂回故須經歷塵劫從初標志次第修學恆沙觀智破恆沙惑顯如來藏恆沙性德故緣無量四諦發心又明伏斷相中先法云十信緣中通伏三惑心正著有要先觀空伏斷四住方袪滯有復偏著空故觀六界藥病成就體析八門道種又觀四聖惑智因緣無量作八門道種二觀既成故照中道此時三觀只在一心別向圓修斯之謂歟次喻云圓譬冶鐵作器別喻鍊金作器冶謂鎔鑄淳朴頓融任運粗垢先落別觀次第顯中有意先觀二諦故使二惑先除菩薩期真應先利物初雖次第修後能圓應也問別向圓修何但結為出假之智答從勝受名故約教道故如輔行云一教始終雖具三諦若入證道不復名別是故別教但在於假也末一句是結證二詳列二初總依諸經列位二初正列華嚴明十住十行十回向為賢十地為聖妙覺為佛纓絡明五十二位金光明但出十地佛果勝天王明十地涅槃明五行注此出諸大乘經行位次第之義華嚴前無十信後無等覺於十住品前明十梵行自古講者指為十信記此列諸經行位次第皆別教所攝也注中先揀華嚴本部自無前後因位古德敷演皆以十梵行之淨業即十信人所熏修也如華嚴疏云十信自不成位謂是方便可以攝在住中等覺因位之極通稱為頂故無等覺之名今疏不論十信成位不成位皆以三品別答信問謂十信有解行德三以菩薩問明品明信之解梵行品明信之行賢首品明信之德用今指十梵行者蓋淨行品乃隨事造修悲智兼導至此純熟了心自性悲智無二正顯自他梵行至淨為入住之因是十信位之所修行以是而知十梵行者即可以指於十信之位也補十梵者謂身身業口口業意意業及佛法僧戒解見輔行茲不繁載注四念處三初於十住中多明圓義於登地中多明別義文故華嚴位義通圓別今且示別故云住行向為賢十地妙覺為聖記此明經義以示今文判賢聖意義通圓別者釋籤云始從住前至登住來全是圓義從二住至七住文相次第又似別義於七住中又辨一多相即自在第七重會普光明殿說十地勝進行有十一品第七品不思議法明果德十普賢行等此皆屬圓餘皆屬別也然華嚴圓融行布無盡重重固是多說於圓今且示別以分賢聖者以住行向三十心義明伏惑是故為賢十地方明斷惑是故為聖以是約位別之所攝也注本業瓔珞亦明六輪如法數對記輔行云依瓔珞經明位有六展轉從淺至深故名為輪又一一位皆破結惑故約輪義以明摧碾言六輪相對者謂住行向地等妙如次對於鐵銅銀金琉璃摩尼水約輪補今明因位退妙覺加十信以為六輪以妙覺位中無惑可破不成輪義也注金光明指真諦所譯者記金光明共五譯而有六本今所指者乃西天竺真諦法師於梁朝之所翻也言六本者五譯之外有隋朝大興善寺寶貴法師閲諸譯各有繁簡由是太繁者刪之不足者補之合成一部八卷二十四品共成六本也然真諦三藏所譯金光明帝王經名最委悉故大師用之以定華梵今在藏者僅存三譯并真諦所譯者沒之久矣無由再考者矣注勝天王即般若也記勝天王是般若八部中之一於中但明十地佛地而不辨三十心及等覺也注五行者聖梵天病嬰兒也記涅槃明聖行有三謂戒定慧戒者菩薩欲苦集而起大悲興兩誓願欲與道滅而起大慈興兩誓願發誓願已次則修行棄家捨欲白四羯磨持性重戒息世譏嫌等無差別回向具足無上戒等是名戒聖行定者一世間禪二出世禪三上上禪如前四卷初明慧者四種四諦慧謂生滅無生無量無作等也是名慧聖行梵行梵者淨也即是無緣慈悲喜捨菩薩以大涅槃心修於梵行得無畏地具二十五王三昧無方大用具一切功德莊嚴故名梵行也天行謂第一義天天然之理此語道前由理成行名梵此語道中由行顯理此語道後今約由理成行故言天行也菩薩雖入初地二地不應住以有所得謂有理可顯有惑可斷故修上地智慧十重發真修慧即智慧莊嚴上求佛道故有聖行天行下化衆生故有梵行病行嬰兒行也嬰兒行者若福慧轉增實相彌顯雖不作意利益衆生任運能有冥顯二益天行力有冥益梵行力有顯益衆生雖有小善之機無菩薩開發不得生長慈善根力和光利行能令衆生得見菩薩同其始學漸修五戒十善人天果報楊葉之行乃至示同別教歷別次第相似中道之行皆是慈心之力俯同羣小提引成就從慈悲心與樂拔苦起嬰兒行也五病行者此從無緣大悲而起若始生小善必有病行今示同生善邊名嬰兒行示同煩惱邊名為病行以衆生有病則有大悲熏心是故我病或游戲地獄或作畜生形化身作餓鬼等悉是同十惡五逆之病乃至示同別教寂場初斷塵沙無明之病是故菩薩悉同彼病遍於法界利益衆生也然則涅槃明五行十功德約義配位似開三十心十地佛地而文不出故儀文中但指五行也補若以五行配位如四教義云初戒聖行定聖行生滅四諦慧聖行即十信位無生四真諦聖行即十住位無量四聖諦即十行位明修一實諦無作四聖諦即十向位若發真見一實諦證無作四聖諦即聖行滿住無畏地得二十五王三昧破二十五有名歡喜地五行具足次後而說十功德者恐表住大涅槃十地之功德也過此明住大涅槃即妙覺地也注又仁王般若明五十一位但無等覺記此儀注但引佛經明別教菩薩位行又有地論攝大乘論地持論十住婆沙論智論並釋菩薩地位如四教義內明補五十一位者仁王偈云五忍功德妙法門十四正士能諦了三賢十聖忍中行唯佛一人能盡源十善菩薩發大心長別三界苦輪海是則十地為十三賢住行向開為三十并佛兼於十信則成五十一位然天台疏中又開出等覺以釋偈中四字謂十地為十住行向及等覺為四成十四大士此中無等覺者據經定位經云復次寂滅忍佛與菩薩同用此忍入金剛三昧下忍中行名為菩薩上忍中行名薩婆若是不立等覺明矣故疏中問諸經有等覺何故此中不立答若依餘經合有三品下品十地中品等覺上品妙覺今般若附通故但論法雲即及佛而不開等覺也然大師所開據寂滅忍分三品耳故知大師釋義自在難思也二辨意如是諸經增減不同者界外菩薩隨機利益豈是定說注然上諸經隨機明位雖增減不同莫非次第故屬別也記此等經論明菩薩位名數多少不同斷伏高下亦異對諸法門明位不無殊別所以然者蓋此既明界內界外生法二身菩薩行位皆如來方便用四悉檀隨機利物豈得定說若不廣尋經論則便不知同異偏取定執空增諍論即同無目人而諍上天之日也故今先列諸經明別位次者宜矣二別依瓔珞列位二初判科二初準經明然位次周足莫過瓔珞經故今依彼略明菩薩歷位斷證之相注瓔珞凡聖位足故今依彼以明別義記問何意約數的取瓔珞答華嚴頓教多明圓位四十一地又不出十信位名方等經多明諸法門不正辨位般若部多明菩薩觀行法門亦不辨位法華開藏通別之權顯一圓位涅槃大意亦明別圓兩位而不的出名目是以今依瓔珞以明別位以瓔珞明五十二位名義整足意似結成諸大乘方等別圓之位也四念處云方等前分對圓散說得道而已未論地位至瓔珞總結階級明五十二位前後整足分明如軍師蕩寇竟方敘功勳定其爵祿所以前散後結今依瓔珞明別位者良由凡聖位足故也注然凡聖位中有教證二道此本出乎地論今家借用有二意焉一者玄文借證權實部二者輔行借消別門良由地論兩種教道皆為方便兩種證道皆為真實義同部味昔權今實是故借用若輔行借消別教教證者由今別教教權證實既與三教一向不同其義難曉而地論師以教道為方便證道為真實名義宛同故今借之如輔行云是故今家借用地論教證二道以消別門於中先須知於二意一者約行地前為教登地為證二者約說為地前說始終屬教乃至結云若讀玄文善須曉此教證二道則別門可消應知地論雖有四種玄文借用證權實部但成二意輔行借用但成三義何者以由此教行分教證說唯教道是則能詮之教始終屬權所被之機地前屬權初地證實記此約教證二道各有所以以為判定別教妙玄云地持明地相明義說相似法地實明義說真實法又教門方便即教道明義說所證法即證道明義今借用之以明法華已前如地相教道是權至法華經猶如地實也釋籤云有兩番意者前文約行次文約教地相謂地前回向位中道觀雙流地相現前登地已去明真實法稱為地實初地即圓初住故也又教下依教道義以四悉檀說登地法名為教道故知初地已上仍存教道若說十地已證之法即證道也凡釋別義多用此意是則兩種教道皆為方便者即是地論約行說相似法約教說登地法是兩種皆教道方便屬權也兩種證道皆為真實者即地論約行說真實法約教說十地已證之法是兩種皆證道真實屬實也故玄文借之以證權實部也若輔行三行以釋借消別門初二行明別義異藏通圓三教其義即教權證實由其義異三教所以難曉也次一行明地論教證同別教之教證故借用之如輔行下四行略舉借意今具記云藏通兩教教證俱權圓教教證俱實此益易明但別教中教權證實意稍難曉人多迷之使此別教其義壅隔是故今家借用地論教證二道以消別門於中應須先知二意一者約行則地前為教登地為證何者地前仰信登地現前豈有親證復存隔歷二者約說為地前說始終屬教何者如云真如為惑所覆或將十度以對十地互不相收或云須離二邊修真如觀或云等覺入重玄門或云五地習學世法或云八地入無功用等覺一位或有或無斷十二品稱為妙覺如是等例不可具載悉是權施為引下凡為入地方便入地自證權門自開故云初地即是初住入證道也又云初地不知二地菩薩舉足下足若約理說名字觀行當有知圓豈有初地不知二地若云下位不測於上圓亦展轉迭不相知何但別人教門方便今文非專判教優劣但存次第及不次第迷之尚寬若讀玄文善須曉此教證二道則別門可消也應知下明借全成少初一行明妙玄文借四成二謂借論二種教道證昔權部一意借論二種證道證今實部一意也次二行明輔行文借四成三初三句標示何者下是反徵謂輔行借論四種云何但成三義次三句釋成如輔行云約行乃以地前為教登地為證約說乃是為地前說始終屬教是為借四成三也是則下乃以機教結成三義上一句能詮約教結說中教道是權下二句所被約機結行中教權證實注舊於借消別門亦立四種者且約說證道為權為實若權則違教權證實借證權實之義若實則背有教無人之文況地論正申華嚴十地論師不分圓別之異但約教證明方便真實如云若說十地已證之法彼為實證安可約彼立別說證既云借證可全同耶記此破舊立別門四種教證初句總牒舊立然舊立四種者即古師及澤山各約行說立兩種教證兩兩共為四種也而古師約行立教道者謂住行向明地相以三十心道觀雙流地相現前也約行立證道者謂登地明地實以登地已去初地即初住也又約說立教道者謂住行向地等妙是教門方便如輔行言始終屬教也約說立證道者謂十地乃是妙覺已證以十地之法即證道故也而澤山約行立教道者謂為地前三十心說所證法以十地自證權門自開故也約行立證道者謂登地一位以初地即初住不可謂之兩涉也又約說立教道者謂十地始終以為地前人說十地始終故也約說立證道者謂妙覺如輔行云斷十二品無明稱為妙覺也如上澤山古師皆立兩種教證是名舊立四種教證也次舉其說證一種而詰者謂汝約行立教證二種及約說立教道一種且置不論而唯約說立證道一種茲今當問為是權耶為實耶若權則違教權證實及玄文中借證權實之義玄文既明別門教權證實而引論中之兩教道方便證權兩證道真實證實則汝約說中立之證道若是權豈不違於玄文乎若是實則又背有教無人之文以別教登地已上有歷別次第教無歷別次第人故云有教無人止觀云別教因中有教行證人今就果者但有其教無行證人何以故若破無明登初地時即是圓家初住非復別家初地人也初地尚爾何況後地後果故云因人不到於果故云果頭無人既論文言有教無人則汝約說中立之證道若實背於論文是則約說立證道謬矣此上破竟況地論下明論師立教證意論師即天親菩薩造論以釋華嚴十地經其中不分行布圓融之義但約教證二道以明方便真實也彼既不分圓別尚明教權證實況今既分圓別豈可約別說立證道是實耶如云下責約證道立為別門說證謂不可以約彼實證之法立在別教中說已證之法也若立別教中說已證之法則違有教無人之文為何登地證道同圓耶末二句答辭是結答借之一語亦非一定不易之談其間有或借或不借之巧今度問意必云地論既不分別圓不應引用今引用者何耶故今答云輔行既云借用引證則義似者借義異者不借豈可全然是同而云借證耶故玄文借彼之四成我二用輔行借他之四成已三用者此也注又別立位中復有豎入橫學兩種四教釋籤十草七云別教十住修生無生十行修於無量十向修於無作故云有四又十行中習諸佛法具足入於一十六門亦名為四問住已習八何故行中更習十六答前是自行隨用一門後為化他是故行中更習前八是故十六俱須廣習文記此明別位兩種四教一橫一豎之義也初句標示釋籤下引文釋義初別教十住下釋豎義次又十行下釋橫義言豎義者從淺而深位位漸次而入也且如十住必須修生無生者生謂生滅四諦乃藏教之法門無生即無生四諦乃通教之法門別教十住宜當修此二教法門乃可從有而入空也次進十行修於無量四諦者乃本教之法門自當發大心修大行從空出假廣度有情也次進十向修於無作四諦者乃圓教中道之法門也既行大行當須事理融通空假無礙是故習中觀破無明登初地證無作故名豎入四教也言橫義者謂別教行位之人既能從空出假習諸佛法當須遍學四教佛法遍游四教四門於別圓以自行於藏通以利他故名橫學四教也次下問答以決未解者之疑也注更有三根出假十信上根十住中根十行下根四教俱論三根出假如止觀六二十三記止觀說三藏菩薩下根三阿僧祇正入假位利益衆生中根二僧祇已伏煩惱功德身肥即能化物上根初發心時為度衆生誓求作佛初心即能入假也通教下根斷惑盡方能出假佛於法華中破其取涅槃心勸發無上道心二乘既然極鈍菩薩亦同此說中根斷見惑已生死少寬思任運斷第二地名菩薩神通從此已去即能入假上根初心聞慧即能體達見思即空已為衆生作依止處何須七地也別教出假十住後心十行位修假方便下根也十住初心即能入假已得無漏一受不退即能出用何須十行方起大悲中根也又別教初心不愚於法達解一切功德猶如幻化具五因緣以益衆生上根也圓教十信六根淨時即遍聞見十法界事既言六根互用即是入假位也又五品弟子正行六度廣能說法即是入假之位何待六根耶又初心之人能知如來祕密之藏圓觀三諦尚能即中豈不即假又六即料簡便有出假何待五品耶注又對五忍十信伏忍十住信忍十行去柔順忍十地無生忍妙覺寂滅忍妙宗中十八亦對圓位記此明別對五忍十信於三界惑伏而未斷故對伏忍初住斷見二至七斷思八九破塵沙信力堅固故對信忍行向出假柔順衆生故對柔順忍十地去如妙玄云就事為無生就理為寂滅籤云惑是事法惑滅為無生名就事約所證實理為寂滅名就理妙宗下指對圓位五品伏忍六根淨信順二忍初住至等覺無生忍妙覺寂滅忍備仁王疏五忍對位與今不同見下十信伏忍內引注若論真緣二修則地前為緣修登地去為真修緣謂作意緣念真謂任運相應原是地師之義今家復加觀義空假為緣中道為真通圓亦有此之二義云云記此明別真緣二修也謂有分別正智修觀是作意緣念名緣無分別正智修觀乃從性起修全修即性任運與理相應名真也今家下明三觀真緣釋籤云地前兩智具緣修者今判屬空假觀八教大意云地前緣修兩觀經劫無量為中道方便登地三觀現前與初住無二無別名證道也末指通圓二修大約伏道為緣斷道為真也補通義未檢圓義者妙句四上云問上根入初住有利鈍否答真修體顯則無差降妙樂云住前名緣初住名真然圓教住前亦名緣者唯有今文及四念處仍望別教義立其名也注六種性習如下對記言六種性習者即下文習種性乃至妙覺性是也如下圖示二正判科以五十二位束為七科謂信住行向地等妙又合七為二初凡二聖就凡又二信為外凡住行向為內凡亦名為賢約聖亦二十地等覺為因妙覺為果大分如此自下細釋二細釋二初凡二初外凡初言十信者注四教義四三云此十通名信心者信以順從為義若聞說別教因緣假名無量四諦佛性之理常住三寶隨順不疑名信心也文記此節引文釋信義也言假名者即界外不思議因緣生滅相如言因緣所生法我說即是空亦名為假名也無量四諦理者妙玄云苦有無量相十界因果不同集有無量相五住煩惱不同道有無量相恆沙佛法不同滅有無量相諸波羅密不同是則無量四諦就教道別義若佛性之理即證道同圓義常住三寶者三寶有同體別體住持之不同謂雕鑄塑像名佛黃卷赤軸名法圓頂方袍名僧是住持三寶也法報化三身名佛三乘教理行果名法諸大菩薩果向賢聖名僧是別體三寶也一真體上覺照為佛軌持為法和合為僧是同體三寶也今應貼別教義邊若能一一隨順不疑名信心也補因緣是境假名是觀無量四諦正是恆沙佛法之假雙具空假之俗諦也以此為方便得顯中道佛性之理即常住一體三寶能覺之智即佛所覺之理即法理智和合為僧此理本具性非生滅故曰常住聞已隨順不疑名為信心又此十信皆具解行二意一發菩提心二行菩薩道發心是目修行是足目足備故入清涼池即別教初賢善直義又四教義問別教菩薩成就幾法所得信心異前通教答還約十法即知不同一信正因緣知四種四諦因緣不亂二真正發菩提心知無量四諦發慈悲誓願三勤修止觀即知次第善修四種止觀四破法遍觀因緣生滅空假中三諦惑遍五知通塞知四種道滅是通四種苦集是塞六修道品知次第修四種三十七道品七善修助道法即背捨勝處能成一切對治六波羅密助開三解脫門八善識位次知因四種四諦入七位不叨濫也九安忍強軟賊即知修四種道諦時於四種苦集心能安忍十順道法愛不生即知次第修四種道諦發諸順道法不生愛著故異通教也一信二念三精進四慧五定六不退七回向八護法九戒十願注信常住理名曰信心備初心仰信因緣假名無量四諦常住之理深信不疑注憶念不忘名曰念心備以此無量四諦常住之理常憶常念得不遺忘注真精進趣名精進心補無間曰精不退曰進欲證隔歷常住之理必藉空假為方便道先修空觀觀真諦理於一心中不為他法所間雜曰精念念趣入無退轉曰進注心精智慧名曰慧心補若一心精進不以智慧揀擇慮成過愆今用智慧使離過故注周遍湛寂名曰定心補慧若無定慮成狂慧今復湛然寧寂與理相應注定光無退名不退心記光即慧也定力日深慧光日發定慧交資縱或逢難心終無退注保持不失名護法心記心雖無退慮有散失兢兢自護持令不失注回向佛地名回向心今文回向在護法前此依舊譯瓔珞經說記謂此菩薩保持定光向佛安住所謂回佛慈光向佛安住也注安住無失名為戒心補如無作律儀依定而發名定共依慧而發名道共雖未得真道然相似定共道共任運防止一切過非故言安住無失不唯無墮四趣之愆并不退失無漏心矣是名戒心注十方隨願名曰願心此依楞嚴釋十信名但彼在圓記隨自本願遊歷十方以上求下化名願補瓔珞出十信名不出其義玉師依楞嚴截略字句釋十信名不同其義也備既楞嚴在圓不可以彼釋此別義今略消字句切弗拘泥刻劃求解也此十位伏三界見思煩惱故名伏忍位外凡與藏教七賢位通教乾慧性地齊注妙玄四三十三云此十信習從假入空觀伏愛見論文觀音玄下四云十信通伏諸惑正伏四住文記妙玄伏愛見論即伏見思煩惱也觀音玄中諸惑通指見思塵沙無明四住除無明合見開思玄記云十信緣中道伏三惑心正著有要先觀空伏斷四住也補四教義廣明此菩薩能自行戒定慧三種聖行亦教人行聖行乃至若修慧聖行即先觀生滅四諦調伏界內見思煩惱傍觀無生無量中道佛性之理正用生滅四諦伏界內屬愛屬見一切煩惱結習皆性念處智慧力也菩薩得是性念處與前共緣二念處合即堪忍地智慧善根增長從初信心乃至願心十心成就是鐵輪外凡乾慧伏忍位也注伏忍位輔行九下十五云仁王用五忍以判別位文妙宗中十八云若依別教十信伏忍仁王經疏中十一云未得無漏未能證但能伏不能斷故為伏忍智也記仁王經云五忍是菩薩法謂伏忍上中下信忍上中下順忍上中下無生忍上中下寂滅忍上中下為菩薩修般若然是用判別位文也妙宗中下判別十信伏忍仁王經菩薩教化品疏云地前三賢未得無漏未能證但能伏不能斷故為伏也以有智故能伏煩惱初二三地得無漏信名信忍四五六地趣向無生名順忍七八九地諸念不生名無生忍十一二地得菩薩果名寂滅忍以初地得無漏信是別教意也故引疏以釋十信名伏忍位然三賢內凡尚為伏忍況十信外凡乎判位隨機不同仰信而已注與藏通齊者格量伏惑義齊也下去格量准此記偈云七賢七位藏初機通教位中一二齊別信并圓五品位見思初伏在凡居注此位出假即名上根淨名疏七二十云菩薩化物心重自行則輕故慈悲重者不務斷結從相似空解即便出假見思未斷故言有疾文記淨名疏下證釋菩薩出假意所謂自未得度先度人者菩薩發心也有疾者稱為導師也二內凡三初十住二初正明十住位次次明十住者注四教義四五云此十通名住者會理之心名之為住記此節釋明住名之所以也儀文一句是標徵注文是引釋仁王經云入理般若名住華嚴蔬云慧住於理名住理為所住慧為能住是能所合釋也一發心住斷三界見惑盡與藏教初果通教八人見地齊二治地三修行四生貴五具足方便六正心七不退已上六住斷三界思惑盡得位不退與藏通二佛齊備辨訛云論別七住所斷惑應言與藏通二乘齊今言二佛齊者當知藏通果佛位勝二乘若論斷惑則無異也記初住斷見盡者四教義云體假入空觀成發真無漏見真諦理斷界內見思九十八使名發心住乃是以伏從斷故言斷九十八使其實只斷見惑八十八使伏思惑十使頌云果位須陀預聖流與通三四地齊儔并連別住圓初信八十八使正方休又二住至七住與藏通二佛齊者頌云圓別信住二之七藏通極果皆同級同除四住證偏真內外塵沙分斷伏故云同除四住此處為齊也補發心住有二義一發真解住偏真法性理二出中道似解住第一義佛性理若生偏真解即通教八人見地智斷齊生中道似解是初得別教善有漏五陰入別教內凡性地柔順忍位注於諸劫中行十信心不作邪見廣求智慧名發心住記瓔珞經云是上進分善根人若一劫二劫一恆沙佛二恆沙佛所行十信心信常住三寶八萬四千般若波羅密修一切行一切法門乃至始入空界故名住依仁王起信即十千劫來修信行滿入位不退創起大心發心即住名發心住即信成就心破見惑故無邪見欲見真諦理故廣求智慧注常隨空心淨諸法門名治地住記常隨空心淨八萬四千法門清淨潔白鍊治心地使悲智增明也補空即真諦心即真無漏智即前初住所發見理之智由此真智方證空理故曰空心今謂斷思重慮緣真故云常隨諸法門者即六度等然住前雖修此法門但未見理不離於惑皆成有漏不得名淨今見理已常隨理心修諸法門則能忘相如修檀時能達三輪體空名淨修尸羅時性重譏嫌等無差別乃至修禪靜散無妨常隨理心而成無漏故言淨門謂能通至佛果故注長養衆行名修行住記巧觀空有增修正行故衆行即諸法門也注生在佛家種性清淨名生貴住記佛家有二一菩提家二真如家生亦二一解生二證生解生生菩提家證生生真如家今是解生生佛菩提心家也又生佛家有三一菩提心家初住即生二大教王家今四住生此皆解生三法界家至初地生此證生也謂諸佛從三世真如實際中生則其種性至淨至貴別教四住菩薩生在佛家名生貴住注多習無量諸善根名具足方便住記菩薩生佛家克肖於佛故帶真隨俗習無量善根方便成就具足注成就第六般若法門名正心住備菩薩成就般若則慧心方為真正補五度是行行今般若是慧行事障除正理顯曰成就注入於無生畢竟空界名不退住補見思阻乎空寂從二住來用入理智重慮緣真至此思惑畢竟斷盡永無三界生因徹證無生畢竟空界名不退也注得位不退者初住至七住位不退八住至十向行不退初地已上念不退記位不退者入空觀永無退失超凡之位行不退者入假觀不退化他真正之行念不退者入中觀不退中道常住正念雖通舉三種不退明別位賢聖今取位不退以釋前之七住也注妙玄四十一云見思破故得位不退真諦三昧成塵沙破故得行不退俗諦三昧成無明破故得念不退中諦三昧成文補真諦三昧離見愛為調直俗諦三昧以稱機為調直中諦三昧無二邊曲為調直故通言三昧八童真九法王子十灌頂已上三住斷界內塵沙伏界外塵沙前二不知名目備辨訛云不知名目者以藏通佛但知界內塵沙不知界外塵沙也止觀云得法眼證俗諦通教入假即進斷色心無知則知前二教既能斷界內塵沙豈不知耶謂不知者藏通極果不知別教八九十住界外塵沙名目以其但齊七住也注不生邪倒破菩提心名童真住補菩提心者佛心也佛以化利衆生為心凡外起愛見邪倒自他俱失二乘起灰斷邪倒不能利人自利亦不究竟俱不發菩提心故不論破菩薩最初發菩提心惟恐生邪倒以破之今愛見七住斷盡不生外凡邪倒破菩提心矣復不住空而入假不生二乘邪倒破菩提心矣童真者從喻立名世人初生天真純粹名為童真例今菩薩悲智堅固不破菩提心者名童真也注從佛王教而生於解當紹佛位名法王子住記從佛王教生解是從佛法生如佛化度故云當紹佛種注觀空無相得無生心法水灌頂名灌頂住補菩薩常觀空理得無生忍諸佛法水灌其心頂名灌頂也問此得真智與前七住無異何以見其超勝於前若從八住來即能從空出假至今十住名灌頂者應以俗智灌頂何言真智耶答真是實智俗是權智化他用權自行用實今此二位雖是俗智利生超勝於前然約自行修證入位用實而不用權故言真智法水又此雖是照俗之位然必證真方能了俗俗智從真智而起推功歸本名無生心有此二義言真智也注斷界內塵沙等者正修假觀為伏觀成俗顯為斷輔行一下九云塵沙者譬無知數多文記正修假觀時但伏界內塵沙未伏界外塵沙直待假成俗備方斷界內塵沙伏彼界外塵沙當知伏惑如壓草斷惑如刈草此明斷伏也輔行下以譬顯塵沙之名也以菩薩不知衆生病不知法門藥此等無知之惑如塵若沙故名塵沙也注然塵沙惑只是通別見思就所化衆生得名妙宗上草六云衆生見思重數如塵若沙究論其體即劣慧也如妙樂云不染污無知劣慧為體以其不能分別藥病故也若知病識藥應病授藥令得服行即斷塵沙相也懶於化導為塵沙習記界內塵沙是通見思界外塵沙是別見思如所化六凡之機不能知病與藥令斷通見思於菩薩成界內塵沙所化三乘之機不能知病與藥令斷別見思於菩薩成界外塵沙故菩薩塵沙惑就所化衆生得名也妙宗下釋名體如妙樂下證釋妙樂明小乘立二無如一染污無知無明為體見思惑也二不染污無知劣慧為體塵沙惑也菩薩不能分別藥病而成塵沙故云劣慧為體也補止觀所示入假有三謂知病識藥應病授藥不了此三名惑遍觀遍學名伏稱機用與名斷所知不盡名為習氣注且三品塵沙與三根出假何異蓋三品塵沙約一人豎論三根出假約三人橫辨又三根出假通乎四教三品塵沙局在別論記答中初約一人三人橫豎各異謂菩薩於住斷上品於行斷中品於向斷下品十信出假名上根十住出假名中根十行出假名下根是為約人三一橫豎異也次約四教別教通局論異謂三根出假通四教如上引止觀可知三品塵沙局別論如今所明歷住行向觀成所斷是為約教通四局別為異也正明十住位次竟二附釋六種性習亦名習種性用從假入空觀見真諦理開慧眼成一切智行三百由旬注習種性者瓔珞經上卷賢字函明六種以對別位淨名疏第九亦借別名以顯圖記此指瓔珞六種性習以對別位也若南本職字函佛為敬首菩薩說六種性謂習種性性種性道種性聖種性等覺性妙覺性又說此六種性復名六堅復名六忍六慧六定六觀今對別者如下圖示淨名疏借別顯圓承便指之注今家玄籤四教義戒疏等並依經列四念處中少有不次又地持論略明二種亦名經彌勒造賢字函如戒疏列六種後復用二種及對教證前後生報佛法佛併圖示記圖中但示釋籤列對者該四教義也文云初十信是外凡別教乾慧地伏忍也十住是習種性從此已去盡三十心解行位悉是內凡性地柔順忍約別教義推如暖法也十行是性種性別教義推如頂法也十向是道種性別教義推如忍法世第一法也問別教何須明四加行耶答十地既對四果故須明也又通教通真似解脫為暖頂忍世第一法今別教別真似解脫義立此名比決分明也次十地是聖種性此皆入別教四果聖位悉斷無明別見思惑等覺位即等覺性若望菩薩名等覺佛若望佛地名金剛心菩薩亦名無垢地菩薩也妙覺地亦名妙覺性是究竟佛菩提果大涅槃之果果也補戒疏發隱云住者信立之後慧住於理得位不退名住為習種性者信住皆研習空觀也行者既發真悟理從此進趣名行為性種性者行中分別十界差別種性也回向者回事向理回因向果回己功德向衆生名回向為道種性者回向通中道也地者住持佛智荷負衆生名地為聖種性者地地證入聖境也等覺有二義一與佛無間二猶去一等今兼明之言雖齊等未極於妙猶隔一等也妙覺者朗然大覺乃至寂而常照名妙覺地也注六種性者種別性分也地持第一云種性者名為種子名為界名為性文種子不同有六界分又性通六位種局在因故前四名種等覺雖因望前稱覺記此名六種性對位通局也言種性者種謂種子通因徹果則有六位性謂性分言因果六位乃性中之本具也若言因故前四名種若言果故後一稱妙而等覺介乎因窮果徹之際妙猶未極若望後原隔一等若望前可稱為覺故云等覺性也注二種者地持經云略說二種性種性者是菩薩六入殊勝展轉相續無始法爾是名性種性習種性者若從先來修善所得是習種性文補性種性者謂本性中具有無漏菩提種子性也習種性者謂無始來修習衆善增長所得種性也會玄記云言總意別故意顯第六意入中有第八識含藏無漏勝種子不同有漏諸法故名殊勝自無始來法爾而有展轉相續不盡以此種子在藏識中第八識體屬意處攝故總名六入殊勝也若準今家不分八識謂菩薩六入即是但中佛性之理超出空有故名殊勝是理人人本具始從凡夫終至佛地皆不離此但外凡仰信內凡解行登地分證故言展轉相續雖如此展轉其體性無始自成不由今有故言無始法爾是名性種性也習種性者過去生中得聞正法依教修善所獲種子或信住中修空所得或十行中修假所得或十向中修中所得皆是增長數習是名習種性也備辨訛云文中雖言六入意在總意根以總中含八識第八最勝法爾有種生現現熏種無始展轉相續不斷故也注戒疏以六種對位後復用二種者以六位不出地前修習登地證性故用地持結攝六種雖不顯標意必如是況梵網是華嚴結經地持正宗華嚴故宜用彼地持二種結攝瓔珞六種又與約行教證其義宛齊故復例之補此明戒疏對位用意也言意必如是者以戒疏六種對位後但明性習相先引喻教證復解行詳辨對生法二佛全不言以地持二種結攝六種故曰雖不顯標但推其意必如是也戒疏性習相先之文如下引始從性習二種乃至言先教後證是也有師標云六種只性習二種性習只教證二道玉師善得此意故和融之注自古以戒疏文難今準舊注戒疏云性習二種若據位分習種在前性種在後若據行論性習同時前後不定標約行中義依體起用緣中道理起觀行用先明性種後明習種尋用取體從自行用取中道體先習後性自依體下釋同時不定義與教證二道相似就位以論教道在前證道在後據行論之教證同時前後不定此標約行教證依體起用先證後教望證道理起教道用尋用取體先教後證尋教道用取中道體習種能生報佛性種能生法佛文地前既論自行修習至果合生報佛登地證性合生法佛智與體冥任運起用故不論應佛也異解備諸章藻補舊注戒疏有頂山記澤山注今恐指澤山注備疏明性習二種約位習定在前性定在後約行前後不定謂依體起用先性後習尋用取體先習後性教證二道亦然約位教定在前證定在後約行前後不定謂依體起用先證後教尋用取體先教後證是也此明前圖習種對三十心性種對地等妙與地持先明性種後明習種均符教意不可偏難也注梵網經中更有六種一習種性二長養性只是研習增長與習種性通對十住三性種性四不可壞性俗諦建立故不可壞與性種性通對十行五道種十向六正法性通收聖種等妙三種記此兼引梵網六性對別位次如文可知記此四念處六性對別與釋籤列次小異注中謂明扶大品故也四念處云若扶三觀次第須依大品扶三觀者欲以道慧具足道種慧當學般若欲以道種慧具足一切智當學般若欲以一切智具足一切種智當學般若欲以一切種智斷煩惱及習當學般若初五方便伏見思從假入空觀十住是道種慧斷見思從空入假學道種慧斷塵沙若從假入空破偏假從空入假破偏空至十回向中學不空不假一切智伏無明登地得一切種智若至等覺一時斷盡煩惱及盡若不明等覺只十地斷煩惱習也是為扶大品三觀也故次約義結對瓔珞六性有少不同復由道性二字義通兩向釋籤取種性義以性種性對十行取中道義以道種性對十向四念處取化道義以道種性對十行取一性義以性種性對十向少不同也注從假入空觀者次第三觀出瓔珞經觀經疏三云假是虗妄俗諦也空是審實真諦也今欲去俗歸真故言從假入空觀妙宗上草六云見思取境無而謂有虗假凡俗知虗名諦二空之理是審實法知實名諦不究俗虗莫知真實要須照假方得入空是故名曰從假入空觀妙玄三十一云住正修空傍修假中十行正修假傍修中記此明別教三觀漸修次第深入也如瓔珞經云從假入空名二諦觀從空入假名平等觀以是二觀為方便道因此二觀得入中道第一義諦觀雙照二諦心心寂滅進入初地法流水中名菩薩聖種性無相法中行於中道而不二故是為次第三觀之相也備辨訛云別既次第修於三觀所以能正修空傍修假中者須知別教本意不藉修空但藉空為方便意在下化衆生故修假期心佛果故修中也注淨名略記下之上十五若約別教為語正觀中道為慧眼者於十住中遠所期耳慧眼者古德頌云天眼通非礙肉眼礙非通法眼唯觀俗慧眼了知空佛眼如千日照異體還同記此因略記慧眼一語引出五眼淺深優劣之不同也如論云肉眼見近而不見遠見前而不見後見內而不見外見晝而不見夜見上而不見下故云礙而非通也天眼者遠近皆見前後內外晝夜上下悉皆無礙故云通而非礙也慧眼者天眼雖通但見世間和合因緣所生假名之物乃有相之事而不能見無相無作無生無滅之理此寂相之理唯慧眼能了知故云了知空也法眼者慧眼雖了空理而不能見衆生過去現在未來捨身趣生死此生彼不了出世俗諦大事不能入俗度生何以故無所分別故而法眼能見生住異滅自他一異等相又能為世舟航作大導師知病識藥應病授藥衆生幾微無不洞鑑故云唯觀俗也佛眼者法眼雖能照俗而不普遍獨有佛眼又名大圓鏡智如千日高懸十方普照世出世間若事若理若依若正若性若相若生若佛莫不一體同觀故云照異體還同也今言正觀中道本屬佛眼而云為慧眼者意顯十住開慧眼後可以漸見二空之理故云遠所期耳注一切智者觀音玄義下初云知一切內法內名一切能知能解一切外法外名能知能解但不能用一切道起一切種故名一切智玄記下具釋記此釋十住成一切智之義也玄記釋云內法內名者謂理內所詮法相及能詮名字外法外名者即理外所詮法相及能詮名字空觀若成於此名相悉皆體達無我我所故云內外能知能解然其空智但總達諸法無生不能別知諸法緣起故不能用諸佛道法發起衆生善種也注初住斷見即離四趣身子昔生至六住有退者此見思俱斷思既未盡見亦餘殘故有退墮如四明答日本難教行録記此節釋不知別住通惑見思同斷之疑也如教行録問云身子於十住中第六心退恐是爾前見思俱斷至六心時見猶未盡六心尚退別教初住界內見惑皆已斷盡豈第六住見猶未盡退作凡夫耶答若常程別教皆曰初住斷見不起諸過況見惑名數雖多乃一位斷思惑經諸位方盡此常談別教分齊也今曰身子六住尚退復起重罪恐有教門以見思俱斷至六心時思猶未盡見亦餘殘牽墮惡道也補仁王經菩薩教化品云若得信心必不退進入無生初地道疏問本業瓔珞云十住中六住正觀現前值佛菩薩善知識所護則出七住常不退轉七住前名退分如佛初會有八萬人退淨目王子法才王子舍利弗等欲入七住值惡因緣退落凡夫不善惡中作大邪見今經不言退者何耶答人心如面各各不同大聖隨機故亦差別有說十行性種人猶退墮地獄又初阿僧祗劫有退墮者瓔珞言七住名住不退七住已前即有退義約教而斷也初阿僧祇退者三藏意十行退者通教意十回向退者別教意十信退者圓教意今云信不退進入初住即圓意也文句明通教三不退義亦曰六心已前輕毛菩薩其位猶退七心已上從初地至六地名位不退也此是借別教位名名通教位耳大師判教明文若此後輩無知尚執異見各諍是非皆未曾細閲台宗大部故爾如四明者真可稱為山家之真傳焉附釋六種性習竟
