body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓將釋此文總分為二初釋題二初標注題天台四教儀集注記初標題天等四字標大師所立之教儀字乃諦師略録之文五字原題又為潤師所集注即注題也名集注者抄集典章注解要義也蓋大師縱無礙辨說教觀諸書其詞豐諦師録大部文心成一卷儀式其文約潤師復集諸文而加注之乃有十卷儀注行焉南天竺沙門蒙潤集注記次標人天竺應云印特迦羅此翻月有東南西北中五天竺國補然此非印度之南天竺隋真觀師於杭州龍井立精舍名南天竺後玉師居之以成集注處也沙門解本卷記師取法雨潤彼羣蒙意立名法華云如彼大雲雨於一切如其種性具足蒙潤是也備注家題乃記者所標記者厥功最偉惜軼其名氏無從考列篇首輔宏者擬附止觀輔行傳弘而立謂博搜詳記以輔成集注弘傳利物也示三師諱性權住武源集福院遍抄彚補勤苦纍載傳法支派亦未及備考今題標輔宏記及列示師彚補下特加輔宏記三字者不敢沒記者苦心也較訂者虗衷細較刪冗闡真訂成以備考定也二釋儀題天台四教儀記初標題此有通別二義天等四字是別蓋西土有龍猛四教東土有光宅四教苑公四教曉公四教玄籤判教章廣明今云天台四教是別題也儀字是通如補助儀放生儀等通以此立名備言龍猛四教者即龍樹菩薩以阿含小乘為有門大品般若為空門深密等諸大乘經說有談空互相無礙為亦有亦空門中論等說一切法皆即空之有是非有即有之空是非空互泯互融即第一義為非空非有門光宅四教者以羊車比聲聞鹿車比緣覺牛車比菩薩白牛車擬大乘菩薩唐元曉公四教者一三乘別教謂四諦緣起經等三乘共學內二乘未明法空是別相故二三乘通教般若深密經等三乘共學於中說諸法空即是通相三一乘分教梵網經等不與二乘共學名為一乘於中未顯法之周普名為隨分故名一乘分教四一乘滿教如華嚴經等具明法界圓融周普故苑公四教者即唐賢首藏公弟子苑公因寶性論有四種衆生不識如來藏立四教一迷真異執教謂凡外迷真廣起異執二真一分半教謂二乘如不變隨緣二義但得隨緣不得不變故名一分於隨緣中唯說生空不說法空故名為半三真一分滿教謂初心菩薩但得不變不得隨緣故名一分於不變中雙辨二空故名為滿四真具分滿教謂菩薩具隨緣不變二義顯真實理識如來藏故注天台山名也天者顛也元氣未分混而為一兩儀既判清而為天濁而為地此本俗名且依俗釋台者星名也其地分野應天三台故以名焉如輔行一上十七記顛者頂也高無上也元氣未分為太極清濁已判為兩儀所謂氣之輕清上浮者為天氣之重濁下凝者為地是也此從儒釋若據佛經論光潔自在神用名天又身勝樂勝名天如三卷天道中釋星者散也二十八宿列位布散各有分屬之野故云分野其地既上應三台之星故山亦以天台名焉注此山即大師棲身入寂之所蓋以西方風俗稱名為尊此土避名為敬故以此處顯其人也復以人命家則天台為宗矣今題意在焉記此明大師始終緣著此山故以此命題輔行云西方稱名為尊如子之名兼於父母佛當生彼預設此儀使慕德稱名故也此方避名為敬故以所居顯其人也備辨訛曰棲身應云棲真以大師避世守玄故也律中西土亦以避稱為敬如曰不得稱二師名人問當示一字若更問當曰義因緣故名某甲又根本有部乞戒詞曰我因事至說塢波䭾耶名塢波陀耶名某甲古師準此故有上某下某之稱至佛菩薩萬德洪名不諱者如此土稱諡號無異又當別論也豫按阿難陀羅睺羅皆名非諡然律中有是詞避稱之義亦有之雙存可也注四教者別文明化儀化法有乎八教今但言四教者以通名立題義攝兩種蓋非化儀無以判非化法無以釋一書之旨莫越於斯教者聖人被下之言亦詮理化物為義記今題標四教者謂頓等化儀四教藏等化法四教雖有儀式方法之殊總不出四字通名也蓋如來一代時教化儀以判定化法以分釋故題以四字通名攝兩種四教也被下之言為教者佛菩薩大悲益物言普被於當時教普被於後世也詮理化物為義者謂鑒機談理轉化物心故化儀有頓詮漸詮之別化法有詮真詮中之殊四教義云此四通言教者以詮理化物為義大聖於四不可說用四悉檀赴緣而說說能詮理化轉物心故也注問或約化儀立題乃據籤文化儀四教文義整足任運攝得三藏等四為證或謂頒宣藏等以為頓等謂化儀無體又謂頓等四教古師亦用藏等四教起自天台以此為化法立題今何以從通名耶記此料揀從通立題備設問有三一謂四教之題的約化儀蓋據釋籤解祕密不定中云且寄三法以出其相何者以此頓漸不定三法對祕密故則化儀四教文義整足任運攝得藏通等四故也二謂四教之題的約化法蓋據輔行明判教文云如來權巧善達物機頒宣藏等以為頓等可知藏等化法有體頓等化儀無體故也三謂四教之題在天台的約化法蓋化儀四教古師亦用妙玄云南北地師通用三種教相一頓二漸三不定華嚴為化菩薩如日照高山名頓教三藏為化小乘先教半字名有相教十二年後為大乘說五時般若乃至常住名無相教此等俱為漸教也別有一經非頓非漸而明佛性常住勝鬘光明等是也此明偏方不定教此之三意通途共有惟藏等四教天台獨創故以化儀立題有濫古之譏以化法立教有專家之美故也今從通名何耶補任運者如頓則攝別圓漸則攝四教頒宣者謂頒布宣揚頒宣藏等四法為漸頒宣圓別二法為頓頒宣藏等同聽異聞為不定互不相知為祕密故化儀無體備釋籤寄頓漸顯露不定三法以出其相者祕密說法其相難出故寄三法對祕密而夾出之則祕密之相可知而四教整足妙樂云祕密不傳降佛以還非所述故因後敘出乃可傳耳又古師但立不定等三種今云四教亦用者以顯露祕密二種同屬不定攝也偏方二卷解注答化儀化法有體無體或彼此相攝文各有意皆不為此立題而設況古師所立頓等與今不同故妙樂以題等藏等為天台一家判釋之綱目今此一書既明判釋立題四教豈偏屬乎記化法二句牒輔行意彼此相攝牒籤文意各有意者補籤以玄文但舉頓漸不定對顯祕密故不舉藏等輔行頒宣藏等以為頓等申用教意顯教門綱格不舉頓等是知二文各有攸歸皆不為此立題設也古立不同者妙玄云南北師通用三種教相如日照高山名頓等籤曰始自華嚴終至法華皆有頓義顯露中唯除鹿苑餘部皆有頓故名頓教不定亦復如是乃至明鹿苑初成亦有頓義況諸經部記南北諸師通用三種所立不定者專指勝鬘及金光明今家判味味之中皆有不定如玄文云一時一說一念中備有不定不同舊義專屬二部也是知大師不獨創化法四教即所定化儀良亦回與古殊故妙樂云頓等四教是此宗判教之大綱藏等四教是一家釋義之綱目今儀文既判釋俱明宜從通名立題矣注儀者天台一家四教判釋儀式也文末既云自從此下略明諸家判教儀式顯今一書明判明釋在乎天台豈可謂如來施化次第儀式耶備此下既明諸家判教儀式此儀字的指大師判釋儀式顯然矣此恐將今儀字誤作如來施化儀式而釋故辨定之高麗沙門諦觀録記次標人師諱諦觀者三諦三觀境智一如乃宗圓教觀行立名也通惠録云吳越錢忠懿王因閲永嘉集同除四住此處為齊句問韶國師師曰天台國清寺寂師必解此語王延寂師至問之師曰此智者妙玄中文時遭安史兵殘近則會昌焚毀教藏殘闕殆盡今高麗闡教方盛全書在彼王慨然使高麗高麗君敕僧諦觀報聘天台教部還歸中國觀至稟學寂公天台教觀至是重昌矣觀探索大本略出四教儀二卷其上卷明一家判教立義下卷明南北諸師宗途異計後孤山師謂上卷詞旨簡要學者資之可了一化大綱下卷乃破斥古師可緩是以但行上卷也補統紀云觀師製四教儀人無知者螺溪亡後故篋放光啓視之乃四教儀也由是盛行同除四住解九卷注高麗東夷國名沙門此云勤息謂勤行衆善止息諸惡故記衆善不出三學諸惡不出三毒所謂勤修戒定慧息滅貪嗔癡是也備若論圓觀一念三千即空假中一破一切破一立一切立一究竟一切究竟何善不行何惡不息此最上根勤息也注又沙門復以釋為姓者始於晉安法師也後增一阿含來此土云四河入海同一鹹味四姓出家皆名為釋文記此兼解沙門通稱釋也道安云剃髮染衣紹釋迦種當以釋命姓後增一下證成四河者阿耨達池中東殑伽河入東南海南信度河入西南海西縛芻河入西北海北徙多河入東北海即此土黃河之源也四姓一剎利翻田主愛民治國王者之類二婆羅門翻淨行道學居貞之類三毗舍即商賈種四首陀即農人種西域記云自餘雜姓難以詳載族姓殊者有四流焉又開元録引彌沙塞律云汝等比丘雜類出家皆捨本姓同稱釋子既符經律遂為永式注顯性録以四句揀云一是沙門非釋子出家外道二是釋子非沙門在家釋種此王種之釋也三是釋子是沙門兩土之僧此四姓出家通稱為釋四非釋子非沙門兩土之俗四句揀之無遺矣記今雖通引意在證成第三句也補顯性録孤山圓師解金剛錍明無情佛性故稱顯性備外道亦不合沙門勤息之稱今姑貼作出家說注或謂是釋子是沙門乃釋種出家且梵土餘種出家及此土之僧皆稱沙門釋子為何句收耶記此單辨第三句先出異辨且下詰破意以釋種出家始稱釋子沙門者請判兩土之僧非第三句收當何句收耶由是一詰異家默伏也注録謂觀師抄録台教綱要也記舉綱而衆目自張抄要而全文可委二釋文大科分三初敘時教法義散廣二初正敘二初立能判主天台智者大師記法藉人宏教從人立故首標立教之祖注拾遺記云天台棲真之處智者隋主所稱大師羣生模範亦帝王大臣所師也記天台棲真者發隱云師以夢符手接瑞感鐘鳴魑魅望德而消梵僧從空而禮宏經螺水示寂石城緣著天台故也隋主所稱者煬帝為晉王時授菩薩戒竟王言吾師傳佛法燈宜稱智者是也大師羣範者顯揚論云經言大師者能善教誡聲聞弟子應作不應作事名大師又能化導無量衆生證苦集滅道故名又能摧滅邪穢外道出現於世故名是則唯佛乃稱三界大師今稱大師者良由四衆攸仰如佛出世故請觀音疏鈔云大者褒美之詞師者教人以道之稱古者解行可軌名為大師智者是當時模範故稱也帝王大臣如陳後主隋文煬二帝儀同沈君理等備大師先夢山頂有僧招手申臂至於山麓接引令登後入天台見佛隴南峯徘徊留意其夜宿於定光之草菴咸聞鐘聲光舞手長吟言但聞鳴椎集僧是得住之相憶昔招手相引時否別峯華頂獨往頭陀後夜大風拔木魑魅千羣安心空寂自然散失師講淨名袁子雄見梵僧數十手擎香爐出二明所判法二初總標以五時八教判釋東流一代聖教馨無不盡記我佛慈悲普化十方遂得聖教流傳震旦至智者大師出以五時八教定解不蔓不漏罄盡其旨正是書所録之文故先總標也注五時八教本是如來所說之法大師依義立名備如來觀機演化時不愆期教無濫設故因時施教本是如來說法之儀唯意旨幽深非四依大士孰能測其端緒大師親見靈山一會儼然未散獲旋陀羅尼即四依中之初依故能依聖義以立五時八教也注用此判釋一代聖教故云以也備五時八教本如來說法之儀今加一以字則成天台解定儀矣注然上天台智者乃能判能釋之人東流聖教乃所判所釋之法五時八教乃判釋之儀式也備此於判釋而分三別以能屬人以所屬法以時教屬儀欲後學臨文暸然也注蓋天台準法華意判釋諸經如籤文云判釋準乎部教部教之義唯在法華備大師親證法華三昧故準法華釋定諸經如五時化儀四教中處處引用信解品中語是也節義曰釋籤無判釋準乎部教之文但法法皆有此意如境妙中言若不約教不知教妙若不約部不知部妙等意略撮於此耳注判謂剖判釋謂解釋備化儀乃總綱宣剖判化法乃方法宜解釋注妙樂云頓等是此宗判教之大綱藏等是一家釋義之綱目記大綱乃目之總處故喻化儀以定一化總教網目乃網之別眼故喻化法以釋諸經別義注如以化儀判華嚴為頓以化法別圓解釋乃至判法華為非頓非漸以純圓獨妙解釋備五時判釋詳解見下記下文詳釋時教文義散廣故總示之注東流者佛法自西而流東也記漢明帝時摩騰竺法闌始來震旦由是佛法廣流東土注代者更也如來五十年說法為一代今以五時八教判釋無遺記如來說法雖時長教廣今以五時八教判釋獨契佛旨更無遺議非天台吾誰與歸注若爾妙玄何云奈苑之前不預小攝耶須知妙玄約時破古謂說提謂經時乃未轉法輪已前未有僧寶故破古師不應於鹿苑前別立提謂為人天小教若約法收經則如四教義云三藏明世間布施持戒禪定即是人天之教並正因緣所生善法此已為三藏所攝故先達云約時破古不當五時所收約法收經義當三藏所攝也記此料揀提謂經謂奈苑前所說提謂經應在小乘攝妙玄云何奈苑前小預小乘攝補既不預小攝則不屬八教既在奈苑前則不屬五時得毋收法不盡耶記須知下是答辭如妙玄約時破古中引釋論云初從波羅奈終至般泥洹凡說小乘法結為三法藏從成道至雙樹凡說大乘結為摩訶衍奈苑之前不預小乘攝何者爾時未有僧寶故也備雖係人天世間善論未轉小乘出世法輪不當以提謂定立初時小教蓋佛以轉法輪為時故不預小攝之言專破舊立初時之謬也若約法下申明台宗正判應歸三藏以提謂經說戒善功德故故引四教義三藏世間施戒禪定作證先達下明台宗先德解釋可解記古有齊朝隱士劉虬立五時教初人天教即提謂經二有相即阿含三無相即般若四同歸教即法華五常住教即涅槃備本節問辭即將奈苑前不預小乘語按以台宗五時若有遺漏故有此難統紀云樹神知佛七日坐定未食五百賈客過有二大人提謂波利詣神請福神曰佛在水邊先奉食二人和蜜上佛佛授三歸依復為說五戒其歸依僧曰歸依未來僧二別列二初五時二初徵起標名言五時者一華嚴時記如來初成正覺稱法界性說華嚴經欲令衆生悟入法界也注從經題立時雖歷七處八會新經九會只是一經記釋從題立時之義處會下解注因行如華莊嚴果德記以萬行因華嚴一乘果德注具云大方廣佛華嚴經此人法譬三具足立題更有單三復三記阿彌陀翻無量壽又翻無量光佛為能說阿彌陀為所說皆果人單人立題涅槃翻大滅度是法解見下單法立題梵網大梵天王有網羅幢紅光互射彩色交輝重重珠影涉入無盡佛觀是幢因說世界無量無邊猶如網孔佛說教門亦如是單喻立題文殊是人翻妙德若見佛性即具三德不縱不橫名妙德般若是法解見下人法立題妙法蓮華解見下蓮華因果同時以比妙法權實一體法喻立題如來解見下獅子吼比如來說法謂一音普被異類等解魔外傾心所謂獅子吼無畏說百獸聞之皆腦裂人譬立題大方廣佛華嚴經謂極虗空之可度體無邊涯大也竭滄溟之可飲法門無盡方也碎塵剎而可數用無能測廣也離覺所覺朗萬法之幽邃佛也芬披萬行榮耀衆德華也圓茲行德飾彼十身嚴也貫攝玄妙以成真光之彩經也大方廣法也佛人也華嚴喻也具足為題補十身一菩提身菩提翻道謂佛成等正覺身二願身指從兜率來乘願度生說三化身謂隨類化現應機說四力持身謂神力持真身之全身化身及舍利之碎身永久不壞五相好莊嚴身謂證得微塵相好實報身六威勢身指魔外威伏邊說七意生身隨自他意處處受身意有所往身即隨到度脫有情八福德身指福德具足故九法身法性周遍法界以為身十智身妙智圓明決了諸法真光一真法界也注舊經晉譯五十卷或六十卷成新經唐譯八十卷成若龍宮三本上本有十三千大千世界微塵數偈一四天下微塵數品中本有四十九萬八千八百偈一千二百品下本有十萬偈四十八品今但有三十九品如釋籤十八記舊經晉安帝時佛度跋陀羅翻覺賢於揚州謝司空寺翻梵本三萬六千頌成晉經五十卷或六十卷新經唐永隆間日照依晉本譯出入法界品兩處脫文證聖元年實叉難陀翻喜學重翻日照所成兼補諸闕成八十卷仍脫文殊按善財頂之文賢首將日照所補安喜學脫處遂得文續義連然斯二經皆十萬偈中之略以譯未盡故龍宮三本文殊與阿難海於鐵圍山結集護法神收入龍宮龍樹菩薩親往龍宮見上中二本文廣非人力所持唯以下本誦回流傳人間今但三十九品者指唐譯品數舊經七處八會新譯加普光明殿一會第一摩竭阿蘭若六品一世主妙嚴二如來現相三普賢三昧四世界成就五華嚴世界六毗盧遮那第二普光明殿會六品一如來名號二四諦三光明覺四菩薩問明五淨行六賢首第三忉利天會說十住有六品一升須彌頂二須彌頂偈讚三十住四梵行五發心功德六明法第四夜摩天會說十行四品一升夜摩二升夜摩偈讚三十行四十無盡藏第五兜率天會說十向三品一升兜率二升兜率偈讚三十向第六他化天會說十地一品第七重會普光明殿說十地勝進行十一品一十定二十通三十忍四阿僧祇五壽量六菩薩住處七不思議法明佛果德八相海九隨相光明功德十普賢行十一如來出現第八三會普光明殿說六位一品謂離世間第九逝多林會說入法界品也注舊立四種華嚴祖無顯文考大師荊溪之意則有約時約處約理之不同約理則曰法界約處或曰寂場約時曰三七日或時長盡未來際何得認此名言便謂華嚴有四種之別且其間於義有妨不應以後分時長華嚴而為寂場又不應將通五時中通教之義為時長也備舊以寂場時長盡未來際法界立為四種華嚴考大師荊溪意惟約時約處約理之不同約理曰法界約處曰寂場約時曰三七日或時長盡未來際何得認此約時之名言反將時長及盡未來際分立二種加以法界寂場二種謂有四種別耶且其間下辨訛云不應以後分時長為寂場句按舊譯華嚴善財南詢言不離寂場新譯言不離遮那座前既後分皆言不離應與經語融會又不應將五時通後之義為時長句按妙玄說華嚴時節長今聞般若即能得入籤說一以法界為華嚴二以時長通至於後既大師荊溪皆以義通為時長應與祖語融會豫讀所辨甚有見識玉師以三約破舊四種義已成立且其間下二段本屬餘意今順玉師意備一解曰舊既約時而立二種不應抹去三七當分專立後分時長以攝寂場也至五時通後為義通齊至般若為文通微有區別不可以義通之時長即為文通之時長也記妙樂言所詮無外名法界宗鏡言法界者即一心之總名萬法之歸趣寂場解本卷三七日如謂初七日說前五會以經首言始成正覺三處皆言不起前故二七日說十地等以經初言婆伽婆成道未久第二七日故第九會在三七日後說有舍利弗祗園等故此據菩提流支約不壞前後相言也補統紀言舊以寂場時長盡未來際法界列為四種華嚴又分前三屬事後一屬理此積代之弊今論其義只有三名一謂寂場妙玄引方便品始坐道場三七思惟佛最初頓說是也以首品至三十六品為前分二謂時長妙玄引法性論鈍根三處入法界是也三十七品去為後分三謂盡未來際文句言華嚴未席始開於漸妙樂說此且寄娑婆一期設化用通今意應知華嚴盡未來際即法華經常在靈山何殊十方更互主伴雖有三名而所說經無非華嚴所詮理無非法界此統紀破舊之詞也統紀復說時長通三處者謂般若華嚴海空法華佛慧涅槃蓮華藏海是也備志師以三七思惟收歸寂場則時處似未分注問華嚴時長為至何時答如妙樂云義當轉教時也經家取後分部類相從結歸前分華嚴部內此即通五時文通之類也若般若明華嚴海空及日若垂沒餘輝峻嶺與夫蓮華藏海通至涅槃之後此於他部明華嚴義不可結歸本部乃通五時中義通之類非時長也記轉教解本卷後逝多林一會部類相從結歸前分華嚴部內是為五時文通般若華嚴海空者妙玄云華嚴別但在初通則至後故歷劫修行華嚴海空法華會四佛慧即是通至二經又像法決疑經云或見報身蓮華藏世界海為千百億釋迦牟尼佛說心地法門乃至日出先照高山日沒亦餘輝峻嶺故蓮華藏海通至涅槃後以像法決疑是涅槃結經當知上說乃他部明華嚴義不可結歸本部是通五時中之義通非華嚴文通之時長也補後分時長指逝多林一會文殊從逝多林出舍利弗語六千弟子言汝等見文殊威德相好等乃至文殊語諸比丘汝等善能成就十種大心句記言至般若來方可得云令諸比丘成十大心此乃義當轉教時也又統紀言由歷劫修學般若今發空智得入法界觀華嚴藏海皆畢竟空備辨訛言非時長當改曰非文通私謂文通義通均有時長之義但文通時長齊至般若義通時長盡未來際耳二鹿苑時說四阿含記小機於頓無益故佛隱勝現劣不動寂場而遊鹿苑保任劣機權證小果注從處立時說經雖多同一處故補說四阿含不局一處且指初轉法輪處言備辨訛曰同一處三字甚局當知諸佛始化皆在鹿苑故以立時注乃如來昔生垂化之地緣如輔行上七記輔行引大論曰波羅奈王遊獵見二鹿主一是釋迦菩薩一是提婆達多菩薩鹿主告王若以供饌當差次送每日一鹿王善其言次當達多羣中有母鹿白其主言我分當死而我懷子子非死次屈垂料理主怒言誰不惜命次來但去母至釋迦主所具白主言若我不理枉殺其子若非次差後次何遣惟我當代王怪問羣鹿盡耶主言但有滋茂為彼羣鹿歸告於我我憫之故是身不久必不免死慈救苦厄其德無量王說偈言我實是畜獸名曰人頭鹿汝雖是畜生名曰鹿頭人以理而為人不以形為人我從今日始不食一切肉我以無畏施亦可安汝意以是因緣知是釋迦昔生垂化之地也注羣鹿所居故名鹿苑從樹為名亦名奈苑二仙所居亦名仙苑記奈苑地多奈樹故仙苑婆裟言佛出世時有阿羅漢大仙於彼處已住今住當住佛不出世辟支佛住無辟支佛五通仙住二仙或是阿羅邏迦蘭二仙備辨訛言從樹者指苑為樹非指奈也猶言波羅奈之林苑耳二仙兩字恐荊溪一時便寫耳以頭藍弗二仙在摩竭提國不在此苑今注雖引成文似須改言仙人墮處以五百仙人空中聞音樂生染失神足墮此處注阿含翻無比法記謂聖人智慧分別法義莫可比並注妙玄十初云增一明人天因果中明真寂深義雜明諸禪定長破外道而通說無常知苦斷集證滅修道記報恩經言為諸天世人隨時說法集為增一勸化人習為利根衆生說諸深義名中阿含學問者習說種種隨禪法是雜阿含坐禪人習破諸外道是長阿含分別功德論曰阿難復思惟契經文義混雜宜當以事理相從大小相次第一增一次名曰中第三名長第四名雜以一為首次至十隨事增上名增一中者不大小長短等事處中道也長者說久遠事歷劫不絶本末元由事經七佛聖王七寶也雜者諸經斷結難誦難憶事多雜碎令人喜也然經雖四所詮同是無常何則世間有漏苦果由惑業集因所感出世間無漏寂滅由正助道品所得衆生不知苦故不斷集不慕滅故不修道故世尊段段說一切行無常不久住法速變易法不可倚法欲令知苦斷集慕滅修道也補真寂深義者無見思虗妄曰真離生死遷流曰寂乃出世法故曰深義長破外道明正因緣生法破邪無二種因緣三方等時記小機保證偏真故佛廣啓褒嘆之方等施彈斥之法令羞劣慕勝也注廣談四教均被衆機說經既多處亦不一故約法立時也記四教並談曰方三根普被曰等處亦不一如王舍城舍衛國靈鷲山泥連河等注若普賢觀稱方等者從理得名如釋籤六十五云此以理等名方等典若止觀二六云四門入清涼池曰方所契之理曰等此約行理合論今是生酥調斥之方等義應屬事記四門即有門空門等備統紀言舊釋方等立名但分事理未盡其義今為委釋光明經言讀誦大乘方等經典光明玄云方等之教通於三乘新光明經言欲生人天欲得四果支佛欲得佛皆應懺悔滅除罪障安處方等續遺記云方等之名有二義若大經從酪出生酥譬修多羅出方等此約第三時名方等即被一乘四教機若普賢觀稱方等乃直明圓理今以所引恐謂同普賢觀從理立稱故引三乘懺悔文定名的從部教不專事理也按舊立論有三說一從事大經從修多羅出方等無量義經次說方等釋籤生酥調斥方等光明經讀誦大乘方等光明玄方等教通三乘此皆指第三時教二從理普賢觀經此方等典是諸佛眼三事理並通止觀曰般若有四種方法謂四門入清涼池方也所契之理平等大慧等也故第三時准四明立義的從部教定名不專事理也今玉師以統紀方等從部教說部教兼於事理不若以生酥調斥乃佛化事從事立名也然舊立三說內觀經方等從理調斥方等從事並同今注方等從事理一解亦小異以四門入池屬行故曰此約行理合論辨訛言生酥調斥何曾離理若單屬事似離理外別有事方等且覺方等部有收經不盡之難矣私謂化事斷不離理玉師且順舊解重調斥邊判屬於事亦不至有難詞來哲虗心融會可也調斥者調停三乘之心令得通益訶斥焦芽敗種令心慕大說維摩注具云維摩詰所說經人法立題此云淨名亦翻無垢稱記凡夫染有二乘染空菩薩染中皆不得淨名居士二邊不著中道不安雖處居家不著三界示有妻子常修梵行如蓮華出水不為所溷故淨名名焉此據迹釋若據本乃金粟如來現身萬惡盡消衆善溥會淨亦不可名於不可名中以淨名名也無垢即淨稱即名思益注具云思益梵天所問經網明菩薩答記經曰過東方七十二恆河沙佛土國名清潔佛號日月光明如來有菩薩名思益由我佛宣說寂莊嚴光明遂放是光普照十方佛土故思益梵天來此土說偈讚佛興端請益網明以佛身相超千萬日月光明為問故佛放光思益梵天來與諸菩薩互相問答然經明文殊等行迦葉空生諸聖皆有酬唱今獨指網明者發起是經故也楞伽注翻不可往記楞伽城名在摩羅那山頂華嚴論云其山下瞰大海上大下小無路可上城乃衆寶所成光映日月無門可入而此山城為摩婆羅大夜叉王所據具大神通者方能升往喻自覺聖智境界非言思可到非寂默可通惟不思議者證入也楞嚴三昧注楞嚴翻健相三昧翻調直定亦云正心行處記智論云楞嚴秦言健相分別謂知諸三昧行相多少深淺也菩薩得是三昧諸煩惱魔及魔人無能壞者調直定四教義云通言三昧名調直定真諦三昧離愛見為調直俗諦三昧以稱機為調直中道三昧無二邊曲為調直也正心行處智度論云一切禪定攝心皆名三摩提此言正心行處是心無始來常曲不端得正心行處則端直也源洪師言大佛頂首楞嚴經翻一切事究竟堅固當智者時經尚未來此指首楞嚴三昧也金光明注金即法身光即般若明即解脫單法立題記玄義言金光明分即三德皆約性體具金光明真實名義謂法性可尊可貴當體名金寂而常照當體名光大悲益物當體稱明注玄文順古復約譬喻一釋格他譬法不周記此因玄文復約譬釋故今釋之玄文明古有三家釋題一數論家金比法身光比般若明比解脫大師破曰數論但明真應二身若以二釋三於論不便若取經文無處明三德若便作義解何義不通而獨譬三德既違己論又不會經非今所用二地人言金質有光明之能如法性從體起用自有般若解脫之力但作體用二義不須分光明異也大師破曰地論幸明三佛三佛釋題於義自便而棄三身從體用者則非論義若新舊兩本並說三身不道體用亦違己論復不會經進退何之非今所用三真諦三藏言金光明譬三種三法謂三身三德三位也譬三身者金體真實比法身光用能照比應身明能遍益比化身譬三德者金有四義一色無變二體無染三轉作無礙四令人富比法身常樂我淨四德光有二義一能照了二能除暗比般若照境除惑明有二義一無暗二廣遠比解脫衆纍永盡普益有緣譬三位者金性先有如道前正因位光融體顯如道中了因位明無瑕垢如道後緣因位大師破曰三三之釋三義不了且有三過一因緣不通二有乖圓別三不稱法性破已而即順之約譬釋言當知金光明三字遍譬一切橫法門乃稱法性無邊之說遍譬一切竪法門乃稱法門甚深之旨方合經王一切遍收此義淵博且寄十種三法為初門謂三德三寶三涅槃三身三大乘三菩提三般若三佛性三識三道此之三法該括始終甚深無量是謂約譬一釋格他不周也拾遺記言譬喻一釋為諸師解金光明為世物象用譬如來深法諸師雖用譬顯法其實不知法相圓融隨名局解故不能遍喻諸法大師欲示金光明海無法不備無法不融故順之以金光明三字為譬具足比佛所遊是則略而十種廣則一切法門一一互融皆不思議此乃格他譬法不周廣顯性體圓具諸法是也補記中以二釋三己宗則壞于論不便此破違宗若取經文無處明譬三德此破乖經因果不通因與果相違也十種三法者三道苦惑業三寶佛法僧三身法報化三涅槃一性淨即實相二圓淨即惑淨理圓顯三方便淨即善巧淨三德法身般若解脫三菩提一真性菩提以此真性為道二實智菩提即能照之智三方便菩提謂善巧化用自在三佛性一自性住佛性謂真如自性常住二引出佛性謂性由修顯引出三至得果佛性謂證得果位顯發三識謂七識八識九白淨識又一真識謂真心二現識變現根身世界三分別識三大乘一理乘謂理性二隨乘即智隨理運三得乘即得果自解脫得機令他解脫三般若一實相即實體二觀照即照智三方便善巧化用注其如經題是法非譬記或謂大師既順古以喻顯法何又自立附文當體二種釋題故今釋之如記言雖然順古以喻顯法其如經題是法非譬故後自立附文當體三種解釋斥彼推喻疏遠依經就法方為親切斯由大師深解法性具金光明真實名義究竟成就也除法性外名言皆無實義是金光明三種法門舉一即三全三是一非一非三而三而一不縱不橫絶思絶議是祕密藏佛所遊處也注又不可以被利鈍機雙存法譬也記此遮雙存以被二機補遮雙存者玄文問舊言此經說譬得名云何矯義而依文耶答非今就文而害于譬若苟執喻復害於文義有二途應須兩存故前言義推疏遠依文親近記曰如此用譬雖無經據存之有益二不偏廢汝專執譬棄親逐疏我今雙存親疏俱得如玄文言鈍根以譬擬法利根即法作喻故經言甚深法性安住其中即於是典金光明中而得見我釋迦文佛又空品言為鈍根故起大悲心蓋鈍根守指守株寧知兔月利人懸解不須株指也又記言佛說茲典既被二根故通經者釋題亦須二說赴其利鈍復貶從喻如守株指褒依法者懸解兔月不須株指足見不許釋譬微意玉師恐後人不了以法比二說為定旨故揭出言其如經題是法非譬復恐以被利鈍為證據故又言不可以被利鈍機雙存等也勝鬘等經注具云勝鬘獅子吼一乘大方便方廣經記波斯匿王召女勝鬘回國見佛女說偈言如來現世間普為羣生出亦應憫我等宜速降此間說畢如來現身令見又說偈讚佛及種種法如來印可故有是經也方便有三一為實施權曲巧方便二理本無言假言而言大方便三權實無滯大方便初如一佛乘分別說三是也二如諸法寂滅相不可以言宣以方便力故為五比丘說是也三如涉有未始迷空觀空不遺於有即佛方便知見波羅密皆已具足是也今是後二種又經言若如來隨彼所欲而方便說即是一乘一乘者即第一義方廣獅子吼見前注勝鬘夫人即舍衛國波斯匿王女末利夫人所生為踰闍國王妃記梵語摩利室羅翻勝鬘相好勝母故波斯匿翻和悅王多仁慈故末利翻鬘四般若時記由前方等二乘雖發心樂大故習猶堅夫欲淘汰執情必須空慧之水故有般若時注從經題立時般若翻智慧智慧輕薄即五種不翻之一也記有分別名智無分別名慧又根本名慧後得名智今以智慧雙易般若者顯權實一體大慧也五不翻者一祕密不翻如諸陀羅尼呪二多含不翻如婆伽梵含六義三此方無不翻如閻浮提樹四順古不翻如阿耨菩提自古存梵五生善不翻如般若尊重智慧輕薄為人生善仍存般若也備記中分解智慧亦一往言之弗泥也說摩阿般若光讚般若金剛般若大品般若等諸般若經注摩訶翻大多勝以多含故不翻記非小乘故大詮顯十八種空乃至八萬四千波羅密故多一切諸佛菩提皆從般若中出故勝多含不翻亦五不翻之一備記解大多勝約般若部說其實含多義注光讚經云於是世尊從其舌本悉覆佛土而出無數百千光明照三千界其光明中自然而植金蓮華其蓮華上各有諸佛講說此經光即光明讚即講說即大品上帙記此可配於三種般若謂從其舌本悉覆佛土即實相般若實相遍覆法界也出光明照三千界句即觀照般若觀照照察萬有也其光植金蓮華華上有佛說經即文字般若文字般若從大悲心流出也備配合出記者新意注金剛從喻立名以金中精剛能斷難斷喻般若斷疑蕩相亦名小般若乃大部六百卷中第五百七十七卷記海中有寶名金剛最堅利堅故不為諸物壞利故能壞一切物以喻般若能斷難斷之惑不為無明煩惱所壞備源洪師言名小般若句疑集注便引蓋藏中原有小品十卷對摩訶名小存俟後定此有六譯今流通本姚秦鳩摩羅什譯也注大品輔行五上七云大品凡列法門無不皆以五陰為首記大品言聲聞依四念處行道菩薩初觀色乃至一切種智章章皆爾故輔行言此是引證依經義以明十境通能覆障五陰為初故大品及大般若凡列法門皆以五陰為首五陰只是念處境耳注等諸般若經者謂等於小品放光仁王天王文殊問般若等補統紀言大品般若四十卷按藏經目録言摩訶般若三十卷光讚十卷龍樹用此本作智度論百卷智者依此論作疏二十卷今在高麗未至是知摩訶光讚皆即大品也又統紀曰若放光金剛等十經皆晉宋間譯唐裝法師始翻出大般若六百卷當知前十經皆重翻也天台諸部所引正大品中義是羅什翻十經者大品光讚小品大明度勝天王文殊問金剛七部均羅什譯道行竺朔譯新道行支讖譯放光晉羅義譯備統紀十經仁王不在其列又統紀曰四教儀列般若諸經名總別重出難於分別蓋摩訶即大品此指摩訶大品重出也私謂集注大部六百卷中句亦係便寫以六百卷乃唐所出不須引用也五法華涅槃時記二乘於般若會領知法門故說法華開四時權顯一乘妙然有漏網機及橫來衆未聞前教豈解佛乘更說涅槃重為捃拾普令證歸佛慧故二經同為第五時注從經題立時以此二經同醍醐故補妙玄曰醍醐衆味之後涅槃稱醍醐此經名大王膳故同也注具云妙法蓮華經妙名不可思議法即十界十如權實之法蓮華譬上權實法也記法華有三本晉譯名正法華十卷秦譯名妙法蓮華七卷隋譯名添品妙法華八卷今是秦本妙名不可思議者言語道斷心行處滅也十界謂四聖六凡蓮華譬者蓮華因果同時喻妙法權實一體補妙法即實相十如者如是相相據外而可別如是性性據內而不改如是體主質名體如是力功能名力如是作構造為作如是因習因為因如是緣助因為緣如是果習果為果如是報報果為報如是本末究竟等初相為本後報為末所歸趣等為究竟等一法界具十如是十法界具百如是又一法界具九法界則有百法界千如是注涅槃具云摩訶般涅槃那此云大滅度大即法身滅即解脫度即般若即三德祕藏也記大者稱體而周法身德體遍十方也滅者無縛所纍解脫德滅除二種生死縛也度者破無明障般若德照破五住無明也二結立異名是為五時亦名五味注結也五時在大部中或作五味列故云亦也五時說法頌云阿含十二方等八二十二年般若談法華涅槃共八年華嚴最初三七日補今明別義故引孤山五時說法頌備教觀綱宗引玄義言五味論別別有齊限論通通於初後章安言人言第二時十二年中說三乘別教若爾過十二歲有宜聞諦緣度者豈可不說人言第三時三十年中說空宗般若維摩思益依何經文知三十載也大論言須菩提於法華中聞說舉手低頭皆得作佛是以今問退義若爾大品法華前後何定也智者章安明文若此今人尚傳阿含十二方等八之說乃至別五時者約一類最鈍聲聞具經五番陶鑄方得入實然此別五時法亦不拘定歲月日時辨訛言五時頌局甚然古所以病此者以見法華有二十年除糞之言遂謂方等亦有藏教故判方等八以阿含自有成文言是十二年前也又見經中有二十年中執作家事復經少時之言便判般若為二十二歲也私謂玉師引頌非不知通五時義與章安所破但泥別而不知通者不同今既論別時前後修短於無次第中當有次第故引之耳若結集家收歸本部此屬文通來哲固不可泥定年分亦不可以通難別也記中五時收經結經等說存俟後考記五時收經鹿苑收四阿含等諸小乘經方等除四時外通收諸大乘經般若會收諸部般若經法華收無量義及普賢觀經涅槃會收大涅槃及像法決疑經華嚴會收華嚴梵網經若論五時結經則華嚴會以梵網為結經鹿苑以遺教為結經方等以瓔珞為結經般若以仁王為結經法華以普賢觀為結經涅槃以像法決疑為結經如來說法五十餘年談經三百餘會今頌該括無遺也補有本般若收諸般若經及無量義經法華收法華并普賢觀經又言般若以無量義為結經
