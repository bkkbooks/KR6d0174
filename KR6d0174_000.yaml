front:
  text: 天台四教儀註彙輔宏記原序天台四教儀集註一編入藏流通舊矣特以文約義豐非廣搜經論以闡發之新學何以深入堂奧耶輔宏記者相傳山家後嗣集而記之所以輔弼集註而宏揚教觀者也又曰扶宗記惜沿今不登梨棗秘之講座珍逾龍藏遂致傳寫者句讀脫闕字畫烏焉蓋一展卷而指不勝屈矣予自乾隆丁丑搆茲記癸巳乃得復獲抄本儀註註暨諸先德集註標本於是抽閒四載欣然廢寢忘餐彚成十卷更其題曰註輔宏記方思精密重編公諸同志以成秉教必要之書何期草始就而雙目損明豈夙生之少植歟抑因緣時節之尚有待歟留贈後賢詳加參訂以付梓流通庶幾盡未來際俾見聞者共得遊於三德之秘藏也夫大清乾隆四十四年歲在己亥七月哉生明比丘示三氏性權謹識輔宏記補訂序如來一代時教始自道場迄乎雙樹其間頓漸權實之部偏圓半滿之談於法華而開示佛之知見乃大暢其本懷夫所謂佛之知見者一念三千空假中不思議絕待之妙法也宗此者謂之圓宗解此者謂之圓解修此者謂之圓修證此者謂之圓證法華偈云佛子住此地則是佛受用常在於其中經行及坐臥意不在茲乎迨迦葉十三傳而有龍樹著中論譯之震旦北齊文師讀之悟因緣即空假中一偈之旨以授慧思思師以授智者智者大師契法華三昧發旋陀羅尼創立兩種四教判定一代五時誠所謂一家教觀統攝龍藏者也繼之者章安頂縉雲威東陽威左溪朗荊谿然而天台若教若觀之書於是乎大備荊谿而下承之者興道䆳至行修正定外妙說琇高論竦常照寂惟遠通法智禮而教復稱中興矣法智而下紹之者南屏臻從諫辨車谿卿宜翁觀元實印佛光照子庭訓東溟日普智礙天竺慧東禪翁百松覺無盡燈靈峰旭旭師靈峰一枝之始祖也作鬮禱於佛得台宗焉傳之者蒼暉晟警修銘履源洪素蓮珠道來成成師於靈峰為第六世嗣子嗣孫今皆分座諸方矣方成師之講法武林也曾授富春單子華藏以一心三觀之要單子淹通賢首慈恩諸家嘗究西來大意一夕聞蟲聲乃深悟有頌云促織促織汝太饒舌露冷風涼聲聲啼血故其談教也語語從胸襟流出不偏不泥貫達諸宗雄辨若雲所向無滯殆有獲於辨才三昧者歟單子有門人曰錢子伊菴潛心內典與余方外交囑較輔宏記補訂一書間有一二損益處錢子均採入焉噫禪林膠理即而藐修講師競多聞而撥觀如斯流弊於今尤甚曷不玩味乎茲集而知不思議絕待之體境觀一如解行兼進以速到一切智海免為增上慢人不亦慶快平生也哉錢子書成而單子已卒索序於余余惟是集之由來及利導後賢之意錢子述之詳矣故特序台宗授受之源以公來哲俾知聞風興起云爾龍飛嘉慶二十一年歲在丙子仲冬長至日比丘儀潤氏源洪書於武林苕上真寂精舍輔宏記補訂自敘四教儀集註輔宏記者逸其名講師傳為帳中秘余受之華藏單先生繼得示三氏補註於元如師卒得紹曇上人辨訛於源洪師皆釋儀註之要書也余慧劣遇艱復乏淨財繙閱刪輯者迨二十餘遍晨夕祈三寶加被五載而訂定製聚珍字盤勉成之自丙子五月十有二日首事集印越十一月朔後三日日在長至而告成其間較定舛訛贊襄乃事者則源師力也或有問曰子稟單傳於曹谿何復雜研夫諸教今尤汲汲焉流通台家之輔宏記者何歟余笑曰宗門運水搬柴麤言細語皆西來意於經論何獨不然然理則頓悟乘悟併銷事須漸除應次第盡子將謂一悟即佛無事熏修耶初祖不立文字而屬二祖以楞伽子獨未之聞耶矧吾儕淺知膚見三毒勃如其敢毀木叉撥修多羅作師子蟲耶且余嘗聞誨於華藏先生矣佛法東流迄今繁衍者天台而外標直指者厥有達磨闡法界者厥有賢首成唯識者厥有慈恩餘如淨宗密宗律宗斯諸祖者悉大悲為心各開方便門以作如來之使者也然簡偏圓辨邪正知病識藥應病授藥橫豎該羅教觀美備可以評衡諸家之權實希一生之登住者則莫如天台其習焉而全不奏功者非空言無補即一暴十寒或方便正修境乘之闕漏非天台咎也然就天台一家論之智者章安荊谿四明諸著述文富而義玄幽䆳汪洋目眩神駭兼之一家立義旨各有歸如借用地論教證四種妙玄借成二意而輔行借成三意別行橫學無作四門位淺只應但中而釋籤謂附彼教如斯異同難以枚舉自四教儀集註後先疊出為之括大綱通旨趣而後學者易以抽摘其端倪是則台宗集佛法十二部之大成而儀註又為台宗三大部之鎖鑰豈不重哉夫儀註重則闡發儀註以宣揚教觀者亦重輔宏記一編是也儀註搜引大小乘經論奚啻百十部雖有備簡節義諸書猶未周且盡斯記則詳錄其引詞疏通其文義末學鈍根苟能繇斯記以會台宗其於偏圓邪正諸家權實之故瞭如指掌夫然後以此自行即以此化他將此深心奉塵剎是則名為報佛恩此昔所聞於華藏先生而殷然流通之微意也若夫靈峰之言曰四教儀出而台宗晦殆有激焉而為之辭無煩余之置也大清嘉慶二十一年丙子十一月長至日武林三寶弟子錢伊葊謹敘輔宏記補訂凡例舊題標天台四教儀集註輔宏記示師於輔宏記上更加一註字今仍刪之於記下加補訂二字定名之意見卷首記本輯載周詳示師復增十分之三今研記中有於義未確者或煩重非要者刪之於示師增註亦然每節次第於儀文前列科題則低二格若儀文則另起一行而高列高格其原註上標陰文次集註則加一註字而前空一字其原註上標陽文間有原註與集註文連義合者即不分標之次記文上加一記字記有所遺乃錄示師之所補別加補字補仍未暢再參諸疏以備考上加備字庶文不相濫矣示師抄本外余復得集註標本未識何師所錄故但加有師標云四字餘如靈耀師節義天溪師備簡補遺集註問答紹曇師集註辨訛義有當採均為增入而各載其題名楞嚴寺藏版首列懸科今刪之示師記本另增貼科然分科者為識章節大綱若過細科則失於煩碎故今科從總刻本集註所見有三種互有舛訛至輔宏記抄本相沿舛誤亦多今雖校勘仍慮未周後檢校有得實者乞為改正於諸解謬處亦然唯記中引經論等或因文句冗長略為節錄或因旨趣深玄略添助語集內似此不少勿以不見經論原文為斥將來別部引用亦弗引茲刻為證今刻用聚珍盤集字印成二百部以為流通前茅見者珍之如有刻版因緣則諸圖仍宜掛線而依原圖付梓新刻天台四教儀註彙補輔宏記緣起原夫佛祖之道乃定慧而已矣定非觀無以深入慧非教無以深明有教無觀則罔有觀無教則殆教受傅訓觀由己行訓乃文字般若行即觀照般若然後堪證實相般若矣且如我始祖智者大師靈山夙聞大蘇妙悟降天魔於華頂轉法輪於瓦官縱無礙辨稱性宣敭依本迹二門開待絕二妙詮顯妙經而有玄義文句止觀世稱台宗三大部焉暢盡如來出世大事因緣罄無餘蘊第以文博義淵後世學者皆望洋而歎於是賴有高麗國師妙錄文精一軸命名四教儀輯三大部之要綱為大藏教之引鑰儻能酣醉儀文便可洞悉度生法藥所謂嘗一粟而眾昧具存覩一漚而百川俱在也然而文約義豐尚難措矚叨有南天竺之集註十軸可謂詳且備矣嗚呼時丁末運黠慧淒漓不有性權法師之彚補輔宏記者而集註雖詳猶不足觀也以是知輔宏記者誠法門之最要書也大有裨於教觀者惜乎素未壽棗學者罕親如光緒甲午夏我太祖敏公老人演集註於龍華講堂眾集二千餘指有是書者僅惟五六尚是嘉慶間聚珍之本也寶逾龍藏珍而秘之餘諸同志欲覔而不獲欲覩而無書閑雖朽鈍受潤有年原欲念報祖恩亟令繡梓自愧賦性愚蒙欠諳酬應安心澹泊乏術點金弗獲已掩顏吐舌敢報檀那且喜法緣在茲一舉克遂奈舊本蔓莚句讀未煦若不少為疏調初學披讀維艱邇來赴講不暇雖間以澄神游涉頻續頻荒其間行列編科分眉分目頗遂陋志屈指三秋若道完性權法師未了公案則吾豈敢時大清光緒二十三年歲在丁酉春王月既望天台嫡裔後學比丘諦閑書於甌江古頭陀山妙智禪寺之惺寂堂新刻輔宏記凡例是書乃大藏綱宗台家心髓大師說大部於隋觀師錄心宗於吳崗師述集註於元示三師獲輔記於乾隆丁丑錢居士製聚珍於嘉慶丙子迨至於今始能殃梓告成嗟乎說經難著經尤難而刊印流通亦未敢擅言其易願同志者毋得以為輕忽可爾輔宏記者相傳謂台宗後嗣集而記之惜乎逸其名弗克顯標記主耳是書舊題標天台四教儀集註輔宏記示師於記上加一註字伊菴居士刪之復於記下加補訂二字茲者攝別從總唯目之謂儀註彚補輔宏記耳記本輯載周詳示師復增十分之三居士補訂時重煩者刪之未已者補之今所刻者凡遇儀文俱列科判註文記文皆另起一行儀註二文咸列頂格設二文中有原註者仍用小字附入二文之下若註文首加陽文註字而記文則低一格以是釋二文之辭故宜爾也則首列陰文記字然示師所補之文仍標陰文補字居士備考之文亦標陰文備字如是則來學開卷瞭然如視諸掌𠁼葊居士所得標本補入之文仍用有師標云四字餘如舊例云云楞嚴寺藏板首列懸科居士刪之示師貼科余所未覩然分科者原為易識章節大綱居士厭煩刪去細科以予之鈍目矚之似未堪略今依儀本舊判少加詳易增補文前願同志者垂賜鑒原𠁼葊囑云如有刻板因緣則諸圖仍從掛線茲宜從命故將直說轉畫成圖俱照集註參正古疏隨文科目多不俱提如一科分三但標首科今亦從之奚敢逞能別調耶古德標科楷式巧用干支以別科目層次今亦承用以是書章節繁疊二十字未足為標復用號碼之數依次標科實欲從流覔源者便非露拙也以章節科中雖大科分幾或子科復分每科之下但標其初未曾俱列今於記前另設略科提綱者以為索本討源之便耳不肖少而乏讀智不逮人況未徧親高哲富玩古疏今刻是書唯遵前印疏理文節次第未敢擅自移易雖編科參梓少有所補一一俱依備簡補遺掉直文面而已註既十軸記亦十軸今疏理記文仍分十軸以其頁數過多訂本甚厚恐翻閱者未便故剖之為某卷上下庶幾可以薄訂矣蓋為珍重佛法非敢擅易也賜覽高賢幸垂諒我天台四教儀註彙補輔宏記卷首時教圖妙樂頓等四教是此宗判教之大綱藏等四教是一家釋義之綱目若消諸教但用藏等其文稍通若釋法華無頓等八舉止失措釋籤依如來藏同體權實大悲願力隨順物機不獲已而用既機宜不同致法有差降從一實理施出權理權實二理能詮教殊故有四種差別教起備註釋經論只須長行直解故玄籤文句止觀等書均少圖式惟四教儀集註作圖甚多今本仍依儀註圖式寫入以俾學者易焉初釋圖中時教之意補部首舊列有時教圖首標如來藏心不特明一家教部宗源即如來一代教觀知惟心具開卷瞭然故今先明圖以明如來之教依理而起也理者何即眾生心夫眾生現前介爾之心一念三千即空假中不可思議當體絕待無可詮顯姑作一圓相表顯之然此心體何名如來藏如來果人之號藏者含藏之義眾生之心含藏佛果智慧德相故作圓相以表因心果覺無欠無餘也依此起教者何如來覩明星悟道時歎曰奇哉眾生具有如來智慧德相但以妄想執著不自證得是以興慈運悲依如來藏詮中實理而起圓別二教以度迷中利鈍之機又依如來藏偏真權理而起藏通二教以度迷真利鈍之機此化法四教從理起也然如來惟以一佛之知見咸令眾生開示悟入意在法華之純圓秖緣機器未堪最初兼一別教是為第一時華嚴之頓大機雖悟小機未聞於是脫珍著弊但說三藏令二乘革凡成聖是為第二時漸初次至方等彈偏斥小歎大褒圓對半明滿四教俱說令二乘密得通益是為第三時漸中次至般若融通淘汰轉教付財帶通別二正說圓教令二乘密得別益為第四時漸末於此四時中如來一音演說眾生隨類各解互相知者名不定不相知者名秘密此化儀四教從理起也至法華開權顯實咸令開佛知見乃暢本懷次說涅槃為未熟人名捃拾教亦為末代鈍根名扶律談常教追說四教同四味施權追泯四教同法華顯實與法華既同時味總為非頓非漸非秘密非不定之化儀從理起也至於藏教成生滅真俗二諦通教成無生真俗二諦別教成無量隔列三諦圓教成無作圓融三諦雖四種不同皆如來化法所攝莫不從理起也以是知如來藏心體也五時八教用也蓋從體起用正顯心具之微旨也問如來藏乃無明陰妄心世尊覺滿藏理已顯所起時教應云從真如理上而起何以標如來藏耶又心佛眾生三無差別何以獨標心耶答一家明理就迷就事而論不同他家及與山外備他家指台宗外各宗法師山外指台宗內背宗各師如四明之徒淨覺師等是也以清淨真如離妄立真山家即妄全真開初心圓觀也山外隔歷近乎別教佛祖統記內詳辨補理指清淨真如若指此理祇齊今家別教非究竟說山門立義所以超諸家者正由此也又一家綱格不出解行解則諸佛眾生色心依正趨舉一法無非此理行則的指內心玄文云佛法太高生法太廣於初心為難觀心則易今云如來藏心意欲學人舉綱挈要依教以起觀也苟能洞了此圖則一家教部性修解行思過半矣胡可去哉備立圖本意似將一代時教括入一圖使人了然易明今加以性具各解與來哲有裨存之華藏老人曰藏教滅俗顯真故真諦無俗俗諦無真為不平等之真俗通教具體色真俗二諦不知中諦別教中諦與真俗隔歷不融惟圓教一中一切中一假一切假一空一切空即三即一遮照同時此為佛知見矣圖中收歸三諦者以前皆判教相非證莫了必須修三觀證三諦始免數寶之譏意深哉二釋圖下原引之文備初引妙樂示判釋綱目者前四時中頓等四教可知法華非頓者明非隔漸之頓正是會漸歸頓也故以頓等四教為此宗判教之綱既定綱已後以藏等四教詳釋五時用頓等化儀之義故為綱目若消下謂前四時未經開顯但用藏等各論當部不舉從頓施漸會漸歸頓及秘密不定等大綱猶可消通若釋法華無頓等八則五時之化儀難彰偏圓之化法莫辨相待絕待義俱不顯舉止之失措也宜哉次引釋籤明起教者如來藏理本一中實但小機思息化城令證偏空謂之權也雖分權實理元是一故曰同體我佛依此而起大悲乃為實施權不獲已而用也然既隨機立法則從實出權已分真中之殊復因詮真分藏通詮中分別圓故成四種差別也次釋序分二初序題天台四教儀集註序備此玉師序集註所由作也二序文天台四教儀者實教門之要道也補天台大師以兩種四教判釋如來一代所說五時聖教開本迹十妙說止觀十乘依之修者得道如林大師滅後章安大師結集廣本有望洋之歎高麗法師於廣本中略錄判釋儀式曰天台四教儀由是學者易得綱要故玉崗師標美乎序首也儀註曰教者通指如來一代大藏也教為入理之門故曰教門自昔至今註釋者眾或略而不備或博而太繁矧又節去正文但標初後苟非精誦者莫之能閱也補昔指宋開寶間至於元之元統時三百餘年註釋者有苕溪玄粹師備釋二卷神智從義師集解三卷舜江弘濟師紀要三卷其間更有註作故云眾也略者文簡而理不周博者辭紊而意不切此集註所由作也初後者初謂一節首後是一節末謂但標每節首末之文也背文曰誦對文曰讀但標每節前後苟非熟誦者莫能翻閱何以導進新學哉今集諸部之文註於其下將無便於披覽者歟其間一二與諸家有同異者蓋述所聞於先德非任胸臆也若夫文末正修初乘觀法文雖簡略理亦備焉補諸部謂採集經論及一家教部之文言同異者如釋題之從通分天台如來兩種儀式及文義二通乃至辯同體異體等與諸家有異也先德指淨慈志云師等蒙潤南屏八世桐州之孫學法古源承嗣竹堂此書既集諸部成文及述先德所談故非胸臆說罔欺後學也若文末示觀意在起行務從圓門深入故於正修唯明圓行文雖敬紙一念三千空假中理已大備矣夫一念三千即佛知見山家精髓教觀綱要佛佛手授祖祖心傳唯此而已矣今但略舉初乘者十法成乘以不思議陰境為今正觀可攝下九故諸新學人究心於茲忘言忘思筌俱擲奚以是為然能爾也則無適而不可亦豈離是云乎哉補初則依言開解繼則行起解絕設有毫髮當情即以四性推破推之既久情念自盡圓具之理一旦豁然迴超言思之表是為不思議境此惟觀智所證故曰忘言忘思蓋理既圓悟如得魚而忘筌獲兔而棄也是指儀文也適往也備人能精研儀註則於性修事理因果自他融會洞徹由是集之約以窺大本之廣復括大本之廣以歸是集之約依教二利取捨自在無往不可然契理忘言之人益知教觀綱宗不離是集故序末深致意焉噫斯道之不明久矣禪宗不立文字而目為毒海教家不務禪觀而逞彼唇鎗惟我玉師闡解行同途之旨揭性修一契之源非斯人吾孰與歸源師引藕益師語作問答云四教儀出而台宗晦如執死方醫變症此意如何答藕師䇿進學人廣探大部不可守此自隘也儀註一書使初學者從約至博為教觀基址也時元統甲戌夏五南天竺白蓮華沙門蒙潤謹序補此紀時也元統元順帝年號南天竺杭州山名白蓮華庵在天竺玉几峰側傳云法師諱蒙潤字玉崗海鹽人年十四依舅古源師授天台止觀諸書即了大意源師寂事竹堂傳師嗣焉出世主海鹽之當湖德藏遷杭上演福下竺諸剎後居白蓮菴專修念佛三昧著有四教儀集註十卷行世辯訛云夏五出春秋不言月者史闕文也逸叟云余久欲發明圓圖序註不藏法姪持憩師講錄來乃芟繁存要附於輔宏記前以惠後人示三師云余自乾隆丁丑覔輔宏記癸巳方得原記錯悞者錄較補正其間旁引儀註註及先德細標訓釋更其題曰註輔宏記僅成稾耳圓圖序註乃雲棲憩西文所述陶徑逸叟復加刪補為素蓮老大師所珍藏今復得之彚入註輔宏記前將非盡善也夫備憩師圓圖序註詳加刪潤原本復有釋此題玄義一篇所判體宗用教勘非切要故刪之
