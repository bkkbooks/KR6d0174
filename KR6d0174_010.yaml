body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清淨比丘權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二行位三初通標略明藏教修行人之與位注道標一教修行之人及三乘位次妙玄四三十二云為破行人增上慢心為消經文引物希向文釋籤五二十一云若無位次將何以為見賢思齊將何以越增上慢罪文記此釋通標人位也蓋位者為顯三乘行人修因尅果有階差故周易云天地之大德曰生聖人之大寶曰位如是則知若非位次無以引行人之希向如妙玄云諸聖上位非凡能測豈可妄說粗知大意者為破行人增上慢心為消經文引物希向也見賢思齊出論語二別釋三初聲聞三初標位分科初明聲聞位分二初凡二聖凡又二外凡內凡注凡有四門明位一毗曇有門明七賢七聖二成論空門明二十七賢聖三毗勒論明雙亦門四車匿論明雙非門記此明位次有四門不同也一毗曇有門明七賢七聖者四教儀二云一毗曇有門即三藏教明正因緣生滅之有若稟此教能破十六知見見陰界入一切有為之法皆悉無常苦空無我得世第一法發真無漏因有見真有即第一義諦之門也故大集經云甚深之理不可說第一實義無文字聲聞弟子憍陳如於諸法中得實義此即毗曇論中之所申也二成論空門明二十七賢聖位者四教義云二成論空門即三藏教明㭊正因緣假實法生滅入空若稟此教能破假實之惑見假實空發真無漏因空見真空即第一義之門也故須菩提在石室中觀生滅入空因空得道名見法身恐此是成論所申也三毗勒論雙亦門者四教儀云三明有空門即三藏教明正因緣生滅之有空若稟此教能破偏執有無之惑見因緣有空發真無漏因有空而見真有空即第一義之門也此即迦旃延因此入道故作毗勒論還申此門也四車匿論雙非門者四教義云四明非有非空門即三藏教明正因緣生滅非有非無理若稟此教能破有無邊邪之執見因緣非有非無發真無漏因非有非無見真非有非無即第一義之門也惡口車匿因此入道論文未來此土有人言犢子阿毗曇申此意也彼論明我在第五不可說藏中我非三世即是見非有非無為法即是見非空此恐未可定用補因門契理出三界苦門以能通為義也蓋有門則念念生滅空門則三假虗浮雙亦則有無從容雙非則有無俱遣隨依一觀可以發真注後二門大論雖指論文未度若空門二十七賢聖者學人十八無學有九四教義二十七云賢人有二聖人有二十五文凡位不備今家不用釋籤五二十具引記大論云智者入三種法門觀一切佛語皆是實相不相違背何等是三門一毗勒門二阿毗曇門三空門何名毗勒門答毗勒有三百二十萬言佛在世時大迦旃延所造若佛滅度後人壽轉減憶識力少不能廣誦諸得道人撰為三十八萬四千言若人入此門論議則無窮其中有隨相門對治門等種種法門乃至不得波羅密多若入阿毗曇則墮有中若入空門則墮無中若入毗勒則墮有無中又佛垂滅時阿難問車匿事佛答惡性車匿吾涅槃後心漸調伏當為說陀那迦旃延經即雙非門也然論文雖指後二門而論文未度者未過來此土也是則無位可憑故不準此而明位也如四教義言惡口車匿因此得道末見論文是也空門二十七賢聖者成論第一分別賢聖品廣明行得乃至後結云如是九種名無學人先十八學人及九無學是二十七人名為一切世間福田僧中具足如下所示四教義言次明三藏空門二十七賢聖位者信法二行即是兩賢在方便道空門發真斷見惑未盡行即須陀洹向見惑斷盡名須陀洹果空解增明斷欲界思一品乃至五品名斯陀含向斷六品是斯陀含果斷七八品盡名阿那含向欲界九品思盡是阿那含果阿那含有十一種帶果行向是阿羅漢向進斷上二界思惟也若非想九品盡即是阿羅漢賢有二聖有二十五合有二十七成論詳載注今依有門明聲聞位者有三意一凡聖位足二佛法根本三符順教旨佛法根本者有門所說世間諸法乃是無明正因緣生不同外道邪無因緣生也又四教義云大乘經論破小用小多取有門少用空門故須略出毗曇有門佛法根本賢聖之位文記此明今取有門明聲聞位一凡聖位足者謂賢位七聖位七二佛法根本者謂佛說世諦諸法以有門為根本故三符順教旨者謂聖教旨趣允合有門故也佛法根本者下別釋第二意謂有門所說陰入界諸法乃是無明正因緣生者謂真如為因無明為緣無明為因境界為緣而有世間諸法生也不同外道邪無因緣生者以諸外道或計萬法從梵天虗空等生故又四教義下是證釋有門是佛法根本第三卷中問云兩門不度不可懸判空門明義勝于毗曇何故捨勝用劣答毗曇雖劣於空門是佛法根本故佛去世後流傳利物且大乘經論破小用小多取有門少用空門故須略出毗曇有門明賢聖之位次也備四教義取有門意兼得符順教旨邊解注又二初云三藏四門雖俱入道而諸經論多用有門乃至圓教多用非空非有門記此證依有門明三藏位也四教義云隨教立義必須逐便若是三藏四門雖俱得入道而諸經論多用有門通教四門雖俱得入道而諸經論多用空門別教四門雖俱得入道而諸經論多用亦空亦有門圓教四門雖俱得入道而諸經論多用非空非有門然雖具舉四教四門皆可入道而意別證藏教以有門明位次也備此正引證順教旨意注今不列七聖直作四果釋者名義顯故此明今文不作七聖列名或謂既以有門明位何故但列七賢不列七聖直作四果耶故此釋云以四果之名與義明顯故也記此是入假菩薩作四論申四門授四藥治諸病也今文為標三藏修行之與位次注中具出明位凡有四門故以圖示諸名相也然有七賢四果名相下文逐一詳解後二門論文未度此不必言矣然空門二十七賢聖名相似與論文少異今記之對閲為便謂成論二十七賢聖開果向為三謂信行法行無相行及初果為四五二果向六二果七三果向八三果於此果中又開十二謂中生行不行樂定樂慧轉世現信解見得身證并前七為學人十八開無學為九謂退護住思死不退慧解脫俱解脫不壞法也補空門學人十八至上流者四教義云通名學人以皆研真斷惑故也信行法行者初向也薩婆多云因聞入者為信行因思入者為法行曇無德云位在方便自見法少憑聞力多後時要須聞法得悟名為信行憑聞力少自見法多後時還須思惟得悟名為法行天台遠討根源久劫聽學久劫坐禪得為信法種子也信解二向也以憑聞法信力進趣真解故也見得三向也以思惟力見法得理故也身證三果四向也以現身即證滅受想定似涅槃法故云身證也家家者受生處不一即二向也一種子三向也以欲界九品思惑已斷八品只一品未盡而命終尚有一生故言一種子若不命終進斷一品即證三果也向初果者於十六心中前十五心無間道時斷見惑未盡是也得初果者八忍八智具足斷八十八使盡見真諦也向二果者欲界思惑已斷五品故得二果者斷六品思惑故向三果者斷七八品而不命終也得三果者欲界九品思斷盡故也中般者行人于欲界命終生到色界未到之時即於中陰身發明聖道而般涅槃生般者行人從欲界命終生於色界即般涅槃行般者生色界已更能加功用行斷上界思惑七十一品俱盡而般涅槃不行般者生色界已不加功用行自然得盡苦際聖道現前而般涅槃上流者即流行之義以次第上流色界諸天受生斷七十一品惑盡方般涅槃無學九至俱解脫者四教義云無學以真窮妄盡故也退者俱舍言謂遇少違緣便退所得思者謂退失恆自思得護者謂所得善自防護住者謂離勝退緣離勝加行進者謂具加行能速達不動不動者謂不為煩惱所動不退者謂不退失所得慧解脫者以緣空直入不得滅定故俱解脫者即帶事兼修得滅盡定也備有門明位見下今録空門明位備考備辨訛曰圖中初果下應添向字以信法二行只在十五心未到十六心故應是初果向也二三果上應添初字以信解見得真理方名初果等故私謂辨訛所說合於四教義妙玄等文然集注乃據俱舍謂見道中有二聖者一隨信行二隨法行此至修道別立二名一信解二見至定判至補中所言信解二向見得三向俟再考定注此依釋籤五十八列成論二十七賢聖若輔行準俱舍列則無身證故料揀云何緣身證不預其數答無漏三學是聖者因擇滅涅槃是聖者果滅定有漏不是依因是故身證不預其數記蓋釋籤明教途故準成論列位有身證名今文依之列二十七賢聖也若輔行明觀門故凖俱舍列位則無身證名如俱舍言契經說有十八有學何緣於中不說身證釋言依因無故何謂依因謂諸無漏三學及聖者果依彼差別立有學故滅定非學非學果故言三學者無漏戒即聲聞無作也無漏定即根本淨禪觀練熏修也無漏慧即四聖諦理也具此三學方堪趣入聖位乃是聖者之因也言涅槃者此理相應見思斷盡而證真空涅槃乃是聖者之果不依身證有漏為因也是故身證不預其數也補滅定有漏者此是小乘事定受想心滅雖似涅槃望四果猶為有漏既屬有漏則非前三果所依之因故不預學人數也然輔行如此揀者欲學人緣理斷結依無漏修不可從事禪入耳若以無漏心修事相定則無入而不自得非此論也又此身證那含非想思惑猶未斷盡正當入此滅盡定時前六識心心所悉不現起則不與無漏觀智相應而無斷惑證理之功故屬有漏非依因也擇滅解前又合響言滅定似涅槃法故非學所攝非真涅槃故非無學攝注中阿含三十一云長者問佛福田有幾佛答同俱舍且據學無學二十七人是同然福出經列身證俱舍則無也記福田經佛言世有二種福田學人有十八無學人有九十八學人謂信行法行信解見得身證家家一種子向須陀洹得須陀洹向斯陀含得斯陀含向阿那含得阿那含中般生般行般無行般上流色究竟九無學人謂思法升進法不動法退法不退法護法護則不退退則不護實住法慧解脫俱解脫是知經列身證也俱舍則無者論文言學人謂四向三果信行法行信解見得家家一間中生行不行上流也無學有九謂退護思住進不動不退慧脫俱脫是知論文不列身證備二十七是同者且據二十七數說其相同若身證有無則異也注凡者常也亦名為賢賢者善直亦曰鄰聖分內外者相似見理名內未得似解名外記四教義云此七位皆是非學非無學智等智似解能伏見惑因此似解能發苦忍真明故言鄰聖曰賢今解名善直也一切天魔凡夫皆以愛著心修一切外道皆以邪見心修虗僞邪曲不名為直佛弟子七種明識生滅四諦理知愛論見論皆邪曲伏此見愛邪曲心用正信直心修諸善法故名善直復此一切愛論所詮皆有生滅四真諦理天魔眷屬及諸凡夫所不能見故流轉生死又一切見論所詮皆有生滅四真諦理六師外道悉不能見故生死流轉如涅槃云我昔與汝等不見四真諦是故久流轉生死大苦海今七種從聞生解明識此二種生滅四諦故得信心正直即是善直名賢也又四義揀一隨愛見而破戒非直非善二持戒禪定而生邪見善而不直三信心直見而破戒心亂直而不善均不名賢四信解真正得佛教意持戒清淨修阿那般那不淨等觀心得停住乃名善直初賢之位內凡謂於四真諦理依稀見解如未然者名外凡也二釋所稟法二初凡二初明外凡二初分科釋外凡中自分三二列法二初調心對治法二初標數初五停心注停者止義住義修此五法止住五過心者有四種一草木二肉團三積聚精要四慮知今是慮知心也記草木能隨時生落亦名心肉團色法所攝積聚精要者如心經是般若部旨要戒本名為戒心是結戒要文荊溪十不二門亦文心之列慮知心外道多計之謂我佛教判為緣慮心教列八識今指第六識為今修行觀法心也注此五停心通於四教具如四念處明妙玄五三以五停心對圓五品禪門三五以停心名五門禪義該大小通於凡聖菩薩等修今是三藏聲聞助道也記藏教五停如下若通家停心者覺觀多者當觀入息不生出息不滅不生不滅息即是空無能觀所觀皆不可得不可得即真真即心停也多貪欲者當觀貪欲非垢無貪非淨非垢故不生非淨故不滅不生不滅即空空即真真故心停多嗔恚者當觀於慈慈恚即不生亦不滅如上著我多者當觀其身如屠牛四分但見四大六根五陰十二入十八界何處有我即破我見愚癡者對因緣觀三世破斷常二世破果報我一世破性實善用五治心即安住得觀無生也別停心者前三藏數息不淨等停心疏遠事僞通以觀息不生不滅停心即事而理近密真今別教以持戒根本若我住世無異此也即佛依此而住即僧雖爾望於三藏是密是真望於實相非近非密非真非理與前別後別居季孟之間此義可知能持五支諸戒釋論十種戒于一一戒中具足爾許法門即是別停心戒是法本道之根源故以戒為停心也圓以五停心對五品如下九卷圓教詳解禪門以停心名五門禪等者文曰五門雖少而行通諸禪一阿那波那門此通至根本及特勝通明等諸禪三昧二不淨觀門此通九想背捨超越諸禪三昧三慈心門此通四無量等諸禪三昧四因緣門此通至十二因緣四諦等慧行諸禪三昧五念佛門此通至九種禪及百八三昧復次初數息門是世間凡夫禪次不淨門是出世間禪聲聞所行次慈心門即是凡聖二人為大福德修慈入無量心次因緣門是支佛所行次念佛門功德廣大是衆菩薩所行此略明五門次第淺深相注貪等是境不淨是觀四教義二四云心既調停乃可習觀猶如密室之燈入道根本無過此五法也文記此不淨觀思惟於貪欲名善對治法於嗔恚病不名為善非對治法以觀身過失名不淨觀若嗔恚觀身過失者則增益嗔恚故餘境觀例知四教義云修安般念有三一始習行二已習行三思惟已度一數是始習二隨而已習三觀而已度復次數隨觀皆名始習得三種欲界未到地定名已習發諸初禪名已度餘不淨觀等亦如是分別心既調停乃可習觀如密室燈入道無過此五法也注或云五停心觀則從慧或云五門禪則從定定慧調適故名停心注然上列次㭊玄以不淨觀居初者約三不善根次第也第四明㭊界觀者約不善根後辨第五明數息者散亂是隨煩惱故於煩惱後辨記三不善即依貪嗔癡三根本煩惱故首不淨次慈悲三因緣又約三不善根辨著我故㭊界為第四而散亂既是隨煩惱故數息觀於根本惑後治之也注四教義等文皆以數息居初者順修禪人必先攝散入定故四教義二云今依禪門辨次第也以病先後隨人不須定執前後次第也記四教義問何不依數人說不淨觀為先答今依禪門辨次第也注又諸文專以不淨數息居初者妙樂六十引俱舍云入道要二門不淨觀數息記俱舍言入修要二門不淨觀息念貪尋增上者如次第應修長行釋曰正入修門要者有二一不淨觀二持息念隨於何門能正入修如次應知貪尋增者謂貪猛盛數現在前如是有情名貪行者彼觀不淨能正入修尋多亂心名尋行者彼依息念能正入修則知諸文或以不淨或以數息為初者隨病與藥也注㭊界與念佛互存沒者四教義二四問此處何不說念佛三昧為五種耶答開因緣出界方便代也界方便與小乘念佛相同亦破境界逼迫障以二世因緣與界方便皆破著我能破雖異所破是同故聞二世因緣以破著我却出界方便代念佛也且界方便何以能代念佛耶故下即釋出云以界方便能破之相與念佛所破境界之相是同以皆不出六界十八界故念佛破境界逼迫障界方便亦破也補此料揀析界與念佛二觀或用此則廢彼意今先明四教義以界方便摧著我析界者即分六界十八界相以顯無我也四教義答問言以二世因緣破著我出界方便破逼迫障以代念佛故不用念佛也是知析界可以摧著我可以摧逼迫如今文開分二世因緣摧著我用念佛摧逼迫故不須界方便可見界方便退能代二世因緣進能代念佛故四教義四念處存界方便而沒念佛妙玄止觀今文存念佛而沒界方便也又界方便與小乘念佛相同者以小乘念真空法身則寂然無為無六凡境界逼相可得析界則觀根塵識三畢竟無體無十八界我相可得故言相同也備二世摧著我念佛摧逼障下因緣念佛觀中廣解要知著我重者專開界方便治兼治逼障若逼障重而著我輕者專開念佛對治而以因緣中二世因緣摧著我則著我攝入因緣觀破此皆隨所宜也注又四念處一問此中何不云念佛停心答作五度門則不用作六度門則須用因緣自對等分性實斷常著我此三皆有故云等分念佛對逼迫障文記此明念處存界方便沒念佛意原注等分四教義云愚癡對因緣觀以一世破性實二世破果報我三世破斷常故言自對等分補此指愚癡為等分以性實斷常著我三皆愚癡故作六度用因緣者以病兼三種故云等分必須因緣也注止觀七十七云毗曇以界方便破我謂觀破六界十八界也如輔行七上記輔行云毗曇以界方便破我者我及斷常并性實三並屬癡故初破我者經論不同雜阿毗曇說著見行者以界方便愚夫不了宿業煩惱積聚五陰於緣計我當於自身以界方便觀察種種性種種業種種相謂地等六界地界水潤而不相離水界地持故不流散火界成熟故不淤壞風界動故而得增長空界空故食得出入有識界故有所造作由衆緣故故知無我又觀此身不淨充滿如吹散積沙於無色法前後相續如是觀者得空解脫門種子於彼生厭得無願解脫門種子正向涅槃得無相解脫門種子是名界方便若大經說著我多者為分㭊十八界法此與六界總別之異論四大界是十色界半論識界是七心界半但合色為四合心為一更加空界教門隨機離合不定今準禪經因緣破我大集亦以二世破我為簡異故故俱列釋注對治不同今圖示之記止觀六種治者一對治者謂一分煩惱即有三種合成十二對此亦有十二如對寇設陳名對治二轉治者如不淨是貪欲對治而非其宜應以淨觀得脫轉修慈心念以淨法安樂豈加穢辱名轉治若嗔人教不淨癡人教思惟邊無邊掉散教用智慧分別此是疾不轉而治轉皆名轉治若藥病俱轉亦稱轉治亦是對治三不轉治者病雖轉治終不轉但以此法宜修此治治轉不轉病稱不轉治四兼治者病兼藥亦兼如貪欲兼嗔不淨須帶慈心病兼一二藥亦兼一二是稱兼治五具治者具用上法共治一病是謂小乘先用五治後用諦智得入真大乘明治非對非兼等名第一義治如阿伽陀藥此翻著去著去一切衆病小乘多用三悉檀為治大乘多用第一義治四教義五治者問云此五觀門為對五人為對一人答橫對五人豎為一人隨病多少對不定也此五種觀法對治五不善法即有五意一對二轉三不轉四兼五亦對亦轉亦不轉亦兼一對治者覺觀多修數息貪欲多修不淨嗔恚多修慈心愚癡多修因緣觀著我多修界方便若行者覺觀等分煩惱偏重攀援不住當修數息隨觀息對治相應則三種覺觀煩惱止息心不動散發諸禪定定法持心入出安隱故名停心四念處云此五停門復有五意謂對轉不轉兼亦對亦轉亦不轉亦兼對者數息對覺觀乃至方便對我因緣對癡對治若成煩惱不起又發禪定禪定持心安隱出入也心既調停方可習觀若對治未益更須用後四種治之行者善用四隨巧修五治煩惱不能障觀心停住即入初賢位具如禪門廣說又二卷云善用五法治心心則安住得觀無生無生現前即破煩惱有直有善名初賢三種解見下二列法五初治貪觀法一多貪衆生不淨觀注六識妄心於順情境上引起無厭故言多貪禪門第四明三種貪一外貪男女身分互相貪著用九想觀治觀他身九想者一胮脹二青瘀三壞四血塗漫五膿爛六噉七散八白骨九燒記禪門明行人當修定時貪欲心生若男緣女若女緣男取其色貌姿容威儀言語即結使心生念念不住此是外貪淫結使發相用九想治者法界次第云一䏺脹想觀死人䏺脹如革囊盛風異於本相也二青瘀想觀死人皮肉黃赤瘀黑青黤也三壞想觀死人風吹日曬轉大裂壞在地也四血塗漫想觀死人處處膿血流溢汙穢塗漫也五膿爛想觀死尸蟲血流出皮肉壞爛滂沱在地也六噉想觀死尸蟲蛆唼食鳥啄其眼狐狗咀嚼虎狼抓裂也七散想觀死尸禽獸分裂身形破散筋斷骨離頭手交橫也八骨想觀死人皮肉已盡但白骨筋連或分散狼藉如貝如珂也九燒想觀死尸為火所焚𪹼烈煙臭薪盡形滅同於灰土假令不燒亦歸磨滅也又輔行言此九通治六欲若別治者死治威儀言語二欲脹壞噉三治形貌一欲血塗膿爛青瘀三治色一欲骨燒二治細滑一欲九想又復通治所著人欲散治人相欲能動九十八使山故所治最強也注二內外貪於他己身而起貪愛用八背捨治先觀內身骨鎖故能治內記禪門云行人於修定時欲心發動或緣外男女身相色貌姿態儀容起於貪著或復自緣己身形貌摩頭拭頸念念染著起於貪愛障諸禪定此內外貪欲發相用八背捨治者法界次第言一內有色相外觀色謂內有色相者不壞滅內色相也外觀色者不壞滅外色相也以是不淨心觀外色所以然者行人為修流光故不應初背捨中壞滅內身骨人欲界結使難斷故須以不淨心觀外色也此初背捨位在初禪能捨自他及下地故名背捨二內無色相外觀色謂內無色相者壞滅內色相也外觀色者不壞滅外色相也以是不淨心觀外色所以然者行人為入二禪內淨故壞滅內骨人欲界結使難斷故猶觀外不淨之相也三淨背捨身作證謂淨者緣淨故名淨行者除外不淨相但於定中練八色光明清淨皎潔如妙寶色名緣淨身作證者以無受著心而受三禪中遍身樂也四虗空處背捨謂若滅根本四禪及三背捨四勝處入一切處中色一心緣無邊虗空而入定即觀此定依陰入界故有無常苦空無我虗誑不實心生厭背而不受著深入不退五識處背捨若捨虗空一心緣識入定時即觀此定依陰入界故有無常苦空無我虗誑不實心生厭背而不受著深入不回六無所有處背捨若捨識一心緣無所有入定時即觀此定依陰入界故有無常苦空無我虗誑不實心生厭背而不受著深入不回七非有想非無想背捨若捨無所有處一心緣非有想非無想入定時即觀此定依陰入界故有無常苦空無我虗誑不實心生厭背而不受著深入不回也八滅受想背捨背受滅想諸心心數法是為滅受想背捨所以者何諸佛弟子厭患散亂心欲入定休息以涅槃法安著心中故言身證而受想滅也補大論言背是淨潔五欲捨是著心故名背捨注三遍一切處貪資生五塵等物用大不淨觀治即八勝處因於自身骨人觀成漸見十方依正故能治自他貪欲記禪門言此人愛著內外如前復於一切五塵境界資生物等皆起貪愛或貪田園屋宅衣服飲食即一切處貪發相用大不淨觀治者如大論治貪欲飲食云觀是食從不淨因緣生如肉從精血水道生是謂膿蟲住處如酥乳酪血變所成與爛膿無異厨人垢汗種種不淨若著口中腦有爛涎涎道流下與唾和合然後成味其狀如吐從腹門入地持水爛風動火煮如釜熟縻滓濁下沉濁者為屎清者為尿腰有三孔風吹膩汁散入百脈與先血和合凝變為肉從新肉生脂骨髓從是中生身根從新舊肉合生五情根從此五根生五識五識次第生意識分別取相籌量好醜然後生我我所心生等諸煩惱及諸罪業觀食如是本末因緣種種不淨知內四大與外四大無異但以我見故強為我有復次思惟此食墾植耘除收穫蹂治舂磨淘汰炊煮乃成用工甚重計一鉢之飯作夫流汗集合量之食少汗多此食作之功重辛苦如是入口食之即成不淨無所一值宿昔之間變為屎尿本是美味人之所嗜變成不淨惡不欲見行者自思如此弊食我若貪者當墮地獄噉燒鐵丸從地獄出當作畜生牛羊駱駝償其宿債或作豬狗常噉糞除如是觀食則生厭想故於五欲皆厭八勝處者法界云一內有色相外觀色少若好若醜是名勝知勝見謂內有色相外觀色少者緣少故名少若觀道未增故須觀少因緣觀多畏難攝轉變不得隨心如觀少好醜法中不淨轉變自在通達無礙心無取捨不起愛憎是也二內有色相外觀色多若好若醜是名勝知勝見謂內有色相外觀色多者觀多因緣故名多觀心既調則觀多無妨若於多好醜不淨境中轉變自在通達無礙心無取捨不起愛憎是也三內無色相外觀色少若好若醜是名勝知勝見謂內無色相如二背捨外觀色少若好若醜等皆如初勝處也四內無色相外觀色多若好若醜是名勝知勝見謂內無色相如二背捨外觀色多若好若醜等皆如二勝處也五青勝處謂若觀青色乃至照耀勝於背捨所見青相亦不起法愛是轉變自在少能多多能少光色名青勝處也六黃勝處七赤勝處八白勝處均類如青勝處中分別今用四色為勝處依大論也若瓔珞經中則以四大為四勝處也因於自身等者大論言譬如幻主觀所幻物知從己出心不生著能不隨所緣是時背捨變名勝處於淨觀雖勝未能廣大是時行者還取淨相用背捨之力及勝處之力故取淨地相漸漸遍滿十方虗空水火風亦爾取青相漸令廣大亦遍十方虗空黃亦白亦如是是時勝處復變為一切處是三事一義轉變有三名也補名勝處者以想心純熟轉變自在如人乘馬能破前陳亦能制馬名勝也漸見依正者見依正皆不淨也法數廣明注㭊玄上八明四種一顯色謂青黃等作青瘀想二形色長短等形作壞爛想三妙觸自他身分細軟光澤作蟲蛆想四供奉祇承適意用死想治也此四望大論六種缺人相音聲姿態等記大論言是九想能除人七種染著或有人染著色若赤若白若赤白若黃黑或但染著形容細膚纖指修目高眉或但染著威儀進止坐起行住禮拜俯仰揚眉頓𥇒親近按摩或但染著語言軟聲美辭應意承旨或但著細滑柔膚軟肌熱時身涼寒時體溫或有人皆著五事或有人都不著五事但著人相如止觀言六欲一色欲二形貌三威儀姿態四言語音聲五細滑六人相言人相者癡人但染著人相若男若女雖見上五事不得所著之人猶無所解若遇之則能捨世所重頓忘身命而隨其死今引析玄四種望之所缺人相音聲姿態對之可見注此不淨觀與念處觀身有異一正助不同彼正此加二自他境別彼觀自身此想他境三假實觀異彼是實境此是假想備辨訛曰自他境別句當知九想內外俱觀似不應言此想彼境彼觀內身外身內外身似不應言彼觀自身私謂彼五種此九想等彼統觀一期生死此專作死想觀也二治嗔觀法二多嗔衆生慈悲觀注於違情境上忿恨不已名曰多嗔佛令修慈悲觀可以對治記慈能與樂悲能拔苦尚欲與樂拔苦豈令墮苦受惱注若準禪門第四二義通大乘境觀有三一非理嗔歘起嗔心不問何否修衆生緣慈一切衆生如己眷屬記禪門明非理瞋發者行人若修定時嗔覺歘起無問是非他犯不犯無事而嗔是為違理邪嗔發相修衆生緣慈者觀一切衆生如父母親想智論明生緣慈者十方五道衆生以一慈心視之如父母兄弟子姪知識常求好事欲令利益安樂如是慈名衆生緣多在凡夫行或學人未漏盡者注二順理嗔人實來惱我修法緣慈見一切法皆從緣生記禪門明順理嗔發者行人若修定時外人實來惱觸而生嗔覺相續不息亦如持戒之人見非法者而生嗔恚故摩訶衍說清淨佛土中雖無邪三毒而有正三毒也法緣慈者大經明見一切法皆從緣生智論明諸漏盡阿羅漢辟支佛破吾我相滅一異相故但觀從因緣相續生諸欲心慈念衆生時從和合因緣相續生但空五衆即是衆生念是五衆以慈念衆生不知五陰是法空而常一心欲得樂聖人憫之令隨意得樂為世俗法故名法緣慈也注三諍論嗔著己所解為是謂他說行為非修無緣慈能所一體慈即無緣記禪門明諍論嗔發者行人若於修禪時著己所解之法為是謂他所行所說為非既不順己即生惱心世自有人雖財帛相侵猶能安忍少諍義理即大嗔恨名諍論嗔發相無緣慈者大經明不住法相及衆生相智論明是慈但諸佛有何以故諸佛不住有為無為性中不依止三世知諸緣不實顛倒虗誑故心無所緣佛以衆生不知諸法實相往來五道心著諸法分別取捨以是諸法實相令衆生得之故名無緣慈也注今是小乘助觀當彼第一衆生緣慈若法界次第則具明慈悲喜捨四無量心今但慈悲記法界言此四通名無量者從境得名以所緣衆生無量故能緣之心亦無量故悉受無量心名慈悲已解見前喜者慶他得樂生欲喜心名喜捨者若緣於他無憎愛心如證涅槃名捨廣解如法界次第注㭊玄準俱舍論七周行慈輔行九下五依婆沙明九周行慈而皆不出七境三樂謂上親父母師長中親兄弟姊妹下親朋友知識中人非冤非親下冤害下親者中冤害中親者上冤害上親者三樂者㭊玄上十一謂諸佛上菩薩中諸天下輔行引婆沙云三禪上四事中經行處下記七九二周行慈如上示此所判七境大經疏境有九品冤親中人各有三品或謂中人唯一但七耳中人於我無冤親不須開三然中人不無愚智貴賤之殊故可分三成九境即有九慈次修觀內云若全未修但欲與三親三樂三冤三苦三種中人不與苦樂若初修慈於三親中與三品樂於三中人與三品樂於三冤人上冤與下樂中冤與中樂下冤與上樂第二修時上冤與中樂中下兩冤與上樂第三修時三冤並與上樂未是親中三種之樂第四修時以中人下樂並與三冤第五修時以中人中樂並與三冤第六修時以中人上樂並與三冤第七修時以三親下樂並與三冤第八修時以三親中樂並與三冤第九修時以三親上樂並與三冤是名上冤與增上樂爾時名慈心成就又直取三品樂與九種境初觀時三親與二樂第二時中親與上樂下親與中樂第三時下親與上樂第四時下中人與下樂第五時下中人與中樂第六時下中人與上樂第七時上冤與下樂第八時上冤與中樂第九時上冤與上樂是名慈心成就今欲知其與此有別故具記之注輔行九五引婆沙云問與衆生何處樂答有說與三禪樂樂中勝故有說與四事樂已曾得故有說與經行處所有樂至至住處思惟令得文記婆沙言或有說者與第三禪樂以三禪樂是一切生死中最勝樂故若作是說不起第三禪者則不能起無量復有說者過去世曾得第三禪樂以第三禪定念前世智觀彼樂已以彼樂令衆生樂若作是說若不得第三禪地念前世智則不能起無量復有說者以近所更樂如飲食樂乘樂衣裳樂臥具樂以如是等樂相令樂尊者和順密說曰衆生有樂者以如是相令衆生樂若作是說慈則不能緣一切衆生所以者何一切衆生不必有樂復次衆生有樂根以如是相令衆生樂若作是說慈則不能緣一切衆生所以者何一切衆生不能於一切時起樂根現在前故復次衆生有飲食樂乘樂衣裳樂臥具樂以如是樂相令衆生樂若作是說慈則不能緣一切衆生所以者何一切衆生不必盡得如是樂故尊者佛陀提婆曰以所知見樂取如是相以憐愍心令衆生樂如本方便時若依村住若依城住以日前分乞食見受樂諸人或乘象馬車與而行或以種種瓔珞嚴身或見純受若者如無衣裳飲食執破瓦器從他家乞取如是苦樂相速還住處洗足結跏趺坐令身心柔軟無障礙觀先所取相衆生樂者常令得樂衆生苦者令得先所見樂則知輔行略取其三種也注若㭊玄三樂恐成過分隨機之說貴在治障不可概論記蓋諸佛樂乃無上菩提覺法樂無上涅槃寂靜樂未得旨者恐成過分尊者和須密曰不以住慈故令衆生樂但以此法作方便能制恚斷結又尊者佛陀提婆曰此觀當言不顛倒所以者何與恚相妨則知行慈貴在治障不可概以與樂為論備俱舍亦有願與諸佛等樂之說以此作方便耳記㭊玄七周者俱舍論云云何修慈謂先思惟自所受樂或聞說佛菩薩聲聞獨覺等所受快樂便作是念願諸有情一切等受如是快樂若彼本來煩惱增盛不能如是平等運心應於有情分為三品所謂親友處中冤仇親復分三謂上中下中品唯一冤亦分三謂下中上總成七品分別品已先於上親發起真誠與樂勝解此願成已於中下親亦漸次修如是勝解於親三品得平等已次於中品并下中上冤亦漸次修如是勝解由數習力故能於上冤起與樂願與上親等修勝解脫既得無退次於所緣漸修令廣謂漸運想思惟一邑一國一方一切界與樂行相無不遍滿是謂修習慈無量成也補輔行九周者謂初修時令上親人得於下樂次修令上親得於中樂中親得於下樂次修令上親得於上樂中親得於中樂下親得於下樂次修令中親得於上樂下親得於中樂中人得於下樂次修令下親有於上樂中人有於中樂下冤有於下樂次修令中人有於上樂下冤有於中樂中冤有於下樂次修令下冤有於上樂中冤有於中樂上冤有於下樂次修令中冤得於上樂上冤得於中樂次修令上冤得於上樂是名輔行九周行人修慈心觀成就之相也注先親後冤者從易至難順心成觀備蓋以樂與其親則其觀易成若以樂與其冤則其觀難就此人情之常事也故今以親在於前觀而先與其樂以冤在乎後觀而後與其樂是謂順衆人之心而成其所觀之慈也注若㭊玄第六觀方與上親下樂第七上親中樂中親下樂者一者次第修觀未暇與故二者順七周次第每一番用觀先與上樂中下非要故在後時與雖前後境境皆三使冤親平等以破嗔障記此別明㭊玄第六觀所與境樂謂有二意一者謂據次第修觀則應初觀中當以上樂與上親中樂與中親下樂與下親乃至第七觀中以上樂與上冤中樂與上親下樂與中親如前圖說是故據次第修觀當在六七周中與上親中親境下樂中下樂也二者謂順七周次第皆以上樂與人則初周應以上樂與上親二周以上樂與中親三周以上樂與下親乃至七周以上樂與上冤亦如前圖說是則中下二樂非要故於六七周中以下樂中下樂與上親中親境也然與樂雖有前後而七境皆得三樂且如上親於初一周得上樂至第六周得下樂第七周得中樂乃至上冤於第五周得下樂第六周得中樂第七周得上樂上品親冤皆得三樂中下冤親及其中人皆得有此三樂也如此行慈能使冤親平等以破嗔障也注輔行開為九周者一順從親至冤次第與樂不待六七却緣前親記此別明輔行九周行慈謂順從親至冤次第與樂則初周與上親下樂二周與上親中樂三周與上親上樂乃至第七與上冤下樂第八與上冤中樂第九與上冤上樂是則一二三周即與上親三品樂矣豈待六七周却緣前之上中親境方與下樂中下樂乎是以輔行依婆沙開為九周也注又復前境為得不得蓋為破障且爾運心其實前人實未得樂故析玄上云問自身有樂可施於他忽若自身無樂將何施與答自身若無樂可施即運心將餘諸天菩薩等樂而惠施之願彼冤親平等衆生得受如是等樂故又涅槃疏云雖欲拔苦實未拔苦皆是虗言雖欲與樂實未得樂此是假說備辨訛曰又涅槃乃至此是假說一節似不須引當知此中正意在運慈悲平等之心功力不可思議彼釋乃反顯之文意謂二乘雖修慈悲亦只是自己離苦得樂不能利他故曰此是假說及虗言等正顯菩薩方能利他也私謂此恐後人不知便謂慈悲虗設故明之注又行者用觀當念冤讎如過去父母等方能冤親平等與樂廣如析玄上云云三治散觀法三多散衆生數息觀注攀緣思慮與定相違故名多散息有四相止觀八十七云有聲曰風守之則散結滯曰氣守之則結出入不盡曰喘守之則勞不聲不滯出入俱盡曰息守之則定文數者從一至十不多不少令心不散禪門第五二有四師第一師數出息不急不脹身則輕利易入三昧二師數入息隨息內斂三師出入無在但取所便而數補心浮繫心丹田數入息昏沉繫心鼻端數出息注四師依四時用數補春夏發生數出息秋冬收斂數入息注今家正依第三師又不許出入俱數恐生病故記禪門有四師明數息一師教繫心數出息則氣不急身不脹滿身心輕利易入三昧有師教數入息有五意一易入定隨息內斂故二斷外境故三易見內三十六不淨物故四身力輕盛故五內實息貪恚故有如是勝利應數入息有師教數入出無在但取便而數無得偏用隨人心安入定無過即用三師所論皆不許出入一時俱數何以故以有息遮病生在喉中猶如草葉吐則不出咽則不入此患生故又有師依四時用數今所未詳今依第三師法也注梵語阿那波那此云遣來遣去入息出息即是三世諸佛入道初門通於三乘四教記翻譯名義云阿那亦曰安那此云遣來入息也般那曰遣去出息也安般守意經言安為身般為息安為生般為滅安為念道般為解結所以先數入者外有七惡內有三惡用少不能勝靈先數入也入道初門者提婆云佛說甘露門名阿那波那於諸法門中第一安隱道也注又用息明六妙門謂數隨止觀還淨攝心在息從一至十名之為數細心依息知入知出故名為隨息心靜慮名之為止分別推析名之為觀轉心返照名之為還心無所依妄波不起名之為淨如法界次第上今是小乘助道但名數息記法界言六法次第相通能至真妙泥洹故言妙門一家所明有十種六妙門今但略出次第相生一科六門以為次者此六門既是亦有漏亦無漏禪於餘亦有漏亦無漏禪中淺而且局故以為次也一數息門攝心在數從一至十名數修無漏真法先須調心入定欲界粗散難攝非數不治故須善調身息從一至十則粗亂靜息心神淨住為入定之要故數為門二隨息門細心依息知入知出曰隨雖因數息心住禪定未發若猶存數則心有起念之失故放數修隨心依於息入時知入出時知出長短冷暖悉知之若心安明淨則諸禪自發故隨為門三止門息心靜慮曰止雖因隨息心安明淨而定猶未發若心隨則微有起想之亂澄淳安隱莫若於止故捨隨修止多用凝心止也凝心寂慮心無波動則諸禪定自然開發故止為門四觀門分別推析曰觀雖因止證諸禪定解慧未發若住定則有無明味著之乖須推尋檢析證諸禪定多用實觀四念處也觀心分明則知五陰虗誑破四顛倒及我等十六知見顛倒既無無漏方便因此開發故觀為門五還門轉心返照曰還雖修觀照而真明未發若計有我能觀析破於顛倒則計我之惑還附觀生同於外道故曰外道計著觀空觀智慧不得解脫若覺此患即當轉照能觀之心若知能觀心虗誑無實即附觀執我之倒自亡因是無漏方便自然而朗故還為門六淨門心無所依妄波不起曰淨修還之時雖破觀倒若真明未發而住無能所即是受念故令心智穢濁覺知此已不住不著泯然清淨因此真明開發即斷三界結使證三乘道故言其清淨得一心者則萬邪滅矣以淨為門意在此也備辨訛曰今是小乘助道二句似局當知六妙前三是定方便後三是慧方便修至第三得定已即觀四念處後三亦可屬四念處攝既屬定慧不可但言助道數息也私謂此中乃停心方便專以數息判助道亦可
