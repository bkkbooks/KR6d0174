body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二化法四教分二初總標自下明化法四教注妙玄十草八云問四教名義出何經答長阿含行品佛在負彌城北尸舍婆林説四大教者從佛聞從和合衆聞從多比丘聞從一比丘聞是名四大教文釋籤三十一云但同有四非即藏等亦一往語耳然教定體與今不同文妙玄十草九云月燈三昧經第六明四種修多羅謂諸行訶責煩惱清淨私釋會之諸行是因緣生法即三藏義也訶責是體知過罪即通教義也煩惱者若無煩惱即無智慧即別教義也清淨者既舉一淨當名任運有常樂我等即圓教也然則四教在小乘中有名無義在大乘中有義無名是故今家影傍經論立此藏通別圓則名義備矣記此釋自下化法四教妙玄問中總問四教名義出自何經若名若義應有所憑不然則出臆見耶故先總問答中舉長阿含示四教之名者謂從四聖人邊聞即佛菩薩聲聞緣覺四聖邊聞故名四大教也釋籤下揀名同體異可解次妙玄舉月燈示四教之義者月燈三昧經云復有四種修多羅一諸行修多羅不可思議二訶責有為修多羅不可思議三煩惱修多羅不可思議四清淨修多羅不可思議私釋會者補章安言以己意解釋月燈四名會對今家四教故曰釋會諸行是因緣者謂諸行乃二十五有也即一念無明心為因善惡業行為緣因緣和合所生六道正因緣法此即藏意者記以藏詮生滅明正因緣生法也既諸行是因緣生法則緣聚有生緣散有滅故是三藏義也通教體法即空謂訶責補是體知過罪者過罪即苦集二諦集為能報因是過苦為所感果是罪既是體達自他過罪當體無生如幻如化是通義也別教乃是無量觀慧以破無量見思煩惱有一切智破無量塵沙煩惱有道種智破無量無明煩惱有一切種智故無煩惱即無智慧是別義也記圓教四德性備三身體圓舉一即三言三即一如舉一常德必具樂我淨三蓋法身必具般若解脫故也光明記曰法身配常我解脫配樂般若配淨又涅槃疏云法身配常樂般若配我解脫配淨又涅槃四法身配常般若配樂解脫配淨我而經舉一清淨任運具常樂我等是圓義也是故下正明天台四教之所由立名義俱備如四教義引證有總有別別證四教者如引我心論云應學修多羅毗尼阿毗曇是佛世時三藏之教故成論云我今正欲論三藏中實義是也證通者淨名為迦旃延解説五義二百比丘心得解脫大品經三慧品明薩婆若智三乘同得中論諸法實相三人共入是也證別者淨名明以無所受而受諸受乃至未具佛法亦不滅受而取證也無量義經明佛説般若華嚴海空菩薩歷劫修行即是別文涅槃明五行正別教意智論云結使有二種一者共二乘斷二者不共二乘斷不共斷者不共般若斷於別惑是也證圓者華嚴云為説圓滿修多羅淨名云諸佛解脫當於衆生心行中求大品云欲以一切種智知一切法當學般若法華多寶嘆言釋迦如來乃以平等大慧為大衆説涅槃云復有一行是如來行所謂大乘大般涅槃智論云三智一心中得如是尋經討論四教義文處處有之是為別證四教也總證者今家影傍經論立四教名義如涅槃明四不可説有因緣故亦可得説四種之説以化前緣是也又四種轉四諦法輪亦是四教意也又法華明三草二木稟澤不同譬方便説即三教也一地所生一雨所潤譬説最實事即圓教也又中論因緣所生法一偈通佛四説如是等四説隨機化物即四教之異名也備釋籤云但同有四非即藏等者但同是四教名非藏等義故曰一往語耳定體與今不同者以阿含但真為體故非引用正意今家影傍經論句出四教義即指總別二證文辨訛曰今人謂今家立四教名是傍影阿含月燈二經而立此但見文中所引不見文中所判耳今家立名是依大經四種四諦生生等四句法華三草二木等文及中論因緣所生法等偈以立耳如此則名義俱備矣又妙玄復引地論云一念心具四家釋謂諦家般若家捨煩惱家苦清淨家私釋云約苦諦為初門修道品令苦清淨即藏意捨煩惱家者無相體達為捨如色是空以空捨無相而論道品即通意般若家者般若智照諸法明了恆沙法門皆悉通達而修道品即別義諦家者諦即實相理即圓教約實相修道品也記中以阿含四大教分貼佛菩薩聲緣説存以備考或以梵語畢勒支底迦此云各各獨行故以貼一比丘名二別列四初藏教三初列三藏名三初標列第一三藏教者一修多羅藏四阿含等經二阿毗曇藏俱舍婆沙等論三毗尼藏五部律注四教義一初云此教明因緣生滅四聖諦理正教小乘傍教菩薩文記此明三藏詮被三藏以析法觀觀因緣生法皆由惑業所招終歸磨滅於是修道證取寂滅此理為教所詮正教二乘斷惑證理傍教菩薩留惑度生也四教義問佛於三藏初開三乘大乘最勝何不以大乘為正小乘為傍耶答鹿苑初轉法輪拘鄰五人見諦成道八萬諸天得法眼淨但有小乘得道未有大乘故以小乘為正也又大論云佛於阿含中雖為彌勒受記亦不説種種菩薩行故以大乘為傍也備辨訛曰三藏皆佛自説俱舍婆沙後人所造五部律後人所分似不應引然出八教大意以後人所造不離佛説故舉此以略為準的也注修多羅此云法本出世善法言教之本也又翻契經契理契機也契理合於二諦契機符彼三根觀經疏初云經者訓法訓常文凡聖之所軌則曰法魔外不能改壞曰常此釋訓經者由也經由聖人金口故言經也此釋義記法本者據玄文世界悉檀説為教本為人對治二悉檀為行本第一義悉檀為義本教本者金口所説一言為本派出無量言教若人不解菩薩則以佛教為本造論通經令人得道也行本者示人無諍法如教起行修行入清涼池也義本者一句詮無量義無量句詮一義也今雖曰言教之本其實亦含行義二本以行義不離言教故也又教本即聞慧行本即修慧義本即思慧故三種為法門之本也今依四教義曰修多羅翻法本謂出世善法言教之本也又翻契經者謂修多羅共有五譯一翻經二翻論三翻法本四翻線五翻善語教智者定曰且據一名以為正翻此方儒道之書皆稱為經遂借彼席經以目聖教則雙含二義俱順兩方借義助名更加契字謂契機契理也托華曰契理合於二諦契機符彼三根二諦實俗偏真也觀經疏下釋法常二義如妙玄曰天魔外道不能改壞名教常真正不雜無能逾過名行常湛然不動決無異趣名理常又訓法者法可軌行可軌理可執也經由下正釋經義教中明有三由謂教由行由理由教由者一切經論疏記皆由聖人金口故也行由者一切契理行相似行信行法行等亦由金口故也理由者一切世間出世間義等亦由金口故也今是教由淨名玄云悉檀致教由如來心口故言經也注阿含如前阿毗曇翻無比法聖人智慧分別法義不可比故記阿含如初卷別列五時中解無比法者分別功德論曰八智十慧無漏正見越三界礙無與等也注俱舍翻藏即包含攝持之義婆沙翻廣説亦名五百説記俱舍論云由彼對法論中勝義入此攝故此得藏名或此依彼從彼引生是彼所藏亦名為藏包含攝持者攝論云何名為藏由能攝故謂攝一切所應知義無令分散也翻譯名義云毗婆沙此云廣解總有三義謂廣説勝説異説也毗尼此翻為滅佛説作無作戒能滅身口之惡故即八十誦律也文南山云毗尼翻滅從功能為名非正譯也正翻為律律法也從教為名斷割輕重開遮持犯非法不定文記毗尼翻滅者如母論云滅諸惡法名毗尼華嚴玄曰滅有三義一滅業非即斷殺盜淫妄乃以不犯為毗尼及滅諍為毗尼也二滅煩惱謂煩惱是發業之本今為調伏貪等令盡故世尊制增戒學也三得滅果即無為果戒經云戒淨有智慧便得第一道即持戒之因果也今明持戒力用為滅者謂作戒即戒相無作戒即戒體如三業恭謹翹勤禮拜發言求乞依戒精持故名曰作戒體若發任運滅惡行善然所發善業惟天眼能見不同戒相之有作故曰無作能滅身口七支之惡即戒之力用也優波離尊者一夏八十度升座誦出故曰八十誦律南山指道宣律師翻律者刊定記曰若敵對翻正稱為律爾雅言律法也故律有二意一者詮量輕重二者遮制南山言斷割重輕即詮量輕重義開遮持犯即遮制義補斷即處斷割即分割乃剖決義如前人犯律師審其犯緣前為剖決重輕犯不犯等重輕者五篇戒中前二篇重後三為輕開遮者五篇戒中唯一制者多分屬遮有二制三制多制者乃如來善應物機隨宜不定性罪但遮無開或原情故開如路行踏殺生草等無損害心故不犯或遇難故開如命難梵行難等或是作法故開如長衣説淨得畜結淨地開內煮內宿等但作法開處多原情開處少也持犯者有作止不同五篇戒相多屬止則止持作犯一百羯磨多屬作則作持止犯毗尼一法如世典型故云非法不定備五篇即僧殘突吉羅等二制者即一制後復再制也注五部律如來滅後上座大迦葉等五百聖人於畢鉢羅窟內命優婆離結集名上座部大衆婆尸迦等一千凡聖窟外結集名大衆部此二通稱僧祇即根本也迦葉阿難末田地商那和修優波毱多五師體權通道故不分教後毱多有五弟子各執一見遂分律藏為五部焉記準禪書佛以正法眼藏付迦葉迦葉付阿難阿難付商那和修而為末田底迦言昔佛記曰佛滅後五百年中汝於罽賓國敷宣大法則末田地商那和修應皆是阿難弟子也商那和修付優波毱多毱多已前傳法者皆具禪法律三藏自後律教別行橫分五部傳法者唯傳禪門及經論則知迦葉等五師但體權行道而不分律也妙樂云佛滅度後一百年間諸祖持法所化衆生不相是非但為一部大毗尼藏即八十誦一百年後毱多有五弟子各執一見不融遂分律藏為五如析金杖不失金用也然五部之分佛在世時羅雲洗鉢失手㩧為五片佛言表我滅後初五百年諸惡比丘分毗尼藏為五部也㩧音朴擊也備辨訛曰命優波離命字應改推字此二通稱僧祇乃後人和融之語因如來經中偏美僧祇故又曰既分上座大衆二部則不可云不分教矣私謂此二通稱分而猶合也若五部則不可合矣記疏云五部律佛滅後百餘年育王設會上座他羅立義摩訶僧祇大衆不同分為二部後上座更生二部謂雪山薩婆多雪山絶後薩婆多更集僧祇生三部謂彌沙塞曇無德迦葉遺就薩婆多僧祇為五部昔如來預見互相是非大集經亦預指五部宗輪論則廣明分部以為二十也翻譯名義曰曇無德亦名曇摩毱多翻法密隱覆即密義又翻法藏大集曰我涅槃後諸弟子等受持如來十二部經書寫讀誦顛倒宣説以倒説故隱覆法藏人名曇摩毱多法名四分薩婆多翻一切有計三世有實三性悉得受戒大集曰而復讀誦書寫外典受有三世及以內外破壞外道善能論議説一切性悉得受戒凡所問難悉能答對人名薩婆多法名十誦迦葉遺翻重空觀大集云説無有我及以受者轉諸煩惱猶如死尸人名迦葉遺法名解脫此有戒本相同五分彌沙塞翻不著有無觀大集云不作地水火風有相空虗識無相人名彌沙塞法名五分婆粗富羅翻犢子古仙染犢生子故自後種性皆名犢子此部計我非是即蘊亦不離蘊而有實我律本不來大集云皆説有我不説空相猶如小兒摩訶僧祗此翻大衆大集云廣博遍覽五部經書名摩訶僧祗此有律本首疏云總別六部僧祇是總前五是別此僧祇部衆行解虗通不生偏執遍順五見以通行故故知是總遺教三昧經云佛在世時衆僧唯著死人雜衣因羅雲分衛空還佛知其宿因使衆僧分律為五部服色亦五種令其各隨一部中行遂制儀則各舉所長名其服色曇無屈多迦部通達理味開導利益表法殊勝著赤色衣非南方正赤薩婆多部博達聰敏導以法化應著皂衣非北方正黑迦葉遺部精勤猛勇快攝衆生著木蘭色衣彌沙塞部思入玄微究暢幽密著青色衣非東方正青摩訶僧祇部勤學衆經宣講真義以處本居中著黃色衣非中央正色爾後便得大食斯以五色壞衣彰五部相已上示三藏能詮也補四分一比丘法二比丘尼法三受戒法四滅諍法五分者四分同上更加僧法一分法數云轉煩惱如死尸者謂轉棄妄惑如死尸也記圖示三藏所詮也若尅性論詮則經詮三學律兼戒定論唯慧學今據正詮四教義云阿含定藏多明修行法也毗尼戒藏正明因事制戒防止身口惡法也阿毗曇慧藏分別無漏慧法不可比也此三的屬小乘故法華云貪著小乘三藏學者問如次對當義理可然而名乖詮次答説時非行時起教之次阿含為先修行之初木叉為首又云八正道以正見正思惟為先正語等六皆名正如人行法眼前瞻路後發足也南山云身口所發事在戒防三毒勃興要由心使故今先以戒捉次以定縛後以慧殺理次然乎通言學者所以疏神達思怡情治性聖人之上務學猶飾也器不飾則無以為美觀人不學則無以有懿德乃至云修學三法之用得證五分之果補婆娑云修多羅亦分別戒慧毗尼亦分別心慧毗曇亦分別心戒從多分説也注四教義云然此三法通名藏者以皆各含一切文理也記此釋三法名藏然是略引文耳今具記之四教義云三法通名藏者以含藏為義但解者不同耳有言文能含理名藏有言理能含文名藏今曰三法之名各是一句三名各含一切文理名藏也注又經通五人説妙樂一二十五云佛及聲聞天仙化人下四印定即名佛説文記此示經通五人説如觀經疏云題稱佛説簡異四人弟子諸仙諸天化人説也鈔云若四人説如來印之亦得稱經言印有二若小乘經以三法印印之若大乘經以實相印印之源洪師言三法空無相無作也注律唯佛制降佛已還不許措辭如禮樂征伐自天子出記律藏勝故唯佛自説禮樂等者此言孟豫述孔子論天下之勢以明先王之制諸侯不得變禮樂專征伐也子思曰非天子不議禮不制度不考文則須具聖人之德據天子之位方可作禮樂以況降佛已還不得制律也注論通佛世滅後文句九三引出矅經云佛在波羅奈最初為五人説契經修多羅藏佛在羅閲祇最初為那須提説毗尼藏佛在毗舍離獼猴池最初為跋耆子説阿毗曇藏文妙樂九十一云故知別有阿毗曇藏是佛自説五百羅漢結集名相續解脫經後廣集法相乃名為論文記經云佛在波羅奈告五比丘此苦原本本所未聞本所未見廣説此法為契經藏佛在羅閲祇時迦蘭陀子名須陳那最初犯律故説戒藏佛在毗舍離見跋耆子本末因緣告諸比丘諸無五畏恚恨之心者便不墮惡趣亦復不入地獄中廣説如阿毗曇妙樂下證成又文句云相續解脫經者是佛自説故且名經當佛滅後阿難所結集者名修多羅又云五百集者初名解脫後廣集法相乃名為論注今此三藏皆是佛説若云佛説名經弟子所作名論一往語耳此結今釋餘初句結今三藏是佛所説次一行釋餘所判謂一往言之如止觀一上十八有造論緣起須者往檢佛説名經弟子所作名論再往言之佛及弟子俱説經俱説論也二揀取此之三藏名通大小今小乘三藏也注通論小衍俱有三藏今則別指小乘不可以通難別故下即引經論以證別意備辨訛曰儀文內於婆沙中婆沙二字當曰毗曇以迦旃延子所造舊譯名八揵度論新譯名發智阿毗曇論婆沙乃五百羅漢所造以解發智論者也不讀衍經非大菩薩是大論責語以小乘無十八不共法而迦旃延用十力四無所畏大悲三念處為十八不共所以被責大論意謂小乘雖無然不妨用大乘名而釋如三十二相八十種好小乘不妨以大乘名相而解十八不共例然三引證大智度論云迦旃延子自以聰明利根於婆沙中明三藏義不讀衍經非大菩薩又法華云貪著小乘三藏學者依此等文故大師稱小乘為三藏教注大智度論釋大品經龍樹造羅什譯九倍略之百卷成文亦名釋論智論大論記論序曰論之略本十萬偈三分除二得百卷以秦人好簡故裁略之若備釋將千餘卷也又云論之初品三十四卷解釋一品是全論其本二品下法師略之取其足以開釋文意不復備其廣釋得此百卷若盡出之將十倍也從能釋名釋論從所釋名智論復從所釋經名大論注迦旃延子此云文飾善讚詠故大論云佛滅後百年有迦旃延婆羅門文非佛世之迦旃延也記文飾者讚詠文辭善能修飾也大論下指證二卷文云佛滅後百年阿闍迦王作大會諸大法師論議異故有別部名字從是已來展轉至姓迦旃延婆羅門道人智慧利根盡讀三藏等文備迦旃延婆羅門姓注聰明利根大論云迦旃延子輩是生死人不讀不誦摩訶衍經非大菩薩不知諸法實相自以利根智慧於佛法中作諸論議文記所作論議即發智經八犍度如婆沙論云彼迦旃延有利智三明六通具八解脫五百佛所願於釋迦遺法中造阿毗曇於世尊處處教化之中而立犍度是彼亦乘願來作論也備犍度翻法聚以諸法門各從其類分為八聚見三藏法數注則知天台以小乘為三藏本乎經論昔靜法苑師毀之於前清涼觀師讚之於後苑師謂法華云貪著小乘三藏學者乃以小乘為能別之言明知三藏不唯屬小天台此名濫涉大乘特違至教指法華為至教注清涼華嚴疏云此師立義理致圓備但三藏名義似少濫以後三教亦有三故所以爾者良以智論之中多名小乘為三藏教成實論中亦自説云我今欲説三藏中實義故有據初對舊醫戒定慧故立此三事條然不同異後三教通教意融三故別教依一法性而顯三故圓教三一無礙故所以不名小乘教者此教亦有大乘六度菩薩三十四心斷結成真佛故文記二師皆賢首宗徒苑師下出毀苑師乃法藏上首謂經中小乘三藏乃對大乘三藏以成能別天台立三藏教名其過有四一濫涉大乘失以大乘亦有三藏應名三藏教故二大無三藏失以彼不名三藏故三特違至教失經云不得親近小乘三藏學者有小乘言明揀異大乘三藏故四有不定失以小乘諸部有不立三故如經量部但立經律二藏故又有立五藏於成實三外立雜藏及菩薩藏故今集注中但指其第一第二之過也此毀文華嚴疏鈔具引清涼以苑公解不合經旨另出疏鈔今注但指其所出二過也指法華為至教句乃玉師點釋以佛所説皆名至教也清涼此師立義下出讚疏鈔中文有四節以通五難謂上四失之外尚有第五云何不立小乘難言四節者一出三藏名之所據即良以下等文以通違至教失及濫涉大乘失謂大小乘論同立此名故濫涉之失不在於己若難言智論內小乘名隨自宗語三藏之稱隨他宗語非共名也今釋曰智論是隨他名成論小乘云何亦名三藏豈隨他宗耶即由上義不違至教以羅什譯經多依智論小乘三藏為欲成文二言雙舉小乘之過不在三藏但責其小心耳故訶小乘不責所詮三藏以上鈔文今注有據二字乃玉師所加成實論亦説三藏者蓋成實論訶梨跋摩自記曰諸比丘異論種種佛皆聽故我今欲説三藏中實義是三藏名之所據也華嚴鈔又云初對舊醫下二明立三藏所以四教之初敵對舊醫之三故須特立三藏三又迢然不同故無濫涉大乘所以偏從立號亦猶五塵皆色而色獨得總名故三藏雖通標總名便為小乘別教言舊醫者即涅槃新醫舊醫之喻舊醫喻外道外道戒定慧者各有二一邪二正外邪戒謂狗牛等正戒謂十善舊定邪者九十五種所説鬼神法或能知吉凶現神變相也正者即四禪四無量四無色發五通也外慧邪者因身邊見心發諸邪智撥無因果等也正者即因身邊見發諸世智説有因果諸善法也今佛説三藏教所明戒定慧即是新醫從遠方來曉八種術如來所説戒者即五種得戒發一切律儀無作有作五部毗尼也定者即依八背捨八九次第定等發六神通也慧者即生滅四諦破身邊見六十二見發真無漏成十一智三無漏根也此戒定慧外道尚不聞名況有其分故言初對舊醫等三事迢然不同者謂上對舊醫下對通別圓教由不同故立三藏名即由此義諸部多名三藏從多立名非不定失通教意融三下第三明後三不名三藏所以即正通大無三藏失謂大乘雖有三藏各有融拂等義故不立名非無其體言通教融三者融至空寂故法句經云戒相如虗空持者為迷倒若學諸三昧是動非坐禪心隨境界流云何名為定無智無得方名真智般若無知如智雙寂等皆意融三也言別教依一法性而顯三者以一法性統之不得迢然有別一一法門不離法性故論云知法性離五欲過隨順修尸波羅密知法性無有亂想隨順修禪波羅密知法性本有智慧光明無癡暗故隨順修般若波羅密言圓教三一無障礙者即三而一即一而三非唯一體統之一學之中攝三皆盡一行尚具一切何況三耶所以不名下四明不名小乘之所以通第五難難云何以不名小乘強立三藏招而多失故今通云以有大乘不得名小三藏教中亦有菩薩謂是大乘自大乘中望之皆稱三藏小乘也成真佛者大乘説此斷惑成佛是八相化身小乘以為實成故屬小教故涅槃中詺執此實以為二乘曲見以上都依疏鈔文條然華嚴疏作迢然備八種術指苦空等四枯四榮五種得戒一善來得二見諦得三三皈得四八敬得五羯磨得十一智等見法界初門六度三十四心六卷釋注釋籤十七云三藏通大小何故但屬小今明如法華云貪著小乘三藏學者又大論中處處以三藏對衍而辨大小故準此文以三藏為小若通論者小衍二門俱有三藏但是通途非別意也若唯通途如何消通法華大論具如四教本中廣明文記論以三藏對衍如前儀文引迦旃延子不讀衍經等備四教義云通別圓皆説戒定慧豈非三藏教答通説無生戒定慧一相無相不同藏教別相異也又一得不失從勝受名也別説恆河沙佛法異前生滅圓約真如實相異藏偏淺故不成也注然論別意有三一小乘三藏部別故二小乘三藏隔異故三小乘三藏破舊醫故記小乘三藏別意有三者一如上明四阿含等經是修多羅藏俱舍等論是阿毗曇藏等部帙迢然別也二如上明經詮定學等三事不同是為三藏隔異也三如新醫戒定慧對破舊醫戒定慧也注苑師謂法華以小乘為能別之言且法華大論皆羅什譯論中既以小乘名三藏教故至譯經二言雙舉為成偈文即別義也記此專解苑公能別之難清涼鈔中亦言為欲成文雙舉蓋法華大論皆羅什譯論譯在先經翻在後論以小乘名三藏教經意豈得不然而乃謂之能別耶故至法華以小乘三藏二言雙舉者為成四字偈故即是經別義非以二言雙舉對大乘三藏成能別也備辨訛曰即別義三字稍泥私謂小乘別義當如上三意判注又大論云佛在世時無三藏名法華何云三藏學者須知三藏之名起於結集法藏者故大論云摩訶迦葉將諸比丘在耆闍崛山中集三藏文殊尸利彌勒諸大菩薩亦將阿難集摩訶衍三藏是聲聞法摩訶衍是大乘法復次佛在世時無三藏名但有持修多羅比丘持毗尼比丘持摩多羅比丘文記此更引大論判決論謂佛世無三藏名則説法華時尚無其名經中云何有三藏言耶須知三藏名起於結集也故大論下引證出囑纍品三藏是聲聞法摩訶衍是大乘法此兩句是述阿難意以彼上文言又阿難知衆生志業大小故不於聲聞人説摩訶衍説則錯亂無所成辦佛法皆是一種一味所謂苦盡解脫門此解脫味有二種一但自為身二兼為一切衆生雖俱求一解脫門而有自利利人之異故有大小二乘之別為是二種人故佛口所説以文字語言分為二種三藏是聲聞法摩訶衍是大乘法也復次下亦囑纍品文意顯雖無三藏之名而有三藏之義經家以義定名故集小乘名三藏教補摩多羅無翻約義應指論言注是則結集經家既立三藏之名故譯經者作此譯耳故法華云三藏學者備此結經文相承有本意以説經時尚無三藏之名不當泥經中小乘三藏為能別之言也二教所被機二初總標三乘根性此有三乘根性注此是總標三乘聲聞四諦教苦為初門支佛因緣教集為初門菩薩六度教道為初門又三人亦通諦緣度三文句七二十一記此釋當教有三乘根性初一句斷文次行半明三人各有入道初門謂聲聞小乘苦諦為初觀四諦入道發真無漏緣覺中乘集諦為初觀十二因緣發真無漏菩薩大乘慈悲宏誓道諦為初修行六度化衆生成佛果也未明互通三乘文句曰三人通觀十二緣二乘生滅十二緣菩薩無生十二緣又通論四諦二乘有量四諦菩薩無量四諦又六度亦通三人大品發趣品言阿羅漢支佛因六波羅密至彼岸玄文亦載備皆合小衍而論通也注四念處一二云所言三者其義有八謂教理智斷行位因果理三者聲聞理在正使外緣覺理在習氣外菩薩理在正習外教三者聲聞稟四諦教緣覺稟十二因緣菩薩稟六度智三者聲聞總相智緣覺別相智菩薩總別相智斷三者聲聞斷正緣覺斷習菩薩斷正習行三者聲聞為自修戒定慧緣覺為自修樂獨善寂菩薩為衆生修六度位三者聲聞住學無學緣覺住無學菩薩三僧祇登道場因三者聲聞帶果行因緣覺望果行因菩薩伏惑行因果三者聲聞斷正如燒木為炭緣覺斷習如燒木為灰菩薩正習盡如燒木無炭灰也文記此證三乘根性也初總標三乘八義不同理三者聲聞須斷盡見思契真空理緣覺當兼其習氣證真空理菩薩樹王下頓除正習證真空理在正使等外者謂真空之理為見思所覆斷見思方顯故在惑外也教三者聲聞依生滅四諦輪知斷證修緣覺依十二緣起門逆順觀察菩薩依六度門三祇百劫自利利人也智三者聲聞觀諸果總作苦諦觀觀諸煩惱及業總作集諦觀故以現在總相一門析色成空緣覺雖觀苦七支集五支以自行故別觀三世別開苦集故言別相智以別相一門析色成空菩薩為化他故通依四門故通以總別相智於四門析色成空也斷三者聲聞斷正如器中除穢物緣覺斷習如除器中穢氣菩薩若見若思若見思習則以三十四心頓斷也行三者聲聞自求涅槃勤修三學緣覺樂獨善寂自求解脫菩薩愍念無量衆生故勤修六度萬行也位三者聲聞三果四向正在研真斷妄名有學四果羅漢真窮妄盡名無學緣覺唯一遠離名住無學菩薩三祇百劫登道場也因三者聲聞初果見道後修道名帶果行因緣覺不立分果故望果行因菩薩不斷結惑名伏惑行因然緣覺菩薩因中俱不斷惑一稱望果一稱伏惑者緣覺求自證菩薩為化他留惑潤生也果三者聲聞斷正如炭緣覺斷習如灰菩薩斷正習盡如不存灰炭喻炭灰者三乘入涅槃同灰斷也備有師標曰若有佛無佛理性常住應理居初今先教者如來以教顯理衆生由教入理八義相生可見二別顯三乘道二初教法三初示聲聞二初詳辨四諦二初通標初聲聞人依生滅四諦教注聞佛聲教故曰聲聞生滅四諦止觀一十一云苦則三相遷移生異滅集則四心流動貪瞋癡等分道則對治易奪滅則滅有還無雖世出世四皆變異故名生滅文自性不虗四皆諗實故名為諦也記輔行言三相者不立住相以人多於住處起常計故淨名言比丘汝今亦生亦老亦滅老即是異此中兼一期之壽一念之促二種三相四心即四分煩惱四分必是三相所遷故言流動四相雖不相應行攝即彼煩惱是生等故為顯此中成生滅義故須以生滅説之下文道滅尚成生滅故此苦集言生異滅也貪瞋癡三不定雜生名為等分以實有道治彼苦集名曰對治有苦集時則無有道若有道時能除苦集故曰易奪滅則滅有因果還歸無餘也雖分世出世而皆有變易故名生滅也末三句釋諦義也苦集滅道自性皆實不虗名諦諗深上聲或謂滅道聖人行因得果可言審實苦集虗妄何名審實答此虗妄因果非虗妄非不虗妄故有漏無漏因果皆悉審實不可混濫故遺教經言日可令冷月可令熱佛説四諦不可令異也妙玄云自性不虗故稱曰諦二別釋四初苦諦三初徵言四諦者二釋二初開總出別二初標名義一苦諦二十五有依正二報是注大經云凡夫有苦而無諦聲聞有苦而有諦凡夫不見苦理故言無諦聲聞能見無常苦空故言有諦記此引大經釋也大經聖行品疏言若舊本則言凡夫合聲緣皆言有苦有諦新本開凡夫有苦無諦二乘有苦有諦此於二乘而與奪之舊言苦是境諦是智凡夫無智有境所以唯苦無諦二乘有少分智故有苦有諦光明記言凡夫有苦無諦者雖遭大苦不以為患以不審諦知是苦故聲聞有苦有諦者此當三藏不了無生故言有苦能審知故名為諦也注法界次第中十云苦以逼惱為義一切有為心行常為無常患纍之所逼惱故名為苦謂三苦八苦等記此引祖釋苦諦名義也初二句訓義一切下依義立名謂一切有為心行即苦體為所逼惱無常患纍為能逼惱以是得名為苦也補等謂等餘十苦百一十苦也菩薩藏經有十苦謂生老病死愁怨及苦受苦憂苦痛惱苦生死流轉苦也瑜伽論有百一十苦約之不出三八攝盡故不再出記法界次第云三苦有通別別者三苦對三受苦受從苦緣生情覺是苦即苦苦樂受樂壞時生苦即壞苦不苦不樂受常為無常遷動即行苦通論三受皆有三苦三受之心是苦通從苦緣生通是苦苦三受之心通為壞相所壞通是壞苦三受之心通是起役運動不停相通是行苦也補別論欲界具三色具後二無色唯行捨受即非苦非樂之處中苦備辨訛曰後一總七無復別體句出大經疏亦一往之言據瑜伽論前五是苦苦六七是壞苦第八是行苦當知行苦攝得前二前二攝不得行苦則知有別體矣記八苦如大經聖行品説生老二苦與今文同病苦經明身病有五一因水二因風三因熱四雜病五客病又有四一非分強作二忘誤墮落三刀杖瓦石四鬼魅所著心病有四一踴躍二恐怖三憂愁四愚癡今圖所明死苦有三種一業報二惡對三時節代謝者誤也蓋經明病苦也如經云身心之病凡有三種一業報二不得遠離惡對三時節代謝生如是等因緣名字受分別病因緣者風等諸病名字者心悶肺脹上氣咳逆心驚下痢受分別者頭痛目痛手足等痛是名為病也又大經明死苦有二種曰命盡死外緣死命盡死有三種一命盡非福盡二福盡非命盡三福命俱盡外緣死亦有三一非分自害死二橫為他死三俱死又有三死一誹謗大乘名放逸死二毀犯諸佛所制名破戒死三捨五陰身名壞命根死愛別離苦者經云所愛之物壞離有二一者人中五陰壞二者天上五陰壞如是人天所愛五陰分別有無量種也怨憎會苦者經云所不愛者而共聚集亦有三所謂地獄餓鬼畜生如是三趣有無量種也求不得苦者有二經云一者所希望處求不能得二者多役功力不得果報五陰熾盛苦者經指生老病死愛別離怨憎會求不得等苦總名五陰熾盛苦也婆沙論言盛陰有何義受所生故説盛謂生受故説盛受所養故説盛謂養受故説盛問陰與盛陰有何差別答名即差別謂陰謂盛陰又陰有漏無漏盛陰一向有漏又陰染污不染污盛陰一向染污章安言今依經文以五盛陰是其別體善惡陰盛即是苦體補生苦中所言至終至十月滿足也二引古頌言二十五有者四洲四惡趣六欲并梵天四禪四空處無想五那含四洲四趣成八六欲天并梵天成十五四禪四空處成二十三無想天及那含天成二十五注輔行一下二十一云因果不忘故名為有文記此總明為有也如經言無我無作無受者善惡之業亦不忘是則稱理固無作受據事因果灼然所謂三界之內因之與果如影隨形如聲逐響毫無差忒因果不忘故謂之有注略云三有欲色無色或云九有三界分九地故記此略明為有也言九地者欲界五趣雜居地色界初禪離生喜樂地二禪定生喜樂地三禪離喜妙樂地四禪捨念清淨地無色界空無邊處地識無邊處地無所有處地非非想處地是為三界分九地也解見法數注國土名依報五陰假名是正報即苦諦之體備國土外四大五陰內四大內外皆苦體也注四洲水中可居曰洲記如下人道中解注四惡趣三途加修羅以修羅一日一夜三時受苦故備辨訛曰三時受苦準經應是閻羅非修羅也存考注六欲希須名欲六天各有三種欲一飲食欲二睡眠欲三淫欲梵王無想及五那含總在四禪經教別為三有者為破外道計梵王為生萬物之主計無想無心為涅槃計五那含為真解脫故記翻譯名義云外道計梵天為能生萬物之本梵王亦自己方能為造化之主是真解脫佛欲破彼情見是故別標為有也無想定得五百大劫無心之報外道不達而復計為真實涅槃佛欲破彼情見是故別標為有也五淨居中有摩醯首羅天王處外道亦復計彼天王能為造化之本歸之而得解脫佛為別破此見釋之為有故二十五三昧中以種種破梵王者梵王主三千大千大千品類既多有種種號為破其種種故修種種空入種種假見種種中道如來藏多所含藏名種種三昧破之也如空破無想者此是外道天實非無想而計為無想涅槃以三諦空破也照鏡破那含有者修熏禪隨禪生此雖得淨色不知色如鏡中像菩薩知之即空分別無量像依鏡即本性中道三昧破之二攬別成總二初總示別則二十五有總則六道生死注六道輪轉相通故名為道記道猶路也有能通之義謂六道衆生輪轉四生循環三界互相通達故名為道如曰鑽馬腹入驢胎塗炭曾經幾度回或時天帝殿前過或向閻君鍋裏來是也注輔行二上二十五引大論三十三問云云何六道復云五道答佛去世後五百年中部別不同各回佛經以從己義故使修羅一道有無不同文記此料簡五道六道問中以五間六之故答中以部帙不同有異如大論言五百年後多有別異部部不同説五者於佛經回文説五説六者於佛經回文説六又曰五道者是一切有部僧所説婆蹉佛妬路部僧説有六道也今從六道説者大論言又摩訶衍中法華經説有六趣衆生觀諸經意應有六道也復次分別善惡故有六道善有上中下天人阿修羅惡有上中下地獄鬼畜生不爾者惡有三果報而善有二果報是事相違若有六道於義無違故今從六道者説也注楞嚴中更開神仙一類為七趣記此示經開七趣引文明證也楞嚴經云復有從人不依正覺別修妄念存想固形有十種仙所謂地行飛行遊行空行天行通行道行照行精行絶行仙等是皆人中鍊心不修正覺別得生理壽千萬歲休止山林或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣是為七趣注又六道不出胎卵濕化四生俱舍頌云人旁生具四地獄及諸天中有唯化生鬼通胎化二文記此示四生攝六道也俱舍論分別世品釋言卵生鵝孔等胎生象馬等濕生蟲飛峨等化生謂有情類生無所托如地獄諸天中有等具根無缺支分頓生無而欻有故名為化人中卵生者如世羅塢波世羅二羅漢生從鶴卵鹿母所生三十子般遮羅王五百子等人胎生者如今世人人中濕生者如曼馱多遮盧塢波遮羅鴒鬘菴羅衛等人中化生者唯劫初人也旁生三種共所現見而化生則如龍等也鬼胎生者如餓鬼女白目連曰我夜生五百子隨生皆自食晝生五百亦然雖皆食盡亦不得飽等鬼化生者鬼本化生有名無體可知補中有者俱舍言於死有後在生有前中間所得之身名為中陰為至餘處説此身名中有在二道中間故何緣中有非即名生頌曰死生二有中五陰名中有未至應至處故中有非生此唯天眼能見瑜伽言五陰初起名之為生依殼而起曰卵含生而愛曰胎假潤而真曰濕無而欻有曰化如是四生內心思為因外殼胎等為緣約藉緣多少而成次第者卵生具四緣一業二父三母四暖是以先説胎具三業父母濕二業濕化唯一謂思業也二別顯二初明六道六初地獄道一地獄道梵語捺洛迦又語泥黎此翻苦具而言地獄者此處在地之下故言地獄謂八寒八熱等大獄各有眷屬其類無數其中受苦者隨其作業各有輕重經劫數等其最重處一日之中八萬四千生死經劫無量作上品五逆十惡者感此道身注地獄從處為名婆沙云瞻部洲下過五百踰繕那乃有地獄記踰繕那舊言由旬大論曰由旬三別大者八十里中六十里小四十里今以一踰繕那四十里謂此南洲下過二萬里有地獄道注梵語釋籤八二十云元梵天種還作梵語及以梵書文輔行七二十一云光音初下展轉出生是故五天並名梵種文記每劫初時梵王親下教導世間華嚴疏言大梵天王劫初作此書字以教衆生故西域梵書千古不易不同此土篆隸隨時也輔行引大論言梵種者餘天人民未有劫初生時梵王獨在梵宮寂寞無人其心不悅而自生念此間何以不生人民是時光音天命盡者應念來生梵王自念此諸天先無隨我念生我能生此諸天是時亦各自念我從梵王生梵王是我父也故但説梵種注翻彼梵語成此華言故云翻也周禮有象胥氏通四方之語東方曰寄南方曰象西方曰狄鞮音低低之言知也北方曰譯今翻西語諸經皆云譯者從通稱也如周禮四官通稱象胥氏記輔行云寄等四皆官名寄者能寄寓風俗之異於此象者能效象風俗之異於彼鞮則欲別服飾之異譯則辨其言語之異注苦具造惡之者受苦具度亦云苦器記正理論曰捺落言人迦名為惡人多造惡墮落其中也梵語泥黎乃造惡衆生受苦器具注八寒八熱偈云頞部陀尼剌部陀寒逼身皰及皰裂頞哳吒并嚯嚯婆唬唬婆三皆痛聲六嗢鉢羅鉢特摩嗢烏沒反第八摩訶鉢特摩青蓮紅蓮大紅蓮如次對三種身色以上八寒等活黑繩三衆合嘷呌大呌六炎熱七極熱下八阿鼻此八寒熱根本獄等活斫刺磨搗吹活等前黑繩綳量後方斬鋸衆合苦具衆至合黨相殘嘷呌衆苦所逼悲嘷發聲大呌極苦所逼大呌稱怨炎熱火隨身轉熱苦難堪極熱若內若外自身他身俱出猛火互相燒害阿鼻或云阿鼻旨亦云阿毗成論明趣果受苦時命及形五皆無間也記人寒熱獄大論具記頞部陀翻皰寒觸身分悉生皰故論言其處積冰毒風來吹令諸罪人皮毛裂落筋肉斷絶骨破髓出即復完堅受罪如初此人宿業因緣寒月剝人衣或劫盜絶人薪火或作惡龍瞋毒忿恚放大雹雨冰凍害人或輕賤謗毀若佛及佛弟子持戒之人或口四業作種種罪等因緣墮頞浮陀也尼剌部陀翻皰裂論曰墮尼羅浮陀亦如是然頞浮陀少時有間暫時休息而此尼羅浮陀無間無休息時頞哳吒即阿羅羅聲嚯嚯婆即阿波波聲唬唬婆即阿聲論曰此三地獄寒風噤顫口不能開因其呼聲名獄嗢鉢羅翻青蓮華鉢特摩翻紅蓮華摩訶鉢特摩翻大紅蓮論説漚波羅獄中凍冰浹泄有似青蓮華波頭摩狀如此間赤蓮華摩訶波頭摩是中拘伽離住處已上八寒獄也等活者論言見等活大地獄中諸受罪人各各共鬬惡心瞋爭手捉利刃互相割剝以矟相刺鐵扠相扠鐵棒相棒鐵杖相捶鐵串相貫而以利刃互相切劊又以鐵爪而相抓裂各把身血而相塗漫痛毒逼切悶無所覺宿世因緣冷風來吹獄卒喚之咄諸罪人還活以是故名等活地獄即時平復復受苦毒等前此中衆生以行業因緣好殺物命牛羊禽獸為田産舍宅奴婢妻子國土錢財故而相殺害如是等種種殺業報故受此極苦黑繩者論言見黑繩大地獄中罪人為惡羅剎獄卒鬼匠常以黑熱鐵繩拼度罪人以獄中鐵斧教人斫之長令短短令長方使圓圓使方截四支刵耳鼻落手足以大鐵鋸解析剸截破其肉分臠臠稱之此人宿行因緣讒賊忠良妄語惡口兩舌綺語枉殺無辜或作姦吏虐暴侵害如是等種種惡口讒賊故受其罪衆合者論言見合會大地獄中惡羅剎獄卒作種種形牛馬豬羊麂鹿狐狗虎狼獅子六駁大象雕鷲鶉鳥作此種種諸鳥獸頭而來吞噉齧咬䶥掣罪人兩山相合大熱鐵輪轢衆罪人令身破碎熱鐵臼中搗之令碎如笮蒲萄亦如壓油譬如蹂場聚肉成堆積頭如山血流成池雕鷲虎狼各來爭掣此人宿業因緣多殺牛馬豬羊麞鹿狐兔虎狼獅子六駁大象衆鳥多相殘賊如是等種種鳥獸故還受此衆鳥獸頭來害罪人又以力勢相陵枉押羸弱受兩山相合罪慳貪瞋恚愚礙怖畏故斷事輕重不以正理或破正道轉易正法受熱鐵輪轢熱鐵臼搗嘷呌與大呌者論言此大地獄其中罪人見羅剎獄卒頭黃如金眼中火出著赭色衣身肉堅徑走疾如風手足長大口出惡聲捉三股叉箭墮如雨刺射罪人罪人狂怖叩頭求哀大將軍小見放捨小見憐愍即時將入熱鐵地獄縱廣百由旬驅打馳走足皆焦然脂髓流出如笮蘇油鐵棒棒頭頭破腦出如破酪瓶斫刺割剝身體糜爛而復將入鐵閻屋間黑煙來熏互相推壓更相怨毒皆言何以壓我才欲求出其門已閉大聲號呼音常不絶此人宿行因緣皆由斗稱欺誑非法斷事受寄不還侵淩下劣惱諸貧窮令其號哭破他城郭壞人聚落傷害劫剝室家怨毒舉城呌喚有時譎詐欺誑誘之令出而復害之如是等種種因緣受大呌喚地獄罪炎熱極炎熱者論言熱大熱地獄中有二大鋼鑊一名難陀二名跋難陀以沸鹹水滿中羅剎鬼獄卒以罪人投中如厨士烹肉人在鑊中腳上頭下譬如煮豆熟爛骨節解散皮肉相離知其已爛以義義出行業因緣冷風吹活復投炭坑或著沸灰中譬如魚出於水而著熱沙中又以膿血而自煎熬從炭坑中出投之炎牀強驅令坐眼耳鼻口及諸毛孔一切火出此人宿世惱亂父母師長沙門婆羅門於諸好人福田中惱令心熱以此罪故受熱地獄罪或有宿世炮煮生繭或生燂豬羊或以木貫人而生炙之或焚燒山野及諸聚落佛圖精舍等或推衆生著火坑中如是等種種因緣生此地獄中阿鼻者論言見阿鼻地獄縱廣四千里周圍鐵壁於七地獄其處最深獄卒羅剎以大鐵鎚鎚諸罪人如鍛師打鐵從頭剝皮乃至其足以五百釘釘磔其身如磔牛皮互相掣挽應手破裂熱鐵火車以轢其身驅入火坑令抱炭出熱沸尿河驅令入中中有利嘴諸蟲從鼻孔入腳底出從足下入口中出豎劍道中驅令馳走足下破碎如厨膾肉利刀劍矟飛入身中譬如霜樹落葉隨風亂墮罪人手足耳鼻支節皆被研剝割截在地流血成池二大惡狗一名賒摩二名賖婆羅利口猛毅破碎人筋骨力踰虎豹猛如獅子有大刺林驅逼罪人強令上樹罪人上時刺便下向下時刺便上向大身毒蛇蝮蠍惡蟲兢來齧之大鳥長嘴破頭噉腦入鹹河中隨流上下出則踏熱鐵地行鐵刺上或坐鐵戈戈從下入以鉗開口灌以洋銅吞熱鐵丸入口口焦入咽咽爛入腹腹然五臟皆焦直過墮地但見惡色恆聞臭氣常觸粗澀遭諸苦痛迷悶萎頓或狂逸搪揬或藏竄投擲或顛仆墮落此人宿行多造大惡五逆重罪斷諸善根法言非法非法言法實言非實非實言實破因破果憎嫉善人以是罪故入此地獄受罪最劇原注引成論五種無間者一趣果無間捨身生報故謂捨此身即生彼也二受苦無間中無樂故三時無間定一劫故四命無間中不絶故五形無間一人多人皆遍滿故正法念處經言阿鼻苦千倍過前七獄故補八寒八熱偈是苕水粹法師作頞哳吒義府言以寒增甚口不能開但得動舌作聲此三約受苦以立名如脣動不得唯舌作聲名頞哳吒舌動不得唯脣作聲名嚯嚯婆唇舌俱不得動但內振氣作聲名唬唬婆皆痛聲也如次對三種身色者謂以青對嗢鉢羅紅對鉢特摩大紅對摩訶鉢特摩此是寒逼其身乃作青紅等色故如次對也哳音劄綳音崩顫音戰嗢音屋浹泄音接雪矟音速矛也劊音桂細切也拼音綳刵音二割也剸音團轢音立車踐也笮音詐燂音前熱湯也磔音極裂也頞音遏注各有眷屬其類無數等活等八獄各有四門四門各有四獄謂煻煨尸糞鋒刃烈河增一獄十六總有百二十八皆名遊增有情遊彼其苦增故準妙玄第六云八寒亦具百二十八而正理論等但云眷屬故俱舍圖熱豎寒橫於八寒邊不列遊增更有孤獨鬲子輕繫等獄遍在江海山林空中等處婆沙七云南洲有正有邊東西二洲唯邊無正北州邊正俱無三洲人若造重罪皆來南洲正獄及東西南洲邊獄受苦妙玄六二十八云此正地獄在地下二萬由旬其傍地獄或在地上或在鐵圍山間記等治下熱眷屬獄俱舍言此下過二萬無間深廣同上七捺落迦八增皆十六謂煻煨尸糞鋒刃烈河增各住彼四方無間各四門既各有四上七亦然十六遊增地獄四門門門有四東門四者飢餓銅鑊多鍑石磨南門四者膿血量灰灰河鐵丸西門四者斤斧豹狼劍樹寒冰北門四者黑砂沸屎鐵釘焦渴又新婆沙言八熱獄各有四門一一門有遊增獄有情遊彼其苦增故次準妙下寒眷屬獄初二句準妙玄總示次一句指正理但言眷屬論言那洛迦等下四趣全及天一分眷屬中有并器世間總名欲界是為但云那洛迦眷屬也俱舍圖不列寒邊遊增者承正理但言眷屬意也更有孤獄遍江林等處者以孤獄有三法數言山間水中曠野三處皆有地獄婆沙下示四洲邊正獄有無南本婆沙言閻浮提下有正地獄閻浮提上唯邊地獄或山上或谷中或曠野或空中弗婆提瞿陀尼唯有邊地獄無正地獄單越正邊皆無彼是淨果報故問何故閻浮下有正地獄餘處則無答曰閻浮提人修善猛利作不善業亦復猛利故有正地獄餘則無又問如餘洲亦作五無間諸餘重業於何處受報耶答於此閻浮提下受也妙玄下示此南洲邊正獄如婆沙言贍部洲下過五百踰繕那乃有地獄又言地上唯有邊獄又經明鐵圍兩山中間日月所不及處名黑暗地獄然上所言邊獄即眷屬獄補今明八寒八熱為大獄十六遊增為眷屬獄與大論稍異大論謂八熱為大獄八寒冰炎火為眷屬獄鍑音富大口鑊也磷音磨注輕重傍輕正重重者遍歷百三十六獄中者不遍下者復減記重罪遍歷根本八獄及百二十八眷屬獄注經劫數等俱舍云等活等上六如次以欲天壽為一晝夜人間五十歲為四天王一晝夜四天王五百歲為等活一晝夜當人間九百萬歲又人間百歲為忉利天一晝夜忉利天一千歲為黑繩一晝夜當人間三千六百萬歲注壽量亦同彼等活壽同四天王五百歲黑繩壽同忉利天一千歲等活等苦壽如此可不畏耶記俱舍釋論言四天等六欲天壽如其次第為等活等六捺洛迦一晝夜壽量如次亦同彼天四天王壽量五百於等活地獄為一晝夜乘此晝夜成月及年以如是年彼壽五百乃至他化壽萬六千於炎熱地獄為一晝夜乘此晝夜成月及年彼壽如斯萬六千歲補人間二百歲為夜摩一晝夜夜摩二千歲為衆合一日夜當人間十四億四百萬年人間四百歲為兜率一日夜兜率四千歲為嘷呌一晝夜當人間五十七億六百萬年人間八百歲為化樂一晝夜化樂八千歲為大呌一晝夜當人間二百三十億萬年人間一千六百歲為他化一晝夜他化一萬六千歲為炎熱一晝夜當人間九百二十一億六百萬年也注極熱半中劫無間中劫全旁生極一中難陀龍等壽一住劫記俱舍釋論言極熱地獄壽半中劫無間地獄壽一中劫旁生壽量多無定限極長亦一中劫謂難陀等諸大龍王故世尊言大龍有八皆住一劫能持大地備辨訛曰壽一住劫準大論是壽住一劫以此文依俱舍然俱舍明一增一減為中劫文中旁生極一中者意言住一中劫非一住劫也以住劫則有二十番增減故私謂論釋言此小三災中劫未起又下文畜生道言諸大龍王皆住一劫此處一住乃倒寫也注鬼日月五百鬼以人間一月為一日積日為月壽五百年記俱舍釋論言鬼以人間一月為一日乘此成月壽五百年上釋八熱地獄所經劫數注頞部陀壽量如一婆訶麻婆訶翻篅貯二十斛胡麻今俗所用盛米者是記俱舍釋論言寒那洛迦云何壽量世尊寄喻顯彼壽言如此人間佉梨二十成摩竭陀國一摩婆訶量篅音然盛米竹棧注百年除一盡假使有人百年除一粒麻二十斛盡名為頞部陀壽記俱舍釋論言有置苣蕂滿其中設復有能百年除一如是苣蕂易有盡期生頞部陀壽量難盡補胡麻苣蕂子也此方所無注後後倍二十第二皰裂二十婆訶麻後之六獄倍增可知記俱舍釋論言此二十倍為第二壽如是後後二十倍倍是為寒地獄壽量劫數也注八萬四千生死毗婆沙言五道各有自爾之力地獄色斷還續妙樂五三十引毗曇云一切地獄初生之時皆有三念知此處是地獄由某因所生從某處來記大經言諸婆羅門命終生阿鼻獄即有三念一念我從何處來生即自知從人道來二念今生何處即自知阿鼻獄三念乘何業緣即自知乘謗方等大乘經典不信因録為國主所殺而來生此念是事已即於大乘方等經典生信敬心尋便命終生甘露鼓如來世界壽命十劫今引論明地獄初生有三念也又論九言地獄中或有能自識宿命者如經説地獄衆生作如是念諸沙門婆羅門恆如是説貪欲見將來過患可畏之處是以當斷貪欲我但以不能斷貪欲因緣故今受極處苦痛極惱問彼作是念時為初生時中時後時耶答初生時非中從時以初生時未受苦痛若受苦痛次前滅事尚不能憶況復久遠注文句四三十四云初皆正語若受苦時痛聲不復可分別妙樂五三十云初入地獄如本有語後時但作波波等聲不復可辨記波波等聲忍寒聲也然初生熱獄亦有語言後亦難辨舊雜譬喻經言昔有六人俱墮地獄同在一釜中皆欲説本罪一人言沙二人言那三人言特四人言涉五人言姑六人言陀羅佛見之笑目連問故佛言有六人為伴墮地獄熱湯沸湧不能再語各一語便回一人言沙者世間六十億萬歲泥犁為一日何時當竟二言那者無有出期亦不知何時得脫三言特者咄咄我當用治生不能自制意奪五家分供養三尊愚貪無足今悔何益四言涉者言我治生亦不至誠財産屬他為得皆痛五言姑者誰當保我從地獄出便不犯禁得生天樂者六言陀羅者是事上頭本不為心計譬如御車失道入邪折軸車壞悔無所及是也注文句云獄卒是變化令見非衆生數初將罪人縛至閻王所者是衆生數若受苦時非衆生數妙樂五三十云有情非情並是共業所感而為心變文記此辨獄卒有情非情非情數者正法念經言閻摩羅人非是衆生罪人見是衆生手中執持𦦨然鐵鉗彼地獄惡業既盡命終之後不復見於閻羅獄卒以彼非是衆生數故如油炷盡則無有燈業盡亦爾不復見於閻羅獄卒亦復如是惡眼惡口如衆生相可畏之色皆悉磨滅如破畫壁畫亦隨滅惡業畫壁亦復如是不復見於閻羅獄卒可畏之色故知獄卒但從罪業衆生自心感變故自妄見是衆生實非衆生數也備有謂有情指閻羅獄卒及諸惡鳥獸菲情指大小地獄并刀山劍樹等也然文句中之非衆生數是衆生數除初將罪人縛至王所者是衆生數其餘受苦時以及妙樂之有情非情皆是業感所變現也注衆生常為熱苦所逼小獄通寒熱大獄惟在熱四解脫經稱為火途且從熱為名也記小通寒熱者毗曇言人養六畜飲飴溫清者在熱獄得涼間寒獄得溫間所謂地獄有等流樂也大獄唯熱者如言上火徹下下火徹上東西四門皆有猛𦦨如魚在熬脂膏皆盡也注五逆殺父殺母殺阿羅漢出佛身血破和合僧記若據大乘則加弒和尚弒阿闍黎名為七逆注十惡身業三種謂殺盜淫口業身四妄言綺語兩舌惡口意業有三貪瞋癡記法界次第中言殺謂斷生命盜謂盜他財物淫謂非妻妾行欲事妄語謂以言誑他兩舌謂搆鬬之言間他令乖惡口謂惡言令惱綺語謂綺側語辭言乖道理貪欲謂及順情境心無厭足嗔恚若對違境心生忿怒邪見即癡謂撥正因果僻信求福皆邪見癡人注上品善不善業皆有三品而復有三如托華鈔記此釋上品不善業而帶及三品善對待説托華鈔如圖示補托音摘拾其遺義也孤山釋圭峯蘭盆疏記凡所作業不出此三謂心觸境境對心心境交接必落時分故有三品善不善業補法數言一加行心時加行即方便謂人欲作惡必先起心方便加行二根本心時正作惡時其心決定不可拔動三後起心時謂作業已後復起心緣念所作事二畜生道二畜生道亦云旁生此道遍在諸處披毛戴角鱗甲羽毛四足多足有足無足水陸空行互相吞啖受苦無窮愚癡貪欲作中品五逆十惡者感此道身注梵語底栗車輔行二上二十五云畜生者褚六許六向究三反並通作褚六音即六畜也謂牛馬雞豚犬羊則攝趣不盡今通論此道不局六也記褚六反音觸止也許六反音旭養也婆沙言畜謂畜養向究反音嗅謂橫生飲食多以鼻嗅食之故名為嗅生褚六音即六畜也即鄭玄禮記注言牛馬雞豚犬羊則攝不盡今通論也注旁生婆沙云形旁行旁記婆沙曰其形傍故行亦傍其行傍故形亦傍又有言形傍身多橫住行傍心多不正又刊正言行行不正受果報傍負天而行故曰傍行大約此道衆生多覆身行故注此道遍在諸處婆沙云遍五道中有之故也文句四三十四云四天三十三天悉有而上天所乘象馬等是福業化作非衆生數也記此釋畜道遍在五趣如婆沙論曰後有説者遍有故名畜生趣文句下示遍天趣亦準婆沙明四王天三十三天有鴈象馬等自上亦有雁孔等文問自上諸天亦乘象馬今言無者何也答彼天中惟有二足者如妙色鳥等餘皆無者蓋空居天所乘象馬因彼衆生福業因緣故作非衆生數象馬形以自娛樂也注披毛如走獸等戴角如牛羊等鱗甲如魚鱉等羽毛如飛禽等記此四中即有四足多足二足有足無足不同五道皆遍婆沙曰地獄中無足者如能究陀等二足者如鳥鳩羅那等四足者如狗等多足者如百足等餓鬼中無足者蛇等二足者鳥鳩羅那等四足者有威德象等無威德狗等多足者如百足等人道可知天道見上注水陸空行此三是畜生所依處也妙玄云陸有三品重者土內不見光明中者山林輕者人所畜養此釋水陸空行也初句直釋所依處如正理論云傍生所止謂水陸空也所謂蟲魚鳥獸種數無窮山水空陸境界無際也妙玄下別示陸有三品土內者如蚯蚓等山林者如禽獸等輕者即六畜等也注大論以三類攝畜生盡謂晝行夜行晝夜行記大論云畜類有三謂空陸水三種行又晝行夜行晝夜行夜如臬鼠等晝夜如螻蟻等注互相吞啖文句四三十四云畜生者多盲冥盲冥者無明也強者伏弱飲血啖肉怖畏百端四解脫經稱為血途從相啖邊為名也記婆沙曰有説以盲冥故名畜生五道中無明多者莫若畜生故恃強吞弱弱者怖畏百端行一步必左右瞻視也其實畜生是刀途經從互吞啖邊名血途注中品其心劣前作已少悔記較地獄少劣比餓鬼為勝注俱舍頌云旁生極一中旁生壽量多無定限其極長者亦一中劫謂難陀龍等諸大龍王皆住一劫能持大地記即與俱舍釋論同注文句四三十五云劫初時皆解聖語後飲食異諂心而語皆變或不能語妙樂五三十云諸教相中畜生能言皆此時也又畜生能飛空自爾力也記此引畜生初皆能言也如雜寶藏經云佛言過去比提醯國王以象伏迦尸王軍迦尸王作是念言我今如何當得香象摧伏比提醯王軍時有人言我見山中有一白香象王聞已即募軍言誰能得香象者我當重賞時軍集衆往取彼象象思我若遠去父母盲老不如隨順往至王所王言與其飲食時象不肯飲食上古畜生皆能人語王問何故不食象答我有父母年老眼盲無與水草父母不食我云何食又言我欲去者王諸兵衆無能遮我順王來耳王今見聽我去供養父母終壽還來王喜念言我即人頭象此即象頭人也尋即放象父母喪亡還來王所王欲伐彼國象言莫與鬬爭聽我獨往令彼怨敵不敢欺侮無能遮我便不還者比提醯王聞象來至極大歡喜語言即住我國象曰不得即住先許彼王當還其國汝二國王應除怨敵自安其國豈不快乎即説偈言得勝增長怨負則益憂苦不爭勝負者其樂最第一爾時香象説此偈已即便還國從此已後兩國和好爾時白象王今我身是迦尸王者今波斯匿王是比提醯王者今阿闍世王是當知上古之畜能人語也
