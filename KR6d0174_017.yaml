body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二十行二初正明十位次明十行者注四教義四六云此十通名行者行以進趣為義前既發真悟理從此加修從空入假觀無量四諦記此釋名行之所以也儀文一句標徵注文引文釋義如四教義引涅槃云知諸陰苦名中智分別諸陰有無量相悉苦非諸聲聞緣覺所知名上智是名無量苦諦知諸入者名為門名為苦諦分別諸入有無量相悉苦即無量苦聖諦也知十八界名為分亦名性即苦諦分別諸界有無量相悉苦名無量苦諦也無量集諦者知愛因緣能生五陰名集一人起愛無量無邊況一切衆生所起之愛如是等愛無量無邊即無量集諦也無量滅諦者知滅煩惱名滅分別煩惱不可稱計滅亦如是即無量滅諦也無量道諦者能斷煩惱名道分別道相無量無邊所離煩惱亦無量無邊即無量道諦也如是四諦大經悉云非聲聞緣覺所知故屬別教所學補菩薩住此無量道諦學十波羅密一切諸道斷塵沙無知中品十行成就從空入假平等觀成一歡喜二饒益三無違逆四無屈撓五無癡亂六善現七無著八難得九善法十真實斷界外塵沙惑注始入法空不為邪動名歡喜行常化衆生使得法利名饒益行常修忍法謙下恭敬名無違逆行行大精進令一切至究竟涅槃名無屈撓行不為無明之所失亂名無癡亂行生生常在佛國中生名善現行於我我所一切皆空名無著行菩薩成就難得善根名難得行説法授人成物軌則名善法行二諦非如亦非非相名真實行記此正釋別教菩薩十種行門之妙義依稀儼似十波羅密況菩薩利物決不逾斯故以十義而消釋也言十行者一施行謂邪附法興若修檀時未達法空即為邪動今初行菩薩從空入假始證假有之法本空雖入俗利生以布施行攝諸衆生捨身命財無畏法施恣意行檀不為無常苦等諸邪所動其心歡喜故以施而釋歡喜也二戒行謂以戒法利人常時化令得益故云饒益行三忍行謂內修忍行外受捶打辱事乃至身為大地任衆生之所履唯自謙卑恭上敬下違來依納逆來順受故名無違逆行四進行謂發大勇猛行大精進俱令衆生得二涅槃當以如來滅度而滅度之不令有人獨得滅度其精進修行若斯故名無屈撓行五禪行謂修定持心無明伏而不動則不昏不亂故名無癡亂行六慧行謂心心慧照念念覺生常不離佛無時不現故云善現行七方便行謂以人法二空方便空諸執著我及我所二俱無有故云無著行八願行謂依四弘誓運大慈悲與樂拔苦所願如心成就一切難得善根故名難得行九力行謂具加持力依三軌式説法授人示教利喜令人信解領受三輪清淨善成軌則故名善法行十智行謂若身若口若意三業如智慧行所言如所行言行相符無有虗誑故名真實行言二諦非如非非相者須知如是真諦非如是俗諦今十行滿足但中近顯故雙非空有別彰一中真實耳二附釋種性亦云性種性用從空入假觀見俗諦開法眼成道種智注性種性者假觀分別十界差別種性也記謂十行菩薩從空入假分別十界中種種性種種欲悉能分別不謬名性種性注從空入假觀者觀經疏三云若住於空與二乘何異不成佛法不益衆生是故觀空不住於空而入於假知病識藥應病授藥令得服行故名從空入假觀文記此釋從空入假觀初句標名次觀經下引古釋義如妙宗鈔云先斥住空墮二乘地若修假觀能成佛法能益衆生觀空作入中方便故於空智證而不住三界惑執須蕩令空諸法因緣須究本末見思重數如塵若沙以大悲心遍觀遍學故名知病諸法諸門破性破相一一對治無不諳練是名識藥隨惑淺深知機生熟神通該動智辨宣揚四悉當宜各令獲益如此授藥方肯服行皆由證空入假故觀名從空入假也注道種智者觀音玄下初云能知一切道種差別則分別假名無謬故名道種智文記玄記云空智總達諸法無生不能別知諸法緣起故不能用佛道法發衆生善種假觀能爾名道種智注諸文云十住修空斷見思十行修假破塵沙十向修中伏無明此以觀對位也若云初住斷見二住至七住斷思八九十住斷界內塵沙十行斷界外塵沙此斷惑分齊也四念處四云十住斷界外上品塵沙十行斷中品塵沙十向斷下品塵沙文言三品者生無生八門為上品無量四門為中品無作四門為下品此以惑從教也以別是界外教或純用假觀攝故備此料簡諸文説斷塵沙參差之故由以觀對位斷惑分齊以惑從教三種不同補純用假攝者三觀攝教也空攝藏通假攝別中攝圓別教雖三具修而空觀無異藏通證道同於圓教唯有空假正屬別教也又十住傍修假十行正修假十向雖修中觀猶以假為方便故純假觀攝也有師標云以惑從教者謂以塵沙惑從於別教也然別教先破見思後破無明何獨以對塵沙故云是界外教蓋界內藏通二教不論斷塵沙唯別教四門遍學遍斷塵沙故非不修空中而純用假觀攝者此也注又此十行明橫學四且無作四門為圓為但若圓無作十行位淺尚未修中如何能説以此化他耶若謂但中釋籤五初云各附彼教而為相狀文既附彼圓豈應是但雜編五十四云十向圓修可由實道智轉行融乃修圓中十行無作且順權方只是但中無作良以修中之位已深出假之位當淺位深故知昔日化他無非妙行位淺故知將來自行亦是但中不可以實難權以他妨自文其説切當學者知之附彼圓教但為明於無作相狀能附豈可全同深位備此節料簡十行位中橫學四教中所學之無作也謂圓中無作非別十行淺位所能説也若係但中無作又違釋籤附圓相狀之説此雙難也雜編下釋難意謂別教十向修中觀位既已智轉圓修可以説由實道別教十行修出假位既是化他無作自應且順權方只此且順權方四字二難俱解一解以實難權蓋無作名同而義有別不可以附圓而不應是但也二解以他妨自蓋十向修在自十行學為他不可以化他但中妨自修圓也將來自行亦但中者別行位淺所學無作全依但中故由此時以望將來所有自行智亦但中耳釋籤明附圓相狀者節義云十行中明生滅依彼藏教為相狀乃至明無作附彼圓教為相狀既言附圓則能依但中豈可全同所依圓中耶義學雜編六卷淨覺法師所述補言但中無作者如苦不能惱集不能染出空有二邊之外天然之理不假造作也注然此出假若果但中圓機起時何以赴之當知圓機自感圓應十行出假乃教道説無稽之問不足評矣記此明十行出假不能應圓機為難謂十行出假約教道判本不應於圓機也末二句是斥辭三十向二初正明十位次明十回向者注四教義四七云此十通名回向者回事向理回因向果回己功德普施衆生事理和融順入法界故名回向記此明回向得名之所以也儀文一句釋徵注文引文正釋四教義云菩薩深觀如來藏破無量取相破無量塵沙破無量無明破無量身相受相心相法相知無量病識無量藥作此觀時即入十回向位回因向果回事向理回己濟他名回向也注四念處三十一云別向圓修文霅川云可由實道雜編但不合云只緣被接方曰圓修此據得意者智轉行融及證道説也若三觀次第唯修但中據不得意者及教道説也補此節引諸文而證釋也四念處十住修性念處觀十行修共念處觀十回向回別向圓修緣念處觀故云別向圓修也有師標云得意者乃得佛意也淨覺謂被接方能圓修不知別教得佛意者十向自能圓修若定言被接別教無智轉行融得意人耶故原注以不合點之若不得意者十向唯修但中也一救護衆生離衆生相注以無相心常行六道而入果報不受而受名救護衆生離衆生相記此下十段正釋義也謂以無相心行六道即不受義入果報即受義到處度生心常無相名救護衆生離衆生相也二不壞注觀一切法有受有用念念不住名為不壞補言一切者不出空有以凡夫受用於有二乘受用於空俱屬可壞也今者念念不住二邊可壞之相而於中道受用歸向中道不可壞之性故云不壞也三等一切諸佛注三世佛法一切時行名等一切諸佛記言一切時行者謂一切時中依三世佛法而行所謂運無緣慈度有情界是也四至一世處注以大願力入一切佛土供養一切佛名至一切處記願即法門誓學佛道誓成願也欲成佛度生必須親近諸佛廣修供養名至一切處也五無盡功德藏注以常住法授與前人名無盡功德藏記言常住法者即不生不滅無起盡之理此理含藏一切大乘功德普應隨機無有窮盡名無盡藏六入一切平等善根注行無漏善善而不二名入一切平等善根記言無漏者即不漏落于二邊之善也善而不二即中道之善也謂菩薩萬善齊修心中了了而無一絲罣礙故言無漏不二也據十向修圓中修一善即修無量善名入一切平等善根補據經云行善無漏善而不二何者衆生機多不可獨用一實而行化故兼二邊之機相善即有邊無漏善即空邊今菩薩智轉行融即空而有即有而空是名入一切平等善根也七等隨順一切衆生注以觀善惡無二一相名等隨順一切衆生記蓋衆生所起心念無量此位菩薩緣修中觀觀諸善惡性非有二即是中道一相名等隨順一切衆生補菩薩正修圓中實相無相故無凡夫有漏善惡之二相亦無二乘偏空涅槃之一相既平等普觀隨順實相無非佛因咸皆趨向究竟佛果故名等隨順一切衆生也八真如相注心得自在等三世佛常照有無名真如相記謂菩薩以中觀心隨順實相出入同佛即寂即照照有即不變隨緣照無即隨緣不變名真如也補不為二邊動亂故得自在無妄曰真不異名如乃三世諸佛安住之處菩薩常照有無即真如相故名真如相也九無縛無著解脫注以般若照三世諸法是一合相名無縛無著解脫記般若是即理之智三世諸法是即智之理理智合一無能照所照孰為縛著耶補般若是智三世諸法是境三世約豎諸法約橫一合相者即佛大總相法門若境智不忘猶為縛著今以無緣般若照無相妙境境智一如故名無縛無著解脫也十入法界無量注覺一切法中道無相名入法界無量記謂菩薩覺悟一切皆中道無相一法既圓萬法俱寂名入法界無量補前曰一合相以理為總今謂一切法中道以事為總一切法者即十法界依正假實色心法也此諸事法全理而成具一切造一切即中道無相中道即法界十向菩薩修圓中觀圓融之理相似而顯故覺一切法皆中道無相法界名入法界無量也伏無明習中觀注伏無明習中觀者集解云空假之心既已滿足正修中道第一義觀無明不起忍伏故也記此釋伏惑修中之力也此位是解行終心粗惑已融似中慧淨斷界外下品塵沙伏無明之忍轉強相似之中道也二附釋種性亦名道種性行四百由旬居方便有餘土以上三十位為三賢亦名內凡從八住至此為行不退位注道種性者始正修中故名道能生佛果故名種行四百由旬者約生死處加方便土約煩惱加塵沙約觀智加假觀以此增前為四百也方便有餘土者觀經疏五云修方便道斷四住惑故曰方便無明未盡故曰有餘記妙宗鈔云修方便道者九種行人合生彼土藏二通三別住行二既修空假皆方便道別向圓信所修雖實猶居似道判為方便不生分段蓋除四住約此修斷名方便斷通餘別為有餘也注行不退者化他行滿無退轉也前七住還斷惑證空名位不退後初地去名念不退中道正念二邊莫動記此明行不退也以此十位之大士以其正修中觀相似見中道理了知自他不二因果一致理事圓融所以不著於自而回向於他不著於因而回向於果不著於事而回向於理故能化他行滿而無退轉也前七住下言不能稱為行不退位後初地下言其位超勝亦不稱之為行不退位唯八住至此共二十三人俱得稱為不退位也二聖二初明因二初十地次明十地者注四教義四八云此十通言地者一能生佛智住持不動二能與無緣大悲荷負一切故名為地也文記此言所以得地之功能也初儀文一句標徵注文是引文發明言地有二義一能生二能持瓔珞經云地名為持能持百萬阿僧祇功德故亦名為生能生一切因果故論云生成佛智住持故也一歡喜從此用中道觀破一分無明顯一分三德乃至等覺俱名聖種性此是見道位又無功用位百界作佛八相成道利益衆生行五百由旬初入實報無障礙土初入實所補大經云菩薩聖行滿足即住無所畏地即是初地菩薩離五怖畏謂無死畏無不活畏無惡道畏無惡名畏無大衆威德畏若言不畏貪欲恚癡此內無三毒外無八風則無惡名畏若言不畏地獄等即無惡道畏若言不畏沙門婆羅門即無大衆畏見中道無二死即無死畏也法身常命已顯即無不活畏得入此地具二十五三昧破二十五有顯二十五有之我性我性即實性實性即佛性佛性既顯有感即應故能百界現生利益衆生也又此地具足四德破二十五有煩惱名淨破二十五有業名我不受二十五有報名樂無二十五有生死名常即佛性顯也注捨凡入聖四魔不動到有無邊平等雙照名歡喜地記謂此菩薩既離凡入聖能轉魔界成佛界四魔莫能動也有邊萬法齊彰無邊一塵不立照有不乖無照無不乖有有無二邊平等雙照居然中道第一義天是則前未到而今到寧不歡喜乎補四魔不動者分破無明不為煩惱所動分證法身不為陰魔所動分得常住不為死魔所動百界作佛不為天魔所動注從此用中道觀者四教義四七云從此見佛性發中道第一義諦觀雙照二諦心心寂滅自然流入薩婆若海證無作四諦一實平等法界圓融文記止觀云陰入皆如無苦可捨無明塵勞即菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證此謂無作四諦一實圓融也注破一分無明顯一分三德者無明乃是障中道之別惑無明分破中道分顯法身般若解脫是為三常樂我淨故稱德應知初地所破無明細分三品中上雖破猶在回向後心至三品盡方入初地記無明翳乎法性是障中別惑也三德如金光明玄義云法名可軌諸佛軌之成佛經云諸佛所師法也身者聚也一法一切法無有缺減故名身經云我身是一切衆生真善知識是也般若覺了諸法集散非集非散即覺了三諦之法也於諸法無染無住名解脫此三皆言德者皆有常樂我淨四德也謂法身無二死為常不受二邊為樂具八自在為我身口意三清淨為淨般若任運具四德如智冥真如境故大品云色淨故般若淨例此即得色常色樂色我諸義皆成當知般若具四德明矣解脫四德者諸惡永盡即無常無樂無我無淨皆已盡也衆善溥會即常樂我淨也大經云真解脫者即是如來如來即法身當知解脫同如來常樂我淨也應知下明初地正破下一品注俱名聖種性者據同證論準經必須開等覺性記言同證者即無作四諦圓融中道之理是十一地同所證也所準之經即是纓珞如經云從初地至等覺俱名聖種性注見道位者四教義四七云從初地至佛地皆斷無明但以約位分為三道初地名見諦道二地至六地名修道從七地已去名無學道文初地斷無明別見發真中道故云見道大經云自此已前皆名邪見人也故知兩教三乘別教地前未見中道未斷別見皆名邪見人也此約證道同圓初地即同初住故也記初地名見道者謂發真中道見佛性理斷無明見惑顯真應二身入佛智地是也從二地至六地名修道者斷別惑三界愛智論迦葉聞甄迦琴聲不能自安云三界五欲我已斷竟此是菩薩淨妙功德所生五欲故於是事不能安忍例色愛無色愛亦復如是維摩訶須菩提云同於煩惱不別菩提入於八難不得無難意在於此故從二地至六地通名修道斷此別惑也今以義推二離垢地即侵斷別教欲愛名斯陀含向三明地即別教斯陀含果四炎地別教阿那含向五難勝地別教阿那含果斷別惑欲愛盡也六現前地別教阿羅漢向斷別色無色愛也七遠行地別教阿羅漢果斷別無色愛盡從此名無學道也大經下證初地可名正見人也注又無功用者既至初地不加功力任運流入薩婆若海百界作佛者四教義四八云初發真中道見佛性理斷無明見惑顯真應二身緣感即應百佛世界現十法界身入三世佛智地能自利利他真實大慶故名歡喜地也文輔行七下二十四引瓔珞云初地百界二地千界乃至萬億等界現身亦爾文行五百由旬者約生死處加實報土約煩惱加無明約觀智加中觀實報無障礙土者觀經疏六云行真實法感得勝報色心不相妨故言無障礙文記妙宗鈔云行真實法等者圓教從初別教十向能於諸法稱實觀中也中理今開即感妙報色心不二毛剎相容純是法身菩薩所居實報無障礙土也妙玄云分別言之此實報土在方便土外若即事而真此亦不遠如云觀見娑婆琉璃為地坦然平正諸樓臺觀衆寶所成純是菩薩咸處其中即實報土是也補色心不相妨者色周遍心亦周遍此色即真常之色故不相妨如云因滅是色獲得常色等此乃勝妙五陰法法圓融故也妙玄云華嚴明阿僧祇香華雲不可思議充塞法界者此是菩薩勝妙果報所感五塵呼此為欲界思惑菩薩出入無量百千三昧禪定心塵之法呼此為色無色思惑籤云此中為消界外同體見思故須界外更立三界不然於二乘所斷何別既分內外見思名同故須立思分三界從五塵為名故例如欲界從定地為名故例色無色界故知違理由見感報由思四念處云登地斷別見二地至七地斷別思此亦偏斷之義耳云云至八地已上猶是無色界不可思議六塵以地持解等覺無垢地始得離見清淨禪當知離欲界色無色惑俱至等覺乃盡方是圓義故大經云十地為無我輪惑所轉無我只是見惑若見惑不斷不應至無垢地若見至無垢地者乃圓義耳故義推偏斷是別義也所言偏斷者為對圓伏而説也注寶所者喻分證寂光也記寶所喻寂光者以常寂光淨土乃功德叢林真如庫藏世出世寶無不具足假喻發明猶若寶山今言喻分證者以儀文云初入寶所既云初入是故喻之分以證寂也二離垢地注以正無相入衆生界同於虗空名離垢地記若除諸相而言無相是邪無相即於無相無相乃正以正無相入衆生界終日度生不見有生可度生界同處無法當情名離垢也補不為空有二邊之垢所染故三發光地注光慧信忍習佛之道淨極明生名發光地記仁王五忍疏以三賢為伏忍初地至三地對無漏信忍下中上今上品信位中道無漏之慧轉著名光以習久淨明淨極光通名發光地也四𦦨慧地注順無生忍觀一切法明焰慧地記四五六地對柔順忍以順無生故名曰順蓋約教道七地方對無生忍故仁王云爾𦦨聖覺達地菩薩修行順法忍逆五見流集無量功德住須陀洹疏以四地對下品順忍故今注云順無生忍觀一切法粗得下品忍觀慧發𦦨比前極其明盛名𦦨慧地也五難勝地注順忍修道三界無明莫不皆空名難勝地記仁王經云勝進達菩薩於順道忍以四無畏觀那由他諦內道論外道論藥方工術故曰我是一切智人滅三界疑等煩惱故集無量功德故即斯陀含疏以五地對中品忍故曰順無生忍修道三界無明皆空下地所不及名難勝地也補三界乃界外之三界以塵沙是方便土之無明無明是實報分證寂光之無明今至五地順無生忍而修佛道方便塵沙已盡即實報分證寂光無明亦分盡故曰皆空六現前地注上順諸法觀於三世寂滅無二名現前地記仁王云常觀真實住順忍中作中道觀盡三界集因集果一切煩惱盡故乃至證阿那含疏以六地對上品忍故云上順諸法即順諸法上品無生忍故觀過現未起滅無二當下寂滅寂滅境相常時現前曰現前地也七遠行地注觀諸煩惱不有不無常向上地念念寂滅名遠行地記仁王云玄達菩薩十阿僧祇劫修無生法樂忍滅三界集因集果住後身中無量功德皆成就無生智盡智五分法身皆滿足故即阿羅漢梵天位疏以七地對下品無生忍故曰觀諸煩惱不有不無即是以中道觀觀之為不有不無第一義諦也由居下品無生忍所以常向上地由觀法無生故所以念念寂滅是則從功用邊造至上地名遠行地也八不動地注以無生觀捨於三界名不動地記仁王疏八地對中品無生忍故曰以無生觀捨於三界當知三界乃有為動作之地既入無為寂滅不為動之所動名不動也九善慧地注入於上觀光光佛化無生忍道名善慧地記仁王疏九地對上品無生忍故曰入於上觀光光佛化無生忍道當知此道具足辨才現身如雲説法如雨名善慧地也補菩薩一一世界學佛化度無明將盡智慧轉增故名曰光光光者念念也佛者覺也覺無生之理也即以此道覺悟衆生故名佛化等能以此利他此慧之善者十法雲地注入中道觀受佛職位既同真如亦等法界法雲普覆名法雲地記仁王疏以此得菩薩果名寂滅忍故云入中道觀受佛職位既等不妄不變之真如亦同交徹融攝之法界唯以妙法慈雲遍覆涅槃果海名法雲地也已上九地地地各斷一品無明證一分中道備辨訛云明十地將相宗寄位明十地引來相宜初二三地寄同世間初地布施二地持戒三地精進此三種世間亦修故也四地寄同初果與注中無生觀相宜五地寄同四果與注中三界無明莫不皆空相宜六地寄同緣覺與注中觀三世寂滅相宜七地寄同菩薩八地去方入無功用位寄顯一乘三世寂滅者正與緣覺還滅三世十二因緣是同第八地而云捨於三界者約頓悟菩薩論而論中明頓悟菩薩八地始受變易若是漸悟初地論捨補佛從真如法界生真如法界一體異名即中道寂滅之理菩薩入此觀故受佛職二等覺更斷一品無明入等覺位亦名金剛心亦名一生補處亦名有上士注於十地後心用觀更斷一品方入等覺記十地皆有初中後三心今於第十地後心用觀斷十一品無明方入等覺也注四教義四十四云即是邊際智滿入重玄門若望法雲名之為佛望妙覺名金剛心菩薩亦名無垢地菩薩三魔已盡餘有一品死魔在斷無明習也文集解云解入百千三昧照一相無相寂滅無為望於妙覺猶有一等比下名覺故名等覺所修觀智純一堅利喻若金剛名金剛心文記邊際智滿入重玄門者瓔珞明等覺地百千萬劫入重玄門報修凡夫事謂菩薩將前所修之法重歷一番故曰重玄法雲是種性等覺是覺性故等覺為佛妙覺乃當教極果等覺是當教極因故此望之稱為菩薩以其智慧堅利名金剛心只有一品生相無明在易斷故稱無垢三魔盡死魔在者大論問五陰魔可攝三種魔何以三魔盡死魔在答實是一魔義有四種煩惱魔人因貪欲嗔恚故死作奪命因緣別為一種天魔福德力勢大邪見力能奪慧命亦能作死因緣別為一種無常死力大無能免者甚可畏厭別為一種是為義有四也又論云得菩薩道破煩惱魔得法性身破五陰魔得道得法性身破死魔常一心故一切處心不著故入不動三昧故破他化自在天魔此等覺菩薩尚未得道得法性身故死魔在也次引集解釋謂此菩薩發廣大智解造入百千三昧於三昧中照一實相無生死相無涅槃相寂滅現前然以望於妙覺猶有一等名等比下十地之未覺名覺上下望之名等覺也又此菩薩所修觀智純一堅利堅故不為諸物壞利故能壞一切物喻若金剛故其觀智名金剛心問別教何故法雲後更有金剛等覺耶經論止明十地行滿便成佛果南北諸師靜論此義答更立等覺未足為疑華嚴經明法雲地功德智慧比佛如爪上土方大地若爾雖説一品無明而實不可説品何以得知後心菩薩無功用道其疾如風一日間能破無量品無明障惑何況瓔珞經明等覺地於百千萬劫入重玄門報修凡夫事故開法雲更立金剛心等覺於理無失補止觀云三不應前盡一不應獨餘此乃別教方便説耳輔行云三魔已過者此瓔珞教道説也若從實説過則俱過問雖曰方便亦必有説何以消釋經文答大集經云若能觀法如幻相者能破陰魔若諸法悉是空相壞煩惱魔若見諸法不生不滅能壞死魔若除憍慢則壞天魔又云知苦壞陰魔離集破煩惱魔證滅壞死魔修道壞天魔等覺既到無功用後邊邊際智滿入重玄門三魔已盡所證未窮餘死魔在又十地莫窮其邊際故等覺邊際智滿注一生補處者猶有一品無明故有一生過此一生即補妙覺之處觀音玄記上四云猶儲君之義也妙宗上二十三云有惑可斷名有上士文記言一生補處者以無明未盡猶有一品生相在也若能以金剛觀再破一品無明名過一生即可補入妙覺佛果之處矣言猶儲君者如王太子將紹南面先且暫儲東宮故云儲君也有上士者以等覺乃因位非果位也其上猶有妙覺極果在不得稱為無上故云為有上士也二明果二初成等正覺更破一品無明入妙覺位坐蓮華藏世界七寶菩提樹下大寶華王座現圓滿報身注四教義四十五云金剛後心朗然大覺妙智窮源無明習盡名真解脫翛然無纍寂而常照名妙覺地文記此明別教極果成佛之相注是引文釋成初三句明智德圓次三句明斷德圓末二句謂寂即妙照即覺也注藏者包含十方法界悉在中也文記經云華藏世界海有十不可説佛剎微塵世界種一一種各有二十重世界是也注七寶菩提樹者七寶衆多表無量故大寶華王座者妙玄七十二云或言寂滅道場七寶華為座身稱華臺千葉上一一菩薩復有百億菩薩如是則有千百億菩薩十方放白毫及分身光白毫入華臺菩薩頂分身光入華葉菩薩頂此名受法王職位窮得諸佛法底而得成佛華臺名報佛華葉上名應佛報應但是相關而已不得相即此是別佛果成相也文記寂滅場見初卷注七寶華為座者華嚴經云其華廣大量等百萬三千大千世界以衆寶華間錯莊嚴乃至云毗琉璃摩尼寶為莖栴檀王為臺瑪瑙為鬚閻浮檀金為葉其華常有無量光明衆寶為藏寶網彌覆十三千大千世界微塵數蓮華以為眷屬乃至菩薩坐此華座身相大小相稱無量菩薩坐餘蓮華為眷屬十方佛從眉間出清淨光明名增益一切智神通無數光明以為眷屬普照十方一切世界右繞十匝乃至示現種種莊嚴事從大菩薩頂上入其眷屬光明亦各入彼諸菩薩頂此菩薩得先所未得百萬三昧名為已得受職之位入佛境界具足十力墮在佛數也末結圓滿報身如云若始坐華臺眷屬菩薩悉坐華葉十方諸佛放眉間光入華臺頂諸佛眷屬放眉間光入華葉頂華臺菩薩三昧受職成於報身佛華葉菩薩成應身佛此大緣見勝故現圓滿報身佛也二轉大法輪為純根菩薩衆轉無量四諦法輪即此佛也注純根菩薩者迷中重故次第修證迂通寶所對圓名鈍補初地能分身百界具轉四教法輪此中但言無量者由別人中道之迷重故因中依無量四諦而修故果上亦轉無量四諦法輪所謂約説始終屬教者此也三別示隨機二初正明隨機三初點示教道有經論説七地已前名有功用道八地已上名無功用道妙覺位但破一品無明者總是約教道説注華嚴云菩薩未至第八地時如人乘船欲渡大海未至大海多用功力若至八地從大方便近佛智慧無功用心不加工力記此下料簡經論判位有通別圓之不同本節之文屬別教也如華嚴八地文云譬如有人夢中見身墮在大河為欲渡故發大勇猛施大方便以大勇猛方便力故即便覺悟既覺悟已所作皆息菩薩亦爾見衆生在泗流中為救度故發大勇猛起大精進以勇猛精進故至不動地既至此已一切功用靡不皆息注妙覺位但破一品無明未審據何文説補此是玉師斷説肇師云出楞嚴三昧經文云首楞嚴定非初地乃至第九地所得唯十地乃能得之既十地方得則轉入佛地但破一品無明也注諸文但云斷十二品稱為妙覺也記別教果頭齊圓二行進前三行則不知名故知約教道説於等覺斷十一品無明外更破一品是為但斷十二品稱為妙覺也二借別名通有處説初地斷見二地至六地斷思與羅漢齊者此乃借別教位名名通教位耳注至六地斷思與羅漢齊者取十度義以第六般若空慧斷惑故也如止觀第六借位中云云記此節正屬通教也初地斷見等前七卷引言取十度義者是取釋籤便也以十度中第六般若乃入空之慧斷惑若盡與羅漢齊至第七方便般若出假化用故也如止觀者文云舊曰六地思盡齊羅漢是也注十度者六度外加願智力方便三借別名圓有云三賢十聖住果報唯佛一人居淨土此借別教名明圓教位也注三賢者別住行向住果報土義則屬圓此仁王經偈文記此節文明屬圓教也仁王疏云三賢即地前三十心十聖即十地菩薩此四十心同生華藏果報土非藏通教中果報若藏教是凡聖同居若通教唯生有餘化城土今言果報即別圓教人得無障礙生無障礙土問此中三賢是別是圓答是圓問圓教合生常寂光何故生華藏答華藏之中別圓共生以是因非果不得生寂光土故華藏土中有別教十地圓教四十心共生也妙覺極果毗盧遮那唯獨一人生寂光淨土問前三土中亦有淨土何故寂光獨擅其名答凡聖同居聖少凡多是穢非淨方便有餘但除見思未斷無明偏真之淨非是真淨華藏世界帶別方便未為純淨寂光無此諸過獨擅淨土名也又義例云有言此兼兩教圓教三賢別教十聖喻曰言果報者是實報土既生果報即是圓教四位人也此師但見賢聖之名便分別圓兩教賢聖之稱乃借別明圓但生實報即是正明圓位若言別教賢聖位不合生彼而判十地屬別者圓四十位俱破無明因何乃分十地屬別又約證道地即是住何須分別縱存教道則十地以含兩教亦無分義二勸審斷證如此流類甚衆須細知當教斷證之位至何位斷何惑證何理往判諸教證位無不通達注此乃觀師示人判教之方能知此者不但別門可通於一切教皆無壅矣記觀師者即高麗法師也言觀師以此示人必須細詳本教中斷惑證理當在何位何位斷幾惑何位證何理然後往判諸教諸位無有不昭然矣三結略明別教竟注此教明縱橫者別論不出性橫修縱因縱果橫通論因果各具縱橫性但有橫修具縱橫記此總標別教通別兩論修性因果縱橫也別論者性修一對因果一對通論者性修因果合論也注初性橫修縱者妙句九云若但性德三如來是橫修德三如來是縱前後而得先法次報後應亦是縱一性二修記九云性德之名名通別教別教雖有性德之語三皆在性而不互融故成別義若三在修前後而得道理成縱又妙宗云別人不知本覺之性具染惡德是故染惡非二佛性別修緣了顯本法身修縱亦為不知本覺之性具染惡德不能全性起染惡修乃成理體橫具三法性橫記此別釋性橫修縱也初引文句正示性橫修縱次引句記釋成後引外宗重明性一為橫修二為縱釋籤明別教三德云別教法身為惑所覆良由不知本覺之性具染惡德是故染惡非二德也故別惑通惑業識事識煩惱結業三乘六道變易分設此等一切迷中二法非二佛性既非佛性則成定有能覆之惑應須還用隨緣覺性別緣真諦及以俗中次第別修空假緣了或中邊緣了種種二因或初緣次了或初了次緣次第翻破一切迷法顯於法身本覺之性是故覆理成於縱義又云別人理體具足而不相收亦為不知本覺之性具染惡德不能全性起染惡修乃成理體橫具三法也注次因縱果橫者光明記一云行智理三次第資發修時縱也法報應三果中齊顯證時橫也補光句記云相資為論行資智智資理理顯故能盡衆苦苦盡故法身顯智圓故報身顯功德無上故應身顯注良田此教本有法身為惑所覆故須別作緣了之功於資顯發復由此教性具三法而不相收故使三身橫顯此指修縱只是因縱性橫成於果橫修性因果相對別論也記此別釋因縱果橫也光明記云修時縱證時橫者即今因縱果橫論也良由下釋成釋籤云應知覆義不同泥土覆彼頑石既覆但中佛性之理如善人為惡人逼令作衆惡故説善人為惡人所覆地既此本有法身為染惡覆成於迷中之法故須別作緣了之功於資顯發故論修成縱也又云以其三法定俱在性皆是所發猶如三人各稱帝三何能相攝是故不知性中三法二是修者二乃成橫也此指下結明修縱性橫成因縱果橫注次因果各有縱橫者文句二云別家因時三法縱橫果時三法亦縱橫因縱如向因橫即性橫也果縱如妙玄九云法身本有般若修成解脫始滿果橫亦如向説須知此教因果三法次第即縱各異即橫妙玄五云資成在前觀照居次真性在後此三豎別縱非大乘此三並異橫非大乘記此釋通論因果各具縱橫初引文句通示因果三法縱橫然是所破為今所示也因縱如向者行智理次第資發修時縱也因橫即性橫者若但性德三如來是橫也果縱如妙玄者意明三德次第而成故成果縱也果橫亦如向者光明記云復由此教性具三法而不相收故使三身橫顯也須知下勸知別教因果三法縱橫義妙玄五下證釋末四句結成圓義與別全然不同意明圓教因果三法不縱不橫不並不別此別教三法豎別為縱並異為橫也注次性但有橫修具縱橫者性橫如上性中三法未論起修無前後故則無縱義凡言修者通因通果因果既其各有縱橫修任運有也備義見九卷廣明今以圖示修性因果縱橫圖四圓教三初標次明圓教者注四教義一三云圓以不偏為義此教明不思議因緣二諦中道事理具足不別但化最上利根之人故名圓教也文記此明圓教得名之所以也儀文一句標示注文引釋玄義云不思議不生不滅十二因緣者為利根人即事顯理是也補一念三千即空假中不思議二諦者妙玄云但點法性為真諦無明十二因緣為俗諦籤云無明迷真之始法性全指無明無始時來奚嘗非真未發心前無真不俗只點一法二諦宛然俗則百界千如真則全居一念又三千外無實相即俗恆真事造即理具實相外無三千即真恆俗理具即事造故曰理具事造兩重三千同居一念注又云圓教詮因緣即中道不思議佛性涅槃之理菩薩稟此教門理雖非淺非深而證者不無淺深之位今明入道亦具四門而諸大乘經意多用非空非有門以明位也文記因緣即中者大經云因緣明佛性者無明愛取是煩惱道煩惱即菩提菩提通達無煩惱煩惱既無即究竟淨了因佛性也行有是業道業即解脫解脫自在緣因佛性也名色老死是苦道苦即法身法身無苦無樂名大樂不生不死是常正因佛性也故言無明與愛是二中間即中道無明是過去愛是現在若邊若中無非佛性常樂我淨無明不生亦復不滅名不思議不生不滅因緣也菩薩證理有淺深者理絶修證智似階差也注釋籤五二十云圓教菩薩以界外滅諦為初門文二釋二初名義功用二初釋名義圓名圓妙圓滿圓足圓頓故名圓教也此釋圓明注三諦圓融不可思議名圓妙三一相即無有缺減名圓滿圓見事理一念具足名圓足體非漸成故名圓頓記三諦圓融名圓不可思議名妙三一相即為圓無有缺減故滿圓見事理名圓一念具足為足教體本周名圓非漸次成故頓補通則四名俱通初後別則滿唯局後妙足頓三且在初以色心本妙萬法具足頓解本成故後惑盡德始滿也二明功用所謂圓伏圓信圓斷圓行圓位圓自在莊嚴圓建立衆生此釋圓法注圓伏五住圓常正信圓斷五住圓行一行一切行圓位位位相攝妙用莊嚴故云自在四悉普益故云建立如止觀一三記止觀云圓信者信諸法即空假中無一二三而一二三無一二三是遮而一二三是照無遮無照皆究竟清淨自在聞深不怖聞廣不疑聞非深非廣意而有勇名圓信圓行者專求無上菩提即邊而中不餘趣向三諦圓修不為無邊所寂有邊所動不動不寂直入中道名圓行圓位者入初住時一住一切住一切究竟一切清淨一切自在名圓位圓自在莊嚴者或於此根入正受或於彼根起出説或於一根雙入出或於一根不入出餘一一根亦如是或於此塵入正受或於彼塵起出説或於一塵雙出入或於一塵不入出餘一一塵亦如是乃至或於此方入正受或於彼方起出説云云若委説者只於一根一塵即出即入即雙入出不入出於正報依報亦如是輔行云一心三諦為所嚴一心三觀為能嚴於依正二報無不自在故正受空功德出説假功德雙入出不入出中功德圓建生衆生者或放一光能令衆生得空假中益得入出雙入出不入出益歷行住坐臥語默作止亦如是補菩薩內自通達即空假中不動法性而令獲種種益得種種用名圓力用建立衆生問莊嚴建立有何差別答並是不思議一心三智能莊嚴法身名莊嚴外益於彼名建立法華云定慧力莊嚴以此度衆生度生即建立也補圓斷者不斷而斷五住惑斷開佛知見住大涅槃故名圓斷也二按經顯位二初總指諸大乘經論説佛境界不共三乘位次總屬此教也注一代教中唯除鹿苑顯露無圓諸大乘經凡説圓法皆佛境界也不共三乘位次者揀異別教不共二乘今圓是佛乘故不共三乘也記此教説佛境不共三乘者如經云唯有一乘法無二亦無三又云不令有人獨得滅度皆以如來滅度而滅度之是也二別釋二初正顯位次二初通列諸經二初正列法華中開示悟入四字對圓教住行向地此四十位華嚴云初發心時便成正覺所有慧身不由他悟清淨妙法身湛然應一切此明圓四十二位維摩經云薝蔔林中不嗅餘香入此室者唯聞諸佛功德之香又云入不二法門般若明最上乘涅槃明一心五行又經云有人入大海浴已用一切諸河之水又娑伽羅龍澍車軸雨唯大海能受餘地不堪又搗萬種香為丸若燒一塵具足衆氣注開示悟入如前釋記謂十住破無明開如來藏見實相理名開十行惑障既除知見體顯法界衆德顯示分明名示十向障除體顯法界分明事理圓融更無二趣名悟十地事理既融自在無礙流注任運從阿至荼入薩婆若海名入注初發心者三因性開發即初住位二住已去莫不皆然故結云圓四十二位記三因性發即初住者觀經疏云分證佛者初發心住一發一切發發一切功德發一切智慧發一切境界不前不後亦不一時鈔云住名發心發本覺心也常寂常照寂照雙融是本圓覺即一而三不發而發故成三發皆言一切者法界無外攝法不遺諸佛衆生色心依正同一覺體全體為緣全體為了全體為正緣因發故了正亦發了因發故緣正亦發正因發故緣了亦發蓋三法圓融發則俱發緣發名功德能資成故了發名智慧能觀照故正發名境界是所顯故當知初住既爾後四十一位無不皆然注薝蔔等者薝蔔翻黃華觀衆生品天女訶身子之文淨名空室表常寂光記薝蔔西域近海岸樹金翅鳥來即棲其上維摩經云舍利弗問天女汝於三乘為何志求天曰以聲聞法化衆生故我為聲聞以因緣法化衆生故我為辟支佛以大悲法化衆生故我為大乘舍利弗如人入薝蔔林不嗅餘香如是若入此室但聞諸佛功德之香不樂聲聞辟支佛功德之香也末句是輔行文引表經旨如輔行云淨名空室表常寂光是故入者唯嗅佛乘注入不二法門者彼經三十一菩薩各説入不二法門已問文殊師利何等是菩薩入不二法門文殊云如我意者於一切法無言無説無示無識離諸問答是為入不二法門於是文殊師利問維摩詰我等各自説已仁者當説何等是菩薩入不二法門時維摩詰默然無言文殊嘆云善哉善哉乃至無有文字語言是真入不二法門文須知三十一菩薩乃以有言言於無言文殊乃以無言言於無言淨名乃以無言無言故文殊歎云是真入不二法門也記華嚴疏云然此經意前後相成共顯經旨若辨優劣或三重四重三重者一諸菩薩以無二遣二以言顯説似有不二可説對二明不二非絶待也二文殊以言遣言明無不二可説令忘言會旨三維摩無言顯理謂本自無言不待更遣是為三也言四重者文殊以言印彼又明言即無言若欲合者前後三段反覆相成但為一義初文殊以言顯無言次淨名無言印無言後文殊以言印無言三段二人共顯絶言之理前三十一菩薩以無二遣二後二大士以無言遣言但有二節若更合者若無諸菩薩以言遣二空有絶言何由顯理是則前諸菩薩假言顯理後二大士以無言顯理言與無言雙忘皆真不二矣故雖三節一致無違是則皆成圓教法門也注般若明最上乘者金剛經云如來為發最上乘者説涅槃云復有一行是如來行所謂大乘大般涅槃佛性之理記言最上乘者謂四教有十六門門門有無量行所謂藏不如通通不若別別何似圓是以圓教法門為最上乘也言一心五行者聖行品文疏標不次第行為三一標行名謂復有一行二人謂如來以如來因行即因人也三法謂大乘大涅槃經大乘即圓因涅槃即圓果即因而果具足無缺是為一行一切行也補大論云從初發心常觀涅槃行道當知亦不出一心照十法界即空假中即空聖行具足即假梵病嬰兒行具足即中天行具足是為一心五行一行一切行也注又經云者大經云譬如有人在大海浴當知是人已用一切諸河之水輔行一上二十七云理具諸法如海水修觀行者如在浴也行攝一切名為已用文記大經云菩薩亦如是修習如是金剛三昧當知已為修習其餘一切三昧輔行下引釋經譬意明修習即理之圓行具足一切諸行猶如浴海已用諸河水也注娑伽羅此翻鹹海如來龍王圓頓教雨為上根性不雨三教下類之地記此釋重引華嚴雨車軸雨等文法譬俱可知也注首楞嚴云搗萬種香為丸若燒一塵具足衆氣文輔行一上二十七云理性如丸觀行如燒諸法頓發名具衆氣文記此引經以譬圓教之行門所謂一行一切行一修一切修一成一切成也輔行下引法合譬可知二結成如是等類並屬圓教記此結文之所歸屬也言如是者指確之辭也等類者猶言同流也謂承上法華華嚴淨名涅槃及首楞嚴等文義莫不同歸圓教之所攝也二別依二經二初標名顯位今且依法華瓔珞略明位次有八一五品弟子位外凡出法華經二十信位內凡三十住位聖初四十行五十回向六十地七等覺是因位末八妙覺是果位注法華但有五品六根瓔珞具明五十二位妙樂三四云若云圓位六即亦足何須更列四十二耶以分真位長故借別位分其品秩文或者據此謂圓教本無位次但借別顯圓然妙樂意以五十二位在經論中多被別人祖師用釋圓位故云借耳又有云五十二位名雖在別圓亦同用以分淺深豈可圓教全無位次大品四十二字華嚴初住八相法華五品六根皆圓義也故曰顯一理則始終無二存諸教則因果歷然既稟教修行安得無位耶記妙玄云平等法界尚不論悟與不悟孰辨淺深既論悟不悟何妨辨淺深籤云約理則證法無名約事則不無諸位故知悟即初住未悟即住前既許有悟不悟何妨論於淺深成五十二位耶是則圓教亦有淺深何言本無位次四十二字者補注頌云阿囉波遮那邏陀婆茶沙和多夜吒迦娑磨伽他闍簸馱奢呿叉哆若拖婆車魔火嗟伽他拏頗歌醝遮吒荼華嚴初住八相解見前文法華五品六根者分別功德品明如來滅後五品觀行位法師功德品明六根清淨位如是等經義皆明圓位也補妙玄云有言圓教頓悟一悟即佛無復位次之殊説十地者為鈍根耳如思益云如此頓悟妙理之學不從一地至一地又有云圓教既是頓悟初心一悟即究竟圓極有四十二位者為鈍根方便立淺深名耳又引楞伽云初地即二地二地即三地寂滅真如有何位次耶已上悉皆偏釋而不知法界平等尚不論悟與不悟孰論淺深既論悟否焉得而不辨哉檢大乘經明理究竟無過華嚴大集大品法華涅槃雖明法界平等無説無示而菩薩行位炳然故還約七位以明圓教之位也注又揀諸文開合有四一開前合後如大經三十三天住行向為三十地等妙為三二合前開後如仁王十四般若合三十心為三十地為十等覺為一總十四忍轉入佛心名之為智三前後俱開如大品四十二字對四十二位四前後俱合如法華開示悟入及遊四方對四十位妙宗上二十三記一開前合後下指大經然大經前後各處稱三十三天疏中並不對位唯二卷云如人遠行中路疲極寄止他舍臥𥧌中大火卒起即時驚窹作自思惟我今定死無疑即便命終生忉利天疏開六親義謂遠行譬理觀中路譬名字觀寄止他舍譬觀行觀即時驚窹譬相似觀生忉利天譬分真觀起此譬兩成就三十二臣即分真義若就一主即究竟義今凖是義開前合後對四十二位也然妙玄云大經明三十三天不死甘露將臣共服此譬諸位開前為三十心合十地為一等覺為一譬三十二臣喻因位妙覺為主喻果位君臣同服甘露因果俱證常樂若不以圓位釋之此文難會也二合前開後下仁王經教化品云是諸佛菩薩本所修行五忍中十四忍具足謂信忍止忍堅忍善覺忍離達忍明慧忍炎慧忍勝慧忍現忍遠達忍等覺忍慧光忍灌頂忍圓覺忍是也又云五忍是菩薩法伏忍上中下信忍上中下順忍上中下無生忍上中下寂滅忍上中下名為諸佛菩薩修般若波羅密乃至云是諸佛菩薩本所修行五忍中十四忍疏云略即五忍廣即十四謂三賢是三十地乃佛地成十四今合前開後對圓位四十二也三前後俱開下指大品説四十二字後結云一字皆入四十二字四十二字亦入一字南嶽用表四十二位初阿字表初住乃至後荼字表妙覺故云過荼無字可説故今前後對圓家四十二位也四前後俱合下指法華云諸佛世尊欲令衆生開示悟入佛之知見譬喻品云諸子是時歡喜踴躍乘是寶乘遊於四方天台於是二文皆對住行向地今前後俱合對四十位也妙宗下指證四句文云用彼大經月愛喻十五日月對四十二圓因果位皆智光增惑暗減初之三日對住行向三十位初四至十三日對十地十四日對等覺十五日對妙覺合前三十開後十地也若三十三天同服甘露對四十二位皆證常理開前三十位對三十三天合後十地用對一天等覺對一天妙覺極位用對一天也若四十二字字字互具四十二字對圓證四十二位位位相收前後俱開也開示悟入佛之知見對圓真因四十位者前後俱合也是則與今大同小異今舉十四般若明合前開後舉妙宗亦明合前開後是為小異也注又稜嚴明位有六十前加三漸次名字即及立乾慧地觀行即向後地前立四加行并常五十二位共成六十記楞嚴經云云何名三漸次一者修習除其助因二者真修刳其正性三者增進違其現業又云欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性圓明鎣十方界乾有其慧名乾慧地又云次成四種妙圓加行即以佛覺用為己心若出未出猶如鑽木欲然其火名為暖地又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地心佛二同善德中道如忍事人非懷非出名為忍地數量銷滅迷覺中道二無所目名世第一地是為四加行也并常所明十信名相似即住行向地等覺名分真即妙覺名究竟即為六十位也略明標名顯位竟
