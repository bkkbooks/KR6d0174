body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢六𠁼菴較訂天台嫡裔比丘諦間編科參梓三祕密教三初標名第三祕密教者注隱密赴機互不相知故名祕密釋籤一二十三云不定與祕並皆不出同聽異聞但互相知互不相知以辨兩異文補同聽異聞者淨名云佛以一音演說法衆生隨類各得解或有恐怖或歡喜或生厭離或斷疑斯則神力不共法是也但彼彼互相知者名不定互不相知者名祕密以辨兩異耳三界可怖即世界悉檀歡喜即為人厭離能治於惡即對治斷疑見理即第一義注若不堪於顯露入者須祕密說備謂如來說法時機有不堪顯露說者於此是顯於彼是密或彼此俱密故須密說以祕密應貼互不相知論也注今對前頓漸顯露即明祕密若大本中先明不定對前頓漸定教為次第也此據說相次第雖爾祕密不定遍前四時初無前後具足應云祕密不定顯露不定今皆略標記今先祕密而後不定大本先不定而後祕密當知俱順其便下明祕密不定除法華聞顯遍前四時元無前後注然祕密之名起自龍樹如釋籤一二十一引大論釋大品經諸天子嘆云我見閻浮提第二法輪轉今轉似初轉問初轉少今轉多云何以大喻小而言似耶答諸佛法輪有二種一者顯二者密初轉聲聞見八萬及一人諸菩薩見無量阿僧祗人得二乘無量阿僧祗人得無生忍無量阿僧祗人發無上道心行六波羅密阿僧祗人得初地乃至十地一生補處坐道場是名為密文故知初見八萬一人屬顯露攝祕密者如次明之記此明祕密之名所自初二句直示起自龍樹夫龍樹乃西天第十三祖圭峰言豪貴家生通四韋陀天地圖讖誦盡閻浮經論自謂一切智人欲謗佛經大龍愍之接入龍宮一夏但誦七佛經目方知佛法深妙悟已還出化國王婆羅門外道無數造論數十部此祕密名出彼所造大論中也諸菩薩見下別釋祕密其中見得二乘藏教人也得無生忍通教人也發無上道心別教十信也行六波羅密別之住行向也得初地乃至十地之別十地也一生補處別之等覺也坐道場者別之妙覺佛果也二解釋如前四時中如來三輪不思議故或為此人說頓或為彼人說漸彼此互不相知能令得益注如前四時中指祕密教橫在四時別無部帙三輪光明記一三十云身業現化名神通輪口業說法名正教輪意業鑑機名記心輪三皆摧碾衆生惑業故名為輪下地不測亦名三密補法數言身名神通輪者謂佛說法先現神通警動衆生機情令生正信也口名正教輪者謂佛說法令衆生翻邪歸正依教修行也意名記心輪者謂佛說法先以意輪鑑知根器利鈍演說無謬也車輪有摧碾之用以譬如來三輪摧碾衆生煩惱惑業也三密者大論云如來身口意三業或現通或說法或思惟皆非菩薩之所思議故名三密一身密謂如來處大會中衆見佛身或黃金色或銀色或雜寶色或長丈六或長一里乃至現大神變皆不可思議也二語密謂佛說法時或一里外聞佛音聲或十百千萬里外聞佛音聲又一會中或有聞說布施有聞說持戒等各各隨身所聞皆不可思議也三意密謂佛常處寂光凡思惟觀察皆不可思議也三業皆非諸菩薩等之所思議故言不測注或為此人說頓等妙玄先約頓漸三說相對次約說默相對各有三義謂此座十方多人一人及俱三相對記三中云此記文義加者即籤文言既俱默俱說互不相知名之為密何妨俱頓互不相知是也補初文於彼是顯二句乃玉師據釋籤之義而加也二中如前一方既爾餘方亦然等文亦玉師所加三中記文義加者乃籤文所加記義加者此說默相對圖中初二兩對玄文未出釋籤曰文略耳既言俱默俱說理合如前頓漸三法相對故此圖依義加補也然妙玄下文曰各各不相知互為顯密雖復如此未盡如來於法自在之力但可智知不可言辨應知如來三輪不思議化難以測度今略判成祕密不定耳注如釋籤云不定與祕並皆不出同聽異聞但有互相知互不相知以辨兩異記聲聞見八萬得法眼淨不見八萬悟大然在聲聞非不定教相是顯露攝若對菩薩所見則成祕密如圖示備有師標曰法眼淨乃十六心眼智明覺見斷惑也十六心解下藏教注此以般若對鹿苑說即鹿苑中密說般若義該三教故云諸菩薩見等也備此釋圖示大論敘相初句總判即鹿苑中下別指密相義該三教者已記前文可知注此約鹿苑聞小證大而說如籤云酪中雖無二別不妨以八萬及一人以辨定不定也備此判成顯露不定非祕密也作此判者以下料簡故注此以法華涅槃對鹿苑說即鹿苑中密說圓常與法華涅槃悟入是同如別行玄記云若八萬諸天獲無生忍故云密去又大疏云利根人於三藏中宜聞常住即聞得解如初轉法輪時八萬諸天得無生忍乃是密教意據此豈可謂同聽生滅耶記此判釋圖示顯密相對初一句總判次二句指聞圓常如別行下指證利人密去大疏下指證八萬得忍也別行玄上云三藏中二意於利根密去於鈍根成酪記釋言三藏但小故無顯露得大益者若八萬諸天獲無生忍故言密去二乘方破見思故但成酪今但證釋密教中利根密去也又大疏曰常住者此非全是六度菩薩應曰利根於三藏中宜聞常住聞即得解如初轉法輪時八萬諸天得無生忍最下既然例餘亦爾乃密教意大疏指涅槃疏據此下凖意反結鹿苑密聞圓常故云豈可謂同聽生滅耶注問鹿苑會上只一八萬諸天何故諸文或定不定顯密有異耶答如來赴機難思祖師釋義非一據諸天得法眼淨即顯露定教如云聲聞見八萬是也據聞小證大即顯露不定教如云八萬諸天得無生忍是也若曰密聞圓常即祕密教如云利人密去是也經意多含不可一準然八萬諸天既是利根密為正意蓋於三藏中宜聞常住故也記此節料揀諸文說教定與不定之有異也據諸天下之文是釋顯露定教指大論以證據聞小證大下之文是釋顯露不定教文中舉玄籤為證若曰密聞圓常下之文是釋祕密教指別行玄記為證備又籤問何妨法華亦與諸教十方一席互為顯密而云法華是顯非祕密耶答十方容有一席定無注且祕密教何以得傳如妙樂一十八云祕密不傳降佛已還非所述故尚非阿難能受豈宏教者所量文蓋因後敘出故可傳耳如妙樂云阿難非不傳祕赴機之祕非所傳耳故祕密所用全是顯教是故傳祕祇名傳顯文此料簡祕密也初二句直問祕密得傳所以如妙樂下舉阿難以況人師不能傳祕所謂祕密非器不傳也蓋下直答可傳之故如妙樂云下明阿難不傳祕義以赴機之祕唯佛與佛乃能傳耳是故人師傳祕者但名傳顯也備此祕密教雖係如來化儀然赴機之祕惟佛與佛能之降此如阿難尚有未能況後學耶三結名故言祕密教四不定教四初標名第四不定教者注蓋一類機宿世於頓有漸種於漸有頓種故今聞小證大聞大證小推功歸教教名不定矣如大經置毒發毒大論八萬諸天得無生忍等皆不定義記大經佛言善男子譬如有人置毒乳中乃至醍醐皆悉有毒乳不名酪酪不名乳乃至醍醐亦復如是名字雖變毒性不失遍五味中皆悉如是若服醍醐亦能殺人實不置毒於醍醐中妙玄謂此譬兩用一通約漸頓明不定處處皆得見佛性也二約行明不定行人心行譬乳實相智譬毒毒能殞命智破無明久遠劫來說實相毒置於凡夫心乳毒慧開發不可為定或初味發或後味發不得次第往判故言置毒乳中乃至醍醐遍五味中悉有殺義注古師以金光明等別為一緣名偏方不定教今家不然一時一說一念之中備有不定記此指古明今如妙玄云一時一說一念之中備有不定不同舊義專判一部故釋籤明南北諸師通有漸頓不定不定者專指勝鬘及金光明不同今家判義味味皆有不定補妙玄曰南師以金光明勝鬘楞伽殃掘之流以別為一緣為偏方不定教以不定於頓不定於漸故偏方者清涼疏謂大體而言漸中先小後大說小時不妨說大如十年宏律不妨私室時說大乘故曰偏方不定勝鬘初云波斯匿王與末利夫人信法未久既言未久明是初說金光明既非第一頓教又非第二漸中末後明常住明是不定是也會玄云偏方者非正所說名偏方者法也即偏法也或偏者傍也說小時傍說大故二解釋亦由前四味中佛以一音演說法衆生隨類各得解此則如來不思議力能令衆生於漸說中得頓益於頓說中得漸益注一音者通大小因果當分跨節顯之與密定與不定今是不定一音該乎大小是果人所用記此釋一音而有五雙今是下明是不定一音大小者謂小乘一音說四諦五人聞人語諸天聞天語大乘佛以一妙音遍滿十方界衆音悉具足法雨悉充滿也因果者謂下地以一音令他聞一法約位即圓信別地前佛以一妙音隨類各得解即別地圓住當分成今經相待義邊跨節成今經開權義邊備小乘一音應指說小教時佛但一音說法各各領解不同大乘一音應指說大教時佛但一音說法各各領解不同也因人一音應指藏通別圓四教諸菩薩等果人一音應指四教果頭佛說原記以圓信別地前為因人以上為果人或有所本俟再考定當分者說前四時教依教領解是當分妙玄云跨節者若開方便門示真實相即向身是圓常身向法是圓常法向理是真實理也顯密定不定下解今是顯露不定一音故該乎大小惟果人所用也注於漸說中得頓益妙玄云雖說四諦生滅而不妨不生不滅等釋籤云此指鹿苑雖施於漸不起於頓記此以鹿苑對華嚴論不定也妙玄下正釋生滅即漸不生滅即頓也釋籤下轉釋謂如來不起華嚴之頓而施鹿苑之漸則鹿苑漸中具有華嚴之頓是故於昔有頓習者今雖聞漸教而能得頓益也注於頓說中得漸益妙玄云雖高山頓說不動寂場而遊鹿苑釋籤云此指頓後漸初不動於頓而施漸化記此以華嚴對鹿苑論不定也妙玄下正釋謂如來初成正覺演大華嚴如日初出先照高山是故高山為頓說也既云不動寂場而遊鹿苑是為於頓說中得漸益也釋籤下轉釋謂華嚴頓教之後阿含漸教之初乃是不動於頓而施漸化其如衆生不了漸中有頓是故但於頓邊得漸益也注若方等般若雖為菩薩說佛境界而有二乘智斷此二時中俱有小果新得舊得如常所明記此以方等般若之說大對鹿苑論不定也謂為菩薩說佛境界即垂頓教而有二乘智斷即得漸益尋常所明二時中小果者謂新得即方等中新受小者及般若衍門傍得小者也又有一類橫來之衆未得通益至是二時名為舊得小果者是也備橫來之機當是方等新得被彈斥者方等舊得也衍門傍得是般若新得妙玄一云雖三人俱學二乘取證此指般若舊得也注雖五人證果不妨八萬諸天得無生忍此重指漸初對般若說前文約法此中約人備此復以鹿苑初漸對般若論不定也前華嚴鹿苑對論乃約頓漸二法此中鹿苑方等般若同是漸教故約人對辨也補約法不定在教約人不定在機注當知即頓而漸即漸而頓此勸知頓漸相即也謂頓乃即漸之頓漸乃即頓之漸漸外無別頓頓外無別漸唯其即頓之漸故所以令其於頓有漸種者聞大得小益也唯其即漸之頓故所以令其於漸有頓種者聞小得大益也三結名如是得益不同故言不定教也此結不定教名也可解四合明二教只是化法然祕密不定二教教下義理只是藏通別圓注上指四時為祕密不定之部今明部中之教故此二教以藏等四教為當體體真中二理為所依體記此指上明今如輔行云頓等四教是如來不思議力布措藏等盈縮調停成熟物機破邪立正引小歸大廢偏顯圓會權入實故有諸部相生是知祕密不定以藏等四為當體體也又藏等詮理不出真中故真中二理為祕密不定所依之體也注如妙樂一十九云不定祕密義各含四顯之與密定與不定相對論故記此證釋上義頓漸二教均顯均定祕密不定二教一密一不定既對頓漸而論故各含藏等四教二結前生後二初結前四教齊文化儀四教齊此注此以法華相待之意判前四時不出頓等八教意顯法華超八教外出四時表記此釋結教齊前四時也蓋相待論判故判前四時不出頓等八教意顯法華非頓非漸非祕密非不定無復兼但對帶超八教外出四時表乃五時極唱最後極談純圓獨妙之教也備超八教者經曰久默斯要不務速說直至四十餘年之後非頓也正直捨方便但說無上道無二亦無三非漸也九界咸開無不成佛非密也今正是其時決定說大乘非不定也既非化儀四教即超化法四教以開顯圓非隔歷圓也備辨訛曰若言超八教外則兩種四教有攝法不盡之難然此亦對前四時而言超耳開顯之圓不同前來隔偏之圓會漸歸頓異前擬宜兼權之頓故云超耳雖超而即何攝法不盡之有注故釋籤一十六科玄文云初明八教以辨昔次約今經以顯妙補此證上判粗顯妙謂昔於四十年前所說之法而以八教辨之是粗今即是法華既出教之外顯是絶待之妙也八教者籤言初五味次不定三祕密即八教也五味即頓漸漸中開四并不定等二即為八也次明今經顯妙者如玄文言今法華是顯露非祕密是漸頓謂開漸顯頓也非漸漸謂非法華前漸中之漸也是合非不合合是會之別名開顯之圓故云是合不同諸部之圓故云非不合也是醍醐非四味是定非不定如此分別故此經與衆經異也注若釋籤一十七云祕密橫被無時不遍者此約方等對前二時為言老彼問辭自見記此通釋籤祕密無時不遍之文補釋籤曰問華嚴鹿苑大小永隔才說方等同座並聞者何耶答若以祕密橫被無時不遍若約橫論竪則隱顯在機私謂釋籤言祕密橫被無時不遍者言通義別也此但指三時中不通第五何以知然考彼問辭只約前三對說意謂豈前二時大小相隱而有祕密當知方等四教相對亦有祕密故言無時不遍此約味味橫論若約此橫以論三時之豎前二味大小相隔隱也方等同聞顯也此乃在機非關教也注又釋籤十二十四云五味則一道豎進味味有半滿相成復於味味皆有祕密及以不定文蓋約五味對半滿以論相成故玄文云雖復俱遊行藏得所俱遊論相成行藏論用捨注華嚴唯滿不半乃至法華廢半明滿半有成滿之功非謂味味各有半滿又云味味皆有祕密不定者此且據前四時為言或顯密相成則以昔時祕密不定成今法華是顯非祕密是定非不定矣備此通釋籤味味皆有祕密不定之文今先通味味半滿相成以比知皆有祕密之文不可泥解蓋乳等五味自華嚴至法華一道豎進然此五味中均有半滿相成者如玄此云今明五味不離半滿半滿不離五味五味有半滿則有慧方便解半滿有五味則有方便慧解權實俱遊如鳥二翼雖復俱遊行藏得所若華嚴頓滿大乘家業但明一實唯滿不半於頓成乳三藏客作但是方便唯半不滿於漸成酪方等彈訶半滿相對以滿斥半於漸成生酥般若領教帶半論滿半為二乘滿為菩薩於漸成熟酥法華付財廢半明滿若無半字方便調熟鈍根則亦無滿字開佛知見於漸成醍醐是則半有成滿之功所以如來殷勤稱歎方便者良以半有成滿之功也意在於此非謂味味各有半滿也若泥定味味有半滿之語則華嚴唯滿不半及法華廢半明滿等如何消通故以味味半滿比知味味皆有祕密不定者且據前四時置毒發毒皆得會入醍醐而言或約顯密相成說者則以昔四時之祕密不定成今法華之是顯非密是定非不定更了然顯明矣記俱遊者涅槃經曰鳥有二種一名迦鄰提二名鴛鴦遊止共俱不相捨離乃至選擇高原安處其子然後隨本安穩而遊如來亦復如是化無量衆生令住正法乃至所作辦已即便入於大般涅槃備今以譬五味半滿相成之意行藏論用捨者謂華嚴用滿鹿苑用半乃至法華廢半明滿如鳥之行藏也注妙玄六二十引大論云餘經非祕密法華是祕密者釋籤七十三云非八教中之祕密但是前所未說為祕開已無外為密記此釋法華是祕密義大論囑纍品云般若非祕密法法華說阿羅漢受決作佛大菩薩能受持用如大藥師以毒為藥是文正明法華祕密今何謂說法華是顯非祕耶釋籤下明論說法華是密意正所謂久默斯要不務速說者祕也開昔所說總成圓妙者密也是則上云法華非祕密者謂非八教之祕密也經經皆爾豈可以龍樹別意通害諸經乎故法華是祕密非祕密蓋各有取義耳二生後四教俱非二初明法華開顯非四教攝四初開顯二初正明三初總明今昔二初開權顯實次說法華開前頓漸會入非頓非漸故言開難顯實又言廢權立實又言會三歸一注妙法難解取喻蓮華蓮華華果同時妙法則權實一體故有迹門三喻本門三喻記實相妙法譬蓮華者妙玄云華有多種例法有粗妙狂華無果喻外道空修梵行無所剋獲一華多果喻凡夫供養父母報生梵天多華一果喻聲聞種種苦行止得涅槃一華一果喻緣覺一遠離行亦得涅槃前果後華喻須陀洹却後修道前華後果喻菩薩先藉緣修生後真修皆是粗華不得為喻蓮華多奇可譬妙法為蓮故華華實具足可譬即實而權華開蓮現可譬即權而實華落蓮成蓮成亦落可譬非權非實如是等種種義便故以蓮華喻妙法也末二句示有本迹六喻如下圖示此初約部教也記迹門為實施權者經云知第一寂滅以方便力故雖示種種道其實為佛乘是也開權顯實者經言開方便門示真實相是也廢權立實者經言正直捨方便但說無上道是也本門從本垂迹者經言我實成佛已來久遠若斯但教化衆生作如是說我少出家得三菩提是也開迹顯本者經言一切世間皆謂今始得道我實成佛已來無量無邊那由他劫是也廢迹立本者經言諸佛如來法皆如是為度衆生皆實不虗是也補天台分法華為本迹二門從序品至安樂行十四品約迹門顯實從湧出品訖經十四品約本門顯實以今一代化事為迹久遠最初成道為本本如所依處迹如所行路注妙名一唱待絶俱時故相待論判出前三教四時之上絶待論開復能開前令皆圓妙今文但云開者蓋上既云化儀四教齊此則顯法華出前四時況復下文歷部揀教即是判也然待絶二妙妙體無殊約義而論開為正意記此釋能開之妙初二句總示待判絶開今文下明但開不判然待下釋開為正意言妙者相待妙絶待妙也然相待時即絶待時故曰俱時此節釋開前頓漸開字也法華具相待論判絶待論開二意今但論開者以開為正意下文歷部揀教即是判者指華嚴時一權一實等文待絶二妙體本無殊者玄文云乳教中圓與今圓不殊方等般若中妙與今妙不殊故頓部一妙則與法華無二無別諸味圓教本自圓融然而約義則有兼但對帶之粗必當開顯令妙故曰開為正意補相待論判者待前四時粗顯今一乘妙也出三教四時上者以昔諸經兼但對帶不若法華純圓也絶待論開者絶前諸粗無可形待以法華之妙有絶粗之功所以論開妙外無粗粗即是妙如經言決了聲聞法是諸經之王指二乘所行是菩薩道更無餘乘直顯一實故曰開前令妙等也然此二妙缺一不可若非相待以判則不顯法華超過之說若非絶待以開則不知法華妙一切法注凡論開權有約部約教約界約理等今云頓漸者乃約部通開頓漸是權屬前四時非頓非漸是實即今法華又三即是權一即是實故以開廢會三而結云故言開權顯實等也記此釋所開部教初一行總示權實有四謂約部約教如次約界者開九界之廣顯佛界之高故云九界咸開無不成佛約理者開生滅無生無量之機顯無作之實故云開方便門示真實相今云下正明開部謂一頓三漸皆權法華不務速說故非頓但說無上道故非漸此即是實也又三下明開部中之教謂藏通別既權故當開之廢之會之圓教既實亦當顯之立之以歸於一也備辨訛引統紀載集解曰四時三教咸為所開不同華嚴聾啞故非頓不同三時次第故非漸今經開顯無不成佛故曰會入非頓非漸注開者發也拓也昔不言三是方便故方便門閉今言三是方便故方便門開廢者捨之別名開已俱實無權可論義當於廢約法乃開時即廢約喻必義須先開若約理者開廢俱時開時已廢故也記此釋開廢備昔權隱實故閉今於權見實知是如來方便之力於一佛乘分別說三方便門開也廢則權即是實二乘所行是菩薩道無權可論也然約佛化法既開於實即座於權約喻則華開蓮現義須先開若約實理理絶先後即開即廢也注或謂今文開廢會三準彼玄籤第一對於四一義雖無妨但在彼不對其文則重在今但作結上開部義似稍允蓋法華部開廢會三法應爾也如下文云總開會廢前四味粗備此揀異解玄籤對四一者玄序曰蕩化城之執教廢草庵之滯情籤判是教開方便之權門示真實之妙理籤判是理會衆善之小行歸廣大之一乘籤判是行上中下根皆與記莂籤判是人蓋以廢會等三合上中下根而對四一然在彼不對文似重說今文無須對於四一但作結上開部義允常也記下曰來至法華總開廢會前四味粗令成一乘妙故作結上義為當注舊於開權有同體異體之辨然約所開法體及能開之妙佛意邊論皆同體也但所開機情在昔執之為異故不得不開如釋籤云法本自妙粗由物情但開其情理自復本又玄文云開昔之異顯今之同故開機情的開異體也記此辨同體異體如釋籤云有謂圓與三教彼此歷別言開權者開此三教之異體也若今圓與昔圓無二無別是同體者則不須開此約教別與之意也有謂不但開異體亦開同體此約部通奪之意也然今論所開法體者即前四味所談藏通別之法也能開之妙者即今法華純圓之妙法也然佛意邊皆同體者經言諸佛世尊以無數方便演說諸法是法皆為一佛乘故故同體也但所開機情執為異者如迦葉言世尊往昔說法既久我時在座身體疲懈但念空無相無作於菩薩法遊戲神通淨佛國土成就衆生心不喜樂此執異之情須開也下引釋籤玄文證機情邊論的開異體也備翻譯名義集法寶衆名章中有同異體辨二權實名通言權實者名通今昔義意不同注權謂權謀暫用還廢實謂實録究竟指歸昔有偏圓自他權實等義今有為實施權開權顯實等義義不同也在昔權實各趣在今權皆趣實意不同也妙樂十三十三云權實之語非獨今經相即之言出自於此文記此釋今昔權實義意不同如志師云前之三教權實不即大小相隔法華權實不二權即是實實即是權此義不同昔經權實隨順機宜悉檀逗會而已今經為實施權意在於實開權顯實意在於權此意不同也妙樂云諸經說權智者權不即實致令教法皆非自在諸機不融故教主別爾諸經明實智者是權外實故破疑不遍不及此經說施權意已破諸惑故言即實而權況復今經本為顯實有疑皆斷故曰即權而實所以權實非獨今經相即出自於此備偏圓自他謂偏圓相隔自行化他等義也二列昔權實二初總指頓漸隔異謂法華已前權實不同大小相隔注此下釋出今易權實義意不同文初約部通開故以頓漸為權法華為實此揀昔日部中之教有權有實然在昔實妙權粗在今開粗即妙方顯義意不同也今且先明昔之權實故曰謂法華已前權實不同等記文初約部故法華非頓非漸名一實前四時頓漸部帙通名為權此則揀昔部中之教有權有實如華嚴一實兼一權等然昔教權實粗妙兩分不同今經粗即是妙也今且下先明昔之權實為下開顯之本注權實約偏圓大小約半滿亦可權實約法大小約人在昔之時皆有此義記此釋權實大小之義而有二對也一理喻一對謂偏小之理為權圓滿之理為實半字喻小滿字喻大二人法一對謂三乘教法為權一乘教法為實諸佛菩薩為大人聲聞緣覺為少人又輔行釋大小半滿言先須分別通途言之謂大小者或指衍中三教因人或指藏教三乘之人大中大者或指三教果頭人或指圓教因位人或唯指圓極果人小中大者或指三藏菩薩人或唯指於佛果人大小既然半滿亦爾注然文意正明昔部權實而復明大小者須知權通偏教而未的顯權中三藏小機歷前四時與大相隔直至法華方得入圓故論權實復明大小雖明大小不出權實如下文云重舉前四時權蓋指此小機也記此釋復明大小之意初二句推意牒文須知下勸辭權通偏教者謂通其藏通別之三教既是如來權巧垂示故可稱偏也權中三藏小機者的指歷前四時之鈍根也法華入圓者舍利弗言今日乃知真是佛子五百弟子言我今乃知實是菩薩等也故於權實之外復明大小則義方周足矣二別列昔日粗妙二初明頓部二初隔異非本懷如華嚴時一權一實圓實別權各不相即大不納小故小雖在座如聾若啞是故所說法門雖廣大圓滿攝機不盡不暢如來出世本懷注一權一實釋權實不同大不納小釋大小相隔今此正當大隔於小故小雖在座如聾若啞釋籤一十一云華嚴大機尚隔於別小機被隱一向不聞是故但立頓大之名不立一乘獨妙之稱非佛本懷良由於此華嚴頓大尚非本懷況復鹿苑故三藏教首及以部內粗尚未周故妙號都絶方等般若比說可知文記此明華嚴頓大之教若對法華尚隔於別又以小不聞大不立一乘獨妙之稱故不暢佛本懷也三藏為首者三藏為四教首乃淺中之淺豈可稱妙及以鹿苑會上部內所詮即通之粗尚且未周況圓教之妙故妙號都絶都絶者對不絶而言以乳及二酥若約部通奪則非本懷如約教別與亦容有妙故未都絶也二粗法須開顯所以者何初頓部有一粗別教一妙圓教一妙則與法華無二無別若是一粗須待法華開會廢了方始稱妙注所以者何此徵起釋出不暢本懷之意皆由在昔不能開粗顯妙故此以下歷部揀教明判明開記此徵釋意謂初頓部等文明判須待法華等文明開注初頓部等於此別明頓中粗教須待開會者以時人謂華嚴勝故也記此判華嚴一粗時人指宏賢首宗法師華嚴鈔云法華疏嘆身子三請云餘經無此殷勤之請唯華嚴解脫月菩薩請金剛藏可為連類而彼因人請於因法此請佛慧故亦不同今番法華劣於華嚴謂彼是一家請此是三家請彼是聲聞請此是菩薩請彼唯三請此有五請彼唯因人請此有佛請便謂華嚴勝於法華故釋籤云自古弘經諸師不曉佛意見華嚴事廣文長菩薩致請謂華嚴加勝法華近代已來讀山門教者仍有此說人師但以請主勝劣相形不曰法華觀智勝此而近代匠者以教體謂勝法華豈非誤耶是故今文判後遂開其一粗以顯法華獨妙絶圓也備此指古師華嚴鈔非清涼師之疏鈔也辨訛曰此是觀師破的之論荊溪云佛說華嚴一不攝小機二不開權三不發迹故未暢本懷清涼從荊溪習學故解華嚴時全將法華開顯圓意會入如玄談以教起因緣為初即言如來為一大事因緣出現於世欲令衆生開示悟入佛之知見釋妙嚴品初始成正覺即將法華久成之意點入處處將開顯圓會入始末皆然假若法華不來此土則釋此經者全昧開顯何能轉粗成妙乎私謂華嚴經文亦微逗一二語發迹但不若法華明顯全彰故荊溪判為未發迹也清涼大師既知開顯疏華嚴理合如斯來哲但當以精研教觀為務也二判三漸次鹿苑但粗無妙藏教次方等三粗通藏別一妙圓教次般若二粗通別一妙圓教注此約相待判前部中粗妙也此斷文判前三漸可知三今經獨妙二初開昔部二初開偏粗成妙來至法華會上總開會廢前四味粗令成一乘妙注此開前四味重中三教之粗成今一乘妙也且昔部中三教權人來至法華一向須開若三教權果本是圓果豈可更開令成圓佛若對機之權亦不妨論開如云開丈六垢衣等也記初一行明開粗教成妙統紀云開前四味粗會前四味粗廢前四味粗故冠一總字曰開會廢也前四時兩教二乘三教菩薩人教理行差別之粗至今法華咸皆微妙故云成一乘妙也且昔部中下明開粗人成妙言三教權人一向須開者以其所稟粗教既開故其能稟粗人亦當開也蓋由依粗教修行作能造至三百四百由旬而已終未能至寶所故所以一向須開也三教權果不開者妙玄云何處別有四教主各各身各各口說也當知只隱其無量莊嚴之身現為文六身耳若開方便門示真實相即向身是圓常身也補對機之權論開如云開垢衣等者妙玄云體化他之權實即自行之權實如垢衣內身實是長者體自行化他之權實即自行之論如一切治生産業皆與實相不相違背一色一香無非中道況自行之實而非實耶二開昔圓成妙二初本融故妙諸味圓教更不須開本自圓融不待開也注且昔部中三教既開昔部中圓還須開否故下即云諸味圓等也以今圓昔圓二圓不別此約教別與也補此明昔圓本妙初一行舉偏問圓次故下答末三句斷釋昔圓本妙不開統紀云在昔圓頓不須更開者華嚴心佛衆生三無差別大集染淨一切融通淨名不思議毛孔含納思益網明無非法界般若諸法混同無二此等圓理與法華佛之知見無二無別豈可更開耶注若妙樂云圓人初心須聞開顯諸法實相者蓋昔圓人義有兩向名字初心謂圓隔偏聞佛開權隔偏情泯非開圓體也若觀行去已入實者但論增進如經揀衆云除諸菩薩衆信力堅固者是也信力五品堅固十信記此釋圓人初心須聞開顯之文兩向謂昔圓隔偏今圓不隔故名字即人由聞開權隔偏情泯如經下引證信力菩薩即觀行位已圓伏五住堅固菩薩即十信位已破見思塵沙故此但論增進也注又妙樂云今經是圓復須開顯者蓋顯法華中圓非但出前四時復須開顯諸教也記此引釋法華是圓復須開顯之文謂法華純圓獨妙非但逈出四時又能開顯頓漸諸教今成圓妙二唯今稱妙但是部內兼但對帶故不及法華純一無雜注正判昔部屬粗除鹿苑外雖皆有圓以兼等故不得稱妙粗人細人二俱犯過此約部通奪也記此釋成昔圓部粗謂華嚴兼一粗方等對三粗般若帶二粗是故昔圓猶可思議不得稱之為妙故其粗人有隔細過不及純圓獨妙也備補遺曰粗人細人此句出大論粗人則粗罪細人則細罪今借以比用補所兼之粗固有過即能兼之妙不能令粗成妙亦有過注釋籤一十云始自華嚴終至般若雖名不同但為次第三諦所攝今經會實方曰圓融文記此證釋昔粗今妙次第三諦者真諦掃蕩俗諦建立中諦雙遮非真非俗次第造修三諦不紊昔時部帙為其所粗也圓融三諦者真俗中三同時相即不前不後絶思絶議今經開會一切諸法故云方曰圓融注是故文初約部通開須云開前頓漸等也此結申文開權之意二顯今部二初能開得名獨得妙名良有以也注如上相待論判絶待論開約教別與約部通奪翻覆抑揚方顯法華出諸教上部圓教圓妙絶羣經出世本懷於此暢矣故即引經四一為證記此承上文頓部一粗一妙等相待論判也來至法華總開成妙絶待開論也別與通奪見上備辨訛曰相待為翻絶待為覆別與為揚通奪為抑二引證純一故文云十方佛土中唯有一乘法無二亦無三教一正直捨方便但說無上道行一但為菩薩不為小乘人一世間相常住理一注以純一故獨得妙名故引一以顯妙蓋一即妙也記輔行言四一名出光宅今家和舊亦作四一舊言果一今曰理一若無理印則同魔說舊言因一今言行一因語則單行通因果人教二一與舊不殊注十方佛土等據其同者而言亦約佛意也一乘法者部圓教圓故無二亦無三者約數則無通教半滿相對之二無三藏之三乘無有餘乘即無別教及圓入別也約部則無般若所帶之二無方等所對之三方等之藏則攝鹿苑二酥之別則該華嚴唯一佛乘故云教一記此釋教一十方佛土有二意一據其同者而言謂虗空無邊世界諸佛國土亦復無邊其中化導各隨機宜或以一乘而被下或以三乘而應諸今云十方佛土據其同演一乘法者言也二約佛意謂諸佛本意唯以一乘佛道王於所化之土也無二無三有二釋一約教通教通前藏教之半通後別圓之滿今經獨妙絶諸對待故無半滿相對之二也今經但為教大菩薩故無聲聞弟子無三藏之乘也別教但為積行菩薩及一類圓機入別歷劫修行次第行布法門今經圓修圓證故無別教及圓入別之餘乘也二約部今經非對非帶故無方等所對之三般若所帶之二也又方等之藏攝三藏二酥之別攝華嚴可解備辨訛曰據其同者句似更有不同者矣私謂佛意則無不同今論機邊集注特加此語如古然燈尚不說法也辨訛又曰一乘法應釋言縱有施權無不顯實故言唯有一乘耳無有餘乘準經偈中無無有餘乘而疏長出者乃反文以釋唯有一乘句補出別教長出應指長行注正直捨方便但說無上道者文句五五曰五乘是曲而非直通別偏傍而非正今皆捨彼偏曲但說正直一道也文疏據說邊屬教一今據道名能通故屬行一記此釋行一謂五乘是如來曲巧隨宜之說而非正直之談又令二乘斷煩惱而證菩提離生死而得涅槃皆是曲而非直矣通別偏傍等者謂通教旁為二乘別教偏為菩薩故云偏傍而非正今經捨彼通別之偏五乘之曲但說純圓正直一道即無作之妙行也或謂疏釋此文為教一今何言行一故云疏據說邊屬教一以聖人言說名教故今從道有能通義故屬行一以行趨進與道能通其義同也注但為菩薩者約佛意但為菩薩據昔方便謂教化三乘今此同一菩薩人故云人一記此釋人一謂約佛實意雖復說三乘但為化菩薩然據昔日以權巧方便說諦緣度法化上中下人也然而在昔可有三乘人別在今同一菩薩因人也注世間相常住者十界依正隔歷差別之相名世間相以即理故皆常住也若乃情見生滅遷流廓爾情忘諸相常住常既即性非常無常言偏意圓斯之謂矣學者於此宜解會焉記此釋理一謂若四聖若六凡若國土之依若衆生之正彼彼殊形異狀名世間相似即理故相皆常住是則鳥鳴花笑風動塵飛法法亘古亘今頭頭無遷無變所謂有佛無佛性相常住也然道眼觀之乃爾若乃情見分別生滅則國土成住壞空衆生生老病死皆由妄惑故有遷流故云一翳在目空華亂墜也若能即解即行返聞自性一旦廓爾情忘諸相常住者備謂根不逐境境不牽心根塵脫粘分別不起旋轉妄流復歸真性性既寂然相亦常住剎剎塵塵法住法位而於法住法位中無相即相相即無相非相非不相非住非不住言思路絶遮照同時方證諸相真常住理當於靈光獨耀迥脫根塵絶後再蘇時證之忽自契悟非思量分別所能解也此與宗門悟境相同故古云但盡凡情別無聖解也若法華文句則以佛生皆以如為位皆以如為相故世間相常住記中則以清濁波與濕性不異同以濕性為波故皆以如為相同以波為濕性故皆以如為位釋之記夫常無常是兩頭語而此中道理性常住之常不在兩頭乃非常非無常雙遮之中道也若以言論言有則失無論此則遺彼若以意會舉邊則攝中思內則該外故知言偏而意圓也總之言求則頭頭錯過智會則法法露呈故宜忘情泯解冥會之可耳末二句勸解可解補會義有三種世間一正覺世間二衆生世間三器世間此三當體是理理性本無生滅故一一無非常住一一無非法位但衆生迷暗不能覺知於常住中妄見生滅於真如中妄見遷流故世間相雖常住而不知也唯我大覺世尊坐於道場如實知已於不可說離諸戲論寂滅理性能以方便說此理一既三世間相皆常住故理是一也問悟此理性名為正覺世間以順性故性相俱常可也迷此理性而為衆生世間既迷性故性雖本常相未必常云何衆生器世間相亦常住耶答若冰與水同以濕為性濕常氷亦常復如醉見屋轉屋本不轉故也一切衆生但有理常聞而能解為名字常念念體察無間名觀行常粗垢先落六根清淨為相似常豁然開悟證四十一位真因為分證常圓滿顯發無缺無餘為究竟常備辨訛引管標曰諸法以如為體達此如體三際不隔十方無礙雙離八倒即性真常言偏意圓者謂意出於常無常之外又舉一常則該樂戎淨故意圓也二斥非時人未得法華妙旨但見部內有三車窮子化城等譬乃謂不及餘經蓋不知重舉前四時權獨顯大車但付家業唯至寶所故致誹謗之咎也注當代宏教之人未解法華開權絶待微妙旨趣但見經中有三車等喻乃謂不及華嚴等經蓋不知三車等喻乃重舉昔日之權意在指權即實故舉三車顯大車窮子付家業化城至寶所不知此意故有謗法之愆也記此總釋當代弘教之人三車乃昔日之權意在今經開之即實故重舉三車窮子化城以顯今是大車今付家業今至寶所也備辨訛曰三車等等字指七喻出法華論凡喻必約權實明施開等以顯一化方在其數有云九喻者非注三車羊車譬聲聞乘鹿車譬緣覺乘水牛車譬菩薩乘即鹿苑三乘也記此明三車譬法如經云若有衆生從佛世尊聞法信受殷勤精進欲速出三界自求涅槃是名聲聞乘如彼諸子為求羊車出於火宅若有衆生從佛世尊聞法信受殷勤精進求自然慧樂獨善寂深知諸法因緣是名辟支佛乘如彼諸子為求鹿車出於火宅若有衆生從佛世尊聞法信受殷勤精進求一切智佛智自然智無師智如來知見力無所畏憫念安樂無量衆生利益天人度脫一切是名大乘菩薩求此乘故名為摩訶薩如彼諸子為求牛車出於火宅備自然慧文句云從十二因緣門入此門本有非佛天人所作名自然慧如覩花開落而悟道也科注云聲聞不能化他如羊不顧後羣別行疏云支佛譬鹿猶有回顧之意百松講録云一切智者即內外法無不曉了此是因中所修佛智是果上所剋之智即三藏果頭所得自然智是後施化所起之智以其能因機說教機教稱適故無師智以小乘所明但得一佛化世更無有能為佛之師者十六智見十力四無所畏法數內廣明講録又云譬牛者牛有久久運重之力皆化他之功也注化城文句七十八云以神力故無而欻有名之為化防非禦敵名之為城文譬真諦涅槃能防見思也記此明化城譬法如經云如彼導師為止息故化作大城是為無而忽有名化也淨名疏云佛法如城能為行人防非禦敵也真諦涅槃者非第一義諦大涅槃以大涅槃非化作故不專禦敵理性即故具衆德故且此真諦涅槃但離虗妄見思名為解脫其實未得究竟解脫故以化城譬之也然此化城一喻乃為定性人說論言實無為有增上慢人以世間有漏三昧三摩拔提實無涅槃而生涅槃想如是顛倒取對治此故為說化城喻也見思解四卷注寶所譬寂光大經中名寶渚記此明寶所譬法蓋寂光乃諸佛所依真淨土故故以五百由旬寶所譬之也寶渚者即德王品明第七功德中指四法作涅槃因一親近善友二專心聽法三繫念思惟四如法修行釋第二專心聽法中云譬如估客欲至寶渚不知道路有人示之其人隨語得至寶渚多獲珍寶一切衆生亦復如是欲知善處採取道寶不知途中通塞之處菩薩示之衆生隨已得至善處獲得無上大涅槃寶以是義故聽法因緣則得近於大般涅槃寶所寶渚梵音楚夏耳注前四時權且三車等指昔三藏三乘而云重舉前四時權者須知三周開顯藏圓相對雖正開小機然舉昔之權則該四時又此小機歷前四時名四時權也妙樂五十三云立一開權之言於今乃成二意一者騰昔施權二為顯實之所不指所開無由說實況指權是權知非究竟既顯實已權全是實文記此釋重舉前時之言初一行牒妨謂前四時通名為權且經中三車等譬乃指昔日三藏之三乘而今文云重舉前四時權者何也須知下釋明如來法華會上以法說喻說因緣說三周開顯皆以藏乘圓教相對括經大意雖正開小機然舉昔日之權則能該於四時此約教釋也又三藏機今來法華已歷前之四時故三車等譬而儀文謂是重舉前四時權此就機釋也妙樂下引證一騰昔施權者騰以發揮為義謂發揮施權之意也二顯實之所者謂法華顯實即顯昔權是實也不指所開無由說實者法華方便是體內之權夫欲說實只在開權故身子三請如來三止末後乃曰諸佛隨宜說法意趣難解如我以無數方便種種因緣譬喻言辭而為說法是法非思量分別之所能解唯有諸佛乃能知之乃至云諸佛如來但教化菩薩諸有所作常為一事唯以佛之知見示悟衆生是也況指權是權知非究竟者舍利弗言爾時心自謂得至於滅度而今乃自覺非是實滅度是也既顯實已權全是實者舍利弗言佛以種種緣譬喻巧言說其心安如海我聞疑網斷是也備今注三乘歷前四時一卷則曰菩薩轉衍當知與奪之意皆可通也注誹謗釋籤十三云當知法華約部則尚破華嚴般若約教則尚破別教後心文人不見之故致誹謗記此釋誹謗謂以部言之法華是純一無雜故破華嚴般若謂之兼帶以教言之法華獨得妙名故破別教後心謂是真因末二句結迷致謗謂法華不及華嚴等經也備天溪集注問答問別地證道同圓云何尚破別教後心答此與別教地上地前約教約行二種教證絶不相涉的指別教妙覺是圓教二行廢彼之高就此之下故謂之破二約時顯妙約時則日輪當午罄無側影第五時注十界咸開無不成佛如日方中無處不南記此約時也開九界即佛界皆以如來滅度而滅度之如日方中睿法師語備辨訛引中云只應開九界今曰十界者對機之權亦須開耳辨訛又云如別教妙覺只是圓家真因是故佛界亦須開耳注周禮用一尺五寸土圭立八尺之表夏至午時以測日影求地之中以建國記周公欲求地中以營王城故以土圭測影得頴川陽城於是建都鄭康成曰土圭長尺有五寸夏至日立八尺之表其影適正與土圭等謂之地中注宋嚴觀二師與太史何承天用此法測日影以定中國表北得影一尺五寸與土圭等地上餘陰一寸天上萬里則知天竺方為地中今云罄無測影據天竺說記梁傳云東海何承天以博物著名乃問慧嚴曰佛國用何曆嚴曰天竺夏至日日正中時竪無影所謂天中於五行土德色尚黃數尚五八寸為尺十兩當此土十二兩建辰之月為歲首及討核分至推校薄蝕顧步光景其法甚詳宿度年紀咸有條例承天無所措難後婆利國人來果同嚴說於是用法測影以定中國也鄭司農言凡日影於地千里而差一寸當知陽城蓋就此土自為中耳既有表影豈非餘陰耶況此土東垂大海邊義彰矣成光子曰中天竺東至震旦五萬八千里南至金地國西至阿拘遮國北至小香山阿耨達亦各五萬八千里則知彼為中國矣故竺法蘭對漢明帝言迦毗羅衛者大千之中也慧嚴慧觀稟學什公見僧史備辨訛曰翻譯集引鄭司農言千里差一寸籤言萬里皆誤又此約南北論里數不約東西論三約味顯妙約味則從熟酥出醍醐此從摩訶般若出法華五醍醐味注釋籤一十九問彼經自以醍醐譬於涅槃今何得以譬於法華答一家義意謂二部同味然涅槃尚劣何者法華開權如破大陳餘機至彼如殘黨不難故以法華為大收涅槃為捃拾若不爾者涅槃不應遙指八千聲聞於法華中得授記莂見如來性如秋收冬藏更無所作文記此約味料簡法華譬醍醐也涅槃如來性品云是經出世如彼果實多所利益安樂一切能令衆生見於佛性如法華中八千聲聞得受記莂成大果實如秋收冬藏更無所作以是證知法華為大收也更無所作者如云約理無所作究竟理也約教無所作聞此教已更不他聞也約行無所作修此行已更不改轍如是等種種無所作義略而言之隨智妙悟得見經體也注然彼經本無出法華之語今約義說故但云此從摩訶般若出法華記蓋般若領知家業法華付與家業其義順次故言從摩訶般若出法華也四引證二初引經證釋信解品云聚會親族即自宣言此實我子我實其父吾今所有皆是子有付與家業窮子歡喜得未曾有注文句六三十一云十方法身菩薩影響者為親族影響之衆多是釋迦昔日同業並共如來於二萬億佛所共開化之於其即是伯叔之行故用此為親族文記此準法華判也親族有五等一親族即十方法身菩薩影響是釋迦伯叔之行二國王即部中尊權為王教即部內教主為王三大臣即等覺四剎利即登地五居士即三十心今是初一等親族即彌勒等諸大菩薩為親族不同舊人以分身諸佛為親族也注此實我子我實其父結會父子文句六三十一云實從我受學實是我子從我起解是我所生我實曾於二萬億佛所常教大法故我實是父文記經言爾時佛告舍利弗吾今於天人沙門婆羅門等大衆中說我昔曾於二萬億佛所為無上道故常教化汝汝亦長夜隨我受學我以方便引導汝故生我法中是則二萬億佛即六十小劫中所值二萬億日月燈明佛也常教大法者即以佛說大乘經名妙法蓮華教菩薩法是也注吾今所有皆是子有正付家業文句六三一十云一切大乘萬德萬行故云所有文又如來藏子性不殊故云皆是子有當知如來所有即子本有備所有即子有者佛所有不出萬行萬德而如來藏生佛不殊故即子有既子皆本有在如來即是付與家業在窮子即是歡喜得未曾有也補萬行萬德者妙樂云所付般若有共不共不出因果因為萬行果為萬德又子有者如來修中所顯即衆生性中本具也二徵領所以此領何義答即般若之後次說法華先已領知庫藏諸物臨命終時直付家業而已譬前轉教皆知法門說法華時開示悟入佛之知見授記作佛而已注臨命終時靈山唱入涅槃時也記此釋臨命終時謂如來出世本懷普令衆生作佛今此經授三根記是為付法王家業故將付家業而先唱滅也如經云如來不久當入涅槃佛欲以此妙法華經付囑有在如人付家業而終也注譬前轉教皆知法門文句六三十一云追指昔日大品領教所委有廣略般若共不共法是汝所知即汝所有故法華但明佛之知見更不廣說一切行相也文記此釋前譬轉教皆知法門謂多說為廣少說為略但不但中是不共法與二乘說名共法昔為所知今為所有是故法華更不重敕領知直明開示悟入佛知見也注開示悟入文句四十三約四意消之一約四位住行向地二約四智道慧道種慧一切智一切種智即上圓位能契之智也三約四門四約觀心妙樂五四云約智約似唯聖方開約觀約門乃通名字不妨高位不棄衆生文又二紙云若作餘釋為令之說徒施佛之知見安在文記此釋開示悟入謂法華論明證不退地今作四位釋論知如來能證實今作四智釋論明不知究竟處今約四門釋論明同義今作觀心釋此判明四意也妙樂解言不退即開示悟入皆念不退佛所證得為智釋者論言除一切智更無餘事以同義釋觀者即論言二乘法身平等更無差別若無觀心云何知同以不知究竟處者處是所通二乘不知今為令知知即是門門為能通故作四門釋又文句云開者即是十住破無明開如來藏見實相理示者惑障既除知見體顯法界衆德顯示分明悟者障除體顯法界分明事理融通更無二趣入者事理既融自在無礙流注任運從阿到荼入薩婆若此約四位釋也一道慧見道實性實性中得開佛知見也二道種慧知十法界諸道種差別解惑之相一一皆示佛之知見也三一切智知一切法一相寂滅寂滅即悟佛知見也四一切種智知一切法一相寂滅相種種行類無不皆知入佛知見也此約四智釋也一空門一空一切空即開佛知見也二有門一有一切有即示佛知見也三亦有亦空門一切亦空亦有即悟佛知見也四非空非有門一切非空非有即入佛知見也能通則四所通則一開示悟入是能通門所知所見是所通理此約四門釋也觀於心性三諦之理不可思議此觀明淨名開雖不可思議能分別空假中心宛然不濫名示空假中心即三而一即一而三名悟空假中心非空假中而齊照空假中名人是為一心三觀分開示悟入之殊也妙樂下判釋四意謂十住已上方能開示悟入佛之知見是故約聖位聖智而釋名字位人亦得依門修觀當能開佛知見故約四門觀心而釋如此則佛知佛見上不妨於高位下不棄於衆生若作餘釋者妙樂云知見佛境若作餘釋為令之說徒施佛之知見安在故一家釋義依經順論契行得理若深張地位凡夫非冀何益凡小者耶為令徒施者謂經中為令衆生開示悟入之言無用也餘釋文句會本卷十廣明須者往檢注佛之知見佛知即一切種智具足三智佛見即佛眼具足五眼亦名真實知見若通途被開其不在座展轉為說或在界外亦得聞之或佛滅後敦逼令信乃至久遠四惡粗智人天世智若不開之則佛之知見永埋四趣長沒人天若別開者則在座得益當機妙悟得受記者記此釋佛知見體謂三智即一切智知空道種智知俗一切種智知中此三智具足三觀一心之妙知故曰佛知五眼一肉眼見近不見遠見前不見後見晝不見夜等因有色質障礙也二天眼修禪定而得遠近前後內外晝夜上下皆見以無色質障礙也三慧眼觀一切法空四法眼觀一切諸法能知能行謂因行是法得證是道亦知衆生種種方便門令修證也五佛眼具前四眼之用無不見知以其如實知見亦名真實知見也若通途下明通開授記品言餘諸聲聞衆亦當復如是其不在此會汝當為宣說囑纍品佛言於未來世若有善男子善女人信如來智慧者當為演說此法華經使得聞知為令其人得佛慧故若有衆生不信受者當於如來餘深法中示教利喜又如常不輕遠見四衆故往禮拜讚言我不敢輕於汝等汝等皆當作佛乃至受人打擲猶高聲唱言我不敢輕於汝等汝等皆當作佛此敦逼令信也所以通開者不欲佛知見永埋四趣長沒人天也若別下別開在座得益者即法華會蒙益者皆是也當機妙悟者即身子等於昔三乘之權悟今一乘之實也備四惡粗智即指四趣補界外者即方便土也如因緣周言我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想當入涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經是也注授記聖言說與曰授果與心期曰記若通途記如法師品初八部四衆三乘之類在座聞佛一句偈者皆與授記當得菩提乃至滅後聞一句偈亦與授記若別記者如迹門別授應身記本門授法身記又總與七百別與劫國名號等記五百也注妙樂四二十六云二乘且與八相記者更令與物結淨土緣菩薩已於多劫利物隨熟隨脫不假八相淺近之記二乘不爾是故須之文記此釋授記梵語和伽羅此翻授記又翻受記受決受莂也從佛與名授從機得名受審實不虗名決授劫國號名莂也蒙佛誠言許當得果劫國決定遠近記莂則大歡喜故從聖言說與記事而名授記也通記者法師品云藥王汝見是大衆中無量諸天龍王夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人及比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求佛道者如是等類咸於佛前聞妙法華經一偈一句乃至一念隨喜者我皆與授記當得阿耨多羅三藐三菩提又如來滅度之後若有人聞妙法華經乃至一偈一句一念隨喜者我亦與授阿耨多羅三藐三菩提記輔行云此法華經中邪見嚴王五逆調達畜生龍女敗種二乘皆悉得記作佛此通記也迹門別授應身記者謂三周說法三根弟子領悟各各別記作佛如法說周授身子記云當得作佛號曰華光如來喻說周授摩訶迦葉記云當得作佛名曰光明如來須菩提當得作佛名曰名相如來等本門授法身記者分別功德品云世尊告彌勒我說是如來壽命長遠時六百八十萬億那由他恆河沙衆生得無生法忍乃至復有八世界微塵數衆生皆發阿耨多羅三藐三菩提心故文句云分別功德品總授法身記已上約本迹二門對明別記也又總下唯就迹門明總別記五百弟子授記品云餘諸聲聞衆亦當復如是此總與七百記也又偈云憍陳如比丘當見無量佛過阿僧祇劫乃成等正覺常放大光明故號為普明其國土清淨菩薩皆勇猛佛壽六萬劫正法住倍壽像法復倍是法滅天人憂其五百比丘次第當作佛同號為普明乃至皆如上所說此別與五百劫國名號等記也妙樂下證釋聲聞菩薩授記淺深備二乘因中利人未普故先與八相記更令與物結淨土緣菩薩多劫利物不假淺近記也辨訛曰期者期限觀彼心行記彼得果久近曰根與心期補與物結淨土緣者輔行云淨佛國土者謂與衆生作淨土因處處結緣衆生機熟成佛名淨佛土結緣時名淨土因故淨名云菩薩取於淨土皆為饒益諸衆生故如云布施是菩薩淨土菩薩成佛時一切能捨衆生來生其國結緣時以布施攝成佛時地多珍寶諸能攝者同生其土而受五種布施化益由攝生時有五差故所謂人天及以四教一切諸行無非菩薩淨土之行故有四土橫竪攝物也不假淺近者文句云淺近之記初住已行非菩薩所欣菩薩所欣乃是圓極妙覺遠記耳故壽量品中始從發心訖一生乃得妙因斯滿極果頓圓也總與七百別與五百者合為一千二百也
