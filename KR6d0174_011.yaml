body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓四治癡觀法四愚癡衆生因緣觀注迷倒不了撥無因果故曰愚癡須知著我及計斷常并執性實三皆迷倒記三種迷倒禪門謂之三癡一計有無謂我及陰等有耶無耶如是乃至非有非無耶此著我也二計斷常謂過去諸法為滅而有耶現在諸法不滅而有耶推尋三世若滅即斷不斷取常此計斷常也三計世性謂由有微塵乃有實法及四大由有四大乃有假名衆生世間因茲思念而行邪道此執性實也注因緣者法界次第中十七云展轉感果為因互相由藉為緣文如無明為因能與行支為緣乃至生支為因能與老死為緣記法界言是中略説煩惱業苦三事更互為因緣是煩惱業因緣業苦因緣苦苦因緣苦煩惱因緣煩惱業因緣業苦因緣苦苦因緣是為展轉更互為因緣如無明下舉例則知因緣有二法如言因親緣疏因如種子緣如雨露故以親能感果為因疏而助發為緣今就一支法上論因緣也注四教義二十八云十二因緣有三種不同一者三世十二因緣過去二支因現在五支果現在三支因未來二支果二者二世十二因緣現在有十未來有二三者一念十二因緣此約現在隨一念心起即具十二因緣三世破斷常二世破著我一念破性實也文記四教義言過去二因謂無明行現在五果謂識名色六入觸受現在三因謂愛取有未來二果謂生老死憂悲苦惱是為三世合明十二因緣從無始來生死不絶不修觀智未來流轉無有邊際若修觀智則無明滅乃至老死憂惱皆滅名因緣覺也二世因緣者備具大集經佛為求辟支人説現在十未來二有解現在九未來三現在十者一無明大集言何謂觀於無明先觀中陰入父母所先貪愛心愛因緣故四大和合精血二滴合成一滴名歌羅邏是有三事一命二識三暖過去世中業緣感果無有作者及以受者初息出入是名無明有三種道謂隨母氣息上下七日一變息入出名壽命是名風道不臭不爛名暖是中心意名識二行者復觀三受因緣五陰十二入十八界云何為觀隨於念心觀息出入觀於內身皮膚肌肉筋骨髓腦如空中雲是身內風亦如是有風能上有風能下有風能滿有風能燋有風增長故息之出入名身行以出入息從覺觀生名意行和合出聲名口行也三者識三行因緣則有識生名識四名色者著識因緣則有四陰及色陰名名色五六入者五陰因緣識行六處名六入六觸者眼色相對名觸乃至意法亦如是七受者觸因緣故念色至法名受八愛者貪色乃至於法名愛九取者愛因緣故四方求覔名取十有者取因緣故受於後身名有此下二因緣屬未來也十一生者有因緣故有生名生十二老死生因緣故則有老死種種諸苦是名陰入界十二因緣之大樹若聞此發真無漏亦名因緣覺也一念因緣者約現在一念起即具十二因緣亦出大集為辟支人説經云眼見色生愛名無明為愛造業名行至心專念名識識色共行名名色六處生貪名六入因入求愛名觸念色至法名受若心貪著名愛求是等法名取此等法生名有次第不斷名生次第斷故名死生死因緣衆苦逼迫名惱乃至意法生貪亦如是若聞此心意開解發無漏慧亦名因緣覺也注輔行七上末云三世破斷常者三世相續故不斷三世迭謝故不常又過去破常未來破斷現在雙破斷常二世破我者現未二世具十二因緣於父生愛於母生嗔名為無明父遺體時謂是己有名之為行從識支去至老死支與三世同文輔行八上十一云言一念者非謂極促一剎那時謂善惡業成名為一念異於三世二世連縛等相故名一念皆是無常故無性實文如妙玄二十六禪門三九記三世破斷常者謂過引現在現引未來相續不斷又過去已滅未來未生現在念念遷謝事不恆常此三世總破斷常又以三世別治者謂前前滅故破計常或曰過去已往不至現在故破常後後相續故破斷或言未至雖未至猶待接續故破計斷現在則非過去故破斷計非未來故破常計是為現在雙破斷常也二世破我者以二世十二支推之俱非實有我體是為二世摧著我也言一念者謂善惡業成此正示具足十二因緣之一念如言善心才舉天宮寶殿生成惡念始萌地獄火輪已具是也連縛等相者等乎分位遠續也如輔行言俱舍婆沙委論具有四種十二因緣一剎那二連縛三分位即對歲而論是也四遠續如支佛觀百千萬世等如今生造惡來生未必受報直待後後世方受故名也後三只是三世因緣以約能順生後等受故開三耳又論云連縛者如品類足論謂遍有十二支位所有五蘊皆分位攝即此懸遠相續無始説為連縛華嚴鈔言連縛要因果無間相連起也若情非情皆有生滅念念相續故剎那連縛遍一切有為也分位緣者要約順生受業及不定業三世十二支五蘊分位若遠續者即前分位遠相續耳順正理論言遠續緣者謂前後際有順後受業及不定業無始流轉如説無明有愛本際不可知等連縛緣者取相連接相繫不斷彼疏釋言遠續唯隔越連縛唯無間也皆是無常此結一念破性實也備天溪備簡補遺引妙玄二者文言十二因緣支二是過去則止常二是未來則止斷現在則顯中道推現在三因則説未來二果推現在五果則説過去二因三世皆有十二支為推因果故作如是説又言一剎那十二緣者若以貪心殺生彼相應愚是無明相應思是行相應心是識起有作業是名色起有作業必有六入彼相應觸為觸彼相應受為受貪即是愛彼相應纏為取彼身口作業是有如此諸法生是生此諸法變是老此諸法壞是死也禪門三者文言一明三世十二因緣善根發者欲界未到定心中忽然覺悟心生推尋三世過去無明以來不見我人無明等法不斷不常能破六十二種諸邪見網二明果報十二因緣善根發者亦欲界未到定心中忽覺識心明利尋思我初生時攬父母身分以為己有名歌邏羅名曰無明歌邏羅時但有三事和合無人無我三事不實今無明等十二因緣諸法竟何所依若不見無明等諸法是有者豈是無耶如是念時破有無二見慧解開發三明一念十二因緣善根發者亦欲界未到定心中忽覺剎那之心無人無我性本無實以一念起時必藉因緣言因緣者即具十二因緣緣無自性一念起定有實若不得一念之實即破世性邪執心與正定相應智慧開發也注然此三種因緣破愚癡者著我在內準大集禪經説若毗曇大經乃以界方便破著我此皆隨機宜樂也補大集云十二因緣能破愚癡禪經云佛所説緣起令諸修行功德增益滅除愚癡觀察緣起遠離斷常二邊諸想輔行釋止觀曰今準禪經因緣破我大集亦以二世破我記毗曇以界方便者雜阿毗曇云以愚惑故於緣起所作中計我作等諸邪見縛或時修行近善知識得聞正法起正思惟已能於此身界方便觀此身種種自性種種業種種相謂地等六界彼地界為水界潤故不相離水界為地界持故不流散火界成熟故不淤壞風界動搖故得增長空界空故食等入出識界合故有所造作又觀此身從足至頂種種不淨穢惡充滿觀察此色如猛風飄散積沙於無色法先後相續異分觀察如是觀者得空解脫門種子於彼生死厭離不樂得無願解脫種子於生死不樂已正向涅槃得無相解脫門種子若於此得不作想覺已觀一切有為皆悉散壞是名界方便滿是即破著我文也大經以界方便破著我者經云著我多者則為分別十八界法是也注若束十二為三道輪轉相生者俱舍云三煩惱二業七事亦名果雖有十二而二三為性三為惑業事二謂因果記性類也論云無明愛取煩惱為性行及有支以業為性餘識等七以事為性如是七事即亦名果義準餘五即亦名因以煩惱業為自性故注略果及略因由中可比二後際略果前際略因中間廣説可比知也此準俱舍缺略義若準婆沙前際略果後際略因乃全略義補注十二引論具釋記俱舍缺略義者論言由中際廣可以比度前後二際廣義已成故不別説意明現在既望過未成十二當知過未亦自相望各有未過故玄文云推現三因則説未來二果推現五果則説過去二因三世推之皆有十二支因果也補注失詳補前際但説無明行因則略去果後際但説生死果則略去因此是婆沙全略之義注又云從惑生惑業從業生於事從事事惑生有支理惟此記此頌是論釋難論先難言若緣起支唯十二者不説老死果生死應有終不説無明因生死應有始或應更立餘緣起支餘後更有餘支成無窮失不應更立然無前過此中世尊由義已顯云何已顯故舉此頌明之十二因緣通名有支道理惟若此也此名束十二輪為三道以能通義與輪轉義同廣如輔行三下十四釋記論釋頌言從惑生惑謂愛生取從惑生業謂取生有及無明生行從業生事謂行生識及有生生從事生事謂從識生名色觸生受及生支生死從事生惑謂受生愛由立有支其理唯此已顯老死為事惑果及顯無明為事惑因無明老死事惑性故豈假更立餘緣起支故經言如是純大苦蘊集若不爾者此言何用如輔行釋者文云束十二緣以為三道十二因緣輪轉相生是故三道亦輪轉相生大論十二因緣論婆沙十地經等並同餘俱舍及論釋與此記録是同故不重記記束為三道者從三煩惱生於二業謂從一無明出行業從愛取二出有業又從二業生七苦謂從一行出識等五從一有出生老死二也七復生三者識等五出愛取二生死二出無明淨意菩薩偈云煩惱初八九業二與十支餘七説為苦三攝十二法從三故生二從二故生七從七復生三是故如輪轉一切世間法惟因果無人但從諸法空還生於空法名重城者取困厄義棘園取難脫義牽連取繫縛義十二苦事取逼迫意十二輪取流轉義也三世十二因緣詳釋六卷釋籤云若俱舍中因緣五因性成論以所作因即是增上故不別立但立報因即生因是自分因即習因是共因即依因是記三因四緣出成實論二釋籤中但會通俱舍大論以明成論三因四緣此圖依釋籤立備生因者善惡報法生時能與其善惡因如業相應故為報因補習因者即自種因如前念習善惡後念善惡得相續起依因者如眼識必依九緣得生等謂依第八識依第七意根六意識五眼識眼根空明色作意解出唯識論此中不明九緣但依色香等因緣者具足生習依三因若準唯識彼局此寬唯識但約親義取種生種種子生現現行熏種乃是因緣今小乘因親緣疏親疏合論故三因皆名因緣次第緣者前心心所開導於後後心心所即聞處起成論言如以前心法滅故後心法得次第生也緣緣者新譯為所緣緣以能緣之心緣所緣之境境引心生心因境有成論言若從緣生法如色能生眼識大論言心心數法緣塵故生是以境為所緣此緣有為生識之緣故名緣緣增上緣者有四謂逆順親疏泥水為草木順增上霜雪為草木違增上觀自己根塵而生眼識為親觀他人之根塵為疏諸餘緣者謂三緣之外其餘皆屬增上攝若俱舍中因緣五因性等乃明成論三因四緣即同毗曇六因四緣但立下會通毗曇之名有言報因等此非會通大論所立記中誤也以妙玄中全無大論之語籤內豈捨毗曇而反會大論之名然集注中具明因緣者以因緣義佛法根本故廣示會通自分因毗曇所立即大論自種因存參備辨訛問言大論俱舍俱六何以成論立三答宗旨不同耳當知成論不別立心數但約前念起為心後念起為數故無相應及遍行遍行乃染心所攝所作即增上緣故只立三因存考記輔行言新譯次第緣名等無間緣緣緣名所緣緣餘二名同然龍樹立名什公翻譯雖少不同應非全失以大論是一家承用名字稍同故且依之然以四緣攝六因者如俱舍頌曰説有四種緣因緣五因性等無間非後心心數已生所緣一切法增上即能作所以輔行明之者謂今明於事度事蔽善惡相發是六因中四因所攝四緣之中多少不同故略明四緣及以六因也而六因四緣名義詳釋如論今圖但會通俱舍成論義耳補大論六因四緣者所作因謂能為一切所生法作因不遮礙於他法亦云能作因者謂能為一切諸法作生起之因即法生時諸法於他不為障礙且與其力如眼根於識飲食於身佛於衆生等皆是能作也二相應因者解言心心數法同相同緣以心心數法共相應故如眼識心王與受想等同一能緣行相同一所緣塵境以心王與心數法相應而起王即以數為相應因若心數法與心相因而起數即以王為相應因眼識既爾餘耳識等亦然此因惟屬心心數法不通餘法如親友知識和合成事者若依唯識如眼識緣色心王生起定有五種遍行心所五種別境心所或善則有善十一種心所或惡則有根隨二十六種煩惱心所如此心心數法同一能緣行相同一所緣之境善則同善惡則同惡必相應起故如親友等和合成事也三共因者如眼識生起必藉多緣謂空明根境作意分別依等更相佐助而得生起名共生因俱舍亦名俱有因者注言一切有為法名共生因如四大種更互相望為俱有因地大待水火風等為因乃至風大待地水火等為因此四大種要異類和集方有功能而造色故有如受想等與心王決定同時而起亦是更互為俱有因又色心相依亦是更互為俱有因又生住異滅能相與色心等所相亦是更互為俱有因故此俱有因通一切法也大論云一切有為法各有共生因輔行云一切有為法各各共生因是也四自種因者以一切法皆從自種生故如眼識生時或善或惡定從惡去善惡親種子生起善種自生善心心所現行惡種自生惡心心所現行至未來生起亦然亦即習因者謂過去所習善種與現在善法為因現在所習善種與未來善法為因不善無記亦如是五遍行者謂邪見所起身語意業能招不可愛果則此邪見遍為染污業果之因無明等亦爾又如迷苦諦所起身見遍為邪見等惑之因又能引起餘諦下惑則此身見遍為五部煩惱之因無明等亦爾此是遍因也六報因者行善惡因得善惡報名報因俱舍名異熟因者以因通善惡果惟無記異性而熟名異熟也四緣前解備節義云圖中二相應因下心心數法以心相應為因句第一心字多贅此句心數法作主反去率彼心王同已作事成相應因凡成一事決無不相應而能成就者理之必然故成論不立不對耳注中善法惡無記法法字作種字解遍因乃利鈍使亦遍諸法之中故成論不立不對注輔行引俱舍云能作及俱有同類與相應遍行并異熟許因為六種今且依大論略出六因相以大論是一家承用名字稍同故且依之記不依俱舍六因者古有斥為異計故也如無著菩薩顯揚論云有一異計立六種因謂同類遍行俱有相應異熟能作如是六種除異熟因餘五因性有三種過失如同類因有三過若言同類之因名同類因有已成過何以故若善等法善等體性先已成就彼何用因若言同類即因名同類因是即無果有不定過何以故不示其果是誰因耶又非決定因體同類不相似法亦為因故若言非同類即因亦非同類之因是即名言有虗設過同類因言無有所主浪施設故如是於餘四因三種過失亦應如理廣説是則俱舍六因雖可會通大論既為菩薩所斥故今且依大論略出六種因相況大論是一家承用又與俱舍立名稍同也備辨訛曰許因為六種為字準論應唯字私謂今依大論亦不因記中無著斥俱舍之故也注乃至云復次心心數法從四緣生無想滅定從三緣生除於緣緣補二定除緣緣非能緣故由因緣者謂由二因一俱有因謂生等相二同類因謂前已生同地善法等無間緣謂入定心及相應法如是二定心等引生礙心等起故與心等但為等無間非等無間緣也唯識以二定屬不相應故不屬因緣而此大論釋從三緣生以知大論寬唯識狹也注諸餘心數不相應行及色從二緣生補大論無數字對前無想滅盡定二不相應而論備此中添數字亦無妨意謂二定尚可許與心相應其餘心心數不相應之諸行及色等但從二緣生也心數下不可逗斷讀注除次第緣及緣緣餘有為法劣故無有從於一緣生者補如名句文等依語音分位立即以語音為因緣以無障礙故得成名句文即增上緣既非心之分位則無漸次引起之力除次第緣以次第必約心法論故又無緣境之能除緣緣色可知注報生心心數法從五因生除於遍因補指一分無記異熟乃酬往業生故曰報生無記非善惡故除染污之遍因注無漏心心數法從三因生謂相應共及無障礙補無漏智起時必王所相應而起故從相應因又無漏王所生則共生故從共因又以無障礙故得生故從無障礙之所作因除自種因者以未見道前所熏習者但有漏善根初見道時所發無漏心心數不可謂從自種因生若修道中亦有自種因也此中三學是無漏是淨故除有漏之報因染污之遍因記此引大論明四緣六因具減生法以論三十二言一切有為法皆從四緣生因緣者相應共生自種遍報五因明因緣又一切有為法亦明因緣次第緣者除阿羅漢過去現在末後心心數法諸餘過去現在心心數法能與次第名次第緣緣緣增上緣者一切法乃至是心共生心數法所謂受想思等是心數法同相同緣故名為相應心以心所法相應為因心數法以心相應為因是名相應因相應者如親友知識和合成事共生因者一切有為法各有共生因以共生故更相佐助如兄弟共生故互相成濟自種因者過去善種為現未善法因過現善種為未來善法因不善無記亦如是遍因者苦諦集諦所斷結使一切垢法因是名遍因報因者行業因緣故得善惡果報是五名因緣心心數法次第相續無間故名次第緣心心數法緣塵故生名緣緣諸法生時不相障礙是增上緣已上四緣六因名義圖中已略點示此中引論料簡係與圖中一連之論故此中於一切法下以乃至二字接之而具記之也復次下正示四緣具減生法毗曇心論謂心心數法四緣生者謂心心數法從自種子生為因緣前念開導力故生是次第緣境界是彼緣緣除其自己餘一切法是彼增上緣無想滅定從三緣生者於中入定心是次第緣於中自地前生功德是因緣及彼俱生生住異滅亦彼因緣增上緣如前所謂二正受從三離彼餘心所諸餘心數不相應行及色從二緣生者因緣及增上緣餘有為法劣故無從一緣生者次明六因從減生法報生心心所法從五因生除遍因者大論言以其不隱沒無記非垢法故除遍因論又明諸煩惱亦從五因生除報因何以故諸煩惱是隱沒報是不隱沒故除報因報生色及心不相應諸行從四因生非心心數故除相應因不隱沒無記故除遍因染污色及心不相應諸行從四因生非心心數法故開相應因垢故除報因諸餘心心數法除初無漏心皆從四因生開報因遍因所以者何非無記故除報因非垢故開遍因諸餘不相應法謂色心不相應諸行若有自種因則從三因生除相應因報因遍因若無自種因則從二因生共生因無障因今注並略之無漏心心數法從三因生者相應因共生因無障因又大論云是初無漏心中色及心不相應諸行從二因生共生因無障因無有法從一因生若六因生是名四緣生也注淨名記云十二秖是四六而已故知但是離合説也且如無明秖是行家之能通也即同類因行必四相即俱有也行中五部亦同類也見歷四諦思歷一諦無明行中心心數法共行共感所作必同行有必招識等異熟此行心有遍行五部之惑若四緣中論云增上即能作因緣五因性比六因説可知記荊溪淨名記云十二因緣秪是四緣六因離之名十二因緣合之名六因四緣又離之名六因合之名四緣也且如下會十二緣只是俱舍六因謂無明既能通行是同類而行既有生住異滅四相是俱有又行中既有歷苦集滅道見惑及歷真諦一部思惑亦同類因又此無明及行二支中心心數法既皆共行共感則其所作必同是能作因而行有支既屬業道則業牽識走故行有必招識等異熟是異熟因又此行中既有遍行五部惑即遍因也若四緣下會大論四緣即俱舍六因謂大論既以諸法生時不生障礙名增上緣即是能作以能作因緣不礙於他也又大論以五因性名為因緣則因緣一種即相應等五因以上圖中示大論六因會通俱舍六因故言比説可知補蓋以無明為因而起染分思數及諸邊邪等惑而造於業無明既能通行是同類也行與四相俱生則以四相為因而有於行以行為因而有四相既同時有即俱有也行中所起五部惑同染污為性亦是同類五部謂見歷四諦思歷真諦或隨立一諦為一部也共行即同類因共感即俱有因所作必同即能作因又無明心數起時與染分心王相應而起是相應因行中心心數法作業之時無有障礙即所作因異熟見前備此節乃會四緣六因合十二因緣也辨訛曰此節六行文未妥今更釋之且如無明起時必有王所並起是相應無明與行和合而起即俱有無明中思種引起行即同類起染污行即遍行行緣識等即異熟識緣名色且屬能作名色緣六入亦同類入緣觸是所緣觸緣受是等無間取緣有亦同類有緣生等亦異熟生緣老死亦同類增上能作支支皆具略論如此問舊引論言增上即能作因緣五因性二緣已會餘二若何答如無明滅引起行支即等無間行能反緣無明是所緣緣也餘例知然十二支但是有情相續六因四緣通一切法私謂辨訛意以注未暢發而更釋之若果全未妥應一一指出至無明滅句此中約三世果報言無明屬癡行是造作當以心心不住為等無間無明托所行境為所緣此行境又為生無明之緣是緣緣義辨訛又曰此行必有遍行惑句與論有礙前言報生心心數法從五因生唯除遍因此中明招異熟之行而言必有遍行又異熟即是報生翻譯不同耳又凡言行者必須具善惡無記三種若論惡行容有遍因於中含有善與無記豈可槩言遍因耶私謂心境法於四因六緣有增減不同四六合十二未可支支全合似不當以行招後識異熟難行當分遍因也至遍因至見疑癡等凡染污善法凡外皆具足也並存以俟後定注輔行八上十一云大論問佛説因緣甚為難解云何令於癡人觀耶答非如牛馬等禪門但云聰明利根分別籌量不得正慧邪心取理名為愚癡文記大論云愚癡者非如牛馬等愚癡是人欲求實道邪心觀故生種種邪見是愚癡人當觀因緣名善治法禪門下重證注此因緣觀與支佛何異今是助道破障略論三世支佛正觀破惑必須逆順兩緣百千萬世因緣等記支佛逆順兩緣至百千萬世因緣等者四教義云一觀屬愛十二因緣二觀屬見十二因緣初者即為二義一推尋二觀破一推尋者若聞正因緣生滅法信解分別覺一切屬愛煩惱皆十二因緣觀因緣入定欲息心達本源求自然慧樂獨善寂修習定心得諸禪定住此定中知屬愛煩惱即是無明逆順推尋即見十二因緣云何逆推此愛因何生即知因受受因觸觸因六入六入因名色名色因識識因行行因無明過去一切煩惱也復順推此愛愛能生取因取則有業因有業則有生因生有老死憂悲苦聚輪轉無際若因停心觀入深禪定如是逆推尋或時見歌羅邏初受生乃至見過去身起業煩惱乃至二生百生千生也順尋取有若因禪定力或見未來一生二生乃至百千生若見過未事其心悲感道心轉增也二觀破者即性念處歷別觀十二因緣也性念處觀略如前説所以者何若觀愛即污穢五陰性念處若觀愛觸六入名色識即觀果報無記五陰性四念處若觀行即善不善五陰性四念處若觀無明即過去污穢煩惱五陰性四念處若觀取即現在污穢五陰性四念處若觀有即善不善五陰性四念處若觀未來生老死即報生無記性四念處是則用念處逆順觀察破四顛倒顛倒若滅即無明一切煩惱滅以無明滅故行滅乃至老死滅是名性四念處歷別觀屬愛煩惱因緣觀也次者亦二意一推尋二觀破一推尋者若見神我及世間常無常亦常亦無常非常非無常是則現在生身邊四見因此身邊四見生十四難六十二見此身邊四見即四取逆順推尋此取因四愛愛因四受乃至四行因四無明復順尋四取能生四有此有即受一切二十五有生老死憂悲苦惱若因停心觀得深禪定或見過去未來生事具如前説觀二破因性念處觀觀四取身邊四見如是次第乃至無明破過去如去不如去亦如去亦不如去非如去非不如去身邊二見污穢五陰也復順觀四取有乃至生死破未來有邊無邊亦有邊亦無邊非有邊非無邊身邊二見污穢五陰也若能如是用性念處破三世身邊二見之四見即破十四難六十二見一切屬見煩惱一時皆滅是名無明滅即行滅乃至老死滅若屬見煩惱滅即還用前觀愛十二因緣性念處觀破欲色無色愛皆滅是則三界煩惱業道滅者名為有餘涅槃若苦道滅者即是無餘涅槃是名因性念處智慧觀十二因緣入涅槃也乃至言共念處緣念處助觀十二因緣類前可知五治障觀法五多障衆生念佛觀注止觀云睡障念處乃云逼迫障禪門第四明三種障念三身治彼通大乘今且明小乘助道障即惡業三種者一昏沉暗塞障昏睡無記念應身三十二相治二惡念思惟障欲作五逆十惡等事念報身力無畏等治三境界逼迫障身忽卒痛或見無手足火焚水溺等也念法身空寂無為治文今明小乘助道記睡障云逼迫者相宗明睡眠以昧略為性障觀為業念以明記不忘為性定依為業睡與念體用相反故念則睡破睡強則念障應知昏睡強勝如山粗重壓逼身心受逼難過故曰逼迫障今以念佛觀治之禪門用三身治三障法今具記之云念應佛者於三十二相中隨取一相或先取毫相閉目而觀若懸作不成當對一端嚴形像一心取相緣之入定若不明了開眼更觀復更閉目如是取一相明了次第遍觀衆相使心眼開明即破沉暗念報佛者以正念緣佛十力四無所畏十八不共一切種智圓照法界常寂不動普現色身利益一切功德無量如是念時即是對治念法佛者即觀法性平等不生不滅無有形色空寂無為無為之中既無境界何者是逼相知境界空即是對治若念三十二相即非對治何以故是人未緣相時已為境界惱亂而更取相者多因此著魔狂亂此乃通大乘觀今是小乘助觀唯念應身佛也注據四教義云破境界逼迫障合念真空法身記此出四教義念佛破逼迫障然意與禪門較異也補真空法身者小乘所證真空五分法身也阿含言佛法身者即空故約小乘當分言之即以丈六相為應從因感果為報五分為法身也注若以身對教如輔行一下七云前之三教各念一身謂生應報圓念法身諸身具足文記藏念劣應生身通念勝應應身別念報身圓念法身以法佛體圓具足諸身故念法身即具足生應報也二立觀定境法二初別二別相念處如前四念處是注妙玄四二十三云五障既除觀慧諦當能觀四諦而正以苦諦為初門作四念處觀破四顛倒文記聲聞根鈍正以苦諦為初門觀不淨苦無常無我也注析玄上二十云別謂各別身受心法不同故相謂行相觀此四法作不淨等行相故言念觀者然觀體非念觀是其慧推求觀察知不淨等故乃至處謂處所謂身受心法是念所緣住止處故文記身聚集義受領納義心了別義法有二想以取相為義行以遷流為義今名念者四念處言為初學用念持慧不妄受異緣念為增上故從念受名也注於五陰境修四念處為破四倒合五為四受則六根對六塵義兼內外故獨為一想行一向居內故合為一記四念處云人於色起淨倒受起樂倒想行起我倒心起常倒破四倒故合五為四也若意根對法塵受名內受眼等五根對色等名外受然境雖內外而領納非二故受獨為一而想則取相在心行則念念不住一向居內合為一也注又此念處別名屬慧通亦有定輔行三下十七云四境止心故名為定文二總三總相念處一觀身不淨受心法皆不淨乃至觀法無我身受心亦無我中間例知已上三科名外凡亦名資糧位注此有四句四念處一云一境別觀別正是別相念處二境別觀總三境總觀別此二是總相之方便四境觀俱總是總相念處文初則一藥對一倒中間二句觀心漸熟或別於一境總用四觀或別用一觀總觀四境第四境觀純熟舉一俱得也記以不淨治身倒乃至以無我破我倒如上別念是為境別觀別或別於一境總用四觀者如觀身不淨乃至以是苦無常無我是為第二境別觀總也或別用一觀總觀四境者如舉一不淨觀非但觀身亦復觀受觀心觀法皆是不淨是為第三境總觀別也第四舉一俱得者如舉身念處一境而受心法俱在其中若舉不淨一觀而苦無常無我皆在其中是為第四境觀俱總也注若析玄準俱舍疏前三皆別相攝第四句方是總相位記陳譯俱舍疏言四中三種唯不雜緣第四所緣通雜不雜若唯觀法名不雜緣若於身等二三或四總緣而觀察名為雜緣今此指之者意在所揀也注今依妙玄四念處初句是別後三皆總今此正當境總觀別謂別用一觀總觀四境記今依妙玄判初為別後三皆總今此下正判儀文是第三句如言觀身不淨受心法皆不淨是也注又上停心破障四念處惟觀苦諦至內凡位方觀四諦妙玄四三十三云七賢位人明識四諦此約解説記惟觀苦諦謂總別念處所觀身受心法惟約苦諦也如言正以苦諦為初門也至妙玄云天魔外道愛見流轉不識四諦七位明識四諦者此約解説如大經言我昔與汝等不見四真諦見四諦者識屬愛四諦識屬見四諦皆能明了若解四諦則所見真正無有邪曲則知七賢但約解也辨訛云唯觀苦諦句太局若言苦諦為初門則可以念處所觀身受心法即苦所對破常樂我淨即集念處觀即道所滅即滅諦不可局言唯觀苦也私謂唯觀者乃專注在苦非謂只觀苦諦餘三諦便不觀也詳論見下圖中注心行理外名外凡資糧者從喻也欲越三有此為資糧記莊子言適百里者宿舂糧適千里者三月聚糧資糧不充罔克前進欲越三有非此不能發足前進故名資糧補妙玄言前已別相念破四倒今深細觀慧總破能生正勤如意覺道疾入後法也二明內凡二明內凡者有四謂暖頂忍世第一此四位為內凡亦名加行位又名四善根位注漸見法性心遊理內身居有漏聖道未生故名內凡以定資慧加功用行故名加行備法性指偏空理也記定慧缺一不可前進外凡有觀少定今內凡勇猛增進加以禪定資乎觀慧名加行注聖道根本亦曰善根記根有出生之義此四能發覺支之華聖道之果四果善法由此而生又名善根注暖從喻妙玄四二十四云以別總念處觀緣四諦境能發似解伏煩惱惑得佛法氣分如鑽燧先煙春陽暖發以慧鑽境發相似解解即喻暖此喻慧行又如春夏積集花草自有暖生以四諦慧習衆善法善法熏積慧解得起故名暖也此喻行行記大經疏迦葉品亦有此文義釋名暖注頂妙玄四二十四云似解轉增得四如意定十六諦觀轉更分明在暖之上如登山頂觀矚四方悉皆明了故名頂法文記解慧增長復加定持處暖之極所以喻登山頂覺慧了了分明也妙玄又言如山頂之道人不久住若無難必過此到彼行者住頂不久若無難必到忍若有難退還於暖也注忍妙玄四二十四云亦是似解增長五種善法增進成根於四諦中堪忍樂欲文亦忍可義記忍位復有似解根增故所有暖位積集信進念定慧五種善法增進成根便能於四諦境中堪忍樂欲以是得名忍也又忍者以四諦境忍可於心心中了了吐露不出名忍注世第一釋籤五四云此是有漏故名世間於中最勝故云第一文記玄文云此心心所法於餘法為最為勝為尊為上亦分勝亦都勝謂分勝彼暖頂忍法分勝暖頂忍一切凡夫所得禪無量解脫除入也除入即勝處又都勝者非謂都勝一切事業但以能開聖道門故彼見諦等不能開聖道門以世第一法開聖道門彼見諦等法得修見諦等法得修者皆世第一法功用是知從功能立名也是第一法名義者最勝義是第一義得妙果是第一義如高幢頂更無有上是第一義也注此四位觀行者俱舍頌云從此生暖法從總相後生暖善根記論解云修習總緣共相法念住漸次成熟乃至上上品從此念住後有順決擇分初善根生此法如暖立暖法名是能燒惑薪聖道火前相如火前相故名曰暖注具觀四聖諦修十六行觀四諦為所緣十六行為能緣釋籤謂暖八諦十六行相有解八字字恐誤或約上二界四諦體同通解云八耳其實只觀欲界四諦此位有三品記論具釋云此暖善根分位長故能具觀察四聖諦境及能具修十六行相十六行如後解三品者妙玄云暖有三謂下下下中下上也備辨訛云遍觀上下四諦故言具觀及籤云八諦耳非外凡唯觀苦至暖位方具觀也故荊溪特曰八諦詳論見下注次生頂亦然用觀同前亦有三品記論曰此暖善根下中上品漸次增長至成滿時有善根生名頂此轉勝故更立異名動善根中頂為最勝如人頂故或由此是進退兩際如山頂故説名為頂此亦如暖具觀四諦及能具修十六行相妙玄云頂有三種謂中下中中中上是也注下中忍同頂下忍遍觀八諦中忍縮觀明滅緣行今皆云同頂者下忍雖上下遍觀不出四諦中忍難滅緣行約初觀説記論具云此頂善根下中上品漸次增長至成滿時有善根生名忍於諦理能忍可中此最勝故又此位忍無退墮故名忍此忍善根安足增進皆法念住與前有別然此有上下上中上上下中二忍與頂同謂具觀四諦及具修十六行相上品有異唯觀欲苦與世第一相鄰接故有此義準暖等善根皆能具緣三界苦等義已成立無簡別故謂瑜伽師於色無色對治道等一一聖諦行相所緣漸減漸減乃至但有二念作意思惟欲界苦聖諦境齊此以前名中忍位補籤云此中忍位未減道時雖減行相未減道故故得具觀四種諦也頌云下中忍同頂約此而説若此中忍減道諦時但修十二行既減彼道心無欣慕故彼道下四行亦不得起由此道理減滅諦時但修八行除道滅下各修四行故減集諦時但修四行故中忍具修十六十二八四行相是也注上惟觀欲苦一行一剎那此上忍合有一行二剎那心言一剎那此據滿説記論釋云從此位無間起勝善根一行一剎那名上品忍此善根起不相續故補籤謂上忍惟觀欲苦及一行一剎那名上忍又云於上忍中亦修四行雖起一行一剎那心以觀苦故起能得修彼苦下四行相故問於上忍位減彼三行何故修彼所減行耶答雖減彼行不減諦故欣慕心故故得修彼所減行相於中忍位修所減行準望可知留苦下一行者擬入見道故須留也注世第一亦然上忍位中有二剎那一剎那盡餘一剎那在名上心滿即入世第一今一剎那引入無漏故云亦然也記釋論云上品忍無間生世第一法如上品忍緣欲界苦諦修一行相唯一剎那此有漏故名為世間是最勝故名為第一有士用力離同類因引聖道生故名最勝備辨訛曰圖中唯觀欲界苦句似局如修六妙發色定即以色定為所觀豈局在欲界且俱舍二十六明四念具攝十智豈但觀苦耶又復但觀欲界四諦句亦似局加新婆沙七明暖加行位中即具觀上下八諦俱舍二十三云暖等善根皆能具緣三界苦等之文且暖善根多從色定發下惑已伏上方生上定既生上惑隨起豈可有病無藥乎釋籤四云從暖善根去至世第一成或遍觀上下或捨上緣下非但觀欲界也私謂俱舍論云緣總雜法念住中總觀所緣身等四境修四行相所謂非常苦空非我修此觀已生暖善根又言故唯有四不增不減集注據此故判外凡唯觀苦諦論又云傳説在定以極微剎那各別觀身名身念住滿雖不指定欲界然外凡尚不暇觀欲界集等似不及於色苦集注之説非無因也辨訛所引念攝十智似不必引立意不同至暖頂能緣三界玉師非不知之而判觀欲界想從多分言之存俟後定記妙玄問世第一有三品否答一人無多人有身子上目連中餘皆下就佛支佛聲聞為三品也注中忍減緣行者若遍觀八諦修三十二行名下忍位若初依欲界苦修四行次例觀上二界苦亦四行又觀欲集四行次上二界集四行乃至上二界道下不用最後乘之一行名為一周減一行也記此明一周減上界道諦下乘之一行注復從前觀從後減至第四番減上二界道諦下道之一行到此能緣之行既無所緣之諦亦減此道行與道緣同名亦與緣同減故云減緣必減行據初一行減行未必減緣據後三行記此明至四周緣行同減也釋籤云一一諦下各有一行與緣名同亦與緣同減是也所言緣行同減據初一行者即指道減行據後三行者即指正迹乘也注第五番減欲界道諦下乘行乃至最初欲界苦下空行總有三十一周減緣減行皆名中忍唯留一行并所緣苦境入上忍位記釋籤云緣之與行皆從後減故使欲界最後留苦行都有三十一周減緣減行後但有一行二剎那心觀於欲苦名中忍滿唯有一行一剎那心觀於欲苦名上忍成就是則能緣所緣同一苦名故同留之入上忍位也此位所留一行隨行者所宜如釋籤第四云云記釋籤言隨緣一行一剎那不住故似見道所以者何行人有二種一愛行二見行愛有二一我慢二懈怠見亦有二謂我及我所著我慢者修無常入世第一法懈怠增者修苦入著我者修無我入著我所者修空入故知所留一行不必定之一種但隨行人所宜一種即當留之以入世第一也注是則上四下三七緣與初行同名行與緣同減故釋籤四四云七周減緣二十四周減行記故釋籤下示分周減緣行謂上下八諦名緣是所緣故各十六行故三十二名行能緣行故應知七周減緣二十四周減行謂一一諦下各有三行與緣名異亦不與緣同減從行為名故三八二十四周減行又一一諦下各有一行與緣名同亦與緣同減但從緣為名故名七周減緣是則上界四諦下界留苦唯減三緣上四下三名七周也備辨訛曰圖列空下不淨準婆沙俱舍瑜伽皆同列空無不淨名故知非新譯之不同輔行中荊溪一時便寫耳準大論不淨觀是初入門淨顛倒故生淫欲為破淨故言不淨是得解脫非實觀故不淨不入十六行數存考記恐人不解從上例下自前至後順觀四諦復自上還下從後至前逆次漸減緣行故以圖示令易曉也補俱舍言如荷重擔故苦內離士夫故空非究竟故非常不自在故非我又等現理故集如種理故因成辦理故緣相續理故生如泥團輪繩木等衆緣和合成辦瓶等又牽引義故因出現義故集滋産義故生為依義故緣又不續相續斷故滅離三有為相故靜勝善義故妙極安穩故離又言通行義故道契正理故如正趣向故行能永超故出注十六行義如輔行三下十七及析玄上具釋記此釋十六行之義如輔行云苦下四行無常苦空無我觀因緣生念念生滅故無常為無常所逼故苦一相異相不可得故空我我所不可得故無我集下四行集因緣生有漏和合能招苦果名集觀於六因能生苦果名因觀於四緣能生苦果名緣還受後有苦名生滅下四行滅盡妙離諸煩惱滅名滅一切苦盡名盡一切第一名妙超過生死名離道下四行道正迹乘能至涅槃名道非顛倒法名正聖人行處名迹運至三脫名乘注又上二界合一四諦者同一定地故以欲界現前比上而觀故析玄五義備釋云云此則伏三界四諦下惑至發真時故上二界同名比法忍智等補析玄云上二界四諦有五義同故得合觀一者同一天趣二者同一定地三者同一化生四者同一煩惱性五者同能引生無漏注又十六行只是觀門涅槃疏名十六諦者取諦審觀察義故記涅槃迦葉品云十六行者即十六諦亦是苦法忍苦法智苦比忍苦比智等此中既未斷惑故知仍取諦審觀審之義注又此減緣行妙玄三八合作八番者以行從緣但約八諦為八周也四教義二十二云中忍作十番縮觀者約後七諦以行從緣為七周開欲界苦下所減三行為三周總為十番妙玄八八云三番縮觀進成上忍者以三界不出四諦亦以行從緣減後三諦故曰三番諸文詳略不同蓋赴機異耳記妙玄八番者文言忍法觀者正觀欲界苦色無色苦欲界行集色無色行集欲界行滅色無色行滅斷欲界行道斷色無色行道如是三十二心名為下忍行者後時漸漸減損行及緣復更正觀欲色無色苦乃至觀斷欲界行道除觀斷色無色行道從是中名中忍復更正觀欲界苦觀色無色苦乃至觀色無色行滅除道一切道復正觀欲苦色無色苦乃至觀欲界行滅除色無色行滅復正觀欲界苦乃至觀色無色行集除滅一切滅并除欲界滅復正觀欲苦乃至觀欲界行集除色無色行集復正觀欲界色無色界苦除一切集復正觀欲界苦除色無色苦復正觀欲界苦常相續不斷不遠離如是觀時深生厭患復更減損但作二心觀於一行如似苦法忍苦法智如是中觀名中忍復以一心觀欲界苦名上忍復次生世第一法後次生苦法忍今此以行從緣釋之合作八番意也四教義十番縮觀者文云下忍於十六行作法諦觀中忍十番縮觀上忍但觀欲界苦下四行今但明中忍也又妙玄明中忍三番縮觀今此亦以行從緣釋明三番意也注四善根勝利者俱舍頌云暖必至涅槃頂終不斷善釋籤四云忍位是進暖位是退頂位是進退兩際猶如山頂文四教義二云暖頂退者何云性地答此人雖造惡墮地獄一入受罪不復重入有性地善根故能得聖果文且必至涅槃與終不斷善有何異耶蓋暖雖造惡入獄終不久留後必生人天證涅槃果若到頂位雖退入惡必不起大邪見斷善根故但有明昧淺深之殊其善根一也記四教義言若通論四善根亦名四忍但忍法不退別受忍名若暖法遇惡因緣退能造五逆謗方等經作一闡提墮無間獄若頂法遇惡因緣退雖不斷善猶作五逆等故復有此問也答意明雖造惡墮苦後罪畢脫苦不但不復造惡又能承善證聖且下辨暖頂善根異相答明二位雖同造惡墮苦而有起見不起見斷善不斷善異論釋言四善根中若得暖法雖有退斷善根造無間業墮惡趣等而無久流轉必至涅槃故若爾何須順解脫分若無障礙去見諦近此與見道行相同故若得頂法雖有退等惡增畢竟不斷善根備暖頂是藏內凡性地是通內凡以內凡位同故暖頂判性地性地解見七卷注忍不墮惡道四教義二十二云下中二忍雖起煩惱惡業而不受三途猶生人天百千萬生若上忍成但有人天七生業在記四教義云於四諦堪忍欲樂名忍位於頂法位用正方便勤修增進頂法善根依六地定若頂法善根增進即生柔順忍亦緣四諦十六行爾時信等五種善法並得成根以慧根故於四聖諦堪忍樂欲名忍法今此智強惑弱諸惡所不能動以忍力大故一切惡心非數緣滅如獅子王餘獸遠避故不墮惡道也論釋云若得忍時雖命終捨住異生位而進無退不造無間不墮惡趣然頌但説不墮趣準義已知不造無間業無間業者必墮惡趣故忍位無退如前辨此位不墮諸惡趣者已遠趣彼業煩惱故若至忍位於少處生身有惑中得不生法故趣謂諸惡趣生謂卵溼生處謂無想北俱盧大梵處身謂扇𢮎半擇迦二形身有謂第八等有惑謂見所斷惑此於上下忍隨所應而得謂下忍得惡趣不生所餘不生至上忍方得補扇𢮎者生而男根不滿半擇迦翻變今生變作出法數注第一入離生此一剎那即入見道故同見道離四趣生記論釋言世第一法雖住異生位而能趣入正性離生頌雖不言離命終捨既無間入正性離生準義已成無命終捨何緣唯此能入離生已得異生非擇滅故能知無間道捨異生性故此四善根各有三品由聲聞等種性別故補婆沙云世第一法與苦法智忍作等無間緣無有一法速疾回轉過於心者可與爾時能作障礙令不得入聖諦現觀是知此法決定不退入於正性離四趣生注問前中忍中玄文云但作二心觀於一行釋籤何云彼四心同一行一緣耶答中忍二心似於忍智二心也以由忍智二心雖在世第一後心發真而得今中忍位有此似解故云如似約一行説但有二心故云但作二心觀於一行若釋籤云四心者緣行各二故云彼四心同一行一緣也記此料揀中忍位中觀心也問以玄文二心觀一行而問釋籤四心同一緣行答中先明玄文所言如似苦法忍苦法智如是正觀是名中忍之意故直以似於世第一法忍智二心標答妙玄此節全文見本卷六十紙以由下出其如似之由此問中未敘明答中補出也約一行説下方示玄文言二心之意若釋籤下約緣行各二以等四心同一行一緣意也補四心同一行一緣者婆沙云減至苦法忍後心得正決定彼四心同一行一緣所謂增上忍如似世第一法中苦法忍苦法智二心同緣是也又忍智二心雖於世第一後心引生無漏發真方得今中忍位中有此忍智二心相似之解故玄文云如似苦法忍苦法智也備辨訛曰緣行各二句似不可能所分開當知籤中云四心者是指中忍位中相似忍智二心上忍位一剎那心世第一一剎那心也存考注釋籤四引論明修暖法從欲界至無所有八地各九品并一具縛總七十三人是則暖法通於三界涅槃經何云如是暖法是色界法非欲界有文須知能修之人通於三界所發暖法依色界定發也釋籤引評家云盡是色界法住定地法文涅槃疏作三義釋云一多用定發暖法觀從多為言二據中間三界皆能發於暖法而色界居中故言色有三據處為語色發暖法易欲界則難文記此明料揀暖法七十三人涅槃疏明三解一莊嚴云欲界十善相應心名電光定時得時失故此人名具煩惱性不開品數若論方法定有九品惑亦九品以九定斷九惑足電光一人成十色界四禪無色三空皆九品惑九品定七九六十三足前十人合七十三二開善云無別電光異方法亦無方法異電光只電光定對九品惑成九定初一品定只是實法未賴於假猶是惑抗行未能伏惑第二品定與初品作相續假共為力用方伏初品惑第三品惑伏第二品惑乃至九品定伏第八品惑餘有欲界第九一品惑在牽於初禪一品定起共伏之并四禪三空一一皆九惑九定乃至不用處九品定伏八品惑餘第九品惑在更將非想定伏不用處第九品惑八九七十二復將非想定足之合七十三三數人解者二不同一事障未來者分九品解一品解對斷一品惑復有十善相應心即具煩惱性人足前成十也具煩惱人與初品定共斷一品惑後去一品解對斷一品惑四禪三空一一九定九惑成七十三二性障根本者未來禪九品定斷欲界九品惑取欲界具煩惱性一人足此九品成十如是十人皆有未來禪二禪未來定斷初禪九品惑三禪未來九品定斷二禪九品惑乃至非想未來定斷不用處九品惑亦七十三故疏問云前明暖是色界法何得通於三界作七十三人答初學之人須依四禪據後利時則通三界又昔在凡外曾得七十三定今入佛法作暖法觀是也涅槃經迦葉言佛説壽暖識三法和合名衆生若從是義衆生應先有暖云何説暖法因善友生佛言如我今説暖法要因方便乃得本無今有如是暖法是色界法非欲界有因善友者依善友教示修行始得也今注為別明暖法所通界地故引籤文中之問為問答中謂據能修暖法之人故言暖通三界而所修暖法必依色界定發也引評家下以玄文云頂法者色界善根有動不動住不住難不難斷不斷退不退就動至退有二下是暖上是頂彼不動至不退為二下是忍上是世第一籤云此文同論以論云有説欲界善根有二下者暖上者頂色界善根有二下是忍上是世第一評家曰不應作是説應曰盡是色界法住定地法聖行法好今依評家故言色界此等只是判四善根以有動等之異對四不同故也動乃至退分二不動至不退分二雖同在色界由善根深淺異故致使差降不同動謂猶為外緣所動住謂久住暖頂難謂暖頂有難斷謂斷於善根退謂退為五逆等不動等反是已上籤文涅槃疏作三義釋如文可知補毗婆沙言欲界十種謂一具縛凡夫二除一品結乃至九品盡者初禪有九或有除一品結乃至九品初禪無具縛人即欲界説故如是乃至無所有處九雖頂忍世第一亦如是總七十三人有言以非非想著禪定最深不能修暖法故除非想一地評家清涼疏鈔云婆沙是諸羅漢集而有四大羅漢為評家正義一世友二妙音三法數四覺天聖行法即暖頂等非凡夫行故備辨訛曰能修通三界等大約發暖法多分在欲界得上地定而發注引涅槃是色界法當知是佛破迦葉難問壽暖識三衆生有暖之辭故佛答如是暖法等也後言色發暖法易欲界則難正顯修欲界定發暖法難須修色界定發暖法方易也存考三結顯異名上來內凡外凡總名凡位亦名七方便位注以此七位為入聖道之方便諸文或云五方便者蓋停心破障故不論總別念處但合為一文備以停心非正觀故
