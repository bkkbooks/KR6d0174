body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢六菴較訂天台嫡裔比丘諦間編科參梓三滅諦三初標名三滅諦者二示體滅前苦集顯偏真理三揀非因滅會真滅非真諦注法界次第中十云滅以滅無為義結業既盡則無生死之纍故名為滅妙玄二二十云二十五有子果縛斷是滅諦文記結業即集生死即苦玄文言癡惑之本既無常苦空無我則無明滅無明滅故諸行滅乃至老死滅若不燃火則無煙名子縛斷無子則無果滅智灰身離二十五有名果縛斷又言若發見思無漏真明具三十四心斷結者三界九十八使皆滅以煩惱結使滅故三界業亦滅若三界業煩惱滅者即滅諦有餘涅槃也因滅故果滅捨此報身後報不續名無餘涅槃真滅度也滅理不虗曰諦注觀音玄記上十七云滅諦之體是二涅槃雖非真諦能冥於理故云因滅會真滅非真諦因滅苦集方能會真非謂此滅便是真諦記先問三藏所談滅非真諦今文依滅起第四誓那云真諦無為理耶答滅諦之體是二涅槃雖非真諦能明於理故曰因滅會真道是滅因苦集違理佛既契真故成佛誓觀真而發是所引文乃釋依滅起成佛誓義今證揀滅非真也補涅槃翻滅度大患永滅超度四流故備滅但功用盡處若真諦即下法性自天而然也注止觀一十二云法性自天而然集不能染苦不能惱道不能通滅不能淨如雲籠月不能妨害卻煩惱已乃見法性經言滅非真諦因滅會真滅尚非真三諦焉是文輔行一下十一云當知苦集但是能覆不能惱染道滅能顯而理本淨法性如月苦集如雲道如卻除滅如卻已文補輔行言法性與真名異義同備問藏教何為真理曰枯寂偏空也四道諦三初牒名四道諦者注法界次第中十云道以能通為義正道及助道是二相扶能通至涅槃故名為道文記正道者實觀三十七品三解脫門緣理慧行及忍智無礙解脫三十四心真無漏慧也助道者得解觀中諸對治法及諸禪定皆助道有餘方便對治諸禪三昧三十七品等皆助道也備下集注言此道品通正通助大約止觀法皆正道二十五前方便皆助道也注妙玄二二十云戒定慧無常苦空能除苦本是道諦文記苦本即結惑二示體二初總標廣略略則戒定慧廣則三十七道品注略則戒定慧釋籤三九云道品雖多戒等攝盡戒攝三正語正業正命定攝十四如意足定根定力除覺定覺捨覺正定慧攝十八四念處四正勤進根慧根進力慧力擇覺進覺喜覺正見正思惟正進精通定慧念根念力念覺正念止觀七九云念通緣兩處通三學信根信力輔行云一切諸法信為本故文廣則三十七道品三四二五單七隻八若六度攝三十七具如輔行七上二十一記三四即念勤足二五即根力七即覺八即正道輔行六度攝道者檀具二覺謂除與捨尸具三謂正語正業正命忍具四謂念根念力念覺正念進具八謂四勤進根進力進覺分正進精禪具八謂四如意足定根定力定覺正定慧具十謂四念處慧根慧力擇覺喜覺正見正思餘有二信通三十五一切諸法信為根本故注道品者法界次第中十二云品者類也此七科法門悉是入道淺深之氣類故云道品也文備入道淺深應指對位相生兩種說記當分者止觀言未必全具道品方能得道三四二五單七隻八當分是道故曰依念處得道念處既爾餘品亦然為當分相攝者釋論言念處既攝餘品餘品亦攝念處為相攝對位者俱舍頌言初業順決擇及修見道位念處等七品應知次第增華嚴鈔曰初業者修總相別相念處此初業位能照身等四境慧用勝故說念處增順決擇者暖等四位也暖法位中能證異品決擇分殊勝功德勤用勝故說正勤增頂法位中能持善趣無退轉位定用勝故說神足增忍法位中必不退墮善根堅固得增上義說五根增世第一位中非世惑法所能屈伏得無屈義說五力增及修見道位者修道位中近菩提位助覺勝故說七覺增見道位中速疾而轉道行勝故說八正見增此對位義同也據止觀言八正是見諦位為第六七覺是修道位為第七乃是約位非調停也今約調停故以七覺為第六入正為第七相生者論言聞法已先當念持次即勤修勤故攝心調柔調柔故信等成根根增為力次七覺分別八正道是正行也有時八正在前未辦名道已辦名覺也又止觀云如修念處能生正勸正勤乃發如意如意生根根生力力生覺覺入八正為相生也注然此道品通正通助通大通小通漏通無漏亦漏亦無漏並如止觀第七具釋記止觀問道品是二乘法云何是菩薩道耶答淨名言道品善知識由是成正覺道品是道場亦是摩訶衍涅槃云能修八正道者即見佛性名為醍醐大集云三十七品是菩薩寶炬陀羅尼如此等經皆名道品何得獨是小乘又有漏道品欲界二十二未到三十六初禪三十七皆有漏道品如乳三藏道品如酪通教道品如生酥別教道品如熟酥圓教道品如醍醐或問三十七是助道是正道答大論云是菩薩道正也淨名云道品善知識由是成正覺助也又問三十七品是有漏者云何言七覺是修道法華云無漏根力覺道之財云何八正在七覺前答此應三句分別一三十七品皆有漏二皆無漏三亦有漏亦無漏大論言修八正道得初善有漏五陰善有漏五陰即是暖法暖法之前尚得修於八正道云何修耶謂初師受法繫心憶念名念處為求此法勤而行之名正勤一心中修名如意足五善根生名根根增長名力分別道用名七覺安隱道中行名八正道能如是修得善有漏五陰當知道品皆有漏也二皆是無漏者即是見諦思惟所行道品一向是無漏法華之文意在此也從來雖言有漏中得修八正七覺等未有文證而毗婆娑云八正在七覺後亦是有漏亦是無漏何以故依八正入見諦即是亦無漏若八正在七覺前一向是無漏此則可解又亦漏亦無漏即是對位意也注又小唯正道大通正助今是小乘道品義當相生記此明通局結歸也謂約小乘七科皆唯正道約大乘七科正助俱通也今文言小乘之道品當以相生之義為正也二別釋詳明二初標科此三十七合為七科記準瑜伽雜集三十七品總有七類一對治顛倒道四念處二斷諸懈怠道四正勤三引發神通道四神足四現觀方便道五根五親近現觀道五力六現觀自體道七覺分七現觀後起道八正道故科為七也二列釋七初念處一四念處一觀身不淨色蘊二觀受是苦受蘊三觀心無常識蘊四觀法無我想行蘊注四念處一五云四者數也念者觀慧也處者境也今言四者人於五陰起四倒故於色多起淨倒於受多起樂倒於想行多起我倒於心多起常倒舉四倒故言四也若相生次第應言識受想行色若粗細次第應言色行想受識今從語便故言身受心法文記觀慧釋念者同是別境心所慧觀由念得住也論云身應多觀不淨受應多觀是苦心應多觀無常法應多觀無我何以故凡夫未入道時起四顛倒故破淨倒說身念破樂倒說受念破常倒說心念破我倒說法念也四法次第者教中論相生從細至粗論除滅自粗至細今從語便也注若迷心不迷色則數為五陰若迷色不迷心則數為十二入若心色俱迷者則數為十八界如婆娑論俱舍頌云聚生門種族是蘊處界義愚根樂有三故說蘊處界諸有為法和合是聚義生長門是處義以能生長心心所法種族是界義如一山中有金銀銅鐵等名多界等補注十三卷十二紙記有為和含是聚義者是論釋頌以明蘊義次引經言諸所有色若過現未若內外粗細若劣勝遠近如是一切略為一聚說名色蘊由此聚義蘊義得成是也生長門是處義者亦論文釋頌以能生長心心所法一句是論主釋詞種族是界義下亦是論文釋頌又云如是一身或一相續有十八類諸法種族名十八界今以等字該之已上論文釋前半頌也而後半頌論釋云所化有情有三品故世尊為說蘊界處三門或愚心所總執為我或唯愚色或愚色心根有三謂利中鈍樂有三謂樂略樂中樂廣如其次第佛為說蘊處界三也補注神智師釋三大部記一色陰有十四種謂四大五根五塵二受陰領納所緣名受有六種謂六觸因緣生六受三想陰能取所領之緣相名想有六種謂取所領六塵相四行陰造作之心能趣於果名行有六種謂於六想之後各起善業不善業無動業也五識陰了別所緣之境即六識也以迷心偏重故聖教開心為四出法界次第補唯識論以受對前五識想對六識行對七識識對八識今此不論弗以唯識所解配合也記惑者迷色偏重故大聖開色為十心但為二也入以涉入為義根塵相對有識生識依根塵識為能入根塵是所入今此十二通從所入受名也內六親故屬內為識所依名入亦名六根者能生為義有生識功也一眼入眼是四大造色體為十色共成所謂四大四微身根微眼根微二耳入三鼻入四舌入均四大造色體為十色共成但各換一耳鼻舌根微也五身入但有九色所成謂四大四微身根微六意入除諸心數法但取能知諸法心王也外六疏故屬外識所游涉名入亦名六塵者染污為義色聲香味觸五入可解六法入有二種一者心法除心王但取相應諸心所法二非心法即過去未來色法及心不相應諸行三無為法補法入中無表色屬色心數法屬心不相應行非色非心三無為非三聚攝故不屬內色亦不屬外色也記惑者色心俱迷聖教俱開為十八也界以界別為義十八法各有別體故十二入及前五識界可解識以了別為義六意識界謂前五生已傳入意識即以前五為能生後意識為所生此意前滅次識續生即前意識生後意識如是亦脫傳受根識之名皆能生為根所生為識今專指所生為意識也上明蘊處界所攝法即小乘七十五法如云內色外色無表色即五根六塵十一種色法心王即前六識心所法明四十六謂遍大地有十受想思觸欲慧命作意勝解三摩地此十通善通惡遍一切心勝解者於理明了三摩云等持離沉掉曰等專注不散曰持大善地有十謂信勤捨慚愧無貪無嗔不害輕安不放逸此十不通於惡唯是善業能通至無漏聖道故云大善地捨者遠離掉舉大煩惱有六謂癡放逸懈怠不信昏沉掉舉此六依五六七識起不通於善唯是惡法故云大煩惱也大不善有二謂無慚無愧人因此二則無惡不造故云大不善也小煩惱有十謂忿覆慳嫉惱害恨諂誑憍此十但依六識而起故云小煩惱也不定有八謂悔眠尋伺貪嗔慢疑此八通於善惡無記三性故云不定法也無記者不善不惡無所記録也粗念曰尋細察曰伺不相應有十四得非得衆同分無想異熟無想定滅盡定命根生住異滅名句文也此十四不與色法心法心所法相應故衆同分衆人形狀相似也無想果報異世成熟曰無相異熟外道所修曰無想定聖教所修受想心滅曰滅盡定依事立名曰名積字成句詮差別曰句為名句依而能顯所表理曰文身即字也備無為有三天溪補遺引俱舍頌云此中空無礙謂大虗空無礙為性即虗空無為頌曰擇滅為離繫隨繫事各別隨三界繫不同名事離一繫故得一擇滅擇力所得滅名擇滅擇為斷智推度令滅故名擇滅非擇滅者頌云畢竟礙當生此二類不同謂根塵缺緣及所證位諸無知惑不得續起名礙當生如緣一色時於餘諸色及餘四塵得非擇滅為正緣色礙餘色等當不生故名礙當生其餘法數廣解注觀身不淨四念處一六云一切色法名之為身內身外身內外身己名內身眷屬及他名外身若己若他名內外身此三種色皆從前世不淨業生則有五種不淨謂生處種子相性究竟記大論言自身有二種一身內不淨二身外皮毛爪髮等皆不淨復次行者觀死尸䏺脹爛壞取是相觀自身亦如是相如是事我未離是法死尸是外行者是內如見端正女人而心著即觀其身種稱不淨為外知我身亦如是為內復次眼等五情為內身色等五塵為外身四大為內身四大造色為外身覺苦樂處為內身不覺苦樂處為外身自身及眼等根為內身妻子田宅所用之物為外身乃至今當總觀內外謂先觀內身求淨不可得次便觀外復不可得疑曰我觀內時於外或錯觀外時於內或錯故內外俱觀亦不可得然觀內觀外是別相一時俱觀是總相總觀別觀既皆不得淨相故知三種色從不淨生此明五種不淨望大論列次有殊以論列第一種子二住處三自體四自相五究竟對此前後可知注生處者女人之體是不淨聚蟲膿穢惡合集成立經十月日二臟間夾迮隘如獄釋論云此身非蓮華亦不由旃檀糞穢所長養但從尿道出記此釋生處不淨也大論言住處不淨謂諸不淨物和合名為女身內有生臟熟臟屎尿不淨外有煩惱業因緣風吹識種令入二臟中間如在尿坑中所謂是身為臭穢不從華開生亦不從薝葡又不出寶山迮隘如獄者胎骨經云嬰兒在胎有八種獄謂嬰兒之身最嫩母喫熱食如鑊湯獄母喫冷食如寒氷獄飽時如石壓獄饑時如餓鬼獄硬食如刀山獄行時辛苦如碓搗獄坐時如鐵床獄母若低頭如倒懸獄注種子不淨者攬父母遺體赤白二渧於中而住是識隨母氣息出入是為受身最初種子不淨也記此釋種子不淨也大論謂父母以邪念風吹淫欲火肉髓膏流熱變為精宿業因緣識種子在赤白中住是名身種如偈言是身種不淨非餘妙寶物不由淨白生但從尿道出是也注相不淨者頭等六分從首至足純是穢物譬如死狗盡海水洗洗死尸盡唯餘一塵一塵亦臭記此釋相不淨也大論亦名外身不淨謂是身九孔常流不淨眼流眵淚耳出結鼻中洟流口出涎吐穀道水道常出屎尿及諸毛孔汗流不淨如是不淨充滿身內如偈言常流出不止如漏囊盛物是也注性不淨者根本從穢業生託於穢物長養其性自爾不可改變記此釋性不淨也大論言自體不淨謂從足至頂四邊薄皮其中所有不淨充滿飾以衣服澡浴花香食以上饌衆妙肴膳經宿之間皆為不淨如說地水火風質能變成不淨傾海淨此身不能令香潔是也注究竟不淨者業盡報終捐棄冢間如朽敗木大小不淨盈流於外文記此釋究竟不淨也是身投火為灰在地腐壞為土在水䏺脹爛壞為水蟲所食一切死尸中人身最不淨如說審諦觀凡身終必歸死處難御無反覆背恩如小人是也注觀受是苦四念處一七云領納名受有內受外受內外受緣內名內受緣外名外受緣內外名內外受又意根受名內受五根受名外受六根名內外受一一根有順受違受不違不順受於順生樂受於違生苦受於不違不順生不苦不樂受樂受是壞苦苦受是苦苦不苦不樂受是行苦記此釋受也如論言佛說有二種謂身受心受心受是內身受是外又五識相應受是外意識相應受是內十二因緣故諸受生內六入分生受為內外六入分生受為外粗受為外細受為內又緣內法為內緣外法為外復次一百八受為內受餘殘是外受又言從內六情外六塵和合故生六種識六種識中生三種受行者觀是世間樂受皆從顛倒生俱無有實雖欲受樂能得大苦如是觀樂受是壞苦樂相壞苦相至即樂極生悲也觀苦受是苦苦五陰之身性常逼迫又與苦受相應苦上加苦也行苦者有漏之法四相遷流常不安隱也能如是觀則於樂受不生欲著苦受不生忿恚不苦不樂受中不生愚癡名受念處也注觀心無常者心即心王心王不住體性流動若粗若細若內若外皆悉無常記四念處云心者心王例上有內心外心內外心心王不住體性流動若粗若細若內若外皆悉無常無奢無促今日雖存明亦難保昔諸比丘謂不保七日乃至不保一日佛呵為懈怠又一比丘言出息不保入息佛言善哉剎那促時無常山水溜斫石光若不及時後悔無及是也今但略引耳今準論釋言心王不住者謂過去已滅未來不生現在一念不住疾故不覺若心一念住第二念亦應住是為常住無有滅相如佛說一切有為法三相住中亦有滅相若無滅者不應是有為相故知心無住時也若粗細內外皆無常者謂是有為法一切屬因緣故無常先無今有故今有後無故又復無常相常隨逐有為法故有為法無有增積故一切有為法相侵剋故無常於有為法心無常最易知如佛說凡夫或知身無常不知心無常若言身有常猶差以心為常是大惑何故身住或十二十歲是心日月時頃須臾過去生滅各異念念不停欲生異生欲滅異滅如幻事實相不可得故知心是無常名心念處也注觀法無我四念處一七云法名軌則有善法惡法無記法人皆約法計我我能行善行惡行無記若於心王計我已屬心念處攝若於心數計我從九心數一切善數惡數通大地數並屬行陰法念處攝此等法中求我決不可得龜毛兔角但有名字實不可得若善法是我惡法應無我若惡法是我善法應無我若無記是我無記不能起業但名因等起因此無記起善起惡善惡業尚非我因等起何得是我當知皆無有我但是行陰故經云起惟法起滅惟法滅但是陰法起滅無人無我衆生壽命雖有法起亦是顛倒顛倒者即是身邊二見記此釋法處也如教中明法者有軌持二義軌者軌生物解持者任持自性此但約軌物生解義以釋法名不取任持自性義者意顯法中無我實性可持故也約法計我者按定所計之我必依於法謂於心王計我上已觀為無常無實我體此除開心王若於心數等者此正推法無我於十大地數中除受以前觀受是苦攝今以九心數中想即想蘊餘八行蘊攝一切善數有十謂信進念定慧喜猗捨覺戒惡數亦有十謂恚恨讒誑憍忿怒慳癡妬皆行蘊攝通大地數者涅槃獅子吼品疏引數人云十數並起為大地通五品謂善惡無記不共薉污等成論云法起十數義說為十或言欲界十居止是十數謂三途人六天今觀此等行陰法中求其我體決不可得但有龜毛兔角之虗名字而無實事也次以善惡無記互奪觀法無我謂若善法是我以善奪惡惡法應無我以善是惡主對故若惡法是我以惡奪善善法應無我以惡是善違害故則互奪兩亡善惡法俱非是我何得言我能行善行惡乎若言無記法是我然無記於法無所記録則不能親起作業但名因等起耳謂因此無記故方能起善起惡是則所起善惡之業尚非是我而此因等起之無記何得是我乎已上觀法無我竟當知下指是行陰於中起滅故經云下引證此中無我人衆生壽命者謂無生空四相正與金剛四相義同金剛四相者我是自在之名人為主宰之目衆生者取續前義壽命者取接後名則以四為人執故同此中義大論云人者謂於陰界入中謂我是行人我者於陰界入計我我所若即若離衆生者於陰界入和合之中計有我生壽命者於陰界入中計一期果報若長若短又法數言衆生於五陰法中若即若離計我及我所五陰是實名我相於五陰法中妄計我是人我生人道異於餘道名人相計五陰衆共而生此身名衆生相於陰法中計我受一期壽命長短名壽者相今既知但是陰法起滅則無人我等計也已上破我執下并破法執或謂既是法起法滅而法應實有耶故言雖有法起亦是顛倒即是身邊二見謂此五蘊法中本非有身而起此見妄計為身本非斷常而起邊見妄自執之為斷為常非顛倒而何故知由顛倒而見有法其實法亦當體全空則知不但法中無我而法亦空今且破我見故言法無我也注想行蘊者止觀五八云想取相貌行起違從文記想謂取相在心行謂於好惡相邊起違從之念念起念滅遷流不住也注念處居初者一佛囑佛將入涅槃阿難請問佛去世後比丘依何修道佛答比丘當依四念處行道二依經止觀五二云大品云聲聞人依四念處行道菩薩初觀色乃至一切種智章章皆爾故不違經文三現前止觀五云又行人受身誰不陰入重擔現前是故初觀文輔行七上十二云以四念處能為大小觀行初門如來殷勤遺囑意在於斯文記此釋注中問答也如大經佛涅槃時答阿難言佛滅度後當依四念行道二依經下章章皆爾者謂菩薩觀不淨苦空無我至於一切種智皆應先觀色故輔行云大品凡列法門皆以五陰為首三現前下大論云五陰粗重常惱故名擔如佛說五陰是擔羅漢此擔已除名棄擔則知行人陰入重擔現前也二正勤二四正勤一未生惡令不生二已生惡令滅三未生善令生四已生善令增長記此釋勤者不惟力勤當以繼念為勤也念智如火勤力如風智得勤力無往不克瑜伽論曰於四念住中慣習行故已能除遣粗重了達善不善等從此無間於未生善法令生於已生惡法令滅注正則不邪勤則不怠輔行七上十二云只是於前念處精勤除惡生善文從語便先除二惡次生二善據行必以已生善惡居先未生善惡居次並先明滅惡次明生善文記善惡二法有通有別通如大乘勤觀法性為善實相之外皆名為惡別則取觀中懈怠五蓋等為不善其能對治為所生善也注止觀七二十六引十住毗婆娑偈云斷已生惡法猶如除毒蛇斷未生惡法如預防流水增長已生善如溉甘果栽未生善為生如鑽木出火文一未生惡令不生四念處觀時若懈怠心起及諸煩惱惡法雖未生恐後應生遮信等五種善根今為不令生故一心勤精進方便遮止不得令生也記此四正斷中名斷斷瑜伽論言斷斷者即未生惡法為欲令彼不現行斷為欲令彼不現前斷為斷故斷名為斷斷備辨訛曰若懈怠起句准法界次第無此起字若言起如何說未生注二已生惡令滅四念處觀時若懈怠心起諸煩惱覆心離信等五種善根如是等惡若已生一心勤精進方便除斷令盡也記四正斷中名律儀斷瑜伽論曰律儀斷者即已生惡法應修律儀令其斷滅不應忍受也注三未生善令生四念處觀時信等五種善根未生為令生故一心勤精進方便修習令善根生也記四正斷中名修習斷瑜伽論曰修習斷者即未生善法由於善法數數修習先所未得能令現前能有所斷也注四已生善令增長四念處觀時信等五種善根已生為令增長故一心勤精進方便修習令不退失增長成就記四正斷中名防護斷瑜伽論曰防護斷者即已生善法由於已得已現在前諸善法中遠離放逸能生善法住不忘失修習圓滿防護已生所有善法能有所斷也問何以七科此四名正勤及後八名正道餘不名正耶答心勇發勤畏有錯誤故言正行道畏墮邪法故言正三如意三四如意足欲念進慧注法界次第中十三云智定力等所願皆得故名如意足記法界言四念智慧四勤精進精進智慧增多定力少弱得四種定攝心即智定力等所願皆得故通名如意智定力等能斷結使故斷行成就也注此四屬定六神通中身如意足藉茲而顯又通因定生亦可六通因茲並發記身如意有三謂能到轉變聖如意能到復四一身飛如鳥無礙二移遠令近不往而到三此沒彼出四一念能至轉變者大能作小小能作大一多亦然種種諸物皆能轉變外道輩轉變化不過七日佛及弟子轉變自在無有久近也聖如意者外六塵中不可愛不淨物能觀令淨可愛淨物能觀令不淨也六通因此發者如意如上天眼通者眼得色界清淨色自地及下地六道衆生諸物若近若遠若粗若細諸色無不能照此有二一報得二修得五道中天眼從修得非報得以從常憶念種種光明得故天耳通者能聞一切聲天聲人聲三惡道聲云何修得天耳常憶念種種聲故宿命通者本事常憶念日月年歲至胎中乃至過去一世十百千萬億世乃至大羅漢辟支知八萬大劫菩薩及佛知無量劫也他心通者知他心若有垢若無垢自觀心生住滅時常憶念故得復次觀他人喜相嗔相怖畏相見此相已然後知心是為他心智也無漏通者如來莊嚴入一切佛境界經言無漏者謂離四漏以不取彼四種漏故名遠離諸漏智注四正勤是慧慧觀不勤念處不成反招散動如風中燈今修如意如加密室定慧均等欲者希向慕樂莊嚴彼法言彼法者謂念處境言莊嚴者修希向心令法端美凡所修立一切諸法若無樂欲事必疏遺念者專注彼境一心正住若無一心觀法斷絶進者唯專觀理使無間雜無雜故精無間故進凡所修立一切諸法若無精進事必不成慧者止觀法界次第皆名思惟思惟彼理心不馳散當知四法是入定方便出輔行七上十二㭊玄下三十六云四觀神足心所中慧以覺察為義文妙樂二八云思是慧數文記謂第四乃五別境中慧覺察為義神即神通足即是定瑜伽論云如有足者能往能還統紀言法師敬雲依俱舍論述小乘入道五位作㭊玄記二卷以小乘明析空五位乃㭊中之玄名㭊玄記四五根四五根信進念定慧注輔行七上十三云修前諸品縱善萌微發根猶未生根未生故萠善易壞今修五法使善根生故此五法皆名為根文信者信於諦理能生一切無漏根力禪定解脫三昧等然此信根必依念處若無信境根何能生記此釋信也於四念處諦理深忍樂欲如蜂搆蜜如犢思乳能如是深住淨信便生一切無漏功德經言信為道元功德母長養一切諸善法也注進者信諸法故倍䇿精進念者但念正助之道不令邪妄得入定者攝心在正道及諸助道善法中相應不散慧者念處之慧為定所攝以觀自照不從他知記慧者謂修如意後慧得定攝即能照理除妄惟以不淨苦等觀法自照更不從他異緣而別知也五五力五五力同上根名注前不入故進修五力令根增長則能排障同上根名者輔行七上十三云問名同於根何須更立答善根雖生惡猶未破復更修習令根增長是故此五復受力名根成惡破故名為力文釋籤一九云信解品云無有欺怠嗔恨怨言欺為信障怠為進障嗔為念障恨為定障怨為慧障若根增長能破五障故名為力文記此釋釋籤引經文以明五障也欺則忽亂浮疑不能深忍樂欲故障信怠則不能勇悍深造故障進嗔則不善心多不能明記正助之道故障念恨則心神結不能泯然攝歸念處故障定怨則含毒事深不能覺察諦理故障慧也注信力信諦不為邪外諸疑所動記諸疑雖多不必障定論障定者有三一疑自者自念諸根暗鈍罪垢深重非其人乎作此自疑定慧不發二疑師者彼人威儀相貌如是自尚無道何能教我作是疑時即為障定三疑法者如世人多執本心於所受法不信敬受行若生猶豫法不染心今此信根增長有力即不為所動也備三疑古今通病教中謂疑自者當念先世善根何限精勤懺悔以破之疑師者但遵其法不論其人如夜行弊人持燈不以人故廢其照疑法者佛無誑語篤信力行可也注進力觀諦心無間雜本求道果未證不休念力持諦破邊邪想不令煩惱之所破壞定力若成能破欲界一切諸散能於諸禪互無妨礙不同單修根本之相記定力若成不但破欲界散亦不同上地單修之定以於諸禪定互無妨礙故如輔行云雖用欲界語法不礙初禪支林或住初禪覺觀之法不礙二禪內淨或住二禪與喜相應不礙三禪樂受或與四禪捨受相應而能教化一切衆生縱妨四禪不妨諸定妨謂妨礙礙謂遮止縱有因緣不入四禪不妨一切禪定自在也備辨訛曰諸禪互無妨礙此止觀文彼約圓意今明藏教當斟解之注慧力能破一切邪外等慧能破一切見愛等執六七覺六七覺支念擇進喜輕安定捨注修前不入由定慧不調故用七覺均調之記念勤是慧四足是定又得根力成善破惡未能入理者由定慧不調故以七覺均調之注覺謂覺了支謂支分法界次第中十四云無學實覺七事能到文記實覺者如實覺慧也法界云一擇法覺善能簡別真僞不謬取諸虗僞法故二精進覺善能覺了不謬行無益苦行常勤心在真法中行故三喜覺心得法喜覺了此喜不依顛倒法生喜住真法喜故四除覺斷除諸見煩惱時覺了除諸虗僞不損真正善根故五捨覺善能覺了所捨境虗僞不實永不追憶故六定覺發諸禪定覺了諸禪虗僞不生見愛妄想故七念覺善能覺了常使定慧均平若心沉念用擇進喜起之若心浮念用除捨定攝之調和適中也注止觀七九云心浮動時以除覺除身口之粗記輕安即除覺亦名猗覺乃猗任自在意七覺乃入道之要大論云若離五蓋專修七覺不得入禪者無有是處注以捨覺捨於觀智以定心入禪若心沉時以精進擇喜起之念通緣兩處文記攝散䇿昏不使偏落昏散是念覺前說定慧調勻是用七覺所以今是念覺當體注輔行七上十三云定慧各三各隨用一得益便止無假遍修若全無益方趣後品念能通持定慧六分是故念品通於兩處文記佛說教令修如醫照方教服著止微加一劑不痊方添後藥前支未益乃用次覺法雖稟醫行由自己如得益便已七八正七八正道正見正思惟正語正業正精進正定正念正命記正念正定是定見思惟精進是慧唯語業命通戒又前七覺是分別此八正道正行也注正以不邪為義能通至涅槃故名為道記八正亦名八聖道出瑜伽論注正見修無漏十六行故明見四諦記十六行解見五卷注正思惟以正思惟發動此觀正語以無漏智除四邪命常攝口業住正語中補八犍度論曰以邪命作口四惡行名邪語邪命以邪命作身三惡行名邪業邪命又五邪中後四皆口業不必專指貪求利養凡掉戲等皆屬邪命攝俱舍言觀象鬬等佛亦立邪命中邪受外境虗延命故備辨訛曰似不必指後四邪以彼四種大論名四邪業故婆娑言身口業中若貪所起皆名邪命注正業以無漏智除身邪命住於清淨正身業中記身邪現奇特等注正精進勤修涅槃善入正諦正定正住於理決定不移正念心不動失正直不忘正命以無漏智慧通除三業中五種邪命見他得利心不熱惱而於己利常知止足住清淨正命記四種別在口業五種通乎三業三結歸已上七科即是藏教生滅道諦注輔行一下十一云菩提煩惱更互相傾故名生滅二通論四諦二初論隨機施教勝劣不同然如前所列四諦名數通下三教但是隨教廣狹勝劣生滅無生無量無作不同耳故向下名數更不再列注釋籤三八云問何故立四種四諦之殊答諦本無四諦秪是理理尚無一云何有四故知依如來藏同體權實依大悲力無緣誓願物機所扣不獲已而用機宜不同致法差降從一實理施出權理權實二理能詮教殊故有四種差別教起涅槃實後暫用三權助圓故須具用偏圓事理故今引之以顯成證三偏一圓界內界外各一事理故成四種文記物機所扣者釋上依大悲力無緣誓願由衆生根器千差如來聲教萬別如言如來為衆生隨機應量說也從一實理等解前界內外各一事理者藏事通理別事圓理也注廣狹等者以藏通造六故狹別圓造十故廣藏別不即故劣通圓談即故勝於廣狹境各論勝劣則成四種四諦迷真有重輕故論生滅無生迷中有重輕故論無量無作不可作尋常迭論勝劣釋也記謂當以藏對通別對圓各論勝劣也注生滅妙玄二二十云迷真重故從事受名如前釋記前釋者苦則三相遷移等雖世出世四皆變易也注無生妙玄二十云迷真輕故從理得名苦無逼迫相集無和合相道不二相滅無生相記苦無逼迫者謂五蘊皆空豈有空能逼空集無和合者謂因果俱空豈有因空與果空合歷一切貪嗔癡亦如是道不二者謂無能治所治空尚無一云何有二滅無生者法本不生今則不滅不生不滅名真無生注無量妙玄云迷中重故從事得名苦有無量相十法界不同故集有無量相五住煩惱不同故道有無量相恆沙佛法不同故滅有無量相諸波羅密不同故文記苦無量者謂一法界苦尚若干況十法界非二乘所知謂地獄種種剝割燒煮銼切不可稱計況復餘界種種苦相菩薩智眼乃通達也集無量者謂無明塵沙見思諸惑若干道無量者謂㭊體拙巧權實正助等滅無量者如是方便能滅見思等均是菩薩乃能明了也又即空方便若干皆無若干雖無若干而分別若干無謬無亂又如是方便能滅見思如是方便能滅塵沙無明又三悉檀分別有若干第一義悉檀無若干雖無若干從多為論名為無量注無作妙玄云迷中輕故從理得名止觀一三云陰入皆如無苦可捨無明塵勞即是菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證文記無作者皆實相不可思議四念處釋無作四諦云一念心具十界苦名苦諦具十界惑名集諦苦即涅槃名滅諦惑即菩提名道諦所謂即事而中無思無念無誰造作名為無作二示二世粗妙因果有異二初明因果差殊然四諦之中分世出世前二諦為世間因果苦果集因後二諦為出世間因果滅果道因注釋籤三八云苦集只是世間一切法道滅只是出世一法世出世法因果性殊而因必趣果因果類異故使四殊文二明差殊所以問何故世出世前果後因耶答聲聞根鈍知苦斷集慕果修因是故然也注聲聞根鈍苦為初門支佛以集菩薩以道通菩薩以滅別菩薩以界外道圓菩薩以界外滅記注中補明四教所修初門謂聲聞根鈍約界內苦為初門支佛以界內集菩薩以界內道此藏教三乘修生滅諦分利鈍也通修無生空理故以界內滅別修無量不思議事故以界外道圓修無作不思議理故以界外滅也注慕果修因且據凡位若初果去則云帶果行因支佛不立分果乃云望果行因記此揀明慕果修因句唯約聲聞凡位說注四諦果前因後此且一途餘亦不定記不定如下示記籤云或說世諦謂苦集第一義謂道滅復有說世諦謂苦集滅第一義謂道評者曰四是世諦亦第一義諦如苦集是世諦苦空無常集因緣生是第一義滅是世諦者佛說如城園林是第一義者盡止妙離道是世諦者佛說如筏如山如梯如樓是第一義者道如跡乘若四諦盡第一義者世諦說陰界入第一義亦說陰界入也
