body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二通教三初標次明通教者注四教義一二云此教明因緣即空無生四真諦理是摩訶衍之初門也遠通常住故正為菩薩傍通二乘通機故諸大乘方等及諸般若有二乘得道者為同稟此教也通部記此釋通教所通之義如云因緣生法我說即空當體無生而上通但不但中道理乃此教所遠通也菩薩二乘而分傍正乃此教所通機也此教正為菩薩學般若至佛地遠通別圓而有已辦支佛二乘之機故曰傍為方等般若有二乘稟教得道者乃此教所通部也大品云欲得聲聞乘當學般若欲得緣覺乘當學般若欲得菩薩乘當學般若如曰三乘同稟般若是此教所通部也有師標云華嚴不共阿含唯藏法華開顯唯方等般若為共節義云因緣即空句是傍影大論無生四諦句是傍影大經四教皆先提此宗本注問何故不名共教答共名但得二乘近邊不得遠邊若立通名遠近俱便言遠便者通別通圓也記此亦四教義文料簡立通教名之所以也問中以三乘共學此教故云何不立名為共答中先明立共不便次明立通之名俱便也二釋四初釋名二初互通前後通前藏教通後別圓故名通教注此望前望後獨就菩薩釋通教名記此標釋立通教之名獨就菩薩通前所以對通後而立也二乘雖有通前之義而不通後則無所望故并不得名通前也注釋籤九二十云通近同三藏通遠如別教補然通教既是遠通常住當云通遠如圓教今籤曰如別教者以別教證道同圓體是同故有師標曰通前三藏云何亦就菩薩釋名答正指當教佛亦同三藏佛歸於灰斷然此佛豈二乘所成耶故就菩薩釋注四念處二句有三通義一因果俱通通當教是二因通而果非通即被接者是三通別通圓即藉通開導人是謂別圓用通而為方便但成別圓因果人也此三通義唯在菩薩記此證釋獨就菩薩立名之所以也如四念處云通義有八謂教理智斷行位因果教者同稟無生之說理者同緣即色是空智者諸法不生般若生斷者須陀洹若斷同是無生法忍行者同乘摩訶衍乘位者同是乾慧地乃至佛地因者同學般若波羅密果者同到薩婆若海三人八義不殊故名通也復次通有三義一因果皆通者如上八義近通偏真四枯拙度二因通果不通者乃是別果來接通因得見佛性成四榮雙樹三通別通圓者別圓因果皆與通異藉通開導得入別圓因成非枯非榮雙樹之果也然三通義唯就菩薩而論補如因果俱通一義而二乘應有唯在菩薩者以二乘雖有前之一義而無後之二義故并不受因果之名也注今文通後別圓者下文釋出雖但被接意亦該於藉通開導也記蓋通教機雜若受別圓來接欲成別圓之人必當藉通開導雖通人被別圓所接但別圓亦藉通教預為開導故通為大乘之初門者良有以也所言藉通開導者拾遺記云即於乾慧及性地中聞體法空不但空于二十五有亦乃空於涅槃此人須藉通教談空開導其心而了此空體是中道乃以別圓內外凡觀同於二乘歷乾慧地及後諸地乃至十地即成別圓初地初住八相之佛是乃通教通別圓之義也則知後文雖出被接之機其意必該乎藉通開導也二當教得名又從當教得名謂三人同以無言說道體色入空故名通教注此通就三乘釋通教名若三藏諦緣度三法分三乘今通教三乘同觀無生四諦同體假入空觀十二因緣同觀六波羅密見第一義而分三乘之別者但總相別相等智斷結侵習自行化他根性不同耳言說是事即空故無記三人同以無言說道句四教義四念處廣解四教義問菩薩可修六度二乘何得同觀亦修六度耶答涅槃經云福德莊嚴有為有漏是聲聞法何處有慳貪聲聞破戒瞋恚放逸散亂愚癡羅漢辟支佛耶但二乘不能遍行其事成就衆生何曾不同修六度第一義諦無言說道而斷結耶而今所以分三乘之別者四教義云三乘同秉通教見第一義諦同斷三界見思得一切智同求有餘無餘涅槃此義既同而分三乘者聲聞總相體法入空智慧力弱但斷正使根性不同亦有慧俱二種解脫如前三藏教中分別緣覺福德利根能少分別相體法入空生無佛世不因聞法時至道熟自然曉悟見第一義斷三界結使盡侵除習氣是名辟支佛乘根性不同亦有二種一者小辟支迦羅二者大辟支迦羅已如前說若菩薩具修總相別相智慧體因緣即空起大悲誓願以修諸行見第一義斷界內煩惱用誓願扶習還生三界用道種智遊戲神通淨佛國土成就衆生三乘善根淳熟即坐道場用一念相應慧斷煩惱習盡得一切種智名之為佛轉生滅無生二種法輪化三乘衆生入無餘涅槃是為大乘則知分三乘之別者但約總相別相等智斷結侵習自行化他根性不同故耳又妙玄云通教聲聞總相一門達俗即真緣覺能於一門總相別相達俗即真菩薩能於四門總相別相達俗即真又能遍四門出假教化衆生籤云聲聞緣覺於一門總相別相者總謂但作苦集觀耳別謂觀苦七支集五支以自行故但依一門菩菩為化他故於四門然七地前約自行邊亦但一門入假方便亦須遍習正此意也所言總別相等智者經云初以分別諸法智慧後用涅槃智慧分別諸法是別相涅槃智慧是總相也而三人隨力用之末二句釋無言說道注輔行六上十六云通人既觀諸法如幻幻本不生今無所滅名之為體文謂體六凡依正之色如幻如化當體即空而入真理也記體色入空者四教義云今約無生四諦信無生苦諦者信陰入界不生如夢幻響化水月鏡像畢竟空無所有解苦無苦不為苦所苦而有真諦無生集者了一切煩惱業行如夢幻等空無所有無和合相知無所有不為結業流轉解集無集而有真諦無生滅者知一切生滅法不可得設使有法過於涅槃亦如夢幻本自無生今亦無滅若不知無生無滅生滅終不自滅若知無生無滅生滅自滅而有真諦也無生道者信一切至涅槃道皆如夢幻無有二相若見有二有通不通則成壅塞若知不二不見通與不通任運虗通入第一義是則知道而有真諦也釋當教得名竟二顯位二初原當教因果列十階級四初略標依大品經乾慧等十地即是此教位次也記四教義四云通教三乘同觀二諦二乘雖觀二諦一向體假入空用真斷結至無學果菩薩亦觀二諦始從乾慧終至見地多用從假入空觀從薄地學游戲神通多修從空入假觀從辟支佛地學二觀淳熟雙照二諦入菩薩地自然流入薩婆若海文問若爾何得此中第九菩薩地方云從空入假耶此文亦與四教義同蓋前之七地但明三乘共意未及別顯菩薩第八支佛地亦與緣覺共明至此第九菩薩地方別明菩薩事也此乃總敘之詞非謂菩薩至此方入假也讀者詳之先以圖示之記然支佛不立分果此中何故亦有位次蓋支佛雖無分果而斷惑亦有次第故有位次斷惑修行雖從淺至深若證果位必至第八是知前七祇屬於因非分果也又菩薩佛地名異二乘而言共者以名雖有異同是無學應供得二涅槃共歸灰斷證果是一故也注此是三乘共位記此判圖義大品經文云從乾慧地至菩薩地皆行皆學而不取證佛地亦學亦證故知三乘共位也止觀云乾慧地正是三賢位一五停心二別相念處三總相念處通是外凡故言乾慧地也性地者即四善根位以總相念處力發善有漏五陰名為暖增進初中後心得入頂忍世第一法通名內凡故言性地也此二位共伏見惑八人者八忍也從世第一轉入無間三昧故言八人也見者見真諦理斷三界見惑八十八使皆盡也薄者除欲界思惟六品也離欲者除欲界九品盡也已辦者除色無色七十二品盡如火燒木為炭也辟支佛者福慧深利功德力大而除習未盡故名為侵也菩薩地者從空入假道觀雙流斷習氣色心無知得法眼道種智遊戲神通淨佛國土學佛十力四無所畏等殘習將盡如餘少灰也佛地者大功德力資利智慧得一念相應慧習氣永盡如劫燒火無炭無灰此即三乘共十地而斷思惑之位也或問輔行謂通教二乘七地已前與菩薩共名共聲聞若爾八地以上過二乘地何故亦名共菩薩耶答以初名後從本立名不同別圓始終別故三藏教中雖有二乘菩薩行遠始終伏惑永異二乘故不名共不聞別理復非不共又問七地思惑已盡何故六地名共聲聞八名支佛地何故七地名共支佛耶答通位從容故也節義云當教共位出大品燈炬深奧品大論七十五卷委明通十地行相備集注問答支佛八地所侵乃見思家習菩薩九地進侵乃指出假塵沙家習至佛十地兩家習盡注若明三借等義者一三乘共借別教始終位次二單借別教十地亦三乘共三別為菩薩借別一教又別為菩薩立忍名別明菩薩燋炷十地大品更說十地菩薩為如佛併圖於後備通教機廣上明三乘共位是通三乘總判今所列三乘借別等皆別判內三乘借別及單借別地三者係三乘共別為菩薩借別教又別為菩薩立忍菩薩燋炷十地更說十地如佛四者專指通菩薩論止觀輔行六卷三卷中詳列補十地菩薩如佛句出大品大論備今此一圖與集注所列少異者依辨訛改正辨訛曰圖中須將別歡喜地等置下通乾慧地等列上方妥如二果是薄地二向豈亦可云薄地耶若改轉則不妨薄地中含有二向二果餘可例知補止觀云借別教名名通位者外凡三賢是乾慧名十信內凡四善根是性地名十住十行十向八人見地是須陀洹名歡喜地薄地是斯陀含有向有果向為離垢地果為明地離欲是阿那含有向有果向為炎地果為難勝地已辦是阿羅漢有向有果向為現前地果為遠行地辟支佛為不動地菩薩地為善慧地或以菩薩後心為法雲地或以佛地為法雲地大品云十地菩薩為如佛得作此釋也輔行釋云通教地前無位可論故借別教內外凡位但名通教初地二地通教地後亦無復位故借別教法雲佛地以名通教九地十地從容不定故有或言大品既云十地如佛當知即是別名名通楞伽云遠行善慧法雲佛地是佛種性餘者悉是二乘種性此亦別名名通位也若是別位豈遠行已前屬二乘耶近代釋位地前伏惑正是此列記四教義云約名別義通辨位者即十信三十心十地之名也鐵輪位即乾慧地伏忍三十心即性地柔順忍八人地見地即歡喜地得無生忍大品云須陀洹若智若斷是菩薩無生法忍薄地向果向即離垢地果即發光地大品云斯陀含若智若斷是菩薩無生法忍離欲地向果向即炎地果即難勝地大品云阿那含智斷是菩薩無生法忍已辦地向果向即現前果是遠行大品云阿羅漢智斷是菩薩無生法忍辟支佛是第八不動地侵除習氣也大品云辟支佛智斷是菩薩無生法忍菩薩地即第九善慧地佛地即第十法雲地當知如佛坐道場時以一念相應慧斷煩惱障法障習氣盡化一切有緣衆生竟入無餘涅槃如薪盡火滅八相成道是則用別教名以辨通教位也補通教名借位者指南集云初借位之意佛教被機機樂別位名通佛說義通名別旨蘊祕結古執有情勞我天台申通經論七地齊於羅漢別義難收四地斷惑證真通無此語四善屬於行向伏惑在於地前二教不收諸部奚判故立借別名通以為通經法式二借位所依問雖曰通經憑於何典答仁王四地斷見大品十地如佛楞伽種性有無輕毛六心退等此等經文位名在別義乃屬通若非借別名通為何教收耶集注問藏通三乘同斷見思既可借別名通安知非借別名藏耶答通屬大乘原有通後之義且三乘共行故借於可借耳藏一向是小無通後義三乘差別而菩薩因不斷惑何可借耶單借十地既乾慧斷見何位伏惑如輔行六上八云彼此地前通為伏惑通雖無位即未斷惑不入地故文意指地前修觀伏惑也妙樂二二十一云或指地前假立七賢文補若見此別名判三人通位者初地斷見二地斷欲一二品思三地斷六品四地斷七八品五地斷九品六地斷七十一品七地斷七十二品思八地已上侵習斷無知等例前支佛發真無漏侵除習氣如燒木成炭等是也輔行釋云單借別十地名通十地則彼此地前通為伏惑通雖斷惑即未斷惑以不入地故此單借別十地意在引通入別與前共借不同又初地斷見三教不收若說別初地是破無明若說圓初住即證中道若說藏而無十地名目所以三教不收故用通教三義而收之是故初地斷見名乾慧地也備辨訛曰圖中八人人字當心字以經中明三地四地斷見不同故今文中開為多位如仁王明四地斷見故將此四忍對歡喜四智對離垢或有經中明三地斷見則將四忍四智合為八心對於初地故知是八心也若八人乃是十五心不當以十五心更立十五心對於二地豈非繁重私謂集注圖說本於止觀記止觀云四借別教名名通教菩薩位乾慧是外凡性地是內凡八人為初地十五心為二地十六心為三地此三皆不出觀而斷見惑四忍為初地四智為二地四比忍為三地四比智為四地此四皆不出觀而斷見惑薄即五地斷六品思離欲即六地斷九品思已辦即七地斷色無色思盡支佛即八地至十地斷習無知玄義問初地至七地對果出何經論答經論非不對當但高下不同人師對之有異或用見地止對初地如今所用或向取初三地併對初地仁王明四地併對初地此難定判但通教見地本是無間之道不出觀證須陀洹豈得初地斷見乃至三地或曰四地耶若斷別惑不共二乘此義有之又或言六地斷結齊羅漢或曰七地此乃定執前後兩果經論對皆不定中間可以義得今依義推不可定執備玄義問一節本三乘共借別教圖下今列於此者以三四地斷見本圖下標故也三四地不出觀斷見解見下補輔行云此單約菩薩故修觀斷惑不同此中八忍為初地不可曰八忍具足當指初入無間三昧忍智初發之時而言若曰八忍具足則是十五心為二地矣既入無間三昧從初忍乃至八忍皆屬八人地故又止觀中問三乘共斷其義已顯用何為據更獨開菩薩地耶輔行云問者三乘共位借義已成別立菩薩恐無誠證答大論判三處燋炷有三種菩薩斷惑乾慧是伏惑尚得為初炎今取八人斷真為初炎有何不可荊溪釋答意經論各有明文並語菩薩智斷初引大論三處燋炷者意引乾慧別在菩薩斷惑之位若共二乘不名初炎初炎即是斷位故也論別立菩薩故以初地為斷位故大論燈炷品十地有二云云如後文引記四教義引大論云聲聞法中名乾慧地於菩薩法即是伏忍聲聞性地菩薩柔順忍聲聞八人地菩薩無生忍聲聞見地菩薩亦無生忍聲聞薄地菩薩遊戲神通聲聞離欲地菩薩名離欲清淨阿羅漢地於聲聞法中即是佛地而三藏佛三十四心發真無漏斷三界結盡與羅漢齊也大品云阿羅漢若智若斷是菩薩無生法忍乃至辟支佛若智若斷是菩薩無生法忍即對菩薩八地侵除習氣九過辟支佛地入菩薩位者即九地十地是則十地菩薩當知如佛也玄文云初就三乘共位中菩薩別立忍名而義通二用別教名名別義通通義已如前說別立者別為菩薩立伏忍柔順忍無生忍之名也乾慧地三人同伏見惑而菩薩更加伏忍之名者菩薩信因緣即空而於無生四諦降伏其心起四弘誓願雖知衆生如虗空而發心度一切衆生是菩薩欲度衆生如欲度虗空故金剛般若云菩薩如是降伏其心所謂滅度無量衆生實無衆生得滅度者次三誓願降伏其心亦如是是為菩薩在乾慧地修停心別總相念處觀時異於二乘故別稱伏忍復次三乘人同發善有漏五陰生相似解皆伏見惑順第一義而菩薩獨受柔順忍名者菩薩非但伏結順理又能為一切衆生伏心遍行六度一切事中福慧皆令究竟如三藏菩薩於中忍中三僧祇行六度不惜身命今菩薩亦如是以空無相願調伏諸根為衆生故滿足六度故名順忍也復次三乘人同發真無漏若智若斷同名無生而菩薩獨受無生法忍名者以其見諦理斷結使不生取證之心故別受無生法忍之名也所以者何若生取證之心即墮二乘之地不得入菩薩第九地而別為立忍名良有以也復次三乘人同得神通二乘不能用神通成就衆生淨佛國土故不得游戲之名也阿那含雖斷五下分結不能捨深禪定來生欲界和光利物而不同塵故不得離欲清淨之名也止觀問三乘人智斷既齊何故二乘名智斷菩薩名法忍答忍因也智果也故十五心名忍十六心名智又二乘取證宜判智斷菩薩望佛猶居因位但受忍名又菩薩一品思盡即一分自在生品品死品品生能忍生死勞苦不入涅槃故名忍也注別明菩薩燋炷十地妙玄四三十一云別圓各逗一種根性故用發真為初𦦨別初地圓初住通教為逗多種根性所謂別圓入通故含容取乾慧耳記通教機雜而乾慧中尤雜取多所含容之意故以未發真為初焰四念處云以相似燈炷為初𦦨耳尋常謂別圓入通多約被接言之今言別圓入通者通之一字指通教中當教之機別圓入通指通別通圓之機故云三教含容通說非秪約被接言也注若鈍根者八人見地是初𦦨利者於乾慧即能斷結即是初𦦨已上皆妙玄之文記此上二節文俱釋菩薩燋炷十地初一句牒前標示妙玄下明通教乾慧為菩薩初𦦨然此所引乃是答辭因文前問大論三處明初𦦨約別圓皆取發真為初𦦨通教何意取乾慧為初𦦨耶答別圓各逗一種根性如文云云又輔行云大論三處燋炷者意引乾慧別在菩薩斷惑之位若共二乘不名初𦦨初𦦨即是斷位故也論別立菩薩故以初地而為斷位故大論七十八燈炷品云十地有二一菩薩初地為初𦦨二聲聞見地為初𦦨若獨菩薩地即歡喜地為初𦦨論文既以菩薩初地而為初𦦨故今取之以為況釋於共伏道尚得以為菩薩初𦦨今但退取共斷位者為獨菩薩初𦦨有何不可故知此文別判通教菩薩位也大品云初地燋炷大論明三處初焰焰約能照譬智炷約所照譬惑三處者通別圓也三教含容通說故曰別圓入通非被接意備此段小注本在儀文乾慧地耳下因記文長消釋未便故列於後記此段小注釋明含容取乾慧意大品明第一地燋炷者經深奧品云須菩提白佛言世尊菩薩用初心得阿耨菩提用後心得世尊是前心不至後心後心不至前心世尊如是心心所法不俱云何善根增益若善根不增云何當得菩提佛告須菩提譬如然燈為用初𦦨燋炷為用後𦦨燋炷須菩提言世尊非初𦦨燋炷亦非離初𦦨非後𦦨燋炷亦非離後𦦨佛言須菩提於意云何炷為焦否世尊炷實焦佛告須菩提菩薩摩訶薩如是不用初心得菩提亦不離初心不用後心得菩提亦不離後心菩薩始發意行般若波羅密具足十地得阿耨多羅三藐三菩提大論釋云燈譬菩薩道炷喻無明煩惱𦦨如初地相應智慧乃至金剛三昧相應智慧焦無明等煩惱炷亦非初心智𦦨亦非後心智𦦨而無明等煩惱焦炷盡得成無上菩提是則以論中釋經則知大品明初地焦炷意也大論明三處初𦦨者四念處云大論釋燈炷品云有人言乾慧為初𦦨佛地為後𦦨有言歡喜地為初𦦨佛地為後𦦨如此解釋不同者恐是諸大乘師釋滿字教門三教名位不同各取此意以釋初後𦦨也若言二地是菩薩斷道者此取性地為斷道至六地與羅漢齊或取八人地是斷道此以三地為斷道七地齊羅漢今不取二地三地乃取乾慧者故知是通三人之初以似道為初𦦨耳有言歡喜為初𦦨佛地為後𦦨者此約別教初地斷道為初𦦨別教登地見常住理斷無明見中道故以歡喜為初𦦨也有言初住為初𦦨佛地為後𦦨者是圓教意以圓教登住是中道佛性斷一品無明故此是通教通別通圓之義也注且乾慧初𦦨三通言之是何根性須知論釋焦炷雖通三教乾慧初𦦨自是一途不必三通收以通教機雜故記此揀明乾慧非三通也先問次答如文可知三通者即上文所謂因果俱通因通非果通通別通圓是也言不必三通收者謂因果俱通之機初地不能斷結因通非果通之機三地四地方能斷結藉通開導之機亦非能初心斷結是故乾慧初𦦨自是通之當教一途不必三通收也注又乾慧初𦦨何位伏惑例如單借十地如輔行或云利根即伏即斷記此料簡乾慧初𦦨伏惑也問乾慧初𦦨既是斷惑將何位而為伏惑耶問中約位問伏惑答中舉單借十地意明乾慧如別教歡喜地斷見則以地前為伏惑位也如輔行者如上圖中引文可知或云下更指一釋補然此中論伏惑位者若云逗多種根性含容取乾慧為初𦦨其意則寬故得例前借十地地前立伏惑位也若云鈍根八人見地是初𦦨利根於乾慧地即能斷結即是初𦦨此則地前不須更立何以故乾慧本是伏惑之位但利根之人即伏即斷故以為初𦦨若更立伏惑位不名乾慧為初𦦨矣良由前文單借十地無論機之利鈍但未斷惑而不入位故地前更須立地即更立伏惑位此中不然故立為不立意存兩向注大品更說十地菩薩為如佛輔行明通二種如佛以釋大品一別為菩薩立忍名第十亦名菩薩地對共佛地故云如也又被接人至十地破無明能八相作佛似通教佛故云如也釋籤亦明圓教觀行如佛相似如佛但非今通教所論記此釋經說十地菩薩為如佛初一句牒前標示以大品經云菩薩住十地中當知如佛謂若菩薩摩訶薩具足六波羅密四念處乃至十八不共法一切種智具足圓滿斷一切煩惱及習是為菩薩摩訶薩住十地中當知如佛論釋云當知如佛者菩薩坐如是樹下入第十地名法雲地譬如大雲澍雨連下無間心自然生無量無邊清淨諸佛法念念無間爾時菩薩作是念欲界魔王心未降伏放眉間光令百億魔宮暗蔽不現魔即嗔惱集其兵衆來逼菩薩菩薩降伏魔已十方諸佛慶其功勳皆放眉間光從菩薩頂入是時十地所得功德變為佛法斷一切煩惱習得無礙解脫具足十力四無所畏四無礙智十八十共法大慈大悲等無量佛法地六種動天雨華香諸菩薩天人皆合掌讚歎是時放大光明遍照十方無量世界十方諸佛菩薩天人大聲唱言某方某國某甲菩薩坐於道場成具佛事是其光明是名十地當知如佛也輔行下引荊溪明通教二種如佛以釋大品經十地如佛初種可知二種如文云若被接者至此既破一品無明亦能八相如彼八相故云如佛也對共佛地句謂通教第十地名為佛地對三乘之共佛地而曰如也似通佛句謂被接之人能破無明無明破已如彼通佛同得八相故名如也釋籤下明圓教亦有二種如佛文云若入圓教假使住前亦得通名坐道場也即是相似如佛觀行如佛然彼文意為異別教教道言耳非今通教所論之如佛二詳示二初因地列名八初名乾慧地一乾慧地未有理水故得其名即外凡位與藏教五停心總別等三位齊注三乘之初同名乾慧用體法念處等觀雖未得暖法相似理水而總相智慧深利故稱乾慧也記此釋得名乾慧地者謂雖有能觀之智然所照之惑火未亡真諦之理水未顯既未有理水乾有其慧故得乾慧之名也是知惑喻如火理譬如水惑亡理顯猶水之尅火也妙玄明三乘共十地第一名乾慧地者三乘之初同名乾慧即是體法五停心總相別相四念處觀事相不異三藏此三階法門體陰入界如幻如化總破見愛八倒名身念處受心法亦如是住是觀中修正勤如意根力覺道雖未得暖法相似理水而總相智慧深利故體法停心別總二相念處觀出四教義二廣明須者往檢二明性地二性地相似得法性水伏見思惑即內凡位與藏教四善根齊注性地中無生方便解慧善巧轉勝於前得相似無漏性水故言性地也記妙玄云性地者得過乾慧得暖已能增進初中後心入頂法乃至世第一法皆名性地性地中無生方便解慧善巧轉勝於前言勝前者如解苦無苦而有真諦以陰入界不生皆如夢幻響化水月鏡像畢竟空無所有故也解集無集而有真諦以了一切煩惱業行皆如夢幻等故解滅本自不生今亦無滅而有真諦以知一切生滅之法皆不可得故使有法過於涅槃亦如夢幻等故知道有道而有真諦信一切至涅槃道皆如夢幻等無有二相則任運虗通入第一義得相似無漏性水故言性地也三二地並明言並明者以此二位同入無間三昧同斷見惑所以同為發明也三八人地四見地此二位入無間三昧斷三界八十八使見盡發真無漏見真諦理與藏教初果齊注三乘信法二行體見假以發真斷惑在無間三昧中八忍具足智少一分故名八人位也即八忍也三乘同見第一義無生四諦之理同斷見惑八十八使盡也補此明得名八人見地也初三乘下釋八人地次三乘下釋見地也八人位中只具八忍七智但是十五心少一道比智故曰八忍具足智少一分即以具足立名故名八人地至十六心滿即入見道名見地也注無間三昧等者止觀六六云若言三地者據斷見初言四地者據斷見後皆不出觀文記此釋二位無間三昧斷見也止觀云別名名通家共位者舊云三地斷見或云四地斷見或言六地斷思盡或言七地斷思盡今核此語若云三地四地皆斷見者此師不解通教義三乘共位同入無間三昧不出入觀而斷見那忽用三地四地斷見耶若但取三地斷見者四地應斷思若但取四地斷見者三地應未斷見若用兩地斷見為出入觀為不出入觀若不出入觀則無兩地若用兩地斷見為出入觀非斷見位人師救云經說如此蓋由此師不解經意今言經借別教之意以顯通教耳然別見義長論三地四地通見義短不出入觀但名可借別義必依通若作不出入觀釋者如言三地者據斷見初言四地者據斷見後皆不出觀例如十六心或言是見道或言是思道是則無間三昧者三四二地以斷見初後分之雖分二地觀智無有間斷故云無間也注輔行六上七云通雖二地斷時仍促三乘共故雖促復長是故雖分三地四地記此釋通教斷見須分三四兩地也輔行問當通教中判斷見位自分二地何須破他自立借別立斷見位還同通教答只緣同通故得名通通雖二地斷時仍促三乘共故雖促復長是故雖分三地四地或時借別別見更長仍有二意若約理說通至佛地若約教道云三四地雖二意殊見義並長以別長故故借教道判兩地斷見之義無爽若依通義云不出觀若依別義地地皆能破見以此為異以別長故故後兩番通用四地皆斷見位人多不見謂通義足何須借別四明薄地五薄地斷欲界九品思前六品與藏教二果齊注體愛假即真發六品無礙斷欲界六品證第六解脫欲界煩惱輕薄也記此明得名薄地也言薄者厚之待也以前三四二地惟斷見惑思惑全在猶冰之堅厚也至此第五地中不但斷見復能進斷欲界九品思惑中前之六品正與藏教二果位等以其欲界之煩惱輕微猶冰之少薄故名為薄地也五明離欲地六離欲地斷欲界九品思盡與藏教三果齊注禮愛假即真斷欲界五下分結盡離欲界煩惱也記此明得名離欲也言五下分者一身見二戒取三疑使四貪使五瞋使是也見四卷廣明六明已辦地七已辦地斷三界見思惑盡但斷正使不能侵習如燒木成炭與藏教四果齊聲聞位齊此注三乘之人體色無色愛即真斷五上分結七十二品思盡也斷三界事惑究竟故言已辦地文補此明得名已辨也言已辦者以三界事惑斷盡無功可用如云所作已辦也見思曰事障無明曰理障以無明理障對見思事障故曰事惑事惑者即五上分也五上分者一掉舉二慢三無明四色染五無色染斷此究竟則名所作已辦也注燒木成炭四教義三十二引智論云聲聞智慧力弱如小火燒木雖然猶有炭在記此釋斷正使不能侵習氣也言習氣者煩惱殘習也如乳母衣久故垢著以灰淨浣雖無有垢垢氣猶在衣如聖人心垢如諸煩惱雖以智水浣煩惱氣猶在如難陀淫習重故雖得阿羅漢道於男女大衆中坐眼先視女衆而與之言語說法舍利弗瞋習重故聞佛言舍利弗食不淨食即便吐食終不復受請摩訶迦葉瞋習重故佛滅度後集法之時敕令阿難入突吉羅罪懺悔而復自牽阿難手出不共住言汝漏未盡不得以不淨人而集佛法畢陵伽婆蹉罵河神為小婢慢習重也摩頭婆私咤或時從衣架踔上梁或梁至棚或棚至閣等掉戲習重也如是等聖人雖漏盡尚有習在如火焚薪炭猶存也注聲聞位齊此者輔行六上七云通教二乘七地已前與菩薩共名共聲聞若爾八地已上過二乘地何故亦名共菩薩耶答以初名後從本立名不同別圓始終別故記輔行又問藏教亦共聲聞何不立共名答三藏教中雖有三乘菩薩行遠始終伏惑永異二乘故不名共不聞別理復非不共則顯通教菩薩斷盡正使故與二乘齊復聞別理得受別接共與不共皆可以說不同三藏也七明支佛地八辟支佛地更侵習氣如燒炭成灰注緣覺發真無漏功德力大故能侵除習氣也記侵者損也習氣未盡故但言侵之損之而使之盡也注燒炭成灰者四教義三十二引大論云緣覺智慧力勝如大火燒木木然炭盡餘有灰在記經云譬如窮人負他錢債雖債欲畢餘未畢故猶繫在獄而不得脫聲聞緣覺亦復如是以有愛習餘氣所以不得成菩提也八明菩薩地九菩薩地正使斷盡與二乘同扶習潤生道觀雙流游戲神通淨佛國土注從空入假道觀雙流深觀二諦進斷習氣色心無知得法眼道種智游戲神通淨佛國土成就衆生學佛十力四無所畏斷習氣將盡也記此明菩薩修學佛道正習雙除儼超二乘之像乃三乘中之傑士所謂出類拔萃者也言從空等者二乘慧眼了空惟觀真諦菩薩法眼照假能觀俗諦所以從空亦能入假也道謂化道即慈悲利物觀謂空觀即鑑理自利所謂悲智雙融真俗並運也色心無知即塵沙障習五眼中法眼能觀俗三智中道種能照俗下別教住行向中解通教菩薩與別教菩薩斷習及得眼智逈有淺深粗細不同然觀空自利觀俗利他亦能進斷塵沙得法眼證道種智也成就衆生即下以布施攝衆生來生其國等佛十力者法界次第云此十通名力者即諸佛所得如實智用通達一切了了分明無能壞無能勝故名力也大菩薩亦分得此智力比佛小劣故不受名十力者是處非處力業智力定力根力欲力性力至處道力宿命力天眼力漏盡力四無所畏者一一切智無所畏二漏盡三說障道四說盡苦道無所畏此四通名無畏者於大衆中廣說自他智斷既決定無失則無恐懼之相故稱無所畏也言斷習將盡者既之曰將當知未全盡也須知此菩薩盡習必在七寶菩提樹下機緣熟時以一念相應慧而頓斷也備問藏通菩薩既同不見中何以一留惑一斷惑答藏通雖同不見中藏則正化二乘若云菩薩斷惑二乘大恐故須留也通則正化菩薩不妨明言斷惑注扶習潤生者輔行五下二十四云大品云留餘殘習以誓願力及扶餘習而生三界利樂有情文此教亦無中道應本以誓扶習而生三界記此明扶習潤生初二行舉輔行引經正釋次一行明扶習潤生之故亦是兼藏教菩薩而言妙記云兩教入滅無未來化玄文云藏通等聖亦得有應但是作意神通譬如圖寫作意乃成核論無本何者灰身泯智無常住本約何起應是也備問正使牽生死習氣不牽生死何以言扶習而潤生耶答菩薩生三界當以誓願為正扶習為傍所以扶習者不過為受生緣耳不必定如凡夫以使為牽生習不牽生為難也若不留此殘習便登佛地何以長能出假度生耶注道觀雙流者道謂化道觀謂空觀帶空出假故曰雙流記化道即修行六度空觀即體達法空空假並行故曰雙流也注游戲神通者游諸世間譬如兒戲亦如幻師種種變現神名天心通名慧性天然之慧徹照無礙記此釋游戲神通初二句釋游戲義諸世間即器有情正覺三世間也菩薩游三世間行來往返其猶兒童嬉戲不作意分別也次二句喻神通義謂幻師以幻呪力幻造種種之事或拈莖草幻成為人或舉幅巾變為匹馬今菩薩承禪定力種種變現或小中現大大中現小亦如幻師也末四句約法正釋即瓔珞經云神名天心通名慧性天然之慧徹照無礙當知天然慧性與六法相應即能轉變自在故曰神通也注淨佛國土者一切諸行無非菩薩淨土之行如以布施攝衆生菩薩成佛時布施衆生來生其國等是也記淨名經云佛為寶積廣明衆行為淨土因如云布施是菩薩淨土菩薩成佛時一切能捨衆生來生其國持戒是菩薩淨土成佛時行十善滿願衆生來生其國忍辱是淨土成佛時三十二相莊嚴衆生來生其國精進是淨土成佛時勤修一切功德衆生來生其國禪定是淨土成佛時攝心不亂衆生來生其國智慧是淨土成佛時正定衆生來生其國四無量四攝法一切方便三十七道品回向心說除八難自守戒行不譏彼闕十善法等皆是菩薩淨土菩薩成佛時乃至命終不中夭大富梵行所言誠諦常以軟語眷屬不離善和諍訟言必饒益不嫉不恚正見衆生來生其國是也輔行云淨佛國土者通教出假菩薩亦為衆生作淨土因處處結緣衆生機熟斷習成佛名淨佛土結緣之時名淨土行故淨名經云菩薩取於淨土皆為饒益諸衆生故乃至布施是淨土成佛時一切能捨衆生來生其國結緣時以布施攝成佛時地多珍寶諸所捨者同生其土而受五種布施化益由攝生有五差故所謂人天及以四教一切諸行無非菩薩淨土之行故有四土橫豎攝物是則淨土義通諸教今文且依通教菩薩斷餘殘習為淨土果但是異于二乘而已二果地顯義三初明成佛十佛地機緣若熟以一念相應慧頓斷殘習坐七寶菩提樹下以天衣為座現帶劣勝應身成佛注上釋諸位具如妙玄四二十八記妙玄云大功德力資智慧一念相應慧觀真諦究竟習亦究竟如劫火燒木無復炭灰喻習究竟如象渡河到於邊底喻真究竟雖菩薩佛名異二乘俱觀無生體法同是無學得一涅槃共歸灰斷證果處一故稱為通也注過菩薩地則入佛地用誓扶餘習生閻浮提八相成道五相同三藏唯六成道樹下得一念相應慧與無生四諦理相應斷一切煩惱習盡具足力無畏等名之為佛記一念相應者衆生機緣既熟即一念空慧與無生理相應習盡成佛妙玄云藏佛因伏果斷通佛因果俱斷藏佛一日三時照機通佛即俗而真照不須入注頓斷殘習者觀音玄記下五云前斷正使今侵二習至於佛地見思習盡真諦究竟塵沙習盡俗諦究竟記此菩薩從已辦地留習潤生用慈悲道與真空觀雙行化物造到佛位頓斷殘習也注七寶天衣者表殊勝自然也記大品云我當於菩提樹下從四天王天乃至阿迦膩吒天以天衣為座當學般若大論申明生身佛把草樹下法性生身佛天衣為座成佛時諸天龍等各以妙衣為座欲界天衣從樹邊生無縷無織譬如薄冰光曜明淨有種種色色界天衣純金色光明如是等寶衣敷座菩薩坐上得阿耨多羅三藐三菩提所謂寶樹表殊勝天衣表自然也注現帶劣勝應者通佛亦是丈六之身或十里百億神通變現耳住空故劣住中故勝以通教有合身義故云帶劣勝應記仁王疏云帶丈六像現尊特身樹下一念相應斷餘殘習即通教佛自覺覺他則神通變現有十里百億神通身量也金光明疏云丈六身佛住真諦丈六尊特合身佛雙住真中尊特身佛雙住俗中法身佛住中道此依二理故有二佛則知通佛住空故劣住中故勝也然通佛有合身佛義者神寶記云即三藏佛示成道相帶丈六像現尊特身者通被衍門有利鈍二機故所見相勝劣不同所謂合身尊特者是也而實一佛機見有異非謂大邊存小名為帶也言合言共亦義云爾舊多錯解故略云之補光明記云通教觀既體法顯二種空謂但不但鈍根菩薩同二乘人唯見但空無中實故非色心本故佛元由誓扶殘習幻出身智終歸灰斷色有分齊故曰丈六利根受別圓接解不但空空是本覺中實之體是妙色身佛慧證得所有身智稱體無邊故名尊特尊重奇特亦名根身只一佛身由利鈍機見二種狀故曰合身通教佛身須作此辨應了利根見佛縱高十里乃至百億以依但空亦非尊特有分齊故若利人見丈六八尺既依中道亦無分齊也注舊問別圓成道在初寂場鹿苑唯明三藏成佛今通教佛於何處成如法師云只一金剛土臺成道四機所見不同若寂場鹿苑自論大小兩始轉法輪處不可以難成道也記此料簡通佛成道處初行半舉舊難如法師下正示釋像法決疑經云一切大衆所見不同或見娑羅林地悉是土沙草木石壁或見七寶清淨莊嚴或見此林是諸佛游行處或見此林即諸佛境界真實法體例知此義四見不同以證四教佛成道處無別約機見有異也補金剛土臺大論云菩薩成佛時實於智慧身是時坐處變為金剛有言土在金輪上金輪在金剛上從金剛際出如蓮臺直上持菩薩坐處令不陷沒名為金剛有師標四機所見不同者大經疏云勝天中王初坐樹下有四種相或見坐吉祥草或見坐天衣或見坐七寶或見坐虗空二明說法為三乘根性轉無生四諦法輪注然通教佛合但明成道等者以由此三稍異三藏前五不異故略不論記此節注文雖明前之五相與三藏同後之三相與三藏異亦可且作別釋說法相不然應在釋涅槃相後通明也故今權作說法一相而釋焉文句云成道如上注涅槃如後文七轉法輪者權智開三藏生滅四諦法輪實智說摩訶衍無生四諦法輪被通教三乘人也三明涅槃緣盡入滅正習俱除如炭灰俱盡注緣盡入滅者第八涅槃相妙玄四三十云雙樹入無餘涅槃薪盡火滅留舍利為一切人天福田也補緣盡入滅者則同大乘機薪既盡應火云亡之義此約利根所見也又緣盡入滅亦可約兩意釋若言機緣未熟故扶習潤生機緣熟已斷餘殘習今緣盡入滅仍屬當教鈍根所見若知中道應本屬利根所見也所言雙樹者林中四方方各雙樹四方共有四雙八株樹曰娑羅如來於此入涅槃已東西二雙南北二雙合為一樹垂蔭寶牀蓋於如來慘然變白猶如白鶴既八隻合為二樹故云雙樹入無餘涅槃也薪盡火滅者謂如來之身既入七寶金棺四天王各持天上旃檀沉水各五百根乃至第六諸天世間大衆各持旃檀沉水至茶毗所以妙香木成大香樓舉棺樓上直至迦葉禮讚竟從心胸中火湧棺外漸漸茶毗經于七日香樓乃盡即是薪盡火滅之相若鈍根所見乃身滅智亡若利根所見是機薪既盡應火云亡也留舍利為人天福田者梵語舍利此云骨身是戒定慧之所熏修究其為義別有生法全碎之辨如云我不滅度常在靈山此非法身全身乎今論涅槃之後八萬四千則唯示生碎二身爾故如來茶毗始經七日帝釋開棺取佛右牙天上起塔有二疾捷羅剎盜取佛牙一雙時城內大衆收取舍利滿八金壜入拘尸城七日供養時八國王共來爭求舍利有大臣優波吉諫八國王時帝釋化作人語我等諸天亦應有分若不見與力足於敵時優波吉告言諸君且止此舍利宜共分之何須見諍即分舍利為三分一分諸天一分八王一分龍王於是各還本國起塔供養注正習俱除兼前總舉記此釋正習俱除蓋前七地已斷正使八地更侵習氣九地進斷習氣并斷色心無知則此十地只是頓斷而留餘殘習氣而言正習俱除者乃兼前而總舉也注炭灰俱盡四教義三十三云諸佛智慧力大如劫燒火炭灰俱盡記以炭喻正使灰喻習氣謂佛正習永盡無餘譬如劫火燒須彌山一切大地都盡無炭無煙三引證經云三獸渡河謂象馬兔也喻斷惑不同故又經云諸法實相三乘皆得亦不名佛即此教也注河喻空理菩薩正習俱盡如象得底支佛侵習如馬次深聲聞斷正使如兔最淺如涅槃經記大經云是實相法界究竟智第一義諦第一義空下智觀聲聞得中智觀緣覺得上智觀無上菩提得疏云古來有解謂三乘觀異今明三乘同觀第一義空但智有上中下成三乘別例如三獸渡河得水深淺三乘同觀中道深智即得無上菩提淺智但得支佛聲聞菩提輔行云三乘如獸真空如水底象雖得底仍分二別小象得泥通菩薩也大象得底即見不空不空復有二種謂但不但也又戒經云如恆河水三獸皆渡兔不至底浮水而過馬或至底或不至底象則至底即十二因緣河也聲聞如兔緣覺如馬如來猶象今借此意證成通教三乘同稟同作是解解有淺深故成三乘也注又經云者文出華嚴彼云諸法實性相三乘亦皆得而不名為佛幻有之俗名為諸法即空之理名為實相乃真空實相也菩薩至果名佛言不名佛者以中奪偏耳記此釋華嚴文也初一行引文次二行釋義然是晉譯之文也若唐譯第八地四勸文則云善男子此諸法之性若佛出世若不出世常住不異諸佛不以得此法故名為如來一切二乘亦能得此無分別法頌云法性真常離心念二乘於此亦能得不以此故為世尊但以甚深無礙智當知二譯文異義同皆以中奪偏也注彼經不共二乘那作此說如拾遺記云彼部雖無小機稟教何妨說於三乘粗淺顯圓佛乘文彼後分經明四乘品故斥三乘非佛乘也記此料簡引結也初二句約意推經不斥三乘非佛為簡如拾遺下引釋以明不妨說小以顯佛乘彼後分下結明華嚴斥三非佛四乘者四聖法界也四會同此教三乘因同果異證果雖異同斷見思同出分段同證偏真注三因大同三果小異異則習盡不等同乃共觀即空不同三藏諦緣度別記此料簡同異也初二句泛釋次二句轉釋謂聲聞果但斷見思正使支佛果更能侵除習氣菩薩果斷盡正習更破塵沙如斯不等此其所以果有小異也共觀即空者而此三乘同以無言說道體色入空故云同也注分段者支分形段三界生死也記支形者他非我身我非他身彼此各別也分段者即分限也如欲界分限不過百歲乃至非非想天壽縱饒八萬四千大劫亦是分限下界以年計上界以劫計既墮於數奚嘗越限故曰分段也二因根機利鈍前後互通二初略標然於菩薩中有二種謂利鈍注此約接不接而分利鈍記此總明根有利鈍所以有接與不接之殊以此教乃大乘之初門接者引也其問最利一類受圓人接引入於圓其稍利者受別人接引入於別其鈍根人不能受接故云不接也二詳示二初鈍通三藏鈍則但見偏空不見不空止成當教果頭佛行因雖殊果與藏教齊故言通前注修因克果果在於上故曰果頭通教菩薩扶習潤生雖異藏教伏惑行因斷惑證理不別故言通前結釋前文通前藏教也記此明結釋通前文並可知言行因殊者通教扶習潤生藏教伏惑行因故至於果上斷惑證理藏通無二故得通前也二利通別圓二初正釋若利根菩薩非但見空兼見不空不空即中道分二種謂但不但若見但中別教來接若見不但中圓教來接故言通後注利根被接被字去聲如來被下之義此約應說如云說圓中道被而覆之也若上聲呼此就機論如云通教利根被別圓接接即點示接入也記此釋利根被接之義有二一者約佛加被論二者約機可被論加被者如來蒙覆被接引導一切衆生至但不但二種中道之中不令沉滯於偏真也可被者衆生根利始可受接於別圓也注然被接義散出諸經大品八地聞中大經空不空一切法趣非漏非無漏楞伽三種意生身大經三十六文末一生二生等若具明者謂大經十二明四諦後列八二諦章安作七二諦消之初一是總餘七是別此於四正復論三接故名七種二諦記此示明諸經被接之義大品八地聞中者此的示般若經被接義問從七地八地觀常住破無明是何教之位答非通非別是別接通何者以通教始終不明常何得中間而破無明別教初心知常初地破無明云何八地始破無明既八地聞中道始破無明則知是通下根被接之義也止觀云初空假二觀破俗上惑方聞中道仍須修觀破無明能八相作佛此佛是果仍前二觀為因故言以別接通耳輔行云若初後不聞中全屬前二若從初即聞全屬後兩復有一人破二惑盡至八地方聞中道聞已修觀破無明得法身本八相作佛雖見中道必假通教空假二觀為前方便待別理接之方聞此乃別接通意也大經空不空一切法趣非漏非無漏者此撮示經文被接義詳解見下節記中妙玄云其相云何至所聞不同止乃明別圓接通意也楞伽三種意生身者經云所謂三昧樂正受意生身覺法自性性意生身種類俱生無行作意生身法數釋云通教菩薩得如幻三昧隨意無疑意欲至身亦至名意生一三昧樂正受意生身者三昧翻正受異苦樂受故通教三四五地菩薩得真空寂滅樂普入一切佛剎隨意無礙也二覺法自性性意生身者八地菩薩覺了一切諸法自性之性如幻如化悉無所有以無量神力普入一切佛剎迅疾如意自在無礙也三種類俱生無行作意生身者九地十地菩薩覺知一切諸法皆是佛法一身無量身一時普現如鏡中像隨諸種類而得俱生雖現衆像而無作為也按釋中一身無量身即種類意普現即俱生意又輔行云一三昧樂意成身即三四五地心寂不動也二覺法自性意成身即八地普入佛剎故以法為自性三種類俱生無作意成身謂了佛證法成之與生並從果說此約通教及以接別初文雖云五地亦兼七地即入空位也八地當入假位種類俱生者了佛證法即是入中屬佛種類未必自證若接入別七地已前入別十住八地已去接入十行知佛證法入十回向並非證道故名意生也大經一生二生者此的示經文被接義經中佛為須跋那言一切諸法皆是虗假隨其滅處是名實相是名法界等下智觀故得聲聞菩提中智觀故得緣覺菩提上智觀故得無上菩提說是法時十千菩薩得一生實相萬五千菩薩得二生法界疏曰一生實相二生法界者謂十地補處大士為一生九地則二生也亦如法華損生義意章安云三乘同觀第一義智解不同一生二生是破無明一品二品實相是別理法界是圓理即利根接入別圓也若具明下具指大經及疏三接義經明四諦後列八二諦者聖行品佛為迦葉菩薩廣明四諦已又為文殊菩薩說八種二諦謂隨順衆生說有二諦一者世法二者出世法善男子為出世人之所知者名第一義諦世人知者名世諦善男子五陰和合稱某甲凡夫衆生隨其所稱是名世諦解陰無某甲名字離陰亦無出世之人如其性相而能知之名第一義諦復次善男子或復有法有名無實者即是世諦有名有實者即第一義諦善男子如我衆生壽命知見養育丈夫作者受者熱時之𦦨乾闥婆城龜毛兔角旋火之輪諸陰界入是名世諦苦集滅道名第一義諦善男子世法有五一名世二句世三縛世四法世五執著世善男子男女瓶衣車乘屋舍如是等物是名名世四句一偈如是等偈名為句世捲合繫結束縛合掌名為縛世鳴椎集僧嚴鼓誡兵吹貝知時名為法世如望遠人有染衣者生想執著言是沙門非婆羅門見有結繩橫佩身上便生念言是婆羅門非沙門也是名執著世如是五種是為世法善男子若有衆生於如是五法心無煩惱如實而知是名第一義諦復次善男子若燒若割若死若壞是名世諦無燒無割無死無壞是則名為第一義諦復次有八苦相名為世諦無生老病死無愛別離無怨憎會無求不得無五陰盛名第一義諦復次譬如一人多有所能若其走時則名走者或收刈時復名刈者或作飲食名作食者若治材木則名工匠鍛金銀時名金銀師如是一人有多名字法亦如是其實是一而有多名依因父母和合而生是名世諦而知十二因緣和合生者名第一義是為經列八二諦也章安作七二諦消者涅槃疏云若隨言說凡有八種一世出世二名無名三實不實四定不定五法不法六燒不燒七苦不苦八和合也今明大師有七二諦名雖不同其義可會一生滅二無生三單俗復真四單俗單中五復俗單中六復俗復中七圓二諦若依法華玄文名相稍別義意必同讀者應知就一種中復各三種謂隨情隨智隨情智今欲以彼七種二諦求釋此文佛旨難知且出一師之見八種不同即名八文初約世出世兩人判二諦者通冠下七一一二諦各有此意世情多想束為世諦聖智多知束為真諦此即隨情智判二諦也二約名無名判五陰和合攬陰名生即世諦即陰離陰如性知之性即真諦此約有作四諦立也三或復有法有名無實者他曰世諦有名名名於體物應於名真諦但有名無實今文反此世但虗名無實不生不滅與法相稱即是真諦不能即色是空故有名無實能即色名空故有實有名此約無生四諦立也四衆生壽命如旋火輪此單俗復真以論二諦假名幻化熱𦦨火輪但有其名而無其實稱世流布即是世諦真與中合共為真諦若單以真為第一義者不得言苦集滅道是第一義俱指四諦即真中合此名無量四諦中若真若中同為第一義諦前文曰第一義無量無邊不可稱說也五世法五種去此約單俗單中以明二諦上以熱𦦨火輪五譬以譬人我為世諦今以五法為世諦五法如𦦨輪𦦨輪譬法法譬互舉同是單俗心無顛倒如實知之即單指中道以為如實此名有作無生等苦集為俗指下文一實諦為真也六若燒若割去此約復俗單中以明二諦若燒若死此明體法始終若割若壞此明析法始終即以兩始為有兩終為無此之有無合之為俗即是復俗單指中道非有非無故無燒割即第一義此明上有作無生之真俗同名為俗指下文一實諦以為真也七有八苦去此約復俗復中以明二諦復俗如向言復中者非單指理即事而理法界圓備為復中此合上來有作無生真之與俗皆名為俗指下一實不可思議而為真諦文雖不顯義推自成然此一番猶是復俗復中二諦也八復次下先譬次合明圓二諦真俗相即皆不可思議譬如父母和合生子一人多能以譬圓俗十二因緣和合三道即是三德第一義以顯圓真是名不可思議二諦一切二諦悉入此中方便隨俗說諸二諦無量無邊止論七種何足驚怪能如是知名慧聖行古來皆悉此二諦文今用天台七種二諦來釋八番義則相應真順聖慧也由是故釋籤云若欲憑教者然此七文散在諸經無一處具出唯大經十二列八二諦章安作七二諦消之初一是總餘七是別初曰如出世人心所見者名第一義世人心所見者名世諦疏曰總冠諸諦世情多種束為世諦聖智多知束為第一義諦即是諸教隨情智說也經云五陰和合稱某甲名世諦解陰無陰亦無名字離陰亦無名第一義陰是實法某甲是假名即實有俗諦也無陰無名即假實空若離陰者名太虗空是故離陰亦無某甲及二諦名疏云名無名二諦也世諦有名真諦無名即生滅二諦也又經云或有法有名有實是第一義或有法有名無實是名世諦幻化假名即空故實即真諦也只指幻化但有假名故名世諦故疏云實不實二諦也真實幻化不實也即無生二諦也經云如我人衆生壽命知見乃至如龜毛兔角等陰界入名世諦苦集滅道名真諦兔角之俗與前不殊故成單俗四諦義含共為真諦即是含中真諦也故疏云定不定二諦也即單俗復真俗是不定中道是定又經云名世句世等五法是名世諦於五法中心無顛倒是第一義諦五種世法名與前異大意不別亦是單俗於世無倒謂見實相教道但中雖未究竟此中究竟望前故實故疏云法不法二諦也法謂實相不法謂俗亦是含中二諦也又經云燒割死壞是世諦無燒割等是第一義地前方便皆屬無常故可燒登地見常故無燒等故疏云燒不燒二諦也無常可燒常不可燒復俗單中二諦也經云有八種苦是名世諦無八種苦故是第一義八苦無常同前燒義無八苦真即是實相故疏云苦不苦二諦也亦是復俗單中教道有苦圓中無苦經云如一人有多名字依父母生名世諦依十二因緣和合生者名第一義諦依父母生即十二緣而分二者以大經明十二緣即佛性故且據顯說即以佛性而為真諦依父母生即是無明名為世諦故疏云和合二諦真俗不二故名和合復俗復中二諦也此於四正復論三接故名七種二諦者四正即一藏二通五別七圓四種正明藏通別圓四教二諦三接即三四六三種三是別接通四是圓接通六是圓接別如妙玄云一實有為俗實有滅為真二幻有為俗即幻有空為真三幻有為俗即幻有空不空共為真四幻有為俗幻有即空不空一切法趣空不空為真五幻有幻有即空皆名為俗不有不空為真六幻有幻有即空皆名為俗不有不空一切法趣不有不空為真七幻有幻有即空皆為俗一切法趣有趣空趣不有不空為真也一實有二諦者一切依正色心陰界入等皆是實法實法所成森羅萬品皆名為俗方便修道滅此俗已乃得會真乃至云病中無藥文字中無菩提皆此意也二幻有空二諦者斥前意也何者實有時無真滅有時無俗二諦義不成若明幻有者幻有是俗幻有不可得即俗而真乃至云是名幻有無二諦也通人隨智照真與前不異隨智照俗不同何者通教觀巧復局照俗亦巧卻尋本俗名為復局析空體空觀門各異故稱局也三幻有空不空二諦者俗不異前真則三種不同一俗隨三真即成三種二諦其相云何如大品明非漏非無漏等大經明空不空等復次約一切法趣非漏非無漏等解見下節記中其相云何起至具一切法也止是故說此一俗隨三真轉或對單真或對復真或對不思議真乃至云若隨智證俗隨智轉智證偏真即成通教二諦智證不空真即成別入通二諦智證一切法趣不空真即成圓入通二諦三人入真之智不同復局照俗亦異也四一切法趣空不空二諦并入此文中釋即圓入通二諦也五幻有無為俗不有不無為真有無二故為俗中道不有不無不二為真六圓入別二諦者俗與別同同觀幻有之俗真諦則異謂一邊但中一邊不但中故云異也別人謂不空但理而已欲顯此理地前先修諸行登地方顯中道雖緣修方便故言一切法趣不空圓人聞不空理即至具一切佛法無有缺減故言一切法趣不空也七圓教二諦者直說不思議二諦也言直說者即事顯理三千歸于一念即理明事三千性相宛然是也真即是俗俗即是真如如意珠珠體本空即是真諦而能雨寶即俗諦也珠以譬真用以譬俗即珠是用即用是珠不二而二分真俗耳已上撮略妙玄之文是為七種二諦四為正三論接也注古來二十三家明乎二諦唯莊嚴開善擅風流之名莊嚴謂佛果出二諦外即今被接開善謂佛果不出二諦通當教佛吾祖曲盡如來逗機設化之相故明被接則於諸經無所壅矣記此示古今諸師發明二諦之義有所未盡善矣初一句通示次一句別美莊嚴下出二師義之所歸也然莊嚴立義乃據利根即今被接者也開善立義乃就鈍根故是通教佛果也吾祖下明天台智眼卓越古今為判教之獨步也是故二諦被接義合佛經如止觀三云通教三乘二乘體假入空只入但空不能從但空入假無化他用菩薩體假入但空能從但空入假化度衆生上根菩薩體假入空前入但空次入不但空則破無明見佛性與前真永別豈可用為一真諦也莊嚴師謂三界集諦是招依正色心有漏之俗佛果無漏不招依正色心出俗諦外而有真諦一見不復更見故出二諦之外今云此義但得片意而作義不成不知佛智別照何境別斷何惑若得今義出外意則成開善師謂體見思之俗當俗即空之真是故佛果不出二諦外也今云此義若不能動則異二乘作意復不成若得此意不出義亦成矣古來名此為風流二諦義在此但空不但空合時祇是一真諦離時卻成兩真諦與三藏家異彼三藏第三諦但有中道名無別有體眼無別見智無別知今則不爾但三諦亦名真諦亦名中道第一義諦有別體別見別知是為通教二諦三諦合離之相也輔行云莊嚴云出開善云不出此由三乘共學菩薩有但不但古人不曉利鈍兩根但諍佛果出與不出終未見今開合之意故使二家各明已計今文並破是故皆云作意不成故知二家各得今文利鈍一邊所以云片意也又不能知出外別照中道之境用中道智進破無明故云片意若不能知鈍根依教與二乘同證真諦是亦但得片意若全得今意出與不出義悉成矣是故古人雙美二家目此二諦而曰風流言風流者動止合儀出入無失也若依今用含中二諦進退咸美風流有餘故云吾祖曲盡如來逗機設化之相者良有以也補涅槃玄云莊嚴謂佛果出二諦外非真俗攝凡夫以惑因感果是虗浮世諦假體即空故是真諦佛果非惑因所感故非世諦不可復空故非真諦引仁王經云超度世諦第一義諦住第十一薩雲若地是也開善謂佛果不出二諦佛果涅槃還為二諦所攝體是續待二假故是世諦即此二假可空故是真諦佛果靈智亦復冥真也注古明被接不出三義以含中為發源點示為機要發習為根性以通教巧故一真含二中利根菩薩才證真空即為點示如妙玄明別接通中寄三法以示三根解源謂非漏非無漏空不空一切法趣如釋籤三十九具釋然由利根發昔所習方可點示若鈍根菩薩同二乘人直至法華方乃被會記此示古明被接而有三義也初句總標三義次三句別列三義次五行貫釋三義也言一真含二中者如云幻有即空不空共為真此真含但中也幻有即空不空一切法趣空不空為真此真含不但中是為通教一真含二中為發源也利根才證真空即為點示者此釋點示為機要不使利根耽著真空令成別圓中聖人也如妙玄下引證點示妙玄云一俗隨三真轉即成三種其相云何如大品明非漏非無漏初人謂非漏是非俗非無漏是遣著何者緣無漏生著如緣滅生使破著還入無漏此是一番二諦也次人聞非漏非無漏謂非二邊別顯中理中理為真又是一番二諦也後人聞非漏非無漏即知雙非正顯中道中道法界力用廣大與虗空等一切法趣非有漏非無漏此又一番二諦也初番即單真單俗通二諦也二番即別接通含中入真二諦也三番即圓接通含不思議中入真二諦也大經云聲聞但見於空不見不空智者見空及與不空即是此意二乘謂著此空破著空故言不空空著若破但見空不見不空也利人謂不空即妙有故言不空利利人聞不空謂是如來藏一切法趣如來藏還約空不空即有三種復次約一切法趣非漏非無漏顯三種異者初人聞一切法趣非漏非無漏者謂諸法不離空周行十方界還如瓶中如瓶喻於人人中之空不異十方之空十方之空不異瓶內之空故十方空皆趣瓶空也次人聞趣知此中理須一切行來趣發之一切行者即是方便之空假要知地前之行而趣發此中道乃是緣修以顯真修所謂緣修滿時真修自顯也後人聞一切法趣即非漏非無漏具一切法也如釋籤具釋者文云通寄三法以辨其相漏無漏本是通法為成接義故立雙非空不空本是別法一切法趣本是圓法於一一法各有三人取解不同者良由機發有異故所聞不同乃至別圓機發對鈍住空故成三別是以釋後二接須對通鈍共成三人同聽異聞此言是證何言聞耶以利根隨聞隨證故故約漏等以示解源若得此意於一切法自在無礙是為點示機要義也然由下釋發習為根性籤云通教菩薩由根利鈍發習不同若發昔生所習別解能解但中方可點示受別教接或發昔生所習圓解能解不但中者方可點示受圓教接此是利根雖同觀幻有之俗而契真各異故爾前接入中道但鈍根同於二乘直至法華會上方乃被會是為以發習為根性也注非但見空等者止觀三十六引大經云二乘之人但見於空不見不空智者非但見空能見不空不空即大涅槃文記輔行云智者即是利根見中名見不空不空即是不但空也三德具足名大涅槃注離邊名但即邊名不但記此釋但中不但中之異言但中者必離二邊之空有獨顯一中假喻發明如離却虗空別指一月也言不但中者不須離二邊空有別顯中道當須指邊即中離邊空有中亦不可得也如離却虗空何處更有月可指示此明別人入中但解自性清淨真如不具諸法故云但中圓人不然了知心佛衆生三無差別一色一香無非中道譬如食蜜中邊皆甜故曰不但中也二揀位二初問問何位受接接入何位注初問所接次問能接記此釋問意言所接者指通教利根人也能接者指如來以圓別二法接引通教二種利人也何位者意謂但不知何位之人可以受上二教之所接引耶設蒙接入又不知於二教中可居何位耶二答二初答通定三根答受接人三根不同若上根三地四地被接中根之人五地六地下根之人七地八地注答中就被接機發習遲速以論三根輔行以四地為上六七為中八九為下今進一位者教位從容文或進退故此答初問補此明以答初問也初三句釋三根意輔行下對明今文三根末句結答三四地者即八人見地也此位斷見惑盡見真空理但利者於十五心即得見道鈍者待十六心滿方能見道故成二位然此二地所以被接者蓋上根一見一切見非但見空亦見不空既見不空故能被接也五地斷欲六品思六地斷下九品思盡既斷欲思或始見不空而受接故判屬中根也七地斷思盡八地侵習氣此既待見思盡方解不空故是下根也止觀云破見思惑盡到八地方為說真內之中故云智者見空及與不空被接方聞輔行云八地方接者此據下根問何故須知第八方接答為欲示真內之中故故待證空方為點示令深觀空即見不空若爾中上二根其義云何答中上二根亦見真已方示中空但前二根真空尚淺是故說教多附下根也二答入位真似所接之教真似不同若似位被接別十回向圓十信位若真位受接別初地圓初住注所接之教等者答次問也所即語辭記此明以答次問也然上所之一字是語助辭非能所之所也注別向圓信按位接也別地圓住勝進接也補此明所接之教有似位真位之不同似位者相似之位也謂通斷見思被別十向所接乃至修中道伏無明被圓十信所接以別十向圓十信俱為相似皆斷見思之位今欲接斷見思之人故以別向圓信之教被而覆之則所接者按其位而成別圓中人故曰按位接也真位者分真之位也謂通教斷惑但斷見思若與後二教按而論之但是相似以其根利能見不空今欲接引而以別地圓住之教被而覆之則所接者隨其勝進而成別圓中人蓋別教登地已上圓入初住已去皆屬分真俱是破無明之位以破無明之深位而接斷見思之淺位故云勝進接也注據上似位被接真位受接應作被字蓋以能從所也記此釋真位受接之受字依義當用被字為妥何者謂上似位被接乃覆被之被而為能接故下真位受接之受字亦應作覆被之被字方得同為能接而儀文云受接者蓋以能接之位次從所接之三根也注輔行三下八云若接入教道在回向中若接入證道即在初地若接入圓亦分教證比說可知文記言教道證道者能詮之教為教道以言說有次第故所證之理為證道以真理無二故別教三賢位中未破無明還須修證修必次第修證必次第證故屬教道一登初地已破無明親證真如故屬證道若接入圓亦分教證者蓋圓教本無教證之別設欲分之則比別教之說可知例謂接入教道在六根清淨中接入證道即在初住故云比說可知注又別圓接通接聖不接賢接真不接俗若圓接別接俗不接真接賢不接聖記此料簡圓接通別各有當接不接之殊也且如通教三地四地已後既得斷惑故稱為聖初地二地全不斷惑僅能稱賢見尚不斷安論被接故云接聖不接賢也前二地為俗後七地為真惟除佛地前二既不被接故曰接真不接俗也別教前四十位無明未破總名為俗登地已後分破無明俱名為真言接俗不接真者真是證道同圓故不須接故其所接者唯俗而已俗即賢真即聖也別教亦有三根不同上根信住便能被接中根十行方堪被接下根必待十向才可被接此則約教分齊得受接義故圓來接而聖真位則如初地已破無明已成真因任運流入何須更接是故圓所不接也注又妙玄順能詮教約教道邊具明三接止觀為成觀故從所詮理約證道邊唯明一接記此明二部論接三一不同也止觀問何以別接通而不云接藏耶答由別教初修空假二觀破真俗二諦惑盡方聞中道仍須修觀破無明八相作佛此佛是果仍須前觀為因故言以別接通耳輔行釋問意云何獨接通而不云接藏何獨別接而不云圓接答意云通須別接以機別故若初後不聞全屬前二若從初即聞全屬後兩復有一人破二惑盡至八地方聞中修觀進破無明得法身本八相作佛雖見中道必借通教空假二觀為前進之方便亦必待別教之理接之方聞今言別接者應具二義一別教教鄰近故二別理理異真故輔行又云玄文以圓接通別者分為教證行位別故今不云者約證道故但約觀故釋籤云若止觀中為成理觀但以界外理接界內理通別兩教是明二理之交際故明別接通耳今玄文前六重仍存教道故有圓接通別二意實道只因圓理接權故釋今文應須教道復以圓中接但中也六重者一藏二通三別接通四圓接通五別六圓接別止觀輔行會三更有明不接藏圓不接之文須者檢詳可也注然圓頓止觀亦明被接者為知通塞復以思議顯不思議也如輔行三十七記此點示圓頓止觀明接另有一意非可與前節同年語也蓋此圓頓止觀曾經法華開顯唯此一事實餘二則非真有何接與不接以前之三教有隔礙取捨今之法門唯觀吾人一念之心亡能所絶對待能所不二理智一如反觀山河大地猶如大圓鏡智以己心所名之曰通內心少有𮈔毫隔礙名之為塞故此法門不可思議只此一念原具三千性相百界千如上與諸佛平等下與衆生一如如心亦復爾如佛衆生然故名不可思議也又修止觀時於真生著名塞能達於中名通真是界內權理名可思議中是界外實理名不可思議也輔行問玄文云接非會義今約法華只應論會何故論接答前後諸文會義非一今論修觀亦可重述法華前教以例行人通塞之相論於教門有通塞相故須明之如此明接未妨於會況接在菩薩與會不殊又前後文處處皆明可思議等但為顯於不思議故前待後絶次第應然何須問言不應論接三揀異藏通二初問問此藏通二教同是三乘同斷四住止出三界同證偏真同行三百由旬同入化城何故分二二答二初縱許答誠如所問二裁奪二初辨析同中有異然同而不同所證雖同大小巧拙永異此之二教是界內教二正釋異之所以二初明藏教之拙藏是界內小拙不通於大故小折色入空故拙此教三人雖當教內有上中下異望通三人則一概鈍根故須析破也注然藏通三乘斷惑出界證理雖同教行有異大小約小衍巧拙論體析對界外方便等土名界內教以此二教化界內也不通於大故小不能遠通常住故析色入空者外計鄰虗不出斷常今總觀色心生滅非斷非常對破外道汝說非正如止觀三二十六輔行三下二十四記此明藏通鈍者似同利者碩異也然藏教教是生滅通教教是無生藏教觀是析空通教觀是體空故云教行有異也大小約小衍者是轉釋教異謂藏是小教通是衍門是為教之大小有異也巧拙論體析者是轉釋行異謂藏人析色明空通人體色明空是為行之巧拙有異也言對界外名界內教者蓋四土言之藏通二教但化凡聖同居土六凡法界也別圓二教兼化方便實報寂光三土四聖法界也故知藏通對別圓界外教而名界內教也言不能遠通常住者常住乃大乘中道妙理有五百由旬之遠而藏乘界內之教既不能通故是小也析色入空一節正明藏人觀行之拙初二句出外計今總下明藏行雖拙亦能破邪末二句引證如止觀破外鄰虗云此塵為有為無若有極微色則有十方分若無極微色則無十方分若析極微色不盡則成常見有見若析盡則成斷見無見此外道析色也析心亦如是若有若無皆墮斷常也三藏析法觀云色若粗若細總而觀之無常無我以色從無明生無明不實粗細皆假假故無常無性即得入空又介爾心起必藉根塵無一法不從緣生從緣生者皆悉無常或言一念六十剎那或言百億剎那剎那不住念念無常乃至云是名析色觀意也析名本於外道對破邪析而名正析何但外邪應須正析乃至圓教四門生著亦須析破也輔行釋云方分者無塵而已有必是色色必有方方必有分有十方分次破其更析極微析故則盡若一塵可盡諸塵皆可盡若可盡者如何和合而成於身若不盡者一塵是常諸塵皆常若是常者身不應滅故非佛法正析相也析心亦爾若一剎那心不可盡者如何後剎那生後剎那生前心必滅若永滅者如何復有後心而生故知剎那念念生滅非斷非常今三藏析法亦先觀色次觀心觀色心時但觀粗細無常無我不須云盡及以不盡謂從過去一念無明而生諸行復由至中陰時我無明心復與父母無明心合生於色身依報亦由共無明業同感是故依正莫不皆由無明而生無明之體從因緣有故使造色亦從因緣當知因果皆是無常如何計之為盡不盡觀心亦爾過去剎那感今剎那況今剎那復對外境因緣故有是故念念皆悉無常如是推時何但識與色心無常進推心念本來非有乃見法性真如常住然此析名本於外道今觀無常亦名析者已上俱是輔行之文原是對破外道汝析非正二明通教之巧二初正明巧大通教則界內大巧大謂大乘初門故巧謂體色入空故雖當教中三人有上中下異若望藏教則一概為利注通後別圓故是初門了知諸法如幻如化當體即空記此明通人之巧故能為大乘之初門也以其能了達諸法如夢幻泡影鏡像水月竟無所得當體全空是故別圓藉此開導二兼容攝小二初疑問問教既大乘何故有二乘之人記問意通教既稱大乘初門其所被之機必然自他雙利之大士何以而有聲聞緣覺獨善之流耶二釋答答朱門中何妨庶民出入故人雖有小教定是大大乘兼小漸引入實豈不巧哉注天子南門謂之朱漸引入實明佛意也記此以佛意釋明漸引入實如云先以欲鈎牽後令入佛智之意如止觀云如朱門天子所立正通王事不妨羣小出入雖是小人終是天子門也今摩訶衍亦復如是正為菩薩體法入空雖有小乘終名為大也當知大乘教門有小人出入者蓋在轉小成大也漸引入實者謂漸次接引令其造詣入於圓實之地是則雖小是大故其通教二乘人之所修行亦得名為巧度也言天子南門謂之朱者國王而曰天子言非凡品也以有覆護之德仁育之恩正如天之子也故諺云萬靈振護者聖天子也以所居之都四方四門各有其名東曰青龍西曰白虎南曰朱北曰玄武今舉正陽之南門況通教大乘之初門而有大小同出入也四結所屬文般若方等部內共般若等即此教也注釋籤四十九云不同三藏四阿含等別有部帙今以諸部方等諸般若中但是三乘共行即判屬通文今文通指般若方等下但云共般若等蓋方等彈斥共義稍疏故記儀文云般若方等部內共般若等者非是局指般若中三乘共聞者為共般若意取方等般若二時部內三乘共聞者俱名共般若耳如輔行云雖無別部共般若文但取方等般若中或一時一會一章獨明共意其流亦多今觀此文則知方等部內亦有共般若者即此教所屬之文也注中引釋籤以證成言不同三藏等者以三藏之教有四阿含等為部帙今此通教無別部帙是故於二時中三乘共聞者判屬於通而今不曰共方等而曰共般若者蓋方等重在彈斥共義稍疏而般若之空宗正當教之妙旨以是則曰共般若者盡善也已三結略明通教竟記此句總結通教全文言略明者以通教前後融通大小不壅焉能盡剖其奧亦不過略為消顯而已
