body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二讀誦品二初標二讀誦品者二釋三初引經經云何況讀誦受持之者記此引法華經句以證第二品之功德也何況者比擬意以前初品隨喜他益鮮鮮之功尚勝二乘施戒福德何況此第二品中讀誦受持自行之功德耶可見此五品之功勳而後後勝於前前矣二釋意謂內以圓觀更加讀誦記此釋勝前之所以也謂前隨喜者但圓信而已今更加讀誦口之誦力耳之聞力以助於觀則內外相藉使圓信轉明十心堅固是故能成第二品也三喻顯如膏助火注止觀七三十一云善言妙義與心相會如膏助火是時心觀益明名第二品也讀誦如膏圓觀如火文句八五看文為讀不忘為誦信心故受念力故持文補此釋譬喻也先引止觀法喻並陳初二句言讀誦者隨文入觀意次三句喻明因讀誦之外助俾內觀而愈明故成第二品也次二句正以喻顯可知次引文句訓釋四義妙玄云初品觀智如目次品讀誦如日日有光故目種種色種種色指三千三諦又大論六種法師受持讀誦為四宣傳為說聖人經書難解須解釋共成六種釋讀誦品竟三說法品二初標三說法品者二釋二初引經經云若有受持讀誦為他人說注文句八五云宣傳為說聖人經書難解須解釋文記儀文引法華經句以證第三品之功德也前品讀誦專為自利此中受持讀誦者自行也為他人說者教他也既能自利亦能利他彼此獲益勝前可知注中引文句以明解說二行其功同也解者注釋其義謂聖經語妙義玄自非達者詮解後學罔措說者宣傳其文所謂佛法無人說雖慧莫能了是故宣傳佛語解釋佛經同入說法品也二釋意內解轉勝導利前人化功歸己心倍勝前注妙玄五三云行者內觀轉強外資又著圓解在懷誓願熏動更加說法如實演布說法開導是前人得道全因緣化功歸己十心則三倍轉明是名第三品位文記此釋勝前之所以也前雖觀行轉明功在自行斯則內以誓願熏動外則如法演說開導前人令彼依法修持化功歸己俾己觀三倍增明二利雙修其功德自當勝前奚待言乎備有師標云中阿含及付法藏經俱言善知識是前人得道全因緣毗曇云說法解脫聽法解脫經論雖小可以例知注止觀七三十云更加說法轉其內解導利前人以曠濟故化功歸己釋籤五云故知以說法力內熏自智令倍清淨為說圓常內心無著故名為淨化功歸己意在於斯問南嶽天台皆云為他損己及止觀中令修三術誡弗領徒又輔行七下二十六云蚤領衆者名成損己益他蓋微其如玄文止觀及今說法品皆云說法開導化他歸己耶須知以慈忍無著之心說法則可如云三軌備足方可宣通如四安樂行方許說法否則不許若南嶽天台所云蓋寄自以誡他也如妙樂一云今問弘經者為名利壅己為大悲益物自行暗於妙宗何殊無目而導衣座室誡思之自克記此節深談說法品位不易登也先引止觀以明功勝前品次引釋籤以證功勝所以問中南嶽謂為他損己者傳中敘智斷師咨疑禪要師云十地法門驚異心目斷云恐師位階十地師云吾是十信鐵輪位耳天台謂為他損己者別傳中述智朗請云不審師居何位沒此何生師云吾不領衆必淨六根為他損己僅止五品耳止觀三術者文云一莫受莫著二縮德露疵三一舉萬里此是外三術內三術者謂空假中是也外障是軟賊謂名譽等當修外術以治之內障是強賊謂煩惱等當修內術而治也又輔行下引證損己以難今品之益己也須知下答辭意明有堪說不堪說之分也言三軌者法華經云大慈悲為室柔和忍辱衣諸法空為座處此為說法是也四安樂行者法華明身口意誓願四安樂行又一者正慧離著安樂行二者無輕讚毀安樂行亦名轉諸聲聞令得佛智安樂行三者無惱平等安樂行亦名敬善知識安樂行四者慈悲接引安樂行亦名夢中具足成就神通智慧佛道涅槃安樂行意謂具三軌四行者方堪說法反顯不具者則不堪也若南嶽下通指二師引己以誡衆也如妙樂下正明警誡意謂己眼不明如為人師何異無目導引所謂一盲引衆盲也故教思三軌四行以誡之補文句云利物慈悲為首涉有忍辱為基說法亡我為本而弘經者慈悲覆護衆生如室忍辱遮蔽衆生惡障及煩惱等醜如衣了諸法空亦無我為能說安心於空方能安他安己如座四安樂行當檢南嶽法華安樂行品解注問今五品位說法品中化功歸己彼止觀安忍中正於五品令修三術誡弗領徒何耶須知雖於品中令修三術意誡初心為他損己又品位雖說須守觀心若逐外有妨是亦須誡記此節問答以釋初心說法者當自量自裁可也問中先明今言益彼謂損如何會通須知下答辭意言初心弘經者宜用彼以自警用今以說法庶幾於他獲利於道無妨不然何如退步為妙釋說法品竟四兼行六度品二初標四兼行六度二釋二初引經經云況復有人能持是經兼行布施等注妙玄五三云上來前熟觀心未遑涉事今正觀稍明即傍兼利物能以少施與虗空法界等使一切法趣檀檀為法界餘五亦如是事相雖少運懷甚大此則理觀為正事行為傍故言兼行布施記此儀文引經以證第四品之功德也況者亦比擬意言前品說法雖是利他似乎但熟理觀為要未敢涉於事行所謂劃地以自限也故不若此品兼行六度之為勝也注中引妙玄釋成勝義初四句校前而論超勝所以能以少施下明圓教行門之妙不同前三教之粗行也圓人一圓一切圓故有運心利物之能如取一摶之食施人令一切法皆成布施何以故了達此施全體法界法界外更無剩法故也故能使一切皆趣於施是為少施與虗空等也以其能作法界之觀故云事相雖少運懷甚大此品依然理觀為正事行為傍故言兼也二釋意福德力故倍增觀心注事福資理則十心彌盛是名第四品位文記此明勝前之所以也前者既未涉事雖有理觀之功唯有慧而無福今藉事福之力以助之使理觀倍加增明故云事福資理十心彌盛自當勝前故稱第四品也釋兼行品竟五正行六度品二初標五正行六度者二釋二初引經經云若人讀誦為他人說復能持戒等注妙玄五三云行人圓觀稍熟理事欲融涉事不妨理在理不隔事故具行六度若布施時無二邊取著十法界依正一捨一切捨財身及命無畏等施若持戒時性重譏嫌等無差別五部重輕無所觸犯若行忍時生法寂滅荷負安耐若行精進身心俱淨無間無退若行禪時遊入諸禪靜散無妨若修慧時權實二智究了通達乃至世智治生産等皆與實相不相違背具足解釋佛之知見而於正觀如火益薪此是第五品位文記此儀文引經以證最後品之功德也謂前品文意持經理觀以自利為正兼行事度以利他為助儼然事理有妨是故不得謂正也以其自第二讀誦品中發心兼利多從理觀少涉事行蓋是圓教中一類鈍根人也此中不同以其自第三說法品中人發心而行六度是人居本位中慣以弘法利生今者不行則已既已發心行度是故稱之為正也前以檀度該餘五此以尸度攝之則一也注中引妙玄發明正行之巧反顯兼行之拙其中利鈍歷歷可觀初一行先明理事融通自他無礙故能具足而行六度若布施下六行列明圓教六度之相具足解釋句明大弘妙法也而於正觀下二句略喻正行之益末句結成五品也初如文若布施下言財施者十界依正身財及命一切皆捨是內外施如云國城妻子象馬七珍乃至頭目髓腦悉皆施與無畏施者能令一切安然離畏也法施者以己所見聞信解一切佛法對機而說即前說法品也今行三種施時皆無二邊取著以達三輪體空也若持戒下謂雖了戒相如空而觀譏嫌等於性重無別非唯不犯波羅夷之重即突吉羅之小亦不敢觸所謂精進持淨戒猶如護明珠也若行忍下忍有三生法寂滅也惡罵捶打皆悉能忍達能忍所忍皆不可得所謂忍心如幻化辱境若龜毛也若行精進下身心俱淨勤無間雜進而無退也若行禪下謂世出世及出世上上禪皆能遊心造入靜散悉無妨礙所謂行亦禪坐亦禪語默動靜體安然也若修慧下實慧無分別證理離諸能所權慧有分別照事無諸錯謬權實並行方名大慧亦且治生産業皆與實相不違唯其通達世出世智故能具足解釋佛之知見佛之知見即妙法蓮華經也言具足解釋者以其能弘全文也三智圓顯曰佛知五眼圓明曰佛見注釋籤五二十六云事理不二方名正行若取其意但用三藏事六度相皆以實相融令不二無非法界即是其相無畏等施者論有三施謂資生無畏法捨於依正名施資生略不言法故云等也文記此節復引釋籤以明事理不礙即無作六度義意謂無作六度無別有相即是藏教事六度是其相也三藏不達實相無相故云有作圓人了達故以實相妙心融令不二即理即事無非法界故云三藏事度即是無作之相也文中單引二施者以玄文略不明法故也無性論云法施無染心宣說契經等法財施無染心施資生具無畏施心無損害拔濟驚怖此自施行相也又云法施為益他善根財施為益他身無畏施為資他心此明施所為也又云若論得報法施資心財施資身無畏施雙益身心故得果報最殊妙也補瑜伽論云無畏施者謂拔濟獅子虎狼鬼魅等畏王賊等畏水火等畏是也備有師標彌勒頌云檀度攝於六資生無畏法此中一二三是名修行住謂資攝布施無畏攝持戒忍辱法攝精進等也二釋意謂自行化他事理具足觀心無礙轉勝於前不可比喻注止觀七三十一云正修六度自行化他事理具足心觀無礙轉勝於前不可比喻名第五品也文記此釋勝前之所以也謂前品雖兼利他事理不融則觀心有妨今者己他不二理事雙融自當倍勝於前也不可比喻者言此品功德難思設以下方盡虗空界尚不足以格量所謂有口不能宣也釋第五正行竟記玄文云五品是圓家方便欲令易解準小望大如三藏五停心初品圓信法界上信諸佛下信衆生皆起隨喜是圓慈停心遍治法界上嫉妒二讀誦大乘文字是法身氣命讀誦明利是圓數息停心遍治法界上覺觀三說法能自淨心亦淨他心是圓因緣停心遍治法界上自他癡癡去故行去乃至老死去四兼行六度是圓不淨停心六蔽名貪欲若捨貪欲欲因欲果皆捨捨故無復報身非淨非不淨也五正行六度是圓念佛停心正行六度即事而理理不妨道事妨於道今既即事而理則無障可論大意如此與圖示似異補前圖依四念處五停心者五品是也藏以數息停散圓以信理除疑信是道元故當初品又信是功德母如彼氣命又信忍不動故即是停心信品是一停心也藏以不淨事觀停貪圓以讀誦除穢染若著文字染污法性非求法也文字性離即是解脫解脫清淨第二停心也藏以慈停瞋圓以慈故有說說有祕密則非慈相當知慈故能說第三停心也藏以因緣觀停癡圓以六度度六蔽暗去明生第四停心也藏以念佛停逼迫圓以即事而理理即法界法佛豈逼迫佛法無能逼所逼第五停心也當知信事即理文字即解脫慈即寬宏度蔽彼岸一切平等圓五停心也注四信五品對三慧文句十云初二是聞慧位廣聞廣信是思慧位觀行想成是修慧位自淺之深成六根清淨十信位也又云前三人是聞慧位兼行六度是思慧位正行六度是修慧位備四信單對正行六度此依楞嚴寺本現在儀注依昭慶寺本雙對兼行六度者誤記文句云云何四信略解三人廣說二人觀成一人信通四人故言四信也四信者一一念信解未能演說二略解言趣三廣為他說四深信觀成妙樂釋云攝五成四不須至五又名從初得故俱名信略解三人者去通從別則受別名廣及觀成必有略故故略通三人唯除初信初無解故廣說二人除略解者廣局第三不通前二觀成一人復除廣解不通餘三除信一事餘不通四唯信解四名為四信若一念信解未有下三乃是初信最局略具初信廣具初二觀必具三故後漸寬但後後者勝於前前故成後局也補一念信解者謂隨所聞處豁爾開明隨語而入無有隔礙信一切法皆是佛法又信佛法不隔一切法不得佛法不得一切法而見一切法亦見佛法六根凡有所對悉亦如是無疑曰信明了曰解是為一念信解心也二略解言趣者前但言解未能敷說說涉名數須善方言今此具足故言解其言趣即是為他解說以說力故能起自他無上之慧也三廣為他說者經云廣聞是經若教人聞若自持若教人持若自書若教人書若以華香瓔珞香油蘇燈等供養經卷是則廣聞廣解廣為他說廣修供養也四深信觀成者經云聞我說壽命長遠深心信解則為見佛常在靈山為衆說法又見娑婆世界其地平正乃至大菩薩衆咸處其中若能如是觀者是為深信解相也又觀行想成亦是第四深信觀成謂具上三信加修觀行入禪用慧想成相起能見有餘實報二土相貌見佛與比丘僧常在靈山方便有餘土相又見娑婆純諸菩薩實報土相也妙樂云想成相起者理具此相依理起想故想成便見此相從初習觀但得想名觀行淺故但依此想漸深漸成入初住位任運遍見應用無方問稱理起想何須想土但觀一念妙理即足答前之三教用觀皆須破陰唯圓教即觀一念三千三諦具足是則一心一切心一身一切身一土一切土故觀成時一心見一切心乃至一土見一切土十方諸佛身中現故故於自心常寂光中遍見十方一切身土注妙樂十十二云何故現在唯四信滅後立五品答其義既齊四五無別但是滅後加讀誦為第二品耳文記言義齊四五無別者謂初信齊一二品二信齊三品三信齊四品四信齊五品故云四五無別也三結成此五品位圓伏五住煩惱外凡位也與別十信位同注妙玄五八云五品已圓解一實四諦其心念念與法界諸波羅密相應遍體無邪曲偏等倒圓伏枝客根本惑故名伏忍諸教初心無此氣分文記此明五品觀行之妙伏惑之能也四教義云上根利智聞圓詮因緣即中明無作四實諦理便信解一實諦是如來虗空佛性非世間非出世間非因非果不可宣說非可顯示無說而說說世間因果即無作苦集說出世因果即無作道滅故維摩訶彌勒云佛知一切衆生畢竟寂滅即涅槃相不可復滅一切衆生即菩提相不可復得若知涅槃即生死是無作苦諦菩提即煩惱是無作集諦生死即涅槃是無作滅諦煩惱即菩提是無作道諦名四實諦也所以者何約一實以明四一實諦不作於四四不自作乃至四亦無因緣而作四也而說為四者是無作之四此四畢竟不可得即是一實諦名無作四實諦若聞此信解無疑者深信一切衆生是不思議解脫即大乘即般若即首楞嚴定即佛性即法身即實相即中道第一義諦即如來藏即法界即畢竟空即一切佛法因此誓願菩提心發是為圓教名字即之信解也應知四教義乃品信合說此以品信間說故可引十信文明五品圓解一實諦也其心即觀心既與法界諸波羅密相應是圓教觀行即之圓行也次明伏惑得名謂法界理中無外道邪倒人天曲倒二乘偏倒既與相應故無諸倒復能圓伏諸惑得伏忍名也注又十紙云五品之位理須未顯觀慧已圓具煩惱性能知如來祕密之藏堪為世間作初依止文妙玄五十一云五品六根為初依十住為二依十行十回向為三依十地等覺為四依文釋籤六三云四依位者以此四人並能化他故以此位釋於因人功用文記此示五品位人正堪為世間作初依之大士也五住煩惱但伏而未斷故云中道之理未顯也了達惑體原是法界故云觀慧已圓三惑全在故云具煩惱性圓人初心便觀涅槃行道故云能知祕藏也堪為句正示初依人也是則觀行位成者猶如如來不久詣道樹證菩提一切世間皆應向禮一切賢聖皆應見之也妙玄下通明四依若推圓望別應約十住明三依對住前為四依若約始終位次判為四依者如文可知釋籤下證義釋成此四依義出涅槃如來性品注此約觀行成就五品在十信前若普賢觀品信合說蓋赴機異爾記此料簡普賢觀與今文品信開合之有異也彼經云讀誦大乘方等經典除滅六根罪過得六根清淨以讀誦大乘經典是五品義除六根過得六根淨是十信義故云合說也彼經是如來說法此文乃祖師判教皆是赴機之談因時機差別故開合有異耳注又吾祖位居五品而云獲旋總持者然旋假入空約位豎論雖在六根七信已前約觀橫辨不妨通於五品記此點示總持橫通五品以釋來學纖芥之疑也恐有疑云大師自云位居五品奚能獲證旋陀羅尼故有此文以示之初二句標示次五句釋疑謂約位豎論雖在信位約觀橫辨何礙通於五品耶如妙玄云經說得三總持但名似道未得真道籤云旋者轉也轉一切法皆悉入空言百千萬億者以從數故名假法音方便者中道法音能作內體證中方便此三總是一心三觀持一切法通名總持即相似三總持也是第一旋陀羅尼旋假入空在六根七信前天台居五品位何言得旋陀羅尼耶故此釋之又妙玄云若大乘懺悔發初隨喜圓信之心獲一旋陀羅尼已不可向人說雖種種分別亦不可解況後諸位籤云今舉三中之一以劣況勝故云一旋約教豎論雖在六根七信已前今約三觀亦通五品初心也釋外凡一科竟二內凡二初判略標次進六根清淨位即是十信注妙玄五四云十信位者初以圓聞能起圓信修於圓行善巧增益令此圓行五倍深明因此圓行得入圓位以善修平等法界即入信心乃至善修無著即入願心是名十信位瓔珞云一信有十十信有百百法為一切法之根本也是名圓教鐵輪十信位即是六根清淨圓教似解暖頂忍世第一法普賢觀明無生忍前有十種境界即此位也文普賢釋迦分身多寶四聖及六根清淨共為十種記此節略顯相似位中之功德也言次進者以前五品觀行位中觀心之功漸次增進圓慧深明任運粗垢先落雖未證入法性相似見中道理故得六受用清淨無染以其似見之境自淺至深粗妙非一故有十種心智之殊云十信也注中引妙玄總列十種善修之行而得十種心智之名也初二行攝前五品增進之功而造入於斯也初以圓聞即隨喜也能起圓信即讀誦說法也修於圓行即兼正二行六度也因此二行善巧增益故令圓行五倍增明此結歎品行之巧也因此下二句略明造入來原以善修下正列顯十行此是略舉始終以該中間今具記之文云一善修平等法界入信心二善修慈憫入念心三善修寂照入進心四善修破法入慧心五善修通塞入定心六善修道品入不退心七善修正助入回向心八善修凡聖入護法心九善修不動入戒心十善修無著入願心也籤云善修者由緣實相行於五悔䇿勤精進至五品位得入十信名為善修又云既由十乘入於十信理須具對橫豎二意已上豎對也次瓔珞下約橫對如經云修十信心須具十德籤云由善修故相似解起故十法在相似位轉名十信心乃至願心亦復如是何者不思議境以信為本慈悲誓願藉念力持心安止觀功由精進破於三惑妙慧方遍於通無塞由決定力圓修道品為求不退正助無闕回因向果不濫位次方能護法內外不動由善防非於法無愛由大願力故得至此名為信心乃至願心十法既許初心具修當知信信皆具十法如是則十信有百法明矣是名下結明有三一鐵輪十信二六根清淨三圓教四加行也普賢下指證小注出十種境界也即經云一切衆生誦大乘經者修大乘行者發大乘意者樂見普賢色身者樂見多寶佛塔者樂見釋迦牟尼佛及分身諸佛者樂得六根清淨者當學是觀此後別名四聖及六根清淨十種境也備記又引華嚴鈔云信有十德一親近善友二供養諸佛三修習善根四志求勝法五心常柔和六遭苦能忍七慈悲深厚八深心平等九愛樂大乘十求佛智慧又云此十法者即十乘觀法也釋判位略標竟二列位詳釋即相似十信位也分二初明前七信二初正明二初先明初信初信斷見惑顯真理與藏教初果通教八人見地別教初住齊證位不退也記此略明初信斷惑證真也然圓人一圓一切圓所謂圓解圓修圓伏圓斷圓證也既言圓斷圓證則三惑齊斷三諦頓證何謂此位人斷見惑而顯真理耶答誠如所問至下引證科中自當冰釋今茲任運先落粗垢校之三藏正初果斷見惑顯真理人也與藏教下會同前三教位等如頌云果位須陀預聖流與通三四地齊儔并連別住圓初信八十八使正方休是也若約三不退者此是分證位不退也二後明六信次從二信至七信斷思惑盡與藏通二佛別教七住齊三界苦集斷盡無餘記此略明六信斷證也其脫落粗垢校之三藏正二果至四果斷思惟盡若會同位次如頌云圓別信住二之七藏通極果皆同級同除四住證偏真內外塵沙分斷伏約位雖同約行優劣天殊塵沙之名藏通不聞知尚不知焉能伏而且斷今言內外分斷伏者以圓人至此而能斷界內之塵沙并能伏界外之塵沙此是滿證位不退也三界苦集斷盡無餘者苦果也即分段生死是集因也即見思煩惱是既能斷界內塵沙豈有三界見思餘而未盡故云斷盡無餘也集因既謝則苦果自亡矣二引證二初引仁王經二初正引故仁王云十善菩薩發大心長別三界苦輪海注仁王云者波斯匿王所說偈也十善者仁王疏中十九云十信善者有三品上品善鐵輪王化一天下中品善粟散王下品善人中王文記仁王經疏云波斯匿王已於過去十千劫龍光王佛法中為四地菩薩今現王身說偈乃舊所經履故引證之補上品對八九十信中品對二之七信下品對初信以喻三種王也二解釋二初正釋十善解曰十善者各具十善也若別十信即伏而不斷故定屬圓信注妙樂十八云信信通皆具足十善非謂專以人天不殺盜等用對十信既云長別三界苦輪當知須是斷惑十信文記此節儀文辨答十信定屬於圓而非別也注中重引妙樂釋成圓義言斷惑者即圓教十信也然而別教十信乃初心之位伏而未斷若未斷惑何能長別苦輪須知定是圓信明矣仁王疏云十信菩薩由發大心求出三界雖未能出已遠離惡道等苦故言長別若別教十信猶是外凡未能暫離豈能長別圓教十信斷三界惑至十住初即斷界外無明等惑以其但斷四住與羅漢齊長別苦海與二乘人同生方便有餘土若羅漢支佛於彼土遇餘佛為說法華即成菩薩進斷無明若十信菩薩縱未聞法華亦能漸次進斷無明故屬圓教也注釋籤五二十七云亦有人云六根清淨名為頓義十善菩薩此是漸義今文所引十善菩薩以證六根豈應引漸而證於頓故知二文俱頓明矣但仁王經語其初後法華經意論其中間人不見之徒生異見文記此節會通仁王法華語異義同初一行是舉疑今文下是答釋意謂十信人乃六根清淨位也大師引仁王十善而印定者以其義同故也若彼漸而今頓豈可引漸而證頓耶但仁王下點明二義無殊言仁王語其初後者初句十善菩薩發大心語十信之初心次句長別三界苦輪海語十信之後心法華論中間者經意圓融初後俱可中間亦可二非本所期三初述意然圓人本期不斷見思塵沙意在入住斷無明見佛性注此明圓斷之義輔行六上九云從初已來三諦圓修與次第義永不相關此論粗惑任運斷處與次第齊文又七下二十四云五品已能圓伏五住豈至此位別斷見思但是圓修粗惑先斷猶如冶鐵粗垢先除文記此明圓人惑障雖有任運先斷非彼本心也何者志在入住圓破無明頓見佛性也注中初句是標辭次引輔行釋圓斷義意謂雖非本心則任運而有先斷也末二句設喻發明先斷之意二立譬然譬如冶鐵粗垢先去非本所期意在成器器未成時自然先落雖見先去其人無一念欣心所以者何未遂本期故注別行玄記下六云圓譬冶鐵作器別喻燒金作器冶謂鎔鑄淳撲頓融任運粗垢先落燒謂鍛鍊物體猶堅特要粗塵先去然後融金以除細垢圓觀頓窮法界無意先觀二諦二惑任運先落別觀次第顯中有意先觀二諦故使二惑先除文記此明圓修圓斷任運而有先後也初一行喻明無心斷惑自然而有先後之所以也明顯可知注中引記釋成初三行先立二譬以顯圓別修斷各異次二行用二觀合法也然此雖引圓位始終由智微著分惑先後正顯圓位七信智力於四住惑著而親於無明惑微而疏故無明厚迷未除四住薄惑先落也三合法圓教行人亦復如是雖非本所望自然先落注指要鈔下五云圓人始終用絶待智頓亡諸法理果尚亡惑何次第只由此智功力微著故成親疏由親疏故惑落前後名迷厚薄智疏惑厚智親惑薄傳傳明之此乃約智分惑也文記此節以法合譬轉明斷惑先後斯由功力勤惰功力勤惰致使觀智親疏而成迷惑厚薄也補絶待智者無一法當情尚不見理果可證況有次第斷惑耶又詳解引補注問觀力微則俱微著則俱著所破之惑何故不隨三觀之力同時分破耶答此問甚有眉目從來學者以情難法今謂圓人圓法一切圓融所破之惑乃偏情耳偏情粗細故有先後強分三惑也備十不二門云只由亡智親疏致使迷成厚薄此是修觀要語注先達云修觀惑智一如功成惑落先後記此二語引古為證也先達者過來人也修觀惑智一如者即境即智也功成惑落先後者明起暗亡也二引永嘉集二初正引永嘉大師云同除四住此處為齊若伏無明三藏則劣即此位也注永嘉集云然三藏之佛望六根清淨位有齊有劣同除四住此處為齊若伏無明三藏則劣二乘可知此本是妙玄位妙中文永嘉集中引用之耳昔傳唐末五代時台教湮沒因錢氏讀永嘉集至此不解問於韶國師國師指為台教中語當問螺溪羲寂法師師奏海東盛行遂求於高麗由是觀師賫教部來使始復興焉今稱永嘉蓋有由矣記此引古語證成圓位之優也永嘉乃東甌首邑之名也大師者即玄覺禪師國朝封號洞明妙智禪師本永嘉人也悟道弘法始終皆居本處今稱永嘉者蓋尊其處隱其諱也同除四住此處為齊者位同三藏也若伏無明三藏則劣者行勝三藏也二乘可知者佛位尚劣況二乘乎位妙中者言玄文中有十種妙所謂境妙智妙行妙位妙三法妙感應妙神通妙說法妙眷屬妙利益妙也今此語者乃位妙中文永嘉引用耳錢氏即吳越錢忠懿王也讀集因緣見儀文緣起并傳二解釋二初除見思惑却同解曰四住者只是見思謂見為一名見一切處住地思惑分三一欲愛住地欲界九品思二色愛住地色界四地各九品思三無色愛住地無色界四地各九品思此之四住三藏佛與六根清淨人同斷故言同除四住也記此釋斷界內惑約位正齊也四住者見思二惑也見惑通於三界合不可分故但為一以其斷則同斷也思惑亦遍三界以其不可同斷故須分三由此四惑纏縛不能躍出欲去難許自由故云住也地者指三界之處分之則成九地也三藏果人斷此四住可以趣此六根淨人任運亦斷故云同除也二伏無明惑便劣言若伏無明三藏則劣者無明即界外障中道之別惑三藏教止論界內通惑無明名字尚不能知況復伏斷故言三藏則劣也注釋籤六四云有齊有劣者惑盡處齊觀行聞教是則為劣亦以佛位格者為順教道故也記此明界外無明三藏尚不知名云何伏斷以是為劣固情願矣注引釋籤指明齊劣所以三藏僅用空觀但斷界內通惑圓人一心三觀故能圓伏無明也釋前七信竟二明後三信次從八信至十信斷界內外塵沙惑盡假觀現前見俗諦理開法眼成道種智行四百由旬與別教八九十住及行向位齊行不退也注雖約位斷證格量似齊圓別即離不可一混記此明信中後三位之功行也前七僅斷界內之惑而界外塵沙但伏而已以其假觀未得現前故也今此三位中人由假觀現前所以能斷塵沙惑盡能開法眼見俗諦之理成道種智也行四百由旬到實報莊嚴土也與別教下約位會齊頌云八之十信二惑空假成俗備理方通齊前別住後三位并連行向位相同也注中四句誡示圓別即離之旨不可不知妙樂云起信疏釋真如門立二義一真如不變義二隨緣起滅義指要鈔云隨緣對不變說不變即中道理本有不變之義隨緣乃全理成事轉變造作之義良由真如不守自性故受熏變隨於染淨二緣故名隨緣體相者別教不變以真如一性如來藏理為當體體無明差別為所依體圓教不變以理具三千為當體體隨緣以事造三千為當體體並以一念妄心為所依體不變即性具三千相相宛然為相隨緣則以真如與無明互相熏習成染淨二用為相不同他宗一理隨緣但是合義不談理具單說真如隨緣仍是離義今家明三千之理隨緣起三千之用不隨緣時三千宛然故差別法與體不二是則自他宗中具明真如不變隨緣二義若不以具不具簡明則圓別即離之旨混矣是故誡之不可一混也又儀注謂文雖約六根清淨位斷二惑證二理格量圓教名即謂即生死是涅槃即煩惱是菩提即空假是中道無斷而斷無證而證別教名離謂離煩惱顯菩提離生死得涅槃離二邊是中道有惑可斷有理可證故不可混同而不知也行不退者塵沙障乎化導今塵沙既斷則化導行成自當不退菩薩之行故云行不退也注又此六根明下根出假功逾十向此是相似圓融三諦不同次第出假之位又五品明中根出假五品之初為上根亦約觀行論坐道場度衆生等又輔行五上云以初住為真出假位記此節明圓人利鈍有異是故出假度生則成三根遲速之殊也初一行明信位出假乃圓教下根人也雖稱下根功超別教十向之上以是一心三觀相似見圓融三諦之理不同別人次第出假之位也又下明中根者五品即出假也上根者初品就出假也若言即佛之談即在觀行位中就可論坐道場度衆生也古云觀行謂如佛即此意也已上是論似位出假輔行下論真位出假可知釋凡夫一科竟二明聖二初因位三初明十住二初首位單明初正明二初明內證次入初住斷一品無明證一分三德謂解脫般若法身此之三德不縱不橫如世伊三點若天主三目注此明斷惑證理全體起用三德次第本法身般若解脫今順初住緣了正三心開發而為次也記此明破無明顯法性到寶所開祕藏初發心住能發一切之功德也華嚴經云初住功德三世諸佛嘆不能盡若具足說人聞心狂而今文明初住證一分三德乃舉要攝諸也大經疏云果地衆德但言三者蓋舉略該諸耳法身者此身非色非無色非色故不可形相見非無色故不可心想知雖非色而充滿十方巨細相容不廣不狹雖非非色亦可尋求能發衆生深廣智慧故曰如來色無盡等法身德也般若者非知非字非知故不可動慮分別非字故不可言說書紳亦非不知不字非不知故不同灰滅非不字故不同偏空雖非知無所不知三諦遍朗極佛境界凡聖並明雖非字半滿具足世間出世間出世間上上諸字悉了法界流注若懸河海湧不可窮盡淨名云能以一音演說法衆生隨類各得解皆謂世尊同其語斯即如來不定法般若德也解脫者非喧寂非縛脫非縛故五住不能繫非脫故十智不能虗非說而說二邊之所不拘如百句解脫中說非縛而縛為訥鈍邪癡闡提外道所縛故有病行嬰兒行住首楞嚴示現善惡隨所調伏衆生之處雖鄙必施如醫療病如華在水無染無著解脫德也佛身業不可思議法身則攝佛口業不可思議般若則攝佛意業不可思議解脫則攝故知三德攝一切德色含總別囊括事理以略收廣不逾三德也則知圓教初住分證果佛一證一切證而曰證一分三德者舉三德以攝功德也然三德序次當以法身居初般若次解脫後今以解脫初法身後者為順初住緣了正三因心開發為次也如云緣因善心發者則衆生無量劫來低頭合掌彈指散華發菩提心慈悲誓願布施持戒忍辱精進禪定等一切善根一時開發一心具足萬行也了因慧心發者衆生無量劫來聞大乘經乃至一句一偈受持讀誦解說書寫觀行修習所有智慧一時開發成真無漏也正因理心發者衆生無始已來佛性真心常為無明之所隱覆今以緣了二因有力能破無明癡暗而令正因朗然圓顯也此三種圓發故名發心緣因發即解脫了因發即般若正因發即法身三心既發同世伊字假名行人以不住法住此三心即住三德涅槃不可思議祕密之藏名初發心住也補三心發則俱發本無初後亦論次第者以此三法二為能顯一為所顯就能顯中緣因資成了因觀照不妨無次第中論次第也觀經疏云不前不後亦不一時是也注言不縱不橫者異乎別教非縱即橫也釋籤六二十云雖一點在上不同點水之縱三德亦爾雖法身本有不同別教為惑所履雖二點在下不同列火之橫三德亦爾以二德修成不同別人理體具足而不相收如妙宗云三雖性具緣了是修二雖是修非適今有二若非修三法則橫二若非性三法則縱記此明三德名同圓別證異也意謂圓人三觀圓修三因圓發是以三德圓證也別人不然修則三觀次第顯則三因證則三德俱次也言法身為惑所覆者不知本覺性具惡德故染惡非緣了二德也但有法身本覺隨於染緣作一切迷中之法名之為惑所覆既覆但中佛性之理如淳善人惡非所能為惡人逼令作衆惡故說為惡所覆此顯定有能覆之惡所覆真如其理不變始終常淨故說唯不從覆故得有種名補儀注云應須還用隨緣覺性別緣真諦及以俗中次第別修空假緣了翻破一切迷法顯於法身本覺之性故覆理成於縱義圓人不爾以知本覺具染惡性體染惡修即二佛性豈有佛性更覆佛性如君子不器善惡俱能或同惡人作惡則彰己能何覆之有故即二迷以為緣了顯發於正緣了二德體迷而得義當所發元是修德復當能顯雖分修性皆本具故義不成縱記是以圓教不縱異別教縱也雖二點在下下明圓不橫以異別橫然別教理體具足不相收者亦為不知本覺性具染惡德不能全性起染惡修乃成理體橫具三法所言不相收者三法定俱在性皆是所發猶如三人各稱帝王何能相攝故不知性中三法二是修者二乃成橫故其理體具足而不相收也補儀注云圓人不爾知本覺具染惡性故使迷中一切染惡當處即是緣了佛性以二修顯一性如一主二臣主攝臣臣歸主三德相收亦復如是記故圓教不橫異別教橫也如妙宗下轉釋初二句轉明三法不橫即二德修成不同別人理體具足而不相收也次二句轉明三法不縱即法身本有不同別教為惑所覆也次二句明不論二修則成橫以別教雖有性德之語三皆在性而不互融此因中橫也復由別教性具三法而不相收故使果上三身橫顯皆由不論二修之過也末二句明不論二性則成縱以別教因中則法身本有為惑所覆須別作緣了之功相資顯發果上則法身本有般若修成解脫始滿皆由不論二性之咎也是故論二是性是修乃成三德不縱不橫也言如伊字三點天主三目喻顯不縱不橫也注三點三目出大經哀歎品西方有新舊二伊舊伊如走火點水之縱新伊如此方草書下字細畫相貫不縱不橫摩醯首羅有三目八臂記此文辨示立喻之原初二句指出處下二行辨釋正義如大經云何名祕密藏猶如字三點並則不成縱亦不成如摩醯首羅面上三目乃得成三點若別亦復不成我亦如是解脫之法亦非涅槃如來之身亦非涅槃我今安住如是三法為衆生故名入涅槃疏文為三一譬三點二譬三目三合三德言從事入理者三點是文字此約言教三目是天眼此約修行三德是佛師此即約理又是佛印印於教行凡有言說與此相應即祕密教修習相應是祕密行證得相應是祕密理故一法二喻稱理教行也次釋三點者舊伊譬昔教三德法身本有般若修成入無餘已方是解脫無復身智豎如點水縱而相離又約身約智分得有餘解脫橫一時有三法各異橫如列火各不相關新譬今教三德法身即照亦即自在名一為三三無別體故不橫非前非後故不縱一即三如三點三即一如細畫不可一三說不可一三思名不可思議非三非一祕密藏也備辨訛曰管標西方伊字新舊猶此方草𨽻轉變不同準止觀明三點若橫如走火縱如點水後人輒以橫寫作川豎寫作三遂曰橫川縱三非也今文應去橫川二字直云走火之橫點水之縱為是當知西方伊字但約有細畫為新無細畫𠁼為舊而分之列火點水乃章安借況語非以釋縱橫也此中亦然二明外化現身百界八相成道廣濟羣生注八相者華嚴云或見入胎等皆云或者一一相中皆有八相故文記華嚴云菩薩於兜率下生時諸人天或見菩薩住兜率天或見入胎或見初生或見出家或見成道或見降魔或見轉法輪或見入涅槃是也一一相中皆有八相者菩薩處胎中有十種微細所謂在母胎中示現初發菩提心乃至灌頂地在胎中示現住兜率示現初生示現童子地示現處皇宮示現出家示現苦行詣道場成等正覺示現轉法輪示現般涅槃等是也然初住於百界現身成道利生者仁王云若菩薩住百佛國土中作閻浮提王王四天下修百法明門二諦平等心化一切衆生妙玄云初住豎破一分無明獲一分二十五王三昧顯一分我性論真實處不可思議橫則百佛世界分身散影作十法界像導利衆生也正明竟二引證二初引經華嚴經云初發心時便成正覺所有慧身不由他悟清淨妙法身湛然應一切注此下引經釋出就斥他謬記經云若諸菩薩能與如是觀行相應於諸法中不生二解一切佛法疾得現前初發心時即得菩提知一切法即心自性成就慧身不由他悟又云究竟離虗妄無染如虗空清淨妙法身湛然應一切是也問初發心時便成正覺云何復說後心菩提答非初非後不離初後大論云若但初心得不以後心者菩薩始發心即應是佛若無初心云何有第二第三心以初心為根本因緣亦不但後心亦不離後心者是後心亦不離初心初心集種種無量功德後心則具足故能斷煩惱習得無上道也是則圓住已上傳傳論初後方得成菩提也二解釋二初明始成正覺二初示法判位二初正明解曰初發心者初住名也便成正覺者成八相佛也是分證果即此教真因記此文斷定初發心者圓初住也此位中人始破無明即顯三德倘住前行道時結緣之衆機宜淳熟菩薩便可示現佛身成正覺相百佛世界廣說諸法度脫衆生故云便成正覺此即成八相之佛也是分證果即此教真因者所謂他家之極果是我國之真因也二斥謬三初以因為果謂成妙覺謬其甚矣若如是者二住已去諸位徒施記此斥以因為果之謬也如妙玄云有師謂頓悟初心即究竟圓極籤云然華嚴中位兼圓別人不通曉兩教位意又復不達圓位始終直指初心以為妙覺惟尚頓門成佛速疾乃成圓教後位徒施豈非權實初後之濫乎二引救重詰若言重說者佛有煩重之咎記此斥恐成轉計之謬也意謂若云二住已去尚有四十一人之後位而非徒施者乃佛運大慈悲心為鈍根人而重說也若如是猶不免佛有繁重之過也以是而知依舊判者誠未可也三引文勸審雖有位位各攝諸位之言又云發心究竟二不別須知攝之所由細識不二之旨注雖云各攝諸位須知攝之所由者由理具故雖云發心究竟不別細識不二之旨者旨在於即即具之理雖爾淺梁之事位那不分即故初後不二六故初後不濫位位各攝諸位者如大品初阿後荼中四十字初阿字門具四十二字後茶字門亦然又如華嚴一地具諸地功德記此明尚恐不達謬之所由及引經句為證也先明位位各攝者如大品云阿字門一切諸法不生故羅字門一切法離垢故波字門一切法第一義故乃至荼字門入諸法邊竟處故過荼無字可說大論云四十二字中一字盡入諸字者如阿字為定阿變為羅亦變為波如是盡入四十二字四十二字入一字者四十二字盡入阿分阿分還入阿中是為具四十二字也末句指華嚴說初地菩薩成就淨諸地法文云菩薩如是成就十種成地法所謂信悲慈捨無有疲厭知諸經論善解世法慚愧堅固力供養諸佛依教修行又云此菩薩布施偏多餘非不修但隨力隨分又云菩薩於此淨修十地所作無障礙具足不斷絶故清涼疏云一地之中具攝一切諸地功德也注大經云發心究竟二不別如是二心前心難發心即初住究竟即妙覺記次正明引經為證也其作證者乃上句是猶未識透下句之所以也言二不別者神寶記云初發心住與究竟即雖分極異而證道同故云二不別也言前心難者雖初後理一而初發匪易故前心難也備一地普攝諸地發心究竟不別所以引此二文者是為釋成圓住非煩重徒施也弗忘章旨二指人證同龍女便成正覺諸聲聞人受當來成佛記莂皆是此位成佛之相注龍女成佛文從權說以證圓經成佛速疾若實行不疾權行徒施權實義等理不徒然如妙樂八三十五云記此以人指證為初住成佛之相也如妙樂者文云正示圓中云龍女作佛者問為不捨分段即成佛耶若不即成佛則此龍女成佛及胎經偈云何通耶胎經云魔梵釋女皆不捨身不受身悉於現身得成佛故偈云法性如大海不說有是非凡夫聖賢人平等無高下唯在心垢淨取證如反掌答龍女成佛從權而說以證圓經成佛速疾若實行不疾權行徒引是則權實義等理不徒然故胎經亦從實得說若實得者從六根清淨得無生忍應物所好容起神變現身成佛及證圓經既證無生豈不知本無所受何妨捨此往彼餘教凡位至此位中進斷無明亦復如是凡如此例必須權實不二以釋疑妨南方緣熟宜八相成道此土緣淺只龍女教化此是權巧方得一身一切身普現色身三昧也補胎經云界名火𦦨佛名無欲一切人民悉受女身了苦空無常無我七十萬二千億女行三解脫一日一時即成佛道名不捨女身受身成佛也問實行權行如何分析答實行是佛世當機之人當證圓理便知龍女同成實行次往南方即從體起用便是權行注諸聲聞授劫國名號與物結緣文記妙樂云二乘且與八相記者令與物結淨土緣備儀文引龍女成佛聲聞授記以證圓初住是本意注中龍女從權說者恐人疑龍女成佛何以知是初住既是初住何以說為成佛故以從權釋之二乘八相與佛結緣亦可例知二明三因克果慧身即般若德了因性開發妙法身即法身德正因性開發應一切即解脫德即緣因性開發如此三身發得本有故言不由他悟注發得本有者妙宗上二十二云今初住所發三法皆性具故發則俱發從智證法從法起應即非一時三身頓得故非前後不縱不橫復見於此從始圓修一心三觀今圓三智一心中得即以此智證得法身智性即色三一體融名妙色身此身湛寂如鑑無情形對像生山毫靡間名應一切三身三德體離縱橫文記此明以因克果毫髮無差也初句標徵妙宗下引文正釋謂今破無明顯法性位登初住所發功德皆自性之本有非從外來也故云皆性具故發則俱發從智證法二句明三身非一時三身頓得句明三身非前後即不縱不橫義補前約二修一性論三心開發故不橫二亦本有故不縱今約從智證法等論不橫得非前後故不縱又一番解釋故云復見於此從始圓修下指前五品觀行今圓三智一心中得即今初住所發本有三法名三智者一道種智外破諸暗二一切智能返自照三一切種智非內非外非自非他今初住一心中得此三智也即以此智下轉釋從智證法然此證得法身即名一身智性即色即名三身以智即報身性即法身色即應身三一體融名清淨妙色身也補起信論問諸佛法身離於色相者云何能現色相答即此法身是色體故能現於色謂從本以來色心不二以色性即智故色體無形說名智身以智性即色故說名法身遍一切處三結成中觀現前開佛眼成一切種智行五百由旬到寶所初居實報無障閡土念不退位注中觀現前者既三因開發應三智圓明五眼洞照今但云佛眼種智者中必雙照三智具足四眼入佛眼同名為佛眼輔行三上二十五云如河入海失本河名何以故肉天二眼有漏因緣慧法二眼習氣未盡故捨本位入佛眼中文記中必雙照三智具足者謂中必雙照空假二邊則言一切種智而道種智一切智法爾具足觀音玄義云一切種智能於一種智知一切道知一切種一相寂滅相種種行類能知能解名一切種智記云中觀智者了一切法皆是中道中則不偏絶待為義一法若中一切衆生因地所種一切佛法無不咸趣一外有法不名中也一法既爾一切法皆然故云於一切種智知一切道知一切種也言一相寂滅相等者結前文所說而成遮照雙遮則一相寂滅雙照則種種皆知遮照同時故名一切種智正此義也四眼入佛眼等者經云五眼具足成菩提永於三界作父母獨稱佛眼者如衆流入海失本名字非無四用大論云肉眼天眼慧眼法眼於成佛時失其本名但名佛眼何以故肉眼諸煩惱有漏業生故虗誑不實唯佛眼無誑法天眼從禪定因緣和合生故虗誑不能如實見事慧眼法眼煩惱習未盡故不畢竟清淨故捨本位入佛眼中無有錯謬盡其邊際故也補妙句記云若華嚴明初住得如來一身無量身具三不退者記釋云今從初住已具三德故曰具也般若是位離二死故解脫是行諸行具故法身名念證實境故釋初住竟二九位齊明次從二住至十住各斷一品無明增一分中道與別教十地齊注次從二住等者妙玄五五云即是十番進發無漏同見中道佛性第一義理以不住法從淺至深住佛三德及一切佛法故名十住位文記如上初住三觀現前無功用心念念斷法界無量品無明不可稱計一往大分略為十品智斷即是十住仁王經云入理般若名為住即十番進發無漏真明同入中道佛性第一義諦之理以不住法從淺至深住佛三德祕藏之理即是十品住一切佛法名十住也所言住一切佛法者妙玄云又住清淨圓滿菩提心無緣慈悲無作誓願普覆法界又住一念中成就一切萬行諸波羅密又住一切種智圓斷法界見思無明又住得佛眼圓見十法界三諦之法又住圓入一切法門所謂二十五三昧冥益衆生又住能從一地具足諸地功德心心寂滅流入薩婆若海也明十住竟二行向地二初明初二兩行與前別教校同異三初明二行與別同次入初行斷一品無明與別教等覺齊次入二行與別教妙覺齊注次初行等者妙玄五五云即是從十住後實相真明不可思議更十番智斷破十品無明一行一切行念念進趣流入平等法界海諸波羅密任運生長自行化他功德與虗空等故名十行位也文記頌曰等妙二覺初二行是也二明後位與別異從三行已去別教之人尚不知名字云何伏斷以別教但破十二品無明故記頌云進前三行不知名是也三釋同所以二初明以因為果故以我家之真因為汝家之極果注我家真因等者妙玄五十二云若十地十品破無明圓家十住亦十品破無明設開十地為三十品秪是圓家十住三十品齊若與而為論圓家不開十住今取三十心為三十品與別家十地三十品等者則十地與圓家十回向齊若奪而為論別家佛地與圓家初行齊補若開等覺與二行齊今不開等覺但初行齊注與而為論別家佛地與圓家初地齊記頌云別地全齊圓住平無明分斷證真因是也設開下與奪並論二明因果所以三初正明所以只緣教彌權位彌高教彌實位彌下注故知別教權說判佛則高望實為言其佛猶下記此正明權實之所以也以權教粗而且雜位雖高而不高實教妙而且純位雖下奚尚下故曰權說則高實言猶下也二喻顯所以譬如邊方未靜借職則高定爵論勳其位實下注譬如邊方未靜授官則高定爵論勳置官則下別教權說雖高而粗圓教實說雖低而妙以我之因為汝之果文爵者封也爵有五等謂公侯伯子男勳者功也記此節喻顯權高實下之所以也以上皆妙玄之文爵者下玉師釋義一一如文可見三結果同因故權教雖稱妙覺但是實教中第二行也記言別教之權位所以高而不高者何也以其圓教中二行之因人在別教中可居妙覺之極果是故云他家極果原我家之真因也二顯三行已後二十八位一齊明次從三行已去至十地各斷一品無明增一分中道即斷四十品惑也注十向位者妙玄五六云即是十行之後無功用道不可思議真明念念開發一切法界願行事理自然和融回入平等法界海更證十番智斷破十品無明故名回向也補無功用道者從初住來即是無功用道今於向中明者一借用瓔珞原是別義故於向後明之二初住雖用至此轉著故在此明願行事理和融者菩薩無功用道願力薰起妙行所起之行全法界起仍復回向法界回向即願是願行和融也又願行之事悉回向法界法界是理是事理和融也注十地位者即是無漏真明入無功用道猶如大地能生一切佛法荷負法界衆生普入三世佛地又證十番智斷破十品無明故名十地位也文記此明十地之妙義也承上登住已來即入無功用道心心寂滅念念增明也猶如大地句喻明地上菩薩大行如斯如地能生長萬物菩薩能宣揚佛法地能荷負一切菩薩能荷擔法界衆生使令普入三世諸佛地也明行向地竟三明等覺更破一品無明入等覺位此是一生補處注等覺者妙玄五六云觀達無始無明源底邊際智滿畢竟清淨斷最後窮源微細無明登中道山頂與無明父母別是名有所斷者名有上士也文記此明等覺智斷也釋籤云居妙覺邊名邊際智滿亦可以佛不思議用名邊際智滿注等覺位中正習俱斷如今文云更破一品無明并上妙玄文斷正也淨名疏二四云無復餘習者圓教始從初住終至法雲圓斷諸見猶有習在等覺入重玄門千萬億劫重修凡夫事見理分明習氣微薄事等微煙文此斷習也補重玄者前來已用不思議妙智斷無明惑起應利生名玄至等覺斷餘殘習重修前所歷法門倒行凡夫事玄之又玄名為重也注又淨名疏五三十五云住等覺地餘有一品及習氣在文記此一品無明即最初一念不覺必須斷此方成妙覺起信論云如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心性即常住名究竟覺又此一品及習氣如唯識論二愚及彼粗重論云此地於法雖得自在而有餘障未名最極謂有俱生微所智障及有任運煩惱障種直俟金剛喻定現在前時彼皆頓斷入如來地由斯佛地說斷二愚及彼粗重一於一切所知境極微細著愚即此中微所知障二極微細礙愚即此中任運煩惱障種文然二論似非圓教意況不立等覺但以十地滿心明斷生相細障習氣成究竟覺今但記之以例知圓教等覺餘有一品及習氣在必須斷竟方成妙覺也明等覺竟二果位二初智斷並顯進破一品微細無明入妙覺位永別無明父母究竟登涅槃山頂諸法不生般若不生不生不生名大涅槃注觀經疏云究竟佛者道窮妙覺位鄰於荼故唯佛與佛乃能究盡諸法實相邊際智滿種覺頓圓無上士者名無所斷無上士者更無過者文記妙宗鈔云等覺已名滿足方便地菩薩究竟地始覺道窮本覺理極本始既泯無以名焉強稱妙覺注妙宗上二十三云今此極位乃究竟具諸位功德故引法華唯我釋迦與一切佛乃能究盡諸法之權實相之實達無明底到諸法邊名邊際智不思議權智也今已究竟故名為滿於種種法證本圓覺不思議實智也此覺極滿名為頓圓復用第七無上士號顯智斷極有惑可斷名有上士等覺位也無惑可斷名無上士即是妙覺斷德究竟名大涅槃云云無明父母者楞伽經云弒無明父斷貪愛母文記楞伽疏釋經云何衆生母謂貪愛喜俱如子女緣母得以成立無明為父癡愛喻母生於六入十二處聚落斷無明與愛二根本名害父母大經云若以貪愛母無明以為父隨順而重者則墮無間獄意以弒斷此父母者究竟成佛也喻父母者貪心是內向喻母無明是外境喻父又無明是受身本喻父愛是枝末煩惱如母又父是疏緣如無明母是親緣如愛弒斷者詮斷煩惱彰理觀也注涅槃山頂喻更無過上也諸法是境般若是智境智寂滅名大涅槃記大經云安置諸子祕密之藏我亦於此祕藏而般涅槃此究竟涅槃名不生不生般若畢竟不生不生不滅不滅更無惑可滅也今以諸法般若譬境智名大涅槃者四念處云能觀之智照而常寂所觀之境寂而常照境寂智亦寂智照境亦照一相無相即是實相所謂無上大涅槃圓明常寂照也二依正雙明以虗空為座成清淨法身居常寂光土即圓教佛相也注以虗空為座者義彰法身體遍也記經云法身遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得故云以虗空為座注成清淨法身者指修即性增勝而說也若論教主亦名尊特亦名勝應記法華云清淨妙法身具相三十二是指修即性增勝說也次約圓實部主論以教言之法華三十二相上品尊特也以相言之華嚴藏塵相好即上品相好據圓機而見故名勝應注妙玄七十三云或言道場以虗空為座一成一切成毗盧遮那遍一切處舍那釋迦成亦遍一切處三佛具足無有缺減三佛相即無有一異法華八方一一方各四百萬億那由他國土安置釋迦悉是遮那普賢觀經云釋迦牟尼名毗盧遮那此即圓佛果成相也文記此證增勝論圓佛具足三身初華嚴圓佛成相虗空為座依報成也遮那舍那釋迦法報應三一成一切成正報成也次明三佛具足相即義具足故無缺減相即故無一異意顯法華已前三佛離明來至法華從劣辨勝即三而一也法華八方下示應佛即圓佛法華佛變娑婆悉令清淨容受十方分身諸佛然於一方猶故未盡故於八方各更變二百萬億那由他國清淨容受所分身諸佛復於八方各更變二百萬億那由他國清淨為諸佛當來坐故當知八方各四百萬億那由他淨土分身釋迦悉遮那也普賢觀經下引證經明空中聲教行者修行普賢懺悔觀法爾時行者問空中聲我今何處行懺悔法空中聲言釋迦牟尼佛名毗盧遮那遍一切處其佛住處名常寂光一切波羅密所攝成處當如是處觀十方佛知釋迦是遮那明矣故知應佛即法佛乃明圓佛果成之相注文句一八云隱前三相唯示不可思議如虗空相即圓佛自覺覺他文妙樂一二十四云若隱前三相從勝而說非謂太虗名為圓佛文記此重示圓佛果成相尚未的示作何相也文句云身長丈六老比丘相即三藏佛自覺覺他帶老比丘現尊特身通教佛自覺覺他單現尊特華臺受職別教佛自覺覺他隱前三相唯示不可思議如虗空相即圓佛自覺覺他妙樂釋隱前三相從勝而說非謂太虗而為圓佛蓋別佛既曰單論即是隱前二相故今圓佛單論即是隱前三相但以劣顯勝如虗空相非謂虗空而為圓佛以空是色法有生滅也補隱非隱蔽圓人觀前三相唯是法性所謂妙色妙心是也神寶記云不同前三故云隱前唯示不可思議如虗空相要亦不離常所現相以圓機一故得以稱心同虗空量等法界是謂究竟法身故今此身即是法身思之注光明記一八云此教所說世間相常故一切法無非中道雖與別人同見尊特彼兼別修此皆性具故龍女云微妙淨法身具相三十二欲彰全性是故從勝特名法身文記此引釋從勝而說圓佛法身也注常寂光土者觀經疏六云常即法身寂即解脫光即般若是三點不縱橫並別名祕密藏諸佛如來所遊居處真常究竟極為淨土文記妙宗鈔云尅體立名前三在事故從居人修斷因果立三土名此土屬理故從本體三德立名問分證寂光三障未盡何得一向就理立名答障未盡邊自屬實報今就因果分忘之處名上中下常寂光土謂初住已上名下等覺名中妙覺為上諸佛下約能居示相金光明云如來遊於無量甚深法性諸佛行處過諸菩薩所行清淨無量即寂甚深即光法性即常普賢觀經云釋迦牟尼名毗盧遮那此佛住處名常寂光常波羅密所攝成處樂波羅密離身相處我波羅密所安立處淨波羅密滅有相處是故此土從四德究竟處立以四彼岸顯於三德常我即法身樂即解脫淨即般若三論互具一一論三故法身等各具四德名祕密藏也釋大科正顯位次竟二巧明六即四初略敘所以然圓教位次若不以六即判之則多濫上聖故須六即判位注六即位者義蘊佛經名出智者如貧女寶藏力士額珠等在諸文所明或顯法門高深或明修觀位次今文備明圓位之後復明六即欲越上慢自屈之過輔行一下三十三云此六即義起自一家深符圓旨永無衆過暗禪者多增上慢文字者推功上人並由不曉六而復即文記輔行云一顯圓詮諸法事理不二一切凡聖生佛體同免生退屈故明即字雖全體是迷悟因果其相有殊免生上慢故明六字二革文字暗禪之弊文字法師封文滯義唯守名相推功上人自甘退屈為此等過故曰全體即是暗證禪人撥棄修行唯曰即心是佛不辨階位淺深多濫上聖起增上慢為救斯弊故明六位也又無機子敘云癡禪任性濫上聖以矜高狂慧隨情居下凡而自屈由是天台名六即佛破二種見揀其太過六分因果之事殊收彼不收即顯聖凡之理等大經貧女藏者一有藏二人指三耘掘四得近五藏開六取用以配六即額珠喻亦出大經意同注輔行一上十六云即者廣雅云合也若依此釋仍似二物相合名即其理猶疏今以義求體不二故故名為即文妙宗上十三云六種即名皆是事理體不二義文記此證體不二故名為即也妙宗云事有逆順名字等五是順修事唯理性一純逆修事此逆順事與本覺理體皆不二釋云知此不二事皆合理名順其不知者事皆違理名逆名字等五若淺若深皆知皆順若初理即唯迷唯逆而迷逆事與其覺理未始暫乖故名即佛是為不二名即也二詳列位次六初明理即謂一切衆生皆有佛性有佛無佛性相常住又云一色一香無非中道等言總是理即注金剛錍云言佛性者佛是果人言一切衆生皆有果人之性文記此釋理即人也佛言我以佛眼觀一切衆生貪瞋癡煩惱中有如來智如來眼如來身結跏趺坐儼然不動補佛性名出大經寄因性立果號欲其改迷向悟也注觀經疏二云斯理灼然世間常住有佛不能益無佛不能損得之不為高失之不為下故言衆生即是佛理即也文妙宗上十五云世間常住者即十法界三十世間一一皆住真如法位法位常故世間亦常文今云性相十如中舉初二也性以據內自分不改相以據外攬而可別記妙宗下文云世間常住者即十法界三十世間一一皆住真如法位法位常故世相亦常以一切法即真實性性不改故常若謂遷流不得言常斯謂情見良以生法即性故常住異滅法即性故常即性之常非常不常不可思議言偏意圓故可得云一生一滅無非中道唯生唯住唯異唯滅法華迹門顯所證云世間相常住於道場知已本門乃云如來如實知見三界之相非如非異故知三界即是常住豈乖非如非異本迹雖殊不思議一也此理祕妙佛能明見故曰灼然今我智者成祕妙觀雖是肉眼而名佛眼能見祕藏亦曰灼然妙樂云顯露彰灼稱為真祕真祕之理即世相常世相常故衆生即佛此理妙故有佛教化不益一毫空過無佛不損一毫五即得之不足為高理即失之未始暫下對此四事示理佛也注色香等者輔行一上二十云此色香等世人咸謂以為世情然亦共許色香中道無情佛性惑耳驚心文六塵中趣舉二種圓觀諸法無非中道故四念處第四明唯色唯聲唯香等義備節義云他家謂無情名法性有情名佛性荊溪云他家共許色香中道至今家無情佛性則又惑耳驚心因知他家於色香中道之旨未全徹也記無情佛性出金剛錍六塵下明舉二種以況其餘無非中道四念處下指證諸法皆中文云天親唯識論唯是一識復有分別識無分別識分別識者是識識無分別識者似塵識法界所有瓶衣車乘等八皆是無分別識成三無性無性名非安立諦龍樹云四念處即摩訶衍一切法趣身念處即是一性色復有分別色無分別色分別色者如言光明即智慧無分別色者即是法界四大所成是色心不二彼既得作兩識之名此亦得作兩色之說若色心相對離色無心離心無色故圓說者亦得唯色唯聲唯香唯味唯觸唯識若合論者一一法皆具足法界諸法等故般若等也以是證知色心依正皆即性故趣舉一法遍攝一切諸法遍亦如是法法互遍皆無際畔乃以無界而為其界無不融通故曰無非中道也注如觀經疏二引涅槃經云一切衆生即是佛如貧女舍寶衆物具存力士額珠圓明頓在如來藏經舉十喻弊帛裹黃金土模內像暗室瓶盆井中七寶本自有之非適今也淨名云一切衆生皆如也寶篋云佛界衆生界一界無別界文記此引諸經明理即義妙宗鈔云初引大經衆生即是佛何以故若離衆生不得三菩提故如來性品云我者即是佛義一切衆生悉有佛性即是我義如是我義從本已來常為無量煩惱所覆是故衆生不能得見如貧女多真金藏無有知者時有異人即於其家掘出金藏又如力士眉間有金剛珠與餘士相撲以頭觸珠沒膚不知其處有瘡療治乃至醫執鏡照珠在鏡中顯現等如來藏經十喻者彼經一法九喻一是所喻九是能喻以所從能故云十喻一法者經云我以佛眼觀衆生貪瞋癡煩惱中有如來智如來眼如來身結跏趺坐儼然不動一切衆生雖在諸趣煩惱身中有如來藏常無染污德相具足如我無異即舉九事以喻其法九喻者一萎華佛身二嚴峯淳蜜三糠糩粳米四糞穢真金五貧家寶藏六菴羅內實七幣裏金像八貧女貴胎九焦模鑄像是也今文但引暗井具寶以證理即乃顯圓理非如止觀以顯別理故云本自有之非適今也次淨名皆如語尚涉通今須圓解次寶篋云己界及法界衆生界同等己界即心法法界即佛法佛以法界為體故對衆生界即成三法心生在因佛法在果三無差別故一界無別界注理即者妙宗上十三云良由衆生性具染惡不可變異其性圓明名之為佛性染性惡全體起作修染修惡皆無別體全修是性故得迷事無非理佛即以此理起惑造業輪回生死而全不知事全是理長劫用理長劫不知不由不知便非理佛以全是故名理即佛以不知故非後五即然理即佛貶之極也以其全乏解行證即但有理性自爾即也又理即佛非於事外指理為佛蓋言三障理全是佛又復應知不名障即佛而名理即佛者欲彰後五有修德此之一位唯理性是也又障即佛其名猶通以後五人皆了三障即是佛故文備節義云三障理全是佛者光明疏云凡明觀法初多就易易處觀成無難不曉大師得意之談故以惑業苦三皆是三因佛性三障輪回之法謂心實則三障確爾情虗則三德圓融於三德境不損毫微此三修惡乃名性三全為妙境即惑業苦一通徹法界邊底釋理即竟二明名字即次從善知識及從經卷聞見此言為名字即注止觀一二十一云理雖即是日用不知以未聞三諦全不識佛法如牛羊眼不解方隅或從知識或從經卷聞上所說一實菩提於名字通達解了知一切法皆是佛法是為名字即文記此釋名字即也如輔行云不知生死即理名日用不知如人日用不知光之恩故言不識方隅者牛羊之眼不解方隅者多故方譬實中之實隅喻實中之權或從名字下正釋義也注妙宗上十六云名字即佛者修德之始聞前理性能詮名也然有收簡收則耳歷法音不間明昧異全不聞俱在此位簡則未得圓聞齊別內凡尚屬理即以七方便未解妙名豈知即佛文備收者但聞三障理全是佛名字圓解開發便是名字即人簡者雖別教住行向三十位內凡加功用行以其未開圓解隔歷不融通屬理即故三明觀行即依教修行為觀行即五品位注止觀一二十三云若但聞名口說如蟲食木得偶成字是蟲不知是字非字必須心觀明了理慧相應所行如所言所言如所行是名觀行文記此釋觀行即也初一行喻前名字即義言如蟲食木者大經云如蟲食木有成字者蟲不知是字非字智人終不唱言是蟲解字亦不驚怪此經譬舊醫不別諸病悉與乳藥止觀則喻不解意趣聞名口說也必須下正釋意謂境觀明契言行相顧名觀行即也注妙宗上十七云始自圓聞觀佛妙境至識位次勤行五悔若未發品此等行人皆屬名字故知名字其位甚長境觀相資塵念靡間方能得入觀行位也文記此節引文剖義謂從初隨喜圓聞妙理起圓解修圓行從第一觀不思議境至第八識位次而又勤行五悔如是正助齊運設若未能發品應知觀行未圓皆名字位收也境觀相資下示觀行正義補觀經托佛修觀故曰觀佛妙境問發品相狀何似答名字初修失易得難名字中心得失相半後心打成一片唯得無失即發品相必到境資觀觀益明觀資境境逾顯而塵念靡間始是真正發品唯境觀相資故五品人知如來祕藏唯塵念靡間故五品人五住圓伏四明相似即相似解發為相似即十信注止觀一二十三云以其愈觀愈明愈止愈寂如勤射鄰的名相似觀慧文記此釋相似即也此人從前觀行功勤得力境觀相應惑障粗垢先脫中道妙理相似現前故云相似即佛言勤射者如楞嚴云譬如學射先大準次小準次射的次射錢乃至射毛百分之一名為學成於夜暗中聞聲若人非人不用心力射皆必中習三昧者亦復如是今借彼喻不用其法既射鄰的不同先學射準也注觀經疏二云相似者二物相類如鍮似金若瓜比瓠猶火先暖涉海初平文妙宗鈔上二十云約四喻明相似行人本覺寂照及雙相似而發成相似位三種之覺此覺似真若鍮若瓜比金比瓠此之二物喻始似本如將至火先覺暖氣行欲近海預觀平相此之二事喻於相似近乎分真前二約法論似後二約位論似文備寂照及雙者妙宗云更於一覺約寂照說照而常寂寂而常照非寂非照而寂而照不可思議乃是寂覺照覺雙遮雙照照覺相似發也鍮瓜約相狀邊論故喻約法火海約功能邊論故喻約位三種即寂照及雙亦即圓三觀也瓠音胡五明分證即分破分見為分證即從初住至等覺注止觀一二十一云因相似觀力入銅輪位初破無明見佛性開寶藏顯真如名發心住乃至等覺無明微薄智慧轉著若人應以佛身得度者即八相成道應以九法界身得度者以普門示現文記此釋分證即也注文引止觀初二行明自利功德若人下明利他功德皆如文可知注妙宗上二十云雖相得似尚屬緣修今則親證屬於真修分破無明起信論中稱隨分覺寂照雙融本覺真佛分分而顯從所顯說名為分真從能顯言名為分證四十一位皆受此名文記此節引文釋成初二句舉前似位雖相似見理以無明未破尚是妄心分別故名緣修今者無明既破真如妙性覿體相呈玄妙三觀任運現前故為真修起信稱隨分覺者以離分別粗念相故今以顯名別義同無異意也六名究竟即智斷圓滿為究竟即妙覺位注如前引觀經疏釋妙覺義記此釋究竟即也妙理究竟顯名智圓滿無明究竟破名斷圓滿故為究竟即佛也止觀云究竟即者智光圓滿不復可增名菩提果大涅槃斷更無可斷名為果果等覺不通唯佛能了名究竟圓佛三正釋名義約修行位次從淺至深故名為六約所顯理體位位不二故名為即注約修行位次等者止觀大意二云即故初後俱是六故初後不濫理同故即事異故六文備此約位與理以釋立名六即之所以也以事有差別是故從淺至深故立六名以理本無殊始終不二故立即名四結勸深知是故深識六字不生上慢委明即字不生自屈可歸可依思之擇之略明圓教位竟注六種即名既皆是事理體不二義是故六即皆具事理兩種三千故理同故即理造也事異故六事造也如義書云修善修惡事造三千六也理即迷逆是修惡名字已去順性是修善性善性惡理造三千即也但即不妨六六處常即故得六而復即也記此證事理兩種分對六即如四明云緣起三千為修善修惡本具三千為性善性惡對以六即與今注同問何但約圓說六即耶答前三教諸法非即通雖說即但是界內故即名唯圓然前三教亦可立六即名藏教真諦為理即詮真為名字即外凡為觀行即內凡為相似即見道為分真羅漢為究竟藏菩薩至道樹下猶居似位三十四心分真究竟通別兩教比說可知然皆淺近故不說即也略明圓教竟
