  - {type: variant, offset: 12533, length: 1, content: 俱。, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12534, length: 23, content: 【□註】亦住餘七山諸藥叉眾亦住餘七金山，是四王所部眾故, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12551, length: 1, content: 但, 卍續: 伹}
  - {type: variant, offset: 12557, length: 19, content: 【■記】此段釋頌，望論為略。以論文言，雙持、持軸山等, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12576, length: 19, content: 七金山上，亦有天居，是四天王所部封邑，是名依, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12588, length: 1, content: 已, 卍續: 巳}
  - {type: variant, offset: 12595, length: 19, content: 地住。四天王眾，於欲天中，此天最廣。【備】辨訛曰：註, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12606, length: 1, content: 已, 卍續: 巳}
  - {type: variant, offset: 12614, length: 19, content: 中單指藥叉，然應指四王。當知四王雖居須彌山, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12614, length: 1, content: 但, 卍續: 伹}
  - {type: variant, offset: 12633, length: 19, content: 腰，實住雙持山頂，餘山皆屬統攝。王既住此山，則, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12652, length: 9, content: 部屬隨王，不可單指矣。, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12661, length: 20, content: 【□註】又日月宮城，五風所持：一持、二養、三受、四轉、五調。, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12681, length: 20, content: 齊雙持山頂，旋環山腹，照四天下。雙持山高四萬二, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12699, length: 1, content: 已, 卍續: 巳}
  - {type: variant, offset: 12701, length: 20, content: 千由旬，須彌七金及鐵圍山，入水皆八萬四千由旬，, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12707, length: 1, content: 但, 卍續: 伹}
  - {type: variant, offset: 12721, length: 20, content: 須彌出水亦八萬四千由旬。餘之八山，半半論減，乃, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12741, length: 20, content: 至鐵圍山高三百二十八由旬二俱盧半。九山廣闊, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12761, length: 20, content: 皆等，高量俱盧舍，此言二里。日宮廣五十一由旬，月, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12781, length: 6, content: 宮廣五十由旬。, 卍續: □□□□□□□□□□□□□□□□□□□}
