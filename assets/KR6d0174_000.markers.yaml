  - {type: variant, offset: 12457, length: 19, content: 釋言：有藥叉神，名為堅首，住初層；有名持鬘，住二, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12476, length: 19, content: 級；有名恒憍，住三級。此三皆是四天王所統天眾。, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12495, length: 19, content: 第四層，四大天王及諸眷屬所居止故。經依此說, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12514, length: 19, content: 四天王眾於妙高山四外層級，四天王眾及眷屬, 卍續: □□□□□□□□□□□□□□□□□□□}
  - {type: variant, offset: 12518, length: 1, content: 但, 卍續: 伹}
