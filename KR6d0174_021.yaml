body:
  text: 高麗沙門諦觀錄南天竺沙門蒙潤集註清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦閑編科參梓二訶五欲二初總牒第二訶五欲註止觀四二十云五塵非欲而其中有味能生行人須欲之心故言五欲常能牽人入諸魔境雖具前緣攝心難立是故須訶乃至此五過患者色如熱金丸執之則燒聲如塗毒鼓聞之必死香如憋龍氣齅之則病味如沸蜜湯舌則爛如蜜塗刀䑛之則傷觸如臥師子近之則齧上代名僧詩云遠之易為士近之難為情香味頹高志聲色喪軀齡文五中皆有依正二報記十住毗婆沙云禁六情如縶狗鹿魚蛇猿鳥狗樂聚落鹿樂山澤魚樂池沼蛇樂穴居猿樂深林鳥樂依空六根樂六塵非淺智弱志所能降伏唯有智慧堅心正念乃能降伏總喻六根大師對之謂眼貪色色有質像如狗貪聚落耳貪聲聲無質礙如鹿貪深山鼻貪香如魚貪池沼舌引味如蛇貪空穴身著觸如猿貪深林心緣法如鳥貪依空今不言法但明五塵故云五塵非欲而其中別有一種可愛滋味能生行人須欲之心言五欲也大論云哀哉眾生常為五欲之所惱亂而猶求之不已此五欲者得之轉劇如火炙疥五欲無益如狗咬枯骨五欲增諍如鳥競肉五欲燒人如逆風執炬五欲害人如踐惡蛇五欲無實如夢所得五欲不久假借須臾世人愚惑貪著五欲至死不捨為之後世受無量苦如愚人貪果上樹食之不肯即下人伐樹傾墮而死可見五欲乃喪身之所而人何苦近而不遠乎憋音匹嗔也惡也二別釋五初訶色欲一訶色謂男女形貌端嚴修目高眉丹脣皓齒及世間寶物玄黃朱紫種種妙色等記註中缺別釋訶色之文今為釋之如智論云若人著色諸結使火盡皆熾然燒害人身如火燒金銀煑沸熱蜜雖有色味燒身爛口急應捨之又能棄者不得棄火而留金要當金火而俱棄如頻婆娑王以色故身入敵國獨在淫女阿梵婆羅房中優填王以色染故截五百仙人手足為害如是色固可訶也止觀云色欲者所謂赤白長短明眸善睞素頸翠眉皓齒丹脣乃至依報則玄黃朱紫諸珍寶物惑動人心如禪門所說色害尤深令人狂醉生死根本良由此也如難陀為欲持戒雖得羅漢習氣尚多況復眾生具縛者乎國王躭荒無度不顧宗廟社稷之重為欲樂故身入怨國此間上世亡國破家多從欲起赫赫宗周褒姒滅之即其事也觀經云色使所使為恩愛奴不得自在若知色過患則不為色所欺如是訶已色欲即息二訶聲欲二訶聲謂絲竹環珮之聲及男女歌詠聲等註絲竹者絲曰弦竹曰管具有八音金石絲竹匏土革木環珮者在指者為環珮謂珮帶並是飾女身者歌詠者止觀四二十一云即是嬌媚妖詞淫聲染語文輔行四下十二引提波延那仙人聞舍脂語失通五百仙人在雪山中住聞甄迦羅女歌聲失諸禪定云云記此釋聲之過患為害非細固當訶也情與非情俱有音聲令人起欲先明絲竹環珮皆無情之聲今言絲竹舉八音之二者所謂令左右相擊以起樂也環珮即琳琅玉珮等類並是女身分上之莊飾者令聞者有生欲之過次言歌詠乃有情之聲初一行引止觀正釋次二行引輔行以證其過仙聞語而失通者佛未出時帝釋常詣波提仙人所聽法舍脂夫人疑云帝釋捨我欲諸餘女即隱形上車到仙人所帝釋先乃語言仙人不欲見女汝可還宮舍脂不肯帝釋乃以荷莖打之舍脂以輭語謝帝釋仙人聞聲起欲螺髻落地失通五百聞歌失定者論云五百仙人在雪山住有女在山浴而且歌仙聞歌聲即失禪定心醉狂逸不能自轉故論云聲相無常暫聞即滅愚癡不解無常於聲妄生好樂遂生邪念染心致令現生失益後墮惡道故當訶也三訶香欲三訶香謂男女身香及世間飲食香等註輔行四下十三云人謂著香少過今則不然開結使門杜真正路百年持戒能一時壞文記此言香欲大患所以當訶也大論云有羅漢常入龍宮受龍請食食已令沙彌洗鉢鉢中有殘飯數粒沙彌嗅之大香食之甚美便作方便入師繩牀下手提牀足師入龍宮每與繩牀俱沙彌由是亦得入宮龍言此未得道何以將來師言不覺沙彌得食亦見龍女身體端正妙香無比心生染著密發願言願我作福奪此龍處居其宮殿龍言後莫將此沙彌來沙彌還已一心施戒專求作龍後時遶寺足下水出自知龍業已成必得作龍徑至池邊以袈娑覆頂入水而死變為大龍以福德大故即殺彼龍舉池盡赤未死之前諸師訶之沙彌言我心已定心相已出時師及諸僧就池觀之歎言由着香故致使爾也復有比丘在蓮華池邊經行聞蓮華香鼻受心著池神斥言汝何以捨於禪定而偷我香以著香故令諸結使久已臥者今皆覺起時有一人入池取華掘挽根莖狼藉而去池神見之嘿而不語比丘問言此人破池取華汝都無言我但池岸經行便見訶斥云我偷香何也神言世間惡人常在罪垢糞中不淨堆裏故我不與共語汝是禪行好人而著香者破汝好事故訶責也是名訶香四訶味欲四訶味謂種種飲食肴饍美味等註輔行四下十二云以著味故常受洋銅灌口以着味故墮不淨中文記此言味欲為害亦未小也智論云銅橛地獄獄卒問諸罪人汝何住處答言我心迷悶不知來處但患飢渴是時獄卒即驅罪人令坐熱鐵橛上以鐵鉗開口灌以洋銅吞以鐵丸入口口焦入咽咽爛入腹燒燃五臟俱壞直過墮地此人宿行因緣劫盜他財以自供口諸出家人或時詐病多求酥油石蜜故受洋銅灌口言墮不淨者若沙門婆羅門於福田食以不淨手觸或先噉或以不淨物着中或破淨命乞食以邪命自活因緣墮沸屎地獄中又一沙彌心常愛酪諸檀越餉僧酪時沙彌每得餘殘之分心中愛着樂喜不離命終之後生酪缾中其師得阿羅漢道僧分酪時語言徐徐莫傷愛酪沙彌諸人問故答言此蟲本我沙彌以愛酪故生此瓶中以是因緣味欲當訶也五訶觸欲五訶觸謂男女分身柔軟細滑寒時體溫熱時體涼及諸好觸等註輔行四下十三云觸欲者生死之本繫縛之緣何以故餘欲於四根各得其分惟此觸欲徧滿身受生處廣故多生染着此着難捨若墮地獄還以身觸受苦萬端此觸名為大黑暗處文記此名觸欲之害尤多大也言生死之本者圓覺經云若諸世界一切種性卵生胎生溼生化生皆因淫欲而正性命又云欲因愛生命因欲有眾生愛命還依欲本愛欲為因愛命為果故云生死根本也繫縛之緣者楞嚴經云汝愛我心我憐汝色以是因緣經百千劫常在纏縛故謂繫縛之緣也何以故下徵釋所以大論引劫撥仙因觸欲而步行出宮失神足而不能飛行也鹿角仙由染欲而項騎淫女毀久積之多載精修也末行示觸欲過患之報論云地獄有二部一名寒冰二名炎火此二獄中皆以身觸受罪苦毒萬端此觸名為大黑暗處危難之險道也略明訶五欲竟三棄五蓋第三乘五蓋謂貪欲嗔恚睡眠掉悔疑註止觀四二十二云通稱蓋者蓋覆纏綿心神昏暗定慧不發故名為蓋前訶五欲乃是五根對現在五塵發五識今棄五蓋即是五識轉入意地追緣過去逆慮未來五塵等法為心內大障記此節通明五法俱能蓋覆真性以破佛道開魔路為害亦不輕也初一行釋蓋義前訶下乃與前科辨異追緣下正明五蓋不棄則三世流害故云為心內之大障註乃至貪欲蓋起追念昔時麤弊五欲思想計校心生醉惑忘失正念等記此下別明蓋相也意謂貪蓋無別其相即在貪念起時其念不息追念過去麤弊五欲隨又思想計校心即醉惑忘失正念或作方便更望得之由是無間麤覺蓋禪名貪蓋體相也等者義貪不足之辭下例知註嗔恚蓋者追想是人惱我惱我親稱歎我怨三世九惱怨對結恨心熱氣麤忿怒相續等記意謂嗔蓋無他其相即在追想過去前人惱我或惱我父母等親或讚我相恨之怨此是現在嗔也一世既有三惱三世便有九惱如是怨境相對故令心熱氣麤以致忿怒相續是為嗔蓋體相也輔行問過去已去未來未至云何名惱答惱雖過未境實現在與時相值而生惱亂以過去曾惱我也若離嗔者雖有惱境惱心不生也註睡眠蓋者心神昏昏為睡六識暗塞四肢倚放為眠眠名增心數法烏暗沉塞密來覆人難可妨衛等記意謂睡蓋無他但是心依無記增長無明故意識昏熟五情暗冥無所覺知為睡眠也數人說為增心數法猶屬見思所斷癡使攝也輔行云此中總說睡眠之法能令心數增長不息彼俱舍約法相云睡眠遍不違若有皆增一以通善惡無記三性故也大論訶云眠為大暗無所見日日欺狂奪人民亦如臨陣自刃間如共毒蛇同室居如人被縛將去殺爾時云何可安眠眠之妨禪其過最重是為睡蓋之相也註掉悔者若覺觀偏起屬前蓋攝今覺觀等起徧緣諸法乍緣貪欲又想嗔恚及以邪癡𦦨𦦨不停卓卓無住乍起乍伏種種紛紜身無趣遊行口無益談笑是名為掉掉而無悔則不成蓋以其掉故心地思惟謹慎不節云何乃作無益之事實為可耻心中憂悔懊結繞心則成悔蓋記意謂麤心分別曰覺細心沉思曰觀輔行云掉之為法破出家心攝猶不定況更掉散掉動也大論云汝已剃髮著袈娑云何樂著戲論法放逸自恣失法利耶悔有二種一掉後生悔二如重罪人常懷怖畏悔箭入心堅不可拔故法界次第云邪心動念曰掉退思憂悴曰悔若從無明謬取則戲論動掉心生焉既所為乖失退思憂惱悔心生矣此亦是增心數法正屬見諦所斷見使攝思惟斷亦有小分補若入禪定知過而已不應想着非但悔故而得免脫當修禪定清淨之法那得將悔榮心妨於大事故云悔已莫後憂不應常念着若懊結繞心則成悔蓋蓋覆禪定不得開發俱是悔蓋之相也註疑蓋者此非見諦障理之疑乃是障定疑也疑有三種一疑自者謂我身低下必非道器是故疑自二疑師者此人身口不稱我懷何必能有深禪好慧師而事之將不誤我三疑法者所受之法何必中理三疑猶豫常在懷抱禪定不發設發永失此是疑蓋之相也記此明疑使之過為障道之大患也初二句揀非指是疑有三下正明疑事非一謂癡心求理猶豫不決名疑若修道定等法無明暗鈍不別真偽因生猶豫心無決斷皆疑也猶豫獸名喻不決之狀註若貪欲蓋重當用不淨觀棄之若嗔恚蓋多當念慈心滅除恚火若睡蓋多者當勤精進策勵身心若掉散多者應用數息若三疑在懷當作是念我身即是大富盲兒具足無上法身財寶煩惱所翳道眼未開要當修治終不放捨又無量劫來習因何定豈可自疑失時失利若疑師者我今無智上聖大人皆求其法不取其人若疑法者我法眼未開不別是非憑信而已佛法如海唯信能入文記此文正明棄之一字乃治病之良方也前文是病今文是藥謂此貪欲重者由妙欲為食當用不淨觀治止觀云以其向言五欲為淨愛着纏綿今觀此身乃是膿囊血袋從頭至足無一可欣厭惡心生何有智者當樂是耶故用此觀為治貪之藥此蓋若去心即得安次二句治嗔蓋謂此嗔恚多人由憎相為食當用慈心滅除恚火良以恚火能燒二世功德人不喜見毒害殘暴禽獸無異生死怨對累劫不息即世微恨後成大怨今修慈心棄捨此惡觀一切人猶如父母親想悉令得樂云何於彼而生怨對作是觀時瞋心即息安然入定也次二句棄睡蓋謂此睡蓋多人由以五法為食所謂懞憒不樂嚬欠食不平等性心羸劣性今當精進䇿勵身心用毗鉢舍那觀棄之謂加意防擬思惟法相分別善惡之法弗令睡蓋得入又當選擇善惡之心令生法喜心既明淨睡蓋自除莫以睡眠因緣失二世樂徒生徒死無一可獲當好制心善巧防御也次二句棄掉悔蓋謂此掉蓋多人由四法為食所謂親里尋國土尋不死尋念昔事尋當用數息棄之以此掉散甚利來時不覺於久始知今用數息若數不成或時中忘即知已去覺已更數數相成就則覺被伏若不治之終身被蓋也次二行總示棄疑蓋者謂此三疑在懷之人由三相為食以緣起為治治此三疑有總有別總者當念此身如大富盲兒雖然其家具足無上法身財寶為煩惱所翳道眼未開不得了了知見真如庫藏功德法財若欲受用要當治此翳眼於是晝夜觀法緣起終不放捨此是總棄三疑也次又無下是別一棄疑自者謂我無始所積習因有何一定世出世間二種善根或曾習過如人負債重者先牽即今現得人身正好修行以求出世豈可自疑以致失時失利古云此生不度何生度又云人人鼻孔撩天個個脚跟點地彼既丈夫我亦爾不應自輕而退屈何得自疑身非道器耶二棄疑師者謂我今愚癡無智正須依人求法且上聖大人求法不取於人如雪山從鬼請法天帝拜畜為師我何許人敢疑師耶大論云弟子見師過者若實不實其心自壞失法勝利故空聲告言莫見師過應念薄福不值于佛今值惡師不應見過自妨般若若師有過不預於我我從師求般若如狗皮囊盛好寶物不以囊臭而棄其寶經云依法不依人有何疑焉三棄疑法者謂我今法眼未開不能別其是非豈能量其深淺唯應憑信而已論云佛法如大海信為能入智為能度故當信法而弗疑也上來所明三疑須棄其中師法亦當善為別擇便不染於邪師邪法若師法正依法修行爾時三疑均當棄也或謂宗門大疑大悟小疑小悟今何棄之答當知明理真疑不可無暗事邪疑不可有故當棄之備宗門以疑為方便門此不同也釋棄五蓋竟四調五事第四調五事謂調心不沉不浮調身不緩不急調息不澀不滑調眠不節不恣調食不飢不飽註止觀四二十九云土水不調不任為器五事不善不得入禪眠食兩事就定外調之三事就入出住調之調食者增病增眠增煩惱等食則不應食也安身愈疾之物是所應食略而言之不飢不飽是食調相調眠者眠是眼食不可苦節增於心數損失工夫復不可恣上訶蓋中一向除棄為正入定障故此中在散心時從容四大故各有其意略而言之不節不恣是眠調相三事合調者三事相依不得相離初入定時調身令不寬不急調息令不澀不滑調心令不沉不浮調麤入細住禪中隨不調處覺當檢校調使安隱若出定從細至麤備如次第禪門也文記禪門云如陶師調泥使不強不輭然後可就輪繩亦如調琴先應調絃令寬急得所方可入弄出諸妙曲今亦如是五事和適則三昧易生博物志皇甫謐問青牛士說養生法云人欲常勞食欲常少勞無過極少不至虗去肥膩節酸鹹是則俗養生法常令自勞豈志道者過食懈怠非惟失利而已亦乃增病損生尼犍經尼犍答嚴熾王云波斯匿王食啖大過身重懈怠現未失利故謂不飢不飽是食調相也又增一經云佛在祇園說法阿那律於中多睡佛訶云咄咄何為睡螺螄蚌蛤類又問云汝為畏王法畏賊盜而出家耶答不也我厭生老病死故求出家既信心堅固而出家者佛躬說法而眼睡耶那律座起白佛自今已後形融體爛終不於佛前眼睡因七日不眠便失雙明佛言勤加精進者與掉戲相應懈怠懶惰者與結使相應汝行中道汝當寢息何者一切由食存眼以眠為食乃至意以法為食涅槃以不放逸為食我無放逸得至涅槃答云我不敢違後得天眼則至眠是欲界報法既未得禪但可調停不可苦節也若恣意閑眠則有二失一者增於心數二者損失工夫亦須調停復不可恣也是眠調之相次上訶下行半明上下文意之別三事合調者止觀云蓋如初受胎一煖二命三識煖是遺體之色命是氣風連持識是一期心主托胎即有此三事三事增長七日一變合三十八變竟三事出生名嬰兒三事停住為壯年三事衰微為老耄三事變滅名為死既始但相依不離故身識心此應合調不應別說但有初中後方法不同入住出形相有異也初入定調三事者行人欲入三昧調身之宜若在定外行住進止動靜運為詳審若所作麤獷則氣隨麤以氣息麤故心散難錄兼復坐時煩憒心不恬怡是以雖在定外亦須用心逆作方便使動靜詳審舉要言之不寬不急是身調相第二調息有四一風二喘三氣四息守風則散守喘則結守氣則勞守息則定前三不調心亦難定若欲調之當依三法一下著安心二寬身體三想氣徧毛孔出入通同無障若細其心令息微微然息調則眾患不生其心易定舉要言之不澀不滑是息調相第三調心有二一調伏亂念不令越逸二當令沉浮寬急得所言沉者若坐時心中昏暗無所記錄頭好低垂是為沉相爾時當繫念鼻頭令心住在緣中浮者若坐時心神飄動身亦不安念在異緣是為浮相爾時宜安心向下繫緣制諸亂念心則定住此心則易安靜舉要言之不沉不浮是心調相欲入定時從麤入細身為麤息居中心最細此則入定初方便也住禪中下明住定調謂住禪中三事不調心不入法如調琴入弄後不成曲即知絃軫差異遂覺而改之此是住定時調三事也若出定下明出定調謂欲出定時應先放心異緣開口放氣想息從百脈隨意而散然後微微動身此為出定調身息心之方便以從細出麤故也已上三事和適是名善入出住偈云進止有次第麤細不相違譬如善調馬欲出而欲住是也註輔行四下二十三云故禪門中調身云夫坐者先須安處使久無妨若半跏以左壓右牽來近身使與左右䏶齊若欲全跏更䟤右以壓左寬衣帶周正身弗使坐時更有脫落手以左壓右重累相當置右脚上亦令近身當心安置挺動支節七八許度如按摩法弗曲弗聳正頭直項令鼻對臍不偏邪不低昂身如矴石無得騷動無寬急過是身調相調息者身既調已次開口吐胸中氣自恣而出使身中百脈處皆悉隨氣出次閉口鼻中納清氣如是至三若息已調一度亦足次閉口唇齒纔相拄舌向上齶閉眼纔令斷外光次簡息風氣息若調者則易入定次調心者一者調亂令不越逸二者調心令沉浮得所若心沉時繫念鼻端若心浮時安心向下云云記念誦經云全跏諸佛坐半跏菩薩坐大論問有多坐法何故但示跏趺答最安穩故攝持手足心不動故魔王怖故偈云得道慚愧人安坐若龍蟠見畫跏趺坐魔王亦驚怖不同俗坐及異外道翹立等是故但示跏趺坐也釋調五事竟五行五法二初總牒第五行五法註止觀三十一云上二十法雖備若無樂欲希慕身心苦䇿念想方便一心決志者止觀無由現前若能欣習無厭曉夜匪懈念念相續善得其意一心無異此人能進前路一心譬船柁巧慧如點頭三種如篙㯭若少一事則不安隱文記此總釋行五法也初二行反顯意輔行云若無二字通徹於下謂若無樂欲希慕合無樂欲若無身心苦䇿合無精進若無念想合無念若無方便合巧慧若無一心止觀無由現前合正行不成備上二十法若無五法尚自不成況二十中闕或全無五法耶若能下行半順釋意輔行云若能二字亦當通徹下五句依次對合五法咸有也一心下一行法譬合明輔行云前喻導師事悉整而不作作不殷勤不存作法作不方便作不專一則事無成初不作譬無欲作不勤譬無進不存作法譬無念作不巧便譬無慧作不專一譬無一心則事不成譬正行不成禪門云巧慧者行人初修善時若識內外方便巧而用之不失其宜疾得禪定故名巧慧也二別示五初示樂欲法一欲欲離世間一切妄想顛倒欲得一切諸禪定智慧門故記欲者欲離愚散之倒欲得定慧之門故大論云欲者欲從欲界到初禪是也禪門云欲者秪是大志成就願樂之心不應於用心時起希望憶念之想若希望心起則心不澄靜三昧無由得發也二示精進法二精進堅持禁戒棄於五蓋初中後夜勤行精進故記精進者欲界難過若不精進不能得出如叛還本國界首難度故大論云施戒忍世間常法如客主之禮法應供給見作惡者破治不敢為罪或力少而忍不須精進今欲生般若須因禪定須大精進身心急著乃得成辦故也三示念法三念念世間欺誑可輕可賤禪定智慧可尊可貴記念者常念初禪不念餘事餘事者定慧之外皆名餘事即世間五欲雜染之情也四示巧慧法四巧慧籌量世間樂禪定智慧樂得失輕重等記巧慧者分別初禪尊重可貴欲界欺誑可惡初禪謂欣上勝妙出欲界謂厭下苦麤障因果合論則有十二觀與外道六行同名異義但外道專為求禪佛弟子用邪入正無漏心修還成正法是為巧慧也五示一心法五一心念慧分明明見世間可患可惡善識禪定智慧功德可尊可貴記一心者修此法時一心專志不涉餘緣此之一心乃決定之一心非入定之一心也示行五法竟三結意此二十五法為四教前方便故應須具足若無此方便者世間禪定尚不可得豈況出世妙理乎然則明教既漸頓不同方便亦異依何教修行臨時審量耳註止觀四末云此二十五法通為一切禪慧方便諸觀不同故方便亦轉譬如曲弄既別調絃亦別文記此節結釋從通轉異也輔行云一切者亦不出世間及以四教以世禪四教觀解導此二十五法則所為皆別故曰亦轉然圓教用此為方便者如止觀云今用此二十五法為定外方便亦名遠方便因是調心豁然見理見理時誰論內外遠近大品云非內觀得是智慧非外觀非內外觀不離內觀不離外觀及內外觀亦不以無觀得是智慧今且約此明外方便也然不可定執而生俱非且寄未見理前須立二十五法內外方便也若解此意浮沉得所內外俱成方便也弄曲者即正曲之弄名弄曲以喻觀法調絃者即正曲之序名曲序以喻方便略釋方便助行開二十五竟二觀法正修仍開十乘二初總標法被四機次明十乘觀法亦四教名同義異今且明圓教餘教例此註大本十乘雖通四教但十法名同偏圓義異今簡偏明圓故云且明圓教輔行五上二十六云觀法非十對根有殊雖復根殊但是一不思議觀觀不思議境乃至離愛不離境故又次位下三雖非觀法並由觀力相從名觀故名十觀又備此十令觀可成故名成觀亦名成乘前之四法用無前後通塞等三成就前四次位等三以判前七文記此明觀法十義初二行明觀不離境是故成十又次下明後三法共成十觀又備下明成觀成乘須備十法前之下明成判各有能所謂前四法為所成中間三法為能成總前能成所成七法為所判後之三法為能判也補用無前後者如觀不思議境時了達心佛眾生同體自與菩提心相應觀境現時了達此心常寂常照自與妙止觀相應自能徧破一切故前四法用無前後成就前四者若觀境時不能念念相應或有雜念間隔或於觀智起着或道品調停未善或於正道多障乃用通塞等三故曰成就前四也註輔行七下二十七云故知前七正明車體及以具度後三只是乘之所涉若無所涉運義不成是故十法通名乘也文記輔行云法華大車譬十法且順經文次第不依十法次第謂大乘高廣不思境也幰蓋慈悲寶繩交絡即發心也安置丹枕枕有內外若車內枕休息眾行即安心也若車外枕或動或靜或靜即通塞義破塞存通即塞而通其疾如風即破無明是破徧義也乃至始自白牛終至平正道品義也又多僕從即正助也遊於四方即次位也安忍只是忍於五品違順二境令入六根離愛只是離六根相似法愛是知前七正明車體及以具度後三只是乘之所涉也二別明圓機十乘十初明觀不思議境一觀不思議境謂觀一念心具足無減三千性相百界千如即此之境即空即假即中更不前後廣大圓滿橫豎自在故法華經云其車高廣上根正觀此境註此初乘觀忘能所故從境受名又為九乘本稱本修九方堪入位所入位即觀行位也謂觀一念心等者即現前陰妄一剎那心稱性而觀具三千法不惟三科揀境明一念心正當於此揀思議心取不思議心也故妙樂一云揀境及心光句記一云須去思議取不思議方名揀心文即達陰境成不思議境也既云三千性相復云百界千如者以三千法約百界千如歷三世間而論也記此明觀一念心具足三千也所云稱性而觀現前一剎那心具足三千者詳解云如止觀一部其要在於解之與行解則解於法法本真行則立行定境用觀正用觀時的觀現前一念妄心具三千法三千即一念一念即三千不縱不橫不前不後觀之不已則陰境轉成不思議矣是為稱性而觀一剎那心具三千法也所言三科揀境明一念心者如輔行云陰入界並可為境寬漫難示故的就陰如去丈就尺略四從識如去尺就寸由界入所攝寬多陰惟有為有為之中義兼心色故置色存心心復名含心及心所今且觀心王置於心所故初觀識是也揀思議心取不思議心者如止觀云觀心不可思議者此境難說先明思議境令不思議境易顯思議者小乘亦說心生一切法謂六道因果三界輪環若去凡欣聖則棄下上出灰身滅智乃是有作四諦蓋思議法也大乘亦明心生一切法謂十法界也若觀心是有有善有惡惡則三品三途因果也善則三品修羅人天因果也觀此六道無常生滅能觀之心亦念念不住又能觀所觀悉是緣生緣生即空是二乘因果法也若觀此空有墮落二邊沉空滯有而起大悲入假化物實無身假作身實無空假說空而化導之即菩薩之因果法也觀此法能度所度皆是中道實相之法畢竟清淨誰善誰惡誰有誰無誰度誰不度一切法悉如是是佛因果法也此之十法邐迤淺深皆從心出雖大乘無量四諦所攝猶是思議之境非今止觀所觀也不思議境者如華嚴云心如畫工師造種種五陰一切世間中莫不從心造種種者十法界也法界三義十數是能依法界是所依能所合稱名十法界又此十法各各因各各果不相混濫言十法界又此十法一一當體皆是法界言十法界也夫一心具十法界十法界各各互具成百法界界界具十如是百法界則成千如是又各具三種世間所謂正覺世間五陰世間器世間也千如是則成三千種世間故云三千性相百界千如也此三千在一念心若無心則已介爾有心即具三千亦不言一心在前一切法在後亦不言一切法在前一心在後例如八相遷物物在相前物不被遷相在物前相不被遷前亦不可後亦不可只物論相遷只相遷論物今心亦如是若從一心生一切法者此則是縱若心一時含一切法者此即是橫縱亦不可橫亦不可即心是一切法一切法是心故非縱非橫非一非異玄妙深絕非識所識非言所言所以稱為不思議境意在於此是為揀思議心取不思議心也故妙樂下證三科簡境明心文句觀心釋結文云即別圓二觀云云妙樂釋云云云者乃未足之辭今應於此以辨同異之相方便正修簡境及心并對前二以辨權實等乃至四觀亦須開量今但略引一句以證三科簡境明心也光句記下證揀思議取不思議也即達陰境等者申上光句記意記云下發明三千性相百界千如也註即此之境等者即境為觀即空假中境觀不二三一互融更不前後亦不一時不縱不橫絕思絕議此境周徧故廣大無法不備故圓滿橫周十界豎徹三諦橫豎相即故云自在法華車體其在是歟記即境為觀觀即是境故境觀不二然觀有三而境唯一既境觀不二是為三一互融一融三故不前後三融一故不一時不前後則不縱不一時則不橫言思道絕名不思議境此境周徧四聖六凡情與無情無處不有故曰廣大世出世間染淨色心無法不具故曰圓滿橫周十界之邊豎徹三諦之底橫即豎豎即橫相即隨心故曰自在是則法華大白牛車體其在斯歟註其車高廣文句五二十七云假名車有高廣相譬如來知見深遠橫周法界之邊際豎徹三諦之源底文記以車之廣譬如來知見橫周以車之高譬如來知見豎徹法界三諦並非橫豎法界從徧言橫則便三諦名異言豎則便不二互顯思之可見註上根等者義例云上根之人即於境種而生於果為中下根復論九乘大意云又此十法雖俱圓常圓人復有三根不等上根唯一法中根二或七下根方具十文記上根等者謂上即於此不思議境種而起觀照久觀此境而生於果輔行云且如十境只一念心行之地也二顯示境相不同行之種也一一起於十乘觀法行之雨也一一轉成不思議境行之芽也一一發心行之幹也一一安心行之葉也一一破徧乃至正助行之華也一一次位以至法愛行之果也若無六事道樹不端次第雖爾若從人說上根即於境種而生於果文云直聞是言病即除愈是也為中下根論九乘者輔行云為中下根更須後法文云至長者所為合眾藥是也大意下證十法三根之殊註然此不思議境在止觀中具明三境一性德境觀一念心具三千法二修德境推本具心離四性計三化他境解離四性無妨四說蓋即性德而為修德如輔行云其實但推本具理心文當修德時而有化他之解非即說法也如輔行云初心依理生解與起教後心不同文記此指止觀具明三境也初半行標指一性下示性德觀一念心具三千法者即所謂性德不思議境也二修下示修德正觀問心起必記緣為心具三千為緣具為共具為離具若心具者心起不用緣若緣具者緣具不關心若共具者未共各無共時安有若離具者既離心離緣那忽心具四句尚不可得云何具三千法耶答他人云一切解惑真妄依持法性法性持真妄真妄依法性也攝大乘云法性不為惑所染不為真所淨故法性非依持言依持者阿賴耶是也無沒無明盛持一切種子無沒者即八識無始恒有故云無沒若從地師則心具一切法若從攝師則緣具一切法此二者各據一邊若法性生一切法者法性非心非緣非心故而心生一切法者非緣故亦應緣生一切法何得獨言法性是真妄依持耶若言法性非依持黎耶是依持離法性外別有黎耶依持則不關法性若法性不離黎耶黎耶依持即是法性依持何得獨言黎耶是依持又違龍樹云諸法不自生亦不從他生不共不無因乃至云當知四句求心不可得求三千法亦不可得既橫從四句生三千法不可得者應從不念心滅生三千法耶心滅當不能生一法云何能生三千法耶若從心亦滅亦不滅生三千法者亦滅亦不滅其性相違猶如水火二俱不立云何能生三千法耶若心非滅非不滅生三千法者非滅非不滅非能非所云何能生三千法耶亦縱亦橫非縱非橫求三千法亦不可得言語道斷心行處滅故名不思議境也三化下示化他如止觀云當知第一義中一法不可得況三千法世諦中一心尚具無量法況三千耶樹龍云不自生等大經云生生不可說等有四緣故亦可得說謂四悉檀因緣也蓋即下專明修德境文中略引輔行正釋今具記云言修德不思議境者即是自行須明行相故輔行問答推檢而為行體如前理性本無性過約修門說須明離計故約四性以為正問然此問中且約所起對理自具以為研覈其實但推本具理心恐生計故故須此覈故下答文但離縱橫等四句執竟還歸本理一念三千也當修下轉明化他境云若聖若凡凡欲利他皆須四句橫豎破執乃可四句慈悲為他然此為他與後起教其義不同彼唯實報八相被物發起權實施開廢等此唯初心依理生解無性執已為他四說亦通後心仍在習果無生忍位四執寶破赴物說四是也註雖分三境只在一心用觀推求正在修德蓋末代行者離四句外無修觀處今文云具足無減等即性德也即空假中即性而修也如義書第二義云心具三千是假此之三千假觀非法性自生無明他生自他共離而造故空觀約此空假遮照不偏名為中道文又輔行釋修德云不得而得三諦宛然文不得者空觀遮情也而得者假觀照性也遮照不偏中道在焉今缺明化他境者修德離四性時而有無妨四說之解即化他也備此以今文會通三境初二句會通性德境次二句會通性修境如義書下引證即性而修又輔行下重證即性而修次行半申明輔行文義今缺明下點示化他一境文相雖無約義却有也意謂此文於三境中點明用觀推求正在修德此玉師一片婆心示修觀下手處也後人於一念三千性德亦似了了而未能深入者病在不用四句推求之故四句推求即觀此具謂從法性生從無明生從法性無明共生或從離生俱不可得只此不可得處即不思議境即不思議觀如此境不現前即重提起四句推求行住坐臥頃刻莫離勤加五悔無論時日務得三諦泠然一心無寄遮照同時法界洞朗此是止觀氣分既得實心以緣實境則實緣自然次第而生實實迭注心心無間豈有不入實理者耶輔行問前性境及前章安料簡中皆云一心任運具足今此何得對緣推耶答今此正推一念心起已具三千故推此具為心為緣若推此起起不可得念與三千俱不可得不得而得三諦宛然須知若推此起起不可得四句正是用觀推求不得而得二句正是遮照同時法界洞朗時候從此發品信觀行證相似分真不離此境是為上根或推之未入昏散重增則發宏誓以助觀善巧總別以安心再未能入此必破法之故用無生門以遍破之辨通塞以檢校之加以三十七道品次第調試八萬四千事惡對治助開果能如此未有不得證入者所謂中根二或七也下根具用十者亦一往分之是以輔行云為中下根更須後法不必拘定又修觀中必有境發如病煩惱見禪等倘心安於諦不須更換或境強觀弱則當以所發之境依止觀中別以為觀使境消而仍歸於不思議或即所發境而證入在學者自察之此是起修要處不厭詳細幸毋略焉釋不思議境竟二真正發菩提心二真正發菩提心謂依妙境發無作四弘誓願憫己憫他上求下化故經云又於其上張設幰蓋註輔行五中十四問應先起誓後觀妙境何故境後方云發心答境前非不發心具如五略中意今發重為成觀故須緣理益他文記輔行云初起大志造趣所期名之為發不依教道名真依三諦理名正菩提即是所期之果妙境即是所行之路心即能行能趣有情以無始來隨逐塵染不知無緣體徧法界惟隨妄我慮知之境今依聖教從迷反迷故名為發制此慮知令上求下化復名為發也如五略意者謂以五略而攝十廣則初大意二釋名三體相四攝法五偏圓即發大心六方便七正修即修大行八果報即感大果九起教即裂大網十旨歸即歸大處是故境前非不發心也今發下正答今後發心之故註大意五云觀境不悟須加發心此人無始以起宏誓今由觀境不契於理重須發誓於靜中思惟彼我鯁痛益他無量劫來沉迴生死縱發小志迷菩提心我今雖知行猶未備故重發誓等文記此引大意示明境後重發之意初明自行觀境不契故重發誓次明利自他行未備故重發誓所言思惟鯁痛者輔行云思惟是宏誓之始鯁痛是悲願習成鯁者魚骨刺喉痛者傷苦之甚是故重發誓願也註張設幰蓋者文句五二十七云譬四無量眾德之中慈悲最高普覆一切也記此釋張設幰蓋者以慈能覆護一切其猶幰蓋之遮蔭一切也三善巧安心止觀三善巧安心止觀謂體前妙理常恒寂然名為定寂而常照名為慧故經云安置丹枕車內枕註輔行五中十七云善以法性自安其心故云安心文大意六云安心者先總次別所言總者以法界為所安以寂照為能安若知煩惱及以生死本性清淨名之為寂本性如空名之為照此煩惱生死復名法界此即法界體用互顯體是所安之法界用是能安之寂照所言別者雖復安之彌暗彌散良由無始習性不同故今順性逐而安之謂宜聽宜思宜寂宜照隨樂隨治隨第一義何以故有因寂照而善根增長有不增長有因寂照煩惱破壞或有不破見理亦然或聞思而回轉或聞思相資未可卒具細尋方曉文今文略明總安心故云常恒等也記此釋善巧安心法也初行略引輔行總釋大意下詳示總別安心先兩句標示次四行釋總安心輔行云初總安中只是止觀先重明法體為所安法體者何即妙境也若知煩惱生死本性清淨名寂者此釋能安之寂即止觀文云無明癡惑本是法性以癡迷故法性變作無明起諸顛倒善不善等如寒來結水變作堅氷又如睡來變作有夢今當體諸煩惱即是法性不一不異雖顛倒起滅如旋火輪不信顛倒起滅唯信此心但是法性起是法性起滅是法性滅體其實不起滅妄謂起滅只指妄想即是法性以法性繫法性以法性念法性常是法性無不法性時體達既成不得妄想亦不得法性還元返本法界俱寂是名為止如此止時一切流轉皆止也本性如空為照者此釋能安之照止觀云觀者謂觀察無明之心上等法性本來皆空下等一切善惡妄想皆如虗空無二無別乃至云法界洞朗咸皆大明名為觀也此煩惱生死復名法界者此明止觀體一釋所安法界別無有體即以前來所體以觀復名法界也用是能安之寂照者雖云寂照其體無別止觀所謂止秪是智智秪是止不動止是不動智不動智是不動止輔行釋云不二而二寂照無殊也即此法界體用互顯等者雙明止觀同照法性法性本具寂照之用故能從體明顯用寂照不離法性之體故以寂照為能安而正於法性也如云不動智照於法性即觀智得安亦是止安不動於法性相應即止安亦是觀安無二無別也次五行釋別安心先行半明別安之由先敘別意謂雖以法性安之彌暗對觀言也彌散對止言也良由無始已來習性不同或習聞法或習坐禪或習止習觀種種不同故今以四悉遂其所願逐而安之也即止觀云夫心神冥昧梭利恍惚梭疾也汩起汩滅難可執持倐去倐來不易關禁雖復止之馳疾颺炎雖復觀之暗逾漆墨加功苦至散惑倍隆敵強力弱鷸蚌相枙既不得進又不可退當殉命奉道薦以肌骨誓巧安心方便迴轉令得相應成觀行位也謂宜下標起四悉止觀之相如止觀化他文中有八翻為信行人隨四悉檀說止觀安心有八翻為法行人隨四悉檀說止觀安心輔行云四悉信法止觀之相為後來者作化他說法式也宜聽宜思者即信行法行之不同也止觀云自見法少憑聞力多後須聞法得悟名信行憑聞力少自見法多後須思惟得悟名法行遠討源由久劫聽學久劫坐禪得有信法種子世世重習則成根性各於聞思開悟耳師應問云汝於定慧為志何等若言我聞佛說善知識者如月形光漸漸圓著又如梯漸漸增高巧說轉人心得道全因緣志欣渴領如犢逐母當知即是信行人也若言我聞佛說譬如明鏡其體不動色像分明水淨無波魚石自現欣捨惡覺如棄重擔當知即是法行人也法行則宜思信行則宜聽也宜寂宜照者即止觀云或隨便宜以止安心或隨便宜以觀安心是也以上是為人悉檀隨樂等是三悉檀即止觀云或隨樂欲以止安心或隨樂欲以觀安心或隨對治以止以觀安心或隨第一義以止以觀安心是知逐其根性於一人所則有八翻安心信行法行合十六翻安心也何以故下是總徵具用四悉所以如文可見次五句釋宜寂照文中具有世界生善破惡入理可知次二句釋宜聞思或聞思而迴轉者止觀自行文云眾生心行不定或須臾而鈍或須臾而利任運自爾非關根轉亦不數習或作觀不徹因聽師悟或久聽不解暫思即決是故更論轉根安心若法行轉為信行逐其根轉用八翻悉檀而授安心若信行轉成法行亦逐根轉用八翻安心得此深意廣略自在說之轉不轉合有三十二安心也又四轉中云若法行心轉成信行信行轉為法行皆隨其所宜巧鑽研之自行有三十二化他亦有三十二合六十四安心也聞思相資者若法多信少名信資法信多法少名法資信既云相資乃是信法二行俱有益也如止觀云信法不孤立須聞思相資謂法行則以聞資思信行則以思資聞也就相資中復論轉不轉亦有三十二安心也化他相資亦有三十二合六十四并前合為一百二十八安心也止觀文云止若離三諦無安心處若離止觀無安心法若安心於諦一句即是如其不安巧有方便令心得安耳又以次第三觀顯不次三觀各有一百二十八則有五百一十二翻論止觀安心也末二句結略勸尋廣文今文下是結指之辭註安置丹枕者文句五二十七云若車內枕者休息身首譬一行三昧息一切智一切行也補此以一行三昧發明安置丹枕義也言一行者謂直緣法性也止觀云但繫緣法界一念法界繫緣是止一念是觀以雖繫雖念不出法界雖止雖觀寂照同時云一行也註丹即赤光譬無分別法也妙樂六二十四云智首行身三昧如枕所息得理法理而然赤光等者無他法間名無分別以光譬智故云智光朱正紫間故以赤表無雜之光南山注經音云西方無木枕皆以赤皮內著綿毛用倚臥也赤而且光文輔行七下二十七云若車內枕休息眾行即安心也記此釋經文丹枕義也初一行引文句正釋妙樂下轉釋輔行下會釋意謂內枕休息即安心也四破法徧四破法徧謂以三觀破三惑三觀一心無惑不破故經云其疾如風註大意七云眾教諸門大各有四乃至八萬四千不同莫不並以無生為首今且從初於無生門徧破諸惑復以無生度入餘門縱橫俱破令識體徧文記止觀云破法徧者法性清淨不合不散言語道斷心行處滅非破非不破何故言破但眾生多倒少不顛倒破顛倒令不顛倒故言破法徧耳上善巧安心則定慧開發不俟更破若未相應應用有定之慧而盡淨之故言破耳又不思議境一境一切境一心一切心橫豎諸法悉趣于心破心一切皆破故言徧也謂以下略明豎以攝橫三觀下點示橫豎一心不二無惑不破則無法不顯遮照自在惑破能前進能破無頂墮即是破法愛無明入薩婆若海發真速疾名其疾如風也言眾教諸門大各有四者止觀文云然破法須依門經說不同或文字為門大品四十二字是也或觀行為門釋論明菩薩修三三昧緣諸法實相是也或智慧為門法華其智慧門是也乃至八萬四千不同者此擴充諸門謂眾生有八萬四千煩惱塵勞諸佛有八萬四千波羅密門是也莫不並以無生為首者止觀云無生門能通止觀到因到果又能顯無生使門光揚止觀是行無生門是教依教修行通至無生法忍因位具足今且從初于無生門徧破諸惑者止觀云一無生門從始至終盡其源底豎破法徧是也以無生度入諸門者止觀云二歷諸法門當門從始至終盡其源底橫破法徧是也此即依餘門修此一心三觀亦能徧破故曰度入縱橫俱破令識體遍者止觀云三橫豎不二從始至終盡其源底非橫非豎破法徧也豎則論高橫則論廣豎來入橫無橫不高橫來入豎無豎不廣是也註輔行七上六云今一心具三破次第之三故云一心三觀破豎通塞三觀一心能破橫者彼橫三觀離屬三人並在初心故三不合一今以三祇是一破彼分張之三故云三觀一心破橫通塞應知一心三觀與三觀一心言互理同為破橫豎翻對而說文記此引輔行以交互發明橫豎通塞初以破次第豎通塞以一心三觀者見思分段生死為塞從假入空觀為通無知方便生死為塞從空入假觀為通無明因緣生死等為塞中道正觀為通別人次第修破名豎通塞問此三塞法破所當然通法亦必破者何耶答此三通法修之雖能破於三惑乃是次第三通若校一心通猶成塞故豎通漸入雖屬一人前後次第三時各異以各異故故非一心故今以一心三觀破豎通塞也次二行半以三觀一心破分張之三橫通塞者苦集為塞道滅為通無明十二緣為塞無明滅為通六蔽覆心為塞六度為通此通亦須破者以三觀破三惑雖本是通既離屬三人而不知三觀一心則通又成塞今以三觀一心破之也應知下勸辭意謂一心三觀三觀一心此二語者為破橫豎彼此交互而顯理宜意會可耳註八正道中行速疾到薩婆若故云其疾如風記此以一心三觀收功速疾從因至果在八正道中行也五識通塞五識通塞謂苦集十二因緣六蔽塵沙無明為塞道滅滅因緣智六度一心三觀為通若通須護有塞須破於通起塞能破如所破節節檢校名識通塞經云安置丹枕車外枕記五識通塞者謂苦乃集家之果集乃苦家之因因果相牽是生死因名塞此塞須破十二因緣如十二重城緄定行不能進六蔽蔽行人之心性塵沙障行人之道眼無明翳法性之妙理為塞道乃滅家之因滅乃道家之果因果相通則能至乎寶所滅因緣智則能明心見性六度度生死此岸到彼涅槃彼岸一心三觀破見思塵沙無明為通若通須護有塞須破於道滅中而生執著名為塞此塞須破于通起塞能破如所破節節檢校名識通塞註大意七云雖知生死煩惱為塞菩提涅槃為通復應須識于通起塞此塞須破於塞得通此通須護如將為賊此賊豈存若賊為將此將豈破節節檢校無令生著著故名塞破塞存通非唯一轍有心皆爾念念常須檢校通塞文記此釋識通塞也初一行縱其已知橫豎通塞次三行示須識於通起塞如止觀云若同外道愛著觀空智慧宜以四句徧破能破如所破令眾塞得通若不執著觀空智慧則能破不如所破但去塞存通如除膜養珠破賊護將將若為賊此賊亦破賊若為將此將亦護如是展轉將皆為賊節節破之故大意中但舉徧破也輔行云一者通途通塞以所破為塞能破為通二者別相通塞以於能起著為塞無着為通既法相淺深任有通塞故須節節檢校無令生著也言節節檢校者止觀云以橫織豎檢校通塞如從假入空破惑又用橫織豎檢校從空入假觀通塞又用橫織豎檢校中道正觀皆云一一法一一能一一所若起三塞破之令通若是三通養之成就輔行云一橫通塞二豎通塞三橫別通塞四一心通塞皆須四句檢校若於四通而起塞着皆須破塞以存于通如是展轉以破為期故於一一能一一所一一心皆須檢校也復須四句分別一塞中有通二通中有塞三塞是自塞四通是自通初二句是別相通塞後二句若塞已破即屬破徧故云非唯一轍凡有心皆有故當念念常須檢校也註安置丹枕者文句五二十七云車若駕運隨所到處須此支昂譬即動而靜即靜而動文妙樂六二十四云丹枕云支昂者即車外枕車住須支支之恐昂故云支昂支持也昂舉也譬動靜相即者車行枕閑即動而靜車息枕用即靜而動用時常靜閑時常動實體與用亦復如是自因之果法性無動所以如風不移寂然而到萬行無作眾智莫觀此則三德俱不二也以三即一故使爾耳文輔行七下二十七云若車外枕或動或靜動靜秖是通塞義也文記此釋經文安置丹枕句也初行半文句正釋妙樂下轉釋初三行半舉譬釋義實體與用亦復如是二句合法言實體指性合車用則指修合枕車枕既即動而靜即靜而動動靜不二則實體與用亦即性而修即修而性性修不二故云亦復如是自因下二行明三德不二謂法身是體既云寂然而到則即靜而動般若解脫是用既云萬行無作眾智莫觀則即動而靜體用既其相即故云三德俱不二也末二句結明不二所以輔行下會通動靜即是通塞義也六道品調適六道品調適謂無作道品一一調停隨宜而入經云有大白牛等已上五中根註大意七云約門徧破於理又昧應須七科次第調試若不爾者此之道品為誰施設以破徧門雖觀陰境陰上未分念處名故況有六科展轉調停故用此門檢校詮擇文記此釋道品調適也止觀云上來雖破法徧識通塞若不調停道品何能疾與真法相應真法名無漏道品是有漏有漏能作無漏方便方便失所真理難會大論云三十七品是行道法涅槃城有三門三門是近因道品是遠因為是義故應須道品調停也若不下三句明道品徒施之失以破下明今用道品調適之意謂上破法徧中所觀陰境既未分四念處之名豈有四正勤等調適之事故今用之以為檢點校量詮顯道理決擇應用也註實相為車體道品為前導故喻白牛白牛等者等於經中膚色充潔形體姝好有大筋力行步平正文也大意以中根至七乘今至第六者以正助分中下也記文句云四念處慧破除八倒之黑名駕白牛四正勤中二世善滿如膚充二世惡盡如色潔四如意足稱行者心如形好筋譬五根住立能生義也力譬五力摧伏幹用義也行步平正譬定慧均平又譬七覺調平然此道品名雖通前義實局圓七對治助開七對治助開謂若正道多障圓理不開須修事助謂五停心及六度等經云又多僕從此下為下根註大意八云七助道對治者涅槃云眾生煩惱非一種佛說無量對治門夫不信有對治之人當知此人未曉正行若識己身正行未辦良由事惡助於理惡共蔽理善令不現前事惡若去理善易明故先修事度以治事惡事惡傾已理善可生文記止觀云根利無遮易入清涼池不須對治根利有遮但專三脫門遮不能障亦不須助道根鈍遮重者根鈍故不能開三脫門遮重故牽破觀心為是義故應須治道對破遮障則得安隱入三脫門大論稱諸對治是助開門法即此意也八知位次八知位次謂修行之人免增上慢故註大意八云下根障重非唯正助不明却生上慢謂己均佛未得謂得未證謂證須知次位使朱紫不濫若未證得而謂證得非唯失位却墮泥犂故小乘經中四禪比丘謂為四果大乘經中魔與菩薩授䟦致記若生取著必同魔屬尚失人天何關至道故大小經論咸明次位文記小乘等者謂佛世有族姓子於佛法中出家不修多聞方便住阿蘭若以夙因故能超世俗初禪自謂是須陀洹果乃至超世第四禪謂是阿羅漢果於一生中未得謂得未解謂解未證謂證更不求勝進道後命終時第四禪中有現前爾時念言我斷一切生分應般涅槃不應更生今我中有何緣而生定無解脫若有解脫我應得之便生謗涅槃邪見以邪見故四禪中有即滅地獄中有現前命終生阿鼻地獄是也大乘等者明大乘因記生慢大品云魔作比丘到菩薩所作如是言若菩薩於般若作證得須陀洹乃至辟支佛大論云魔語菩薩汝於諸佛授菩提記父母兄弟名某若受著者成增上慢註於此知位中彌修五悔記謂此五悔方便助開正道自因位之初至因位之極皆當修習是故知位次中彌修五悔非無位也彌猶勤也九能安忍九能安忍謂於逆順安然不動䇿進五品而入六根註大意九云圓頓行人初入外凡外招名利內動宿障夙障縱薄名利彌至為眾圍繞廢損自行因茲破敗豈能進道外人視之猶謂大聖如樹抱蝎表似內虗唯當自勉不為所動得入內凡名為似位文記止觀云始觀陰界至識位次障轉慧開或未入品或入初品神智爽利或見講者不稱理或見行道不當轍慈悲示語即被圍繞即說一兩句法或示一二節禪初對一人馳傳漸廣初謂有益益他蓋微廢損自行則知圓位外凡益人實少自損誠多末勸自勉入相似位六根清淨明初依人有所說法亦可信受一音徧滿聞者歡喜故當勉進也註謂於逆順等者逆是煩惱業定見慢等從內來破者當以內三術治之謂空假中也順則名譽羅罥利養毛繩眷屬集樹妨蠧內侵枝葉外盡從外來破者當以外三術去之一莫受莫著二縮德露玼三一舉萬里如止觀七三十二記此示逆順兩緣謂行人逆緣內破用內三術以治之不難也順緣外侵用外三術以治之非易也所以止觀明治外緣之三術云若被名譽羅罥乃至枝葉外盡者當早推之莫受莫著推若不去反被粘繫者當縮德露玼揚狂隱實密覆金貝莫令盜見若遁蹟不脫當一舉萬里絕域他方無相暗練快學得道乃至若名利眷屬從外來破憶此三術齧齒忍耐雖千萬請確乎難拔讓哉隱哉去哉補毛繩西域用以朿腰以龍鬚為之入水必斷骨喻利養着身必斷慧命名利如蠧令內觀散滅名內侵也眷屬如集令諸行壞名外盡也猶如大樹外集眾鳥內抱蟲蝎樹必死壞矣十離法愛十離法愛莫着十信相似之道須入利住真實之理經云乘是寶乘遊於四方游四十位直至道場妙覺位註大意九云若專住似位名為法愛已得相似六根互用已破兩惑永無墜苦愛此似位名為頂墮若修離愛進入銅輪名為十住分身百界一多相即身土既爾己他亦然十身利生四土攝物文記根互用者如法華法師功德品鼻根章文云知好惡辨貴賤及天宮莊嚴等即鼻有眼用讀經說法聞香能知則有耳用諸樹華果酥油香氣聞香能知則有舌用入禪出禪禪有八觸五欲嬉戲亦是觸塵聞香能知則有身用染欲嗔恚亦知修善聞香能知則有意用鼻根自在勝用若茲例餘五根亦復如是頂墮者止觀云行上九事過內外障應得入真若不入者以法愛住著而不前進大論云三三昧是似道位未發真時喜有法愛名為頂墮醫如同帆一去一停停即住著不進不退名為頂墮若破法愛入三解脫釋云至十信時若生愛心不入初住而六根淨位定不墮小以住頂故名之為墮非謂退墮以六根無退義故況復更有造重逆耶故此頂墮異前藏通大論明頂墮義二種不同一頂退名墮二住頂名墮小乘雖具二義住頂多退故今圓位見思已落但有住頂一墮義耳餘可知略明大科妙法方便正修竟三結抄略指廣示異三初結抄略錄謹按台教廣本抄錄五時八教略知如此註此結所錄五時八教天台判釋儀式也記此釋結文意謂大師依義立名用此判釋則非聖明特達者莫之能開也然五時八教一句大有妙旨所謂佛之一事理事備矣二指歸廣本若要委明之者請看法華玄義十卷委判十方三世諸佛說法儀式猶如明鏡及淨名玄義中四卷全判教相註所判聖教一期施化之相也妙樂一十七云淨名前玄總有十卷因為晉王著淨名疏別製略玄乃離前玄分為三部別立題目謂四教六卷四悉兩卷三觀兩卷後人合六為四今云淨名玄義中四卷是也記此釋指廣判教初二句指妙玄妙樂下指淨玄初二句指前玄分卷有十因為下明離十立三之名晉王即隋煬帝為太子時之封諡也後人下明合六為四淨名玄義即今四教義是也學者欲委明教相請尋妙玄等諸廣本細心玩索可也三示異諸家自從此下略明諸家判教儀式耳註今依大本玄義抄錄綱要彼文今師判教之後備敘諸家今略去而不明也補謂四教儀共有二卷今此卷者乃上卷也專明一家判教立義而已自從此下者指下卷而言也其下卷示明南北諸師宗途異計後至孤山勘校言下卷破古猶為可緩是故但行上卷也註如是則顯上一書判釋儀式在今天台然所判是如來說法儀式能判是大師判教儀式兩種不分而分須善識焉備天台判釋允符佛心雖一為所判一為能判學者其致意焉天台四教儀註彚補輔宏記連圈計字肆拾貳萬壹千柒伯陸拾玖個序文科文圖線加工并刷印施送貳伯部夾板貳伯副待歸結後倘有餘資另商別刻時維大清光緒戊戌年春王月卓三氏諦閑謹識
