body:
  text: 高麗沙門諦觀録南天竺沙門蒙潤集注清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦間編科參梓二八教二初總列八教名二初據今文通列教名三初正列言八教者頓漸祕密不定藏通別圓是名八教注初總標不從漸來直説於大時部居初故名為頓中間三味次第調停鹿苑破邪立正方等引小向大般若會一切法皆摩訶衍故名為漸記中間三味二句總喻漸相別則鹿苑破外道之邪立內法之正方等引戀空滯寂之小向智求悲度之大般若會八十一科之法同入第一義諦之乘自小至大名漸八十一科下解注不思議力同聽異聞互不相知名祕密教記同聽一音異聞諸義此不知彼所聞彼不知此所聞名祕密注聞小證大聞大證小得益不同名不定教記若宿於漸有頓種者今聞小得大益若宿於頓有漸種者今聞大得小益功推於教名不定注經論律三各含文理條然不同名三藏教備經藏法本義律藏滅惡義論藏無比法義各有文理包含攝持名三藏教注三乘共行鈍同三藏利根菩薩通後別圓故名通教記藏教以諦緣度分屬三乘通教三乘同觀無生四諦同修體假入空觀十二緣同觀六度若鈍根見偏空近同三藏利根兼見不空遠通別圓名通教注獨菩薩法別前藏通次第修證別後圓教故名別教記涅槃經言苦集滅道各各因緣皆有無量是菩薩法非二乘知別前藏通也別行記言時長行遠次第隔歷故受緣理斷九之譏別後圓教也名別教者注教理智斷行位因果滿足頓妙一切圓融故名圓教注四教義曰圓義有八一教圓正説中道言不偏也二理圓中道即一切法理不偏也三智圓一切種智圓也四斷圓不斷而斷無明惑斷也五行圓一行一切行也六位圓從初一地具足諸地功德也七因圓雙照二諦自然流入也八果圓妙覺不思議三德之果不縱不橫也滿足頓妙者滿故三一相即無有缺減足故圓見事理一念具足頓故體非漸成妙故三諦不別總之一切圓融也據下文則曰圓伏圓信圓斷等名圓教二喻顯頓等四教是化儀如世藥方藏等四教名化法如辨藥味記化儀如藥方者隨宜説法如醫士按病製方也化法如辨味者知諸根性如辨藥性味也注化儀化物儀式化法化物方法記輔行言化儀敷置引入化法教門法則注義例五云頓等四教是佛化儀藏等四教是佛化法補荊溪以輔行中文難明復以七種義例明之備辨訛曰儀法出自大師當引八教大意等書不必引義例也私謂引亦無妨然此説有益來哲慎擇之慧三結指如是等義散在廣文注廣文一家教部即下文廣本也大本即法華玄義補廣文廣本統指一家教部大本則單指玄義二依廣本略録綱要二初總標所依今依大本略録綱要注今家所録通依一家廣文如文末云謹按台教廣本記此證今文通所依也注的依大本玄義如云請看法華玄十卷記此明今文的所依也二別示綱要初辨五時五味及化儀四教然後出藏通別圓注此明今文抄録之法化儀屬部故與時味兼明化法屬教故後別明也記部所以判教故與時味兼明教所以釋義須先判教已方依教釋義義有緩急文有前後乃抄録分章法也二別釋八教相二初化儀四教分四初正明四教四初頓教三初總標第一頓教者即華嚴經也注此判部屬頓從部時味等得名為頓注此釋出屬頓所以也部唯約法時兼法譬味專約譬記部唯約法者華嚴是圓頓法時兼法譬者經言如日初出先照高山釋言曰譬佛光譬説教照物譬被機高山譬別圓衆味專約譬者即從牛出乳注最初説大時味俱初故得頓名記此正釋華嚴名頓注此下所謂如來等約部判頓此經中云下約時判頓涅槃云下約味判頓後準法華判也記約部時味列次判頓可知後準法華判謂後信解品下乃準法華判華嚴擬宜也二別釋三初約部判二初明部教所謂如來初成正覺在寂滅道場四十一位法身大士及宿世根熟天龍八部一時圍繞如雲籠月爾時如來現盧舍那身説圓滿修多羅故言頓教注如來乘如實道來成正覺文句九十一記此指二身中真身也成論言乘如實道來成正覺名如來乘者法如如智實者法如如境道是因覺是果若單論乘者如如無所如單明實者如如無能如境智和合則有因果照境未窮名因盡源為果道覺義成即乘如實道來成正覺此真身如來也以如實智乘如實道來生三有示成正覺即應身如來也注初成正覺三七日説大化之始故曰初成離邪曰正背妄曰覺記三七説大化始是隨機説諸經論明初時説法不定普曜經密迹經皆曰二七日説三乘法華過三七日方説小乘四分律中六七興顯行經七七五分律八七智論五十個七日則知隨機見聞得益不同故如來初時説大説小應現時分亦異今華嚴是被大機故三七説大化正覺藏依生滅通依無生別依無量圓依無作若華嚴本部當以別圓判然別地以上證道同圓佛是果人離偏小邪妄證圓妙正覺一覺一切覺無覺無不覺言窮慮絶不壞假名故曰始成正覺也注寂滅道場寂五住煩惱滅二種生死得道之場故曰道場即摩竭提國阿蘭若處處隨法轉名寂滅場記五住謂見一切住地欲愛色愛無色愛三住地無明住地二種生死謂分段變易生死是苦果煩惱是集因前四住感分段果後一住感變易果寂滅乃究竟大寂滅處佛於此得大寂滅道故曰道場即摩竭提國阿蘭若處補摩竭提翻不害劫初以來無刑害故至阿闍世王截指為刑後自齧指痛復息此刑佛成道其地故吉兆預彰記阿蘭若翻寂靜處七佛與人作則皆依阿蘭若處成道注四十一位圓教住行向地等覺別地已上證道同圓記住行向地等覺如九卷釋此四十一位破無明惑應判圓教別地同圓者如八卷解若華嚴疏明一海月等十菩薩同生衆共配初發心住二執金剛神三身衆四足行五道場六主城七主地八主山九主林十主藥神已上如次配十住十一主稼神十二主河十三主海十四主水十五主火十六主風十七主空十八主方十九主夜二十主晝已上配行二十一阿修羅王二十二迦樓羅二十三緊那羅二十四摩睺羅伽二十五夜叉二十六龍二十七鳩槃茶二十八乾闥婆王二十九月天子三十日天子已上配向三十一忉利天王三十二夜摩天三十三兜率天三十四化樂天三十五他化天三十六大梵天三十七光音天三十八遍淨天三十九廣果天四十大自在天王已上天王配地四十一師子座衆配等覺更有四十二眉間衆配妙覺備記中四十一位據華嚴所列配位然注乃指經前列衆不必泥定注四念處云華嚴後無等覺者乃部中談位不可以此而難今文經前列衆也記四念處釋別教中言華嚴初無十信後無等覺恐人舉此以難故明今文説有等覺乃指經前列衆又清涼疏問明品已下三品別明十信十忍品已下四品別明十頂當知頂即等覺清涼鈔言等覺因位之極稱為頂位注法身大士破無明惑得無生忍捨生身已居實報土受法性身故曰法身上求下化建立大事故曰大士備不了第一義諦是謂無明第一義諦乃圓家一空一切空無生理也以無生理忍可於心名忍破一分惑得一分忍顯一分法身乃捨分段身之生離同居方便之土而居實報土受法性身名法身焉行契佛行是上求化如佛化是下化此自利利他大事惟法身菩薩能之故名大士注宿世根熟佛化衆生種熟脫三時時不廢謂種在久遠熟在宿世脫在今日記玄文言佛設教元始巧為衆生作頓漸不定顯露種子中間以頓漸五味調伏長養而成熟之又以頓漸五味而度脫之並脫並熟並種番番不息大勢威猛三世益物也今是大乘根熟衆生注天龍八部天龍別名八部總稱總別兼舉也天一龍二夜叉三乾闥婆四阿修羅五迦樓羅六緊那羅七摩睺羅伽八人非人等總結八部記梵語提婆此翻天三界二十八天也那伽翻龍守天宮持地注雨等龍也夜叉翻勇健亦名暴惡飛空飛行守天城池門閣等也乾闥婆翻香陰不啖酒肉唯香資身是天主幢倒樂神也阿修羅翻無端正迦樓羅翻金翅緊那羅翻疑人似人而頭有角亦天伎神也摩睺羅伽翻大腹行即大蟒神腹行者也原佛道濟百靈慈育萬有三乘歸投八部翼衛餘無此德故無八部也注龍鬼等得預法會者乘急戒緩故大師準涅槃經云於戒緩者不名為緩於乘緩者乃名為緩之文遂開乘戒四句記涅槃經又言菩薩於此大乘心不懈怠是名本成為護正法以大乘水而自澡浴故菩薩雖現破戒不名為緩智者取此乘急戒緩之文於止觀中開成四句也本成者本所受戒如本不失也補文句言若通論戒乘一切善法觀慧皆稱戒乘人天五乘即是其義道共等戒悉是通義也今就別判三皈五戒十善八齋出家律儀乃至定共能防身口遮惡道果得人天報者名戒聞經生解觀智推尋諦緣度等智能破煩惱運出三界者名乘大品言有相之善不動不出無相之善能動能出是也若戒乘俱急者下品戒急報在人道持小乘急以人身於藏教時見佛聞法嚴持中乘以人身於通教大乘乃至帶方便諸大乘經時見佛聞法若持上乘以人身於華嚴法華等教及諸教中圓見佛聞法列為同聞衆也若中品戒急報在欲天若持小乘以欲天身於藏教時見佛聞法餘持中上乘如上説若上品戒急加修禪定報在色無色界持小乘急以色無色界天身於三藏中見佛聞法餘持中上乘如上説二戒緩乘急者三品戒皆緩報在三途若小乘急以三途身於三藏教中見佛聞法餘如上説三戒急乘緩者有戒受人天身無乘佛雖出世説法不見不聞舍衛三億家及諸不見聞者三界樂著諸天等是也四戒乘俱緩者受三途報不見佛不聞法也記華嚴疏鈔言一乘緩戒急者事戒嚴峻三種觀心不開以得戒故人天受生或隨禪梵世耽湎定樂世雖有佛説法度人於此類無益設得值遇不能開解二乘急戒緩者德薄垢重煩惱所使是諸事戒皆破理觀乘急信解諸法戒緩命終墮惡道中於諸乘中隨何乘急強者先牽若一乘急即聞華嚴等三乘戒俱急者具持衆戒理事無瑕於諸妙法觀念相續即於今生便應得道若未得道此業最強必升善處若一乘急即於人天身聞華嚴四乘戒俱緩者失人天報無得道期展轉沉淪不可度脫是則乘戒豈得偏向乎設有偏志者寧偏於乘也注如雲籠月月喻教主具智斷二德初一至十五謂之白月智光漸增故譬智德十六至三十日謂之黑月邪光漸減故譬斷德記準華嚴鈔月有四德合佛三法明是智德暗是斷德清涼是恩德應器周故亦是恩德今取黑白喻智斷二德也如大經月愛三昧光色增長譬十五智德摩訶般若光色損減譬十五斷德無纍解脫又言月性常圓實無增減因須彌山故有虧盈不增而增白月漸著不減而減黑月稍無法身亦爾因無明故約如論智如實不智約如論斷如實不斷無智而智般若漸明無斷而斷解脫漸離也據華嚴梵行品月體喻法身月光喻十五智斷謂三十心為三智斷十地為十智斷等妙二覺為二智斷合有十五智斷也注爾時如來指丈六身即境本定身也記輔行言止觀見佛相好一一文中皆言若見如來者皆以三藏如來而為境本於色相上四機所見不同故名境本定身也補三藏如來老比丘相即境本定身境是所見之境本為應機之本定乃一定之身如言只一金剛土臺成道四機各見不同生滅機見劣應身無生機見帶劣勝應身無量機見報身藏塵相好無作機見法身如虗空相雖機見不同只是丈六一定身也注現盧舍那身現即現起盧舍那翻淨滿謂諸惡都盡故淨衆德悉圓故滿自報亦翻光明遍照他報亦名尊特亦名勝應記淨滿者障淨為先德滿為後如言萬惡咸消衆善普會也梵網經疏言滿淨者德滿為先障淨為後所謂富有萬德蕩無纖塵也光明遍照指為他報者若據慈恩三藏釋則言身光智光內外照故目於報身通自他二報佛也尊特有上中下三品今指下品從丈六身現起千丈舍那也勝應如來應身相好有勝劣不同今指勝者華嚴佛有殊勝相好對劣名勝也注新譯華嚴云毗盧遮那妙樂九二十七破云近代翻譯法報不分二三莫辨文記新譯即唐實叉難陀譯盧舍那品譯為毗盧遮那品如來名號品中或名盧舍那譯為或名毗盧遮那清涼疏言毗即遍也盧遮那光明照義應言光明遍照今按所釋名義未嘗非但未明言教主是報身耳蓋遮那法身佛舍那報身佛釋迦牟尼應身佛又以二身言之遮那真身舍那勝應牟尼劣應勝劣均名應身是名二身也華嚴教主乃舍那譯為遮那則以法身為報身法報不分也又以真身為勝應二三莫辨也文句破言自古經論許有三身若毗盧與舍那不別法身即報身一切衆生無不圓滿法身有説衆生亦然若言果滿方説滿從報立若言不離三身俱然何獨法報又生佛尚且無二豈唯三身若論三身法定不説報通二義應化定説若其相即俱説俱不説若但從理非説非不説事理相對無説即説情同妙契諍計咸失是也補按毗盧遮那言遍一切處盧舍那言光明遍照牟尼言能仁寂默注然華嚴教主經疏諸文或云釋迦或云舍那者蓋是釋迦現起舍那故也而淨覺謂本是實報土身應下二土故解謗破云汝執藏塵為尊特相樹下之身有此相否故升須彌山頂品云爾時世尊不離一切菩提樹下而上升須彌向帝釋殿豈非華嚴是千百億應身所説此身既被別圓之機見是尊特何須獨指華臺受職身耶文蓋指千百億應身中之一身所説記此辨淨覺師偏説以定從劣現勝正意補淨覺云藥師淨名觀經之相皆應身不可指為法身唯華嚴藏塵相好為尊崇奇特以相多故也凡八萬四千三十二相皆從此實報尊特之身應下二土應八萬四千似方便應三十二似同居準此則彼意指華嚴藏塵相好為證得奇特不知華嚴十華藏世界微塵相好是應機現起即如來現起他受用十地菩薩所被機也故四明作解謗破云汝執藏塵為實報尊特相我且問汝華嚴菩提樹下三十二相之身有此奇特相否若謂是有何言三十二相是應下何言華嚴是實報身故知華嚴非本是實報身三十二相亦非應下明矣蓋樹下身未被別圓機時本無奇特相若被別圓機則於此身現起尊特故不可謂本是實報土身也以華嚴教主是現起身故言不離一切而上升須彌向帝釋殿上升即現起義豈非華嚴是千百億應身所説耶華臺受職者即實報土身若約所依名實報身以稱中道法性理感真實果報土也若約所證名華臺受職身華臺表法界理故報身盧舍那佛坐華臺若應身釋迦但坐蓮葉如籤言只以入實名華臺以內心入實故外處華臺玄文言始見我身初聞一實已入華臺皆指所證為華臺也受職者謂報身初坐千葉蓮臺寶華王座時十方諸佛齊放白毫來灌其頂受法王職也但此身有證得相有現起相淨覺所執是證得相四明所定是現起相故破言何須獨指華臺受職身耶蓋指下注家斷定四明意統紀言四明約機約教以定身者是樹下生身現起尊特應別圓機正合妙玄釋迦最初頓説釋迦是生身説頓是舍那亦合四教儀如來現盧舍那身説法之言備淨覺背宗因緣統紀內載須者往檢辨訛曰蓋指千百億至所説句雖約一閻浮提而論但意似局私謂四明是千百億應身所説句恐有未見千百億之難故玉師復申明一身也辨訛又曰實報土身應下二土之言本四明妙宗鈔語以經中八萬四千相好大師判為真法身觀故鈔言然此色相是實報身應同居土而特名法身者為成行人圓觀也後料揀中問尊特既是他受用報須入地住方見今八萬相似位能見驗非尊特合是生身答地住分證論見地住以前相似論見斯乃如來以實報身應下二土云云當知四明此言因他問意謂地住以上捨生身已入實報土方見尊特今圓行人在相似位處同居土焉能見之故答言如來應下使見而淨覺反宗破言華嚴藏塵相好是尊特是實報應下觀經八萬四千相好是生身非實報應下故解謗言汝執藏塵為尊特相樹下之身有此相否若言有應下義不成若言無何故華嚴有上升須彌等文耶足見藏塵尊特是釋迦現起應下之義不成矣而八萬四千尊特不然此由圓觀行人臺像圓觀既成所見佛身必非同居生身實報土身方是其境故如來以實報應下同居而使見之非入實報方能見也然鈔中乃是破立方便非是下二土所現諸身皆從實報應下也況鈔雖言以實報應下亦即於同居現起此義當知即華嚴從樹下釋迦境本現起其義亦然但華嚴現身説經觀經應行人現相其義稍異思之可知也又復現起應下義亦不殊如華嚴從境本發起觀經從三十二相常身常相發起是也故四明言有須現者即為現之則知應下義不殊也今但知是淨覺語不知出四明恣情縱破故略述此注月堂云境本定身則是釋迦機感見相乃是舍那此即釋迦境本定身現起舍那尊特也上品相好下品尊特二現言之正當須現記四明約教分三品尊特謂法華三十二相相相無邊即法身上品尊特觀經八萬四千中品尊特華嚴丈六發起舍那下品尊特又約相海分三品謂華藏塵相上品相海八萬四千中品相海三十二相下品相海次即言上品相好下品尊特此二皆現起相故曰二現言之正當須現補下品尊特以兼別機須當現起方有不能即劣顯法如法華微妙淨法身具相三十二也月堂法師諱詢字謀道依圓辨琛以正所學統紀曰準解謗説尊特身有須現不須現之分故須現如梵網華嚴及觀經等相多身大不須現則以力加令於劣身不取分齊見三十二相即無有邊以知丈六是法界故也注圓滿修多羅約圓實部主説釋籤云華嚴頓部正在圓真兼申別俗備八卷曰圓以不偏為義又言無有缺減名曰圓滿法華言唯佛與佛乃能究盡諸法實相即圓實也兼申別俗句乃文義未能截斷順帶引之非本節引用正意注修多羅翻契經聖教之都名若十二部中直説法相者名修多羅今非此意記契經者以經通教理教能契理理能契機也聖教都名者據經藏釋通名修多羅若十二部中名修多羅者義局故揀之注故言頓教結部屬頓也記此先結部屬頓下約教説二明機教三初機教兼權若約機約教未免兼權注機是所被教是能被機有別圓教兼權實記由所被之機有異故能被之教亦兼注輔行曰約部約味得名為頓部內之教教仍兼漸二雙示圓別二初為利機説圓教謂初發心時便成正覺等文為圓機説圓教記晉譯華嚴梵行品言觀一切法如幻如夢如影響化菩薩如是觀者以少方便疾得一切諸佛功德常樂觀察無二法相斯有是處初發心時便成正覺知一切法真實之性具足慧身不由他悟今引二句以明圓也注此釋能兼之圓如後釋記後九卷言初發心者初住名也便成正覺者成八相佛也注等文者等於三無差別之文記晉譯如來林菩薩偈言心如工畫師畫種種五陰一切世間中無法而不造如心佛亦爾如佛衆生然心佛及衆生是三無差別二為鈍機説別教處處説行布次第則為權機説別教注此釋所兼之別凡經文處處所説行列排布恆沙法門歷劫修行次第之義皆別教也記賢首品言菩薩住在三昧中種種自在攝衆生悉以所行功德法無量方便而開誘或以供養諸如來或以難思布施門或以頭陀持戒門或以不動堪忍門乃至言八萬四千諸法門諸佛以此度衆生所謂行列排布恆沙法門也又言或一念頃修普賢行而成正覺或須臾頃或一時或半月乃至不可説不可説劫修普賢行成正覺此歷劫修行次第義也注今文欲顯部中機教兼權故指經中別圓各説顯文為證若別圓間説及分圓即別融別即圓義非一概也記籤文曰華嚴所明位行不出別圓始從住前至登住來全提圓義從二住至七住文相次第又似別義於七住中又辨一多相即自在至行向地又明次第別義此證別圓間説意也若其間分圓即別融別即圓者乃圓融不礙行布行布不礙圓融故以義非一概總結補光明玄記言聞説三身具乎三德失意者分隔即別得意者互具即圓融別即圓分圓即別也三雙結二約故約部為頓注此結從部為頓約教名兼注此結部中機教兼權記雙結部教二約時判此經中云譬如日出先照高山第一時注晉譯華嚴三十五寶王如來性起品文有四照合法有五補晉譯性起品曰譬如日出先照諸大山王次照一切大山次照金剛寶山然後普照一切大地日光不作是念我當先照諸大山王次第乃至大地但山有高下光有先後如來亦復如是成就無量無邊法界智光先照菩薩次照緣覺次照聲聞次照決定善根衆生隨應受化然後普照一切衆生乃至邪定又唐譯出現品言譬如日出先照須彌等諸大山王次照黑山次照高原然後普照一切大地乃至如來亦復如是常放無礙智慧光明先照菩薩等諸大山王次照緣覺次照聲聞次照決定善根衆生然後一切衆生乃至邪定亦皆普及為作未來利益因緣令成熟故注今家約義引經但作三照又復義開平地為三用對涅槃五味妙玄一六釋籤一十七記妙玄曰如日初出前照高山厚植善根感斯頓説良由小不堪大亦是大隔於小此如華嚴約法被緣緣得大益名頓教相約説次第從牛出乳相次照幽谷淺行偏明當分漸解此乃小隔於大大隱於小約法被緣名漸教相約説次第名酪味相次照平地影臨萬水逐器方圓隨波動靜示一佛土淨穢不同示現一身巨細各異一音説法隨類各解恐畏歡喜厭離斷疑神力不共故見有淨穢聞有褒貶嗅有薝蔔不薝蔔華有著身不著身慧有若干不若干此如淨名方等約法被緣猶是漸教約説次第生酥味相復有義大人蒙其光用嬰兒喪其睛明夜遊者伏匿作務者興成故文曰但為菩薩説其實事而不為我説斯真要雖三人俱學二乘取證具如大品若約法被緣猶是漸教約説次第熟酥味相復有義日光普照高下均平若低頭若小音若散亂若微善皆成佛道不令有人獨得滅度皆以如來滅度而滅度之具如今經若約法被緣名漸圓教約説次第醍醐味相當知華嚴之譬與涅槃義同釋籤言初文五味者還約華嚴日照三譬開為五味然五味轉變只是一乳三照不同只是一日今演華嚴平地之譬以對涅槃後之三味雖數不等其義宛齊又涅槃以牛譬佛乳從牛出譬佛初説大乳出已後其味轉變猶成分譬義立五味又華嚴日譬於佛光譬説教日無緣慈非出而出衆機所扣非照而照故使高山幽谷平地不同同稟教光終歸等照故用兩經二義相成備恐畏歡喜等即四悉檀解二卷大人蒙光籤曰菩薩大人蒙般若光諸法之用二乘如七日嬰兒若視日輪令眼失光名喪外人暗證如夜遊菩薩利他如作務注別行義疏記云彼經預敘一代始終故立譬云猶如日出先照高山次照幽谷後照平地今家義開平地為三對於涅槃五味文記此引以證成三照對五味之義注日譬於佛光譬説教照物譬被機高山譬別圓衆此譬兼於機應也記佛必感機應而説故喻兼機應如言佛不出世萬古長夜及至出現光明遍照極於幽暗悉皆大明所以日譬佛也光從日出譬教從佛説也物得日光能消長機稟佛教有損益所以照物譬被機也高山卓出餘峯別圓超越藏通所以高山譬別圓衆也備此節應列於首以消本節儀文喻意然後引晉譯華嚴等文氣似貫注若釋籤用兩經二義相成者旻智行云若不用涅槃五味則不顯華嚴演三成五若不用華嚴三照則不顯涅槃後之四味皆從牛出備此明釋籤用兩經二義相成復引旻師語以證注舊謂今家合四為三而諸文直作三照引經何嘗云合四耶補舊謂合四為三指統紀列三照五時五味圖中特標言妙玄合四為三意謂玄文合經中次照一切大山次照金剛寶山為幽谷一照以成三照故言合四為三其實玄文準經立義而作三照並無合四之語也注又有以經中譬如日月出現世間乃至深山幽谷無不普照之文謂是經文合四為三殊不知此文只是照幽谷也記經指華嚴由此文連四照五合文後便謂合四為三以前四照為三合足此一文為一合為四合也殊不知下出正意謂若以此文為合四經應頌出既經但頌前文四照五合則知此一節文只是照幽谷也補謂經文合四為三亦指統紀列圖後引經四照以證又於四照文末引經云譬如日月出現世間乃至深山幽谷無不普照特注云玄文合大山寶山為幽谷其文出此豈非謂諸節經文乃是合四為三文耶但前言舊謂此言又有是玉師回護意以統紀於今家甚有功然恐後莫辨故點明之備統紀合四為三以經有高山大山寶山平地四種玄文作三照恐遭詰難故引深山幽谷無不普照以證玄文合大山寶山為幽谷其文出此固屬別字微意玉師以合四為三妙玄無顯文不必泥定合四也故於後相成圖中以約義引經釋之記中以前四照為三合足此一文為四合及經應頌出等所解甚拗研集注意亦未然或舊有此説存俟考定經文四照約義引經但作三照三照五味相成圖補決定善根衆生乃事六度菩薩三僧祇決定成佛故曰決定廣修六度名善根而未斷惑且名衆生然華嚴合法文中列次照聲聞後普照一切衆生前佛意只以一類伏惑行因菩薩為決定善根衆生本不明是菩薩屬何教也玉師既判屬三藏理應四照內牽入中間兩照或以中間兩照但對聲聞緣覺則普照大地亦應只對一切衆生以譬中言然後普照一切大地法中言然後普照一切衆生正相敵對如謂普照義寬故可牽入大地之下若爾今家取日照平地止對後三時又如何消通耶據理既上牽入普照下應入於平地下既牽入幽谷上應入於中間兩照不惟令人易明且與經義相合也或言以未斷惑牽入平地不住凡夫牽入幽谷此乃臆度恐未符經義也備三照五味圖統紀已列然經曰先照菩薩次緣覺次聲聞次一切衆生牽線中應緣覺在先聲聞在後始與經符統紀圖內列大山寶山牽入聲聞在先配幽谷緣覺居次配平地食時將決定衆生配禺中復將決定衆生注明藏菩薩其中緣覺聲聞與經倒列一也菩薩根利二乘蒙照應在先經雖不開藏菩薩應攝在二乘內或攝入先照菩薩中今判決定衆生乃藏菩薩友致利根後照二也緣覺菩薩利於聲聞乃下牽配入平地三也玉師仍以決定衆生乃藏菩薩但配入平地究為未妥故同緣覺改牽幽谷而聲聞緣覺雖分配大山寶山依舊與經倒列總由善根衆生是藏菩薩其勢必須聲緣菩薩挨順而列矣辨訛曰當以緣覺居先聲聞居後私謂清涼師疏鈔黑山配緣覺高原配聲聞大地內合配決定不定邪定三聚衆生則決定一聚通指因中正定衆生惟經中係與緣覺聲聞一連之文似當合入幽谷一切衆生乃至邪定緊對普照大地句研兩然後字界限自清故別作圖説以備參考黑山配緣覺等義疏鈔廣明須者往檢又節義言準經應緣覺在先今依三車次第故先列聲聞大地中開出決定衆生者此是事六度菩薩以未斷惑且讓二乘高出一頭但名衆生而其心行已大雖未斷惑同是鹿苑三乘故牽入幽谷一切衆生通指十界之機未起宏誓願行之人也私謂新作圖説依節義意判決定屬藏菩薩亦通但不可泥定衆生二字謂須合入大地以佛亦稱尊極衆生也圖説中不列旁追二誘等者此圖本明華嚴三照以對涅槃五味如此圖説於義已足且旁追等專指一類小機備歷五時者言今華嚴三照統論大小衆機不必夾入旁追等喻配合如以時味義富亦可備列俾無疏漏來哲再定之緣覺聲聞對凡夫則為大機故合入一切大山決定善根有金剛寶義故合入金剛寶山一切衆生機衆先後得益不定先即食時次禺中後正中故開亦無礙所對時味但可取相生次第如下所引無垢藏王一節經意也三約味判涅槃云譬如從牛出乳此從佛出十二部經一乳味注牛譬於佛乳譬於教釋籤云此五味相生之文在十三卷聖行品末佛印無垢藏王菩薩竟云譬如從牛出乳乃至醍醐譬如佛出十二部經乃至涅槃補大經無垢藏王言諸佛菩薩成就智慧功德實不可説我意猶謂故不如是大乘經典何以故大乘經典能出生阿耨菩提佛言譬從牛出乳乳出酪酪出生酥生酥出熟酥熟酥出醍醐佛亦如是從佛出十二部經從十二部經出九部修多羅從修多羅出方等典方等出般若般若出大涅槃注十二部經頌曰長行重頌并授記孤起無問而自説因緣譬喻及本事本生方廣未曾有論議俱成十二名廣如大論三十三記大論言諸經中直説者名修多羅授記者衆生三乘六趣九道中受記諸佛法欲與衆生授記先皆微笑無量種光從四牙出從上二牙出者光照三惡道得遇斯光聞説法者身心安樂得生人中天上從是因緣皆得畢苦從下二牙出者上照人天乃至有頂此諸光明復至十方遍照六道作佛事已還繞身七匝若記地獄光從足下入記畜生從腨入餓鬼從䏶入人道從臍入天道胸入聲聞口入辟支眉間入若記作佛光從頂入佛欲受記先現此相然後弟子發問一切偈名祇夜六句三句五句多少不定亦名祇夜亦名伽陀優陀那者名有法佛必應説而無有問者佛略開問端如佛自説無我無我所是事善哉一比丘白佛言云何是事善哉佛告比丘凡夫人未得無漏道顛倒覆心故於無我無我所心大驚怖若佛弟子聞好法者歡喜奉行無顛倒故不復更作如是等雜阿含中廣説尼陀那者説佛本起因緣佛何因緣説此事修多羅中有人問故為説是事毗尼中有人犯是事故結是戒一切佛語緣起事皆名尼陀那阿波陀那者與世間相似柔軟語如是語經者如一獅子來禮佛足佛告比丘是師子毗婆尸佛時依婆羅門來至佛所大衆之中以聽法故無共語者即發罵言禿輩與畜生何異惡口業故九十一劫墮畜生中此人爾時即應得道以愚癡故自作生死長久今於佛所心清淨故當得解脫如是等經名為出因緣何名因緣是事之本名因緣本生經者過去世時菩薩身為赤魚自以其肉施諸病人如是等無量本生多有所濟名本生經廣經者名摩訶衍所謂般若經華手經法華經等如是等無量阿僧祇諸經為得阿耨多羅三藐三菩提故説未曾有者如佛現種種神力衆生怪未曾有所謂佛生時如是等無量希有事論議經者答諸問者釋其所以又復廣説諸義如佛説四諦何等為苦聖諦所謂生苦等八種苦廣解其義復次佛所説經論議及摩訶迦旃延所解經乃至像法凡夫人所解經亦名優波提舍備祇夜伽陀分別見下節此依大論録出其文注華梵名義具如妙玄六記妙玄言修多羅翻契經即長行祇夜翻重頌和伽羅翻授記伽陀即孤起優陀那翻無問自説尼陀那翻因緣阿波陀那翻譬喻伊帝目多伽翻本事闍陀伽翻本生毗佛略翻方廣阿浮陀達摩翻未曾有優波提舍翻論議此十二種俱稱部者各有類從也注此十二部經通論大小各具十二部記解深密經明菩薩依十二分教修奢摩他瑜伽論言佛為聲聞一一具演十二分教注別而言之小乘讓三存九小乘灰斷無方廣經説必假緣無無問自説雖有授記作佛者少此以小九望大三也玄文又以大九望小三者謂大乘根利無因緣譬喻議論之三也又以大一望小十一者謂小乘但讓廣經一部耳記小讓三者妙玄言小乘灰斷無如意珠身故無廣經又言小乘根鈍説必假緣少無問自説雖有授記記作佛少大無三者涅槃經云護大乘者受持九部謂因緣中取因事制戒於譬喻中依為誘引於議論中約非了義也又小有十瑜伽論言無方廣者大乘説如來是常一切衆生皆有佛性正理為方包富為廣又理融無二亦名為等聲聞所無也注釋籤云如上所説一往赴機據理應以通説為正記玄文云通語大乘何得無此三耶又曰小乘亦有記莂六道因果阿含授彌勒當作佛記亦有自唱善來即無問自説又聲聞中以法空為大空空即方廣故以通為正也三引證二初引經徵起二初引經信解品云即遣旁人急追將還窮子驚愕稱怨大喚等注譬喻周中四大弟子具領五時今領華嚴文也記法華有法説喻説因緣三周今正喻説周文也注即遣説華嚴教以擬宜也約教理為所依智為能遣教為所遣約人師弟相望佛為能遣菩薩為所遣記初約教明遣教依於理以理為所依而智必照理鑑機方有説故以智為能遣教為所遣次約人明遣可解注旁人約教理智為正説教為傍約人化主為正菩薩為旁記教依理而用智説故以理智為正菩薩從佛轉法輪故約人為傍注謂加被四菩薩説四十位法慧説十住功德林説十行金剛幢説十向金剛藏説十地是四菩薩説此位時並云佛力故説故名為遣然加被四菩薩者一表旁追義便二彰主伴互融記加被有二顯加具於三業冥加但與智令説第二會普光七重會普光八三會普光九會入法界但有冥加餘五會皆冥顯二加然冥未必有顯顯必有冥心冥至極故感佛加經言以三昧力感十方諸佛現前也四位各説經明法慧菩薩入無量力方便三昧故佛告言由汝所修諸善根力令汝入此三昧説十住法功德林菩薩入善思惟三昧故佛告言以汝思惟一切行願力故令汝入此三昧説十行法金剛幢菩薩入智光三昧故佛告言由汝智慧清淨令汝入此三昧説十向法金剛藏菩薩入智慧光明三昧故佛告言以汝勝智力令汝入是三昧説十地法也並言佛力故説者法慧告天帝言此義甚深難説難知雖然我當承佛威神力而為汝説故名為遣也一表傍追義便者即遣正傍追義二彰主伴互融者謂果主因伴遞互相望重重無盡彌顯圓融備主伴互融此華嚴事事無礙宗旨順帶引耳辨訛曰雖言互融但可以果主果伴果主因伴因主因伴互論不可以因主果伴説也注急追將還直將大教擬宜小機故云急追昔有大種故曰將還況復性德本有記如來於大通智勝佛所為沙彌時曾與六百萬億恆河沙衆生結圓頓種子今成正覺直將大教擬宜為急追昔有大種今説大教為將還又無漏性德本來具足今熏其本有故言將還注窮子無大乘功德法財故備體色即空假中不起滅定現諸威儀是大乘功德法財今滅色趣空不窮何待注驚愕文句六二十一云縱昔曾發廢久不憶卒聞大教乖心故驚不識故愕記此釋驚愕也二乘向小已久今卒然聞大與其現習相乖茫然不識故生驚愕注稱怨大喚文句六二十一云小乘以煩惱為怨生死為苦若勸煩惱即菩提即大喚稱冤枉若聞生死即涅槃即大喚稱苦痛記小乘以苦集為勞為患以道滅為修為慕則煩惱為怨生死為苦明矣華嚴發明煩惱即菩提生死即涅槃是以所厭為所修所患為所慕豈不稱怨喚苦耶注等者等於我不相犯何為見捉之文記約法謂我本不求大何意用大化我二徵起此領何義注徵此信解品文為領何等之義二答釋所領答諸聲聞在座如聾啞等是也注答出華嚴擬宜也謂有耳不聞圓頓教故如聾有眼不見舍那身以不見故不能讚嘆故若啞記此引經以證聾啞也華嚴入法界品言上首諸大聲聞舍利弗等在逝多林皆悉不見如來神力等亦復不見難思菩薩境界何以故善根不同故本不修習見佛自在善根本不得諸菩薩眼所知境界以是因緣諸大聲聞不見不知不聞不入雖在林中不見佛大神變所謂日月輝天盲者不見雷霆震地聾者不聞是也注問妙玄十草三云華嚴初分永無聲聞今何云聲聞在座耶答華嚴不入二乘人手聲聞若聞華嚴則非聲聞故不可云有若據華嚴擬宜小機其最鈍根具經五味故不可云無是則顯對則無擬宜則有今四大弟子領解如來擬宜之時故云聲聞在座也所以摩訶迦葉卻敘小機蒙大擬時迷悶躄地若聾啞文出經後分妙玄云後分則有後分狀當聾啞況前分耶故別行疏記云以後顯前機未堪大記顯對則無擬宜則有斷定二乘不聞華嚴而如來擬宜非無聲聞如文句言即遣旁人疾走往捉是勸門擬宜窮子驚愕是勸門無機強牽將還是誡門擬宜窮子自念無罪以至悶絶躄地是誡門無機今據擬宜説故言聲聞在座出經後分指華嚴入法界品文也準不思議境界經云舍利弗五百聲聞皆是他方極位菩薩今在逝多林會迹示聲聞據華嚴經文殊逝多林出時舍利弗語比丘言汝等且觀文殊相好威儀等觀舍利弗語辭示現未能悟故狀當聾啞以此義有二一者顯如聾啞二乘人於三七日中不聞説法但見默然二者狀當聾啞釋籤云有耳不聞顯如聾者眼不見故不能讚嘆義如啞者玄文所云前分永無聲聞據顯見三七默然者説後分則有據狀當不聞不見者説但後分尚然況前分耶別行疏下證成前分機未堪大備統紀云三七是擬機者人無異論然玄文云於彼初分永無聲聞後分則有雖復在座如聾如啞故神智義據玄文非之曰初分永無何所擬哉今二義釋之一初分永無乃如來擬宜之化意二後分則有狀如聾啞乃如來擬宜之化事化意者方便品云始坐道場三七思惟籤云約大機則寂場之時約小機則成已思惟未説之時妙樂云小見三七停留大覩始終無改是也化事者文句云華嚴末席始開於漸妙樂引經云佛在逝多林舍利弗不見如來自在莊嚴不見諸大菩薩眷屬無智眼能見亦不能讚嘆此即如啞等文於彼末會即當漸初今考祖言聾啞皆指在後分漸初明是鹿苑十二年中例如妙玄謂方等彈訶應在十二年前則知逝多林末會正是擬宜之事以由聲聞先習小乘未堪聞大狀如聾啞故假淨名以激進之是則擬宜彈訶俱在十二年中無可疑者四教義以聾啞在華嚴彈訶在方等此但約部中而論其實未為正意私謂統紀引祖言聾啞皆指後分固是但小見停留顯如聾啞見即在座前分亦通并可説為擬宜無機化事至聾啞在華嚴彈訶在方等此乃判別五時以分説法次第若鹿苑亦有擬宜彈訶似通五時義也注昔慧覺謂前分乃有根性聲聞此則不可若云聲聞根性義亦有之如下文云所謂二乘根性在華嚴座也記舊説前分聲聞乃有大乘根性故雖在座如不見有也此則下正遮出正補玉師意以聲聞必回小向大方可言大乘根性最初三七安有此類也故曰不可備二乘據下文應言三乘有師標云慧覺謂根性聲聞者意以前分雖無小人聲聞必有大人聲聞如法華真如聲聞等不知法華開顯故言汝等所行是菩薩道以佛道聲令一切聞乃真如聲聞也華嚴前來未説又未開顯豈有大人根性聲聞耶私謂初句似指顯對者言故不可次句指擬宜者言故有之慧師傳檢統紀二漸教三初總標第二漸教者此下三時三昧總名為漸注次頓之後總明三漸者寢頓施漸也二別釋三初鹿苑四初約部判二初寢頓施漸二初對機示處次為三乘根性於頓無益故不動寂場而遊鹿苑注三乘乘以運載為義聲聞以四諦為乘緣覺以十二因緣為乘菩薩以六度為乘運出三界歸於涅槃記此對機設部教也諦緣度解下藏教所乘雖異同出三界同斷見思入有餘無餘二種涅槃也注根性輔行云能生為根數習為性記根有出生義性以熏習成注於頓無益此三乘人於華嚴座不信不解是故如來不動寂場而遊鹿苑此顯雙垂兩相二始同時也記華嚴出現品曰一切二乘不聞此經何況受持又言設有菩薩於無量劫行六波羅密不聞此經或聞而不信不解不順不入不名真實菩薩故列於非器也不動寂場而遊鹿苑者如來神力不共隨機應現寂場説頓教之始即鹿苑説漸教之始非前非後故言雙垂兩相也補統紀言諸文所論初頓後漸是化緣施設儀式今説大小雙應方盡鑑機度生之意二以喻顯身脫舍那珍御之服著丈六弊垢之衣注此明寢大施小化儀次第也記此即信解品遙見子身羸瘦憔悴即脫瓔珞細軟上服嚴飾之具更著粗弊垢膩之衣乃至以方便故得近其子等文注約佛意則寢法華之實而施權據化儀次第則寢華嚴之頓而施漸記華嚴之圓即法華之實我佛本意欲令衆生開示悟入一乘實相而已根器未堪故施權也注處説不動而遊衣論脫珍著弊文互顯耳然若不明不動而遊無以見二始同時不明脫珍著弊無以見寢大施小此文曲盡如來妙應無謀設化之相也記二文互顯不可脫一始曲盡佛之妙應也注舍那勝應尊特智定莊嚴故譬珍御丈六劣應生身忍生法惱故譬弊垢蓋法譬雙明也記尊特首楞大定種智大慧而自莊嚴劣應生滅之身則為蚊蝨有情寒暑無情之所逼惱備有師標曰妙樂忍有情惱為生忍忍無情惱為法忍大論言忍諸恭敬供養及諸煩惱淫欲為生忍忍其恭敬供養及嗔惱欲法為法忍二息大施小二初垂世成道示從兜率降下託摩耶胎住胎出胎納妃生子出家苦行六年已後木菩提樹下以草為座成劣應身注此明小始也本是圓佛垂為三藏初成之相故云示也兜率翻知足此天有內苑外苑菩薩居內苑而降神也然在六欲梵世七天之中以佛常居中故記兜率陀翻妙足或譯覩史陀翻知足受欲知足故佛地論名喜足最後身菩薩於中教化多修喜足故楞嚴明此天不接下界諸人天境乃至劫壞三災不及唯內苑可爾故菩薩居之佛常居中者大論言若於下地生命短壽終時佛未出世若於上地生命長壽未盡佛出世時過惟兜率天壽與佛世出時會故復次佛常居中道故兜率於欲天梵天中上三下三於彼天下生中國中夜降神中夜出國行中道得菩提中道為人説法中夜入無餘涅槃是也注從彼下生托摩耶胎摩耶翻天后淨飯王之后也妙樂云一切諸佛皆不在餘二賤姓故尚尊貴時在剎利尚多聞時在婆羅門又濁難調時在剎利清易調時在婆羅門文記大論云菩薩末後身從天上來者乘上道故又從天下時種種瑞應又人敬重天故論又云菩薩將欲下生先觀生處唯迦毗羅婆國淨飯王后能懷後身菩薩也下引妙樂釋明剎利乃帝王種族為世尊貴婆羅門是通博淨行為世多聞又剎利有勢能調劫濁婆羅門無諍得調時清諸佛隨時所貴即於中生今釋尊世正尚尊貴又當劫濁衆生剛強難化故也注托胎菩薩自有脅入正慧托胎小乘見乘白象貫日之精大乘見乘楞檀樓閣等記大論問人以垢心有相續入母胎一切邪慧相應云何菩薩正慧入母胎答菩薩憶念不失故入胎中陰中住知中陰中住入胎時知入胎歌羅邏時知歌羅邏乃至出生時知出生是也小乘見者如大莊嚴經云化作白象降神母胎又須菩提偈言其形如白象四足有六牙來入母胎時如遊園觀想是也大乘見者華嚴經云毗盧遮那菩薩已從此沒生於人問淨飯王家乘栴檀樓閣處摩耶夫人胎是也補象是象王有大力用表菩薩能荷負衆生也貫表析空觀日表偏空理以二乘修空觀齊己分量見也栴檀樓閣者表色心無礙身土互融以菩薩修中觀齊己分量見也備辨訛曰白象貫日出普曜經屬大乘乃大小乘共見也存考補中象王樓閣等解亦存考注住胎若小乘八相合住胎在托胎內今示小始垂化事迹非正明八相也記小乘八相解見七卷住胎今帶説補因果經云菩薩在母胎晨為色天説法日中為欲天説法晡時為鬼神説法夜三時亦如是備辨訛日小乘中住胎無説法事故不開私謂不開當依七卷小乘不談常住解注出胎四月八日右脅降神出瑞應經記瑞應經云自夫人懷妊天為獻供不享王厨四月八日從右脅生即行七步舉右手曰天上天下唯我獨尊三界皆苦何可樂者是時天地大動宮中盡明梵釋天神於空中侍四天王接置金几以天香湯浴太子身身黃金色三十二相光明徹照極佛境界莫不大明天降瑞應三十有二一者地為大動丘墟皆平乃至第三十二樹神人現低首禮侍此時疆場左右莫不稱奇歎未曾有是出胎相注納妃有三一瞿夷二耶輸三鹿野記十二遊經云菩薩婦家姓瞿曇氏舍夷長者名曰水光其婦母名月女生女時日將沒餘明照其家因名瞿夷是第一夫人若第二夫人生羅雲者名耶惟檀即耶輸父名耶施長者第三夫人名鹿野父名釋長者注生子即羅睺羅也佛出同居示同人法記大經四相品迦葉問何緣復衲耶輸生羅睺羅乃至當知如來未度諸結大海佛告迦葉菩薩示現如是無量神通變化一切衆生無能測量汝今云何能知如來習近愛欲生羅睺羅善男子我已久住是大涅槃示現是也注出家時年十九二月十五日夜半乘天馬踰城記大莊嚴經云菩薩自思煩惱曠野生死河中若不修行終難出離於衆睡後即呼車匿備馬去來帝釋開門四王捧足釋梵引路詣大仙林取劍落髮又有説太子見老病死回宮思惟欲免是苦其夜見諸妃女狀若死尸愈加起厭又見四天王在窗隙中報出家時到遂即開窗靸天白馬踰城到跋伽婆仙人林中剃髮備辨訛曰乘宮中馬天捧馬足故曰天馬非天上之馬也私謂統紀亦同然記中靸天白馬一説則異想機見不同耳注苦行須六年者文句七十九云但諸佛道同為緣事異釋迦苦行六年草生攢䏶至肘不覺諸天哭喚動地不聞移座得道彌勒即出家日成道彼佛十劫猶不現前非根有利鈍道有難易緣宜賖促應示短長耳文輔行云六年苦行所以伏見為調外道過其所行文頌云十九踰城六苦行五歲遊歷三十成説法度生五十年是則共當八十壽記經云十方諸如來同共一法身一心一智慧力無畏亦然此道同也事異以三佛別明謂釋迦至象頭山同外道食麻麥六年草蔓生延蔟聚於䏶至臂節亦莫覺諸天見眷屬日減痛哭叫喚動地修世禪故亦復不聞及太子自思苦行非真解脫吾當受食成佛故移座成道也彌勒下生經佛言四海漸減三千由旬是閻浮地長十千由旬廣八千由旬平坦如鏡種種莊嚴城中有大婆羅門主名妙梵婆羅門婦名摩提婆彌勒托生為父母身紫金色二十二相身長千丈胸廣三十丈面長十二丈四尺肉眼見千由旬常光四照百由旬穰佉王奉七寶臺施彌勒彌勒施婆羅門見其毀壞修無常想出家於龍華菩提樹下樹莖枝葉高五千里即以出家日得道彼佛十劫者法華經云大通智勝佛十劫坐道場佛法不現前是也準此則知釋迦緣事宜賒故苦行六年輔行引大論云外道苦行或三月半歲一歲無能六年日食一麻一麥者又言佛若不行六載苦行呵其非道無人信受以苦行過人成佛呵其苦行人皆信受或問頌言十九出家三十成道梵網經言七歲出家三十成道何也答發隱云大聖示現有何常規有言太子入檀特山修道始於阿藍迦藍處三載學不用處定知非便捨復至頭藍弗處三載學非非想定知非又捨後至象頭山同外道食麻麥六年受食成佛是則頌言十九出家三十成道共十二載正與三處修道歲數同然與頌言五歲遊歷又似有異仍當以示現無常規釋也補統紀曰瑞應因果本起大論並云十九出家四阿含出耀經和須密論並云二十五出家當何所從今以八十壽除五十載説法定取梵網無相三昧寶藏經等三十成道除六載苦行定取荊溪二十五出家合寶藏經二十五出家三十成道之説若約前後義定有二事可證一者出家後六年苦行取成道之歲數合二者將出家時指妃腹曰却後六年汝當生子後於成道歲果生羅睺未曾有經云太子逃至山澤勤苦六年得佛還國賢愚經云出家六年苦行得一切智又普耀經云父王聞太子得佛六年令優陀那往請言濶別以來十有二年又言佛還國羅雲問訊羣臣疑太子捐國十二載何從有子此等經文皆約出家六年成佛又經六載還國以上統紀文至孤山頌五歲遊歷或指阿藍三載頭三載備源師曰梵網經七歲出家歲字古有作年字解者甚妙然合下句三十成道則當以二十五出家為準總之如來示現既無常規又西域諸紀歲時日或有參差流傳結集不無同異更復翻譯難齊闕疑而已後賢不必於此辨論見長也辨訛曰草生攢䏶等出觀佛三昧海經因入滅意定故不聞不覺此屬後教若三藏菩薩既伏惑行因則不能入滅受想定須引三藏佛本行經為妙但彼無草生攢䏶等事又本行經菩薩入不動三昧即第四禪以息不行知他心法下不知上天謂命終故哭也私謂草生等語今注乃引文句用也注木菩提樹菩提翻道佛於樹下成道故名道樹草座因果經説帝釋化為吉祥童子以草施佛坐以成道記因果經云釋提桓因化人執淨軟草菩薩問汝名何等答曰吉祥菩薩歡喜我破不吉以成吉祥汝草可得否吉祥授草發誓成道願先度我菩薩結跏趺坐如過去諸佛坐法誓言不成正覺不起此座注木樹草座皆表三藏詮生滅故記草木春生夏長枯冬落故注劣應對大乘勝應判為劣也記勝應即大乘菩薩他受用身劣應丈六身也二應機設教初在鹿苑先為五人説四諦十二因緣事六度等教注五人頌曰頞跋提并俱利此三屬在父之親陳如十力母之親初轉法輪先度此記此頌出釋籤法輪一運轉義文句言以佛心中化他之法度入他心名轉法輪二摧碾義輔行言以四諦輪轉度與他摧破結惑如王輪寶能壞能安法輪亦爾煩惱怨壞安住諦理也初轉婆娑云轉法輪有二種一在自身二在他提身菩樹下是自身轉法輪波羅奈國隨他身轉法輪以他身中初轉法輪故言初也先度五人者鹿苑有三番度人法數言初為陳如説四諦得道次為額跋提説布施生天福樂同證果三為迦葉俱利如前説皆得聖道注文句五五云問何故初為五人轉法輪答人先見諦故人是現見故人為證故佛所行事業與人同故諸天從人中得善利故人中有四衆故記婆娑言人先見諦天在後故人是現見天非現見故人以為證不以天為證故佛所行事與人同故諸天亦從人中得善利故人中有四衆故注妙樂五三十一云問雖涉五意正在人故皆以人答文記問中雖但涉五人意實通為一切人注若唯就五人應有三意妙樂一十六云一酬釋尊行因本願二赴五人本願先悟三報今日侍奉之勞記釋尊行因本願者妙樂云歌利王割截時佛發願得道先度之歌利王即陳如又輔行言佛昔飢世化大魚木工五人先斫肉佛誓先度也五人本願者妙樂云迦葉佛時九人學道五人未得果誓釋迦法中最先開悟也今日侍奉者妙樂云太子學道父遣五人追侍得道先為説四諦也法華文句五注摩男長子之通稱以摩訶翻大故俱利斛飯王之長子跋提甘露飯王之長子故皆稱摩男記教乘曰四王有八子一淨飯王二子一悉達二難陀二白飯王二子一調達二阿難三斛飯王二子一摩訶男二那律四甘露飯王二子一跋提二提沙文句摩訶俱利即教乘摩訶男備辨訛曰按摩男男字亦梵音故有處言摩訶納也跋提諸經皆言甘露王次子私檢大藏一覽引起世因本經言淨飯二子一悉達一難陀白飯二子一帝沙一難提沙斛飯二子一阿尼婁馱一跋提梨迦甘露飯二子一阿難陀一提婆達多是跋提生父亦屬不同但儀文準籤釋摩男是陳如以為佛最長子故稱摩男則摩男當為長子之通稱並非臆説即法數引為甘露長子當亦有所本其諸經不同之處想如前説流傳結集翻譯之故也注釋摩男即陳如也如四姓出家同名釋氏佛初成道最先得度在一切人天羅漢之前如妙樂一三十七引分別功德論曰佛最長子即陳如也記妙樂云拘鄰最初見佛道相在一切人天羅漢前故稱釋摩男也如妙樂下引證論言五百羅漢各有所便或智慧或神足或辨才或福德或守戒或知足或説法各據第一論先兄後弟者拘鄰最長須跋最小故最長子即陳如也注諦緣度三具在下文五人是聲聞只應説四諦今通舉鹿苑所説之法也記下文指下藏教注事六度者三藏教談實有事不即理故記大品明六度有二一有所得心行六度二無所得心行六度今事六度即有所得心行不具足六度也二約時判若約時則日照幽谷第二時注舊譯華嚴出現品云譬如日月出現世間乃至深山幽谷無不普照文記此約時也注輔行一上二十八云幽谷者山川之幽邃也文記邃深也三約味判若約味則從乳出酪此從十二部經出九部修多羅二酪味注從乳出酪蓋譬如來施教次第從頓施漸相生之義若約機者濃淡在焉備此約味也從頓施漸為相生釋約小機轉凡成聖如轉乳成酪為濃淡釋注如下文云一者但取相生次第二者取其濃淡備詳解見二卷注從十二部出九部亦且相生其實九部從佛出也記相生之言出涅槃聖行品今亦且論相生從十二出九也其實從佛所出經言我此九部法隨順衆生説是也四準經判二初引經徵起二初引經信解品云而以方便密遣二人聲聞緣覺形色憔悴無威德者汝可詣彼徐語窮子雇汝除糞記此準法華判也信解品言爾時長者將欲誘引其子而設方便密遣二人形色憔悴無威德者汝可詣彼徐語窮子此有作處倍與汝直若言欲何所作便可語之雇汝除糞我等二人亦共汝作注而以方便方法也便用也善用其法逗會衆生亦善巧之謂也記善以權宜巧逗衆生是方便義注密遣文句六二十三云初擬大乘云即遣旁人表一實諦一大乘教一菩薩人今明方便隱實為密指偏真為遣約教隱滿字為密半字為遣約人內祕菩薩行為密外現是聲聞為遣約化儀寢大施小為遣小不測大為密文記此引華嚴即遣對釋本文密遣表一實諦者五時除阿含俱明實諦今但指華嚴兼別説圓為一實諦也一大乘教者即華嚴圓別教也一菩薩人者即一類大機菩薩也今明下正釋密遣約方便則以實為所隱故為密偏真所指故為遣妙樂云今明密遣者覆實名密用小為遣也約教者滿字頓教隱而不説為密半字漸教用以説示為遣也約人者如經言是故諸菩薩作聲聞緣覺是也約化儀者説法施小為遣小機不測為密也注二人文句六二十三云四大弟子齊己分領不涉菩薩故言二人約法是因緣四諦約理是有作真俗約人是聲聞緣覺文今且約人記四大弟子齊己分領安住聲緣故言二人因緣即生滅四諦有作真俗者析色空是有作真理外所有是有作俗也注形色憔悴文句六二十三云二乘教中不修相好但説苦空無常不淨即形色憔悴又二十五云內怖無常曰憔外遭八苦曰悴文記妙樂言百劫所種雖在小論不在二乘故無好形色注無威德者無有十力四無所畏故記十力者一是處非處力知一切因緣果報定相從如是因緣生如是果報不生如是果報悉知之二業智力知一切衆生三世諸業諸受三定力知諸禪三昧四根力知衆生諸根上下五欲力知衆生種種欲樂六性力知世間種種性七知處道力知一切道至處相八宿命力知一世乃至百千世姓名苦樂壽命長短等九天眼力見衆生生時死時善道惡道等十漏盡力自知我生已盡不受後有也四無所畏者一一切智無所畏於世出世間諸法盡知盡見如佛言我是一切正智人故得安隱得無所畏二漏盡無所畏惑業死生俱盡如佛言我一切漏盡故得安隱得無所畏三説障道無所畏説彼魔外障蔽聖道之法如佛言我説障法故得安隱得無所畏四説盡苦道無所畏説能盡衆苦之道如佛言我所説聖道能出世間能盡諸苦故得安隱得無所畏出大論注汝可詣彼徐語窮子文句六二十四云即以小教擬小機也大教明理直實故言疾走往捉小教明理紆隱故言徐語文雇汝除糞雇賃也文句六二十四云除苦集之糞取道滅之價文記苦集能染污真性如糞穢道滅能通會空理如得價謂得涅槃一日之價也紆曲也二徵起此領何義二答釋所領答次頓之後説三藏教二十年中常令除糞即破見思煩惱等義也注二十年中用八忍八智斷見合為一無礙一解脫用九無礙九解脫斷思總成二十經中更有兩處明二十年若住二乘位轉大乘教名為於二十年中執作家事從有二乘之機而來感佛故云自見子來已二十年皆取二乘各有十智記一斷見九斷思總有十種無礙十種解脫成二十見思解下藏教經明兩處二十年者不頌般若時佛命轉教菩薩故言二十年中執作家事意明二乘領命轉教時密破別惑見思故言二十年也一頌法華時敘父子別會久近故言自見子來已二十年意明二乘之機自來感佛取立二乘之名故言二十年也十智仁王經疏言一法智即欲界繫法中無漏智欲界繫因中無漏智欲界繫法滅中無漏智為斷欲界繫法道中無漏智及法智品中無漏智也二比智於上二界無漏種智中約四諦辨四種無漏智如上法智中明但有法比之殊也三他心智欲色二界繫現心心數法及無漏心心數法少分四世智知諸世間有漏智慧亦名等智凡聖同有故五苦智觀五陰苦空無常無我也六集智有漏法因因集生緣觀時無漏智七滅智盡滅妙出觀時無漏智八道智道證迹乘觀時無漏智九盡智見苦已及修道已等智論曰我見苦已斷集已證滅已修道已也十無生智見苦已不復更見等也注見思煩惱分別曰見貪愛曰思止觀八初云昏煩之法惱亂心神文記迷理起分別名見對境起貪愛名思其體昏煩其用惱亂注此破見思答上除糞糞能染污故以譬之謂污染真理也二方等五初約部判次明方等部淨名等經彈偏折小歎大褒圓注次明方等部等判部收經也記此約部判也方等為能收淨名等經為所收注彈偏等明部意也收經雖廣淨名有彈斥功特標為首彈偏折小嘆大褒圓妙樂四三十六云今家八字判盡經理謂折小彈偏歎大褒圓文釋籤十二云如觀衆生品即是歎大稱歎文殊淨名即是褒圓故令小根恥小慕大文記淨名明菩薩如幻如水月如化人煩惱如滅度者受身而觀衆生又明菩薩行四無量又明依無住本立一切法籤文指為嘆大又維摩言文殊不來相而來不見相而見文殊言若來已更不來若去已更不去來者無所從來去者亦無所至所可見者更不可見此乃作家相見覿面相呈乃至入不二法門文殊以言遣言維摩以無言遣言蓋以言為糟粕非遣言無以得其醇遣言猶言非默然無以會其極籤文指為褒圓正令恥小慕大也注須彈斥者蓋為小機執真保果取證入滅故才證小果便堪彈斥未必須在十二年後後因維摩示疾毗耶佛令弟子詣彼問疾故皆述昔被訶辭不堪往此是述昔訶乃密彈也若當座訶如禮座去華等也記維摩經有二訶如弟子品佛遣弟子問疾皆述昔訶辭不堪往舍利弗言憶我昔坐樹下維摩言不必是座為晏坐也不於三界現身語意是晏坐不起滅定現諸威儀是晏坐不捨道法現凡夫事是晏坐乃至不斷煩惱入於涅槃是晏坐如是坐者佛所印可時我世尊聞語默然不能加報故我不任詣彼問疾是謂述昔訶乃密彈也禮座者經言舍利弗見室中無有牀座念諸大衆當於何坐維摩言仁者為法來耶為牀座耶乃至夫求法者不貪軀命何況牀座既問文殊何等佛土有好上妙功德成就師子寶座文殊言東方度三十六恆河沙國世界名須彌相佛號須彌燈王其座高八萬四千由旬嚴飾第一維摩現神通力彼佛遣三萬二千師子座入維摩室乃至文殊與諸菩薩上人俱坐當自立身如彼座像其得神通菩薩即自變形為四萬二千由旬坐師子座新發意菩薩及大弟子皆不能升維摩語舍利弗為須彌燈王如來作禮乃可得坐於是舍利弗等作禮得坐去華者經言天女以華散諸菩薩大弟子上華至菩薩即墮至大弟子便著不墮一切弟子神力去華不能去天問舍利弗何故去華答言此華不如法是以去之天曰弗謂此華不如法是華無所分別仁者自生分別耳諸菩薩華不著者已斷一切分別想故譬如人畏時非人得其便如是弟子畏生死故色聲香味觸得便也已離畏者一切五欲無能為也結習未盡華著身耳習盡不著也此當座訶也二約教判四教俱説藏為半字教通別圓為滿字教對半説滿等故言對教注四教俱説等明部中用教也蓋以大斥小逗大逗小須四教故四教俱説方等説三藏者一為彈斥之本二為橫來之機記橫來機者未經阿含會未聞生滅四諦不證真理故須説藏教注如釋籤云復有漸中初入小行及俗衆室外説無常道記此引以證上橫來之機淨名佛國品佛説隨其心淨則佛土淨舍利弗念佛為菩薩時意豈不淨而娑婆不淨若此佛言我此土淨而汝不見於是佛以足指按地即時三千大千世界珍寶嚴飾如寶莊嚴佛無量功德寶莊嚴土及佛攝神足世界還復如故求聲聞乘三萬二千諸天及人知有為法皆悉無常遠離塵垢得法眼淨八千比丘不受諸法漏盡意解是為初入小行也俗衆室外説無常道者淨名方便品長者現疾國王大臣長者居士婆羅門及諸王子并餘官屬皆往問疾維摩因以身疾廣説如言諸仁者是身無常無強無力無堅速朽之法不可信也為苦所惱衆病所集乃至是身如毒蛇如怨賊如空聚陰界諸入所共合成是也補淨名本無室內室外顯文今謂不能入大乘室義同室外注輔行十二十四云方等旁用三藏正用三教以斥二乘合二乘人密成通益不語菩薩者轉成衍中人也備辨訛曰菩薩復轉成衍中人句出玄籤會本二下但今既言彈偏則藏菩薩亦在其中況復轉成之事或方等或般若其不轉者則般若後亦仍有之似不可局於方等定轉成衍私謂方等彈斥似專指二乘小機受化具歷五時者言如論法華八相授記則二乘似皆菩薩機也然玄籤轉衍之文自具深意注對半説滿以滿斥半也故雖兼斥大正在斥小釋籤引大經云譬如長者唯有一子心常愛念將詣明師懼不速成尋便將還以愛念故晝夜殷勤但教半字而不教誨毗伽羅論良由其子力未堪故毗伽羅論翻字本謂世間文字之根本即滿字也若合喻者半字謂九部經毗伽羅論謂方等典即滿字也記大經如來性品佛言説初半字以為根本持諸記論呪術文章諸陰入法凡夫之人學是字本然後能知是法非法乃至半字義者皆是煩惱言説之本滿字者是一切善法言説根本也毗伽羅論如輔行言此論是字本河西言世間文字之根本也典籍音聲之論宣通四辨訶責世法讚出家法言辭清雅義理深邃雖是外論而無邪法將是善權大士所為故今以譬方等經補毗伽羅光明記言此翻記論婆尼尼造備兼斥大不獨指轉衍之菩薩説如下引殃掘經文殊亦被訶也注此據方等以大斥小故以衍門三教之滿而對三藏之半若文句云無方等所對之三者乃顯法華部妙唯一圓乘不同方等對三之圓也記若文句下謂法華純圓獨妙無復兼但對帶故方等對三之圓望法華純圓不同三約時判若約時則食時第三時注即華嚴照平地中初食時也辰時毗羅三昧經有四食時早起諸天食日中三世佛食日西畜生食日暮鬼神食今是諸天食時也記此約時也毗羅三昧經言食時四種旦天食午佛食暮畜生食夜鬼神食佛斷六趣因令同三世佛故曰午是法食時十誦律言唯天得過中食無罪經以旦為天食時者清旦之氣取於清故若以支配則寅卯辰旦時巳午未中時申酉戌暮時亥子丑夜時今方等即寅卯辰時備辨訛曰食時當約人中而論不約天上也私謂一日三飱乃人每日之初食時然早起天食見經亦可配合四約味判若約味則從酪出生酥此從九部出方等三生酥味注約教論相生約機論濃淡既恥小慕大如烹酪作生酥記此約味也淨名經迦葉言我等何為永斷善根於此大乘已如敗種一切聲聞聞是不思議解脫法門皆應號泣聲震大千一切菩薩應大欣慶頂受此法説此語時三萬二千天子皆發菩提心此所謂恥小慕大如烹淡酪作濃酥也從九部修多羅出方等為相生五準經判二初引經徵起二初引經信解品云過是已後心相體信入出無難然其所止猶在本處注過是已後過鹿苑三藏之後即今方等也心相體信父子互相體悉信順子信父故得果不虗父信子故聞大不謗記此準法華判也文句言於藏教得涅槃價此既不虗今為菩薩説大乘法亦復不虗子信父也佛知此等見思已斷聞必不謗無漏根利聞即生信父信子也注入出無難文句六二十九云由是見尊特身聞大乘教名此為入復被訶斥猶見丈六説小乘法名此為出大小入出皆無疑難也文釋籤三二十三云不同畏懼王等之時故云無難文記畏懼王等信解品云爾時窮子遇到父舍住立門側遙見其父踞師子牀寶几承足諸婆羅門剎利居士皆恭敬圍繞乃至窮子見父有大勢力即懷恐怖悔來至此竊作是念此或是王或是王等非我傭力得物之處不如往至貧里肆力有地衣食易得乃至疾走而去此則疑難之際今既體信故無難也注然而修空觀用事識見生身住權理修中觀用業識見尊特住實理今二乘人雖修空觀入見尊特者由業識故蓋事業二識為見相之本故解謗云入見尊特功由業識教未開故且住草庵記此明二乘見尊特之所以也妙宗言相起之本其本乃是權實二理空中二觀事業二識就此分之則生身尊特如指諸掌金光明疏言丈六身佛住真諦丈六尊特合身佛雙住真中尊特身佛雙住俗中法身佛住中道此依二理故有二佛衆生二識有二觀因故感二佛蓋事業下釋明二乘由業識見尊特之故起信論云言二識者佛用有二種一者依分別事識凡夫二乘心所見者名應身以不知轉識現故見從外來取色分齊不能盡知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名報身身有無量色色有無量相相有無量好所住依果亦復無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不壞不失如是功德皆因諸波羅密等無量行熏及不思議熏之所成就具足無量樂相故説為報據此則知事業二識為見相之本故二乘由業識見尊特也解謗下證釋意明法華開權則廢草庵既未論開正處權理故住草庵身為客作但由業識之功見尊特池備事識見生身業識見尊特亦一往分耳其實見生身時亦用業識由二乘不知有七八二識不達境由心現但用前六識心分別故曰用事識也見尊特時亦不廢事識但約已斷見思離分別故已聞大法漸純熟故爾時具惑唯是無明則所用亦是業識不專定修中觀也又二乘本是退大取小過去曾修中觀之種得見尊特也光明記言如來以法界用隨順衆生事業二識現報應身應身是生身報身是尊特身及法性身依事識者但見應不能覩報以其粗淺不窮深故依業識者既覩報亦能見應以知真如起二用故應知真如之用現佛相大有三品一華嚴談相好數有十蓮華藏世界微塵二無量壽經明八萬四千相好光明三此經及法華般舟等三十二相八十種好此三品相既是真如全性之用若多若少皆無邊際故悉稱海無非尊特然有通局以藏塵八萬局業識見其三十二通事識見名生名應若業識即無有邊不可窮盡離分際相名尊特屬報身也為見相本者以事識乃見丈六相之本凡夫不達唯心未離分別但以思議比量之智所感見者名應身見從外來取色分齊不能盡知也業識乃見尊特相之本謂諸菩薩能了唯心已離分別就以不思議現量之智心所見者名報身相好無邊離分齊相也注猶在本處猶居羅漢果保證真空也記文句云雖復得聞大乘謂是菩薩事非己智分不肯回小向大猶居羅漢不言未來當得作佛故猶在本處二徵起此領何義二答釋所領答三藏之後次説方等已得道果心相體信聞罵不嗔內懷慚愧心漸淳淑注已得道果真空滅寂之道小乘羅漢果也記真空寂滅揀非第一義寂滅小乘羅漢揀非菩薩大羅漢果注聞罵不嗔妙玄十十八云恣殃掘之譏任淨名之折記妙玄云殃掘之經彈斥非常分明餘教釋梵四王及佛弟子乃至文殊皆被訶斥釋籤引殃掘偈云云何名為一謂一切衆生皆以如來藏畢竟恆安住云何名為二所謂名與色此是聲聞宗斯非摩訶衍云何名為四所謂四聖諦是則聲聞宗斯非摩訶衍一切諸如來第一畢竟常是則大乘諦非苦是真諦云何名為五所謂彼五根是則聲聞宗斯非摩訶衍所謂彼眼根於諸如來常等具如止觀七引乃至增十亦復如是如是等文彈訶聲聞明於常住最為顯著餘如彼經任淨名折者如述昔訶當座訶驗知二乘已盡結使故不嗔也注內懷慚愧釋籤云謂受彈斥令歎大自鄙即其益相記領受彈訶是愧己歎大自鄙是慚人注心漸淳淑密得通益也三般若五初約部判次説般若轉教付財融通淘汰注次説般若等明部意也轉教融通約法付財淘汰約喻所以令其轉教菩薩意在二乘領知法門故曰付財二乘本所不知但謂加被令説故曰轉教妙樂七二十云於佛即是付財二乘自謂加説故般若中云豈聲聞人敢有所説有所説者皆是佛力由機未轉且言被加文記此約部教也以須菩提解空舍利弗智慧佛於般若會以不共般若空慧加被二人教大菩薩意在二乘領知衆物貫統法門名為付財其如二乘不會佛意無希取一飱之念但言佛被令我説耳故曰轉教也如大品言佛告須菩提汝當教諸菩薩般若波羅密時諸菩薩等念須菩提自以智慧説般若耶為是佛力須菩提知諸摩訶薩大弟子諸天心念語舍利弗敢佛弟子有所説有所説法教授皆是佛力佛所説法法相不相違背是善男子學是法得證是法佛説如燈舍利弗一切聲聞辟支佛實無力能為菩薩説般若波羅密是也注般若會一切法皆摩訶衍故曰融通以空慧水蕩其執情故曰淘汰記般若示知八十一科諸法無非摩訶衍故曰融通然執法之情二乘未盡即以摩訶空慧之水滌蕩之故曰淘汰八十一科見下補籤曰以圓斥三及圓斥藏即圓融為融以三教斥藏即融通為融今乃三教融通之融也二約教判此般若中不説藏教帶通別二正説圓教注此般若中等部中用教也不説藏教光明記四三云諸部般若廣示衍中三教空慧復以三藏為助道觀又仁王般若説四無常偈恐其吝國正助合行記空慧之機有聞持義持若義持利聞持鈍者則不廣談四種空相唯説即邊一種空慧若聞持利義持鈍者則為廣談空相既以三藏為助道觀則非正談故可言不説也仁王下約正助合行證釋普明王為班足所獲王言願聽七日飲食沙門許之法師為説四偈第一無常偈云劫燒終訖乾坤洞然須彌巨海都為灰揚天龍福盡於中凋喪二儀尚殞國有何常二苦偈云生老病死輪轉無際事與願違憂悲為害欲深禍重瘡疣無外三界皆苦國有何賴三空偈云有本自無因緣成諸盛者必衰實者必虗衆生蠢蠢都如幻居聲響皆空國土亦如四無我偈云識神無形假乘四蛇無明寶象以為樂車形無常主神無常家形神尚離豈有國耶注帶通別二正説圓教此約圓實部主而説蓋一代教主意在圓若輔行十二十四云般若傍用通教正用別圓加於二乘密成別益文釋籤三二十三云前於方等義已成通故至般若唯須此二明不共者説部意也即不共般若意也正用別圓注意雖不共猶有方等新受小者至此須通亦有衍門傍得小者是故兼用文旁用通教此皆部中用教意也備若輔行下玉師引釋以杜後難謂般若帶通別正説圓者輔行傍用通教正用別圓等文如何消釋耶釋籤下證釋謂輔行所説即釋籤已有方等成通之義正用別圓以有新受傍得之機故須傍用通教是輔行釋籤之文皆部中用教之意諦觀師正用圓教之語約圓實部主而説意各有在兩不相妨也集注問答云方等橫來之機是藏教小乘衍門傍得小者乃是通教以通教正化菩薩傍化二乘故云衍門傍得小者注共部釋籤云諸部般若以但不但二種中道不共之法與二乘共説例方等部非無此義以方等經多順彈訶共義稍疏般若於菩薩則成共説此據三根解源記共部者但不但中例前方等非無與二乘共説義以方等經多順彈訶如淨名經室包乾象手擲大千借座燈王請飯香積種種難思之法雖對二乘面説但意在彈訶令恥小慕大故共説義稍疏而般若正用別圓則成共説也三根解源者妙玄云三人入智不同如大品明非漏非無漏初人謂非漏是非俗非無漏是遣著何者行人緣無漏生著如緣滅生使破其著心還入無漏此一番二諦也次人聞非漏非無漏是非二邊別顯中道中理為真又一番二諦也又人聞非漏非無漏即知雙非正顯中道中道法界力用廣大與虗空等一切法趣非有漏非無漏又一番二諦也籤釋云非無漏是遣著者無漏無著由行者著心緣之今破其著故名為非無漏也又云漏無漏本是通法為成接義故云雙非空不空本是別法一切法趣本是圓法於一一法三人取解不同故約漏等以示解源也為成接義者以別接通以圓接通也解見七卷備集注問答問般若既以但不但中法與二乘説故部名共云何約教唯通名共答約部則二酥時二乘亦聞但不但中名共華嚴聾啞名不共約教則別圓菩薩法故不共通則三乘同行故共然約部名共於教仍是不共以雖聞而無心希取故共猶不共也又問約部論共雖通方等既順彈訶得名共否答被彈而生恥慕由聞共説之功即被彈處全成共説雖共義稍疏得名共部三約時判約時則禺中時第四時注禺中説文云日在巳曰禺中記此約時也統紀言禺亦作隅日影在中之邊隅故四約味判約味則從生酥出熟酥此從方等之後出摩訶般若四熟酥味注約教生熟二酥相生次第約機則二乘心漸通泰自知螢火不及日光敬伏之情倍更轉熟如從生酥轉成熟酥也記此約味以顯教之相生次第機之漸漸純熟也可以意知五準經判二初引經徵起二初引經信解品云是時長者有疾自知將死不久語窮子言我今多有金銀珍寶倉庫盈溢其中多少所應取與注長者喻如來世間長者具十德如來具十號記此約法華判也長者十德文句言一姓貴二位高三大富四威猛五智深六年耆七行淨八禮備九上歎十下歸如來十號者一佛從三世真如實際中生二功成道著十號無極三法財萬德皆悉俱備四十力雄猛降魔制外五一心三智無不通達六早成正覺久遠若斯七三業隨智運動無失八具佛威儀心大如海九十方種覺所共稱譽十七種方便而來依止備集注十號正如來十德非授記莂之十號注有疾者法身無病隨機權示也自知將死不久文句六二十九云有機則應為生機盡應謝為死今化機將畢應謝非久也多有金銀文句六二十九云金即別教理銀即通教理大品所明真諦不出此二而言多有者理則非多約種種門亦得言多文妙樂七十九云大品有圓何故但云不出通別答一者但語通別理已攝餘二論能詮教必須具四今且從理故云不出此二二者二乘至此多成通別亦且言之文記多有者如如之理一亦不立但約種種能詮之門故所詮之理亦不妨言多如空非十八約破十八法得名也妙樂下問中以經有圓難答有二意一約理意明言通該藏舉別攝圓教名分別必當區分無生先論生滅無量後演無作自漸至圓必須具四是則今文從理含攝也二就機意明二乘修得類有舊新若從豎來之衆已經乳酪生酥般若直成別益若橫來機未受彈訶至此令得通益雖説三教今且從機得益邊也注珍寶者文句六二十九云勸學中明一切法門皆是珍寶文倉庫盈溢等文句六二十九云倉是定門即百八三昧庫是慧門即十八空境也通別兩種定慧倉庫包藏一切禪定智慧無所缺少內充外溢故云盈溢記百八三昧十八空大論法數廣載輔行曰破十八有言十八空對百八散言百八定此中通別定慧配倉庫可知內充約體外溢約用注其中多少者説於般若則有廣略二門略則為少廣則為多自行為取化他為與文記大品云知色如相知受想行識乃至知一切種智如相如是能知一切法略廣相大論云廣者從八萬四千法聚已來無量佛法略者乃至小品中一品一品中一段又略者知諸法空無相無作無生滅等廣者諸法種種別相分別等也二徵起此領何義二答釋所領答明方等之後次説般若般若觀慧即是家業空生身子受敕轉教即是領知等也注般若觀慧妙玄十十八云大品或説無常無我或説於空或説不生不滅皆歷色心至一切種智句句回轉明修行法文即觀慧義也補回轉者如説無常等已即云當依無常無我修學乃至説不生不滅已即云當依不生不滅修學此能觀法色心至一切種智即所觀境注家業長者宅為大乘家諸珍寶為不思議業妙樂七二十云前云付財今云付業財從所營業即造作皆是菩薩修德三因之作業也名異義同故得互舉記不思議業指圓教一乘具足不思議心法修德三因者經明了義心王為正因緣因者十六王子覆講聞法今日解者是也今日聞法作佛名真子為了因也注空生身子須菩提翻空生解空第一舍利弗翻身子亦云鶖子智慧第一記須菩提初生庫藏悉空故言空生經明佛從忉利下閻浮提須菩提念此大衆雖復殊特皆歸無常即了法空作是觀時即得道證故佛言觀諸法空是為見佛法身得真供養供養中最故稱解空第一身子取身端意鶖子舍利弗母身端眼淨如鶖鷺連母得名智慧第一者在胎已令母辨勝舅八歲登座十六國議論無雙七日中遍達佛法故佛云一切衆生智唯除佛世尊欲比舍利弗智慧及多聞於十六分中猶尚不及一注受敕轉教受如來之敕命轉教菩薩即加被説也以空慧為入道之主故加二人輔行六上十二云凡言加者加於可加須菩提空與般若空相應相似是故佛加令其説空般若是智慧故亦加身子所以但加此二人也文記非空不能蕩相非慧無以發明故加二人大論問佛不自説況諸菩薩勝聲聞何故令聲聞為諸菩薩説答衆見佛身過須彌山心皆驚怖各念云何從佛聞法故命聲聞為大衆説注領知妙樂二十八云被加為奉命所説名領知名説為領無別領也文此是熟酥益相得此益已義成別人淨名疏云大品二乘已有入假之義文觀音玄記上十二云聲聞轉教密破塵沙文大品會法八十一科皆摩訶衍不會人而無希取一餐之意記大品會法亦説知意八十一科謂色心五陰十二入十八界四諦十二因緣十八空六度四智也無希取者信解品云爾時窮子即受教敕領知衆物金銀珍寶及諸庫藏而無希取一飱之意然其所止猶在本處下劣之心亦本能捨也三總結已上三味對華嚴頓教總名為漸注總結漸中三味
