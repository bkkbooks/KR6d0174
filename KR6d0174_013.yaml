body:
  text: 高麗沙門諦觀錄南天竺沙門蒙潤集註清比丘性權彚補輔宏記清三寶弟子錢𠁼菴較訂天台嫡裔比丘諦閑編科參梓四無生果四阿羅漢此云無學又云無生又云殺賊又云應供此位斷見思俱盡子縛已斷果縛猶在名有餘涅槃若灰身滅智名無餘涅槃又名孤調解脫註此位斷上八地七十二品思俱盡四智已圓我生已盡梵行已立所作已辦不受後有無法可學名無學果亦名究竟如㭊玄下記色無色八地每各九品思八九七十二品思惑今此位淨盡無餘也言智圓者如大經云一我生已盡羅漢斷見思惑盡更不受三界生死二梵行已立梵即淨行謂羅漢由戒定慧之行成就得證此果三所作已辦謂羅漢本求出離三界今生死既盡更不受後有之身又戒師云曠劫生死於今始盡故我生盡無漏道品已階不退故梵行立四沙門果今已克證故所作辦灰身泯智永無來報故不受後有又婆沙云我生盡說盡智梵行立說道智所作辦說滅智不受後有說無生智又我生盡是說集智梵行立說道智所作辦說滅智不受後有說苦智是為四智已圓也又此四句亦名四諦下行亦如婆沙云我生盡集下四行梵行立道下四行所作辦滅下四行不受後有苦下二行謂無常及苦也又準勝鬘經云於二種死中無分段死故說阿羅漢辟支佛我生已盡得有餘果證故說梵行已立凡夫人天所不能辦七種學人先所未作虗偽煩惱斷說所作已辦羅漢辟支佛所斷煩惱更不能受後有故說不受後有也故今以其智圓行滿而釋其名謂研真斷妄為有學真窮惑盡名無學又此無學四智究竟圓二惑究竟盡名究竟也㭊玄未詳備辨訛曰儀文此云無學應無著以無學乃位次非翻名也存考註阿羅漢者文句一云或言無翻含三義故淨名疏十引智論釋云一殺賊從破惡以得名二不生從怖魔以受稱三應供因乞士以成德文因果對釋多含不翻乃今家正意以三義翻之乃順古耳記此明翻為三義者謂無明糠脫後世田中不受生死果報故曰不生九十八使煩惱盡故名殺賊具智斷功德堪為人天福田故言應供含此三義故存梵名言無翻也大論云阿羅名賊漢名破一切煩惱賊破故復次阿羅漢一切漏盡故應得一切世間諸天人之所供養又阿名不羅漢名生後世中更不生故淨名疏引而斷之也因果對釋句申論意註若釋比丘因名乞士等對舉果名蓋欲顯大比丘之階位也如法華文句及觀經疏記此明諸疏對果釋因之意初二句正明對果釋因蓋欲下申意謂如諸疏中以釋比丘因名乞士怖魔破惡必對果名應供無生殺賊以名之者蓋欲顯大比丘之階位即是阿羅漢故對果以釋因也文句云比丘者肇師云秦言淨命乞食破煩惱能持戒怖魔等天竺一名含此四義秦無以翻故存本稱什師云始出妻子家應以乞食自資清淨活命終出三界家必須破煩惱持戒自守具此二義天魔怖其出境也釋論云怖魔破惡乞士者魔樂生死其既出家復化餘人俱離三界乖於魔意魔用力制翻被五繫但愁懼而已故名怖魔出家人必破身口七惡故言破惡夫在家三種如法一田二商三仕用養身命出家人佛不許此唯乞自濟身安道存福利檀越三義相成即比丘義也涅槃寶梁皆舉破惡名比丘者不具說也今明此三義應通初後如初出家時白四羯磨無作戒力徧一切境翻無作惡初修禪定發定共戒防伏意地貪嗔不起初修觀慧發相似道共戒能伏煩惱初心亦稱破惡何獨後心耶怖魔者初剃髮稟戒已令魔愁修定欲伏煩惱修慧欲破煩惱初心亦令魔怖何獨後心耶乞士者初離邪命以乞自活修禪歷境求定修慧緣理求無漏皆是乞士何況相應而非乞士具此義故通名比丘依經家皆歎後心比丘義必通初證信必後故今歎之以通初後此皆三藏意也引文句竟觀經疏云比丘者因果六義因名乞士怖魔破惡果號應供殺賊無生又疏謂乞士名清淨食鈔云常行乞食名乞士至果成應供德也疏謂怖魔者若發心出家地行夜叉唱飛行空中展轉乃至六天魔王聞之怖畏失人眾也鈔云出家離染趨向無生是故魔王聞之心生恐怖勤修三學果證無生疏謂破惡者九十八使悉皆破斷鈔云修觀推窮名為破惡證智斷盡名為殺賊補翻無作惡者境是五欲六塵若極淫極殺則時時淫殺現前名無作惡今受戒翻淫殺等為持戒心則戒相現前也註又前標聲聞通凡聖位若阿羅漢局第四果此位修三昧一名金剛二名重空三名電光上二名如妙玄第四電光如止觀第九電光義通初果金剛通前五種羅漢重空別在不動羅漢所修記此明阿羅漢所修三昧也初列名次指釋末結名通位如玄文云時解脫羅漢五種得盡智無學等見也若用金剛三昧於非想九品惑盡次一剎那證非想第九解脫成盡智次一剎那得無學等見也或彼遇違緣有時退故不說得無生智又云不時解脫羅漢名不動法成就三智謂盡智無生智無學等智能用重空三昧擊聖善法以定捨定故言能擊籤云空空三昧無相無相三昧無作無作三昧空是聖法復修空擊前聖法名重空然金剛三昧通前五種羅漢重空三昧別在不動羅漢修也止觀云稱電光者彼論云七依定外更有定發無漏否答有欲界定能發無漏倐如電光遺教經云若見電光暫得見道如阿難䇿心不發放心取枕即入電光可見義通初果補能斷非想難斷之惑故曰金剛註此果別號二種三種六種九種及果性退不退義今歷示之先明二種補慧解脫既云緣空直入而又通九想八念十想者如大論云九想乃是得解觀因修九想生恐怖故更修八念除之由心安無障復修十想轉心轉想以此為緣開三十七品三十七品為緣開涅槃門故雖修九想等仍是緣空直入也俱解脫帶事兼修者即指八背捨八勝處十一切處等為事也不壞法來住骨想八色流光者義疏記云即九想中於第八白骨修八色流光八色者見地色如黃白淨潔之地見水色如深淵清澄之水見火色如無烟清淨之火見風色無塵迴淨之風見青如金精山見黃如簷葡華見赤如春朝霞見白如珂貝雪見色分明而無質礙是也記㭊玄下未詳圖中妙玄四云時解脫者是信行鈍根待時及緣具方得解脫故名時也不時解脫者即是法行利根此人因中修道能一切時隨所欲進修善業不待緣具故名不時解脫又云不得滅盡定者但是時慧解脫得滅盡定者即是不時俱解脫也止觀云不淨禪發者一壞法人修九想此人但求斷苦燒滅骨人急取無學不欣事觀既無骨人可觀便無神通變化願智頂禪雖然身滅實有身在乃至云即是世智斷惑慧解人若不壞法人修九想從初脹想來住第八骨想不進第九燒想得有流光背捨勝處觀練熏修神通變化一切功德具足成俱解脫人也今準法界次第釋九想者文云六妙特勝通明等但是實觀未有得解之觀九想已去是得解觀於對治煩惱重病力用為強此九名想者能轉心轉想故謂能轉不淨顛倒想故此九法皆名想也詳解見五卷不淨觀八念者文云若修九想時思惟死屍可惡因此驚怖㱇然毛竪由是惡魔惱亂憂懼轉增若存心八念怖恐即除言念者內心在憶異名也專心存憶八種功德故名八念何者八念謂一念佛二念法三念僧四念戒五念捨六念天七念阿那八念死也十想者文云九想如縛賊十想如殺賊大師云若爾即應次前九想何在八念之後但為修九想時若恐怖等障既修八念離諸恐怖則心安無障是以於八念之後當用十想也通言想者能轉心轉想也能轉計常樂等諸顛倒等想故名為想前三想為斷見諦惑說中四想為斷思惟惑說後三想為修無學道者說是以壞法之人修此十想能斷三界結使證無漏聖果也何者十想謂一無常想二苦三無我四食不淨五世間不可樂六死七不淨八斷九離想十盡想也八背捨者文云前九想十想心既是壞法對治觀門則橫局而豎短皆未具足若證聖果無三明八解諸大功德若修此觀練諸禪定證聖果時則成大力羅漢具三明六通八解等諸功德此八通名背捨者大論云背是潔淨五欲捨是著心故名背捨若發真無漏慧斷三界結業盡即名解脫詳解見五卷不淨觀八勝處亦名八除入亦見五卷十一切處者文云從所觀境得名也亦名十一切入一青一切處二黃三赤四白五地六水七火八風九空乃至第十識一切處九次第定者文云若入禪時深心智慧深利能從一禪入一禪心心相續無異念間雜故名次第初禪次第定者離諸欲惡不善之法有覺有觀離生喜樂入初禪定時是中初禪定觀均齊自識其心其心次第而入無有剎那雜念間入初禪定是為初禪次第定二禪次第定者若從初禪入二禪時是中二禪定觀均齊自識其心其心次第而入無有剎那雜念間入二禪定是為二禪次第定三禪四禪次第定意類如初二禪中明五空處六識處七無所有處八非有想非無想處次第定俱如上初二禪中明九滅受想次第定者若從非有想非無想入滅受想定時於是定前自識其心要期心利心心次第而入無有剎那雜念間入滅受想定是為滅受想次第定也師子者文云菩薩依九次第入師子奮迅三昧所言師子奮迅者潛譬以顯法也如世師子奮迅為二事故一為奮却塵土二能前走却走捷疾異於諸獸此三昧亦爾一則奮除障定細微無知之惑二能入出捷疾無間異上所得禪定也又有二義一者入禪奮迅師子奮迅入三昧者離欲惡不善法有覺有觀入初禪如是次第入二禪三禪四禪空處識處無所有處非有想非無想處滅受想定是為奮迅入也二者出禪奮迅師子奮迅出者從滅受想定起還入非有想非無想從非有想非無想起還入無所有處如是識處空處四三二初禪乃至出散心中是為奮迅出也超越者文云菩薩依師子奮迅三昧入超越三昧名超越者能超過諸地自在入出故名超越亦有三義一者超入三昧云何名超入三昧離諸欲惡不善之法有覺有觀離生喜樂入初禪從初禪起超入非有想非無想處非有想非無想處起入滅受想定滅受想定起還入初禪從初禪起入滅受想定滅受想定起入二禪二禪起入滅受想定滅受想定起入三禪三禪起入滅受想定滅受想定起入四禪四禪起入滅受想定滅受想定起入空處空處起入滅受想定滅受想定起入識處識處起入滅受想滅受想定起入不用處不用處起入滅受想滅受想定起入非有想非無想非有想非無想處起入滅受想定是為菩薩超入三昧相若聲聞但能超入一不能超入二況能如上所明自在超耶是中明超入有三種一順入超二逆入超三順逆入超細心約義自作可解二者超出三昧云何名超出三昧從滅受想起入散心中散心起入滅受想定滅受想定起還住散心中散心起入非有想非無想非有想非無想處起住散心中散心起入無所有處無所有處起住散心中散心起入識處識處起住散心中散心起入空處空處起住散心中散心起入四禪四禪起住散心中散心起入三禪三禪起住散心中散心起入二禪二禪起住散心中散心起入初禪是為佛菩薩超出三昧相若聲聞但能超一禪出而不能超二何況能自在超出耶是中超出有三種一順超出二逆超出三順逆超出足前三種超入合為六種超越三昧如來於此六種三昧而入涅槃也齊此明三乘行行共禪竟觀練熏修者止觀云觀者謂九想八背捨八勝處十一切處通稱觀禪九想為破行人淫火必須增想純熟能除世間貪愛破六種欲此九既除於欲亦薄嗔癡九十八使山動雖是不淨初門能成大事背捨者背淨潔五欲捨離著心故名背捨修者持戒發誓端身正心諦觀足大指黑脹起進觀從足至頭唯見腫脹心生厭離復觀膿爛次却皮肉諦觀白骨八色流光如是次第乃至八背捨發相具如禪門八勝處者前背捨雖能背捨淨潔五欲既是初觀緣中轉變不得自在若欲得觀心純熟轉變自在必須進修勝處更深細觀察少多好醜悉使勝知勝見如快馬能破陣亦能自制其馬十一切處者勝處雖能觀中轉變自在而未普徧今以八色兩心更相涉入廣普徧滿轉變無礙大論云背捨為初門勝處為中行一切處為成就三種觀足即是觀禪體成就具如禪門練者即九次第定也上來所明之禪雖體用具足並是觀禪未明練熟調柔之相今欲純熟則從初淺及至後深次第而入中間無有垢滓間穬令不次第者次第故名次第亦是無漏練於有漏除諸間穬故名練禪熏者即師子奮迅三昧也前是次第無間入今亦是次第無間入亦能次第無間出除麤雜及法愛味塵猶如師子能却能進奮諸塵土修者超越三昧也近遠超入近遠超出近遠超住是功德最深故名頂禪於諸法門自在入出也音減皮起也穬音棍芒粟也八念等法界初門備載註初時不時從緣得名記言從緣得名者謂須待時及緣具方得解脫名時若能於一切時隨所樂欲進修善業不待緣具而得解脫名為不時故以從緣得名也註次慧俱約觀立號記言約觀者謂因中修性念處唯觀空理果上只證偏真名慧脫因中修共念兼觀於事果具三明八解名俱脫註三壞不壞依境受稱也記言依境者謂因中修九想燒滅骨人壞其觀境名壞法若修九想不進燒骨人不壞其境名不壞法也註或準正理論以時不時敵對慧俱記正理論云契經說若有五根增上猛利極圓滿者名俱解脫阿羅漢果若有五根漸劣名慧解脫當知論云根利者名俱即是以不時對俱人也根劣者名慧即是以時對慧也註若準妙玄四二十六及四教義二十六信行法行各二不得滅盡定者但是慧解脫得滅盡定者名俱解脫記玄文明時解脫即是信行鈍根而有五種謂退思護住進是也是五種羅漢各有二種不得滅盡定者但慧人得滅盡定者即俱人不時解脫即是法行利根名不動羅漢亦有二種一不得滅盡定但慧解脫二得滅盡定即俱解脫也四教義引雜心偈云慧解脫當知不得滅盡定若得滅盡定當知俱解脫則知時不時二種各有慧俱二種也註舊云敵對乃從正從多各對則旁正兼舉以信行亦有帶事兼修法行亦有緣空直入記此舉舊釋對敵二意初句釋正理意次句釋妙玄四教義意以下二句釋旁正兼舉也註若壞法不壞法與慧俱同記此明壞不壞敵對各對義既與慧俱同則當以意知不必更論故下但揀判慧俱二種也謂以時不時對壞不壞亦可敵對各對慧俱相同也註舊約五義揀判慧俱補此總標舊以五義揀判慧俱舊字即指湛法師之假名集以集中約十義揀判慧俱謂十義只成五義以分之成十合之成五但有隻雙不同故今引文曰五義註一約性共慧人修性念處俱人修共念處四教義記此別示性共揀四教義明別相四念處位有三種根性不同若慧解脫根性於別相四念處但修性念處若俱解脫根性亦修共念處若無疑解脫俱修三種念處今但指揀慧俱二種也註二約正助慧人正道斷結俱人兼修助道光明句中四教義二記此別示正助揀光明句云亦名慧行行行緣空直入名慧行帶事兼修名行行亦正道助道小乘修正道斷結名慧脫修助道斷結名俱脫四教義問性念處但說慧數羸弱云何能斷結答慧數不獨起豈不能斷結又問若諸數隨起即是共義答諸數隨起有三種一但是緣理之慧諸數任運隨起此說性念處二修諸數作助道善法故說共念處斷結故佛說善法積聚屬共念處助道與正道共斷結故雜心偏說共念處能斷結然利鈍根人用性念處非不斷結也註三約事理直緣真理名慧解脫帶事兼修名俱解脫備此別示事理揀也有師標曰有二無漏直緣理名緣理無漏觀等四為對治無漏出舊婆沙註事者一帶根本四禪俱人亦依世禪修六行觀故二帶無漏禪慧人但至觀禪俱人具修觀練薰修止觀第九婆沙亦有少分慧脫全分慧脫此有三根全無四禪下根也能修一禪至四禪中根也能修無漏禪至九想十想上根也俱人能修一二三禪下根也具足四禪中根也修觀練薰修上根也妙樂二云四禪一切羅漢並得次觀等四俱解脫人方乃具足三得滅盡定如妙玄四二十六已上三事俱人兼得也記先以事理分約慧俱事者下轉釋俱人所兼修事有三一下明兼修根本四禪六行觀者即厭下苦麤障欣上淨妙離也二下明兼修無漏禪意明慧人上根但修九想八念十想之觀禪若俱人上根又能修九次第定之練禪師子奮迅三昧熏禪超越三昧修禪也原註止觀第九者即觀禪定境中詳明此慧俱二種所修無漏禪也婆沙少分全分者第八十一之五文云若慧解脫阿羅漢能起根本禪現在前者云何經說蘇尸摩問諸比丘云何起諸禪現在前諸比丘答蘇尸摩當知我等是慧解脫人耶答曰慧解脫有二種一是少分二是滿分少分慧脫者能起一禪二禪三禪現在前滿分者乃至不能起一禪現在前此中說少分慧脫經中說滿分慧脫是故二俱善通此有三根下釋明慧俱並有三根先明慧人以修觀禪者為上根俱人以具修觀練熏修者為上根也三下明得滅盡定妙玄云得滅盡定者即俱解脫人末結俱人兼得也註四約神變慧人十四變化俱人十八變文句一記此別示神變揀言十四十八變者如文句云十四變化者初禪二變化一初禪化二欲界化二禪三變化一二禪化二初禪化三欲界化三禪四變化加一三禪化四禪五變化再加一四禪化無而歘有曰變有而歘無名化四禪俱有上能化下下不能化上故至數增減十四種色謂五根四大五塵也十八變化者出彌勒瑜伽論一震動二熾然三流布四示現五轉變六往來七卷八舒九眾像入身十同類往越十一隱十二顯十三所作自在十四制他神通十五能施辯才十六能施憶念十七能施安樂十八放光普動一切界也又有人註云一普動一切界二身上出火身下出水三流光遍照四隨所欲示佛土惡趣五於地起冰解令成水於火亦然六山石中往來無礙七八能舒卷雪山王等九以現前大眾大地內己身中十能往彼同其色類十一十二或隱或顯皆不可得十三往來去住無礙十四他現通悉能制伏十五能與一切有情辯才十六有情於法失念者能與之十七令聽法人身心安樂十八身放光明作諸佛事如此對之依四禪十四變化依觀練熏修十一切無漏事禪能作十八變又此十四變化法界次第亦具明十八變者瑜伽論有頌而以後三種為能變也註五約三明八解俱人則具慧人則無若輔行云通通於六明唯局三天眼宿命漏盡三也諸羅漢皆能得之文此有闕具之義婆沙云若有一明二明名慧解脫文準知俱人三明具足記此別示明解揀言三明者謂天眼明宿命明漏盡明然通大小乘今是小乘三明與大有異大論云三乘雖得三明明不滿足佛悉滿足是為異也言八解者一內有色觀外色解脫二內無色觀外色解脫此二背棄色愛心三淨勝解身作證具足住此一背棄不淨心四超一切色想滅有對想不思惟種種想入無邊空處具足住此一背棄下地法五超一切空無邊處入識無邊處定具足住六超一切識無邊處入無所有處定具足住七超一切無所有處入非想非非想處定具足住此三背棄下地法八超一切非想非非想處入滅受想定具足住此一背棄一切有緣心是為八解也今以此三明八解揀判慧俱謂俱人則具以其因中具修性共念處果上三明八解一時俱得慧人則無者以其因中但修性念處果上唯證無學故也若輔行下恐謂慧人若無三明者何以輔行說三明六通諸羅漢皆能得耶故此斷有闕具之義意謂具足三明者即俱人其有缺者乃慧人也婆沙下別證慧缺又有三家贊定慧第一家贊慧者作如是說若有三明不具八解脫者名三明若有三明具八解脫者亦名三明具八解脫無三明者是名俱解脫若有一二明者是名慧解脫所以者何慧勝滅定故第二家贊定者作如是說若具八解脫無三明者是名俱解脫若具八解脫有三明者亦名俱解脫若有三明不具解脫者是名三明若有一二明名慧解脫所以者何滅定勝慧故第三家云此二所說俱唐捐其功於文義無益以三明或得滅定或不得滅定故若得者名俱脫三明若不得者名慧脫三明今註引第二贊嘆定者之文以證三明有缺者是慧人準之則知具足三明者是俱人也是則所謂慧人無三明者亦據贊定者初意也然上所出輔行文云通通於六明唯局三蓋顯通明之用有異如大論問神通與明有何等異答直知過去宿命事名宿命通兼知過去因緣行業名明直知死此生彼名天眼通兼知行因緣際會不失名明直知盡結使不知更生不生是名漏盡通若知漏盡更不復生名明則通明有淺深異也又六通中三立明餘三不立明者婆沙云身通是工巧法天耳聞聲而已他心緣別相法此三明能隨順厭離法能棄生死隨順善法能到涅槃何者以宿命念前世智證明見過去世事生大厭離天眼觀生死智證明見未來世事生大厭離以厭離故漏盡智證明能作正觀斷煩惱故也又天眼通但知眾生死此生彼明則兼知造業差別宿命通但知過去受生明則兼知姓名差別漏盡通但知煩惱斷盡明則兼知永不復生也註次明三種性念處者亦名自性念處緣理斷結除自性過共念處者正助合修緣念處者緣佛三藏及世間文字所緣處廣也具如四念處一四教義二俱舍亦有三種羅漢各論三念處補緣理斷結者謂緣無生空理發真無漏智斷見思之結惑也除自性過者謂除於身受心法之上常樂我淨自性過也又身受心法其性本來是無常苦空無我不淨不可改易故名性也記四念處云阿毗曇明三種念處謂性共緣對破三外道有人釋性念處謂觀無生淺名為生深細觀無生見細法皆生死苦諦名性念處有人專用慧數緣無生空理發真斷結得慧解脫羅漢對破邪因緣無因緣顛倒執性一切智外道也共念處者以禪定助道正助合修亦名事理共觀發得無漏三明六通八解成俱解脫羅漢對破根本愛慢得五通外道也緣念處者緣佛三藏十二部文言及一切世間名字所緣處廣了達根性善知四辯堪集法藏成無疑大羅漢對破世間韋陀星文地理文字鄙狹當知邪正真偽猶金比鐵故大經云於諸想中無常為最於諸耕中秋耕為最於諸跡中象跡為最無常譬性耕譬神通跡譬文字也經云諸優婆塞善解諸法對治之門所謂常無常等故知心行理外未入正真也四教義云三種念處成三羅漢者性念處即是緣理之智慧念處相應發真無漏成慧解脫羅漢共念處共善五陰成就背捨乃至超越三昧願智頂禪如此助道共正道合發真無漏得三明六通具八解脫成俱解脫羅漢若緣念處即緣佛言教所詮一切陰界入性共二種念處能觀所觀名義若在禪定觀此名義即發四無礙辯名無疑解脫大羅漢也又云所言自性念處者說不顛倒慧也如佛說修身觀身觀者是慧念處者所作事不妄受緣故除自性過故說念處南嶽云亦名慧行亦名實觀緣理斷結之正要也所言共念處者與慧相共法如佛說此比丘善法積聚謂四念處是為正說也南嶽云亦名行行亦名得解脫是對治事中善法共正道斷結色及諸數也又能發諸禪神通也所言緣念處者一切法也如佛所說比丘一切法四念處是為正攝受具足故及略緣故南嶽云還是性共二種念處能觀智所觀境合辨具一切法義也若能分別觀察即發四無礙辯也又云佛說四念處教出過三種六師之說故能破一切外道也一切智六師者初心見理發於邪智辯才無礙也神通六師者得世間禪定發五神通亦有慈悲忍力刀割香塗心無憎愛皆是根本十二門禪力用也韋陀六師者即是博學多聞通四韋陀十八大經世間吉㐫天文地理醫方卜相無所不知也若此六師內則有邪發一切慧外則便能神通轉變知世吉㐫通四韋陀及十八大經無不知曉十六大國敬之如佛為欲破此三種六師故說三種念處一性念處破一切智者外人皆依身邊二見發一切智謂得涅槃常樂我淨此則如蟲食木偶得成字蟲亦不知是字非字也今性念處觀破此身邊二見不生四見六十二見等顛倒是故破一切智六師也二共念處破神通者外人但於根本四禪發五神通定既淺近兼無不淨觀神力轉變蓋不足言今共念處即能發背捨勝處一切處九次第定師子奮迅超越三昧發諸神通禪定既深觀行力大所發神通無礙自在變化無方摧諸外道易如反掌是以身子降伏勞度差目連化河溺諸外道皆是共念處觀所成神通也次緣念處觀破韋陀外道者四韋陀十八大經皆明世間人天愛論見論淺近之論佛說出世三藏若名與義而彼經書所不記載佛說緣念處觀緣佛所說三藏教門出世名義法門道理相對比並豈是外人之所聞見故緣念處觀破韋陀外道也俱舍亦有三種羅漢各論三念處者即論明四念住體中云此四念住體各有三自性相雜所緣別故自性念住以慧為體此慧有三種謂聞思修等所成即此亦名三種念住相雜念住以慧所餘俱有為體所緣念住以慧所緣諸法為體寧知自性是慧非餘經說於身住循身觀名身念住餘三亦然諸循觀名唯自慧非慧無有循觀用故何緣於慧立念住名毗婆沙師說此品念增故是念力持慧得轉義如斧破木由楔力持理實應言慧令念住是故於慧立念住名隨慧所觀能明記故由此無滅作如是言若有能於身住循身觀緣身念得住乃至廣說世尊亦說若有於身住循身觀者念便住不謬然有經言此四念住由何故集由何故滅食觸名色作意集故如次令身受心法集食觸名色作意滅故如次令身受心法滅應知彼說所緣念住以念於彼得安住故又念住別名隨所緣緣自他共相續異故一一念住各有三種備華藏說四念住即身受心法四念處於一念中又具三種謂自性相雜所緣何以為自性念住如觀身不淨以觀不淨之慧數為體內又分三謂聞思修慧也何以為相雜念住如觀身不淨是本慧其受心法等即其所餘今觀受心法等是謂所餘俱有為體也何以為所緣念住即指所緣之身受心法為體食觸名色推說諸法也何以念住別名隨所緣緣自緣他緣自他共相續之不同也註慧俱略如上記此指如上略釋慧俱得名即所謂約觀立號也註無疑者三藏教法四韋陀典天文地理一切通達故曰無疑記此釋無疑名義也三藏教法即小乘經律論言四韋陀典者一阿毗陀此云方命謂養生繕性二殊夜陀諸祭祀祈禱三婆夜摩陀謂禮經占卜軍陣兵法四阿達婆陀謂異能技數禁呪醫方摩登伽經載初人名梵天造一韋陀次人名白淨變一為四謂讀誦祭祀歌咏禳災也廣而言之仰觀天文俯察地理乃至一切五通仙所有經書呪術智慧技能自然通達所謂六鴦伽呪術知日月五星經原夢經地動鬼語鳥語獸語四足獸鬼著人語國王占相豐儉日月五星鬬相醫藥章算數卜歌舞妓樂如是等工巧技術諸經盡知明達故得名為無疑也註四教義二云問不應別說無疑九種羅漢無此名目答此出智度論明欲結集法藏集千羅漢皆得共解脫無疑解脫也文既是大論開出在佛世時俱人所攝佛世且明自行入道是故諸文只云慧俱記此明無疑之名有祖故得別說成三種也六種九種皆無此名若集論明六種中有無疑法者與不動法名異義一非今無疑記此揀集論無疑也集論謂利根不動於法無疑妙玄謂本住不動不為煩惱所退動故名雖異而義一也註釋籤五十九云得滅盡定但名俱解脫人以未修緣念處終非無疑解脫也文故知無疑乃俱人中勝者耳小大言之慧俱並小無疑乃名大阿羅漢妙樂一三十一引中阿含舍利弗問五百比丘幾三明幾俱解脫幾慧解脫佛言九十人三明九十三俱解脫餘但慧解脫荊溪云三明者即無疑解脫文須知三明是俱人得取其勝者復云無疑也記此證無疑即三明中之勝人也註後明六種附揀七種及列九種然後約六種明果性退否記第一退下㭊玄云者文雖失詳準意乃釋退之所以得名也籤云等者釋所退法婆沙云經說尊者瞿醯迦是時解脫阿羅漢六返退失第七返還得時解脫身作證以刀自害而死問彼尊者瞿醯迦為是退性為是憶性若是退性者何故以刀自害若是憶性者何故六返退耶答是退法性以厭患退故用刀自害若不退以是自害者是憶法性也又新譯問彼為是退為刀思耶若是退法何緣自害若是思法何故退耶答若退法彼厭故以刀自害又彼是退法練成思法仍恐退故以刀自害故知以刀自害通二種也思法下婆沙亦云者明六種羅漢中第二憶法釋云心生厭憶持刀欲自害也成論稱死法者釋云此死相者根有小勝深厭諸有是人不得三昧故無漏智慧難得現前設得善失故求死也論稱死相此謂死法也舊婆沙云憶法者即北涼時所譯之名也舊俱舍名自害法者即陳譯俱舍釋論明六種羅漢其第二種稱自害法也集論名念法者考唐譯論六亦稱思法不名念法或舊有譯稱念法者未可知也然諸文名雖不同其義一也護法下舊俱舍稱守護法者陳本俱舍釋論六種中第三名守護法也住法下舊俱舍稱者陳本六種中第四名住不動法也顯揚云者即第三卷中明無學果中第四種稱住不動謂成就如是善根雖不思自害及行放逸然皆不退不能練根不能發起勝品功德是則非今六種中最後之不動明矣進法下新俱舍稱堪達法者出唐譯集論稱分別法者唐本無此名以六種中第五名堪達或此準舊譯稱也不動法下舊俱舍稱不壞法者亦即陳本顯揚第三稱不動法謂從先來自性成就利根此人於諸善根不為退法之所搖動亦不為發勝功德及上練根之動搖故說名為不動法也則註云不退法者誤也集論名無疑法者唐本六種亦無此名以第六種同今名為不動法或註準舊譯名也補此六種皆前破七十一品思後更斷最後一品此處明重玄門又果縛未亡聖所難過故六種生焉記北涼時譯婆沙明六種謂退法憶法護法等住法能進法不動法於第六不動羅漢中云有二種謂有從時解脫至不動有性不動從時解脫至不動者中上本性不動者上下也正理論云退法種性必是先有思法等五亦有後得謂有先來是思法性乃至不動有先退法練根成思至不動等多種差別如理應思是婆沙及正理既皆開不動為二足成七種故此中釋之以明七不出六不復別示但附明而已記釋籤所引福田經九種出中阿含三十卷大品福田經詳見五卷輔行引成論九種無學者謂退相守相死相住相可進相不壞相慧解脫相俱解脫相不退相據今所記守相即註是護可進相即註是思是則名次有少未同而思死原是為二或註與今所記有新舊譯異也而經論次異可會同也補退者退失三昧智慧難得現前守者根少勝故以守護三昧不得退失勝於退法雖護亦退故名為守死者無漏智難得現前設得恐失故求死也住者得三昧已不進不退進者得三昧已轉深增益不壞者得三昧已無能敗壞慧俱者因滅盡定故有二人得滅盡名俱未得名慧不退者所作功德無退失故註六種約根性慧俱約觀行九種乃根性觀行兼舉耳記六種約根性者釋籤云盡智有五種無生唯一種即不動此即從根又云以有五種性故羅漢有種并法行一人名不動共六種也慧俱約觀行者如前釋云慧人緣空直入俱人帶事兼修是也九種則雙約二義可知註又九是空門二十七賢聖中之無學為答福田長者所問顯福田之多赴機生善故又六種明二加行差別如㭊玄下二十九一者恒時加行即勤修行二者尊重加行即猛利修行六種羅漢前二種俱無加行第三護法惟有恒時無尊重第四住法惟尊重無恒時第五第六皆具二加行也補正理論云初二闕恒時尊重然至無學思法少勤護法唯有恒時加行安住法唯有尊重加行堪達具二而是鈍根不動具二而是利根記此約兩種加行揀分六種也初一句標次一句指載小註中先列配二種加行六種羅漢下分四句料簡以前二後二各為一句中間二種各為一句也註果性退否者俱舍頌云阿羅漢有六退法至不動前五信解生信行轉入修道名信解總名時解脫後不時解脫從前見至生見得亦名見至亦是法行轉入之名記論釋云經說有六種羅漢一退法遇少違緣便退所得故二思法懼退失恒思自害故三護法於所得善自防護故四安住法無勝退緣雖不自護亦能不退無勝加行亦不增故五堪達法堪能好修練根速達不退故六不動法不為煩惱所退動故前五動性從於學位信解性生總名時解脫以要待時方得入定及心解脫其所待時有六一衣二食三臥具四處所五好說法師六好同學也後不動性名不時解脫者謂是利根以不待時便能入定及心解脫故從於學位見至生也然此從信解見至名者論云第十六心隨三向住果名信解見至亦由鈍利有別論者釋云隨三向人而住三果利鈍二根得名不同若鈍根名信解若利根名見至前隨信行今名信解謂由信故勝解相顯前隨法行今名見至謂由向見得至果見此二聖者信慧互增故有信解見至名別註有是先種性有後練根得六種羅漢有先世種性定者有後來修練根性轉劣成勝者如本是退法練成思法乃至不動或思練成護乃至進練成不動唯初退法是先動性無練根者又練根通資加修三位唯除見道以時速不能轉根故記此釋先有後得二義文中初二句標示先後二種如本是下釋練根唯初下釋先有又練根下明練根所通之位唯除下明練根不通之位以見道第十六一剎那心速不能轉劣成勝故也然論文解頌有異以論釋云退法種性必是先有思法等五亦有後得謂有先來是思法性有退法性後練根成思乃至不動隨文當說茲有具記又云退法種性非定退也乃至堪達非必能達但約容有建立此名故六阿羅漢通三界皆有若執退者必定應退乃至堪達必能達者彼執欲界具足有六色無色界中唯安住不動彼無退失自害自防及修練根故唯此二句知與此解頌有同異也備小註中自六種羅漢至無練根者與論正解全同論解增出退非定退及三界六種具缺今小註中增出練根通資加修三位皆增出意耳補練根通三位者正理云非唯無學有增進根有學異生亦有此義唯見道位無容起加行故備辨訛曰有先世種性世字未協按頌中先字通指學有位中頌中後字須的無學果後註四從種性退第一退法最下無處可退第六利根不退唯中間四種根性有退如第二退為第一乃至第五退為第四又此退性乃是練根非先定根性也記此一句頌明從種性退也小註釋明初二句明初後不退之故次三句明中間四種有退末二句明練根有退也然與論釋頌同論云不動種性必無退理前之五種皆有退義於中後四有從性退退法一種無退性理由此種性最居下故註五從果非先前五種從無學果退居學位第六則不退也亦是練根論退非先種性也非先二字總頌果性二種退者補此一句頌明前五種從果退也非先二字乃總頌前性退果退二種以四從種性退者乃謂練入根性有退非先種性有退也五從果退者亦是先退法及從退練入思等之果有退非先思等種性有退也若欲易明非先之上應加一先字如約性明先非先以論退不退則先性不退練入非先種性有退若約果明先非先論退不退則先思性等不退惟從退練入四位及退一位論退也以先種性即先天根本故不退非先乃今生學知工夫故有退耳備此有二種謂性退果退也性中論四謂本是退法性羅漢練成思法退時仍退至退法或本是住法性練成進法退時但退至住法或是退法性練成住法進法退時仍退至退法是謂性退以退性最下無處可退故不論之若先是思護住進四種性決不退至退法故曰非先也果退論五其退法一種本是退性至思護住進四性亦必須由退練入者方從而并退若先是思護住進四種性決不退至有學果故亦曰非先也性退單就五種無學四果論果退則從五種四果退至有學初二三果論如此庶與本論及析玄解稍合後賢詳之若析玄辨果退非先中云如第三護法若先是退法至果練成護法則有果退若先是思法後練成護法則無果退乃至結云即知果退惟約先是退法若先是思法等四性必無果退文此似即就退法根性論之記此段小註釋明前五從果退也初二句正釋前五果非六次二句重明是根非性退次二句明非先意含二退也析玄下辨果退非先義此似下註家斷意然與論不無同異論云五種皆有從果退義雖俱有退然並非先謂諸無學先於學位中所住種性彼從此性必無退理學無學道所成堅故若諸有學先凡位中所住種性彼從此性亦無退理世出世道所成堅故若住此位後修練根所得思等四種種性彼從此性容有退理而先位中住四等性必無退理此所得果先退法有退果義又亦無退先所得果後所得果容有退義是故定無退預流果由此應知果退法有三一增進根二退住學三住自位而般涅槃思法有四三如前說更加一種退住性餘三如次有五六七應知後一後一增故思法等四退住學位時還住退非餘若異此者得勝種性故應是進非退何緣定無退先果者以見所斷依無事故謂有身見依我處轉見所斷惑此見為根我體既無名依無事以無事故必無退理等也註非先有退者但據餘四說補此二句是析玄釋非論文玉師引以解上二句義耳此釋伏疑也蓋上云五從果非先然於退法本先種性何故併云五從果非先故即釋云非先有退等也則果退雖在前五若論非先唯中間四第一退法雖無練根不論性退亦論果退思護住進若退法練入尚論果退況本是退法豈不退耶記此段小註明釋意也初一句斷文蓋上云下出伏疑意故即下出今釋辭則果退下明非退法論性退第一下明退法亦論果退思護下約中間四例初退法有果退註不動盡智後必起無生智補此二句頌明第六羅漢起無生智也盡智是解脫道智即我知苦已我斷集已等無生智一切煩惱更不再生即我知苦已不復更知等故前五雖得盡智已或遇違緣即便退失今煩惱永不復生無有退失故曰不復更知更斷等第六於盡智後能起無生智所以果性皆不論退餘五有退以不起無生智故本住不動練根不動皆無退義記此段小註釋頌明不退義先明第六不動義次明前五有退義後明第六本住練根皆無退義論釋云不動種性諸阿羅漢盡智無間起無生智非更有盡智無學正見生也註餘盡或正見五種盡智後或但起正見記此釋與論同論云除不動法餘阿羅漢盡智無間有盡智生或即引生無學正見非無生智後容有退故註此應果皆有盡智後正見六種應果皆有記此釋與論辭異義同論云前不動性無正見生即有正見生而不說者一切應果皆有此故謂不動法無生智後有無生智起或無學正見前說四果是誰果耶應知此四是沙門果也補正見者一切羅漢皆有皆知我是羅漢註已上頌語取析玄意略註且羅漢見思已盡已證無學所以有退者考論祖誥妙玄四十六止觀九上十二輔行九上十五記此考祖文明羅漢有退所以妙玄云隨信行生退思護住升進等法得盡智無學等見若用金剛三昧於非想九品惑盡次一剎那證非想第九解脫成盡智次一剎那得無學等見或彼遇違緣有時退故不說得無生智此五種是信種性鈍根因中修道必假衣食等善根增進不能一切時所欲進也止觀云初從麤住訖至非想通有四分謂退護住進退又二一任運退二緣觸退緣有內外外諸方便二十五種吐納失所是外緣觸退內於靜心中三障四魔而生憂愛是內緣觸退後或更修得或修不得此人甚多護分者以內外方便將護定心不令損失住分者或因守護安隱不失或任運自住即是住分進分者或任運進或勤䇿進各有橫豎橫豎各有頓漸若十二門一一而進名漸進若一時具足名頓進特勝通明品品而發名橫漸一時具發名橫頓又於四分分分皆有四分具如修證中說輔行云言退者有因緣退名緣觸退無因緣退名任運退二十五種等吐納失所即去取失宜是外緣觸退於靜心下是內緣觸退又云禪門謂退分中退分者從九品至初品併失也退住者至初品便住也退進者至初品已更能䇿進至二品乃至九品亦能更進退護者退已將護使從初品以至九品弗使更退餘之三分例說可知註蓋信行慧解脫人不修事禪不得滅盡定或世智斷惑但得盡智不得無生智遇著違緣還起煩惱故有退也違緣者一長病二遠行三諫諍四營事五多讀誦又大經明五緣一樂多事二樂說世事三樂睡眠四樂近在家五樂多遊行記此玉師出其退之所以然取止觀文意釋也如止觀云一壞法人修九想但求斷苦燒滅骨人急取無學不欣事觀既無骨人可觀便無神通變化願智頂禪雖言燒滅實有身在例如滅受想而身作證此人好退乃至云若然即是世智斷惑慧解脫人故得有退非無漏智斷一品惑進一品解而有退也補隨願而了名為願智註又析玄謂非先種性者但是無學一道所成不得堅固故有退若是先種性由學無學二道資堅固故無退記一道所成指緣空直入者二道所成指帶事兼修者補一道所成者或謂是本斷超人初依有漏智斷上八地思至十六心滿即超無學不從二三果資加修而入者名一道若內弟子必學無學二道入者故堅固無退也若準俱舍意非先種性者本是退法至果練成護住等此是無學一道所成故有退若先是護住等種性或於學位練成護住等種性此是學無學二道資持故無退也準俱舍及正理論無學位中所練根性名一道所成若先世所種若有學位中所練至無學位皆名二道所成正理云無學位從退法種性修練根行轉成思等此四皆有退性果義退法種性雖必先得而是退法故容退果諸學位中從退法性修練根行轉成思等及得學果皆容退失諸無學者先學位中所住種性彼從此性必無退理學無學道所成堅故諸有學者先凡位中所住種性彼從此性亦無退理世出世道所成堅故彼文更有果退性不退等四句分別補析玄云一果退性不退即先學位是退法至果亦是退法是也二性退果不退即練思成護練護成住練住成進者是也三性果俱退即先是退法後練成思等四法是也四果性俱不退則前二道所成及第六不動法是也備有師標云此六種中約練性練果云何分別初時方始轉根名練性所修已成名練果以退法是先性故不退餘四是練性故皆退不動得無生智性果俱不退又云若據圖中論乎四句於六種中退法是果退性不退如思練護護練住住練進約性是退約果是不退是為性退果不退也若退練為思乃至退練成進約性是退約果亦退則是性果俱退若二不動性果俱不退顯揚論明前三退思護則有退失四住進不動則無退想抑揚隨機也註然前五種未必全退有遇違緣者故有退耳故輔行九上十五云然慧解脫亦不併退有退義故故說有退文記此申五種不全果退也然者領上之詞由上文明五從果退故此領之以明遇違緣者退不遇者不退輔行下引證上義註又退者非久輔行問退經幾時答經少時乃至自不知退若自知退當脩勝進方便復次彼煩惱現在前時心生慙愧速作方便如明眼人晝日平地顛蹶尋即還起文釋籤云此生之中必得無疑極至臨終亦得無學故也文五十九記此明退者不久即還得果也初一句標示退果不久輔行下引證準阿含明三果人退戒還家毀失律儀不失道共俗人生謗言無聖法佛言欲飽起厭不久當還更求出家故知退即還起也釋籤下轉明退即還證道果此是略引今具記之文云若退果者牽於斯那二果亦失至初果住法爾然也此生之中必得無疑猶如勝人平地顛墜四顧遙望不有他人見我倒否即能自起極至臨終亦得無學也註或曰前時不時各有慧俱不動既從時解脫生得非六種皆有退義耶記此問意謂時慧兩種有退既時不時各有慧俱則不時中慧解脫人應亦有退練根不動既從時解脫生應亦不免于退也豈非六種皆有退義耶註答慧人未必一向論退恐只鈍根有漏智斷遇違緣者退記此科簡利根不退也問中舉前義而問六當有退答中指鈍者逢違緣有退若無違緣即鈍亦不退況利者乎況俱人不動者乎如阿含中阿難問佛大德是學退無學退佛言無學退則知世智斷惑慧解脫人故得有退非無漏智斷惑一品進一品解而有退也補不動者乃問練根不動謂退法是時解脫從退練成不動亦時解脫前五既有慧後一亦應有慧前五中慧解脫若退則後一不動中慧解脫亦應有退故問曰得非六種皆有退義耶然此由前釋退所以中云慧人有退非先種性亦有退故據此問曰練根不動中慧人應有退義耶答中謂前五慧解脫人亦不一向必退但有漏智遇緣方論果退耳若五位慧人無漏智亦不退矣豈有不動慧人尚論退哉此斷定不動不退之義也註今復圖示補此點示六種羅漢各有慧俱四教義明唯退只是先種性餘皆有練根性故約性退惟除退法記圖中以利鈍分判時不時者且一往說其實互有利鈍止觀云若論根利鈍者法行利內自觀法故信行鈍藉他聞法故又信行利一聞即悟故法行鈍歷法觀察故或俱利俱鈍信行聞慧利修慧鈍法行修慧利聞慧鈍是也註六種論退局第四果通辨四果退不退者㭊玄引三家一薩婆多云初果不退後三果退二大眾部云前三果退第四不退三經部宗云初四兩果不退中間二果有退廣如彼文記此通辨四果退不退義析玄下指所引宗計不同註彼但註云三師難定今恐成諍略為和融輔行九上十五引婆沙云阿羅漢退牽二三果退猶如井沙上下有甎中間唯沙上甎若頹從上至下其中間沙豈得不頹四果如上甎二果如中沙初果如底下乃至初果之前更無有退若彼退時更無住處文不可聖退為凡夫也合彼初師然見道既有不等觀四諦如婆沙云二十八使見道斷餘六十使修道斷先斷三界苦下見惑見既分盡果理未圓例如身子六住尚退又後三果中斷惑之智通漏無漏是則四果俱退俱不退三師之說皆無妨礙記此約義融收三宗也初二句指析玄註辭次二句明今和融輔行下舉所引斷合然茲略舉所引今具記之謂婆沙中問阿羅漢退不應二三果亦退答云羅漢退牽二果退猶如沙井上下有甎中間唯沙上甎若頹從上至下其中間沙豈得不頹四果如上甎二果如中沙初果如底下若至底竟不復得去問若至初果亦應言退第二第三答如人墮於三層之屋彼亦如是雖不言退二三二三實退復次二三是第四因其果既退其因亦退若爾初果亦四果因亦應說退答初果之前更無有果若彼退時更無住處若許初退則有多妨本是見諦今非見諦本是得果今非得果本是決定今非決定本是聖人今非聖人離如是過故不說退總而言之不可以聖退為凡也如金出鑛豈更為鑛乎則知此論合彼薩婆多宗說也然見道下融初果亦有退義如婆沙云者如上註云先達言有二種根性若等觀四諦者見道斷八十八使若不等觀四諦者見道中唯斷三界苦諦下二十八使餘三諦下之見隨修道斷乃鈍根也見既分盡果理未圓猶鏡垢未盡去光不全現也例如身子六住尚退者舍利弗于六十劫中行菩薩道證別六住欲渡布施河時有人乞眼舍利弗言眼無所用何以索之若須我身及財物者當以相與答言不須汝身及以財物唯欲得眼若汝實行檀者以眼見與時舍利弗出一眼與之乞者得眼于尊者前齅之嫌臭唾而棄地又以脚踏舍利弗思惟言眼實無用而強索之既得而棄又以脚踏何弊之甚如此人輩不可度也不如自調早脫生死思惟是已於菩薩道退迴向小乘是則身子尚退況小乘初果聲聞豈有觸違緣得不退乎妙樂云六心中退者準纓絡意身子於十住中第六心退恐是爾前見思俱斷至六心時見猶未盡六心尚退故云例如也又後下融後三果有退不退如論家云無漏不退但禪定退修得欲界電光之定此定難促有時退失名退無漏無退又阿含云世智斷惑慧解脫人故得有退非無漏智斷一品惑進一品解而有退也是則下結成四果退不退義註子縛者見思煩惱果縛者五陰報質也灰身即滅戒身定身解脫身解脫知見中半分滅智即滅慧身解脫知見中半分則五分法身俱滅也記此釋出有餘無餘二涅槃體然就小乘宗自有二義一者有宗曰涅槃體一約時不同得二名字言體一者於此宗中煩惱業思以道力故應起不起擇滅無為是涅槃體此體是一約對身智得二名字身智未盡說前涅槃以為有餘身智盡竟向前涅槃轉名無餘非身智滅即名涅槃以此身智起已謝滅是無常故若斷因故令後不起是非擇滅故非涅槃也二依成實涅槃體二生死因盡名一涅槃生死果盡名二涅槃由有宗中要道親斷方稱擇滅身口二業及生死果非道親斷故不取之成實由斷煩惱餘不起故見道斷故亦得擇滅故名涅槃今合有宗義也補解脫者於無明心俱解脫無有餘習永不退轉故名解脫解脫知見者能於一切斷結道中念念悉知又知眾生深心所念如應說法令得解脫故能於一切眾生一切解脫道中知見具足又五分法身者分即分齊法謂戒定慧諸法身者聚也聚集諸法以成其身也諸法指五陰戒身戒法成就證得此身因修無漏定禪得定身修無漏慧得慧身心智斷有漏煩惱名有為解脫煩惱滅盡證得無為真理名無為解脫由二種解脫證得名解脫身知以智知見以眼見因此智眼於一切法知覺照了當體即空悉皆如幻得證此身名解脫知見身文出三藏法數又戒身等者光明記云謂無學道共戒滅盡定無生慧有餘解脫照解脫智眼知名為見謂自知是初果乃至四果也是則前三並在於果方名法身若入無餘則五分滅灰身則戒定有餘解脫滅滅智則慧及知見滅也又解脫者肇云縱任無癡塵累不能拘解脫也釋云變化如意於法自在解脫無礙故名解脫又云心得自在不為不能所縛故名解脫淨名疏云一真性二實慧三方便此當初真性也解脫知見者如大論問但言知何以復言見答言知言見事得牢固譬如繩二合為一則得牢堅復次若但說知則不攝一切慧如阿毗曇所說慧有三種一有知非見二有見非知三有亦知亦見有知非見者盡智無生智五識相應智有見非知者八忍世間正見五邪見有亦知亦見者餘殘諸慧若說知則攝見若說見則不攝知故說知見則具足備辨訛曰將解脫知見分半分屬身半分屬智據經論祖誥並無此意又解脫身即盡智解脫知見即無生智若論身者五俱身論智五俱智不可半半分對也又灰身者乃滅報質身不可指五分法身存考註然身子入滅而均提答佛何云五分法身不滅耶釋籤十云無作之業至未來世名為不滅非常住不滅也文無作業者乃功勳耳云云記此料簡五分法身滅義問中舉事以明滅而不滅然均提乃身子弟子身子既入涅槃弟子均提攜師衣鉢來至佛所佛即問言汝師五分法身滅耶均提答佛不滅今釋無餘涅槃五分法身俱滅故舉其事問彼云何不滅反明彼若不滅者為是此則何以言俱滅耶釋籤下引答以明其不滅者乃延留未來之不滅非亙古今湛然常住之不滅也蓋無作業即小乘戒定慧也所以但至未來世者如律疏云無作之業至未來世戒是有為色法定是有為心法命朽之時形俱無作戒體雖謝無作戒業得得不滅以隨業道至未來故由諸事定能伏結惑如蟲殘藏由伏故斷如蟲害命以無漏慧得初果已慧道勢分流至未來經於七生以滅盡惑是則均提所言不滅終歸乎滅以無作之業乃功勳故耳故此無餘涅槃必須五分法身俱寂滅也補若約凡夫及有學人可云是業至未來羅漢不受後有只可作功勳邊論註孤調解脫者輔行三上十一云灰身故無身滅智故無智獨一解脫故曰孤調妙玄取獨滅義亦名孤調涅槃名獨滅者輔行引大論云小乘戒為自調禪為自淨慧為自度文記此釋孤調解脫義也謂此小乘解脫不同大乘必具身智所謂直解脫非解脫解脫必具法身般若故也小乘以身為大患以智為勞形故灰其身滅其智以取解脫是為孤然一解脫也輔行云若入滅定等者既有身在名為法身受想心所識智不行名無般若故云無智羅漢在無色等者無色般含於彼無色得有餘般名為羅漢唯有心智而無色身似有般若而無法身若入無餘等者灰身故無身滅智故無智獨一解脫故曰孤調妙玄下指義示明輔行引大論釋妙玄獨滅名義者謂是中說勝因緣是二乘福德皆為自調自淨自度持戒是自調修禪是自淨修慧是自度又自調者正語正業正命自淨者正念正定自度者正見正思惟正方便此亦不出戒定慧意今取自私自利之行不行利他之業以釋獨滅義也補妙玄取獨滅義應妙樂四卷二十九註然斷欲九品立二三果上八地思惟一無學者止觀六七云如險處多難多須城壁欲界多難多果休息也文故知上界定地少難惟立一果記此釋伏問也或問教中依斷惑立果證則應依品數寬狹立果位多少何以欲界唯九品惑多立二三兩果而上界八地有七十二品惑唯立一果耶故此牒而釋之以明欲界多難人有八苦天有五衰所具之惑能潤七番生死既有多種患難故二三兩果與之休息以下例上則知定地縱然有難難亦不多是故唯立一無學果也註若爾七聖中二為見道信行法行二為修道信解見得二為無學道時解脫不時解脫復以身證對四果向者何耶有云位鄰無學將斷非非想惑特立此位如別圓之有等覺也今謂空有二論設位不等教門方便多少隨宜耳記此釋躡問也或躡上問云若上界定地少難惟立一果者何以教門七聖對三道復以身證對四果向耶答中有二初舉舊答意明別人將斷十二品無明證妙覺果時必立一位等覺圓人將斷四十二品證妙覺果時亦立一位等覺蓋以別圓兩教意在等覺運起金剛觀智斷盡一分障果無明藏人亦然欲運金剛觀智斷盡非非想最下一品輭惑故須立此身證一位也今下是註家融會意明身證一位成論所有毗曇所無且教門隨機施設不必定執也註妙玄明身證得滅盡定約似證也成論云不得滅盡定名身證者對四果真證奪而言之記此二文明身證滅定有得不得之別妙玄第四下明身證云入滅盡定者身證此定受想心滅成論明若得滅盡而不能入諸禪定名慧脫若能入諸禪定而不得滅盡名身證若二俱得名俱解脫是則二文身證滅定有得不得之別故此釋明妙玄乃約似證而與之成論乃對真證而奪之補成論以滅盡定為羅漢果引經若比丘能入滅定一切事訖若滅定非羅漢果不應說一切事訖經中說學人得九次第定不說得滅盡行者若得滅盡而不能入諸禪定名慧解脫若能入諸禪定而不得滅盡名身證若二俱得名俱解脫三結明位竟略明聲聞位竟二支佛三初合標次明緣覺亦名獨覺註輔行九下十五引大論二十一云迦羅此翻緣覺亦名獨覺文四教義二十八標云辟支迦羅此翻緣覺釋中開二謂緣覺獨覺記四教義云辟支迦羅此翻緣覺此人宿世福德神根勝利學十二因緣以悟道也大論云緣覺有二種一獨覺若佛不出世佛法已滅是人先世因緣能獨出世不從他聞自以智慧得道故名獨覺二名因緣覺者是人道根淳熟藉小因緣而能覺悟如見林壞因此覺悟成辟支佛大論意似用此名因緣覺是為標示華梵一名而釋為二也今明因緣覺者因聞十二因緣以悟也皆四教義文註新譯華嚴音義云二名各有梵語畢勒支底迦此名各各獨行佛者覺也鉢羅底迦此翻緣覺翻譯名義亦開二名記此出靜苑師音義又曰畢勒支底迦舊翻獨覺正得其義或翻緣覺者譯人之謬以梵語鉢羅底迦此翻緣覺故智論十八通上二類也註辟支迦羅名通二種若畢勒支底迦局在獨覺此皆梵音賖切故也除通二名切局獨覺緣覺者觀內因緣稟佛教法獨覺者觀外因緣無師自悟文句四七引大論云獨覺者出無佛世緣覺者願生佛世文記此正釋二名言緣覺觀內者如云過去二支因現在五支果現在三支因未來二支果又云二因既非其業五果之報何酬愛取有既已無疵生老死亦何所累如此觀察十二因緣流轉還滅是出有佛世稟佛教法者也獨覺觀外者如云秋觀黃葉落春見百華開覩物變以悟無常鑑時遷而入真道是出無佛世無師自悟者也文句引大論是證成意註俱舍明獨覺自有二種一麟喻二部行如析玄上補一麟喻者唯欲自度全無度他之心譬如麒麟唯有一角獨行無偶二部行者兼能利他謂部黨共行對前各各獨行而言此人得初果已未值佛世七番生死後證餘支佛教中如鹿行走亦能並馳並顧也註已上名義各釋記此結上文緣覺獨覺各釋名義也自此以下約名義通釋註若集解云慈恩基師引仁王經列獨覺眾又云釋迦出世五百獨覺從山中來至於佛所學者如何消釋此耶文記此引集解為通釋之本集解神智義師釋四教儀之書也註補註六亦引而釋云本是聲聞根性以緣悟菩提故名支佛文記此引輔註以聲聞根性通釋獨覺輔註神智義師釋三大部之書也註然仁王經初本無獨覺之名但云復有八百萬億大仙緣覺慈恩意以緣覺一眾諸經兼聲聞而列之若二乘別列如仁王也然經云緣覺慈恩稱獨覺者蓋根性不異名義互通如緣覺稱獨覺者雖值於佛樂獨善寂故即慈恩所云是也獨覺稱緣覺者雖無師教觀外因緣故如光明經云或不恭敬緣覺菩薩智者科為懺無佛世敬田惡業是也記此會通基師引經列眾之意然仁王經下領上列獨覺眾意來謂經初本無其名但有大仙緣覺之語而基師列為獨覺者意列諸經以獨覺攝在聲聞眾中乃以大仙緣覺之語列為獨覺眾所謂若聲聞獨覺二乘別列則如仁王經也然經云下釋明基師以經中緣覺稱獨覺意謂根性不異故同為小乘而名義互通故可交互相稱雖值於佛下示緣覺之名義通獨覺謂值佛聞因緣入道名緣覺而志樂離羣孤寂故義通獨覺也如慈恩所云一句證慈恩所指獨覺是其人也無師教示下示獨覺名亦通緣覺謂無師教示而觀外因緣境悟道故名通也如光明經下指證其人即經懺悔品云或不恭敬緣覺菩薩如是等罪悉皆懺悔而大師文句中科為懺無佛世敬田惡業是則科名無佛世敬田即是獨覺而經言緣覺者當是獨覺名為緣覺也補懺敬田惡業者田有三種一卑田亦名悲田即眾生是二敬田即父母佛菩薩是謂緣覺菩薩出無佛世乃眾生之福田既不恭敬福田即成惡業矣故當懺悔之既無佛世而有緣覺則知獨覺亦稱緣覺矣若不孝養父母則為恩田惡業不濟貧苦眾生則為悲田惡業今不崇三寶故云敬田惡業也註又獨覺亦通見佛文句四七引華嚴等獨覺有三類一者知佛出世即先入滅或佛神力徙於他土二者出無佛世三者雖生佛世願見佛故不即捨壽亦不被移文中義具此三五百獨覺從山來者即第三類記此人云通五百獨覺來至佛所也初一句標文句下舉文證釋一者下即華嚴所云菩薩下兜率放光照之覺即捨身不覺則佛以神力而徙之二者下即中論所云支佛出世佛法已滅此是獨覺人也三者下謂此人先得初果十四生未滿若值佛即成羅漢不值佛即成獨覺其既值佛亦不捨壽亦不被移願見佛故二果三果例然文中義具此三者此句指今儀文通具三類獨覺或是文句指經通具也註通義雖爾別釋如前又二辟支各有大小準輔行九下十五有三義一具相名大不具名小二兩大中現通者大無通者小三現通中說法者大不說者小又四教義四宿世偏修性念處者小兼修共念處者大又先達立漸頓二義如輔行等七生初果後方極證為小頓證為大記輔行三義者引大論云若七生初果值無佛世名小百劫種相名大種相不同或三十相二十九八乃至一相此獨覺大小也又七生盡植佛出世名小種相修福遇佛聞教名大此緣覺大小也又兩大中各有現通不現通現通者大不現通者小現通說法者大不說法者小也四教義云今此小大二種獨覺辟支迦羅宿植不同或於前世若偏修性念處觀十二因緣善根淳熟生無佛世因於遠離自然獨覺成小辟支迦羅也若修性共二種念處理事善根淳熟獨覺自悟具足三明八解脫及六神通成大辟支迦羅也又先達立頓漸指如輔行等者備意謂七生方證辟支果為漸為小不待七生而證者為頓為大此以加行損生為大也註若與聲聞對辨者如文句七二十六云二乘六義同十義別同出三界同盡無生同斷正使同得有餘無餘同得一切智同名小乘別開十義者行因久近六十劫百劫故一根利鈍二從緣獨悟三無悲鹿羊四聲聞如羊驚絕奔走支佛如鹿並馳並顧有相無相五觀廣略六能說得四果法不能說法得煖法七有云支佛能說法令人得四果聲聞不能說法不能令人得煖法在佛世不在佛世八頓證漸證九多現通少說法聲聞不定十記此示聲聞與支佛對辨而有六同十別之異言二乘六同者一同出三界即梵行已立二同盡無生即我生已盡三同斷正使即所作已辦四同得有餘無餘即不受後有五同得一切智即人空般若六同名小乘即喻如羊鹿二車也言十別者一聲聞行因六十劫支佛行因百劫二支佛根利聲聞根鈍三聲聞從師支佛獨悟四聲聞如羊驚絕奔走支佛如鹿並馳並顧五支佛有相聲聞無相六支佛廣觀內外因緣聲聞略觀四諦七支佛能說法令人得四果聲聞不能說法不能令人得煖法八聲聞在有佛世支佛不在佛世九支佛無分果故能頓證聲聞有分果故但漸證十支佛不樂說法假神力以化他聲聞或時現通或時說法之不定也補言能說得四果法者如本行經云辟支佛者理無說法唯以神通而用化物不以餘法四念處云支佛出無佛世不稟佛教但作神通以悅眾生不能說法此中小註有悞當是聲聞能說支佛不能說耳縱能說法既出無佛之世安得有四果者乎備上曰現通中說法者大此中小註指支佛當能說法令得四果者似指支佛說法功用顯其用勝也註文中六十劫百劫者析玄上一明修行聲聞利者三生鈍者六十劫支佛利者四生鈍者百劫文然則聲聞勝支佛耶聲聞但入見道支佛極證無學還以支佛為勝補此牒釋行因久近意明二乘各有利鈍而上文乃就二乘鈍者論行因久近也次料簡勝劣問中舉行因久近故以聲聞為勝答中約所證淺深故顯支佛為勝也言三生者聲聞順解脫分外凡為一生四善根順決擇分內凡為一生見道入聖位為一生俱舍云極速三生得解脫謂初生起順解脫分二生起順決擇分三生入聖乃至得解脫婆沙問順解脫分善根在有情身其相微細已種未種云何可知答以相故知彼有何相謂聞善友說法身毛為豎悲泣流淚厭離生死欣樂涅槃於法法師深生愛敬當知決定已種順解脫分善根若不爾者當知未種也支佛四生者三生見道得初果已出無佛世證無學果故為四生註又有相者支佛無相者聲聞分別功德論五卷初謂字函云身子有七相目連有五相阿難二十相獨難陀有三十相難陀金色阿難銀色文是則聲聞亦有相耶須知元是聲聞根性不論種相若是支佛轉為聲聞不妨有相四教義二云迦葉舍利弗等皆是辟支根性人也文若文句解形色憔悴謂二乘不修相好此以大形小不可為並記此相有相無相義別初二句指釋論下引證可知四教義下指人顯根性也如四教義云若生佛世聞生滅十二因緣教即發四辯還名羅漢在聲聞數如迦葉舍利弗等皆是辟支根性人也亦名辟支佛若不爾者那得次為求支佛乘說十二因緣設不值佛亦自得道據此則知身子等聲聞是支佛根性故亦有相也註又根利鈍者別對支佛是法行聲聞是信行通論各有信法二行文句五三十一妙樂六二十八記文句云支佛求自然慧者辟支是法行人從他聞法少自推義多故取譬鹿鹿不依人故也自然慧者從十二因緣門入此門本自有之非佛天人所作也妙樂云是法行人者一往且對聲聞憑教所以支佛自思為法然支佛必自證聲聞信法信法具如止觀第五記引婆沙等文聞法少者支佛或聞教墮在聲聞者亦是因信但云聞少是則文句證成別對妙樂證成通論各有利鈍也註諸文更有侵習不侵習亦由根利鈍故記此重約利鈍釋也謂支佛根利故斷正使更能侵習而聲聞根鈍故雖盡正使不能侵習也註支佛不制分果四教義二釋小獨覺云本是學人在人間生或須陀沍七生既滿不受八生自悟成道輔行亦云七生初果此是聲聞根性出無佛世後證支佛是故云爾非分果也記此明支佛不立分果也初一句直標次四教義下引示文云本是學人在人間生爾時無佛佛法亦滅或須陀沍七生既滿不受八生自悟成道是人不名為佛亦非羅漢但名小辟支也若論其道力或有不如舍利弗等大羅漢也輔行亦云若七生初果值無佛世名小迦羅此是下釋非分果義也註若般若經明獨覺向此則無妨大乘同性經明支佛十地此乃兼說耳記如大品云辟支佛辟支佛道當知支佛道即獨覺向也無妨者以獨覺向但是伏惑之類非是分斷惑果故雖明而不妨也大乘同性經明諸佛十地聲聞十地已有菩薩名海妙深持問佛支佛地復有幾許佛言支佛地有十種一苦行具足地二自覺甚深十二因緣地三覺了四聖諦地四甚深利智地五八聖道地六覺了法界虗空界眾生界地七證寂滅定地八六通地九微秘密地十習氣漸薄地是名十種支佛地是知同性明支佛十地乃因問之便兼說耳言兼說者謂此經正明菩薩聲聞十地約行證境智而明支佛十地者乃兼說耳註別行疏云支佛侵習為淺處通教菩薩正習盡名彼岸文此以三藏支佛與通菩薩共論疏記上云支佛修行不立分果深觀緣起九種三多作福供佛聞法福慧既隆預侵二習預進也此釋支佛侵習之所以也不可竟作斷習看而連下文作難雖未發真真無漏智四流莫動欲有見無明名得淺處支佛向中伏惑頓證極果名到彼岸此以支佛向與支佛自論通教菩薩正盡得淺處習盡到彼岸文此約通菩薩正盡習盡自論記此別行疏明水難中文疏以三藏支佛與通菩薩共論淺處彼岸記中各論二人淺處彼岸可解二習即煩惱習業習以其福隆故進侵業習以其慧隆故進侵煩惱習也與支佛自論者與支佛果自論也舊謂支佛必須發真方侵習氣別行疏記云預侵二習復云雖未發真此謂難也須知疏中以三藏支佛與通菩薩共論淺處彼岸記中義開二人各論不可謂記文正釋疏中支佛侵習為淺處以預侵二習連下雖未發真而作難也若如上註釋則無妨矣記此段小註正上記文句義先出引舊并疏記文作難次誡示疏記共論各論義別不可下遮其以文作難若如下指依上釋為妥二分釋二初明緣覺稟教四初正明所稟教法值佛出世稟十二因緣教所謂一無明煩惱障煩惱道註過去一切煩惱皆是無明體即是癡迷闇為性無所明了故曰無明記此指無明名體也初二句指名如法界次第云過去一切煩惱通是無明以過去未有智慧光明則一切煩惱得起是以過去煩惱悉是無明也次一句出體如唯識論云癡惑於諸理事迷闇為性當知癡即無明也又云我癡者謂無明愚於我相迷無我理故名我癡若敵體指之亦如唯識云此中無明唯取能發正惑後世善惡業者是也末二句謂無智照之明於諸事理無所明了故註注云煩惱障煩惱道者輔行三下十四云能蔽聖道故名為障展轉互通故名為道並從過患功能立名文記此釋無明即名障道蓋障者遮障遮蔽為義道者道路能通為義而此無明能遮蔽聖道真明能互通有漏業果是故以三障論之為煩惱障以三道論之為煩惱道也二行業障業道此二支屬過去註造作名行於過去世造作諸業也記此釋行業名義如法界云從無明生業業即是行以善不善業能作世界果故故名為行妙玄云行時過去諸行時唯識論云即彼無明所發名行也既行以造作為義能引為支故於三障為業障於三道為業道此即過去二支因也備辨訛曰標記云三障與三道不同數數現起者名煩惱障餘惑名煩惱道五逆惡業名業障餘業但名業道北洲無想及善惡趣名為報障餘報但名苦道分道障者修行之切要也三識托胎一分氣息註既有惑業以生垢心故父母交會時意識妄念投托母胎一剎那間有了別義名之為識記此釋識名惑業者即無明與行為能生垢心即顛倒垢染之心為所生由此所生垢心於父母交會根境研磨之時而起妄念或愛母而憎父或愛父而憎母認其所遺以為己有即此三緣和合名為投胎所謂流愛為種納想為胎也一剎那間有了別義名之為識者法相宗以集起名心思量名意了別名識蓋明八七六識次第得名也今指第六名識支又法界云從行生垢心初身因如犢子識母自相識故名識即是父母交會托胎時名註托胎一分氣息止觀九二十一云初托胎名歌羅邏此時即具三事一命二煖三識是中有報風依風名為命精血不臭不爛名為煖是中心意名為識文此時便隨母氣息上下出入也記此引止觀之文釋托胎也如輔行云初入母胎如風雨入舍入已若不壞者七日一變初七名歌羅邏此云凝滑狀如薄酪是中有報風依風名命者輔行云壽名風息初投胎時有一毫氣但根未具時隨母氣息根具氣分名為兒息由有息故連持此身從能持說故息名壽也精血名煖者輔行云煖即是身以由煖故精血不壞從功能說也心意名識者輔行云識即是心從當體說補報風依風亦名報息依息依息者依心而起如嗔欲時氣息隆盛初入母胎即有報息隨母氣息兒漸長成風路滑成兒息出入不復隨母生在異處各各有息名曰報息四名色名是心色是質註從托胎後五個七日名形位生諸根形四支差別故雖有身根及意根未有眼等餘四根故六處未圓皆是名色躡記此釋名色也初一句示胎中第五位以教中明初七名歌羅邏翻凝滑二七名頞部曇翻皰三七名蔽尸翻凝結四七名羯南翻凝厚五七名鉢羅奢佉翻形位也雖有下明成及未成各根妙玄云已受生相續未生四種色根也註名是心色是質者四蘊是心一蘊是色質礙曰色心但有名也記名者緣慮之氣但有其名而無其實法界云從識生非色四陰及所住色陰是為名色也五六入六根成此胎中註從名色後至第六七日名髮毛爪齒位七七日名具根位五根圓滿故記妙玄云六入已生四種色根具足也法界云從名色中生眼等六情名六入從五皰初開已來即是六入名也註六根成者輔行四下二十一云十九七日諸根具足文此胎中總有名色六入皆胎中位故輔行八云三十八個七日皆胎中位記此結示胎中位也初總示次引證輔行引阿難問經佛為廣說胎相初七名阿羅邏如薄酪二七名阿浮陀如厚酪三七名閉手如短小藥杵四七名伽那如溫石五七名波羅奢呵五皰開張六七現膝相七七現手足相八七手指相九七眼耳鼻口大小便道相十七堅實有風門吹胎如囊十一七七孔開徹母性改常十二七生大小腸如絲綖有三支節一百孔穴十三七生飢渴想十四七生九脈交絡纏繞十五七生二十脈派一邊各十又四十脈派八萬名十六七氣息通十七七眼得光十八七諸根明十九七諸根具二十七生諸骨二十一七生肉二十二七生血二十三七生皮二十四七生膚二十五七血肉長二十六七生髮二十七七以業力故分別端醜男居母左女居母右男面向內女面向外皆手掩面蹲踞而坐二十八七生八種想謂牀榻園林等二十九七生光潤五色別異三十七長髮爪三十一七至三十五七人相具足三十六七生厭離想不樂三十七七生穢獄想三十八七風力所轉頭向產門申兩臂出產門每於一七各有一風吹令變易風各有名具如彼經生已八萬戶蟲從方而生縱橫飲噉左右各五百諸節各有若干蟲戶長大衰老常與蟲居是則乃至三十八七計日成二百六十六計成九月所以少四日者以半小月故也問世教及經並云十月何故唯九答九即十也如月初一受胎者定唯九月二日已去日數滿時即跨至十又羅云六年脅尊者六十亦有減者乃至五月者雖謂增減不同而壽煖息必具此不可以常論六觸出胎註出胎已後至三四歲由根對塵情塵識合然於違順中庸差別境上未能了知生苦樂捨是名為觸記此釋觸名體也先出體謂人生三四歲時眼等五根對色等五塵中有識生以此情塵識三和合而成觸體故法界云由入對塵情塵識合是名為觸然於下示觸名謂一切境緣並有媸妍見有好醜皆出自心故人於違境生苦順境生樂非違順中庸境生捨今尚未起苦樂等見名之為觸也七受領納前境好惡等事從識至受名現在五果註從五六歲至十三歲因六塵觸六根即領納前境於三受違順中庸境上已能了別然未能起淫貪之心故名受也記妙玄云能分別苦樂避危害事能生貪愛不起淫欲於一切相不生染着是時名受此上識等五以三世因果言之同是現果即現在五支果也八愛愛色男女金銀錢物等事註從十四五歲至十八九歲貪於種種勝妙資具及淫欲等境然猶未能廣遍追求不名為取皆是愛支所攝記此釋愛名用也先明業用謂貪勝妙資具乃愛資生塵境及貪淫欲乃愛男女情境法界云從受中心著名愛謂於領受中心心渴愛也然未能廣遍追求如衝虎穴過龍津不顧危亡唯以欲求乃名為取今既未能故是愛攝九取凡見一切境皆生取著心此二未來因皆屬煩惱如過去無明註即從二十歲已後貪欲轉盛於五塵境四方馳求名之為取記以釋取名也謂二十已後正當強壯血氣方剛較前淫欲愈覺轉盛是以戴月披星梯山航海適越投楚走北奔南深染塵欲名之為取妙玄云以貪境故四方追求是時名取也此取與愛以三世因果言之同是未來生死因以三障三道言之如過去無明同煩惱障煩惱道即無明愛取三煩惱也惟無明發業愛取潤生有殊耳十有業已成就是未來因屬業道如過去行註體即是業謂馳求諸境起善惡業積集牽引當生三有果故名為有注云是未來因者雖屬現在却為未來苦果之因也記此釋有名體也初指體次釋名取為能起善惡業為所起即此所起善惡業為牽引因成三有之異熟果是則有因有果因果不忘名有法界云從取則後世業因成名有又因能有果故名為有注指儀文原解業已成就是未來因者雖云現在三支因實為未來苦果之因也又以三道言之而此有支與過去行支同是業道即行有二支屬業道也然有少別以行惟善惡二性有通善無覆無記也十一生未來受生事註從有還受後世五眾之身是名生所謂四生六道中受生也記此釋生名也初正釋名謂由現在有支為正感生死之因故受未來生身之果五眾即五蘊也所謂下示生處先德云鑽馬腹入驢胎塗炭經曾幾度回適從帝釋殿前過又向閻君鍋裏來是也四生六道乃善惡者受生之處也十二老死註從五眾之身熟壞是名老死記此釋老死名也如唯識云老死猶云衰變敗壞住世衰變總為老名身毀命終最後敗壞乃得死名也而老死同一支者唯識又云老非定有附死立支也此老死支與上生支同為未來苦果即未來二支果也又此未來二果及現在五果於三道即苦道於三障即報障也此是所滅之境註以能滅之觀順推此境故此十二即所滅境也記此釋結名也言所滅之境者如法界云若正觀諸法實相清淨則無明盡無明盡故行盡乃至眾苦和合皆盡是為以觀順推此境滅盡名所滅境註不立病支者妙玄二十六云問何不說病為支答一切時一切處盡有者立支自有人從生無病如薄拘羅生來不識頭痛況餘病也是故不立問憂悲是支否答非也以終顯始耳如老死必憂悲文記此節料簡有二先明病不立支問以生老病死為四大山皆能逼害於人既三種立支何獨病不立支耶答中不徧時處故不立支如瑜伽論云十二有支一切一分上二界有而病不遍一切處不定一切時故不立支又唯識論云薄拘羅年百六十歲無病無夭由昔持不殺戒九十一劫命不中夭昔施僧一訶黎勒果故身常無病欲界眾生尚有如薄拘羅者況色無色故不以病為支也次明憂悲不立支如有老死必有憂悲故婆沙云老死有果謂憂悲老死為憂悲因名始憂悲為老死果名終憂悲既苦老死亦苦故云以終顯始耳註釋籤三三云問愛取何別答愛增廣名取文然上一往似論三世在支佛逆順兩緣百千萬世觀因緣等記因緣有三世二世一念三種隨修一種即證緣覺果故今但論三世也支佛逆順兩緣百千萬世等觀已記前二諦緣開合殊異三初標顯殊異與前四諦開合之異耳註止觀一十二云總說名四諦別說名十二因緣二徵釋開合云何開合謂無明行愛取有此之五支合為集諦餘七支為苦諦也註苦是識名色六入觸受生老死七支集是無明行愛取有五支道是對治因緣方便滅是無明滅乃至老死滅文輔行一下十云離苦集為十二支觀因緣智以為道諦十二支滅以為滅諦文文句七二十一云十二因緣者還是別相細觀四諦耳約苦集即有無明老死約道滅即有無明滅乃至老死滅也文備此對聲聞四諦判三殊異所以既名異義同何故重說為機宜不同故註聲聞總觀四諦緣覺別觀十二因緣記根有鈍利所謂機宜不同也三境觀逆順研推緣覺之人先觀集諦所謂無明緣行行緣識乃至生緣老死此則生起若滅觀者無明滅則行滅乃至生滅則老死滅註緣覺之人等者此觀十二因緣生若滅觀者等此觀十二因緣滅記此順推流轉還滅二門也註諸文更有逆順等異如阿含明始無明終老死名順觀始老死終無明名逆觀又止觀禪境以有支在初推因知果也釋籤先從受支起觀此推果知因也此如輔行又四念處約十二支觀愛觀見明推尋觀破之義也文記此指諸文推境推觀阿含明逆順觀者但作此觀自滅諸惑也止觀以有支在初者文云思惟心所緣處或緣善心惡心能緣所緣即是有支有能含果此有由取以取善惡而得有有若不取者亦無此有故知有從取生復知取從愛起如愛色故取不愛則不取愛因受生由領受善惡故愛生若無領納愛則不生又觀受由觸六塵來觸六根故得有受無觸則無受經云六觸因緣生諸受又知觸由入若無六陰統六根則不能涉入諸塵而生觸入由名色色心合故則有于入當知入由名色名色由初托胎識故有凝酥薄酪六皰開張名色和合當知名色由識識由過去善惡業行行由無明癡愛造作眾行使識流轉從過去來今從今愛取緣有有能含果招未來生死是知以有支在初以欲推因知果也釋籤先從受支起觀者文云如諸觀法皆從受起若支佛自起觀者應如阿含生滅各有逆順觀境但作此觀自滅諸惑今大小偏圓共為觀法況四諦因緣名異義同四諦觀苦為初門故今觀因緣亦初起苦道如四四諦苦並居初故四觀緣咸從受起知苦斷集次第不殊用四種智見理各異須分此四也是知從受支起觀乃欲推果知因也此如輔行者文云觀十二緣凡有二種一推果知因如先推受以至無明既知無明生於受等則不起愛等起於當果具如玄文釋因緣境二推因知果即如今文文明發得還寄修辯於定心中所緣善惡能所和合得名為業業必招果故名為含業即有因故有能含果次推此業還由於取取於善惡乃至無明故息現因令滅當果也四念處文已記前五卷因緣觀中不錄四結顯悟理受名觀十二因緣覺真諦理故言緣覺註因觀十二等以觀因緣生滅覺悟真空而結名也記此釋結名也意謂因緣和合諸法有生因緣別離諸法有滅是知生滅本自因緣而諸法體寂然不動真空之理從茲別觀細察自悟是故得名因緣覺也二明獨覺自悟言獨覺者出無佛世獨宿孤峯觀物變易自覺無生故名獨覺註觀外因緣無師自悟未必一向獨宿孤峯如國王花飛釧動等如釋籤七二十一云記此別釋獨覺也花飛者如大論云有一國王出國遊戲清旦見樹林花果茂甚可愛樂時王食已即便偃臥王諸婇女採花毀樹時王覺已見林毀壞思惟一切悉皆無常無漏開發斷結成辟支佛果釧動者如禪經云有國王令宮女摩身為鐶釧鬧令漸漸減乃至唯一則不復聲因思此聲從因緣生悟證辟支佛果等者如獼猴見支佛坐禪後於餘處見諸外道種種苦行乃教外道跏趺而坐捻其口合其眼外道歎云必有勝法外道受教皆證支佛是也三同異二初明兩種自揀行位無殊兩名不同行位無別註雖緣覺獨覺之異而同修因緣之行同證侵習之果二與聲聞對揀斷侵有異此人斷三界見思與聲聞同更侵習氣故居聲聞上註習氣者慣習氣分如氣中香其香雖盡餘氣尚存統論諸文有三家二即今是見思家習耳記三家謂見思塵沙無明三家習也二即謂塵沙即習無明即習補無明亦分正習而言即者菩薩斷無明時至等覺位必斷其習無留習者故言無明即習若聲聞但斷正使則正習條然不同故不即也備集註問答云通名三家別稱二即何耶答見思最麤正使外別有習氣體故聲聞斷正支佛侵習不盡菩薩方盡塵沙無明惑細習無別體只附於正正斷習亦斷是知二無別體故即三各不同稱家耳註大經云我衣我鉢見習也舍利弗嗔畢陵伽慢思習也記大經云聲聞緣覺有煩惱習氣謂我身我衣等又疏云二乘猶有我衣我鉢是見習也大論佛言舍利弗往昔為蛇曾害國王醫人收蛇令吸毒氣若不吸者即須入火蛇思之云我毒已放云何更吸即入火死以由善惡不相妨故故得聖果猶餘嗔也又畢陵伽一日渡河因其水急叱曰小婢駐流河神詣佛白言畢陵慢我佛令懺悔畢陵喚云小婢來我與汝懺悔眾笑懺而更罵佛問神見畢陵合掌未曰見佛言懺已無慢當知此人五百世作婆羅門又見河神宿生曾為己婢常自高傲口言而已是思習也
